<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI 컬러 레시피 — 검수 툴</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Noto Sans KR',sans-serif;background:#FAFAF7;color:#1C1917;min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:14px}

.app{max-width:1400px;margin:0 auto;padding:16px}

.page-header{display:flex;align-items:center;gap:12px;padding:14px 16px;background:#fff;border:1.5px solid #e8e4df;border-radius:14px;margin-bottom:16px}
.page-header h2{font-size:18px;font-weight:800}
.page-header .sub{font-size:12px;color:#A8A29E;margin-top:2px}
.page-header a{color:#8B7355;text-decoration:none;font-size:13px;margin-left:auto;font-weight:600}

.toolbar{background:#fff;border:1.5px solid #e8e4df;border-radius:14px;padding:16px;margin-bottom:16px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.toolbar .upload-label{display:inline-block;padding:10px 16px;background:#1C1917;color:#fff;border-radius:10px;cursor:pointer;font-weight:700;font-size:13px}
.toolbar .upload-label:hover{opacity:0.9}
.toolbar .run-btn{padding:10px 20px;background:#8B7355;color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:700;font-size:13px}
.toolbar .run-btn:hover{opacity:0.9}
.toolbar .run-btn:disabled{opacity:0.4;cursor:not-allowed}
.toolbar .clear-btn{padding:10px 16px;background:#fff;color:#6B5D4E;border:1.5px solid #e8e4df;border-radius:10px;cursor:pointer;font-weight:600;font-size:13px}
.toolbar .info{font-size:12px;color:#A8A29E;margin-left:auto}

.summary-bar{background:#fff;border:1.5px solid #e8e4df;border-radius:14px;padding:14px 16px;margin-bottom:16px;display:none;font-size:13px}
.summary-bar.show{display:block}
.summary-bar .stat{display:inline-block;margin-right:16px;font-weight:600}
.summary-bar .stat .num{color:#8B7355;font-size:16px;font-weight:800}
.summary-bar .stat.match .num{color:#4A7C59}
.summary-bar .stat.miss .num{color:#C0392B}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}

.card{background:#fff;border:1.5px solid #e8e4df;border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:10px}
.card .img-wrap{width:100%;aspect-ratio:1;border-radius:10px;overflow:hidden;background:#f5f1ec;position:relative}
.card .img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.card .img-wrap .remove-btn{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,0.6);color:#fff;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}

.card .card-filename{font-size:11px;color:#A8A29E;word-break:break-all}

.card .expected-select{width:100%;padding:8px 10px;border:1.5px solid #e8e4df;border-radius:8px;font-size:12px;background:#fff}

.card .status{font-size:11px;font-weight:700;padding:4px 8px;border-radius:6px;display:inline-block;align-self:flex-start}
.card .status.pending{background:#f5f1ec;color:#A8A29E}
.card .status.running{background:#FFF4E5;color:#D97706}
.card .status.done{background:#E6F4EA;color:#4A7C59}
.card .status.error{background:#FCE4E4;color:#C0392B}

.card .result-box{background:#FAF6F0;border-radius:8px;padding:10px;font-size:12px;line-height:1.7;display:none}
.card .result-box.show{display:block}
.card .result-box .row{display:flex;gap:6px;margin-bottom:4px}
.card .result-box .row .label{font-weight:700;color:#8B7355;min-width:70px;flex-shrink:0}
.card .result-box .row .value{flex:1;color:#1C1917;word-break:break-word}
.card .result-box .swatch{display:inline-block;width:14px;height:14px;border-radius:4px;border:1px solid rgba(0,0,0,0.08);margin-right:6px;vertical-align:-2px}

.card .match-badge{font-size:11px;font-weight:700;padding:4px 8px;border-radius:6px;display:inline-block}
.card .match-badge.match{background:#E6F4EA;color:#4A7C59}
.card .match-badge.miss{background:#FCE4E4;color:#C0392B}
.card .match-badge.na{background:#f5f1ec;color:#A8A29E}

.card .step2-preview{background:#fff;border:1px solid #EDE6DA;border-radius:8px;padding:10px;font-size:11px;line-height:1.7;max-height:200px;overflow-y:auto;display:none}
.card .step2-preview.show{display:block}
.card .step2-preview .summary{font-weight:700;color:#1C1917;margin-bottom:6px}
.card .step2-preview .tips{color:#6B5D4E;white-space:pre-line}
.card .step2-preview .tips b{color:#1C1917;display:block;margin-top:4px}

.empty{text-align:center;padding:60px 20px;color:#A8A29E;font-size:13px}
</style>
</head>
<body>
<div class="app">
  <div class="page-header">
    <div>
      <h2>AI 컬러 레시피 — 검수 툴</h2>
      <div class="sub">여러 사진을 한 번에 분석하고 예상 루트와 비교</div>
    </div>
    <a href="./analyzer.html">← 일반 모드로</a>
  </div>

  <div class="toolbar">
    <label class="upload-label">
      사진 업로드 (최대 10장)
      <input type="file" accept="image/*" multiple style="display:none" onchange="handleBatchUpload(this)"/>
    </label>
    <button class="run-btn" id="runBtn" onclick="runAll()" disabled>전체 검수 실행</button>
    <button class="clear-btn" onclick="clearAll()">전체 삭제</button>
    <div class="info" id="infoText">업로드된 사진 없음</div>
  </div>

  <div class="summary-bar" id="summaryBar"></div>

  <div class="grid" id="grid">
    <div class="empty" id="emptyMsg">사진을 업로드하면 여기에 카드가 표시됩니다</div>
  </div>
</div>

<script>
/* PROMPTS — analyzer.html과 동기화 필요 */
function buildTopInstruction(tp,bd){return['너는 15년차 동양인 모발 전문 컬러리스트야.','AI가 분석한 목표 색감을 보고, 동양인 모발에서 이 색감을 구현하려면 어떻게 해야 하는지 역추론해.','아래 컬러리스트 지식을 바탕으로 사고하되, 레시피는 네가 추론해서 만들어.','','■ 사고 순서 (반드시 이 순서로):','① 목표 색감 파악 — color_name_ko, tone, recipe_direction 읽기','② 탈색 필요 여부 — [D1] 판단 절차로 "버진모 가능 vs 탈색 필수" 결정','③ 필요 베이스 레벨 — [D2] 판단 절차로 "탈색 몇 회가 필요한가" 결정','④ 염모제 조합 추론 — [D3] 판단 절차 + [K] 지식 참조하여 조합 결정','⑤ 대안 베이스 추론 — [D4] 판단 절차. 단, 탈색 1회이거나 버진모 가능이면 이 단계를 건너뛴다.','⑥ 출력 — [O] 출력 규칙에 맞춰 JSON 조립. [G] 가드레일 체크 후 출력.'].join('\n');}
var DECISION_NATURAL=['══════════════════════════════','[D] 판단 절차 — 자연모','══════════════════════════════','','=== [D1] 탈색 필요 여부 ===','','■ 핵심 질문: \"이 색감은 버진모(5레벨, 적색 멜라닌 가득)에서 가능한가?\"','','버진모에서 가능한 색감:','- 한색 방향 → 쿨브라운, 매트브라운, 애쉬브라운, 초코브라운 등 (브라운으로 수렴되는 결과가 곧 색감)','- 난색 방향 → 레드브라운, 로즈브라운, 와인빛 브라운, 블랙커런트 (적색 멜라닌과 같은 계열)','★ 애쉬브라운·초코브라운·쿨브라운 등 브라운 계열은 대부분 버진모 고산화제 리프팅으로 충분하다. [K13] 참조.','','탈색 필수인 색감:','- 투명감 + 선명함이 동시에 필요한 색감','- 잿빛·무채색이 투명하게 발색되어야 하는 색감 (브라운기 없이 무채색만 보이는 경우)','- 파스텔, 블론드, 베이지 등 가벼운 색감','- 올리브·카키 계열(애쉬카키/카키 염모제 필요) — 버진모의 적색 멜라닌이 올리브감을 방해한다. 탈색 1회 필수.','','★ 한색 계열에서 브라운기 없이 무채색(잿빛·회색·블루)이 투명하게 발색되어 있으면 → 탈색 후 입힌 색감이다.','동양인 버진모의 적색 멜라닌으로는 이런 무채색 투명 발색이 나올 수 없다.','★ 체감 명도가 낮다고 탈색 횟수를 줄이지 마라. 탈색 횟수는 \"이 색감을 만들려면 어떤 베이스가 필요한가\"로 판단하라.','','버진모에 한색 염모제를 올리면 왜 브라운으로 수렴하는가:','- 고명도 염모제가 적색 멜라닌을 어느 정도 깨면서 리프팅','- 깨진 자리에 노랑기가 드러남','- 염모제의 염료가 이 노랑기를 중화하는 데 소진됨','- 결국 색감 표현에 쓸 염료가 부족 → 적빛 없는 브라운으로 수렴','','난색(레드, 핑크)은 적색 멜라닌과 같은 계열이라 소진 없이 발색.','','→ 버진모 가능이면 [D3]으로. 탈색 필수이면 [D2]로.','','=== [D2] 필요 베이스 레벨 결정 ===','','■ 핵심 질문: "잔류 색소가 이 색감에서 활용되는가, 방해되는가?"','','■ 1회 vs 2회 — 주황기·브라운이 방해되는가:','탈색 1회(주황~노랑 14레벨 베이스)로 충분한 색감: 잔류 주황기·브라운이 색감의 일부로 활용되는 한색. 매트 애쉬, 올리브 애쉬, 애쉬 브라운, 카키 브라운 등.','탈색 2회(노랑 베이스) 필요한 색감: 잔류 주황기·브라운이 색감을 오염시키는 한색. 애쉬 그레이, 네이비 등.','★ 같은 계열명이라도 투명감·파스텔이 동반되면 잔류 색소가 방해된다. 판단 기준은 계열명이 아니라 "브라운기가 남아도 되는가"이다.','','■ 2회 vs 3회 — 노랑기가 방해되는가:','탈색 2회(노랑 베이스)로 충분한 색감: 노랑기가 보색(바이올렛)으로 잡히면서 색감에 녹아드는 경우. 애쉬 그레이, 네이비 등.','탈색 3회 이상 필요한 색감: 노랑기조차 색감을 오염시키는 경우. 파스텔, 실버, 밀크티 베이지, 라벤더 애쉬 등.','','→ 베이스 레벨이 결정되면 [D3]으로.','','=== [D3] 염모제 조합 추론 ===','','■ 추론 순서:','1. 보색 결정 → [K5] 보색 매칭표 참조.','2. 메인 염모제 계열 → color_name_ko와 recipe_direction 중심으로. [K9], [K11] 참조.','3. 뉘앙스 보조 → 컨트롤컬러 또는 보조 염모제로 미세 조절.','','★ 극고명도 색감(블론드, 백금발, 화이트 등)에서는 [K7] 극고명도 베이스 원리를 우선 적용하라.','블론드의 핵심은 염료 최소화이다. 애쉬를 메인으로 쓰면 회색이 되지 블론드가 아니다.','','→ 조합이 결정되면 [D4]로.','','=== [D4] 대안 베이스 수렴 추론 ===','','★ 탈색 1회이거나 버진모 가능이면 D4는 실행하지 마라. 탈색 2회 이상일 때만 실행.','','최적 베이스보다 한 단계 아래 레벨에서의 수렴 방향을 추론한다.','\"한 단계 아래\"는 [K3] 레벨 체계에서 바로 다음 단계. 예: 18→16, 16→14. 두 단계 이상 건너뛰지 마라.','파트A: 블록①의 레시피를 이 베이스에 그대로 적용하면 어떤 방향으로 빠지는지 1문장.','파트B: 이 베이스에서 조합을 바꾸면 어떤 색감까지 도달 가능한지 제시. \"이 베이스에서의 최선입니다\"로 마무리.','★ 최적 베이스와 리스크 베이스는 색감에 따라 네가 추론하라. 고정값이 아니다.'].join('\n');



var KNOWLEDGE_V15=['══════════════════════════════','[K] 지식 사전 — 판단 시 참조','══════════════════════════════','','=== [K1] 헤어 컬러의 기본 공식 ===','','헤어컬러 = 언더(사전상태 모발) + 틴트(염모제 염료)','★ 같은 염모제 조합이라도 언더(베이스)에 따라 결과가 완전히 다르다.','- 탈색 후 베이스(멜라닌 제거됨) → 염모제 색이 거의 그대로 발색','- 버진모(멜라닌 가득) → 염모제가 멜라닌과 충돌하여 브라운으로 수렴','','=== [K2] 색의 3속성 / 보색 / 파워 ===','','색상(Hue) / 명도(Value): 레벨 1~20 / 채도(Chroma): 비비드↔덜','1차색: 빨강, 파랑, 노랑 / 2차색: 주황, 보라, 초록','보색: 주황↔블루 / 노랑↔바이올렛 / 빨강↔그린','파워: 노랑(약)→주황→빨강/초록→파랑→보라→검정(강)','- 노랑 잔류 → 바이올렛이 맞다 / 노랑에 블루 → 매트하게 빠진다','- 주황 잔류 → 블루가 맞다 / 난색은 적색 멜라닌과 같은 계열 → 충돌 없이 발색','','=== [K3] 동양인 모발 — 레벨별 언더톤 ===','','5: 적색(검붉은색) / 8~10: 적갈색~주황','12: 주황 — 버진모에서 고명도 염모제+산화제로 도달 가능한 상한. 적색 멜라닌 잔류가 강해 한색은 브라운으로 수렴.','14: 주황~노랑(탈색 1회 도달) — 주황기가 남아있다. 한색 염료→주황기에 소진→브라운 수렴. 수렴이 어울리는 색감은 가능, 투명한 색감은 불가.','16: 노랑 — 바이올렛으로 노랑기 보색 가능. 보라빛이 핵심인 색감은 18+.','18: 연노랑 — 잔류 거의 없음. 염료 그대로 발색. / 20: 아이보리 — 잔류 없음.','','=== [K4] 탈색 횟수→도달 레벨표 ===','','적색→적갈색→주황→주황~노랑→노랑→연노랑→아이보리 순서로 멜라닌이 빠진다.','1회→14(주황~노랑) / 2회 이상→16(노랑) / 3회 이상→18~20(연노랑~아이보리)','탈색 없이: 고명도 염모제+산화제→최대 12레벨까지 리프팅 가능. 그러나 멜라닌이 남아있어 브라운 수렴. 난색은 소진 없이 발색.','','=== [K5] 보색 매칭표 + 파워 매칭 원리 ===','','주황 잔류→블루 소량 / 노랑 잔류→바이올렛 소량 (블루 쓰면 매트!) / 연노랑~아이보리→불필요 / 난색→불필요','★ 보색은 메인 조합에 소량 믹스하여 한 번에 시술.','★ 파워 매칭: 잔류 강→보색도 강(바이올렛,블루). 잔류 약→보색도 약(핑크 컨트롤컬러 극소량,바이올렛 극소량).','예: 연노랑에 바이올렛 충분히→보라빛 남음. 핑크 컨트롤컬러 극소량→백금발 방향.','','=== [K6] 염모제 vs 컨트롤컬러 도구 특성 ===','','■ 염모제: 리프팅+착색 동시. 코르텍스 침투. 명도 높을수록 리프팅력 강함. 버진모에서는 염료 소진→색 표현 한계.','■ 컨트롤컬러: 리프팅 없음. 색만 입힘. 큐티클 쪽. 염료 많음. 버진모에서는 염모제가 리프팅하고 컨트롤컬러가 색 입힘.','■ 탈색모 명도 선택: 고명도(13·15)→염료 적어 약함 / 중명도(9·11)→과하게 들어감 / 파스텔→중명도+클리어 희석.','■ 탈색모 조합 자유도: 18+에서는 염모제+염모제, 염모제+컨트롤컬러 모두 가능.','★ 고명도(13·15레벨) 염모제는 \"리프팅+착색\"이 동시에 필요할 때만 사용한다. 즉 버진모에서 산화제(9%/12%)와 함께 한 번에 시술할 때. 이미 리프팅이 끝난 베이스(12레벨 리프트 후, 탈색 후)에서는 \"착색\"만 필요하므로 일반 염모제로 표기하라. 단, 극고명도(18+) 베이스처럼 염료를 미세하게 조절해야 하는 경우는 예외로 [K7] 참조.','','=== [K7] 극고명도 베이스(18+) 원리 ===','','잔류 거의 없어 염료 그대로 발색. \"미세하게 조절하는\" 접근.','고명도(13·15)=염료 적어 적절. 중명도(9·11)=과함.','백금발/아이스 플래티넘: 고명도(13·15레벨) 뉴트럴브라운 염모제 + 핑크 컨트롤컬러 극소량 + 클리어 희석 + 산화제 많이 희석. 애쉬 메인→회색 빠짐. 극고명도 베이스에서는 염료가 적어도 과할 수 있으므로 10분 간격으로 발색을 체크하며 시술한다.','★ 실버화이트·아이스 플래티넘·차갑고 투명한 블론드 방향에서 바이올렛 컨트롤컬러 극소량을 쓰지 마라. 아무리 소량이라도 보라빛이 들어갈 위험이 있다. 대신 \"고명도 뉴트럴브라운 염모제 + 핑크 컨트롤컬러 극소량 + 클리어 희석 + 산화제 희석\" 조합이 더 안정적이다. 핑크 컨트롤컬러 극소량은 보색 관점에서 노랑기를 미세하게 상쇄하면서도 보라빛이 남지 않는다.','★ 바이올렛 컨트롤컬러는 \"라벤더 베이지\", \"라벤더 애쉬\" 등 보라빛 방향성이 색감명에 있을 때만 쓴다.','잿빛 블론드: 고명도 애쉬로 뉘앙스만. / 파스텔: 중명도+클리어 희석.','','=== [K8] 베이지 계열의 원리 ===','','베이지는 브라운보다 밝고 가벼운 색감이다. 깨끗한 베이스(18레벨 이상)에서 메인 색감 계열을 살짝 입히고, 뉴트럴브라운 염모제를 보조로 더해 베이지 톤을 완성한다.','★ 베이지 조합에서 메인은 항상 색감 계열(애쉬, 핑크, 바이올렛 등)이다. 뉴트럴브라운은 베이지 뉘앙스를 잡아주는 보조 역할이다.','- 애쉬 베이지: 애쉬 염모제가 메인 + 뉴트럴브라운 염모제 보조','- 밀크티 베이지: 뉴트럴브라운 염모제가 메인 + 애쉬 염모제 보조 (밀크티는 브라운 자체가 색감이므로 예외)','- 라벤더 베이지: 바이올렛 염모제가 메인 + 뉴트럴브라운 염모제 보조','- 핑크 베이지 / 로즈 핑크 베이지: 핑크 염모제가 메인 + 뉴트럴브라운 염모제 보조','★ 메인 색감 없이 뉴트럴브라운만 쓰면 베이지가 아니라 브라운으로 빠진다.','','=== [K9] 염모제 계열 체계 ===','','[명도]-[계열] 구조.','계열: NB(갈색) / A(잿빛) / BA(파란빛) / G(초록) / V(보라) / R(빨강) / RV(자주) / P(분홍) / Y(노랑) / O(주황) / K(카키·올리브빛) / AK(애쉬카키·잿빛+올리브빛) / 클리어(희석)','★ \"올리브\"는 계열명이 아니다. 올리브빛 색감은 반드시 K(카키) 또는 AK(애쉬카키) 계열 염모제로 표기하라. \"올리브 염모제\" 금지.','명도: 5~7 저 / 9~11 중 / 13~15 고(리프팅)','★ 레시피에서 고명도 염모제를 언급할 때 \"13레벨\" 또는 \"15레벨\"로 특정하지 마라. 반드시 \"고명도(13·15레벨)\"로 묶어서 표기하라. 제조사마다 명도 체계가 다르다.','컨트롤컬러 종류: 한색(블루,애쉬,그린,바이올렛) / 난색(레드,핑크,바이올렛)','★ 뉴트럴브라운(NB)은 염모제 계열이다. 컨트롤컬러가 아니다.','바이올렛=중성색. 적보라(RV방향)=난색. 청보라=한색. 버진모에서 보라→RV 방향이 현실적.','RV=중성색+붉은기. 순수 레드→빨강일뿐. RV가 보라빛 베이스를 깔고 컨트롤컬러로 최종 뉘앙스.','','=== [K10] 버진모 테크닉 — 원리와 한계 ===','','원리: 고명도 염모제+산화제(9%/12%)→멜라닌 리프팅(최대 12레벨까지)→노랑기 드러남→컨트롤컬러 염료도 노랑기 중화에 소진→브라운 수렴.','절대 한계: 한색→쿨/매트브라운 / 난색→레드/로즈/와인빛 브라운.','★ 버진모 레시피에서 목표 색감명을 따라가면 안 된다. \"라벤더 방향\", \"실버 방향\" 금지.','','한색 조합(고명도 애쉬 기준): +블루 컨트롤컬러→애쉬브라운 / +블루+바이올렛 컨트롤컬러→투명 쿨브라운 / +애쉬 컨트롤컬러→애쉬브라운','AK 기준: +애쉬 컨트롤컬러→올리브 애쉬 브라운(매트+잿빛) / +그린 컨트롤컬러→매트브라운 / 카키 염모제+애쉬 컨트롤컬러→매트애쉬브라운','★ 올리브빛 색감(올리브 애쉬, 올리브 브라운 등)은 AK(애쉬카키) 또는 K(카키) 염모제를 사용하라. \"올리브 염모제\"라는 계열은 없다.','★ 와인빛·퍼플브라운 → 난색(RV) 방향.','','난색 원리: 적색 멜라닌과 충돌 안 함→컨트롤컬러 뉘앙스 살아남. 잔류 브라운이 색감의 일부.','선명한 레드=R메인 / 와인=V메인 / 로즈=V핵심+R보조 / 체리와인=R+V.','','=== [K11] 조합→결과 참고 맵 ===','','참고용. 원리로 추론하되 참고.','■ 연노랑~아이보리(18~20): 뉴트럴브라운+A소량→밀크티 / 뉴트럴브라운+V소량→라벤더베이지 / A+G소량→매트베이지 / A+뉴트럴브라운소량→애쉬베이지 / A단독→애쉬그레이 / A+블루소량→실버애쉬 / V+A소량→라벤더애쉬 / 핑크+클리어→파스텔핑크 / 핑크 컨트롤컬러 극소량+클리어→백금발','■ 노랑(16): V보색 필요. A+V소량→애쉬그레이 / V+A소량→라벤더(애쉬수렴) / 블루+V소량→네이비','■ 주황~노랑(14): 한색으로 투명한 색감 불가. R→레드브라운 / P→로즈브라운 / 블루→스모키애쉬브라운수렴 / AK+그린 컨트롤컬러 소량→올리브애쉬브라운 / BA+애쉬 컨트롤컬러→애쉬브라운','','=== [K12] 주의사항 ===','','라벤더=\"V에 A소량\"이 기본. \"A에 V\"은 애쉬그레이 방향.','밀크티/애쉬 베이지=warm 보여도 한색 조합 필수. 블론드/백모=18+ 필수.','','=== [K13] 경계 색감 — 애쉬브라운·초코브라운 등 ===','','애쉬브라운, 초코브라운, 쿨브라운 등은 버진모~탈색 1회 경계에 있는 색감이다.','사진 속 조명·밝기에 따라 버진모 시술인지, 기염모 재시술인지, 탈색 후 착색인지 구분이 어렵다.','','이런 색감의 시술 루트:','- 루트A(버진모/연모): 고명도(13·15레벨) 애쉬 염모제 + 애쉬 컨트롤컬러 + 산화제(9%/12%) → 시도해볼 만함. 쿨브라운~애쉬브라운으로 수렴.','- 루트B(리프트 후 착색): 고명도 염모제로 12레벨(적갈색~주황) 정도까지만 리프트 후 애쉬 착색 → 효과적. 기염모(8~12레벨 한색 염색 후 퇴색)에서 애쉬 재시술도 같은 원리.','','★ 버진모 톤업 시 고명도 애쉬 + 블루는 비효율적. 고명도 애쉬는 염료가 거의 없는데 블루까지 넣으면 색감을 주기보다 그냥 고명도 쿨브라운일 뿐. 톤업 과정에서는 멜라닌이 벗겨지면서 투명해지는 거지, 블루가 잿빛을 만드는 게 아니다. 버진모 톤업에는 고명도 애쉬 + 애쉬 컨트롤컬러가 맞다.','★ 이미 밝혀진 언더(주황·브라운 베이스)에서의 블루는 다르다. 잔류 주황·브라운을 블루가 억제하면서 스모키한 방향으로 변한다.','★ 14레벨은 주황~노랑 경계 구간이다. 이 베이스에서 블루를 올리면 애쉬·그레이·스모키·매트 중 어디로 빠질지 예측이 어렵다. 애쉬브라운·초코브라운을 노리고 탈색한다면 12레벨(적갈색~주황)에서 멈추는 게 안정적이다.','★ 이런 색감을 \"애쉬 베이지\"로 오판하여 탈색 3회를 추천하지 마라. 베이지와 브라운은 다르다. 브라운 계열 색감에 탈색 3회는 과잉 시술이다.','★ 경계 색감에서 color_name_ko에 \"로즈\", \"라벤더\" 등이 포함되어 있더라도, 이는 적색 멜라닌과 한색 염료가 어우러져 자연 발생하는 뉘앙스다. 고명도 애쉬 + 애쉬 컨트롤컬러로 시술하면 동양인의 적색 멜라닌과 어우러져 미세한 난색 색감이 자연스럽게 표현된다.'].join('\n');

    '자연모에서 탈색 없이 가능한 색감은: 웜브라운, 쿨브라운, 레드/레드브라운, 블랙커런트 정도. 그 외 잿빛·투명감·파스텔이 보이면 전부 탈색 필수.',
    '',

    '투명감+붉은기 없음 → 한색 계열 / 붉은기 선명 → 난색 계열(레드, RV) / 핑크기 → 핑크 계열 / 보라기 → 바이올렛 계열 / 잿빛+투명감 → 애쉬 계열 / 파스텔+연한 → 파스텔 계열',
    '★ 브라운 베이스에 잿빛·쿨톤이 주도하면서 미세한 붉은기·보라기가 감도는 경우 → recipe_direction은 "한색 계열 - 애쉬 베이스"로 잡아라. 미세한 붉은기·보라기는 적색 멜라닌의 자연 효과이므로 조색 방향에 RV/V를 포함하지 마라.',
    '',
    '■ 금지:',
    '레벨 숫자, 시술 방법, 탈색 여부, 영어 전문용어, 헤어스타일/컷 언급',
    '구체적 염모제 조합(예: "애쉬+바이올렛 믹스") — 계열과 방향만',
    '"멜라닌", "중화" 단어',
    '',
    '■ 출력: JSON만',
    '{"color_name_ko":"한국어 색감명","tone":"cool/warm/neutral","hex":"#RRGGBB","elements":["속성"],"recipe_direction":"조색 방향 한 줄","description":"색감 묘사 2~3문장"}',
    '★ color_name_ko는 최대 3단어. 명도 수식어(다크, 밝은)는 색감명에 넣지 말고 description에서 표현하라. 예: "올리브 애쉬 브라운", "실버 애쉬 그레이", "애쉬 베이지", "밀크 베이지", "라벤더 애쉬".'
  ].join('\n');
}

/* QA LOGIC */
var API_URL = '/api/recipe';
var MAX_ITEMS = 10;
var items = [];
var nextId = 1;

function handleBatchUpload(input){
  var files = Array.from(input.files || []);
  if(!files.length) return;
  var remaining = MAX_ITEMS - items.length;
  if(remaining <= 0){ alert('최대 ' + MAX_ITEMS + '장까지 업로드 가능합니다.'); input.value = ''; return; }
  if(files.length > remaining){ alert('최대 ' + MAX_ITEMS + '장까지 가능합니다. ' + remaining + '장만 추가됩니다.'); files = files.slice(0, remaining); }
  var loaded = 0;
  files.forEach(function(file){
    resizeImage(file, function(base64, dataUrl){
      items.push({ id: nextId++, filename: file.name, base64: base64, dataUrl: dataUrl, expectedRoute: '', status: 'pending', step1: null, step2: null, error: null });
      loaded++;
      if(loaded === files.length){ renderGrid(); updateToolbar(); }
    });
  });
  input.value = '';
}

function resizeImage(file, cb){
  var MAX_SIZE = 1600, MAX_BYTES = 1000000, QUALITY_START = 0.9, QUALITY_MIN = 0.7, QUALITY_STEP = 0.05;
  var reader = new FileReader();
  reader.onload = function(e){
    var img = new Image();
    img.onload = function(){
      var w = img.width, h = img.height;
      if(w > MAX_SIZE || h > MAX_SIZE){
        if(w > h){ h = Math.round(h * MAX_SIZE / w); w = MAX_SIZE; }
        else { w = Math.round(w * MAX_SIZE / h); h = MAX_SIZE; }
      }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      var q = QUALITY_START;
      var data = canvas.toDataURL('image/jpeg', q);
      while(data.length * 0.75 > MAX_BYTES && q > QUALITY_MIN){
        q = Math.round((q - QUALITY_STEP) * 100) / 100;
        data = canvas.toDataURL('image/jpeg', q);
      }
      cb(data.split(',')[1], data);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function removeItem(id){ items = items.filter(function(it){ return it.id !== id; }); renderGrid(); updateToolbar(); }
function clearAll(){ if(!items.length) return; if(!confirm('전체 삭제하시겠어요?')) return; items = []; renderGrid(); updateToolbar(); document.getElementById('summaryBar').classList.remove('show'); }
function setExpected(id, value){ var it = items.find(function(x){ return x.id === id; }); if(it) it.expectedRoute = value; updateSummary(); }

function updateToolbar(){
  var info = document.getElementById('infoText');
  var runBtn = document.getElementById('runBtn');
  if(!items.length){ info.textContent = '업로드된 사진 없음'; runBtn.disabled = true; }
  else {
    var pending = items.filter(function(it){ return it.status === 'pending'; }).length;
    info.textContent = items.length + '장 / 대기 ' + pending + '장';
    runBtn.disabled = (pending === 0);
  }
}

async function runAll(){
  var pending = items.filter(function(it){ return it.status === 'pending'; });
  if(!pending.length) return;
  var runBtn = document.getElementById('runBtn');
  runBtn.disabled = true;
  runBtn.textContent = '검수 중...';
  for(var i = 0; i < pending.length; i++){ await runOne(pending[i]); }
  runBtn.textContent = '전체 검수 실행';
  updateToolbar();
  updateSummary();
}

async function runOne(item){
  item.status = 'running';
  renderCard(item.id);
  try {
    var step1 = await callStep1(item.base64);
    item.step1 = step1;
    renderCard(item.id);
    var step2 = await callStep2(step1);
    item.step2 = step2;
    item.status = 'done';
  } catch(e) {
    item.error = e.message || String(e);
    item.status = 'error';
  }
  renderCard(item.id);
}

function callStep1(base64){
  return fetch(API_URL, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 600,
      system: step1SysPrompt(),
      messages: [{ role: 'user', content: [
        {type:'image', source:{type:'base64', media_type:'image/jpeg', data:base64}},
        {type:'text', text:'이 사진 속 모발의 색감을 역공학 분석해줘.'}
      ]}]
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    if(data.error) throw new Error('Step1 API: ' + JSON.stringify(data.error).substring(0,200));
    if(!data.content) throw new Error('Step1: content 없음');
    var txt = data.content.map(function(b){ return b.text||''; }).join('').replace(/```json|```/g,'').trim();
    var m = txt.match(/\{[\s\S]*\}/);
    if(!m) throw new Error('Step1: JSON 못찾음');
    return JSON.parse(m[0]);
  });
}

function callStep2(step1){
  var baseDesc = '자연모/염색모 (동양인, 적색멜라닌 가득, 탈색 이력 없음, 약 5레벨)';
  var sysPrompt = buildStep3Prompt('natural', baseDesc, null);
  var userMsg = [
    '현재 모발: ' + baseDesc,
    'AI 분석 색감: ' + step1.color_name_ko,
    '톤: ' + step1.tone,
    'hex: ' + (step1.hex || ''),
    '색감 속성: ' + (step1.elements ? step1.elements.join(', ') : '없음'),
    '조색 방향: ' + (step1.recipe_direction || ''),
    '색감 설명: ' + step1.description,
    '',
    '이 색감을 현재 모발에서 구현하려면 어떻게 해야 하는지 레시피를 만들어줘.'
  ].join('\n');
  return fetch(API_URL, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 2048,
      system: sysPrompt,
      messages: [{role:'user', content:userMsg}]
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    if(data.error) throw new Error('Step2 API: ' + JSON.stringify(data.error).substring(0,200));
    if(!data.content) throw new Error('Step2: content 없음');
    var txt = data.content.map(function(b){ return b.text||''; }).join('').replace(/```json|```/g,'').trim();
    var m = txt.match(/\{[\s\S]*\}/);
    if(!m) throw new Error('Step2: JSON 못찾음');
    return JSON.parse(m[0]);
  });
}

function extractActualRoute(step2){
  if(!step2 || !step2.summary) return '';
  var s = step2.summary;
  if(s.indexOf('탈색') === -1) return '버진모 가능';
  var m = s.match(/탈색\s*(\d+)\s*회/);
  if(!m) return '탈색 필수';
  var n = parseInt(m[1], 10);
  if(n === 1) return '탈색 1회';
  if(n === 2) return '탈색 2회';
  if(n >= 3) return '탈색 3회 이상';
  return '탈색 필수';
}

function checkMatch(item){
  if(!item.expectedRoute) return 'na';
  if(item.status !== 'done') return 'na';
  var actual = extractActualRoute(item.step2);
  return (actual === item.expectedRoute) ? 'match' : 'miss';
}

function updateSummary(){
  var bar = document.getElementById('summaryBar');
  var tagged = items.filter(function(it){ return it.expectedRoute; });
  var done = tagged.filter(function(it){ return it.status === 'done'; });
  if(!done.length){ bar.classList.remove('show'); return; }
  var match = done.filter(function(it){ return checkMatch(it) === 'match'; }).length;
  var miss = done.length - match;
  bar.innerHTML =
    '<span class="stat">전체 태그됨 <span class="num">' + tagged.length + '</span></span>' +
    '<span class="stat">검수 완료 <span class="num">' + done.length + '</span></span>' +
    '<span class="stat match">일치 <span class="num">' + match + '</span></span>' +
    '<span class="stat miss">불일치 <span class="num">' + miss + '</span></span>';
  bar.classList.add('show');
}

function renderGrid(){
  var grid = document.getElementById('grid');
  if(!items.length){ grid.innerHTML = '<div class="empty">사진을 업로드하면 여기에 카드가 표시됩니다</div>'; return; }
  grid.innerHTML = items.map(function(it){ return cardHTML(it); }).join('');
}

function renderCard(id){
  var item = items.find(function(it){ return it.id === id; });
  if(!item) return;
  var el = document.getElementById('card-' + id);
  if(el){ el.outerHTML = cardHTML(item); } else { renderGrid(); }
}

function cardHTML(item){
  var statusText = {pending:'대기', running:'분석 중...', done:'완료', error:'오류'}[item.status] || '대기';
  var resultHTML = '';
  if(item.step1){
    var elsHtml = (item.step1.elements || []).map(function(e){
      return '<span style="display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;background:#D4B89620;color:#8B7355;margin:1px 2px 1px 0">'+e+'</span>';
    }).join('');
    resultHTML =
      '<div class="result-box show">' +
        '<div class="row"><span class="label">색감명</span><span class="value"><span class="swatch" style="background:'+(item.step1.hex||'#ccc')+'"></span>'+item.step1.color_name_ko+'</span></div>' +
        '<div class="row"><span class="label">톤</span><span class="value">'+item.step1.tone+'</span></div>' +
        '<div class="row"><span class="label">조색 방향</span><span class="value">'+(item.step1.recipe_direction||'—')+'</span></div>' +
        '<div class="row"><span class="label">속성</span><span class="value">'+(elsHtml||'—')+'</span></div>' +
      '</div>';
  }
  var step2HTML = '';
  if(item.step2){
    var tipsHtml = (item.step2.tips||'').replace(/\n/g,'<br>');
    step2HTML =
      '<div class="step2-preview show">' +
        '<div class="summary">'+(item.step2.summary||'')+'</div>' +
        '<div class="tips">'+tipsHtml+'</div>' +
      '</div>';
  }
  var matchHTML = '';
  if(item.status === 'done' && item.expectedRoute){
    var m = checkMatch(item);
    var actual = extractActualRoute(item.step2);
    var label = (m === 'match') ? '✓ 일치 (' + actual + ')' : '✗ 불일치 (실제: ' + actual + ')';
    matchHTML = '<span class="match-badge ' + m + '">' + label + '</span>';
  }
  var errorHTML = '';
  if(item.error){ errorHTML = '<div style="font-size:11px;color:#C0392B;background:#FCE4E4;padding:8px;border-radius:6px;white-space:pre-wrap">'+item.error+'</div>'; }

  return '' +
    '<div class="card" id="card-'+item.id+'">' +
      '<div class="img-wrap">' +
        '<img src="'+item.dataUrl+'" alt=""/>' +
        '<button class="remove-btn" onclick="removeItem('+item.id+')">×</button>' +
      '</div>' +
      '<div class="card-filename">'+item.filename+'</div>' +
      '<select class="expected-select" onchange="setExpected('+item.id+', this.value)">' +
        '<option value="">예상 루트 (선택)</option>' +
        '<option value="버진모 가능"'+(item.expectedRoute==='버진모 가능'?' selected':'')+'>버진모 가능</option>' +
        '<option value="탈색 1회"'+(item.expectedRoute==='탈색 1회'?' selected':'')+'>탈색 1회</option>' +
        '<option value="탈색 2회"'+(item.expectedRoute==='탈색 2회'?' selected':'')+'>탈색 2회</option>' +
        '<option value="탈색 3회 이상"'+(item.expectedRoute==='탈색 3회 이상'?' selected':'')+'>탈색 3회 이상</option>' +
      '</select>' +
      '<div><span class="status '+item.status+'">'+statusText+'</span>'+
        (matchHTML ? ' ' + matchHTML : '')+
      '</div>' +
      resultHTML +
      step2HTML +
      errorHTML +
    '</div>';
}

renderGrid();
updateToolbar();
</script>
