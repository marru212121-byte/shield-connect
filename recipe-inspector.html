<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쉴드 레시피 검수툴</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background: #f6f3ec;
    color: #2a2a2a;
    margin: 0;
    padding: 24px 16px;
    line-height: 1.55;
  }
  .container { max-width: 980px; margin: 0 auto; }
  header { margin-bottom: 20px; padding-left: 4px; }
  h1 { font-size: 22px; font-weight: 700; margin: 0 0 4px 0; letter-spacing: -0.3px; }
  .subtitle { color: #999; font-size: 12px; }
  .card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 14px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .card h2 {
    font-size: 12px;
    font-weight: 700;
    margin: 0 0 14px 0;
    color: #666;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card h2 .count {
    font-size: 11px;
    background: #efece4;
    color: #888;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }
  textarea {
    width: 100%;
    min-height: 180px;
    font-family: "SF Mono", "Menlo", monospace;
    font-size: 12px;
    padding: 12px;
    border: 1px solid #e5e0d5;
    border-radius: 8px;
    resize: vertical;
    background: #fafaf6;
    color: #333;
    line-height: 1.5;
  }
  textarea:focus { outline: none; border-color: #a89878; background: white; }
  .btn-row { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
  .btn {
    padding: 10px 18px;
    background: #2a2a2a;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
  }
  .btn:hover { background: #444; }
  .btn.secondary { background: #e8e4dc; color: #2a2a2a; }
  .btn.secondary:hover { background: #d8d4cc; }
  .summary-row {
    display: grid;
    grid-template-columns: 150px 1fr;
    gap: 14px;
    padding: 8px 0;
    border-bottom: 1px solid #f2efe8;
    font-size: 13px;
    align-items: start;
  }
  .summary-row:last-child { border: none; }
  .summary-label { color: #999; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; padding-top: 2px; }
  .summary-value { word-break: break-word; white-space: pre-wrap; }
  .summary-value.missing { color: #c8554c; font-style: italic; }
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    font-size: 13px;
    border-bottom: 1px solid #f5f2ed;
  }
  .check-item:last-child { border: none; }
  .check-icon {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: white;
    margin-top: 1px;
  }
  .icon-ok { background: #4ba676; }
  .icon-warn { background: #d99a3f; }
  .icon-err { background: #c8554c; }
  .icon-info { background: #9a9a9a; }
  .check-text { flex: 1; }
  .check-rule { color: #888; font-size: 11px; margin-top: 3px; line-height: 1.4; }
  .hidden { display: none; }
  .empty {
    color: #aaa;
    font-size: 13px;
    font-style: italic;
    padding: 8px 0;
  }
  .verdict {
    padding: 14px 16px;
    border-radius: 8px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
    font-weight: 500;
  }
  .verdict-pass { background: #ebf7f0; color: #2d7a4a; }
  .verdict-warn { background: #fdf6e9; color: #8a6d2d; }
  .verdict-fail { background: #fbeeec; color: #9a3e37; }
  .stats { display: flex; gap: 16px; font-size: 12px; margin-top: 6px; }
  .stat { color: #666; }
  .stat-num { font-weight: 700; color: #2a2a2a; }
  .principle-desc {
    background: #fefbf3;
    padding: 10px 14px;
    border-left: 3px solid #c4ab6a;
    font-size: 12px;
    border-radius: 6px;
    margin-bottom: 12px;
    color: #6a5530;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🛡️ 쉴드 레시피 검수툴</h1>
    <div class="subtitle">Phase 3+ 원리 기반 · 가드레일 G0~G6 · 회갈빛브라운 3맥락 체크</div>
  </header>

  <div class="card">
    <h2>📥 출력 JSON 입력</h2>
    <textarea id="jsonInput" placeholder='{"analysis":{...},"recipe":{"recipe_direction":"...","summary":"...","tips":"...","virgin_recipe":null}}

analyzer3.html에서 받은 응답 JSON을 그대로 붙여넣으세요.'></textarea>
    <div class="btn-row">
      <button class="btn" onclick="inspect()">검수 시작</button>
      <button class="btn secondary" onclick="loadExample()">예시 로드 (브라운+잿빛)</button>
      <button class="btn secondary" onclick="loadExample2()">예시 로드 (라벤더 애쉬)</button>
      <button class="btn secondary" onclick="clearAll()">초기화</button>
    </div>
  </div>

  <div id="results" class="hidden">
    <div id="verdict"></div>

    <div class="card">
      <h2>📊 출력 요약</h2>
      <div id="summary"></div>
    </div>

    <div class="card">
      <h2>🛡️ 가드레일 체크 <span class="count" id="gCount"></span></h2>
      <div id="guardrails"></div>
    </div>

    <div class="card">
      <h2>🧪 회갈빛브라운 원리 부합도 <span class="count" id="pCount"></span></h2>
      <div class="principle-desc">
        <b>기능 1</b> 탈색모 고명도 베이지 방향 (밀크·파스텔·로즈 베이지 등) → 고명도 회갈빛브라운 포함<br>
        <b>기능 2</b> 백모 방향 → 고명도 회갈빛브라운이 베이스<br>
        <b>쓰지 마라</b> 버진모 적색 멜라닌 제어 · 라벤더 애쉬 등 채도 색감 · 난색 계열
      </div>
      <div id="principles"></div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   검수 룰 정의 — Phase 3+ 원리 반영
   ═══════════════════════════════════════════════ */

const FORBIDDEN_WORDS = [
  '원샷', '멜라닌', '중화', '깨라', '눌러', '탁한', '탁해진',
  '파우더', '시술자의 판단에 따라', '모발이 건조',
  '올리브 염모제', '연핑크'
];

// 완전 풀네임으로만 써야 하는 약어 (단일문자는 문맥 매칭 어려워 제외)
const ABBREVIATIONS = [
  { short: 'RV', full: '레드바이올렛' },
  { short: 'AK', full: '애쉬카키' },
  { short: 'BA', full: '블루애쉬' },
  { short: 'NB', full: '회갈빛브라운', deprecated: true },
];

// 색감 분류 — 원리 체크용
const BEIGE_COLORS   = ['밀크티 베이지', '밀크 베이지', '파스텔 핑크', '로즈 밀크 베이지', '로즈 베이지', '라벤더 베이지', '애쉬 베이지', '핑크 베이지', '매트 베이지'];
const CHROMA_COLORS  = ['라벤더 애쉬', '애쉬 바이올렛', '애쉬 핑크', '실버 애쉬', '네이비'];
const WARM_COLORS    = ['레드브라운', '로즈브라운', '와인', '체리와인', '블랙커런트', '마호가니', '레드 ', '로즈 '];
const WHITE_COLORS   = ['화이트', '흰색', '순백', '아이스 플래티넘', '백금발'];

let allChecks = [];

function addCheck(container, status, text, rule) {
  allChecks.push({ status, text, rule });
  const iconMap = { ok: '✓', warn: '!', err: '✗', info: 'i' };
  const classMap = { ok: 'icon-ok', warn: 'icon-warn', err: 'icon-err', info: 'icon-info' };
  const html = `
    <div class="check-item">
      <div class="check-icon ${classMap[status]}">${iconMap[status]}</div>
      <div class="check-text">
        <div>${escapeHtml(text)}</div>
        ${rule ? `<div class="check-rule">${escapeHtml(rule)}</div>` : ''}
      </div>
    </div>`;
  container.insertAdjacentHTML('beforeend', html);
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function loadExample() {
  document.getElementById('jsonInput').value = JSON.stringify({
    analysis: {
      color_name_ko: "브라운 베이스 + 잿빛 + 베이지빛",
      tone: "cool",
      hex: "#A8927B",
      elements: ["투명감", "잿빛", "깊이감", "윤기"],
      description: "전체적으로 중간 명도의 브라운을 기반으로 잿빛 뉘앙스가 고르게 분포된 색감입니다. 표면과 끝쪽으로 갈수록 베이지빛이 감돌며 자연스러운 밝기 차이가 생겨 입체감이 느껴집니다. 붉은기나 주황기 없이 차분하고 투명한 인상을 줍니다."
    },
    recipe: {
      recipe_direction: "한색 계열 - 애쉬 베이스에 회갈빛브라운 믹스",
      summary: "탈색 1회 이상 후(주황~노랑 베이스) 애쉬 염모제와 회갈빛브라운 염모제로 착색하세요.",
      tips: "<b>탈색 1회 이상 후(주황~노랑 베이스)</b>\n\n애쉬 염모제 메인에 회갈빛브라운 염모제를 보조로 믹스하면, 붉은기 없는 베이지빛 감도는 쿨브라운으로 마무리됩니다.\n\n<b>버진모 시술</b>\n고명도(13·15레벨) 애쉬 염모제 + 애쉬 컨트롤컬러 + 산화제(9%/12%)로 시도해볼 만하지만, 사진의 잿빛 투명감까지 재현하기는 어렵습니다. 붉은기 억제된 쿨브라운 정도로 수렴됩니다.",
      virgin_recipe: null
    }
  }, null, 2);
}

function loadExample2() {
  document.getElementById('jsonInput').value = JSON.stringify({
    analysis: {
      color_name_ko: "미색 베이스 + 라벤더빛",
      tone: "cool",
      hex: "#C9C0C8",
      elements: ["투명감", "보라기", "파스텔"],
      description: "매우 밝은 미색 베이스에 연한 라벤더 뉘앙스가 감도는 색감입니다. 탈색 이력이 명백하며 깨끗한 베이스 위에 보라빛이 얹혀 있습니다."
    },
    recipe: {
      recipe_direction: "한색 계열 - 바이올렛 베이스에 애쉬 소량",
      summary: "탈색 3회 이상 후(연노랑~아이보리 베이스) 바이올렛 염모제와 애쉬 염모제로 착색하세요.",
      tips: "<b>탈색 3회 이상 후(연노랑~아이보리 베이스)</b>\n\n바이올렛 염모제 메인에 애쉬 염모제를 소량 믹스하면, 투명한 라벤더 애쉬로 연출됩니다.\n\n<b>탈색 2회 이상 후(노랑 베이스)</b>\n노랑기가 남아 보라빛이 흐려질 수 있으며, 라벤더 그레이 방향으로 빠집니다. 이 베이스에서의 최선입니다.\n\n극고명도 색감이므로 탈색 4회를 해야 할 수도 있습니다. 단계적 시술 권장.",
      virgin_recipe: {
        title: "탈색 없이 최대한 연출하려면",
        text: "버진모에서는 보라빛 라벤더 방향 구현이 어렵습니다. 고명도 레드바이올렛 염모제 + 바이올렛 컨트롤컬러 + 산화제(9%/12%)로 와인빛 브라운 정도까지 도달 가능합니다."
      }
    }
  }, null, 2);
}

function clearAll() {
  document.getElementById('jsonInput').value = '';
  document.getElementById('results').classList.add('hidden');
}

function inspect() {
  const raw = document.getElementById('jsonInput').value.trim();
  if (!raw) { alert('JSON을 입력하세요'); return; }

  let data;
  try {
    data = JSON.parse(raw);
  } catch(e) {
    alert('JSON 파싱 실패: ' + e.message);
    return;
  }

  allChecks = [];
  const results = document.getElementById('results');
  results.classList.remove('hidden');

  renderSummary(data);
  renderGuardrails(data);
  renderPrinciples(data);
  renderVerdict();
  
  results.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderSummary(data) {
  const container = document.getElementById('summary');
  container.innerHTML = '';
  const a = data.analysis || {};
  const r = data.recipe || {};
  const rows = [
    ['color_name_ko', a.color_name_ko],
    ['tone', a.tone],
    ['elements', Array.isArray(a.elements) ? a.elements.join(', ') : a.elements],
    ['description', a.description],
    ['recipe_direction', r.recipe_direction],
    ['summary', r.summary],
    ['tips', r.tips],
    ['virgin_recipe', r.virgin_recipe ? (typeof r.virgin_recipe === 'object' ? `${r.virgin_recipe.title || ''}\n${r.virgin_recipe.text || ''}` : r.virgin_recipe) : 'null']
  ];
  for (const [k, v] of rows) {
    const isMissing = v === undefined || v === null || v === '';
    const val = isMissing ? '(누락)' : String(v);
    container.insertAdjacentHTML('beforeend',
      `<div class="summary-row">
        <div class="summary-label">${k}</div>
        <div class="summary-value ${isMissing ? 'missing' : ''}">${escapeHtml(val)}</div>
      </div>`);
  }
}

function renderGuardrails(data) {
  const c = document.getElementById('guardrails');
  c.innerHTML = '';
  const gStart = allChecks.length;

  const r = data.recipe || {};
  const a = data.analysis || {};
  const fullText = [r.recipe_direction, r.summary, r.tips,
    r.virgin_recipe?.title, r.virgin_recipe?.text].filter(Boolean).join(' ');

  // G0: recipe 4개 키
  const requiredKeys = ['recipe_direction', 'summary', 'tips', 'virgin_recipe'];
  const missing = requiredKeys.filter(k => !(k in r));
  if (missing.length === 0) {
    addCheck(c, 'ok', 'G0: recipe 4개 키 모두 존재');
  } else {
    addCheck(c, 'err', `G0: recipe 키 누락 — ${missing.join(', ')}`);
  }

  // G1: 약어 사용
  const abbrFound = [];
  for (const ab of ABBREVIATIONS) {
    const re = new RegExp('(?<![A-Za-z가-힣])' + ab.short + '(?![A-Za-z])', 'g');
    const matches = fullText.match(re);
    if (matches && matches.length > 0) {
      abbrFound.push(`${ab.short}${ab.deprecated ? ' (삭제된 약어!)' : ''} × ${matches.length}`);
    }
  }
  if (abbrFound.length > 0) {
    addCheck(c, 'err', `G1: 약어 사용 검출 — ${abbrFound.join(', ')}`, '출력은 반드시 풀네임으로 (예: RV → 레드바이올렛)');
  } else {
    addCheck(c, 'ok', 'G1: 약어 사용 없음 (풀네임 표기 OK)');
  }

  // G1: "고명도(13·15레벨)" 묶음 표기
  const has13or15alone = /(?<![·(])(?:1[35]레벨)(?!\))/.test(fullText);
  if (has13or15alone) {
    addCheck(c, 'warn', 'G1: "13레벨" 또는 "15레벨" 단독 표기 검출', '"고명도(13·15레벨)"로 묶어서 표기');
  }

  // G1: 탈색모 착색에 명도 세분화 금지
  const hasDetailedLevel = /(저명도|중명도|9·11레벨)/.test(fullText);
  const isBleached = /탈색 \d회/.test(r.summary || '');
  if (hasDetailedLevel && isBleached) {
    addCheck(c, 'err', 'G1: 탈색모 레시피에 명도 세분화 표기 검출 (저명도/중명도/9·11레벨)', '탈색모는 "○○ 염모제"로만');
  }

  // G2: 조합 수 (대강 추정 — 염모제/컨트롤컬러 키워드 카운트)
  // 생략 — 정확도 어려움

  // G4: 금지어
  const foundForbidden = FORBIDDEN_WORDS.filter(w => fullText.includes(w));
  if (foundForbidden.length > 0) {
    addCheck(c, 'err', `G4: 금지어 검출 — ${foundForbidden.map(w => `"${w}"`).join(', ')}`);
  } else {
    addCheck(c, 'ok', 'G4: 금지어 없음');
  }

  // G4: 구체적 비율
  const ratio = fullText.match(/\d+\s*:\s*\d+/);
  if (ratio) {
    addCheck(c, 'err', `G4: 구체적 비율 표기 검출 — "${ratio[0]}"`, '"소량", "많이 희석" 등 정성적 표현만');
  }

  // G4: "CC" 약어
  if (/\bCC\b/.test(fullText)) {
    addCheck(c, 'err', 'G4: "CC" 약어 검출', '"컨트롤컬러"로 풀네임 표기');
  }

  // G5: 블록당 길이
  if (r.tips) {
    const blocks = r.tips.split(/\n\n/).filter(b => b.trim());
    blocks.forEach((b, i) => {
      const cleanB = b.replace(/<[^>]+>/g, '');
      const sentences = cleanB.split(/[.!?。]\s*/).filter(s => s.trim().length > 10);
      if (sentences.length > 3) {
        addCheck(c, 'warn', `G5: 블록 ${i+1}의 문장 수 ${sentences.length}개`, '블록당 1~2문장, 최대 3문장');
      }
    });
  }

  // G6: 백모 고정 3조합
  const colorText = (a.color_name_ko || '') + ' ' + (a.description || '');
  const isWhite = WHITE_COLORS.some(w => colorText.includes(w));
  if (isWhite) {
    if (/애쉬.{0,10}(?:\+|과|와).{0,10}블루|블루.{0,10}(?:\+|과|와).{0,10}애쉬/.test(fullText)) {
      addCheck(c, 'err', 'G6 백모: "애쉬 + 블루" 조합 검출', '백모는 A/B/C 고정 3조합만. "애쉬+블루"는 실버·실버애쉬용');
    }
    if (/바이올렛\s*컨트롤컬러/.test(fullText)) {
      addCheck(c, 'err', 'G6 백모: "바이올렛 컨트롤컬러" 검출', '백모에 바이올렛은 "염모제"여야 (B안)');
    }
    if (/회갈빛브라운/.test(fullText)) {
      addCheck(c, 'ok', 'G6 백모: 회갈빛브라운 포함 (A/B/C 원리 부합)');
    } else {
      addCheck(c, 'warn', 'G6 백모: 회갈빛브라운 누락', 'A/B/C 세 조합 모두 고명도 회갈빛브라운이 베이스');
    }
  }

  if (allChecks.slice(gStart).length === 0) {
    c.innerHTML = '<div class="empty">체크 항목 없음</div>';
  }
  document.getElementById('gCount').textContent = allChecks.slice(gStart).length + '개';
}

function renderPrinciples(data) {
  const c = document.getElementById('principles');
  c.innerHTML = '';
  const pStart = allChecks.length;

  const r = data.recipe || {};
  const a = data.analysis || {};
  const fullText = [r.recipe_direction, r.summary, r.tips,
    r.virgin_recipe?.title, r.virgin_recipe?.text].filter(Boolean).join(' ');
  const colorText = (a.color_name_ko || '') + ' ' + (a.description || '') + ' ' + (r.recipe_direction || '');

  const hasNB = /회갈빛브라운/.test(fullText);

  // 채도 색감(라벤더 애쉬 등)에 회갈빛브라운 → 부적절
  const chromaDetected = CHROMA_COLORS.filter(c => colorText.includes(c));
  if (chromaDetected.length > 0) {
    if (hasNB) {
      addCheck(c, 'err', `채도 색감(${chromaDetected.join(', ')})에 회갈빛브라운 사용됨`, 'C-5 원리 3: "베이지성 없는 채도 색감에 회갈빛브라운 넣지 마라 — 채도 흐려져 밀크티 방향으로 빠짐"');
    } else {
      addCheck(c, 'ok', `채도 색감(${chromaDetected.join(', ')}) — 회갈빛브라운 미사용 (원리 부합)`);
    }
  }

  // 난색 계열에 회갈빛브라운 → 부적절
  const warmDetected = WARM_COLORS.filter(w => colorText.includes(w.trim()));
  if (warmDetected.length > 0) {
    if (hasNB) {
      addCheck(c, 'warn', `난색 계열(${warmDetected.join(', ')})에 회갈빛브라운 사용됨`, 'C-4 원리: "난색 계열에 쓰지 마라 — 깊은 브라운·난색 브라운으로 자연 수렴"');
    } else {
      addCheck(c, 'ok', `난색 계열(${warmDetected.join(', ')}) — 회갈빛브라운 미사용 (원리 부합)`);
    }
  }

  // 베이지성 색감인데 회갈빛브라운 없음 → 주의
  const beigeDetected = BEIGE_COLORS.filter(b => colorText.includes(b));
  if (beigeDetected.length > 0) {
    if (hasNB) {
      addCheck(c, 'ok', `베이지성 색감(${beigeDetected.join(', ')}) — 회갈빛브라운 포함 (원리 부합)`);
    } else {
      addCheck(c, 'warn', `베이지성 색감(${beigeDetected.join(', ')})인데 회갈빛브라운 누락`, 'C-4 기능 1: 베이지 뉘앙스 구현에 고명도 회갈빛브라운 필요');
    }
  }

  // 버진모 전용 체크
  const isVirginOnly = /버진모/.test(r.summary || '') && r.virgin_recipe === null;
  if (isVirginOnly) {
    if (/회갈빛브라운.{0,5}(염모제)?.{0,3}메인/.test(fullText)) {
      addCheck(c, 'err', '버진모 시술에 회갈빛브라운이 "메인"으로 사용됨', 'C-4: "버진모 적색 멜라닌·주황기 제어에 쓰지 마라 — 애쉬 염모제 + 블루/그린 컨트롤컬러의 역할"');
    }
    if (!/고명도\(13·15레벨\)/.test(fullText)) {
      addCheck(c, 'warn', '버진모 시술에 "고명도(13·15레벨)" 표기 누락', 'C-4 버진모는 고명도 염모제 + 산화제(9%/12%) 원칙');
    }
  }

  // G3: elements 단어를 recipe_direction에 가져다 쓰기
  const elements = Array.isArray(a.elements) ? a.elements : [];
  const directionText = r.recipe_direction || '';
  const elBad = ['황금빛', '매트함', '투명감', '윤기', '깊이감'];
  for (const el of elements) {
    if (directionText.includes(el) && elBad.includes(el)) {
      addCheck(c, 'warn', `recipe_direction에 elements 단어 "${el}" 사용`, 'G3: 결과 색감명에 elements(매트함·황금빛 등) 가져다 쓰지 마라 — 조합 계열에서 도출');
    }
  }

  // "올리브" 단어 사용시 계열 체크
  if (/올리브/.test(fullText) && !/카키|애쉬카키/.test(fullText)) {
    addCheck(c, 'warn', '"올리브" 단어 사용되었으나 카키·애쉬카키 계열 염모제 표기 없음', 'C-3: "올리브"는 계열명 아님. 반드시 K(카키) 또는 AK(애쉬카키)로');
  }

  if (allChecks.slice(pStart).length === 0) {
    addCheck(c, 'info', '특별한 원리 위반 감지 없음 — 수동 검수로 최종 확인 권장');
  }
  document.getElementById('pCount').textContent = allChecks.slice(pStart).length + '개';
}

function renderVerdict() {
  const v = document.getElementById('verdict');
  const errs = allChecks.filter(x => x.status === 'err').length;
  const warns = allChecks.filter(x => x.status === 'warn').length;
  const oks = allChecks.filter(x => x.status === 'ok').length;

  let cls, text;
  if (errs > 0) {
    cls = 'verdict-fail';
    text = `❌ 치명적 위반 ${errs}건 — 프롬프트 재검토 필요`;
  } else if (warns > 0) {
    cls = 'verdict-warn';
    text = `⚠️ 경고 ${warns}건 — 수동 확인 권장`;
  } else {
    cls = 'verdict-pass';
    text = `✅ 모든 자동 체크 통과 — 최종 수동 검수로 확정`;
  }

  v.innerHTML = `
    <div class="verdict ${cls}">
      <div style="flex:1">
        <div>${text}</div>
        <div class="stats">
          <div class="stat">통과 <span class="stat-num">${oks}</span></div>
          <div class="stat">경고 <span class="stat-num">${warns}</span></div>
          <div class="stat">위반 <span class="stat-num">${errs}</span></div>
        </div>
      </div>
    </div>`;
}
</script>
</body>
</html>
