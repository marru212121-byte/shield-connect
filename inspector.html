<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>쉴드 검수툴</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Noto Sans KR',sans-serif;background:#FAFAF7;color:#1C1917;min-height:100dvh}
body{padding:20px 16px 40px;max-width:960px;margin:0 auto}
input,textarea,button,select{font-family:inherit;font-size:14px}

/* 헤더 */
.header{margin-bottom:16px}
.header h1{font-size:18px;font-weight:800;letter-spacing:-0.3px}
.header .sub{font-size:12px;color:#A8A29E;margin-top:4px}

/* 공통 카드 */
.card{background:#fff;border:1.5px solid #e8e4df;border-radius:14px;padding:16px;margin-bottom:12px}

/* 업로드 */
.upload-zone{border:2px dashed #d5cfc7;border-radius:12px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .15s;background:#FAF8F4}
.upload-zone:hover,.upload-zone.dragover{border-color:#C4A97A;background:#D4B89610}
.upload-zone .icon{font-size:24px;margin-bottom:8px}
.upload-zone .main{font-size:13px;font-weight:600;color:#6B5D4E}
.upload-zone .sub{font-size:11px;color:#A8A29E;margin-top:4px}

/* 파일 리스트 (업로드 완료 썸네일) */
.file-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px;margin-top:12px}
.file-list:empty{display:none}
.file-item{position:relative;border-radius:10px;overflow:hidden;aspect-ratio:1;background:#F5F2EC}
.file-item img{width:100%;height:100%;object-fit:cover;display:block}
.file-item .thumb-loading{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#A8A29E;font-size:11px}
.file-item .remove{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;border:none;background:rgba(28,25,23,0.7);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.file-item .remove:hover{background:rgba(28,25,23,0.9)}

/* 실행 버튼 */
.run-bar{display:flex;gap:8px;margin-top:12px}
.run-btn{flex:1;padding:14px;border-radius:12px;border:none;background:#1C1917;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.run-btn:disabled{opacity:0.35;cursor:not-allowed}
.run-btn:not(:disabled):hover{opacity:0.88}
.clear-btn{padding:14px 16px;border-radius:12px;border:1.5px solid #e8e4df;background:#fff;color:#A8A29E;font-weight:600;cursor:pointer}
.clear-btn:hover{color:#1C1917}

/* 결과 카드 */
.results{margin-top:16px}
.result-card{background:#fff;border:1.5px solid #e8e4df;border-radius:14px;padding:0;margin-bottom:12px;overflow:hidden}

.card-head{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #f0ece6;background:#FAFAF7}
.card-head .idx{font-size:12px;font-weight:800;color:#8B7355;min-width:24px}
.card-head .fname{flex:1;font-size:12px;color:#6B5D4E;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-head .status{font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;flex-shrink:0}
.status.pending{background:#F5F2EC;color:#A8A29E}
.status.processing{background:#FFF4E0;color:#C4873A}
.status.done{background:#E8F3E8;color:#5B8A5A}
.status.error{background:#FCE9E6;color:#C4594D}

.card-body{display:grid;grid-template-columns:180px 1fr;gap:14px;padding:14px}
@media(max-width:640px){.card-body{grid-template-columns:1fr}}
.photo img{width:100%;border-radius:10px;display:block;aspect-ratio:1;object-fit:cover}
.content{min-width:0}

.result-sec{margin-bottom:14px}
.result-sec:last-child{margin-bottom:0}
.sec-title{font-size:10px;font-weight:800;color:#8B7355;letter-spacing:0.8px;margin-bottom:6px;text-transform:uppercase}

.swatch-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.swatch{width:32px;height:32px;border-radius:8px;border:1.5px solid rgba(0,0,0,0.08);flex-shrink:0}
.swatch-row .name{font-size:14px;font-weight:700;color:#1C1917;line-height:1.3}
.swatch-row .tone{font-size:11px;color:#A8A29E;margin-top:2px;font-family:ui-monospace,monospace}

.desc{font-size:12px;color:#6B5D4E;line-height:1.65;margin-bottom:6px}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;background:#D4B89618;color:#8B7355}

.rdir{font-size:12px;font-weight:700;color:#1C1917;padding:8px 10px;background:#F5EDE2;border-radius:8px;margin-bottom:6px}
.summary{font-size:12px;color:#6B5D4E;line-height:1.65;margin-bottom:6px;padding:8px 0;border-bottom:1px dashed #e8e4df}
.tips{font-size:12px;color:#6B5D4E;line-height:1.85;white-space:pre-line}
.tips b{color:#1C1917;font-weight:700;font-size:12.5px;display:inline-block;margin-top:2px}

.virgin-box{margin-top:8px;padding:10px 12px;border-radius:8px;background:#FAF6F0;border:1px solid #EDE6DA}
.virgin-title{font-size:10px;font-weight:800;color:#8B7355;margin-bottom:4px;letter-spacing:0.5px;text-transform:uppercase}
.virgin-box>div:last-child{font-size:12px;color:#6B5D4E;line-height:1.7}

.error-body{padding:14px;background:#FCE9E6;color:#A04335;font-size:12px;border-radius:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.retry{margin-left:auto;padding:6px 12px;border-radius:6px;border:none;background:#C4594D;color:#fff;font-size:11px;font-weight:700;cursor:pointer}
.pending-body{padding:20px;color:#A8A29E;font-size:12px;text-align:center}

.raw{margin-top:10px}
.raw summary{font-size:10px;font-weight:700;color:#A8A29E;cursor:pointer;padding:6px 0;letter-spacing:0.5px;text-transform:uppercase}
.raw summary:hover{color:#6B5D4E}
.raw pre{font-size:10px;background:#F5F2EC;padding:10px;border-radius:6px;overflow-x:auto;color:#6B5D4E;line-height:1.5;max-height:300px;overflow-y:auto}

/* 카드 푸터 — 플래그·메모 */
.card-foot{padding:12px 14px;border-top:1px solid #f0ece6;background:#FAFAF7}
.flags{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.flag{padding:6px 12px;border-radius:8px;border:1.5px solid #e8e4df;background:#fff;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.flag:hover{border-color:#d5cfc7}
.flag.flag-ok.active{background:#E8F3E8;border-color:#5B8A5A;color:#3E6B3E}
.flag.flag-problem.active{background:#FCE9E6;border-color:#C4594D;color:#8B3E33}
.flag.flag-maybe.active{background:#FFF4E0;border-color:#C4873A;color:#8B5F29}
.memo{width:100%;padding:8px 10px;border-radius:8px;border:1.5px solid #e8e4df;background:#fff;resize:vertical;min-height:48px;font-size:12px;color:#1C1917;line-height:1.5;outline:none;transition:border-color .15s}
.memo:focus{border-color:#C4A97A}
.memo::placeholder{color:#C8C0B5}

/* Export 바 */
.export-bar{position:sticky;bottom:0;background:rgba(250,250,247,0.95);backdrop-filter:blur(10px);padding:12px 14px;margin:16px -16px -40px;border-top:1.5px solid #e8e4df;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.export-bar[hidden]{display:none}
.stats{flex:1;font-size:11px;color:#6B5D4E;font-weight:600}
.export-btn{padding:10px 16px;border-radius:10px;border:none;background:#8B7355;color:#fff;font-size:12px;font-weight:700;cursor:pointer}
.export-btn:hover{background:#6B5D4E}

/* 스피너 */
.spin{display:inline-block;width:11px;height:11px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}

/* 안내 */
.hint{font-size:11px;color:#A8A29E;line-height:1.65;margin-top:10px}
.hint code{background:#F5F2EC;padding:1px 5px;border-radius:3px;font-family:ui-monospace,monospace}
</style>
</head>
<body>

<div class="header">
  <h1>쉴드 검수툴</h1>
  <div class="sub">현재 프로덕션 프롬프트로 최대 10장 일괄 분석 · 플래그·메모 후 JSON 저장</div>
</div>

<div class="card">
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" multiple accept="image/*" hidden>
    <div class="icon">📷</div>
    <div class="main">사진 업로드 (클릭 또는 드래그)</div>
    <div class="sub">최대 10장 · 자동 리사이즈</div>
  </div>

  <div class="file-list" id="fileList"></div>

  <div class="run-bar" id="runBar" style="display:none">
    <button class="run-btn" id="runBtn" disabled>분석 시작</button>
    <button class="clear-btn" id="clearBtn" title="전부 비우기">비우기</button>
  </div>

  <div class="hint">
    API 엔드포인트: <code>/api/recipe</code> · 프롬프트: analyzer.html 기준 최신 · 재시도 최대 3회 · 동시 3장까지 처리
  </div>
</div>

<div class="results" id="results"></div>

<div class="export-bar" id="exportBar" hidden>
  <div class="stats" id="stats"></div>
  <button class="export-btn" id="exportBtn">결과 JSON 저장</button>
</div>

<script>
/* ══════════════════════════════════════════════════════════
   아래 블록은 analyzer.html에서 verbatim 복사 — 수정 금지.
   프로덕션과 100% 동일한 프롬프트를 보장.
══════════════════════════════════════════════════════════ */
var API_URL = '/api/recipe';

/* ══════════════════════════════════════════════════════════
   STEP 3 프롬프트 v15 — 4레이어 재구조화
   [0] 역할+사고순서 → [D] 판단절차 → [K] 지식 → [O] 출력 → [G] 가드레일

function buildTopInstruction(tp,bd){return['너는 15년차 동양인 모발 전문 컬러리스트야.','분석 파트의 관찰 서술과 사진을 보고, 동양인 모발에서 이 색감을 구현하려면 어떻게 해야 하는지 역추론해.','','════════════════════════════════════════','■ 사진 우선 원칙 (최우선 — 반드시 준수)','════════════════════════════════════════','★ 사진이 주 입력이다. 사진에서 실제 색감·뉘앙스·강도·베이스 명도를 직접 관찰하라.','★ 분석 파트의 관찰 서술(color_name_ko, description, elements, tone, hex)은 "관찰 요약"이다. 사진과 함께 종합적으로 참고하라.','★ [C] 지식은 사진 관찰 결과를 레시피로 번역할 때 호출하는 참조 도구다.','★ 판단 우선순위: 사진 + [C] 지식 (동등) > 분석 파트 관찰 서술.','  관찰 서술이 사진과 다르면 사진을 기준으로 삼아라.','','════════════════════════════════════════','■ 출력 규칙 (절대 규칙 — 최우선)','════════════════════════════════════════','★★★ 너의 응답은 오직 JSON 객체 하나여야 한다. ★★★','- JSON 외에 어떤 텍스트도 출력하지 마라.','- 사고 과정(①②③, -, 단계 번호, "먼저~", "다음으로~") 출력 절대 금지.','- 설명·인사말·전제·결론 멘트 금지.','- ```json 같은 코드 블록 마크다운 금지.','- 첫 글자는 {, 마지막 글자는 }여야 한다.','','■ 내부 사고 순서 (머릿속으로만, 절대 출력하지 마라):','1) 사진 관찰: 베이스 명도·주도 색감·뉘앙스 강도·매트·투명감·올리브·로즈 등 직접 확인','2) 분석 파트 참고: 관찰 서술(color_name_ko)과 description으로 사진 해석 보조','3) 조색 방향 결정: [C] 지식으로 한색/난색, 필요 계열 판단 → recipe_direction 생성','4) 탈색 필요 여부: [D1] 판단으로 "버진모 가능 vs 탈색 필수" 결정','5) 필요 베이스 레벨: [D2] 판단으로 탈색 회차 결정','6) 염모제 조합: [D3] 판단 + [C] 지식 참조','7) 대안 베이스: [D4] 판단 (탈색 1회·버진모 가능이면 스킵)','8) [O] 출력 규칙에 맞춰 JSON 조립, [G] 가드레일 체크','','★ 위 8단계는 네가 내부적으로 추론하는 절차일 뿐, 출력물이 아니다. 출력은 오직 JSON.'].join('\n');}
var DECISION_NATURAL=['══════════════════════════════','[D] 판단 절차 — 자연모','══════════════════════════════','','=== [D1] 탈색 필요 여부 ===','','■ 핵심 질문: "이 색감은 버진모(5레벨, 적색 멜라닌 가득)에서 가능한가?"','','버진모에서 가능한 색감:','- 한색 방향 → 쿨브라운, 매트브라운, 애쉬브라운, 초코브라운 등 (브라운으로 수렴되는 결과가 곧 색감)','- 난색 방향 → 레드브라운, 로즈브라운, 와인빛 브라운, 블랙커런트 (적색 멜라닌과 같은 계열)','★ 애쉬브라운·초코브라운·쿨브라운 등 브라운 계열은 대부분 버진모 고산화제 리프팅으로 충분하다. [C-8] 참조.','','탈색 필수인 색감:','- 투명감 + 선명함이 동시에 필요한 색감','- 잿빛·무채색이 투명하게 발색되어야 하는 색감 (브라운기 없이 무채색만 보이는 경우)','- 파스텔, 블론드, 베이지 등 가벼운 색감','- 올리브·카키 계열(애쉬카키/카키 염모제 필요) — 버진모의 적색 멜라닌이 올리브감을 방해한다. 탈색 1회 필수.','','★ 사진이 어둡게 보여도 잿빛·투명감·매트함이 보이면 → 탈색이 필요한 색감이다. "다크"라고 해서 자연모에서 바로 가능한 게 아님.','★ 자연모에서 탈색 없이 가능한 색감은: 웜브라운, 쿨브라운, 레드/레드브라운, 블랙커런트 정도. 그 외 잿빛·투명감·파스텔이 보이면 전부 탈색 필수.','★ 한색 계열에서 브라운기 없이 무채색(잿빛·회색·블루)이 투명하게 발색되어 있으면 → 탈색 후 입힌 색감이다. 동양인 버진모의 적색 멜라닌으로는 이런 무채색 투명 발색이 나올 수 없다.','★ 체감 명도가 낮다고 탈색 횟수를 줄이지 마라. 탈색 횟수는 "이 색감을 만들려면 어떤 베이스가 필요한가"로 판단하라.','','버진모에 한색 염모제를 올리면 왜 브라운으로 수렴하는가:','- 고명도 염모제가 적색 멜라닌을 어느 정도 깨면서 리프팅','- 깨진 자리에 노랑기가 드러남','- 염모제의 염료가 이 노랑기를 중화하는 데 소진됨','- 결국 색감 표현에 쓸 염료가 부족 → 적빛 없는 브라운으로 수렴','','난색(레드, 핑크)은 적색 멜라닌과 같은 계열이라 소진 없이 발색.','','→ 버진모 가능이면 [D3]으로. 탈색 필수이면 [D2]로.','','=== [D2] 필요 베이스 레벨 결정 ===','','■ 핵심 질문: "잔류 색소가 이 색감에서 활용되는가, 방해되는가?"','','■ 1회 vs 2회 — 주황기·브라운이 방해되는가:','탈색 1회(주황~노랑 14레벨 베이스)로 충분한 색감: 잔류 주황기·브라운이 색감의 일부로 활용되는 한색. 매트 애쉬, 올리브 애쉬, 애쉬 브라운, 카키 브라운 등.','탈색 2회(노랑 16레벨 베이스) 필요한 색감: 잔류 주황기·브라운이 색감을 오염시키는 한색. 애쉬 그레이, 네이비 등.','★ 같은 계열명이라도 투명감·파스텔이 동반되면 잔류 색소가 방해된다. 판단 기준은 계열명이 아니라 "브라운기가 남아도 되는가"이다.','','■ 2회 vs 3회 — 노랑기가 방해되는가:','탈색 2회(노랑 16레벨 베이스)로 충분한 색감: 노랑기가 보색(바이올렛)으로 잡히면서 색감에 녹아드는 경우. 애쉬 그레이, 네이비 등.','탈색 3회 이상 필요한 색감(18~20 미색 베이스): 노랑기조차 색감을 오염시키는 경우. 파스텔, 실버, 밀크티 베이지, 라벤더 애쉬 등.','','→ 베이스 레벨이 결정되면 [D3]으로.','','=== [D3] 염모제 조합 추론 ===','','■ 추론 순서:','1. 보색 결정 → [C-2] 레벨별 언더톤·보색 매칭 참조.','2. 메인 염모제 계열 → 관찰 서술과 recipe_direction 중심으로. [C-3], [C-5] 참조.','3. 뉘앙스 보조 → 컨트롤컬러 또는 보조 염모제로 미세 조절.','','★ 극고명도 색감(블론드, 백금발, 화이트 등)에서는 [C-5] 18~20 미색 / 백모 원리를 우선 적용하라.','블론드의 핵심은 염료 최소화이다. 애쉬를 메인으로 쓰면 회색이 되지 블론드가 아니다.','','→ 조합이 결정되면 [D4]로.','','=== [D4] 대안 베이스 수렴 추론 ===','','★ 탈색 1회이거나 버진모 가능이면 D4는 실행하지 마라. 탈색 2회 이상일 때만 실행.','','최적 베이스보다 한 단계 아래 레벨에서의 수렴 방향을 추론한다.','"한 단계 아래"는 [C-2] 레벨 체계에서 바로 다음 단계. 예: 18→16, 16→14. 두 단계 이상 건너뛰지 마라.','파트A: 블록①의 레시피를 이 베이스에 그대로 적용하면 어떤 방향으로 빠지는지 1문장.','파트B: 이 베이스에서 조합을 바꾸면 어떤 색감까지 도달 가능한지 제시. "이 베이스에서의 최선입니다"로 마무리.','★ 최적 베이스와 리스크 베이스는 색감에 따라 네가 추론하라. 고정값이 아니다.'].join('\n');



var KNOWLEDGE_V15=['══════════════════════════════','[C] 지식 사전 — 카테고리별 참조','══════════════════════════════','','=== [C-0] 미용 기본 이론 — 모발 구조·염모 원리 ===','','(C-1~C-8의 모든 실무 지식은 이 이론적 기반 위에 세워진다.)','','■ 모발 3층 구조:','- 큐티클 (모표피, 10~15%): 가장 바깥층. 물고기 비늘처럼 4~8장 겹침. pH 4.5~5.5 약산성일 때 단단히 닫힘. 광택·보호.','- 코르텍스 (모피질, 80~90%): 가장 중요한 층. 멜라닌 색소가 들어있고, 색상·탄력·강도를 결정. 염모제·파마제·탈색제가 주로 작용하는 곳.','- 메듈라 (모수질, 0~10%): 중심부 공기층. 보온·강도 보조. 가는 모발엔 거의 없음.','','■ 멜라닌 두 종류 (코르텍스에 존재):','- 유멜라닌 (Eumelanin): 검정·갈색 색소. 동양인 흑발의 주성분. 산화에 약해 탈색에서 먼저 분해됨.','- 페오멜라닌 (Pheomelanin, 적색 멜라닌): 빨강·노랑·주황 색소. 산화 저항성이 강해 나중까지 남음.','','★ 이 저항성 차이가 "동양인 모발 탈색 시 붉은기가 먼저 올라오고, 노랑기까지 가려면 더 깨야 하는" 근본 이유다.','★ 이 저항성은 C-5 버진모 한색 한계(쿨브라운이 최선)와 C-7 애쉬+적색 멜라닌 자연 반응의 근본 원인이기도 하다.','★ 이 저항성이 "밝은 애쉬·베이지·플래티넘 색감 구현에 탈색 3회 이상이 필요한" 이유이기도 하다. 페오멜라닌을 충분히 깨야 한색 염료가 왜곡 없이 발색된다.','','■ 염모제(산화염모제)의 3단계 작용:','','1) 알칼리제 (암모니아·MEA): 모발을 약알칼리성(pH 9~10)으로 만들어 큐티클을 열고 팽윤시킨다. 염료와 과산화수소가 코르텍스까지 침투할 수 있게 하는 통로 역할.','','2) 과산화수소 (H₂O₂, 산화제): 발생기 산소를 만들어 두 가지 일을 동시에 수행 —','  (a) 천연 멜라닌을 분해 → 밝게 만듦 (리프팅)','  (b) 염료 중간체를 산화 → 고분자 색소로 중합','','3) 염료 중간체: 작은 분자 상태로 큐티클 통과 → 코르텍스 안에서 산화 중합 → 커진 색소 분자가 큐티클 밖으로 못 빠져나와 영구 착색.','','한 줄 요약:','알칼리제 → 큐티클 연다 / 과산화수소 → 멜라닌 분해 + 염료 산화 / 염료 → 코르텍스 안에서 중합 → 영구색상.','','■ 염모제 vs 컨트롤컬러 — 작용 위치와 의미:','','- 염모제: 코르텍스 침투. 리프팅+착색 동시. 영구색상. 모발 내부에서 반응.','- 컨트롤컬러: 큐티클 흡착. 리프팅 없음. 염료만 다량 함유. 표면 착색 방식.','','★ 컨트롤컬러가 "왜 리프팅을 못 하는가" — 큐티클 표면에만 작용하고 코르텍스까지 못 들어가기 때문. 멜라닌을 깨지 못하고, 대신 염료를 표면에 얹는 방식.','★ 컨트롤컬러가 "왜 염료가 많은가" — 큐티클 표면 착색이라 충분한 발색을 위해 염료 농도가 높음. 그래서 버진모처럼 리프팅이 필요한 베이스에서도 "색 얹기" 역할로 유용.','★ 컨트롤컬러가 "왜 퇴색이 빠른가" — 표면 흡착이라 샴푸·마찰로 씻겨 나감. 영구 착색이 아님.','','■ 탈색 원리:','과산화수소 + 알칼리제 → 멜라닌 산화 → 무색의 옥시멜라닌(oxymelanin)으로 전환.','유멜라닌이 먼저 분해되고, 페오멜라닌(적색)은 저항성 때문에 뒤에 남음.','','■ 탈색 시 색상 변화 단계 (동양인 기준):','흑갈색 (Lv 3~4) → 갈색 → 적갈색 (유멜라닌 먼저 분해) → 붉은색 (적색 멜라닌 지배 구간) → 주황 → 노랑 → 연노랑·베이지 → 백금 (Lv 10 이상)','','★ 이 단계는 C-2 "탈색 횟수 → 도달 레벨" 표의 생물학적 근거다.','','■ 동양인 모발 특성 요약:','- 멜라닌 비율: 유멜라닌이 대부분(흑갈색) + 페오멜라닌(적색) 비중이 서양인보다 상대적으로 높음','- 결과: 탈색 시 붉은기가 강하게 먼저 올라옴. (서양인은 노란기 먼저)','- 유리한 색감: 레드브라운·로즈브라운·마호가니·와인빛 — 적색 멜라닌과 같은 계열이라 충돌 없이 발색. 탈색 없이도 선명함.','- 까다로운 색감: 밝은 애쉬·베이지·플래티넘 — 적색 멜라닌을 충분히 깨야 나옴. 안 그러면 붉은기가 배경으로 올라와 색감을 오염시킴.','','★ 이 특성이 C-7(적색 멜라닌 자연 반응)과 C-5(버진모 한색 한계)의 모든 실무 분기를 지배한다.','','=== [C-1] 색 이론 기초 — 3속성·보색·파워 ===','','(C-0의 염모 원리 위에 색 자체의 속성을 얹는다.)','','■ 언더 × 틴트 공식:','헤어컬러 = 언더(베이스 상태) + 틴트(염모제 염료)','★ 같은 염모제 조합이라도 언더에 따라 결과가 완전히 다르다.','- 탈색 후 베이스(멜라닌 제거됨) → 염모제 색이 거의 그대로 발색','- 버진모(멜라닌 가득) → 염모제가 멜라닌과 충돌, 쿨브라운·적빛 있는 브라운으로 수렴 (원리는 C-0 페오멜라닌 저항성 참조)','','■ 색의 3속성:','색상(Hue) / 명도(Value, 레벨 1~20 — 색의 밝기 자체) / 채도(Chroma, 비비드↔덜)','1차색: 빨강, 파랑, 노랑 / 2차색: 주황, 보라, 초록','','■ 보색과 파워:','보색: 주황↔블루 / 노랑↔바이올렛 / 빨강↔그린','파워: 노랑(약) → 주황 → 빨강/초록 → 파랑 → 보라 → 검정(강)','- 노랑 잔류 → 바이올렛이 맞다 / 노랑에 블루 → 매트하게 빠진다','- 주황 잔류 → 블루가 맞다 / 난색은 적색 멜라닌과 같은 계열 → 충돌 없이 발색','','=== [C-2] 레벨별 언더톤·보색 매칭 ===','','■ 용어: "잔류 색소" = 베이스(모발)에 남아있는 천연 멜라닌(노랑기·주황기·적색)을 지칭한다. 인공 염색 색소 개념 아님. D·G 섹션 공통 이 의미로 사용.','','■ 동양인 모발 레벨별 언더톤:','5: 적색(검붉은색) / 8~10: 적갈색~주황','12: 주황 — 버진모에서 고명도 염모제+산화제로 도달 가능한 상한. 적색 멜라닌 잔류가 강해 한색은 브라운으로 수렴.','14: 주황~노랑(탈색 1회 도달) — 주황기가 남아있다. 한색 염료→주황기에 소진→브라운 수렴. 수렴이 어울리는 색감은 가능, 투명한 색감은 불가.','16: 노랑 — 바이올렛으로 노랑기 보색 가능. 보라빛이 핵심인 색감은 18+.','18: 연노랑 — 잔류 거의 없음. 염료 그대로 발색.','20: 아이보리 — 잔류 없음.','','■ 탈색 횟수 → 도달 레벨:','적색→적갈색→주황→주황~노랑→노랑→연노랑→아이보리 순서로 멜라닌이 빠진다.','1회 → 14(주황~노랑) / 2회 이상 → 16(노랑) / 3회 이상 → 18~20(연노랑~아이보리)','탈색 없이: 고명도 염모제+산화제 → 최대 12레벨까지 리프팅. 그러나 멜라닌 잔류로 브라운 수렴. 난색은 소진 없이 발색.','','■ 보색 매칭표 + 파워 매칭 원리:','주황 잔류 → 블루 소량 / 노랑 잔류 → 바이올렛 소량 (블루 쓰면 매트!) / 연노랑~아이보리 → 불필요 / 난색 → 불필요','★ 보색은 메인 조합에 소량 믹스하여 한 번에 시술.','★ 파워 매칭: 잔류 강 → 보색도 강(바이올렛, 블루). 잔류 약 → 보색도 약(핑크 컨트롤컬러 극소량, 바이올렛 극소량).','예: 연노랑에 바이올렛 충분히 → 보라빛 남음. 핑크 컨트롤컬러 극소량 → 백금발 방향.','','=== [C-3] 염모제 계열 체계 ===','','[명도]-[계열] 구조.','계열: 회갈빛브라운(쿨 방향 갈색 — 약간의 애쉬가 가미된 브라운) / A(잿빛) / BA(파란빛) / G(초록) / V(보라) / R(빨강) / RV(자주) / P(분홍) / Y(노랑) / O(주황) / K(카키·올리브빛) / AK(애쉬카키·잿빛+올리브빛) / 클리어(희석)','','★ "올리브"는 계열명이 아니다. 올리브빛 색감은 반드시 K(카키) 또는 AK(애쉬카키) 계열 염모제로 표기하라. "올리브 염모제" 금지.','','명도: 5~7 저 / 9~11 중 / 13~15 고(리프팅) — 이하 "염모제 명도"로 지칭.','','★ "명도" 용어는 본 프롬프트에서 세 맥락으로 쓰인다. 내부 추론에서 혼동 금지:','  ① 색의 3속성 중 명도(Value) — C-1의 색 자체의 밝기.','  ② 염모제 명도 — 위 5~7/9~11/13~15. 제품 선택·내부 참조용.','  ③ 베이스 레벨 — 사진 속 모발의 실제 밝기(C-2의 레벨 5~20). "18~20 미색 베이스"의 "20"이 이것.','  → 출력 표기는 G1 "시술 상황별 염모제 표기" 규칙을 따르라.','','컨트롤컬러 종류: 한색(블루, 애쉬, 그린, 바이올렛) / 난색(레드, 핑크, 바이올렛)','★ 회갈빛브라운은 염모제 계열이다. 컨트롤컬러가 아니다.','','■ 바이올렛 방향성:','바이올렛 = 중성색. 적보라(RV 방향) = 난색. 청보라 = 한색.','버진모에서 보라 → RV 방향이 현실적.','RV = 중성색+붉은기. 순수 레드 → 빨강일 뿐. RV가 보라빛 베이스를 깔고 컨트롤컬러로 최종 뉘앙스.','','=== [C-4] 염모제 · 컨트롤컬러 · 산화제 체계 ===','','■ 염모제: 리프팅+착색 동시. 코르텍스 침투. 명도 높을수록 리프팅력 강함. 버진모에서는 염료 소진 → 색 표현 한계.','■ 컨트롤컬러: 리프팅 없음. 색만 입힘. 큐티클 쪽. 염료 많음. 버진모에서는 염모제가 리프팅하고 컨트롤컬러가 색 입힘.','■ 클리어: 염료 없는 염모제. 본 프롬프트에서 "클리어 희석"은 염모제·컨트롤컬러의 염료 총량을 클리어와 혼합해 줄이는 것(염료 희석)이다. 뒤에 나오는 "산화제 희석"(산화제 자체를 물·저농도 산화제로 줄이는 것)과 다르다. 두 용어 혼동 금지.','','■ 산화제 농도 — 모발 상태와 목적별:','','- 3%: 리프팅 없음. 탈색모 톤다운·토닝 전용. 손상모는 염료가 빨리 깊게 박히므로 저농도로 속도를 제어한다.','','- 6%: 톤업용. 탈색모·버진모 모두에서 사용. 3%로 부족할 때, 또는 파스텔 방향 착색에도 쓴다. 3%와 혼합 가능.','','- 9% / 12%: 빠른 탈색이 필요할 때, 버진모에서 색감을 최대한 살리고 싶을 때. 손상 위험은 있다.','','★ 탈색모에 9%·12% 사용 금지 — 리프팅은 이미 끝났고 손상만 가중된다.','★ 버진모에 3% 사용 금지 — 멜라닌 리프팅이 안 되어 색이 겉돈다.','','■ 버진모 시술의 핵심 원리:','고명도 염모제 단독 또는 일반 염모제를 버진모에 쓰면, 리프팅은 되는데 적색 멜라닌 때문에 색소가 안 입혀진다.','→ 9%·12% 고농도 산화제로 적색 멜라닌을 더 깨면서, 채도 강한 컨트롤컬러를 믹스해 색감이 표현될 여지를 확보한다.','즉 고농도 산화제의 역할은 "공격적 리프팅"이 아니라 "색감 생존 조건 만들기".','★ 단 버진모 한색 한계는 변하지 않는다 — 블루·바이올렛·애쉬는 안 나오고 쿨브라운 정도가 최선. (C-5 버진모 절대 한계 참조)','','■ 염모제 명도와 염료량 — 반비례 원리:','염모제 명도가 높을수록 리프팅력은 강하지만, 동시에 염료 함량은 적다.','- 명도 높음 → 리프팅·알칼리 비중 ↑ / 색소 비중 ↓ (색소가 살짝 얹힘)','- 명도 낮음 → 리프팅·알칼리 비중 ↓ / 색소 비중 ↑ (진하게 박힘)','이 원리가 "색소 살짝 얹기 vs 진하게 박기" 선택의 기저가 된다.','','■ 탈색모 착색 원칙:','탈색모는 멜라닌이 제거되어 염모제 염료가 빠르게 흡수된다.','회사별 명도 체계가 상이하므로 출력에서는 "○○ 염모제"로만 표기한다 (디자이너 재량).','염모제+염모제, 염모제+컨트롤컬러 조합 자유.','','■ 탈색모 착색 — 목표 색감의 발색 농도에 따라 선택:','','■■ 진한 발색이 목표인 경우 (채도 자체가 색감 정체성):','(라벤더 애쉬, 애쉬 바이올렛, 애쉬 핑크, 로즈, 네이비 등)','→ 일반 염모제 그대로. 희석 금지.','→ 고명도로 가면 "색은 맞는데 색소가 살짝만 얹혀서 흐릿한 발색"이 된다.','','■■ 색소를 살짝 얹는 방식 (얇고 은은한 발색):','(밀크티 베이지, 밀크 베이지, 애쉬 베이지, 파스텔 계열, 백금발 방향, 회갈빛브라운 메인에 뉘앙스만 얹는 구조 전반)','→ 방법 1 — 한 단계 높은 명도 염모제 선택 (염료 적어 자연 희석).','→ 방법 2 — 일반 염모제 + 클리어 희석 (권장, 가장 직관적).','→ 방법 3 — 저농도 산화제(3%·6%)로 염료 침투 속도 조절 (손상모에서 유용).','→ 방법 4 — 컨트롤컬러 극소량 + 클리어 (극미세 뉘앙스, 백금발 방향).','','★ 같은 탈색 베이스라도 목표 색감에 따라 명도·희석 선택이 달라진다.','★ "탈색모 = 무조건 희석" 아니다. 진한 채도 색감은 일반 염모제 그대로.','★ 탈색모에 고명도(13·15)는 일반적으로 과하다 — 리프팅이 이미 끝났기 때문.','  단 "색소를 매우 얇게 얹는" 목적일 때는 선택지가 될 수 있다 (극은은한 뉘앙스용).','',
'■ 회갈빛브라운 — 본질과 적용 맥락:','',
'본질: 약간의 애쉬가 가미된 브라운. 보색 파워는 없다.',
'→ 주황·적·노랑을 직접 잡는 건 블루·그린·바이올렛 컨트롤컬러 담당 (C-1·C-2 보색 파워 원리).',
'→ 회갈빛브라운은 "잡는" 역할이 아니라 "구성원" 역할.','',
'쓰이는 맥락 (두 곳):','',
'1) 탈색모 고명도 베이지 방향 — 고명도 반비례 원리로 브라운이 살짝 얹히고, 미세 애쉬 기운이 베이지 뉘앙스를 완성한다. 색감 계열(핑크·바이올렛·애쉬)이 뉘앙스 추가.','',
'2) 백모 방향 — 탈색 최대치는 연노랑~아이보리. 여기에 애쉬·블루 단독 입히면 "진짜 색"이 튀어나와 실버/스틸톤으로 빠지지 백모가 아니다. 고명도 회갈빛브라운이 밝은 회갈빛 베이스를 깔고, 그 위에 핑크·바이올렛 극소량 + 클리어로 연색감만 얹어 아이보리에서 백모 방향으로 한 단계 더 하얗게 만든다.','',
'쓰지 않는 맥락:',
'★ 버진모 적색 멜라닌·주황기 제어에는 쓰지 마라 — 그건 애쉬 염모제 + 블루/그린 컨트롤컬러의 역할.',
'★ 탈색모 라벤더 애쉬·애쉬 바이올렛 등 진한 채도 색감에도 쓰지 마라 — 색감 계열 + 보색 + 클리어로 충분.',
'★ 난색 계열 전반에도 쓰지 마라 — 적색 멜라닌과 충돌 없이 깊은 브라운·난색 브라운으로 자연 수렴.','',
'=== [C-5] 베이스별 조합 원리 ===','','─── 버진모 (5레벨, 적색 멜라닌 가득) ───','','원리: 고명도 염모제+산화제(9%/12%) → 멜라닌 리프팅(최대 12레벨까지) → 노랑기 드러남 → 컨트롤컬러 염료도 노랑기 중화에 소진 → 브라운 수렴.','절대 한계: 한색 → 쿨/매트브라운 / 난색 → 레드/로즈/와인빛 브라운.','★ 버진모 레시피에서 목표 색감명을 따라가면 안 된다. "라벤더 방향", "실버 방향" 금지.','','■ 한색 조합(고명도 애쉬 기준):','+블루 컨트롤컬러 → 애쉬브라운 / +블루+바이올렛 컨트롤컬러 → 투명 쿨브라운 / +애쉬 컨트롤컬러 → 애쉬브라운','','■ AK 기준:','+애쉬 컨트롤컬러 → 올리브 애쉬 브라운(매트+잿빛) / +그린 컨트롤컬러 → 매트브라운 / 카키 염모제+애쉬 컨트롤컬러 → 매트애쉬브라운','★ 올리브빛 색감은 AK(애쉬카키) 또는 K(카키) 염모제를 사용하라.','★ 와인빛·퍼플브라운 → 난색(RV) 방향.','','■ 난색 원리:','적색 멜라닌과 충돌 안 함 → 컨트롤컬러 뉘앙스 살아남. 잔류 브라운이 색감의 일부.','선명한 레드 = R 메인 / 와인 = V 메인 / 로즈 = V 핵심+R 보조 / 체리와인 = R+V.','','─── 14레벨 (탈색 1회, 주황~노랑) ───','','■ 한색으로 투명한 색감 불가. 잔류 주황기·브라운이 색감 일부로 활용될 때만 한색 가능.','■ 난색: R → 레드브라운 / P → 로즈브라운','■ 한색: 블루 → 스모키애쉬브라운 수렴 / AK+그린 컨트롤컬러 소량 → 올리브애쉬브라운 / BA+애쉬 컨트롤컬러 → 애쉬브라운','','─── 16레벨 (탈색 2회, 노랑) ───','','■ V 보색 필수. 블루 사용 금지(매트 빠짐!).','■ 조합:','A+V 소량 → 애쉬그레이 / V+A 소량 → 라벤더(애쉬 수렴) / 블루+V 소량 → 네이비','★ 색감이 "실버"나 "실버 애쉬 그레이"라도 중간 명도의 금속성 회색조라면 이 베이스. 애쉬+바이올렛 소량 조합. 블루는 18~20 베이스에서만.','','─── 18~20 미색 베이스 (탈색 3회, 연노랑~아이보리) ───','','잔류 거의 없어 "빈 캔버스". 염료 그대로 발색.','★ 명도·희석 선택은 입히는 뉘앙스에 따라 결정 (C-4 "염모제 명도와 염료량 반비례 원리" 참조).','  - 색소를 살짝 얹는 색감(밀크·베이지·파스텔 방향) → 한 단계 높은 명도 또는 클리어 희석.','  - 진한 채도 색감(라벤더 애쉬, 애쉬 바이올렛, 애쉬 핑크 등) → 일반 염모제 그대로. 희석 금지.','','■ 원리 1 — "베이지성 색감 vs 채도 색감" 구분이 핵심:',
'★ 베이지성 있는 색감(밀크·파스텔·로즈 베이지 등) → 고명도 회갈빛브라운이 구성원으로 들어감 (C-4 회갈빛브라운 원리 기능 1 참조). 색감 계열은 뉘앙스 소량.',
'★ 베이지성 없는 채도 색감(라벤더 애쉬, 애쉬 바이올렛, 실버 애쉬 등) → 색감 계열 + 보색 + 클리어만. 회갈빛브라운 넣지 마라 (채도 흐려짐).','',
'■ 원리 2 — 미색 베이스 조합 예시:','',
'★ 아래 조합의 일반 염모제는 모두 일반 명도(9·11레벨급). 고명도 표기가 있는 것만 13·15레벨. 출력 표기는 "○○ 염모제"로만 (G1 탈색모 착색 규칙 참조).','',
'[베이지성 있는 색감 — 고명도 회갈빛브라운 + 색감 소량]',
'- 파스텔 핑크: 고명도 회갈빛브라운 + 핑크 컨트롤컬러 + 클리어 희석',
'- 밀크 베이지: 고명도 회갈빛브라운 + 애쉬 소량',
'- 라벤더 베이지: 고명도 회갈빛브라운 + 바이올렛 소량 (베이지성 있음)',
'- 로즈 밀크 베이지: 고명도 회갈빛브라운 메인 + 애쉬 소량 + 핑크 컨트롤컬러 극소량',
'- 로즈 베이지: 고명도 회갈빛브라운 + 핑크 컨트롤컬러 극소량 + 애쉬 소량','',
'[베이지성 없는 채도 색감 — 색감 계열 + 보색 + 클리어. 회갈빛브라운 없음]',
'- 실버 애쉬 (밝고 투명): A + 블루 소량',
'- 라벤더 애쉬: V + A 소량',
'- 애쉬 바이올렛: V + A',
'- 백금발: 핑크 컨트롤컬러 극소량 + 클리어','',
'■ 원리 3 — 미색 베이스에서의 금기:',
'★ 핑크를 염모제 메인으로 쓰지 마라 → 강한 핑크로 발색됨 (펑크 핑크 방향)',
'★ 바이올렛을 염모제 메인으로 쓰지 마라 → 보라빛 지배 (라벤더 애쉬가 아닌 진한 바이올렛)',
'★ 애쉬 단독 메인 금지 → 회색으로 빠짐 (베이지가 아닌 그레이)',
'★ 베이지성 없는 채도 색감(라벤더 애쉬 등)에 회갈빛브라운 넣지 마라 → 채도가 흐려져 밀크티 방향으로 빠짐','','★ 사진에서 미색 베이스가 확인되고 핑크·보라·로즈 뉘앙스가 은은히 감도는 경우 → "회갈빛브라운 메인 + 뉘앙스 계열 소량" 구조.','★ 바이올렛 컨트롤컬러는 "라벤더 베이지", "라벤더 애쉬" 등 보라빛 방향성일 때만.','','─── 백모 (멜라닌 없음) ───','','★★★ 고정 규칙 — 순백/화이트 계열 ★★★','color_name_ko 또는 description에 "화이트", "흰색", "순백", "아이스 플래티넘", "백금발" 중 하나가 포함되면 아래 세 조합 중 하나만 출력하라. 다른 조합 절대 금지. 이 계열은 도달 방향이 단일하므로 추론이 아닌 고정으로 처리한다.','',
'■ 원리 — 왜 이 고정 조합인가:',
'탈색 최대치는 연노랑~아이보리. 이 베이스에 애쉬·블루 단독 입히면 "진짜 색"이 튀어나와 실버/스틸톤으로 빠지지 백모가 아니다.',
'백모는 "색을 입힌다"가 아니라 "미색을 더 미색답게 만든다". 세 조합 공통 구조:',
'  1) 고명도 회갈빛브라운이 밝은 회갈빛 베이스를 깐다 (C-4 회갈빛브라운 원리 기능 2 참조)',
'  2) 그 위에 연색감(핑크 극소량 / 고명도 바이올렛 / 고명도 애쉬)을 얹어 아이보리에서 백모 방향으로 한 단계 더 하얗게 만든다.','','- A안 (기본 / 미세 웜·크리미 뉘앙스): 고명도(13·15레벨) 회갈빛브라운 염모제 + 핑크 컨트롤컬러 극소량 + 클리어 + 산화제 자체를 많이 희석','- B안 (노랑기 뚜렷 / 보색 강화 필요): 고명도(13·15레벨) 회갈빛브라운 염모제 + 고명도(13·15레벨) 바이올렛 염모제 + 클리어 + 산화제 자체를 많이 희석','- C안 (잿빛 뉘앙스 지배 / 쿨톤): 고명도(13·15레벨) 회갈빛브라운 염모제 + 고명도(13·15레벨) 애쉬 염모제 + 클리어 + 산화제 자체를 많이 희석','','선택 기준은 사진 속 백모 베이스의 뉘앙스다. 미세한 웜·크리미·핑크기→A / 노랑기가 뚜렷해 강한 보색 필요→B / 잿빛·쿨톤이 주도→C.','세 조합 공통: 10분 간격 발색 체크. 애쉬 단독 메인 금지(회색으로 빠짐) — C안에서도 반드시 회갈빛브라운과 병용. 바이올렛 컨트롤컬러 극소량 금지(아무리 소량이라도 보라빛 잔존 위험. B안의 "고명도 바이올렛 염모제"와는 다르다. 염모제는 염료가 적어 보색으로만 작동).','','★ 순백/화이트 계열에 "애쉬 + 블루" 조합 절대 금지. 이건 실버·실버애쉬 계열의 레시피이지 화이트 블론드의 레시피가 아니다. 블루는 주황기·노랑기가 남은 베이스에서 보색으로 작동하는데, 이미 연노랑~아이보리까지 빠진 베이스에서는 과잉 보색이 되어 스틸톤(푸른빛 회색)으로 꺾인다.','','=== [C-6] 베이지 계열 원리 ===','','베이지는 브라운보다 밝고 가벼운 색감. 깨끗한 베이스(18레벨 이상)에서 메인 색감 계열을 살짝 입히고, 회갈빛브라운 염모제를 보조로 더해 베이지 톤 완성.','','★ 베이지 조건: 사진이 매우 밝고 연한 고명도 베이스 + 뿌리부터 끝까지 균일하게 밝음 + 파스텔처럼 희석된 느낌 + 탈색 이력 명백. 이 조건이 아니면 "브라운"으로 수렴.','★ 애매하면 "브라운"으로. 베이지 오판은 탈색 3회 과잉 시술 사고 위험.','','■ 메인/보조 원리:','★ 베이지 조합에서 메인은 항상 색감 계열(애쉬, 핑크, 바이올렛 등).','★ 회갈빛브라운은 베이지 뉘앙스를 잡아주는 보조 역할.','★ 메인 색감 없이 회갈빛브라운만 쓰면 베이지가 아니라 브라운으로 빠진다.','★ 베이지 계열은 전형적으로 "색소를 살짝 얹는" 방식이다 (C-4 원리 참조). 색을 진하게 박으면 베이지가 아닌 진한 색감으로 빠진다.','','■ 조합 원리:','- 애쉬 베이지: 애쉬 염모제 메인 + 회갈빛브라운 염모제 보조','- 밀크티 베이지: 회갈빛브라운 염모제 메인 + 애쉬 염모제 보조 (밀크티는 브라운 자체가 색감이므로 예외)','- 라벤더 베이지: 바이올렛 염모제 메인 + 회갈빛브라운 염모제 보조','- 핑크 베이지 / 로즈 핑크 베이지: 핑크 염모제 메인 + 회갈빛브라운 염모제 보조','- 매트 베이지: A+G 소량 (고명도 베이스)','- 애쉬 그레이: A 단독 (18~20 베이스)','','■ 한국 트렌드 베이지 — 시각적 warm 주의:','밀크티 베이지, 애쉬 베이지, 매트 베이지, 라벤더 베이지는 사진상 warm처럼 보이지만, 동양인 모발에서는 한색 계열(애쉬, 바이올렛 중심) 조합이 필수.','- 투명감+매트함+잿빛이 강한 베이지 → 한색 계열','- 황금빛+투명감+붉은기 없음 → 시각적 warm이어도 한색 계열','- 붉은기·핑크기가 선명한 사진만 → 난색 계열','','■ 라벤더의 방향:','라벤더 = "V에 A 소량"이 기본. "A에 V"는 애쉬그레이 방향.','','=== [C-7] 동양인 버진모 — 적색 멜라닌 자연 반응 ===','','동양인 버진모에 애쉬(A) 또는 애쉬카키(AK) 염모제를 입히면 적색 멜라닌과의 반응으로 미세 뉘앙스가 자연 발생한다. 사진에서 이 뉘앙스만 보고 염모제 계열을 추가하지 마라.','','■ 애쉬 + 적색 멜라닌 → 미세 올리브빛·로즈빛·보라기 자연 발생:','- 애쉬의 파란/초록 염료가 적색 멜라닌 일부를 중화하면서 올리브·로즈빛 뉘앙스 발생.','- "주도 색감"과 "뉘앙스 강도"를 구분해서 판단하라.','','★ 사진에서 미세 올리브빛이 보여도 그것만 근거로 AK(애쉬카키) 염모제로 판정하지 마라.','- 주도 색감이 애쉬 브라운이면 → 일반 애쉬 염모제로 충분. 올리브빛은 자연 발생.','- 올리브빛이 색감을 지배할 때만 → AK 염모제.','','★ 사진에서 로즈빛·보라빛이 미세하면 → 일반 애쉬로 충분. 적색 멜라닌과 어우러져 자연 표현됨.','★ 로즈빛·보라빛이 뚜렷하게 지배적일 때만 → 레드바이올렛 또는 바이올렛 추가.','','■ 매트빛 강도별 조합:','- 미세한 매트함: 애쉬 염모제만 (멜라닌 중화로 자연 발생)','- 뚜렷한 매트함: 애쉬 + 그린 컨트롤컬러 소량','- 강한 매트함 + 올리브 지배: AK 염모제 + 그린 컨트롤컬러','','=== [C-8] 경계 색감 — 애쉬브라운·초코브라운 ===','','애쉬브라운, 초코브라운, 쿨브라운 등은 버진모~탈색 1회 경계에 있는 색감이다.','사진 속 조명·밝기에 따라 버진모 시술인지, 기염모 재시술인지, 탈색 후 착색인지 구분이 어렵다.','','이런 색감의 시술 루트:','- 루트A(버진모/연모): 고명도(13·15레벨) 애쉬 염모제 + 애쉬 컨트롤컬러 + 산화제(9%/12%) → 시도해볼 만함. 쿨브라운~애쉬브라운으로 수렴.','- 루트B(리프트 후 착색): 고명도 염모제로 12레벨(적갈색~주황) 정도까지만 리프트 후 애쉬 착색 → 효과적. 기염모(8~12레벨 한색 염색 후 퇴색)에서 애쉬 재시술도 같은 원리.','','★ 버진모 톤업 시 고명도 애쉬 + 블루는 비효율적. 고명도 애쉬는 염료가 거의 없는데 블루까지 넣으면 색감을 주기보다 그냥 고명도 쿨브라운일 뿐. 톤업 과정에서는 멜라닌이 벗겨지면서 투명해지는 거지, 블루가 잿빛을 만드는 게 아니다. 버진모 톤업에는 고명도 애쉬 + 애쉬 컨트롤컬러가 맞다.','★ 이미 밝혀진 언더(주황·브라운 베이스)에서의 블루는 다르다. 잔류 주황·브라운을 블루가 억제하면서 스모키한 방향으로 변한다.','★ 14레벨은 주황~노랑 경계 구간이다. 이 베이스에서 블루를 올리면 애쉬·그레이·스모키·매트 중 어디로 빠질지 예측이 어렵다. 애쉬브라운·초코브라운을 노리고 탈색한다면 12레벨(적갈색~주황)에서 멈추는 게 안정적이다.','★ 이런 색감을 "애쉬 베이지"로 오판하여 탈색 3회를 추천하지 마라. 베이지와 브라운은 다르다. 브라운 계열 색감에 탈색 3회는 과잉 시술이다.'].join('\n');

/* ══════════════════════════════════════════════════════════
   여기까지 프롬프트 코드 블록.
══════════════════════════════════════════════════════════ */

/* ══════════════════════════════════════════════════════════
   검수툴 전용 로직
══════════════════════════════════════════════════════════ */
var MAX_FILES = 10;
var CONCURRENCY = 3;
var items = [];

function uid() {
  return 'it_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6);
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

/* ── 이미지 리사이즈 (analyzer.html과 동일한 파라미터) ── */
function compressImage(file, cb) {
  var MAX_SIZE = 1600, MAX_BYTES = 1000000;
  var QUALITY_START = 0.9, QUALITY_MIN = 0.7, QUALITY_STEP = 0.05;

  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var w = img.width, h = img.height;
      if (w > MAX_SIZE || h > MAX_SIZE) {
        if (w > h) { h = Math.round(h * MAX_SIZE / w); w = MAX_SIZE; }
        else { w = Math.round(w * MAX_SIZE / h); h = MAX_SIZE; }
      }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);

      var quality = QUALITY_START;
      var full = canvas.toDataURL('image/jpeg', quality);
      while (full.length * 0.75 > MAX_BYTES && quality > QUALITY_MIN) {
        quality -= QUALITY_STEP;
        quality = Math.round(quality * 100) / 100;
        full = canvas.toDataURL('image/jpeg', quality);
      }
      cb(full.split(',')[1], 'image/jpeg', full);
    };
    img.onerror = function() { cb(null, null, null); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ── 업로드 처리 ── */
function handleFiles(fileList) {
  var files = Array.from(fileList).filter(function(f) {
    return f && f.type && f.type.indexOf('image/') === 0;
  });

  var slotsLeft = MAX_FILES - items.length;
  if (slotsLeft <= 0) {
    alert('최대 ' + MAX_FILES + '장까지 업로드 가능합니다. 기존 이미지를 먼저 제거해 주세요.');
    return;
  }
  var toAdd = files.slice(0, slotsLeft);
  if (files.length > toAdd.length) {
    alert(MAX_FILES + '장 제한으로 ' + toAdd.length + '장만 추가했습니다.');
  }

  toAdd.forEach(function(file) {
    var item = {
      id: uid(),
      file: file,
      base64: null,
      mediaType: 'image/jpeg',
      thumbnail: null,
      status: 'pending',
      result: null,
      error: null,
      flag: null,
      memo: '',
      rawText: null
    };
    items.push(item);

    compressImage(file, function(data, media, dataUrl) {
      if (!data) {
        item.status = 'error';
        item.error = '이미지 처리 실패';
      } else {
        item.base64 = data;
        item.mediaType = media;
        item.thumbnail = dataUrl;
      }
      renderFileList();
      updateRunButton();
    });
  });

  renderFileList();
  updateRunButton();
}

function removeItem(id) {
  items = items.filter(function(it) { return it.id !== id; });
  renderFileList();
  renderResults();
  updateRunButton();
  updateExportBar();
}

function clearAll() {
  if (items.length && !confirm('전부 지우시겠습니까?')) return;
  items = [];
  renderFileList();
  renderResults();
  updateRunButton();
  updateExportBar();
}

/* ── 파일 리스트 렌더 ── */
function renderFileList() {
  var el = document.getElementById('fileList');
  var bar = document.getElementById('runBar');
  if (items.length === 0) {
    el.innerHTML = '';
    bar.style.display = 'none';
    return;
  }
  bar.style.display = 'flex';
  el.innerHTML = items.map(function(it) {
    var thumb = it.thumbnail
      ? '<img src="' + it.thumbnail + '" alt="">'
      : '<div class="thumb-loading">…</div>';
    return '<div class="file-item">'
      + thumb
      + '<button class="remove" data-rm="' + it.id + '" title="제거">×</button>'
      + '</div>';
  }).join('');
  el.querySelectorAll('.remove').forEach(function(btn) {
    btn.onclick = function() { removeItem(this.dataset.rm); };
  });
}

function updateRunButton() {
  var btn = document.getElementById('runBtn');
  var anyPending = items.some(function(it) {
    return (it.status === 'pending' || it.status === 'error') && it.base64;
  });
  var anyProcessing = items.some(function(it) {
    return it.status === 'processing' || it.status === 'queued';
  });
  var readyCount = items.filter(function(it) {
    return (it.status === 'pending' || it.status === 'error') && it.base64;
  }).length;

  if (anyProcessing) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span>분석 중...';
  } else if (anyPending) {
    btn.disabled = false;
    btn.textContent = '분석 시작 (' + readyCount + '장)';
  } else if (items.length > 0) {
    btn.disabled = true;
    btn.textContent = '모두 완료';
  } else {
    btn.disabled = true;
    btn.textContent = '분석 시작';
  }
}

/* ══════════════════════════════════════════════════════════
   실행 — 동시 3장씩
══════════════════════════════════════════════════════════ */
function runAll() {
  var toRun = items.filter(function(it) {
    return (it.status === 'pending' || it.status === 'error') && it.base64;
  });
  if (toRun.length === 0) return;

  toRun.forEach(function(it) {
    it.status = 'queued';
    it.error = null;
  });
  renderResults();
  updateRunButton();

  var active = 0;
  var idx = 0;

  function launch() {
    while (active < CONCURRENCY && idx < toRun.length) {
      var item = toRun[idx++];
      active++;
      item.status = 'processing';
      renderResults();
      runOne(item).then(function() {
        active--;
        if (idx >= toRun.length && active === 0) {
          updateRunButton();
          updateExportBar();
        } else {
          launch();
        }
      });
    }
  }
  launch();
}

function runOne(item) {
  return new Promise(function(resolve) {
    var baseDesc = '자연모/염색모 (동양인, 적색멜라닌 가득, 탈색 이력 없음, 약 5레벨)';
    var sysPrompt = buildUnifiedPrompt('natural', baseDesc);
    var MAX_ATTEMPTS = 3;
    var attempts = 0;

    function attempt() {
      attempts++;
      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 2048,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: item.mediaType, data: item.base64 } },
              { type: 'text', text: '이 사진 속 모발의 색감을 역공학 분석하고 조색 레시피까지 만들어줘. 통합 JSON 객체 하나만 출력해. {"analysis":{...},"recipe":{...}} 구조로. 사고 과정·설명·인사 금지.' }
            ]
          }],
          system: [{ type: 'text', text: sysPrompt, cache_control: { type: 'ephemeral' } }]
        })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        try {
          if (!data.content) throw new Error('no content');
          var txt = data.content.map(function(b) { return b.text || ''; }).join('');
          item.rawText = txt;
          if (!txt.trim()) throw new Error('empty response');
          txt = txt.replace(/```json|```/g, '').trim();
          var m = txt.match(/\{[\s\S]*\}/);
          if (!m) throw new Error('no json');
          var result = JSON.parse(m[0]);
          if (!result.analysis || !result.recipe) throw new Error('통합 구조 누락');
          item.result = result;
          item.status = 'done';
          renderResults();
          resolve();
        } catch (e) {
          if (attempts < MAX_ATTEMPTS) {
            setTimeout(attempt, 500);
          } else {
            item.error = (e && e.message) || '파싱 실패';
            item.status = 'error';
            renderResults();
            resolve();
          }
        }
      })
      .catch(function(err) {
        if (attempts < MAX_ATTEMPTS) {
          setTimeout(attempt, 500);
        } else {
          item.error = (err && err.message) || '네트워크 오류';
          item.status = 'error';
          renderResults();
          resolve();
        }
      });
    }
    attempt();
  });
}

/* ══════════════════════════════════════════════════════════
   결과 렌더
══════════════════════════════════════════════════════════ */
function renderResults() {
  var el = document.getElementById('results');
  if (items.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = items.map(function(it, idx) { return renderCard(it, idx); }).join('');
  attachCardListeners();
}

function statusBadge(st) {
  if (st === 'processing') return '<span class="status processing"><span class="spin"></span>분석중</span>';
  if (st === 'queued')     return '<span class="status processing">대기</span>';
  if (st === 'done')       return '<span class="status done">완료</span>';
  if (st === 'error')      return '<span class="status error">오류</span>';
  return '<span class="status pending">대기</span>';
}

function renderCard(it, idx) {
  var flags = ['ok', 'problem', 'maybe'].map(function(f) {
    var label = { ok: '✓ OK', problem: '✗ 문제', maybe: '? 보류' }[f];
    var active = it.flag === f ? ' active' : '';
    return '<button class="flag flag-' + f + active + '" data-flag="' + f + '" data-id="' + it.id + '">' + label + '</button>';
  }).join('');

  var body;
  if (it.status === 'done' && it.result) {
    body = renderResultBody(it.result);
  } else if (it.status === 'error') {
    body = '<div class="error-body">오류: ' + escapeHtml(it.error || '알 수 없음')
      + '<button class="retry" data-retry="' + it.id + '">재시도</button></div>';
  } else if (it.status === 'processing') {
    body = '<div class="pending-body"><span class="spin"></span>분석 중...</div>';
  } else {
    body = '<div class="pending-body">대기 중</div>';
  }

  var raw = '';
  if (it.result) {
    raw = '<details class="raw"><summary>원본 JSON 보기</summary><pre>'
      + escapeHtml(JSON.stringify(it.result, null, 2)) + '</pre></details>';
  } else if (it.rawText && it.status === 'error') {
    raw = '<details class="raw"><summary>원본 응답 보기 (파싱 실패)</summary><pre>'
      + escapeHtml(it.rawText) + '</pre></details>';
  }

  return '<div class="result-card">'
    + '<div class="card-head">'
    +   '<div class="idx">#' + (idx + 1) + '</div>'
    +   '<div class="fname">' + escapeHtml(it.file.name) + '</div>'
    +   statusBadge(it.status)
    + '</div>'
    + '<div class="card-body">'
    +   '<div class="photo">' + (it.thumbnail ? '<img src="' + it.thumbnail + '" alt="">' : '') + '</div>'
    +   '<div class="content">' + body + raw + '</div>'
    + '</div>'
    + '<div class="card-foot">'
    +   '<div class="flags">' + flags + '</div>'
    +   '<textarea class="memo" data-memo="' + it.id + '" placeholder="메모 (예: summary의 탈색 회차가 사진과 안 맞음)">' + escapeHtml(it.memo) + '</textarea>'
    + '</div>'
    + '</div>';
}

/* tips에서 <b> 태그만 허용하는 새니타이저 */
function sanitizeTips(tips) {
  var safe = escapeHtml(tips);
  safe = safe.replace(/&lt;b&gt;/g, '<b>').replace(/&lt;\/b&gt;/g, '</b>');
  return safe;
}

function renderResultBody(result) {
  var a = result.analysis || {};
  var r = result.recipe || {};
  var toneMap = { cool: '한색(쿨)', warm: '난색(웜)', neutral: '뉴트럴' };

  var elementsHtml = '';
  if (Array.isArray(a.elements) && a.elements.length) {
    elementsHtml = '<div class="tags">' + a.elements.map(function(e) {
      return '<span class="tag">' + escapeHtml(e) + '</span>';
    }).join('') + '</div>';
  }

  var virginHtml = '';
  if (r.virgin_recipe && typeof r.virgin_recipe === 'object') {
    virginHtml = '<div class="virgin-box">'
      + '<div class="virgin-title">' + escapeHtml(r.virgin_recipe.title || '버진모') + '</div>'
      + '<div>' + escapeHtml(r.virgin_recipe.text || '') + '</div>'
      + '</div>';
  }

  return '<div class="result-sec">'
    +   '<div class="sec-title">분석 (analysis)</div>'
    +   '<div class="swatch-row">'
    +     '<div class="swatch" style="background:' + escapeHtml(a.hex || '#ccc') + '"></div>'
    +     '<div><div class="name">' + escapeHtml(a.color_name_ko || '—') + '</div>'
    +     '<div class="tone">' + escapeHtml(toneMap[a.tone] || a.tone || '—') + ' · ' + escapeHtml(a.hex || '') + '</div></div>'
    +   '</div>'
    +   (a.description ? '<div class="desc">' + escapeHtml(a.description) + '</div>' : '')
    +   elementsHtml
    + '</div>'
    + '<div class="result-sec">'
    +   '<div class="sec-title">레시피 (recipe)</div>'
    +   '<div class="rdir">' + escapeHtml(r.recipe_direction || '—') + '</div>'
    +   '<div class="summary">' + escapeHtml(r.summary || '—') + '</div>'
    +   '<div class="tips">' + sanitizeTips(r.tips || '—') + '</div>'
    +   virginHtml
    + '</div>';
}

function attachCardListeners() {
  document.querySelectorAll('.flag').forEach(function(btn) {
    btn.onclick = function() {
      var it = items.find(function(x) { return x.id === this.dataset.id; }.bind(this));
      if (!it) return;
      var newFlag = this.dataset.flag;
      it.flag = (it.flag === newFlag) ? null : newFlag;
      renderResults();
      updateExportBar();
    };
  });
  document.querySelectorAll('.memo').forEach(function(ta) {
    ta.oninput = function() {
      var it = items.find(function(x) { return x.id === this.dataset.memo; }.bind(this));
      if (it) it.memo = this.value;
      updateExportBar();
    };
  });
  document.querySelectorAll('.retry').forEach(function(btn) {
    btn.onclick = function() {
      var it = items.find(function(x) { return x.id === this.dataset.retry; }.bind(this));
      if (!it) return;
      it.status = 'pending';
      it.error = null;
      renderResults();
      runAll();
    };
  });
}

/* ══════════════════════════════════════════════════════════
   Export
══════════════════════════════════════════════════════════ */
function updateExportBar() {
  var any = items.length > 0 && items.some(function(it) {
    return it.status === 'done' || it.status === 'error' || it.memo || it.flag;
  });
  document.getElementById('exportBar').hidden = !any;
  updateStats();
}

function updateStats() {
  var total = items.length;
  var done = items.filter(function(it) { return it.status === 'done'; }).length;
  var err = items.filter(function(it) { return it.status === 'error'; }).length;
  var ok = items.filter(function(it) { return it.flag === 'ok'; }).length;
  var prob = items.filter(function(it) { return it.flag === 'problem'; }).length;
  var maybe = items.filter(function(it) { return it.flag === 'maybe'; }).length;
  var memoed = items.filter(function(it) { return it.memo && it.memo.trim(); }).length;

  var s = done + '/' + total + ' 완료';
  if (err) s += ' · 오류 ' + err;
  s += ' · ✓ ' + ok + ' · ✗ ' + prob + ' · ? ' + maybe;
  if (memoed) s += ' · 메모 ' + memoed;
  document.getElementById('stats').textContent = s;
}

function exportResults() {
  var exportObj = {
    exported_at: new Date().toISOString(),
    total: items.length,
    summary: {
      done: items.filter(function(it) { return it.status === 'done'; }).length,
      error: items.filter(function(it) { return it.status === 'error'; }).length,
      flag_ok: items.filter(function(it) { return it.flag === 'ok'; }).length,
      flag_problem: items.filter(function(it) { return it.flag === 'problem'; }).length,
      flag_maybe: items.filter(function(it) { return it.flag === 'maybe'; }).length
    },
    items: items.map(function(it, idx) {
      return {
        index: idx + 1,
        file_name: it.file.name,
        status: it.status,
        flag: it.flag,
        memo: it.memo,
        result: it.result,
        error: it.error
      };
    })
  };
  var blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  var ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  a.download = 'shield_review_' + ts + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ══════════════════════════════════════════════════════════
   초기화
══════════════════════════════════════════════════════════ */
(function init() {
  var zone = document.getElementById('uploadZone');
  var input = document.getElementById('fileInput');

  zone.onclick = function() { input.click(); };
  input.onchange = function() {
    handleFiles(input.files);
    input.value = '';
  };
  zone.ondragover = function(e) {
    e.preventDefault();
    zone.classList.add('dragover');
  };
  zone.ondragleave = function() { zone.classList.remove('dragover'); };
  zone.ondrop = function(e) {
    e.preventDefault();
    zone.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  };

  document.getElementById('runBtn').onclick = runAll;
  document.getElementById('clearBtn').onclick = clearAll;
  document.getElementById('exportBtn').onclick = exportResults;
})();
</script>
</body>
</html>
