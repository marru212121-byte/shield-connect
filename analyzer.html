<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>AI 컬러 레시피</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Noto Sans KR',sans-serif;background:#FAFAF8;color:#1A1814;min-height:100dvh;overflow-x:hidden}
input,select,textarea{font-size:16px!important;-webkit-appearance:none;font-family:inherit}

.app{width:100%;max-width:430px;margin:0 auto;min-height:100dvh;background:#FAFAF8}
@media(min-width:431px){.app{border-left:1px solid #eee;border-right:1px solid #eee}}

/* 헤더 */
.page-header{display:flex;align-items:center;gap:12px;padding:14px 16px;position:sticky;top:0;z-index:100;background:rgba(250,250,248,0.92);backdrop-filter:blur(12px);border-bottom:1px solid #eee}
.back-btn{width:34px;height:34px;border-radius:12px;border:1.5px solid #eee;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.back-btn svg{color:#555}
.page-header h2{font-size:16px;font-weight:800;color:#1A1814;margin:0}
.page-header .sub{font-size:11px;color:#888;margin-top:2px}

/* 카드 */
.card{background:#fff;border-radius:16px;border:1.5px solid #eee;padding:20px;margin:0 16px 12px}
.card-title{font-size:13px;font-weight:700;color:#1A1814;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.card-title .badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;background:rgba(158,127,191,0.12);color:#9E7FBF}

/* STEP 1: 사진 업로드 */
.upload-zone{border:2px dashed #ddd;border-radius:14px;padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#FAFAF8}
.upload-zone:active{border-color:#9E7FBF;background:rgba(158,127,191,0.04)}
.upload-zone.has-image{border:none;padding:0;background:none}
.upload-zone .icon{font-size:32px;margin-bottom:8px;color:#bbb}
.upload-zone .txt{font-size:13px;color:#888;line-height:1.6}
.upload-zone .txt b{color:#9E7FBF;font-weight:600}
.upload-preview{width:100%;border-radius:14px;display:block;object-fit:cover;max-height:280px}
.upload-change{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px;font-size:12px;color:#9E7FBF;font-weight:600;cursor:pointer;padding:8px}
.upload-change:active{opacity:0.6}

/* 분석 결과 */
.analysis-box{background:linear-gradient(135deg,#f8f6fb,#f3f0f8);border-radius:14px;padding:16px;margin-top:12px;display:none}
.analysis-box.show{display:block;animation:fadeUp .4s ease}
.analysis-label{font-size:10px;font-weight:700;color:#9E7FBF;letter-spacing:0.5px;margin-bottom:8px}
.analysis-color-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.analysis-swatch{width:36px;height:36px;border-radius:10px;border:1.5px solid rgba(0,0,0,0.08);flex-shrink:0}
.analysis-color-name{font-size:15px;font-weight:700;color:#1A1814}
.analysis-color-level{font-size:12px;color:#888;margin-top:2px}
.analysis-desc{font-size:13px;color:#555;line-height:1.7;margin-top:8px}

/* 분석 중 로딩 */
.analyzing{text-align:center;padding:24px;display:none}
.analyzing.show{display:block}
.analyzing .spinner{width:28px;height:28px;border:3px solid #eee;border-top-color:#9E7FBF;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
.analyzing .txt{font-size:13px;color:#888}

/* STEP 2: 베이스 선택 */
.step2-wrap{display:none;animation:fadeUp .4s ease}
.step2-wrap.show{display:block}
.base-option-group{display:flex;flex-direction:column;gap:8px}
.base-option-title{font-size:11px;font-weight:600;color:#888;margin-bottom:4px;margin-top:8px}
.base-btn-row{display:flex;gap:8px;flex-wrap:wrap}
.base-btn{flex:1;min-width:calc(50% - 4px);padding:14px 12px;border-radius:12px;border:1.5px solid #eee;background:#fff;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit}
.base-btn:active{transform:scale(0.97)}
.base-btn.selected{border-color:#9E7FBF;background:rgba(158,127,191,0.06);box-shadow:0 0 0 1px #9E7FBF}
.base-btn .label{font-size:13px;font-weight:600;color:#1A1814}
.base-btn .desc{font-size:10px;color:#999;margin-top:3px}

/* 명도 선택 - 원형 버튼들 */
.level-grid{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.level-btn{width:44px;height:44px;border-radius:12px;border:1.5px solid #eee;background:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#1A1814;cursor:pointer;transition:all .15s;font-family:inherit}
.level-btn:active{transform:scale(0.95)}
.level-btn.selected{border-color:#9E7FBF;background:rgba(158,127,191,0.08);box-shadow:0 0 0 1px #9E7FBF;color:#7B5EA7}

/* 잔류 선택 */
.residue-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.residue-btn{padding:10px 14px;border-radius:10px;border:1.5px solid #eee;background:#fff;font-size:12px;font-weight:500;color:#555;cursor:pointer;transition:all .15s;font-family:inherit}
.residue-btn:active{transform:scale(0.97)}
.residue-btn.selected{border-color:#9E7FBF;background:rgba(158,127,191,0.06);box-shadow:0 0 0 1px #9E7FBF;color:#7B5EA7;font-weight:600}

/* 레시피 요청 버튼 */
.recipe-btn{width:calc(100% - 32px);margin:8px 16px 16px;padding:16px;border-radius:14px;border:none;background:#1A1814;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;display:none}
.recipe-btn.show{display:block;animation:fadeUp .3s ease}
.recipe-btn:active{transform:scale(0.98);opacity:0.9}
.recipe-btn:disabled{opacity:0.4;cursor:not-allowed}

/* STEP 3: 레시피 결과 */
.recipe-wrap{display:none;animation:fadeUp .4s ease}
.recipe-wrap.show{display:block}
.recipe-header{background:linear-gradient(135deg,#f8f6fb,#eee8f5);border-radius:14px;padding:16px;margin-bottom:12px}
.recipe-from-to{font-size:14px;font-weight:600;color:#1A1814;line-height:1.7}
.recipe-from-to .highlight{color:#9E7FBF;font-weight:700}
.recipe-body{background:#fff;border-radius:14px;border:1.5px solid #eee;padding:16px}
.recipe-step{padding:12px 0;border-bottom:1px solid #f0f0f0}
.recipe-step:last-child{border-bottom:none}
.recipe-step-num{font-size:10px;font-weight:700;color:#9E7FBF;letter-spacing:0.5px;margin-bottom:4px}
.recipe-step-text{font-size:14px;color:#1A1814;line-height:1.8;font-weight:500}
.recipe-step-detail{font-size:12px;color:#888;line-height:1.7;margin-top:6px}
.recipe-note{background:#FFFBF0;border-radius:10px;padding:12px;margin-top:12px;font-size:12px;color:#8B7355;line-height:1.7}
.recipe-note b{font-weight:600;color:#7B6A4F}
.recipe-tips{background:#F5F3FF;border-radius:10px;padding:14px;margin-top:12px}
.recipe-tips-title{font-size:13px;font-weight:700;color:#7B5EA7;margin-bottom:6px}
.recipe-tips-text{font-size:13px;color:#555;line-height:1.8}

/* 다시하기 버튼 */
.reset-btn{width:calc(100% - 32px);margin:8px 16px 24px;padding:14px;border-radius:14px;border:1.5px solid #eee;background:#fff;color:#888;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;display:none}
.reset-btn.show{display:block}
.reset-btn:active{transform:scale(0.98)}

/* source 표시 */
.source-tag{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;margin-bottom:8px}
.source-tag.matrix{background:rgba(76,175,80,0.1);color:#4CAF50}
.source-tag.ai{background:rgba(158,127,191,0.12);color:#9E7FBF}

/* 언더톤 선택 버튼 */
.ut-select-btn{display:flex;align-items:center;justify-content:space-between;padding:16px;border-radius:12px;border:1.5px solid #eee;background:#fff;cursor:pointer;transition:all .15s}
.ut-select-btn:active{transform:scale(0.98);border-color:#9E7FBF}
.ut-select-text{font-size:14px;font-weight:600;color:#1A1814}
.ut-select-arrow{font-size:20px;color:#bbb}

/* 선택 결과 표시 */
.ut-result{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;border:1.5px solid #9E7FBF;background:rgba(158,127,191,0.04);cursor:pointer}
.ut-result-swatch{width:40px;height:40px;border-radius:10px;border:1px solid rgba(0,0,0,0.1);flex-shrink:0}
.ut-result-level{font-size:14px;font-weight:700;color:#1A1814}
.ut-result-tone{font-size:11px;color:#888;margin-top:2px}
.ut-result-change{margin-left:auto;font-size:12px;color:#9E7FBF;font-weight:600}

/* 풀스크린 모달 */
.ut-modal{position:fixed;inset:0;z-index:9999;background:#000;display:flex;flex-direction:column;overflow:hidden}
.ut-modal-header{display:flex;align-items:center;justify-content:space-between;padding:max(env(safe-area-inset-top),12px) 16px 10px;background:#000;flex-shrink:0}
.ut-modal-title{font-size:13px;font-weight:600;color:rgba(255,255,255,0.8)}
.ut-modal-close{width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ut-modal-img-wrap{flex:1;position:relative;overflow:hidden}
.ut-modal-img{width:100%;height:100%;object-fit:cover;display:block}
.ut-modal-zones{position:absolute;inset:0;display:flex;flex-direction:column}
.ut-modal-side-labels{position:absolute;bottom:8px;left:0;right:0;display:flex;justify-content:space-between;padding:0 12px;pointer-events:none}
.ut-side-label{font-size:9px;font-weight:600;color:rgba(255,255,255,0.4);letter-spacing:0.3px}

/* 존 행 */
.ut-zone{flex:1;display:flex;position:relative;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.08)}
.ut-zone:last-child{border-bottom:none}
.ut-zone-half{width:50%;position:relative;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ut-zone-half:active{background:rgba(255,255,255,0.12)}
.ut-zone-half.picked{box-shadow:inset 0 0 0 2.5px #fff;background:rgba(255,255,255,0.08)}
.ut-zone-num{font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:rgba(255,255,255,0.45);text-shadow:0 1px 3px rgba(0,0,0,0.7);pointer-events:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.ut-zone-half.picked .ut-zone-num{color:#fff;font-size:16px;font-weight:800}
.ut-zone-guide{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:500;color:rgba(255,255,255,0.35);white-space:nowrap;pointer-events:none;letter-spacing:0.2px}
.ut-zone-half.picked .ut-zone-guide{color:rgba(255,255,255,0.8)}

/* 애니메이션 */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">

  <!-- 헤더 -->
  <div class="page-header">
    <a class="back-btn" href="./index.html">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </a>
    <div>
      <h2>AI 컬러 레시피</h2>
      <div class="sub">사진 분석 → 시술 레시피 자동 생성</div>
    </div>
  </div>

  <!-- STEP 1: 레퍼런스 사진 -->
  <div class="card" id="step1Card">
    <div class="card-title">
      원하는 컬러 사진
      <span class="badge">STEP 1</span>
    </div>
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <div class="icon">📸</div>
      <div class="txt">고객이 원하는 헤어 컬러 사진을<br><b>탭하여 업로드</b>해주세요</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleUpload(this)"/>

    <!-- 분석 중 -->
    <div class="analyzing" id="analyzing">
      <div class="spinner"></div>
      <div class="txt">색감을 분석하고 있어요...</div>
    </div>

    <!-- 분석 결과 -->
    <div class="analysis-box" id="analysisBox">
      <div class="analysis-label">AI 분석 결과</div>
      <div class="analysis-color-row">
        <div class="analysis-swatch" id="analysisSwatch"></div>
        <div>
          <div class="analysis-color-name" id="analysisName">—</div>
          <div class="analysis-color-level" id="analysisLevel">—</div>
        </div>
      </div>
      <div class="analysis-desc" id="analysisDesc"></div>
    </div>
  </div>

  <!-- STEP 2: 현재 베이스 선택 -->
  <div class="step2-wrap" id="step2Wrap">
    <div class="card">
      <div class="card-title">
        현재 모발 상태
        <span class="badge">STEP 2</span>
      </div>

      <div class="base-option-group">
        <!-- 모발 유형 2개 -->
        <div class="base-option-title">모발 유형</div>
        <div class="base-btn-row">
          <button class="base-btn" data-type="virgin" onclick="selectType(this)">
            <div class="label">버진모</div>
            <div class="desc">시술 이력 없음</div>
          </button>
          <button class="base-btn" data-type="treated" onclick="selectType(this)">
            <div class="label">염색모 · 탈색모</div>
            <div class="desc">시술 이력 있음</div>
          </button>
        </div>

        <!-- 언더톤 선택 (버진모 시 숨김) -->
        <div id="undertoneWrap" style="display:none">
          <div class="base-option-title" style="margin-top:16px">현재 언더톤을 선택하세요</div>
          <!-- 선택 전: 버튼 -->
          <div id="utSelectBtn" class="ut-select-btn" onclick="openUndertoneModal()">
            <span class="ut-select-text">언더톤이 어떻게 되요?</span>
            <span class="ut-select-arrow">›</span>
          </div>
          <!-- 선택 후: 결과 표시 -->
          <div id="utResult" class="ut-result" style="display:none" onclick="openUndertoneModal()">
            <div class="ut-result-swatch" id="utResultSwatch"></div>
            <div class="ut-result-info">
              <div class="ut-result-level" id="utResultLevel"></div>
              <div class="ut-result-tone" id="utResultTone"></div>
            </div>
            <span class="ut-result-change">변경 ›</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 언더톤 선택 모달 (base.jpg 풀스크린) -->
  <div id="utModal" class="ut-modal" style="display:none">
    <div class="ut-modal-header">
      <span class="ut-modal-title">현재 모발과 가장 비슷한 구간을 선택하세요</span>
      <button class="ut-modal-close" onclick="closeUndertoneModal()">✕</button>
    </div>
    <div class="ut-modal-img-wrap">
      <img src="./base.jpg" class="ut-modal-img"/>
      <div class="ut-modal-zones" id="utModalZones"></div>
      <div class="ut-modal-side-labels">
        <span class="ut-side-label left">한색 퇴색모</span>
        <span class="ut-side-label right">난색 퇴색모 · 자연모</span>
      </div>
    </div>
  </div>

  <!-- 레시피 생성 버튼 -->
  <button class="recipe-btn" id="recipeBtn" onclick="generateRecipe()" disabled>레시피 생성</button>

  <!-- STEP 3: 레시피 결과 -->
  <div class="recipe-wrap" id="recipeWrap">
    <div class="card">
      <div class="card-title">
        시술 레시피
        <span class="badge">STEP 3</span>
      </div>
      <div id="recipeSource"></div>
      <div class="recipe-header" id="recipeHeader"></div>
      <div class="recipe-body" id="recipeBody"></div>
    </div>
  </div>

  <!-- 다시하기 -->
  <button class="reset-btn" id="resetBtn" onclick="resetAll()">처음부터 다시하기</button>

  <div style="height:40px"></div>
</div>

<script>
/* ══════════════════════════════════
   STATE
══════════════════════════════════ */
var ST = {
  imageBase64: null,
  analysis: null,    // API 분석 결과
  type: null,        // virgin, colored, bleached-cool, bleached-warm
  level: null,       // 5,6,8,10,12,14,16,18,20
  residue: null      // none, red, orange, yellow, mat, ash, blue, violet
};

var API_URL = '/api/recipe';

/* ══════════════════════════════════
   STEP 1: 사진 업로드 + API 분석
══════════════════════════════════ */
function handleUpload(input){
  var file = input.files[0];
  if(!file) return;

  var reader = new FileReader();
  reader.onload = function(e){
    var base64Full = e.target.result;
    var base64Data = base64Full.split(',')[1];
    var mediaType = file.type || 'image/jpeg';

    // 미리보기 표시
    var zone = document.getElementById('uploadZone');
    zone.classList.add('has-image');
    zone.innerHTML = '<img class="upload-preview" src="'+base64Full+'" alt="업로드 사진"/>';
    zone.onclick = null;

    // 사진 변경 링크
    var changeEl = document.createElement('div');
    changeEl.className = 'upload-change';
    changeEl.textContent = '사진 변경';
    changeEl.onclick = function(){ document.getElementById('fileInput').click(); };
    zone.parentNode.insertBefore(changeEl, zone.nextSibling);

    // 재업로드 핸들러
    document.getElementById('fileInput').onchange = function(ev){
      handleReupload(ev.target);
    };

    ST.imageBase64 = base64Data;
    ST.imageMediaType = mediaType;

    analyzeImage(base64Data, mediaType);
  };
  reader.readAsDataURL(file);
}

function handleReupload(input){
  var file = input.files[0];
  if(!file) return;

  var reader = new FileReader();
  reader.onload = function(e){
    var base64Full = e.target.result;
    ST.imageBase64 = base64Full.split(',')[1];
    ST.imageMediaType = file.type || 'image/jpeg';

    document.querySelector('.upload-preview').src = base64Full;

    // 이전 결과 숨기기
    document.getElementById('analysisBox').classList.remove('show');
    document.getElementById('step2Wrap').classList.remove('show');
    document.getElementById('recipeWrap').classList.remove('show');
    document.getElementById('recipeBtn').style.display = 'none';
    document.getElementById('resetBtn').classList.remove('show');

    analyzeImage(ST.imageBase64, ST.imageMediaType);
  };
  reader.readAsDataURL(file);
}

function analyzeImage(base64, mediaType){
  var loadEl = document.getElementById('analyzing');
  var boxEl = document.getElementById('analysisBox');
  boxEl.classList.remove('show');
  loadEl.classList.add('show');

  var sysPrompt = '너는 미용 전문가 수준의 모발 색상 분석기야.\n사진 속 모발의 "보이는 색감"만 분석해. 멜라닌 레벨, 시술 이력, 탈색 여부, 시술 방향은 절대 판단하지 마.\n\n[절대 금지]\n- 멜라닌 레벨 숫자 판단 금지 (몇 레벨인지 추정하지 마)\n- "탈색 없이도 가능", "탈색이 필요" 등 시술 방향 언급 금지\n- "버진모에서도 연출 가능" 같은 실현 가능성 판단 금지\n- 시술 방법, 염모제, 산화제 등 시술 관련 언급 일체 금지\n\n[해야 할 것]\n- 색감명을 감성적이고 전문적으로 네이밍\n- 투명감, 채도, 뉘앙스, 언더톤, 질감, 빛에 따른 변화 등 순수하게 "보이는 색감"만 묘사\n- 디자이너가 읽었을 때 "아 이 색감이구나" 하고 바로 감이 오게\n\n아래 JSON 형식으로만 응답해. 다른 텍스트 없이 순수 JSON만.\n\n{\n  "color_name_ko": "한국어 색감명 (예: 쿨 애쉬베이지, 골드블론드, 밀크티 브라운 등)",\n  "tone": "cool" 또는 "warm" 또는 "neutral",\n  "hex": "#RRGGBB 대표 색상 코드",\n  "description": "이 색감에 대한 감성적이고 전문적인 묘사 2~3문장. 투명감, 채도, 뉘앙스, 언더톤, 빛 반사 느낌 등. 시술 방법이나 가능성은 절대 언급하지 마."\n}';

  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 500,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
          { type: 'text', text: '이 사진 속 모발의 색감을 분석해줘.' }
        ]
      }],
      system: sysPrompt
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    loadEl.classList.remove('show');
    try {
      var txt = data.content.map(function(b){ return b.text||''; }).join('');
      txt = txt.replace(/```json|```/g,'').trim();
      var result = JSON.parse(txt);
      ST.analysis = result;
      showAnalysis(result);
    } catch(e) {
      boxEl.innerHTML = '<div class="analysis-label">분석 실패</div><div class="analysis-desc">사진을 다시 업로드해주세요. 모발이 잘 보이는 사진이면 더 정확해요.</div>';
      boxEl.classList.add('show');
    }
  })
  .catch(function(err){
    loadEl.classList.remove('show');
    boxEl.innerHTML = '<div class="analysis-label">연결 오류</div><div class="analysis-desc">네트워크를 확인해주세요.</div>';
    boxEl.classList.add('show');
  });
}

function showAnalysis(result){
  var box = document.getElementById('analysisBox');
  document.getElementById('analysisSwatch').style.background = result.hex || '#ccc';
  document.getElementById('analysisName').textContent = result.color_name_ko || '—';
  document.getElementById('analysisLevel').textContent = (result.tone==='cool'?'한색(쿨) 계열':result.tone==='warm'?'난색(웜) 계열':'뉴트럴 계열');
  document.getElementById('analysisDesc').textContent = result.description || '';
  box.classList.add('show');

  // STEP 2 표시
  setTimeout(function(){
    document.getElementById('step2Wrap').classList.add('show');
  }, 300);
}

/* 존 데이터: 레벨별 색상 + 가이드 텍스트 (위→아래 = 20→8) */
var ZONE_DATA = [
  {lv:20, cool:'#bbaea3', warm:'#bbaa9e', coolGuide:'미색',        warmGuide:'아이보리'},
  {lv:18, cool:'#c6b9ac', warm:'#c3b2a6', coolGuide:'아이보리',    warmGuide:'연노랑'},
  {lv:16, cool:'#b39777', warm:'#d9b586', coolGuide:'매트~노랑',   warmGuide:'노랑~주황'},
  {lv:14, cool:'#b28357', warm:'#c1753d', coolGuide:'매트~노랑 잔류', warmGuide:'주황~노랑'},
  {lv:12, cool:'#b0733f', warm:'#aa461f', coolGuide:'뉴트럴브라운', warmGuide:'주황'},
  {lv:10, cool:'#956446', warm:'#6e2019', coolGuide:'뉴트럴브라운', warmGuide:'레드'},
  {lv:8,  cool:'#3d1609', warm:'#420e0e', coolGuide:'뉴트럴브라운', warmGuide:'레드'}
];

function selectType(btn){
  document.querySelectorAll('[data-type]').forEach(function(b){ b.classList.remove('selected'); });
  btn.classList.add('selected');
  ST.type = btn.dataset.type;

  if(ST.type === 'virgin'){
    document.getElementById('undertoneWrap').style.display = 'none';
    ST.level = 5;
    ST.toneSide = 'warm';
    ST.residue = 'none';
  } else {
    document.getElementById('undertoneWrap').style.display = 'block';
    ST.level = null;
    ST.toneSide = null;
    ST.residue = 'none';
    document.getElementById('utSelectBtn').style.display = 'flex';
    document.getElementById('utResult').style.display = 'none';
  }
  checkReady();
}

function openUndertoneModal(){
  var modal = document.getElementById('utModal');
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  buildZones();
}

function closeUndertoneModal(){
  document.getElementById('utModal').style.display = 'none';
  document.body.style.overflow = '';
}

function buildZones(){
  var container = document.getElementById('utModalZones');
  container.innerHTML = '';
  ZONE_DATA.forEach(function(z){
    var row = document.createElement('div');
    row.className = 'ut-zone';

    var coolHalf = document.createElement('div');
    coolHalf.className = 'ut-zone-half';
    coolHalf.setAttribute('data-lv', z.lv);
    coolHalf.setAttribute('data-side', 'cool');
    coolHalf.innerHTML = '<span class="ut-zone-num">' + z.lv + '</span><span class="ut-zone-guide">' + z.coolGuide + '</span>';
    coolHalf.onclick = function(){ pickZone(z.lv, 'cool', z.cool, z.coolGuide, coolHalf); };

    var warmHalf = document.createElement('div');
    warmHalf.className = 'ut-zone-half';
    warmHalf.setAttribute('data-lv', z.lv);
    warmHalf.setAttribute('data-side', 'warm');
    warmHalf.innerHTML = '<span class="ut-zone-num">' + z.lv + '</span><span class="ut-zone-guide">' + z.warmGuide + '</span>';
    warmHalf.onclick = function(){ pickZone(z.lv, 'warm', z.warm, z.warmGuide, warmHalf); };

    row.appendChild(coolHalf);
    row.appendChild(warmHalf);
    container.appendChild(row);
  });
}

function pickZone(lv, side, hex, guide, el){
  ST.level = lv;
  ST.toneSide = side;

  // 하이라이트 초기화 후 선택된 것만 표시
  document.querySelectorAll('.ut-zone-half').forEach(function(h){ h.classList.remove('picked'); });
  el.classList.add('picked');

  // 결과 표시
  document.getElementById('utSelectBtn').style.display = 'none';
  var result = document.getElementById('utResult');
  result.style.display = 'flex';
  document.getElementById('utResultSwatch').style.background = hex;
  document.getElementById('utResultLevel').textContent = lv + '레벨 · ' + guide;
  document.getElementById('utResultTone').textContent = (side === 'cool' ? '한색 언더톤' : '난색 언더톤');

  closeUndertoneModal();
  checkReady();
}

function checkReady(){
  var ready = ST.analysis && ST.type;

  if(ST.type === 'virgin'){
    ready = true && ST.analysis;
  } else {
    ready = ST.analysis && ST.level && ST.toneSide;
  }

  var btn = document.getElementById('recipeBtn');
  if(ready){
    btn.classList.add('show');
    btn.disabled = false;
  } else {
    btn.disabled = true;
  }
}

   STEP 3: 레시피 생성
══════════════════════════════════ */
function generateRecipe(){
  var btn = document.getElementById('recipeBtn');
  btn.disabled = true;
  btn.textContent = '레시피 생성 중...';

  // 현재 베이스 → G() 매칭용 구간 변환
  var curZone = levelToZone(ST.level);
  var tarColor = analysisToColor(ST.analysis);

  // TODO: G() 룰매트릭스 매칭 시도 (추후 melanin_level.html의 GUIDE 데이터 연동)
  // 지금은 전부 API 생성으로 처리

  generateRecipeAPI();
}

function levelToZone(lv){
  if(lv <= 8) return 'low';
  if(lv <= 14) return 'mid';
  if(lv <= 16) return '16';
  if(lv <= 18) return '18';
  return '20';
}

function analysisToColor(a){
  var name = (a.color_name_ko || '').toLowerCase();
  if(name.indexOf('블루')>=0) return 'blue';
  if(name.indexOf('애쉬')>=0) return 'ash';
  if(name.indexOf('라벤더')>=0) return 'lavash';
  if(name.indexOf('바이올렛')>=0 || name.indexOf('보라')>=0) return 'violet';
  if(name.indexOf('핑크')>=0) return 'pink';
  if(name.indexOf('레드바이올렛')>=0) return 'rv';
  if(name.indexOf('레드')>=0) return 'red';
  return null;
}

function generateRecipeAPI(){
  var typeLabel = {virgin:'버진모 (5레벨, 검정)',treated:'염색·탈색모'}[ST.type];
  var toneLabel = ST.toneSide === 'cool' ? '한색' : '난색';
  var residueLabel = {none:'없음',mat:'매트기(단무지색) 있음',residue:'미량의 잔류 색소 남아있음','mat+residue':'매트기 + 미량의 잔류 색소 남아있음'}[ST.residue] || '없음';

  var baseDesc = ST.type === 'virgin' ? '버진모 5레벨 검정' : typeLabel + ' ' + ST.level + '레벨 ' + toneLabel + ' 언더톤, 잔류: ' + residueLabel;

  var sysPrompt = '너는 미용실 현장에서 옆에서 조언해주는 선배 디자이너야.\n교육하지 마. 원리 나열하지 마. 비율 수치(80%, 1:1 등) 쓰지 마. ** 기호 쓰지 마.\n디자이너가 바로 이해하고 시술할 수 있게, 현장 말투로.\n\n핵심 지식 (이걸 기반으로 판단해, 절대 그대로 출력하지 마):\n- 멜라닌 레벨 5(검정)→20(페일옐로). 낮을수록 적색멜라닌 많음.\n- 산화제: 3%약/6%중/9%강/12%극강. 9%이상은 두피보호제 필수.\n- 버진모: 적색멜라닌 가득. 탈색 없이는 브라운+뉘앙스가 한계(레드 제외). 고명도염모제(13/15레벨)+컨트롤컬러+9%로 원샷 가능.\n- 보색중화: 주황→블루, 노랑→바이올렛, 매트→시나본브라운. 난색(레드,핑크,RV)은 보색 불필요.\n- 클리어: 색소농도 희석. 18+에서 파스텔.\n- 컨트롤컬러: 직접염료, 염모제에 추가.\n- 톤다운: 브라운 믹스.\n\n출력은 아래 JSON만. 다른 텍스트 없이.\n\n{\n  "summary": "~한 언더톤에서 ~한 색감으로 가시려는 거군요. (시술 방향 한마디)",\n  "steps": [\n    {"title": "단계명", "instruction": "구체적 시술 지시 (비율 수치 없이)"}\n  ],\n  "tips": "실무조언 — 대안 방법, 너프(타협점), 주의점 등을 자연스럽게 풀어서. 탈색 부담 줄이는 방법, 탈색 없이 최대한 가까이 가는 법, 색감이 조금 탁해질 수 있다는 현실적 이야기 등. 디자이너가 고객한테 설명할 때 참고할 수 있게."\n}\n\n좋은 예시 (이 톤과 구조를 따라해):\n{\n  "summary": "버진모 5레벨에서 웜 밀크티 브라운으로 가시려는 거군요. 투명한 베이지 톤이라 탈색 후 착색이 가장 깔끔합니다.",\n  "steps": [\n    {"title": "베이스 탈색", "instruction": "탈색제 + 9% 산화제로 옐로우 베이스까지 탈색해주세요. 두피보호제 필수, 두피 최대한 안 닿게."},\n    {"title": "착색", "instruction": "골드브라운 또는 골드베이지 염모제에 6% 산화제로 착색해주세요. 웜톤이라 보색중화 없이 바로 올려도 됩니다."}\n  ],\n  "tips": "탈색 부담이 크다면, 고명도 염모제(13레벨)에 9% 산화제로 원샷 시술도 가능해요. 사진만큼 투명하진 않고 좀 더 묵직한 웜브라운으로 빠질 수 있는데, 버진모에서 탈색 없이 갈 수 있는 최대치예요. 고객한테 차이를 미리 설명해주시면 좋습니다. 모발이 굵고 강하면 12% 산화제도 고려해볼 수 있는데 손상 주의하세요."\n}';

  var userMsg = '현재 모발: ' + baseDesc + '\n목표 색감: ' + ST.analysis.color_name_ko + ' (' + ST.analysis.tone + ' 계열)\n목표 색감 설명: ' + ST.analysis.description + '\n\n이 모발에서 목표 색감까지 가는 시술 레시피를 만들어줘.';

  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: sysPrompt,
      messages: [{ role: 'user', content: userMsg }]
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    try {
      var txt = data.content.map(function(b){ return b.text||''; }).join('');
      txt = txt.replace(/```json|```/g,'').trim();
      var recipe = JSON.parse(txt);
      showRecipe(recipe, 'ai');
    } catch(e) {
      showRecipeError();
    }
  })
  .catch(function(err){
    showRecipeError();
  });
}

function showRecipe(recipe, source){
  var btn = document.getElementById('recipeBtn');
  btn.style.display = 'none';

  // 소스 태그
  var srcEl = document.getElementById('recipeSource');
  if(source === 'matrix'){
    srcEl.innerHTML = '<span class="source-tag matrix">검증된 룰매트릭스</span>';
  } else {
    srcEl.innerHTML = '<span class="source-tag ai">AI 원리 기반 생성</span>';
  }

  // 써머리 헤더
  var hdr = document.getElementById('recipeHeader');
  hdr.innerHTML = '<div class="recipe-from-to">' + (recipe.summary || '') + '</div>';

  // 시술 단계
  var body = document.getElementById('recipeBody');
  var html = '';
  recipe.steps.forEach(function(s, i){
    html += '<div class="recipe-step">';
    html += '<div class="recipe-step-num">STEP ' + (i+1) + ' · ' + s.title + '</div>';
    html += '<div class="recipe-step-text">' + s.instruction + '</div>';
    html += '</div>';
  });

  // 실무조언
  if(recipe.tips){
    html += '<div class="recipe-tips"><div class="recipe-tips-title">💡 실무조언</div><div class="recipe-tips-text">' + recipe.tips + '</div></div>';
  }

  body.innerHTML = html;

  // 표시
  document.getElementById('recipeWrap').classList.add('show');
  document.getElementById('resetBtn').classList.add('show');

  // 스크롤
  setTimeout(function(){
    document.getElementById('recipeWrap').scrollIntoView({behavior:'smooth', block:'start'});
  }, 200);
}

function showRecipeError(){
  var btn = document.getElementById('recipeBtn');
  btn.disabled = false;
  btn.textContent = '레시피 생성';
  alert('레시피 생성에 실패했어요. 다시 시도해주세요.');
}
