<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>AI 컬러 레시피</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Noto Sans KR',sans-serif;background:#FAFAF7;color:#1C1917;min-height:100dvh;overflow-x:hidden}
input,select,textarea{font-size:16px!important;-webkit-appearance:none;font-family:inherit}

.app{width:100%;max-width:430px;margin:0 auto;min-height:100dvh;background:#FAFAF7}
@media(min-width:431px){.app{border-left:1px solid #e8e4df;border-right:1px solid #e8e4df}}

/* 헤더 */
.page-header{display:flex;align-items:center;gap:12px;padding:14px 16px;position:sticky;top:0;z-index:100;background:rgba(250,250,247,0.92);backdrop-filter:blur(12px);border-bottom:1px solid #e8e4df}
.back-btn{width:34px;height:34px;border-radius:12px;border:1.5px solid #e8e4df;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.back-btn svg{color:#A8A29E}
.page-header h2{font-size:16px;font-weight:800;color:#1C1917;margin:0}
.page-header .sub{font-size:11px;color:#A8A29E;margin-top:2px}

/* 카드 */
.card{background:#fff;border-radius:16px;border:1.5px solid #e8e4df;padding:20px;margin:0 16px 12px}
.card-title{font-size:13px;font-weight:700;color:#1C1917;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.card-title .badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;background:#D4B89620;color:#8B7355}

/* STEP 1: 사진 업로드 */
.upload-zone{border:2px dashed #d5cfc7;border-radius:14px;padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#FAF8F4}
.upload-zone:active{border-color:#C4A97A;background:#D4B89608}
.upload-zone.has-image{border:none;padding:0;background:none}
.upload-zone .icon{margin-bottom:8px;color:#C4B5A0;display:flex;justify-content:center}
.upload-zone .txt{font-size:13px;color:#A8A29E;line-height:1.6}
.upload-zone .txt b{color:#8B7355;font-weight:600}
.upload-preview{width:100%;border-radius:14px;display:block;object-fit:cover;max-height:280px}

/* 분석 결과 */
.analysis-box{background:linear-gradient(135deg,#FAF6F0,#F5EDE2);border-radius:14px;padding:16px;margin-top:12px;display:none}
.analysis-box.show{display:block;animation:fadeUp .4s ease}
.analysis-label{font-size:10px;font-weight:700;color:#8B7355;letter-spacing:0.5px;margin-bottom:8px}
.analysis-color-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.analysis-swatch{width:36px;height:36px;border-radius:10px;border:1.5px solid rgba(0,0,0,0.08);flex-shrink:0}
.analysis-color-name{font-size:15px;font-weight:700;color:#1C1917}
.analysis-color-level{font-size:12px;color:#A8A29E;margin-top:2px}
.analysis-desc{font-size:13px;color:#6B5D4E;line-height:1.7;margin-top:8px}

/* 분석 중 로딩 */
.analyzing{text-align:center;padding:24px;display:none}
.analyzing.show{display:block}
.analyzing .spinner{width:28px;height:28px;border:3px solid #e8e4df;border-top-color:#C4A97A;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
.analyzing .txt{font-size:13px;color:#A8A29E}

/* 레시피 요청 버튼 */
.recipe-btn{width:calc(100% - 32px);margin:8px 16px 16px;padding:16px;border-radius:14px;border:none;background:#1C1917;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;display:none}
.recipe-btn.show{display:block;animation:fadeUp .3s ease}
.recipe-btn:active{transform:scale(0.98);opacity:0.9}
.recipe-btn:disabled{opacity:0.4;cursor:not-allowed}

/* STEP 3: 레시피 결과 */
.recipe-wrap{display:none;animation:fadeUp .4s ease}
.recipe-wrap.show{display:block}
.recipe-header{background:linear-gradient(135deg,#FAF6F0,#F0E6D8);border-radius:14px;padding:16px;margin-bottom:12px}
.recipe-from-to{font-size:14px;font-weight:600;color:#1C1917;line-height:1.7}
.recipe-from-to .highlight{color:#8B7355;font-weight:700}
.recipe-body{background:#fff;border-radius:14px;border:1.5px solid #e8e4df;padding:16px}

.recipe-tips{background:#FBF7F1;border:1px solid #EDE6DA;border-radius:10px;padding:14px}
.recipe-tips-title{font-size:13px;font-weight:700;color:#8B7355;margin-bottom:6px}
.recipe-tips-text{font-size:13px;color:#6B5D4E;line-height:1.9;white-space:pre-line}
.recipe-tips-text .base-label{font-size:14px;font-weight:700;color:#1C1917;display:block;margin-top:4px}
.recipe-tips-text .mix-label{font-weight:600;color:#8B7355}
.recipe-summary-note{font-size:12px;color:#8B7355;margin-top:8px;line-height:1.6;background:#FFF8E7;border-radius:8px;padding:10px 12px;font-weight:500}
.recipe-virgin-box{background:#FAF6F0;border:1px solid #EDE6DA;border-radius:10px;padding:13px;margin-top:10px}
.recipe-virgin-title{font-size:12px;font-weight:700;color:#8B7355;margin-bottom:6px}
.recipe-virgin-text{font-size:12px;color:#6B5D4E;line-height:1.8}

/* source 표시 */
.source-tag{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;margin-bottom:8px}
.source-tag.ai{background:#D4B89620;color:#8B7355}

/* 다시하기 버튼 */
.reset-btn{width:calc(100% - 32px);margin:8px 16px 24px;padding:14px;border-radius:14px;border:1.5px solid #e8e4df;background:#fff;color:#A8A29E;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;display:none}
.reset-btn.show{display:block}
.reset-btn:active{transform:scale(0.98)}

/* 애니메이션 */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">

  <!-- 헤더 -->
  <div class="page-header">
    <a class="back-btn" href="./index.html">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </a>
    <div>
      <h2>AI 컬러 레시피</h2>
      <div class="sub">사진 분석 → 시술 레시피 자동 생성</div>
    </div>
  </div>

  <!-- STEP 1: 레퍼런스 사진 -->
  <div class="card" id="step1Card">
    <div class="card-title">
      원하는 컬러 사진
      <span class="badge">STEP 1</span>
    </div>
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <div class="icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>
      <div class="txt">고객이 원하는 헤어 컬러 사진을<br><b>탭하여 업로드</b>해주세요</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleUpload(this)"/>

    <!-- 분석 중 -->
    <div class="analyzing" id="analyzing">
      <div class="spinner"></div>
      <div class="txt">색감을 분석하고 있어요...</div>
    </div>

    <!-- 분석 결과 -->
    <div class="analysis-box" id="analysisBox">
      <div class="analysis-label">AI 분석 결과</div>
      <div class="analysis-color-row">
        <div class="analysis-swatch" id="analysisSwatch"></div>
        <div>
          <div class="analysis-color-name" id="analysisName">—</div>
          <div class="analysis-color-level" id="analysisLevel">—</div>
        </div>
      </div>
      <div class="analysis-desc" id="analysisDesc"></div>
      <div id="analysisTagWrap"></div>
    </div>
  </div>

  <!-- 레시피 생성 버튼 -->
  <button class="recipe-btn" id="recipeBtn" onclick="generateRecipe()" disabled>레시피 생성</button>

  <!-- STEP 2: 레시피 결과 -->
  <div class="recipe-wrap" id="recipeWrap">
    <div class="card">
      <div class="card-title">
        시술 레시피
        <span class="badge">STEP 2</span>
      </div>
      <div id="recipeSource"></div>
      <div class="recipe-header" id="recipeHeader"></div>
      <div class="recipe-body" id="recipeBody"></div>
    </div>
  </div>

  <!-- 다시하기 -->
  <button class="reset-btn" id="resetBtn" onclick="resetAll()">처음부터 다시하기</button>

  <div style="height:40px"></div>
</div>

<script>
/* ══════════════════════════════════
   STATE — guide-data.js 의존성 제거
══════════════════════════════════ */
var ST = {
  imageBase64: null,
  imageMediaType: null,
  analysis: null
};

var API_URL = '/api/recipe';

/* ══════════════════════════════════════════════════════════
   STEP 3 프롬프트 v15 — 4레이어 재구조화
   [0] 역할+사고순서 → [D] 판단절차 → [K] 지식 → [O] 출력 → [G] 가드레일
══════════════════════════════════════════════════════════ */
function buildTopInstruction(tp,bd){return['너는 15년차 동양인 모발 전문 컬러리스트야.','AI가 분석한 목표 색감을 보고, 동양인 모발에서 이 색감을 구현하려면 어떻게 해야 하는지 역추론해.','아래 컬러리스트 지식을 바탕으로 사고하되, 레시피는 네가 추론해서 만들어.','','■ 사고 순서 (반드시 이 순서로):','① 목표 색감 파악 — color_name_ko, tone, recipe_direction 읽기','② 탈색 필요 여부 — [D1] 판단 절차로 "버진모 가능 vs 탈색 필수" 결정','③ 필요 베이스 레벨 — [D2] 판단 절차로 "탈색 몇 회가 필요한가" 결정','④ 염모제 조합 추론 — [D3] 판단 절차 + [K] 지식 참조하여 조합 결정','⑤ 대안 베이스 추론 — [D4] 판단 절차로 한 단계 아래 베이스의 수렴 방향과 최선 조합','⑥ 출력 — [O] 출력 규칙에 맞춰 JSON 조립. [G] 가드레일 체크 후 출력.'].join('\n');}
var DECISION_NATURAL=['══════════════════════════════','[D] 판단 절차 — 자연모','══════════════════════════════','','=== [D1] 탈색 필요 여부 ===','','■ 핵심 질문: "이 색감은 버진모(5레벨, 적색 멜라닌 가득)에서 가능한가?"','','버진모에서 가능한 색감:','- 한색 방향 → 쿨브라운, 매트브라운, 애쉬브라운 등 (브라운으로 수렴되는 결과가 곧 색감)','- 난색 방향 → 레드브라운, 로즈브라운, 와인빛 브라운, 블랙커런트 (적색 멜라닌과 같은 계열)','','탈색 필수인 색감:','- 투명감 + 선명함이 동시에 필요한 색감','- 잿빛·무채색이 투명하게 발색되어야 하는 색감','- 파스텔, 블론드, 베이지 등 가벼운 색감','','★ 경계 색감 판단 (애쉬브라운, 초코브라운, 쿨브라운 등):','이 색감들은 버진모~탈색 1회 경계에 있다. 조명·촬영 환경에 따라 버진모 시술인지 기염모 재시술인지 구분이 어렵다.','요즘 사진은 버진모에 애쉬 입히고 밝은 조명으로 투명감을 극대화하는 경우가 매우 많다.','→ 이런 색감은 "경계 색감"으로 판단하고 [O3]의 "경계 색감" 출력 포맷을 사용하라.','→ 경계 색감을 "애쉬 베이지"로 오판하여 탈색 3회를 추천하지 마라. 브라운 계열은 베이지가 아니다. [K13] 참조.','','★ 사진의 명도가 낮아 보여도, 한색 계열에서 브라운기 없이 무채색(잿빛·회색·블루)이 투명하게 발색되어 있으면 → 탈색 후 입힌 색감이다.','동양인 버진모의 적색 멜라닌으로는 이런 무채색 투명 발색이 나올 수 없다.','단, 투명감 없이 스모키하기만 한 어두운 한색은 탈색 1회 후에도 표현 가능하다.','★ hex가 어두워도 색감명과 elements에 잿빛·투명감·무채색이 있으면 탈색 필수로 판단하라.','체감 명도가 낮다고 탈색 횟수를 줄이지 마라. 탈색 횟수는 "이 색감을 만들려면 어떤 베이스가 필요한가"로 판단하라.','','버진모에 한색 염모제를 올리면 왜 브라운으로 수렴하는가:','- 고명도 염모제가 적색 멜라닌을 어느 정도 깨면서 리프팅','- 깨진 자리에 노랑기가 드러남','- 염모제의 염료가 이 노랑기를 중화하는 데 소진됨','- 결국 색감 표현에 쓸 염료가 부족 → 적빛 없는 브라운으로 수렴','','난색(레드, 핑크)은 적색 멜라닌과 같은 계열이라 소진 없이 발색.','','→ 버진모 가능이면 [D3]으로. 탈색 필수이면 [D2]로. 경계 색감이면 [D3] 후 [O3] 경계 색감 포맷으로.','','=== [D2] 필요 베이스 레벨 결정 ===','','■ 핵심 질문: "잔류 색소가 이 색감에서 활용되는가, 방해되는가?"','','■ 1회 vs 2회 — 주황기·브라운이 방해되는가:','탈색 1회(주황~노랑 14레벨 베이스)로 충분한 색감: 잔류 주황기·브라운이 색감의 일부로 활용되는 한색. 매트 애쉬, 올리브 애쉬, 애쉬 브라운, 카키 브라운 등.','탈색 2회(노랑 베이스) 필요한 색감: 잔류 주황기·브라운이 색감을 오염시키는 한색. 애쉬 그레이, 네이비 등.','★ 같은 계열명이라도 투명감·파스텔이 동반되면 잔류 색소가 방해된다. 판단 기준은 계열명이 아니라 "브라운기가 남아도 되는가"이다.','','■ 2회 vs 3회 — 노랑기가 방해되는가:','탈색 2회(노랑 베이스)로 충분한 색감: 노랑기가 보색(바이올렛)으로 잡히면서 색감에 녹아드는 경우. 애쉬 그레이, 네이비 등.','탈색 3회 이상 필요한 색감: 노랑기조차 색감을 오염시키는 경우. 파스텔, 실버, 밀크티 베이지, 라벤더 애쉬 등.','','→ 베이스 레벨이 결정되면 [D3]으로.','','=== [D3] 염모제 조합 추론 ===','','■ 추론 순서:','1. 보색 결정 → [K5] 보색 매칭표 참조.','2. 메인 염모제 계열 → color_name_ko와 recipe_direction 중심으로. [K9], [K11] 참조.','3. 뉘앙스 보조 → 컨트롤컬러 또는 보조 염모제로 미세 조절.','','★ 극고명도 색감(블론드, 백금발, 화이트 등)에서는 [K7] 극고명도 베이스 원리를 우선 적용하라.','블론드의 핵심은 염료 최소화이다. 애쉬를 메인으로 쓰면 회색이 되지 블론드가 아니다.','','→ 조합이 결정되면 [D4]로.','','=== [D4] 대안 베이스 수렴 추론 ===','','최적 베이스보다 한 단계 아래 레벨에서의 수렴 방향을 추론한다.','\"한 단계 아래\"는 [K3] 레벨 체계에서 바로 다음 단계. 예: 18→16, 16→14. 두 단계 이상 건너뛰지 마라.','파트A: 블록①의 레시피를 이 베이스에 그대로 적용하면 어떤 방향으로 빠지는지 1문장.','파트B: 이 베이스에서 조합을 바꾸면 어떤 색감까지 도달 가능한지 제시. \"이 베이스에서의 최선입니다\"로 마무리.','★ 최적 베이스와 리스크 베이스는 색감에 따라 네가 추론하라. 고정값이 아니다.'].join('\n');



var KNOWLEDGE_V15=['══════════════════════════════','[K] 지식 사전 — 판단 시 참조','══════════════════════════════','','=== [K1] 헤어 컬러의 기본 공식 ===','','헤어컬러 = 언더(사전상태 모발) + 틴트(염모제 염료)','★ 같은 염모제 조합이라도 언더(베이스)에 따라 결과가 완전히 다르다.','- 탈색 후 베이스(멜라닌 제거됨) → 염모제 색이 거의 그대로 발색','- 버진모(멜라닌 가득) → 염모제가 멜라닌과 충돌하여 브라운으로 수렴','','=== [K2] 색의 3속성 / 보색 / 파워 ===','','색상(Hue) / 명도(Value): 레벨 1~20 / 채도(Chroma): 비비드↔덜','1차색: 빨강, 파랑, 노랑 / 2차색: 주황, 보라, 초록','보색: 주황↔블루 / 노랑↔바이올렛 / 빨강↔그린','파워: 노랑(약)→주황→빨강/초록→파랑→보라→검정(강)','- 노랑 잔류 → 바이올렛이 맞다 / 노랑에 블루 → 매트하게 빠진다','- 주황 잔류 → 블루가 맞다 / 난색은 적색 멜라닌과 같은 계열 → 충돌 없이 발색','','=== [K3] 동양인 모발 — 레벨별 언더톤 ===','','5: 적색(검붉은색) / 8~10: 적갈색~주황','12: 주황 — 버진모에서 고명도 염모제+산화제로 도달 가능한 상한. 적색 멜라닌 잔류가 강해 한색은 브라운으로 수렴.','14: 주황~노랑(탈색 1회 도달) — 주황기가 남아있다. 한색 염료→주황기에 소진→브라운 수렴. 수렴이 어울리는 색감은 가능, 투명한 색감은 불가.','16: 노랑 — 바이올렛으로 노랑기 보색 가능. 보라빛이 핵심인 색감은 18+.','18: 연노랑 — 잔류 거의 없음. 염료 그대로 발색. / 20: 아이보리 — 잔류 없음.','','=== [K4] 탈색 횟수→도달 레벨표 ===','','적색→적갈색→주황→주황~노랑→노랑→연노랑→아이보리 순서로 멜라닌이 빠진다.','1회→14(주황~노랑) / 2회 이상→16(노랑) / 3회 이상→18~20(연노랑~아이보리)','탈색 없이: 고명도 염모제+산화제→최대 12레벨까지 리프팅 가능. 그러나 멜라닌이 남아있어 브라운 수렴. 난색은 소진 없이 발색.','','=== [K5] 보색 매칭표 + 파워 매칭 원리 ===','','주황 잔류→블루 소량 / 노랑 잔류→바이올렛 소량 (블루 쓰면 매트!) / 연노랑~아이보리→불필요 / 난색→불필요','★ 보색은 메인 조합에 소량 믹스하여 한 번에 시술.','★ 파워 매칭: 잔류 강→보색도 강(바이올렛,블루). 잔류 약→보색도 약(연핑크 소량,바이올렛 극소량).','예: 연노랑에 바이올렛 충분히→보라빛 남음. 연핑크 소량→백금발 방향.','','=== [K6] 염모제 vs 컨트롤컬러 도구 특성 ===','','■ 염모제: 리프팅+착색 동시. 코르텍스 침투. 명도 높을수록 리프팅력 강함. 버진모에서는 염료 소진→색 표현 한계.','■ 컨트롤컬러: 리프팅 없음. 색만 입힘. 큐티클 쪽. 염료 많음. 버진모에서는 염모제가 리프팅하고 컨트롤컬러가 색 입힘.','■ 탈색모 명도 선택: 고명도(13·15)→염료 적어 약함 / 중명도(9·11)→과하게 들어감 / 파스텔→중명도+클리어 희석.','■ 탈색모 조합 자유도: 18+에서는 염모제+염모제, 염모제+컨트롤컬러 모두 가능.','','=== [K7] 극고명도 베이스(18+) 원리 ===','','잔류 거의 없어 염료 그대로 발색. \"미세하게 조절하는\" 접근.','고명도(13·15)=염료 적어 적절. 중명도(9·11)=과함.','백금발: 고명도(13·15레벨) 뉴트럴브라운 염모제+연핑크 컨트롤컬러 극소량+클리어 추가 희석. 애쉬 메인→회색 빠짐. 극고명도 베이스에서는 염료가 적어도 과할 수 있으므로 10분 간격으로 발색을 체크하며 시술한다.','잿빛 블론드: 고명도 애쉬로 뉘앙스만. / 파스텔: 중명도+클리어 희석.','','=== [K8] 베이지 계열의 원리 ===','','베이지는 브라운보다 밝고 가벼운 색감이다. 깨끗한 베이스(18레벨 이상)에서 메인 색감 계열을 살짝 입히고, 뉴트럴브라운 염모제를 보조로 더해 베이지 톤을 완성한다.','★ 베이지 조합에서 메인은 항상 색감 계열(애쉬, 핑크, 바이올렛 등)이다. 뉴트럴브라운은 베이지 뉘앙스를 잡아주는 보조 역할이다.','- 애쉬 베이지: 애쉬 염모제가 메인 + 뉴트럴브라운 염모제 보조','- 밀크티 베이지: 뉴트럴브라운 염모제가 메인 + 애쉬 염모제 보조 (밀크티는 브라운 자체가 색감이므로 예외)','- 라벤더 베이지: 바이올렛 염모제가 메인 + 뉴트럴브라운 염모제 보조','- 핑크 베이지 / 로즈 핑크 베이지: 핑크 염모제가 메인 + 뉴트럴브라운 염모제 보조','★ 메인 색감 없이 뉴트럴브라운만 쓰면 베이지가 아니라 브라운으로 빠진다.','','=== [K9] 염모제 계열 체계 ===','','[명도]-[계열] 구조.','계열: NB(갈색) / A(잿빛) / BA(파란빛) / G(초록) / V(보라) / R(빨강) / RV(자주) / P(분홍) / Y(노랑) / O(주황) / K(카키·올리브빛) / AK(애쉬카키·잿빛+올리브빛) / 클리어(희석)','★ \"올리브\"는 계열명이 아니다. 올리브빛 색감은 반드시 K(카키) 또는 AK(애쉬카키) 계열 염모제로 표기하라. \"올리브 염모제\" 금지.','명도: 5~7 저 / 9~11 중 / 13~15 고(리프팅)','★ 레시피에서 고명도 염모제를 언급할 때 \"13레벨\" 또는 \"15레벨\"로 특정하지 마라. 반드시 \"고명도(13·15레벨)\"로 묶어서 표기하라. 제조사마다 명도 체계가 다르다.','컨트롤컬러 종류: 한색(블루,애쉬,그린,바이올렛) / 난색(레드,핑크,바이올렛)','★ 뉴트럴브라운(NB)은 염모제 계열이다. 컨트롤컬러가 아니다.','바이올렛=중성색. 적보라(RV방향)=난색. 청보라=한색. 버진모에서 보라→RV 방향이 현실적.','RV=중성색+붉은기. 순수 레드→빨강일뿐. RV가 보라빛 베이스를 깔고 컨트롤컬러로 최종 뉘앙스.','','=== [K10] 버진모 테크닉 — 원리와 한계 ===','','원리: 고명도 염모제+산화제(9%/12%)→멜라닌 리프팅(최대 12레벨까지)→노랑기 드러남→컨트롤컬러 염료도 노랑기 중화에 소진→브라운 수렴.','절대 한계: 한색→쿨/매트브라운 / 난색→레드/로즈/와인빛 브라운.','★ 버진모 레시피에서 목표 색감명을 따라가면 안 된다. \"라벤더 방향\", \"실버 방향\" 금지.','','한색 조합(고명도 애쉬 기준): +블루 컨트롤컬러→애쉬브라운 / +블루+바이올렛 컨트롤컬러→투명 쿨브라운 / +애쉬 컨트롤컬러→애쉬브라운','AK 기준: +애쉬 컨트롤컬러→올리브 애쉬 브라운(매트+잿빛) / +그린 컨트롤컬러→매트브라운 / 카키 염모제+애쉬 컨트롤컬러→매트애쉬브라운','★ 올리브빛 색감(올리브 애쉬, 올리브 브라운 등)은 AK(애쉬카키) 또는 K(카키) 염모제를 사용하라. \"올리브 염모제\"라는 계열은 없다.','★ 와인빛·퍼플브라운 → 난색(RV) 방향.','','난색 원리: 적색 멜라닌과 충돌 안 함→컨트롤컬러 뉘앙스 살아남. 잔류 브라운이 색감의 일부.','선명한 레드=R메인 / 와인=V메인 / 로즈=V핵심+R보조 / 체리와인=R+V.','','=== [K11] 조합→결과 참고 맵 ===','','참고용. 원리로 추론하되 참고.','■ 연노랑~아이보리(18~20): 뉴트럴브라운+A소량→밀크티 / 뉴트럴브라운+V소량→라벤더베이지 / A+G소량→매트베이지 / A+뉴트럴브라운소량→애쉬베이지 / A단독→애쉬그레이 / A+블루소량→실버애쉬 / V+A소량→라벤더애쉬 / 핑크+클리어→파스텔핑크 / 연핑크→백금발','■ 노랑(16): V보색 필요. A+V소량→애쉬그레이 / V+A소량→라벤더(애쉬수렴) / 블루+V소량→네이비','■ 주황~노랑(14): 한색으로 투명한 색감 불가. R→레드브라운 / P→로즈브라운 / 블루→스모키애쉬브라운수렴 / AK+그린 컨트롤컬러 소량→올리브애쉬브라운 / BA+애쉬 컨트롤컬러→애쉬브라운','','=== [K12] 주의사항 ===','','라벤더=\"V에 A소량\"이 기본. \"A에 V\"은 애쉬그레이 방향.','밀크티/애쉬 베이지=warm 보여도 한색 조합 필수. 블론드/백모=18+ 필수.','','=== [K13] 경계 색감 — 애쉬브라운·초코브라운 등 ===','','애쉬브라운, 초코브라운, 쿨브라운 등은 버진모~탈색 1회 경계에 있는 색감이다.','사진 속 조명·밝기에 따라 버진모 시술인지, 기염모 재시술인지, 탈색 후 착색인지 구분이 어렵다.','','이런 색감의 시술 루트:','- 루트A(버진모/연모): 고명도(13·15레벨) 애쉬 염모제 + 애쉬 컨트롤컬러 + 산화제(9%/12%) → 시도해볼 만함. 쿨브라운~애쉬브라운으로 수렴.','- 루트B(리프트 후 착색): 고명도 염모제로 12레벨(적갈색~주황) 정도까지만 리프트 후 애쉬 착색 → 효과적. 기염모(8~12레벨 한색 염색 후 퇴색)에서 애쉬 재시술도 같은 원리.','','★ 버진모 톤업 시 고명도 애쉬 + 블루는 비효율적. 고명도 애쉬는 염료가 거의 없는데 블루까지 넣으면 색감을 주기보다 그냥 고명도 쿨브라운일 뿐. 톤업 과정에서는 멜라닌이 벗겨지면서 투명해지는 거지, 블루가 잿빛을 만드는 게 아니다. 버진모 톤업에는 고명도 애쉬 + 애쉬 컨트롤컬러가 맞다.','★ 이미 밝혀진 언더(주황·브라운 베이스)에서의 블루는 다르다. 잔류 주황·브라운을 블루가 억제하면서 스모키한 방향으로 변한다.','★ 14레벨은 주황~노랑 경계 구간이다. 이 베이스에서 블루를 올리면 애쉬·그레이·스모키·매트 중 어디로 빠질지 예측이 어렵다. 애쉬브라운·초코브라운을 노리고 탈색한다면 12레벨(적갈색~주황)에서 멈추는 게 안정적이다.','★ 이런 색감을 \"애쉬 베이지\"로 오판하여 탈색 3회를 추천하지 마라. 베이지와 브라운은 다르다. 브라운 계열 색감에 탈색 3회는 과잉 시술이다.'].join('\n');

   STEP 1: 사진 업로드 + AI 분석

function handleUpload(input){
  var file = input.files[0];
  if(!file) return;

  var MAX_SIZE = 1600;
  var MAX_BYTES = 1000000;
  var QUALITY_START = 0.9;
  var QUALITY_MIN = 0.7;
  var QUALITY_STEP = 0.05;

  var reader = new FileReader();
  reader.onload = function(e){
    var img = new Image();
    img.onload = function(){
      // 리사이즈 필요 여부 판단
      var w = img.width, h = img.height;
      if(w > MAX_SIZE || h > MAX_SIZE){
        if(w > h){ h = Math.round(h * MAX_SIZE / w); w = MAX_SIZE; }
        else { w = Math.round(w * MAX_SIZE / h); h = MAX_SIZE; }
      }

      // canvas로 리사이즈 + JPEG 압축
      var canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);

      var quality = QUALITY_START;
      var resizedFull = canvas.toDataURL('image/jpeg', quality);
      while(resizedFull.length * 0.75 > MAX_BYTES && quality > QUALITY_MIN){
        quality -= QUALITY_STEP;
        quality = Math.round(quality * 100) / 100;
        resizedFull = canvas.toDataURL('image/jpeg', quality);
      }
      var resizedData = resizedFull.split(',')[1];

      var zone = document.getElementById('uploadZone');
      zone.classList.add('has-image');
      zone.innerHTML = '<img class="upload-preview" src="'+resizedFull+'" alt="업로드 사진"/>';
      zone.onclick = null;

      ST.imageBase64 = resizedData;
      ST.imageMediaType = 'image/jpeg';

      analyzeImage(resizedData, 'image/jpeg');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

        content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
          { type: 'text', text: '이 사진 속 모발의 색감을 역공학 분석해줘.' }
        ]
      }],
      system: sysPrompt
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    loadEl.classList.remove('show');
    try {
      var txt = data.content.map(function(b){ return b.text||''; }).join('');
      txt = txt.replace(/```json|```/g,'').trim();
      var result = JSON.parse(txt);
      ST.analysis = result;
      showAnalysis(result);
    } catch(e) {
      boxEl.innerHTML = '<div class="analysis-label">분석 실패</div><div class="analysis-desc">사진을 다시 업로드해주세요. 모발이 잘 보이는 사진이면 더 정확해요.</div>';
      boxEl.classList.add('show');
    }
  })
  .catch(function(err){
    loadEl.classList.remove('show');
    boxEl.innerHTML = '<div class="analysis-label">연결 오류</div><div class="analysis-desc">네트워크를 확인해주세요.</div>';
    boxEl.classList.add('show');
  });
}

function showAnalysis(result){
  var box = document.getElementById('analysisBox');
  document.getElementById('analysisSwatch').style.background = result.hex || '#ccc';
  document.getElementById('analysisName').textContent = result.color_name_ko || '—';

  // 톤 표시
  var toneMap = {cool:'한색(쿨) 계열', warm:'난색(웜) 계열', neutral:'뉴트럴 계열'};
  document.getElementById('analysisLevel').textContent = toneMap[result.tone] || '—';

  document.getElementById('analysisDesc').textContent = result.description || '';

  // elements 태그 + recipe_direction 표시
  var tagWrap = document.getElementById('analysisTagWrap');
  var html = '';

  // elements 태그들
  if(result.elements && result.elements.length > 0){
    html += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:10px">';
    result.elements.forEach(function(el){
      html += '<span style="font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;background:#D4B89618;color:#8B7355">' + el + '</span>';
    });
    html += '</div>';
  }

  // recipe_direction
  if(result.recipe_direction){
    html += '<div style="margin-top:10px;padding:10px 12px;border-radius:8px;background:rgba(26,24,20,0.04);font-size:12px;color:#555;line-height:1.6">';
    html += '<span style="font-weight:700;color:#1A1814">조색 방향</span> · ' + result.recipe_direction;
    html += '</div>';
  }

  tagWrap.innerHTML = html;

  box.classList.add('show');

  setTimeout(function(){
    var btn = document.getElementById('recipeBtn');
    btn.classList.add('show');
    btn.disabled = false;
  }, 300);
}

/* ══════════════════════════════════
   STEP 2: 레시피 생성 — 자연모 고정
══════════════════════════════════ */
function generateRecipe(){
  var btn = document.getElementById('recipeBtn');
  btn.disabled = true;
  btn.textContent = '레시피 생성 중...';

  var baseDesc = '자연모/염색모 (동양인, 적색멜라닌 가득, 탈색 이력 없음, 약 5레벨)';

  /* ── STEP 2 레시피 프롬프트 (v15 — 4레이어 재구조화) ── */
  var sysPrompt = buildStep3Prompt('natural', baseDesc, null);

  var userMsg = [
    '현재 모발: ' + baseDesc,
    'AI 분석 색감: ' + ST.analysis.color_name_ko,
    '톤: ' + ST.analysis.tone,
    'hex: ' + (ST.analysis.hex || ''),
    '색감 속성: ' + (ST.analysis.elements ? ST.analysis.elements.join(', ') : '없음'),
    '조색 방향: ' + (ST.analysis.recipe_direction || ''),
    '색감 설명: ' + ST.analysis.description,
    '',
    '이 색감을 현재 모발에서 구현하려면 어떻게 해야 하는지 레시피를 만들어줘.'
  ].join('\n');

  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 2048,
      system: sysPrompt,
      messages: [{ role: 'user', content: userMsg }]
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    try {
      if(data.error){ showRecipeError('API 오류: ' + JSON.stringify(data.error)); return; }
      if(!data.content){ showRecipeError('응답에 content가 없음: ' + JSON.stringify(data).substring(0,300)); return; }
      var txt = data.content.map(function(b){ return b.text||''; }).join('');
      if(!txt.trim()){ showRecipeError('응답 텍스트가 비어있음. stop_reason: ' + (data.stop_reason||'없음')); return; }
      txt = txt.replace(/```json|```/g,'').trim();
      // JSON 객체 추출 (모델이 앞뒤에 텍스트를 붙일 경우 대비)
      var jsonMatch = txt.match(/\{[\s\S]*\}/);
      if(!jsonMatch){ showRecipeError('JSON을 찾을 수 없음. 응답 앞부분: ' + txt.substring(0,200)); return; }
      var recipe = JSON.parse(jsonMatch[0]);
      showRecipe(recipe);
    } catch(e) {
      showRecipeError('파싱 오류: ' + e.message + ' / 응답: ' + JSON.stringify(data).substring(0,300));
    }
  })
  .catch(function(err){
    showRecipeError('네트워크 오류: ' + err.message);
  });
}

function showRecipe(recipe){
  var btn = document.getElementById('recipeBtn');
  btn.classList.remove('show');

  var srcEl = document.getElementById('recipeSource');
  srcEl.innerHTML = '<span class="source-tag ai">AI 원리 기반 생성</span>';

  var hdr = document.getElementById('recipeHeader');
  var summaryHtml = (recipe.summary || '').replace(/\n/g, '<br>');
  var noteHtml = (recipe.summary && recipe.summary.indexOf('탈색') !== -1) ? '<div class="recipe-summary-note"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>모질에 따라 탈색횟수는 편차가 있습니다. 잔류 색소를 확인하세요.</div>' : '';
  hdr.innerHTML = '<div class="recipe-from-to">' + summaryHtml + '</div>' + noteHtml;

  var body = document.getElementById('recipeBody');
  var html = '';
  if(recipe.tips){
    var tipsText = recipe.tips;
    var tipsHtml = tipsText.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
    tipsHtml = tipsHtml.replace(/<b>/g, '<span class="base-label">').replace(/<\/b>/g, '</span>');
    tipsHtml = tipsHtml.replace(/<span>/g, '<span class="mix-label">').replace(/<\/span><\/span>/g, '</span>');

    // 난색 판정 (불필요해졌지만 혹시 모를 용도로 보존)
    // var isWarmColor = ST.analysis && ST.analysis.elements && (ST.analysis.elements.indexOf('붉은기') !== -1 || ST.analysis.elements.indexOf('핑크기') !== -1);

    // 모든 케이스: AI 추론 레시피 렌더링
    html += '<div class="recipe-tips"><div class="recipe-tips-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>실무조언</div><div class="recipe-tips-text">' + tipsHtml + '</div>';

    // virgin_recipe 보조 박스
    if(recipe.virgin_recipe){
      var vr2 = recipe.virgin_recipe;
      html += '<div class="recipe-virgin-box"><div class="recipe-virgin-title">' + (vr2.title || '탈색 없이 최대한 연출하려면') + '</div><div class="recipe-virgin-text">';
      html += vr2.text || '';
      html += '</div></div>';
    }

    html += '</div>';
  }
  body.innerHTML = html;

  document.getElementById('recipeWrap').classList.add('show');
  document.getElementById('resetBtn').classList.add('show');

  setTimeout(function(){
    document.getElementById('recipeWrap').scrollIntoView({behavior:'smooth', block:'start'});
  }, 200);
}

function showRecipeError(detail){
  var btn = document.getElementById('recipeBtn');
  btn.disabled = false;
  btn.textContent = '레시피 생성';
  var msg = '레시피 생성에 실패했어요.';
  if(detail) msg += '\n\n[디버그 정보]\n' + detail;
  alert(msg);
}

/* ══════════════════════════════════

function resetAll(){
  ST = { imageBase64:null, imageMediaType:null, analysis:null };

  var zone = document.getElementById('uploadZone');
  zone.classList.remove('has-image');
  zone.innerHTML = '<div class="icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div><div class="txt">고객이 원하는 헤어 컬러 사진을<br><b>탭하여 업로드</b>해주세요</div>';
  zone.onclick = function(){ document.getElementById('fileInput').click(); };

  var oldInput = document.getElementById('fileInput');
  var newInput = document.createElement('input');
  newInput.type = 'file';
  newInput.id = 'fileInput';
  newInput.accept = 'image/*';
  newInput.style.display = 'none';
  newInput.onchange = function(ev){ handleUpload(ev.target); };
  oldInput.parentNode.replaceChild(newInput, oldInput);

  document.getElementById('analysisBox').classList.remove('show');
  document.getElementById('analysisBox').innerHTML = '<div class="analysis-label">AI 분석 결과</div><div class="analysis-color-row"><div class="analysis-swatch" id="analysisSwatch"></div><div><div class="analysis-color-name" id="analysisName">—</div><div class="analysis-color-level" id="analysisLevel">—</div></div></div><div class="analysis-desc" id="analysisDesc"></div><div id="analysisTagWrap"></div>';
  document.getElementById('analyzing').classList.remove('show');

  var btn = document.getElementById('recipeBtn');
  btn.style.display = '';
  btn.classList.remove('show');
  btn.disabled = true;
  btn.textContent = '레시피 생성';

  document.getElementById('recipeWrap').classList.remove('show');
  document.getElementById('resetBtn').classList.remove('show');

  document.getElementById('recipeSource').innerHTML = '';
  document.getElementById('recipeHeader').innerHTML = '';
  document.getElementById('recipeBody').innerHTML = '';

  window.scrollTo({top:0, behavior:'smooth'});
}
</script>
