<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a0806"/>
<title>Color Journey — 여정의 시작</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a0806;font-family:'Noto Serif KR','Times New Roman',serif;color:#f0e8d8}

  /* 공용 풀스크린 페이즈 */
  .phase{
    position:fixed;inset:0;
    display:flex;align-items:center;justify-content:center;
    opacity:0;
    transition:opacity 1.4s ease;
    pointer-events:none;
  }
  .phase.show{opacity:1;pointer-events:auto}
  .phase.fade-out{opacity:0;pointer-events:none}

  /* 배경 이미지 */
  .phase-bg{
    position:absolute;inset:0;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
  }

  /* ─────────────────────────────────────
     PHASE 1 — 로딩 (loading.jpg)
     ───────────────────────────────────── */
  #phase-loading .phase-bg{
    background-image:url('./images/color-journey/loading.jpg');
  }
  #phase-loading .veil{
    position:absolute;inset:0;
    background:radial-gradient(ellipse at center, rgba(0,0,0,0) 35%, rgba(0,0,0,0.55) 100%);
  }
  .loading-text-wrap{
    position:relative;z-index:2;
    text-align:center;
    margin-top:auto;
    margin-bottom:14vh;
    padding:0 24px;
    display:flex;flex-direction:column;align-items:center;gap:14px;
  }
  .loading-title{
    font-size:22px;
    letter-spacing:0.18em;
    color:#f4e9d0;
    text-shadow:0 2px 12px rgba(0,0,0,0.85), 0 0 22px rgba(212,168,96,0.25);
    font-weight:500;
  }
  .loading-sub{
    font-size:13px;
    letter-spacing:0.06em;
    color:#d8c9a8;
    text-shadow:0 1px 6px rgba(0,0,0,0.9);
    font-style:italic;
    opacity:0.85;
  }
  .loading-dots{
    display:inline-block;
    width:36px;
    text-align:left;
  }
  .loading-dots::after{
    content:'';
    animation:dotsAnim 1.2s steps(4, end) infinite;
  }
  @keyframes dotsAnim{
    0%   { content:''; }
    25%  { content:'·'; }
    50%  { content:'··'; }
    75%  { content:'···'; }
    100% { content:''; }
  }

  /* ─────────────────────────────────────
     PHASE 2 — 시작 (start.jpg + Three.js 구체)
     ───────────────────────────────────── */
  #phase-start .phase-bg{
    background-image:url('./images/color-journey/start.jpg');
  }
  #phase-start{
    flex-direction:column;
    justify-content:flex-start;
  }
  /* 양피지가 화면 가운데 보이도록 살짝 패딩 */

  /* Three.js 캔버스 — 글씨 끝(~47%)과 CTA(62%) 사이 빈 양피지 가운데 살짝 아래 */
  .orb-stage{
    position:absolute;
    left:50%;
    top:58%;
    transform:translate(-50%, -50%);
    width:100px;
    height:100px;
    z-index:3;
    pointer-events:auto;
    cursor:pointer;
  }
  .orb-stage canvas{
    width:100%!important;
    height:100%!important;
    display:block;
  }

  /* 클릭 안내 문구 — 구체 바로 아래에 가깝게 */
  .start-cta{
    position:absolute;
    left:50%;
    top:66%;
    transform:translateX(-50%);
    z-index:3;
    text-align:center;
    pointer-events:none;
    font-family:'Noto Serif KR','Times New Roman',serif;
  }
  .start-cta-line{
    color:#3a2410;
    font-size:13px;
    letter-spacing:0.14em;
    font-weight:600;
    text-shadow:0 1px 0 rgba(255,240,210,0.6);
    margin-bottom:4px;
  }
  .start-cta-sub{
    color:#7a5a36;
    font-size:10px;
    letter-spacing:0.18em;
    font-style:italic;
    opacity:0.85;
    animation:ctaPulse 2.4s ease-in-out infinite;
  }
  @keyframes ctaPulse{
    0%,100%{ opacity:0.45 }
    50%{ opacity:0.95 }
  }

  /* ─────────────────────────────────────
     ZOOM-IN 트랜지션 (start → ch1)
     ───────────────────────────────────── */
  #phase-start.zoom-out .phase-bg{
    transition:transform 1.1s cubic-bezier(0.55, 0.05, 0.6, 1), opacity 1.1s ease;
    transform:scale(7);
    opacity:0;
  }
  #phase-start.zoom-out .orb-stage,
  #phase-start.zoom-out .start-cta{
    transition:opacity 0.6s ease;
    opacity:0;
  }

  /* 모바일 좁은 화면 보정 */
  @media (max-width: 380px){
    .orb-stage{ width:88px; height:88px; top:57%; }
    .start-cta{ top:64%; }
    .loading-title{ font-size:19px; }
  }
  @media (min-width: 768px){
    .orb-stage{ width:130px; height:130px; }
    .start-cta{ top:68%; }
    .start-cta-line{ font-size:15px; }
  }

  /* 노이즈/필름 그레인 (선택) — 분위기 더해줌 */
  .grain{
    position:fixed;inset:0;
    pointer-events:none;
    z-index:10;
    opacity:0.05;
    mix-blend-mode:overlay;
    background-image:
      repeating-radial-gradient(circle at 30% 40%, rgba(255,255,255,0.05) 0, rgba(0,0,0,0.05) 1px, transparent 2px),
      repeating-radial-gradient(circle at 70% 60%, rgba(255,255,255,0.05) 0, rgba(0,0,0,0.05) 1px, transparent 2px);
  }
</style>
</head>
<body>

  <!-- ───── PHASE 1: 로딩 ───── -->
  <div id="phase-loading" class="phase">
    <div class="phase-bg"></div>
    <div class="veil"></div>
    <div class="loading-text-wrap">
      <div class="loading-title">여정 준비중<span class="loading-dots"></span></div>
      <div class="loading-sub">— Preparing the journey —</div>
    </div>
  </div>

  <!-- ───── PHASE 2: 시작 ───── -->
  <div id="phase-start" class="phase">
    <div class="phase-bg"></div>
    <div class="orb-stage" id="orbStage"></div>
    <div class="start-cta">
      <div class="start-cta-line">빨간공을 클릭하여 여정을 준비하세요</div>
      <div class="start-cta-sub">— Tap the orb to begin —</div>
    </div>
  </div>

  <div class="grain"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  'use strict';

  // 다음 페이지 (본 챕터)
  var NEXT_URL = './color_journey_ch1_ch2_ch3_ch4.html';

  // 페이즈 타이밍
  var LOADING_DURATION = 1800; // 1.8초
  var ZOOM_DURATION    = 1100; // 양피지 확대 페이드 시간 (단축)

  var phaseLoading = document.getElementById('phase-loading');
  var phaseStart   = document.getElementById('phase-start');
  var orbStage     = document.getElementById('orbStage');

  // ─────────────────────────────────────
  // 시퀀스: 로딩 페이드인 → 1.8초 → 페이드 아웃 + 시작 페이드 인
  // ─────────────────────────────────────
  function bootSequence(){
    // 1. 로딩 페이드 인 (즉시)
    requestAnimationFrame(function(){
      phaseLoading.classList.add('show');
    });

    // 2. LOADING_DURATION 후 → 로딩 페이드 아웃 + 시작 페이드 인
    setTimeout(function(){
      phaseLoading.classList.add('fade-out');
      phaseStart.classList.add('show');
      // Three.js 구체는 시작 페이즈 등장과 함께 시동
      setTimeout(initOrb, 200);
    }, LOADING_DURATION);
  }

  // ─────────────────────────────────────
  // Three.js — 빨간 비비드 구체 + 흰 회전 링 + 펄스 글로우
  // ─────────────────────────────────────
  var orbState = { running:false, raf:null, clickPulseT:0 };

  function initOrb(){
    if(typeof THREE === 'undefined' || !orbStage) return;
    if(orbState.running) return;

    var w = orbStage.clientWidth;
    var h = orbStage.clientHeight;

    var scene    = new THREE.Scene();
    var camera   = new THREE.PerspectiveCamera(45, w/h, 0.1, 100);
    camera.position.set(0, 0, 4);

    var renderer = new THREE.WebGLRenderer({ alpha:true, antialias:true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(w, h);
    orbStage.appendChild(renderer.domElement);

    // 라이팅
    var keyLight = new THREE.DirectionalLight(0xffffff, 1.0);
    keyLight.position.set(2, 3, 4);
    scene.add(keyLight);

    var rimLight = new THREE.DirectionalLight(0xff5a4a, 0.6);
    rimLight.position.set(-3, -1, 2);
    scene.add(rimLight);

    scene.add(new THREE.AmbientLight(0xffeedd, 0.35));

    // 메인 구체 — 빨간 비비드
    var orbGeo = new THREE.SphereGeometry(0.8, 64, 64);
    var orbMat = new THREE.MeshStandardMaterial({
      color: 0xE63946,
      emissive: 0x8B1A1A,
      emissiveIntensity: 0.45,
      roughness: 0.28,
      metalness: 0.15
    });
    var orb = new THREE.Mesh(orbGeo, orbMat);
    scene.add(orb);

    // 글로우 (외곽 큰 반투명 구)
    var glowGeo = new THREE.SphereGeometry(1.05, 32, 32);
    var glowMat = new THREE.MeshBasicMaterial({
      color: 0xff4555,
      transparent: true,
      opacity: 0.18,
      side: THREE.BackSide,
      depthWrite: false
    });
    var glow = new THREE.Mesh(glowGeo, glowMat);
    scene.add(glow);

    // 흰색 회전 링 (클릭 유도 — 흐름)
    var ring1 = makeRing(1.25, 0.018, 0xffffff, 0.55);
    ring1.rotation.x = Math.PI / 2;
    scene.add(ring1);

    var ring2 = makeRing(1.45, 0.012, 0xffeec8, 0.32);
    ring2.rotation.x = Math.PI / 2.2;
    ring2.rotation.z = 0.4;
    scene.add(ring2);

    // 흐르는 점들 (파티클로 흰색 흐름 표현)
    var particles = makeParticleStream();
    scene.add(particles.mesh);

    // 클릭 핸들러
    var transitioning = false;
    function onClick(){
      if(transitioning) return;
      transitioning = true;
      orbState.clickPulseT = 1.0; // 펄스 시작
      // 약간 지연 후 양피지 확대 트리거
      setTimeout(triggerZoom, 280);
    }
    orbStage.addEventListener('click', onClick);
    orbStage.addEventListener('touchend', function(e){ e.preventDefault(); onClick(); }, {passive:false});

    // 애니메이션 루프
    var t0 = performance.now();
    orbState.running = true;
    function loop(){
      orbState.raf = requestAnimationFrame(loop);
      var t = (performance.now() - t0) / 1000;

      // 구체 부유 + 미세 회전
      orb.position.y = Math.sin(t * 1.4) * 0.06;
      orb.rotation.y = t * 0.35;
      glow.position.y = orb.position.y;

      // 글로우 호흡
      glow.scale.setScalar(1 + Math.sin(t * 1.8) * 0.04);
      glowMat.opacity = 0.16 + Math.sin(t * 1.8) * 0.05;

      // 링 회전
      ring1.rotation.z = t * 0.6;
      ring2.rotation.z = -t * 0.45;

      // 파티클 흐름
      particles.update(t);

      // 클릭 펄스
      if(orbState.clickPulseT > 0){
        var pulse = orbState.clickPulseT;
        orb.scale.setScalar(1 + pulse * 0.35);
        glow.scale.setScalar((1 + Math.sin(t * 1.8) * 0.04) * (1 + pulse * 0.6));
        glowMat.opacity = Math.min(1, 0.16 + pulse * 0.6);
        orbState.clickPulseT = Math.max(0, orbState.clickPulseT - 0.04);
      }

      renderer.render(scene, camera);
    }
    loop();

    // 리사이즈
    window.addEventListener('resize', function(){
      var nw = orbStage.clientWidth;
      var nh = orbStage.clientHeight;
      camera.aspect = nw/nh;
      camera.updateProjectionMatrix();
      renderer.setSize(nw, nh);
    });
  }

  // 헬퍼: 링 메쉬
  function makeRing(radius, tube, color, opacity){
    var geo = new THREE.TorusGeometry(radius, tube, 16, 96);
    var mat = new THREE.MeshBasicMaterial({
      color: color,
      transparent: true,
      opacity: opacity,
      depthWrite: false
    });
    return new THREE.Mesh(geo, mat);
  }

  // 헬퍼: 흰색 흐름 파티클
  function makeParticleStream(){
    var COUNT = 60;
    var positions = new Float32Array(COUNT * 3);
    var phases = [];
    for(var i = 0; i < COUNT; i++){
      var phase = Math.random() * Math.PI * 2;
      var radius = 1.15 + Math.random() * 0.5;
      phases.push({ phase:phase, radius:radius, speed: 0.4 + Math.random() * 0.5, yOff: (Math.random() - 0.5) * 0.3 });
      positions[i*3]   = Math.cos(phase) * radius;
      positions[i*3+1] = phases[i].yOff;
      positions[i*3+2] = Math.sin(phase) * radius;
    }
    var geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    var mat = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 0.035,
      transparent: true,
      opacity: 0.7,
      sizeAttenuation: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });
    var mesh = new THREE.Points(geo, mat);
    return {
      mesh: mesh,
      update: function(t){
        var pos = geo.attributes.position.array;
        for(var i = 0; i < COUNT; i++){
          var p = phases[i];
          var ang = p.phase + t * p.speed;
          pos[i*3]   = Math.cos(ang) * p.radius;
          pos[i*3+1] = p.yOff + Math.sin(t * 1.2 + p.phase) * 0.08;
          pos[i*3+2] = Math.sin(ang) * p.radius;
        }
        geo.attributes.position.needsUpdate = true;
      }
    };
  }

  // ─────────────────────────────────────
  // 클릭 → 양피지 확대 페이드 → 본 챕터 페이지로
  // ─────────────────────────────────────
  function triggerZoom(){
    phaseStart.classList.add('zoom-out');
    setTimeout(function(){
      window.location.href = NEXT_URL;
    }, ZOOM_DURATION);
  }

  // 시작
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', bootSequence);
  } else {
    bootSequence();
  }

  // 다음 페이지 HTML도 백그라운드 프리페치 (브라우저 캐시에 미리 받아둠)
  // 클릭 시 네트워크 요청 없이 즉시 표시
  try {
    var prefetch = document.createElement('link');
    prefetch.rel = 'prefetch';
    prefetch.href = NEXT_URL;
    prefetch.as = 'document';
    document.head.appendChild(prefetch);
  } catch(e){}

  // 이미지 프리로드 (페이드/이동 시 깜빡임 방지)
  // ch1-4 페이지에서 쓰는 lift 이미지 + 양피지까지 미리 캐시해서
  // 다음 페이지로 이동할 때 즉시 로드되도록
  [
    './images/color-journey/loading.jpg',
    './images/color-journey/start.jpg',
    './images/color-journey/parchment_main.jpg',
    './images/color-journey/lift_05.jpg',
    './images/color-journey/lift_07.jpg',
    './images/color-journey/lift_09.jpg',
    './images/color-journey/lift_11.jpg',
    './images/color-journey/lift_13.jpg',
    './images/color-journey/lift_14.jpg',
    './images/color-journey/lift_16.jpg',
    './images/color-journey/lift_18.jpg'
  ].forEach(function(src){
    var img = new Image();
    img.src = src;
  });
})();
</script>
</body>
</html>
