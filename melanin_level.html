<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>멜라닌 컬러 가이드</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap');
:root{--bg:#0a0a0c;--card:#131316;--border:rgba(255,255,255,0.06);--sub:#999;--dim:#555;--accent:#c4b0e0;--s2color:#c4b0e0}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Noto Sans KR','Outfit',sans-serif;background:var(--bg);color:#fff;min-height:100dvh;overflow-x:hidden;display:flex;justify-content:center}
.app{width:100%;max-width:430px;min-height:100dvh;background:var(--bg);display:flex;flex-direction:column}
@media(min-width:431px){.app{border-left:1px solid var(--border);border-right:1px solid var(--border)}}

.hdr{display:flex;align-items:center;gap:10px;padding:14px 16px;background:rgba(10,10,12,0.95);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.hdr h1{font-size:15px;font-weight:700;flex:1}
.hdr .pill{font-size:10px;font-weight:600;padding:3px 10px;border-radius:99px;background:rgba(196,176,224,0.1);color:var(--accent)}
.hdr-notice{font-size:9px;color:var(--dim);line-height:1.5;padding:6px 16px 2px;background:var(--bg);text-align:center}

.img-wrap{position:relative;width:100%;overflow:hidden;flex-shrink:0}
.img-wrap img{width:100%;display:block}

.overlay-left,.overlay-right{
  position:absolute;top:0;bottom:0;width:50%;
  background:rgba(0,0,0,0.78);
  transition:opacity 0.4s ease;
  opacity:0;pointer-events:none;z-index:2;
}
.overlay-left{left:0}
.overlay-right{right:0}

/* 스와치: 벽에서 수평 슬라이드 */
.swatch-layer{
  position:absolute;top:0;bottom:0;z-index:3;
  pointer-events:none;display:flex;flex-direction:column;
  transition:transform 0.45s cubic-bezier(0.22,0.61,0.36,1),opacity 0.3s ease;
  opacity:1;
}
.swatch-layer.from-right{transform:translateX(100%)}
.swatch-layer.from-left{transform:translateX(-100%)}
.swatch-layer.show{transform:translateX(0)}
.sw-zone{flex:1;transition:background .3s;position:relative}
.sw-label{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  font-size:10px;font-weight:700;color:rgba(255,255,255,0.88);
  text-shadow:0 1px 3px rgba(0,0,0,0.7);
  pointer-events:none;white-space:nowrap;
  letter-spacing:0.2px;line-height:1.3;text-align:center;
  opacity:0;transition:opacity .4s;
}
.swatch-layer.show .sw-label{opacity:1;transition-delay:0.25s}

/* 존 */
.zones{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column}
.zone{
  flex:1;position:relative;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.12);
  transition:background .15s;
}
.zone:last-child{border-bottom:none}
.zone .num{
  position:absolute;top:50%;
  font-family:'Outfit';font-size:15px;font-weight:700;
  color:rgba(255,255,255,0.5);
  text-shadow:0 1px 4px rgba(0,0,0,0.6);
  transition:all .25s;pointer-events:none;
  left:50%;transform:translate(-50%,-50%);
}
.zone .num.side-left{left:16px;transform:translateY(-50%)}
.zone .num.side-right{left:auto;right:16px;transform:translateY(-50%)}

/* 반쪽 하이라이트 */
.zone .hl{
  position:absolute;top:0;bottom:0;width:50%;
  pointer-events:none;opacity:0;transition:opacity .2s;
  box-sizing:border-box;border:2px solid #fff;
}
.zone .hl.left{left:0}
.zone .hl.right{right:0}
.zone.s1on .num{color:#fff;font-size:20px;font-weight:800}

/* STEP2 반쪽 하이라이트 — 색감별 색상 */
.zone .hl2{
  position:absolute;top:0;bottom:0;width:50%;
  pointer-events:none;opacity:0;transition:opacity .2s;
  box-sizing:border-box;border:2px solid var(--s2color);
}
.zone .hl2.left{left:0}
.zone .hl2.right{right:0}
.zone.s2on .num{color:var(--s2color);font-size:20px;font-weight:800}

.img-labels{
  position:absolute;bottom:0;left:0;right:0;z-index:6;
  display:flex;justify-content:space-between;
  padding:10px 16px;
  background:linear-gradient(transparent,rgba(0,0,0,0.5));
  font-size:9px;font-weight:600;color:rgba(255,255,255,0.35);
  transition:opacity .3s;
}

.ctrls{padding:16px;flex:1;display:flex;flex-direction:column;gap:12px}
.sec-title{font-size:10px;font-weight:700;color:var(--dim);letter-spacing:0.5px;margin-bottom:6px}

.cw-row{display:flex;gap:8px}
.cw-btn{
  flex:1;padding:12px 8px;border-radius:12px;
  background:var(--card);border:1.5px solid var(--border);
  color:var(--sub);font-size:12px;font-weight:600;
  cursor:pointer;text-align:center;transition:all .25s;line-height:1.4;
}
.cw-btn:active{transform:scale(0.97)}
.cw-btn.on{border-color:var(--accent);color:#fff;background:rgba(196,176,224,0.08)}
.cw-btn .tp{font-size:13px;font-weight:800}
.cw-btn .sub{font-size:8px;color:var(--dim);font-weight:400;margin-top:4px;line-height:1.3}

.color-section{display:none;animation:fadeIn .4s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.color-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.color-scroll::-webkit-scrollbar{display:none}
.color-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex-shrink:0;min-width:48px}
.color-dot{width:38px;height:38px;border-radius:50%;border:2.5px solid rgba(255,255,255,0.08);transition:all .2s}
.color-item.on .color-dot{transform:scale(1.12);border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,0.15)}
.color-name{font-size:8px;color:var(--dim);font-weight:500}
.color-item.on .color-name{color:#fff;font-weight:700}

.summary{display:flex;gap:10px;align-items:center;padding:12px;border-radius:10px;background:var(--card);border:1px solid var(--border);transition:all .3s}
.summary .s-item{flex:1}
.summary .s-label{font-size:8px;color:var(--dim);font-weight:600;letter-spacing:0.3px;margin-bottom:3px}
.summary .s-value{font-size:14px;font-weight:800;font-family:'Outfit','Noto Sans KR',sans-serif}
.summary .arrow{color:var(--dim);font-size:16px;flex-shrink:0}

.guide-box{padding:12px;border-radius:10px;background:rgba(196,176,224,0.06);border:1px solid rgba(196,176,224,0.12);display:none;animation:fadeIn .3s}
.guide-box.show{display:block}
.g-tag{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;margin-bottom:6px}
.g-tag.up{background:rgba(232,140,140,0.15);color:#e88c8c}
.g-tag.down{background:rgba(140,180,232,0.15);color:#8cb4e8}
.g-tag.same{background:rgba(140,232,160,0.15);color:#8ce8a0}
.g-text{font-size:11px;color:var(--sub);line-height:1.7;white-space:pre-line}

.cta{width:100%;padding:15px;border-radius:12px;background:#fff;border:none;color:#000;font-size:14px;font-weight:800;cursor:pointer;transition:all .15s;margin-top:auto}
.cta:active{transform:scale(0.98);opacity:0.9}
.cta:disabled{opacity:0.2;cursor:not-allowed}

.step3-panel{display:none;animation:fadeIn .4s;flex-direction:column;gap:10px}
.step3-panel.show{display:flex}
.s3-hd{display:flex;align-items:center;justify-content:space-between}
.s3-ti{font-size:14px;font-weight:800}
.s3-bk{font-size:11px;color:var(--accent);cursor:pointer;font-weight:600}
.s3-proc{font-size:12px;color:#fff;line-height:1.7;padding:12px;border-radius:10px;background:var(--card);border:1px solid var(--border);white-space:pre-line}
.s3-sub{font-size:11px;color:var(--accent);line-height:1.6;padding:8px 12px;border-radius:8px;background:rgba(196,176,224,0.06);margin-top:-4px}
.s3-sub:empty{display:none}
.s3-det{font-size:11px;color:var(--sub);line-height:1.7;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,0.03);white-space:pre-line}
.s3-det:empty{display:none}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <h1>멜라닌 컬러 가이드</h1>
    <span class="pill" id="stepPill">STEP 1</span>
  </div>
  <div class="hdr-notice">표시된 색감명은 참고용이며 실제와 다를 수 있습니다. 본 가이드는 정밀한 색감 재현이라기보다, 잔류 언더톤 · 보색중화 · 시술 방향의 이해를 돕기 위한 도구입니다.</div>

  <div class="img-wrap" id="imgWrap">
    <img src="base.jpg" alt="" draggable="false"/>
    <div class="overlay-left" id="olLeft"></div>
    <div class="overlay-right" id="olRight"></div>
    <div class="swatch-layer" id="swLayer" style="left:0;width:50%"></div>
    <div class="zones" id="zones"></div>
    <div class="img-labels" id="imgLabels">
      <span>한색 계열 퇴색모</span>
      <span>난색 계열 퇴색모 / 자연모</span>
    </div>
  </div>

  <div class="ctrls">
    <div id="s1Ctrls">
      <div class="sec-title">시술 이력 선택</div>
      <div class="cw-row">
        <div class="cw-btn" id="btnCool" onclick="pickCW('cool')">
          <div class="tp">한색 계열 퇴색</div>
          <div class="sub">쿨브라운 / 매트 / 노랑 퇴색</div>
        </div>
        <div class="cw-btn" id="btnWarm" onclick="pickCW('warm')">
          <div class="tp">난색 계열 퇴색 / 자연모</div>
          <div class="sub">붉은, 주황브라운 / 노랑 퇴색모</div>
        </div>
      </div>
    </div>

    <div class="color-section" id="s2Ctrls">
      <div class="sec-title">원하는 색감 선택</div>
      <div class="color-scroll" id="colorScroll"></div>
    </div>

    <div class="summary" id="sumWrap" style="opacity:0.3">
      <div class="s-item">
        <div class="s-label" id="sumLabel1">현재 상태</div>
        <div class="s-value" id="sumVal1">-</div>
      </div>
      <div class="arrow" id="sumArrow" style="display:none">→</div>
      <div class="s-item" id="sumItem2" style="display:none">
        <div class="s-label">목표 색감</div>
        <div class="s-value" id="sumVal2">-</div>
      </div>
    </div>

    <div class="guide-box" id="guideBox">
      <div class="g-tag" id="gTag"></div>
      <div class="g-text" id="gText"></div>
    </div>

    <div class="step3-panel" id="s3Panel">
      <div class="s3-hd"><div class="s3-ti">시술 가이드</div><div class="s3-bk" id="s3Back">← 색감 선택</div></div>
      <div class="s3-proc" id="s3Proc"></div>
      <div class="s3-sub" id="s3Sub"></div>
      <div id="canvasWrap1" style="width:100%;margin:4px 0;border-radius:10px;overflow:hidden;display:none"></div>
      <div id="canvasWrap2" style="width:100%;margin:4px 0;border-radius:10px;overflow:hidden;display:none"></div>
      <div class="s3-det" id="s3Det"></div>
    </div>

    <button class="cta" id="cta" disabled>시술 이력과 레벨을 선택하세요</button>
  </div>
</div>

<script>
var LV=[20,18,16,14,12,10,8,6,5];
var S={cw:null,lv:null,step:1,color:null,tarLv:null,s1Idx:null};

var SW={
  ash:{lb:'애쉬',dot:'hsl(210,4%,40%)',hex:'#636769',lv:{20:'hsl(210,5%,58%)',18:'hsl(210,5%,48%)',16:'hsl(210,4%,40%)',14:'hsl(210,4%,33%)',12:'hsl(28,5%,27%)',10:'hsl(25,5%,22%)',8:'hsl(210,5%,15%)',6:'hsl(18,5%,14%)',5:'hsl(16,4%,11%)'},
    tags:{18:'실버 애쉬',14:'애쉬그레이',10:'애쉬브라운',8:'다크 애쉬',5:'다크 쿨브라운'},
    labels:{20:'실버 애쉬',18:'실버 애쉬',16:'애쉬그레이',14:'애쉬그레이',12:'애쉬브라운',10:'애쉬브라운',8:'다크 애쉬',6:'다크 쿨브라운',5:'다크 쿨브라운'}},
  blue:{lb:'블루',dot:'hsl(222,40%,60%)',hex:'#6b82c4',lv:{20:'hsl(222,40%,72%)',18:'hsl(222,38%,58%)',16:'hsl(220,32%,45%)',14:'hsl(218,25%,36%)',12:'hsl(215,16%,27%)',10:'hsl(210,10%,23%)',8:'hsl(22,7%,20%)',6:'hsl(18,5%,15%)',5:'hsl(15,4%,12%)'},
    tags:{18:'스카이 블루',14:'네이비 블루 시작',10:'스모키 애쉬브라운',5:'다크 쿨브라운'},
    labels:{20:'스카이 블루',18:'스카이 블루',16:'네이비 블루',14:'네이비 블루',12:'스모키 애쉬브라운',10:'스모키 애쉬브라운',8:'다크 쿨브라운',6:'다크 쿨브라운',5:'다크 쿨브라운'}},
  violet:{lb:'바이올렛',dot:'hsl(295,22%,55%)',hex:'#a474a8',lv:{20:'hsl(295,22%,58%)',18:'hsl(293,18%,50%)',16:'hsl(290,14%,42%)',14:'hsl(330,12%,35%)',12:'hsl(340,11%,28%)',10:'hsl(348,10%,24%)',8:'hsl(350,7%,19%)',6:'hsl(352,5%,14%)',5:'hsl(350,4%,11%)'},
    tags:{18:'바이올렛',14:'로즈와인·버건디BR',10:'로즈와인·버건디BR',5:'다크 바이올렛BR'},
    labels:{20:'바이올렛',18:'바이올렛',16:'바이올렛',14:'로즈와인·버건디BR',12:'로즈와인·버건디BR',10:'로즈와인·버건디BR',8:'다크 바이올렛BR',6:'다크 바이올렛BR',5:'다크 바이올렛BR'}},
  rv:{lb:'레드바이올렛',dot:'hsl(325,35%,55%)',hex:'#c06a90',lv:{20:'hsl(325,35%,60%)',18:'hsl(322,30%,52%)',16:'hsl(340,26%,42%)',14:'hsl(348,24%,33%)',12:'hsl(350,20%,27%)',10:'hsl(352,18%,22%)',8:'hsl(352,12%,18%)',6:'hsl(352,10%,14%)',5:'hsl(352,8%,11%)'},
    tags:{16:'레드바이올렛',10:'적보라',8:'플럼브라운',5:'다크 레드'},
    labels:{20:'레드바이올렛',18:'레드바이올렛',16:'레드바이올렛',14:'적보라',12:'적보라',10:'적보라',8:'플럼브라운',6:'플럼브라운',5:'다크 레드'}},
  lavash:{lb:'라벤더애쉬',dot:'hsl(240,22%,60%)',hex:'#8080b8',lv:{20:'hsl(240,22%,62%)',18:'hsl(238,16%,54%)',16:'hsl(232,12%,46%)',14:'hsl(248,10%,40%)',12:'hsl(245,8%,34%)',10:'hsl(240,6%,28%)',8:'hsl(225,4%,22%)',6:'hsl(220,3%,16%)',5:'hsl(215,2%,12%)'},
    tags:{16:'라벤더애쉬',10:'라벤더그레이',5:'다크 애쉬'},
    labels:{20:'라벤더애쉬',18:'라벤더애쉬',16:'라벤더애쉬',14:'라벤더그레이',12:'라벤더그레이',10:'라벤더그레이',8:'다크 애쉬',6:'다크 애쉬',5:'다크 애쉬'}},
  pink:{lb:'핑크',dot:'hsl(345,38%,65%)',hex:'#d48da0',lv:{20:'hsl(345,38%,68%)',18:'hsl(343,32%,60%)',16:'hsl(340,24%,50%)',14:'hsl(338,16%,42%)',12:'hsl(340,12%,35%)',10:'hsl(342,9%,28%)',8:'hsl(345,6%,21%)',6:'hsl(348,4%,15%)',5:'hsl(350,3%,12%)'},
    tags:{18:'파스텔 핑크',14:'적핑크',10:'로즈브라운',8:'플럼브라운',5:'다크 레드'},
    labels:{20:'파스텔 핑크',18:'파스텔 핑크',16:'적핑크',14:'적핑크',12:'로즈브라운',10:'로즈브라운',8:'플럼브라운',6:'플럼브라운',5:'다크 레드'}},
  red:{lb:'레드',dot:'hsl(0,62%,52%)',hex:'#d04040',lv:{20:'hsl(0,68%,58%)',18:'hsl(0,62%,50%)',16:'hsl(0,56%,44%)',14:'hsl(2,50%,38%)',12:'hsl(2,46%,33%)',10:'hsl(3,42%,28%)',8:'hsl(3,36%,23%)',6:'hsl(3,28%,17%)',5:'hsl(3,20%,13%)'},
    tags:{16:'레드',8:'레드브라운',5:'다크 레드'},
    labels:{20:'레드',18:'레드',16:'레드',14:'레드브라운',12:'레드브라운',10:'레드브라운',8:'레드브라운',6:'다크 레드',5:'다크 레드'}},
  orange:{lb:'오렌지',dot:'hsl(20,62%,55%)',hex:'#d0804a',lv:{20:'hsl(20,68%,62%)',18:'hsl(20,62%,55%)',16:'hsl(20,55%,48%)',14:'hsl(18,45%,42%)',12:'hsl(18,34%,35%)',10:'hsl(16,25%,28%)',8:'hsl(15,18%,22%)',6:'hsl(14,12%,16%)',5:'hsl(13,9%,13%)'},
    tags:{16:'페일 오렌지',10:'코랄브라운',5:'다크 브라운'},
    labels:{20:'페일 오렌지',18:'페일 오렌지',16:'페일 오렌지',14:'코랄브라운',12:'코랄브라운',10:'코랄브라운',8:'다크 브라운',6:'다크 브라운',5:'다크 브라운'}}
};

function swSide(){return S.cw==='warm'?'left':'right'}
function melSide(){return S.cw==='warm'?'right':'left'}

function build(){
  var el=document.getElementById('zones');
  LV.forEach(function(v,i){
    var z=document.createElement('div');z.className='zone';z.dataset.i=i;
    z.onclick=function(){zoneTap(i)};
    var n=document.createElement('div');n.className='num';n.textContent=v;
    var hl_l=document.createElement('div');hl_l.className='hl left';
    var hl_r=document.createElement('div');hl_r.className='hl right';
    var h2_l=document.createElement('div');h2_l.className='hl2 left';
    var h2_r=document.createElement('div');h2_r.className='hl2 right';
    z.appendChild(hl_l);z.appendChild(hl_r);z.appendChild(h2_l);z.appendChild(h2_r);
    z.appendChild(n);el.appendChild(z);
  });
  /* 스와치 존 */
  var sw=document.getElementById('swLayer');
  LV.forEach(function(v){
    var d=document.createElement('div');d.className='sw-zone';d.dataset.lv=v;
    var lb=document.createElement('div');lb.className='sw-label';lb.dataset.lv=v;
    d.appendChild(lb);
    sw.appendChild(d);
  });
}

function zoneTap(idx){
  if(S.step===1)pickS1(idx);
  else pickS2(idx);
}

function pickS1(idx){
  S.lv=LV[idx];S.s1Idx=idx;
  clearAllHL();
  var z=document.querySelectorAll('.zone')[idx];
  z.classList.add('s1on');
  if(S.cw){
    z.querySelector('.hl.'+melSide()).style.opacity='1';

/* 레벨에 해당하는 라벨명 가져오기 — labels 직접 조회 */
function getLabelName(colorKey,lv){
  if(!colorKey||!SW[colorKey]) return 'Lv.'+lv;
  var labels=SW[colorKey].labels||{};
  if(labels[lv]) return labels[lv];
  /* 폴백: tags에서 탐색 */
  var tags=SW[colorKey].tags||{};
  if(tags[lv]) return tags[lv];
  var lvs=[20,18,16,14,12,10,8,6,5];
  var found='';
  for(var i=0;i<lvs.length;i++){
    if(tags[lvs[i]]) found=tags[lvs[i]];
    if(lvs[i]===lv) break;
  }
  return found||SW[colorKey].lb;
}

  if(lv<=8) return 'low';

  if(lv<=18) return 'high16';
  return 'high20';
}

/* 톤 방향 */
function toneDir(curLv,tarLv){
  var d=tarLv-curLv;
  if(d>2) return 'up';
  if(d<-2) return 'down';
  return 'same';
}

function getGuide(color,curLv,tarLv){
  var cz=lvZone(curLv);
  var tz;

  /* 난색+블루 → wblue 키로 조회 */
  var effColor=color;
  if(S.cw==='warm'&&color==='blue') effColor='wblue';
  if(S.cw==='warm'&&color==='ash') effColor='wash';
  if(S.cw==='warm'&&color==='violet') effColor='wviolet';
  if(S.cw==='warm'&&color==='lavash') effColor='wlavash';
  if(S.cw==='warm'&&color==='red') effColor='wred';
  if(S.cw==='warm'&&color==='rv') effColor='wrv';
  if(S.cw==='warm'&&color==='pink') effColor='wpink';

  /* 같은 구간 내 이동 → 톤인톤 */
  var tzTarget=lvZone(tarLv);
  var isHigh=cz==='high16'||cz==='high20';

  /* ── 난색 고명도: warm16 vs warm18 분리 (wblue, wash, wviolet 공통) ── */
  if((effColor==='wblue'||effColor==='wash'||effColor==='wviolet'||effColor==='wlavash'||effColor==='wred'||effColor==='wrv'||effColor==='wpink')&&isHigh){
    /* 난색 16 출발 */
    if(curLv===16){
      /* 16→16 톤인톤 */
      if(tarLv===16){
        var kw16=effColor+'_warm16_warm16';
        if(GUIDE[kw16]) return GUIDE[kw16];
      }
      /* 16→18·20 스카이 방향 */
      if(tarLv===18||tarLv===20){
        var kSky=effColor+'_warm16_sky';
        if(GUIDE[kSky]) return GUIDE[kSky];
      }
    }
    /* 난색 18·20 출발 — 톤인톤(18↔20 간 이동 포함) */
    if((curLv===18||curLv===20)&&(tarLv===18||tarLv===20||tarLv===16)){
      if(curLv===20){
        var kh20=effColor+'_high20_high';
        if(GUIDE[kh20]) return GUIDE[kh20];
      }
      var kw18=effColor+'_warm18_high';
      if(GUIDE[kw18]) return GUIDE[kw18];
    }
  }

  /* 같은 존 톤인톤 — 단, 목표 14면 무조건 탈색 분기 (염색모에서 네이비 블루 불가) */
  if(cz===tzTarget&&tarLv!==14){
    /* 16→18·20(스카이 블루 방향)은 전용 키 우선 */
    if(cz==='high16'&&(tarLv===18||tarLv===20)){
      var kSky=effColor+'_high16_sky';
      if(GUIDE[kSky]) return GUIDE[kSky];
    }
    var key=effColor+'_'+cz+'_'+cz;
    if(GUIDE[key]) return GUIDE[key];
    if(isHigh){
      var kf=effColor+'_'+cz+'_high';
      if(GUIDE[kf]) return GUIDE[kf];
    }
  }

  /* 고명도 간 이동 (high20↔high16) → 톤인톤 취급 */
  /* 단, 16에서 18·20(스카이 블루 방향)은 전용 키 우선 */
  if(isHigh&&(tzTarget==='high16'||tzTarget==='high20')){
    if(cz==='high16'&&(tarLv===18||tarLv===20)){
      var kSky=effColor+'_high16_sky';
      if(GUIDE[kSky]) return GUIDE[kSky];
    }
    var kh1=effColor+'_'+cz+'_high';
    if(GUIDE[kh1]) return GUIDE[kh1];
    var kh2=effColor+'_'+tzTarget+'_high';
    if(GUIDE[kh2]) return GUIDE[kh2];
  }

  /* 특수 분기: 목표 레벨별 세분화 */
  if(tarLv<=5) tz='vlow';
  else if(tarLv<=6) tz=(cz==='low')?'low':'vlow';
  else if(tarLv<=8) tz=(cz==='low')?'mid8':'low';
  else if(tarLv<=12) tz='mid';
  else if(tarLv===14) tz='14';
  else if(tarLv===16) tz='16';
  else if(tarLv===18) tz='18';
  else tz='20';

  /* 정확한 키 */
  /* 14 출발→14 목표: 전용 실무조언 키 우선 */
  if(curLv===14&&tarLv===14){
    var k14=effColor+'_mid14_14';
    if(GUIDE[k14]) return GUIDE[k14];
  }
  var key=effColor+'_'+cz+'_'+tz;
  if(GUIDE[key]) return GUIDE[key];

  /* high16/high20 → high 폴백 */
  if(isHigh){
    var kh=effColor+'_high_'+tz;
    if(GUIDE[kh]) return GUIDE[kh];
    /* 14는 mid 구간이지만 고명도에서 내려가는 톤다운 — mid 폴백 */
    if(tarLv===14){
      var km=effColor+'_high_mid';
      if(GUIDE[km]) return GUIDE[km];
    }
  }

  /* 같은 구간 폴백 */
  var keyFall=effColor+'_'+cz+'_'+tzTarget;
  if(GUIDE[keyFall]) return GUIDE[keyFall];

  /* 난색인데 전용 키가 없으면 한색으로 폴백 */
  if(effColor==='wblue'){
    return getGuide_cool('blue',curLv,tarLv);
  }
  if(effColor==='wash'){
    return getGuide_cool('ash',curLv,tarLv);
  }
  if(effColor==='wviolet'){
    return getGuide_cool('violet',curLv,tarLv);
  }
  if(effColor==='wlavash'){
    return getGuide_cool('lavash',curLv,tarLv);
  }
  if(effColor==='wred'){
    return getGuide_cool('red',curLv,tarLv);
  }
  if(effColor==='wrv'){
    return getGuide_cool('rv',curLv,tarLv);
  }
  if(effColor==='wpink'){
    return getGuide_cool('pink',curLv,tarLv);
  }

  return null;
}

/* 한색 전용 폴백 (난색에서 wblue 키가 없을 때 blue 키로 재탐색) */
function getGuide_cool(color,curLv,tarLv){
  var cz=lvZone(curLv);
  var tzTarget=lvZone(tarLv);
  var isHigh=cz==='high16'||cz==='high20';
  var tz;
  if(tarLv<=5) tz='vlow';
  else if(tarLv<=6) tz=(cz==='low')?'low':'vlow';
  else if(tarLv<=8) tz=(cz==='low')?'mid8':'low';
  else if(tarLv<=12) tz='mid';
  else if(tarLv===14) tz='14';
  else if(tarLv===16) tz='16';
  else if(tarLv===18) tz='18';
  else tz='20';
  var key=color+'_'+cz+'_'+tz;
  if(GUIDE[key]) return GUIDE[key];
  if(isHigh){var kh=color+'_high_'+tz;if(GUIDE[kh]) return GUIDE[kh];}
  var keyFall=color+'_'+cz+'_'+tzTarget;
  if(GUIDE[keyFall]) return GUIDE[keyFall];
  return null;
}

function hslToRgb(h,s,l){
  s/=100;l/=100;
  var k=function(n){return(n+h/30)%12;};
  var a=s*Math.min(l,1-l);
  var f=function(n){return l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));};
  return[Math.round(f(0)*255),Math.round(f(8)*255),Math.round(f(4)*255)];
}
function rs(c){return'rgb('+c[0]+','+c[1]+','+c[2]+')';}
function lerp(a,b,t){return a+(b-a)*t;}
function eio(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}
function lc(c1,c2,t){return[Math.round(lerp(c1[0],c2[0],t)),Math.round(lerp(c1[1],c2[1],t)),Math.round(lerp(c1[2],c2[2],t))];}

function makeCanvas(container,H){
  var W=Math.max(container.clientWidth||300,300);
  var cv=document.createElement('canvas');
  cv.width=W*2;cv.height=H*2;
  cv.style.cssText='width:100%;height:'+H+'px;display:block;';
  container.appendChild(cv);
  var ctx=cv.getContext('2d');ctx.scale(2,2);
  return{cv:cv,ctx:ctx,W:W,H:H};
}

function circ(ctx,x,y,r,rgb,a){
  if(r<1)return;
  ctx.save();ctx.globalAlpha=Math.max(0,Math.min(1,a!=null?a:1));
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=rs(rgb);ctx.fill();ctx.restore();
}
function glow(ctx,x,y,r,rgb){
  ctx.save();ctx.globalAlpha=0.18;
  var g=ctx.createRadialGradient(x,y,0,x,y,r*2);
  g.addColorStop(0,rs(rgb));g.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(x,y,r*2,0,Math.PI*2);
  ctx.fillStyle=g;ctx.fill();ctx.restore();
}
function lbl(ctx,x,y,txt,a){
  ctx.save();ctx.globalAlpha=a!=null?a:0.7;
  ctx.fillStyle='#fff';ctx.font='600 10px -apple-system,sans-serif';
  ctx.textAlign='center';ctx.fillText(txt,x,y);ctx.restore();
}
function arw(ctx,x1,x2,cy,a){
  ctx.save();ctx.globalAlpha=a||0.35;ctx.strokeStyle='#aaa';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(x1,cy);ctx.lineTo(x2-5,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x2-5,cy-3);ctx.lineTo(x2,cy);ctx.lineTo(x2-5,cy+3);ctx.stroke();
  ctx.restore();
}

/* ── 시나리오1: 주황 + 색감 → 수렴색 (중명도 톤인톤) ── */
/* 두 공이 양쪽에서 가운데로 들어와 겹치며 결과색이 서서히 발현 */
function animConverge(wrapId,rafKey,curRgb,colorRgb,resultRgb,curLbl,colorLbl,resultLbl){
  var wrap=document.getElementById(wrapId);
  wrap.innerHTML='';wrap.style.display='block';
  var c=makeCanvas(wrap,80);
  var ctx=c.ctx,W=c.W,H=c.H;
  var R=Math.min(16,W*0.055),cy=H*0.42,LY=cy+R+11;
  var cx=W*0.5;
  var t=0;
  function draw(){
    ctx.fillStyle='#111';ctx.fillRect(0,0,W,H);
    var e=eio(t);
    /* p1: 두 공이 가운데로 이동 (0~0.45) */
    var p1=Math.min(1,e/0.45);
    /* p2: 겹친 후 결과색 발현 (0.4~0.7) */
    var p2=Math.max(0,Math.min(1,(e-0.4)/0.3));
    /* p3: 결과 공 완성+커짐 (0.65~1) */
    var p3=Math.max(0,Math.min(1,(e-0.65)/0.35));

    var x1=lerp(W*0.12,cx-R*0.3,p1);
    var x2=lerp(W*0.88,cx+R*0.3,p1);
    var fadeOrig=1-p2;

    /* 원래 두 공 (서서히 안쪽으로 + 페이드) */
    if(fadeOrig>0.01){
      glow(ctx,x1,cy,R,curRgb);
      circ(ctx,x1,cy,R,curRgb,0.9*fadeOrig);
      lbl(ctx,x1,LY,curLbl,0.7*fadeOrig);
      glow(ctx,x2,cy,R*0.9,colorRgb);
      circ(ctx,x2,cy,R*0.9,colorRgb,0.85*fadeOrig);
      lbl(ctx,x2,LY,colorLbl,0.7*fadeOrig);
    }
    /* 겹치는 중간 혼합 */
    if(p2>0&&p3<0.8){
      var mRgb=lc(lc(curRgb,colorRgb,0.5),resultRgb,p2);
      var mScale=0.7+p2*0.3;
      circ(ctx,cx,cy,R*mScale,mRgb,p2*0.7);
    }
    /* 결과색 발현 */
    if(p3>0){
      var fScale=0.8+p3*0.35;
      var fRgb=lc(lc(curRgb,colorRgb,0.5),resultRgb,0.5+p3*0.5);
      glow(ctx,cx,cy,R*fScale,fRgb);
      circ(ctx,cx,cy,R*fScale,fRgb,0.6+p3*0.35);
      lbl(ctx,cx,LY,resultLbl,p3);
    }
    t+=0.005;
    if(t>=1){t=0;}
    window[rafKey]=requestAnimationFrame(draw);
  }
  window[rafKey]=requestAnimationFrame(draw);
}

/* ── 시나리오2: 보색중화 → 착색 (고명도 보색중화) ── */
/* 잔류+보색이 가운데로 수렴→중화→블루가 안으로 스며들며 결과색 서서히 발현 */
function animNeutColor(wrapId,rafKey,underRgb,compRgb,colorRgb,resultRgb,underLbl,compLbl,colorLbl,resultLbl){
  var wrap=document.getElementById(wrapId);
  wrap.innerHTML='';wrap.style.display='block';
  var c=makeCanvas(wrap,80);
  var ctx=c.ctx,W=c.W,H=c.H;
  var R=Math.min(15,W*0.05),cy=H*0.42,LY=cy+R+11;
  var cxL=W*0.32, cxR=W*0.68;
  var t=0;
  function draw(){
    ctx.fillStyle='#111';ctx.fillRect(0,0,W,H);
    var e=eio(t);
    /* p1: 잔류+보색 가운데로 이동 (0~0.3) */
    var p1=Math.min(1,e/0.3);
    /* p2: 중화색 발현 (0.25~0.5) */
    var p2=Math.max(0,Math.min(1,(e-0.25)/0.25));
    /* p3: 블루 공이 바깥에서 중화 위치로 스며듦 (0.45~0.7) */
    var p3=Math.max(0,Math.min(1,(e-0.45)/0.25));
    /* p4: 결과색 완성 (0.65~1) */
    var p4=Math.max(0,Math.min(1,(e-0.65)/0.35));

    var fadeOrig=1-Math.min(1,p2*1.5);
    /* ① 잔류+보색 → 가운데로 이동 */
    if(fadeOrig>0.01){
      var xU=lerp(W*0.08,cxL,p1);
      var xC=lerp(W*0.28,cxL,p1);
      glow(ctx,xU,cy,R*0.85,underRgb);
      circ(ctx,xU,cy,R*0.85,underRgb,0.9*fadeOrig);
      lbl(ctx,xU,LY,underLbl,0.7*fadeOrig);
      circ(ctx,xC,cy,R*0.7,compRgb,(0.5+p1*0.4)*fadeOrig);
      lbl(ctx,xC,LY,compLbl,p1*fadeOrig);
    }
    /* ② 중화색(연브라운) 발현 */
    if(p2>0){
      var neutRgb=lc(lc(underRgb,compRgb,0.5),[215,195,165],Math.min(1,p2*1.2));
      var fadeNeut=1-Math.min(1,p4*1.5);
      var nScale=0.5+p2*0.4;
      if(fadeNeut>0.01){
        circ(ctx,cxL,cy,R*nScale,neutRgb,Math.min(0.9,p2)*fadeNeut);
        lbl(ctx,cxL,LY,'중화',p2*0.6*fadeNeut);
      }
    }
    /* ③ 블루 공이 바깥에서 중화 공 위치로 스며듦 */
    if(p3>0){
      var blueX=lerp(W+R*2,cxR,eio(Math.min(1,p3)));
      var fadeBlue=1-Math.min(1,p4*1.2);
      var bScale=0.5+p3*0.4;
      if(fadeBlue>0.01){
        glow(ctx,blueX,cy,R*bScale,colorRgb);
        circ(ctx,blueX,cy,R*bScale,colorRgb,(0.5+p3*0.4)*fadeBlue);
        lbl(ctx,blueX,LY,colorLbl,p3*fadeBlue);
      }
    }
    /* ④ 결과색 — 중화+블루가 합쳐져 서서히 발현 */
    if(p4>0){
      var resCx=lerp(W*0.5,W*0.5,p4);
      var fScale=0.7+p4*0.45;
      var fRgb=lc(colorRgb,resultRgb,p4);
      glow(ctx,resCx,cy,R*fScale,fRgb);
      circ(ctx,resCx,cy,R*fScale,fRgb,0.6+p4*0.35);
      lbl(ctx,resCx,LY,resultLbl,p4);
    }
    t+=0.005;
    if(t>=1){t=0;}
    window[rafKey]=requestAnimationFrame(draw);
  }
  window[rafKey]=requestAnimationFrame(draw);
}

/* ── 시나리오3: 탈색 과정 (회오리 효과) ── */
/* 탈색 공이 밝아진 후, 색감 공이 바깥에서 안쪽으로 스며들며 결과색 서서히 발현 */
function animBleach(wrapId,rafKey,startRgb,colorRgb,resultRgb,resultLbl){
  var wrap=document.getElementById(wrapId);
  wrap.innerHTML='';wrap.style.display='block';
  var c=makeCanvas(wrap,85);
  var ctx=c.ctx,W=c.W,H=c.H;
  var R=Math.min(17,W*0.06),cy=H*0.42,LY=cy+R+11;
  var cx=W*0.5;
  /* 난색은 레드 단계가 더 길고 강함 */
  var bleachSteps;
  if(S.cw==='warm'){
    bleachSteps=[
      startRgb,
      hslToRgb(3,42,18),   /* 진한 레드 */
      hslToRgb(8,45,22),   /* 레드 */
      hslToRgb(15,50,30),  /* 레드주황 */
      hslToRgb(22,60,40),  /* 주황 */
      hslToRgb(35,55,50),  /* 주황노랑 */
      hslToRgb(48,55,60),  /* 노랑 */
      [255,245,215]         /* 연노랑 */
    ];
  } else {
    bleachSteps=[
      startRgb,
      hslToRgb(8,45,22),
      hslToRgb(22,60,40),
      hslToRgb(45,55,60),
      [255,245,215]
    ];
  }
  var t=0;
  function draw(){
    ctx.fillStyle='#111';ctx.fillRect(0,0,W,H);
    var e=eio(t);
    /* p1: 탈색 과정 (0~0.5) */
    var bp=Math.min(1,e/0.5);
    /* p2: 색감 공 스며듦 (0.45~0.75) */
    var p2=Math.max(0,Math.min(1,(e-0.45)/0.3));
    /* p3: 결과색 완성 (0.7~1) */
    var p3=Math.max(0,Math.min(1,(e-0.7)/0.3));

    /* 탈색 공 — 점점 밝아짐 */
    var si=bp*(bleachSteps.length-1);
    var idx=Math.min(Math.floor(si),bleachSteps.length-2);
    var frac=si-idx;
    var curC=lc(bleachSteps[idx],bleachSteps[idx+1],frac);
    var fadeBleach=1-Math.min(1,p3*1.3);

    if(fadeBleach>0.01){
      glow(ctx,cx,cy,R,curC);
      circ(ctx,cx,cy,R,curC,0.95*fadeBleach);
      lbl(ctx,cx,LY,bp>0.7?'탈색 완료':'탈색 중',0.7*fadeBleach);
    }
    /* 회오리 파티클 */
    if(bp<0.9&&fadeBleach>0.1){
      for(var i=0;i<6;i++){
        var ang=(bp*8+i*1.05)%(Math.PI*2);
        var dist=R+4+i*2.5;
        var pRgb=lc(curC,[255,245,215],0.5);
        circ(ctx,cx+Math.cos(ang)*dist,cy+Math.sin(ang)*dist,2.5,pRgb,(1-bp)*0.5*fadeBleach);
      }
    }
    /* 색감 공이 바깥에서 가운데로 스며듦 */
    if(p2>0){
      var colX=lerp(W+R*2,cx,eio(p2));
      var fadeCol=1-Math.min(1,p3*1.2);
      var cScale=0.4+p2*0.5;
      if(fadeCol>0.01){
        glow(ctx,colX,cy,R*cScale,colorRgb);
        circ(ctx,colX,cy,R*cScale,colorRgb,(0.5+p2*0.4)*fadeCol);
      }
    }
    /* 결과색 발현 */
    if(p3>0){
      var fScale=0.8+p3*0.35;
      var fRgb=lc(colorRgb,resultRgb,p3*0.6);
      glow(ctx,cx,cy,R*fScale,fRgb);
      circ(ctx,cx,cy,R*fScale,fRgb,0.6+p3*0.35);
      lbl(ctx,cx,LY,resultLbl,p3);
    }
    t+=0.005;
    if(t>=1){t=0;}
    window[rafKey]=requestAnimationFrame(draw);
  }
  window[rafKey]=requestAnimationFrame(draw);
}

/* ── 캔버스 자동 호출 로직 ── */
function triggerCanvas(color,curLv,tarLv){
  stopAllCanvas();
  var curZ=lvZone(curLv),tarZ=lvZone(tarLv);
  var needBleach=(tarLv>=14)||(tarLv>curLv&&tarZ!==curZ&&(tarZ==='high16'||tarZ==='high20'));
  var isHighToneIn=(curZ==='high16'||curZ==='high20')&&(tarZ==='high16'||tarZ==='high20');
  var isMidToneIn=(curZ==='mid'&&tarZ==='mid'&&tarLv!==14)||(curZ==='mid'&&tarZ==='low');

  /* 색감별 RGB */
  var colorDot=SW[color]?SW[color].dot:'hsl(222,40%,60%)';
  var m=colorDot.match(/hsl\((\d+),\s*(\d+)%?,\s*(\d+)%?\)/);
  var colorRgb=m?hslToRgb(+m[1],+m[2],+m[3]):[107,130,196];

  /* 주황 잔류 */
  var orangeRgb=hslToRgb(22,60,42);
  /* 노랑 잔류 */
  var yellowRgb=hslToRgb(48,55,62);
  /* 보라(바이올렛) 보색 */
  var violetRgb=hslToRgb(270,40,45);
  /* 스모키 애쉬브라운 결과 */
  var smokyRgb=hslToRgb(210,10,23);
  /* 시작색 (저명도) — 난색은 레드 시작 */
  var startRgb=S.cw==='warm'?hslToRgb(5,35,13):hslToRgb(15,30,15);

  /* 난색 전용 잔류색 */
  var redRgb=hslToRgb(5,40,18);         /* 레드 잔류 (5·6) */
  var redOrangeRgb=hslToRgb(12,50,28);  /* 레드주황 잔류 (8·10) */
  var greenRgb=hslToRgb(120,30,35);     /* 그린 보색 */
  var ashRgb=hslToRgb(210,8,55);        /* 애쉬 */

  /* 목표색 RGB */
  var tarHsl=SW[color]?SW[color].lv[tarLv]:null;
  var resultRgb=colorRgb;
  if(tarHsl){
    var tm=tarHsl.match(/hsl\((\d+),\s*(\d+)%?,\s*(\d+)%?\)/);
    if(tm)resultRgb=hslToRgb(+tm[1],+tm[2],+tm[3]);
  }
  var resultLbl=getLabelName(color,tarLv);

  /* ── 케이스 분기 ── */
  var isWarm=S.cw==='warm';

  /* 1) 탈색 + 보색중화 둘 다 필요 (캔버스 2개) — 14~18 목표 */
  /* 라벤더애쉬 18·20: 연노랑 베이스라 보색중화 불필요 → 케이스2(탈색만)로 */
  if(needBleach&&(tarLv>=14)&&tarLv<20&&!(color==='lavash'&&tarLv>=18)&&!(color==='wlavash'&&tarLv>=18)&&color!=='red'&&color!=='wred'&&color!=='rv'&&color!=='wrv'&&color!=='pink'&&color!=='wpink'){
    /* 캔버스1: 탈색 과정 */
    animBleach('canvasWrap1','_raf1',startRgb,colorRgb,resultRgb,'탈색');
    /* 캔버스2: 보색중화 → 착색 (난색: 잔류에 따라 다른 보색) */
    setTimeout(function(){
      if(isWarm){
        /* 난색: 14레벨 도착 = 주황노랑 잔류 → 청보라 보색 */
        if(tarLv===14){
          var orangeYellowRgb=hslToRgb(35,55,50);
          animNeutColor('canvasWrap2','_raf2',orangeYellowRgb,violetRgb,colorRgb,resultRgb,'주황노랑 잔류','청보라',SW[color].lb,resultLbl);
        } else {
          /* 16+ = 노랑 잔류 → 보라 보색 (한색과 동일) */
          animNeutColor('canvasWrap2','_raf2',yellowRgb,violetRgb,colorRgb,resultRgb,'노랑 잔류','바이올렛',SW[color].lb,resultLbl);
        }
      } else {
        animNeutColor('canvasWrap2','_raf2',yellowRgb,violetRgb,colorRgb,resultRgb,'노랑 잔류','바이올렛',SW[color].lb,resultLbl);
      }
    },100);
    return;
  }

  /* 2) 탈색만 필요 (캔버스 1개) */
  if(needBleach){
    animBleach('canvasWrap1','_raf1',startRgb,colorRgb,resultRgb,resultLbl);
    return;
  }

  /* 3) 고명도 톤인톤 — 보색중화 (캔버스 1개) */
  if(isHighToneIn&&curLv<20){
    animNeutColor('canvasWrap1','_raf1',yellowRgb,violetRgb,colorRgb,resultRgb,'노랑 잔류','바이올렛',SW[color].lb,resultLbl);
    return;
  }

  /* 4) 중명도 톤인톤/톤다운 — 잔류+색감 수렴 */
  if(isMidToneIn){
    if(isWarm){
      var blueRgb=hslToRgb(220,45,45); /* 블루 보색 */
      if(color==='lavash'||color==='wlavash'){
        /* 라벤더애쉬 난색 중명도: 블루 보색 1개 (올인원 패키지이므로 그린 불필요) */
        /* 캔버스1: 블루 + 레드주황 잔류 수렴 */
        animConverge('canvasWrap1','_raf1',redOrangeRgb,blueRgb,resultRgb,'레드주황 잔류','블루 보색',resultLbl);
        /* 캔버스2: 라벤더애쉬 염모제 + 레드주황 잔류 수렴 */
        setTimeout(function(){
          animConverge('canvasWrap2','_raf2',redOrangeRgb,colorRgb,resultRgb,'레드주황 잔류',SW[color].lb,resultLbl);
        },100);
      } else if(color==='violet'||color==='wviolet'){
        /* 바이올렛 난색 중명도: 바이올렛이 레드주황과 자연수렴 (그린 불필요) */
        animConverge('canvasWrap1','_raf1',redOrangeRgb,colorRgb,resultRgb,'레드주황 잔류',SW[color].lb,resultLbl);
      } else if(color==='red'||color==='wred'){
        /* 레드 난색 중명도: 잔류 붉은기와 레드가 같은 계열 — 자연수렴 */
        animConverge('canvasWrap1','_raf1',redOrangeRgb,colorRgb,resultRgb,'레드주황 잔류',SW[color].lb,resultLbl);
      } else if(color==='rv'||color==='wrv'){
        /* 레드바이올렛 난색 중명도: 잔류 붉은기와 자연수렴 */
        animConverge('canvasWrap1','_raf1',redOrangeRgb,colorRgb,resultRgb,'레드주황 잔류',SW[color].lb,resultLbl);
      } else if(color==='pink'||color==='wpink'){
        /* 핑크 난색 중명도: 잔류 붉은기와 자연수렴 */
        animConverge('canvasWrap1','_raf1',redOrangeRgb,colorRgb,resultRgb,'레드주황 잔류',SW[color].lb,resultLbl);
      } else {
        /* 블루·애쉬 등: 기존 그린+블루 두 가지 보색 — 캔버스 2개 */
        /* 캔버스1: 그린 + 레드주황 수렴 (레드기 강할 때) */
        animConverge('canvasWrap1','_raf1',redOrangeRgb,greenRgb,resultRgb,'레드주황 잔류','그린 보색',resultLbl);
        /* 캔버스2: 블루 + 레드주황 수렴 (주황기 강할 때) */
        setTimeout(function(){
          animConverge('canvasWrap2','_raf2',redOrangeRgb,colorRgb,resultRgb,'레드주황 잔류',SW[color].lb,resultLbl);
        },100);
      }
    } else {
      animConverge('canvasWrap1','_raf1',orangeRgb,colorRgb,resultRgb,'주황 잔류',SW[color].lb,resultLbl);
    }
    return;
  }

  /* 5) 고명도→중/저명도 톤다운 */
  if((curZ==='high16'||curZ==='high20')&&(tarZ==='mid'||tarZ==='low')){
    var curRgbBase=[255,245,215]; /* 연노랑 베이스 */
    /* 고명도→10·12: 연노랑 베이스에 블루+애쉬그레이 두 공 수렴 */
    if(tarLv>=10&&tarLv<=12){
      var ashGrayRgb=hslToRgb(210,8,55);
      animToneDown2('canvasWrap1','_raf1',curRgbBase,colorRgb,ashGrayRgb,resultRgb,'연노랑 베이스',SW[color].lb,'애쉬그레이',resultLbl);
      return;
    }
    /* 그 외 톤다운: 기존 1공 수렴 */
    var curHsl=SW[color]?SW[color].lv[curLv]:null;
    var curRgb=[255,245,215];
    if(curHsl){var cm=curHsl.match(/hsl\((\d+),\s*(\d+)%?,\s*(\d+)%?\)/);if(cm)curRgb=hslToRgb(+cm[1],+cm[2],+cm[3]);}
    animConverge('canvasWrap1','_raf1',curRgb,colorRgb,resultRgb,'현재 베이스',SW[color].lb,resultLbl);
    return;
  }
}

/* ── 시나리오4: 톤다운 2공 수렴 (연노랑 + 블루 + 애쉬그레이 → 결과) ── */
/* 베이스 가운데, 블루 왼쪽·애쉬그레이 오른쪽에서 수평 진입 → 가운데서 합쳐져 결과색 발현 */
function animToneDown2(wrapId,rafKey,baseRgb,color1Rgb,color2Rgb,resultRgb,baseLbl,color1Lbl,color2Lbl,resultLbl){
  var wrap=document.getElementById(wrapId);
  wrap.innerHTML='';wrap.style.display='block';
  var c=makeCanvas(wrap,85);
  var ctx=c.ctx,W=c.W,H=c.H;
  var R=Math.min(15,W*0.05),cy=H*0.42,LY=cy+R+11;
  var cx=W*0.5;
  var t=0;
  function draw(){
    ctx.fillStyle='#111';ctx.fillRect(0,0,W,H);
    var e=eio(t);
    /* p1: 세 공 등장+이동 (0~0.45) */
    var p1=Math.min(1,e/0.45);
    /* p2: 겹침+혼합 (0.4~0.7) */
    var p2=Math.max(0,Math.min(1,(e-0.4)/0.3));
    /* p3: 결과색 발현 (0.65~1) */
    var p3=Math.max(0,Math.min(1,(e-0.65)/0.35));

    var fadeOrig=1-p2;

    /* ① 연노랑 베이스 — 가운데 */
    if(fadeOrig>0.01){
      glow(ctx,cx,cy,R,baseRgb);
      circ(ctx,cx,cy,R,baseRgb,0.9*fadeOrig);
      lbl(ctx,cx,LY,baseLbl,0.7*fadeOrig);
    }
    /* ② 블루 공 — 왼쪽에서 수평으로 가운데로 */
    if(p1>0&&fadeOrig>0.01){
      var bx1=lerp(W*0.05,cx-R*0.3,eio(p1));
      glow(ctx,bx1,cy,R*0.85,color1Rgb);
      circ(ctx,bx1,cy,R*0.85,color1Rgb,(0.5+p1*0.4)*fadeOrig);
      lbl(ctx,bx1,LY,color1Lbl,p1*0.8*fadeOrig);
    }
    /* ③ 애쉬그레이 공 — 오른쪽에서 수평으로 가운데로 */
    if(p1>0&&fadeOrig>0.01){
      var bx2=lerp(W*0.95,cx+R*0.3,eio(p1));
      glow(ctx,bx2,cy,R*0.8,color2Rgb);
      circ(ctx,bx2,cy,R*0.8,color2Rgb,(0.5+p1*0.4)*fadeOrig);
      lbl(ctx,bx2,LY,color2Lbl,p1*0.8*fadeOrig);
    }
    /* ④ 겹침 중간색 */
    if(p2>0&&p3<0.8){
      var midRgb=lc(lc(baseRgb,color1Rgb,0.4),color2Rgb,0.3);
      var mRgb=lc(midRgb,resultRgb,p2);
      circ(ctx,cx,cy,R*(0.7+p2*0.3),mRgb,p2*0.7);
    }
    /* ⑤ 결과색 발현 */
    if(p3>0){
      var fScale=0.8+p3*0.35;
      var midRgb2=lc(lc(baseRgb,color1Rgb,0.4),color2Rgb,0.3);
      var fRgb=lc(midRgb2,resultRgb,0.5+p3*0.5);
      glow(ctx,cx,cy,R*fScale,fRgb);
      circ(ctx,cx,cy,R*fScale,fRgb,0.6+p3*0.35);
      lbl(ctx,cx,LY,resultLbl,p3);
    }
    t+=0.005;
    if(t>=1){t=0;}
    window[rafKey]=requestAnimationFrame(draw);
  }
  window[rafKey]=requestAnimationFrame(draw);
}
</script>
