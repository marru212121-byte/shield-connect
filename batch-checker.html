<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1400"/>
<title>배치 검수기 — 쉴드 디자이너 커넥트</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Noto Sans KR',sans-serif;background:#F5F2ED;color:#1C1917;min-height:100vh;font-size:14px}

/* 헤더 */
.topbar{background:#1C1917;color:#fff;padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.topbar h1{font-size:16px;font-weight:800}
.topbar .badge{font-size:11px;background:#D4B896;color:#1C1917;padding:3px 10px;border-radius:99px;font-weight:700}
.topbar .status{margin-left:auto;font-size:12px;color:#A8A29E;display:flex;align-items:center;gap:6px}
.topbar .status .dot{width:8px;height:8px;border-radius:50%;background:#A8A29E}
.topbar .status.ready .dot{background:#10b981}
.topbar .status.busy .dot{background:#f59e0b;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* 컨테이너 */
.container{max-width:1600px;margin:0 auto;padding:24px}

/* 상단: 업로드 + 설정 2열 */
.top-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.panel{background:#fff;border-radius:14px;border:1px solid #e8e4df;padding:20px}
.panel-title{font-size:13px;font-weight:800;color:#1C1917;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.panel-title .num{width:22px;height:22px;background:#1C1917;color:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}

/* 업로드 존 */
.drop-zone{border:2px dashed #d5cfc7;border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:all .15s;background:#FAF8F4}
.drop-zone:hover{border-color:#C4A97A;background:#F5ECD9}
.drop-zone.dragover{border-color:#1C1917;background:#EFE8DB}
.drop-zone .big{font-size:15px;font-weight:700;color:#1C1917;margin-bottom:4px}
.drop-zone .small{font-size:12px;color:#8B7355}
.drop-zone input{display:none}

/* 사진 목록 */
.photo-list{margin-top:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;max-height:200px;overflow-y:auto;padding:4px}
.photo-item{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;border:1.5px solid #e8e4df;background:#f5f2ed}
.photo-item img{width:100%;height:100%;object-fit:cover}
.photo-item .idx{position:absolute;top:2px;left:2px;background:rgba(28,25,23,0.85);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
.photo-item .del{position:absolute;top:2px;right:2px;width:18px;height:18px;background:rgba(239,68,68,0.9);color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}

/* 설정 폼 */
.form-row{display:grid;grid-template-columns:110px 1fr;gap:10px;align-items:center;margin-bottom:10px}
.form-row label{font-size:12px;font-weight:600;color:#6B5D4E}
.form-row input[type="number"]{width:80px;padding:6px 10px;border:1.5px solid #e8e4df;border-radius:8px;font-size:14px;font-family:inherit}
.form-row .seg{display:flex;gap:0;border:1.5px solid #e8e4df;border-radius:8px;overflow:hidden}
.form-row .seg button{flex:1;padding:8px 12px;border:none;background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:#6B5D4E;font-family:inherit}
.form-row .seg button.active{background:#1C1917;color:#fff}
.form-row .hint{font-size:11px;color:#A8A29E;margin-left:6px}

/* 실행 버튼 */
.run-bar{display:flex;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid #e8e4df}
.btn{padding:10px 18px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-primary{background:#1C1917;color:#fff}
.btn-primary:hover{background:#000}
.btn-primary:disabled{background:#A8A29E;cursor:not-allowed}
.btn-secondary{background:#fff;color:#1C1917;border:1.5px solid #e8e4df}
.btn-secondary:hover{background:#FAF8F4}
.btn-danger{background:#fee;color:#dc2626;border:1.5px solid #fca5a5}
.btn-danger:hover{background:#fecaca}

/* 진행 바 */
.progress-wrap{flex:1;display:flex;align-items:center;gap:10px;min-width:0}
.progress{flex:1;height:8px;background:#e8e4df;border-radius:99px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#C4A97A,#1C1917);width:0%;transition:width .2s;border-radius:99px}
.progress-txt{font-size:12px;font-weight:600;color:#6B5D4E;white-space:nowrap}

/* 결과 섹션 */
.results{background:#fff;border-radius:14px;border:1px solid #e8e4df;padding:20px}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #e8e4df}
.results-header h2{font-size:15px;font-weight:800}
.results-header .actions{display:flex;gap:8px}

/* 결과 카드 */
.result-card{border:1px solid #e8e4df;border-radius:12px;margin-bottom:16px;overflow:hidden}
.card-head{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#FAF8F4;border-bottom:1px solid #e8e4df}
.card-head img{width:48px;height:48px;border-radius:8px;object-fit:cover;border:1.5px solid #e8e4df}
.card-head .meta{flex:1}
.card-head .meta .name{font-size:14px;font-weight:700}
.card-head .meta .sub{font-size:11px;color:#8B7355;margin-top:2px}
.card-head .consistency{font-size:11px;padding:4px 10px;border-radius:99px;font-weight:700}
.cst-high{background:#d1fae5;color:#065f46}
.cst-mid{background:#fef3c7;color:#92400e}
.cst-low{background:#fee2e2;color:#991b1b}
.cst-pending{background:#e5e7eb;color:#6b7280}

/* runs 그리드 */
.runs-grid{display:grid;gap:0;border-top:1px solid #e8e4df}
.runs-grid.cols-1{grid-template-columns:1fr}
.runs-grid.cols-2{grid-template-columns:1fr 1fr}
.runs-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
.runs-grid.cols-4{grid-template-columns:repeat(4,1fr)}
.runs-grid.cols-5{grid-template-columns:repeat(5,1fr)}

.run-cell{padding:14px;border-right:1px solid #e8e4df;border-bottom:1px solid #e8e4df;min-height:120px;position:relative}
.run-cell:last-child{border-right:none}
.run-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px dashed #e8e4df}
.run-label{font-size:11px;font-weight:700;color:#8B7355;letter-spacing:0.5px}
.run-status{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700}
.status-ok{background:#d1fae5;color:#065f46}
.status-err{background:#fee2e2;color:#991b1b}
.status-pending{background:#fef3c7;color:#92400e;animation:pulse 1s infinite}
.status-waiting{background:#e5e7eb;color:#6b7280}

.field{margin-bottom:8px}
.field-label{font-size:10px;font-weight:700;color:#8B7355;letter-spacing:0.5px;margin-bottom:3px;text-transform:uppercase}
.field-value{font-size:13px;color:#1C1917;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.field-value.direction{font-weight:700;font-size:14px;color:#8B7355}
.field-value.small{font-size:12px;color:#6B5D4E}

.err-msg{color:#991b1b;font-size:12px;padding:8px;background:#fef2f2;border-radius:6px;margin-top:6px}

/* 빈 상태 */
.empty{text-align:center;padding:60px 20px;color:#A8A29E;font-size:13px}

/* 모달/알림 */
.toast{position:fixed;bottom:24px;right:24px;background:#1C1917;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:200;opacity:0;transform:translateY(10px);transition:all .2s}
.toast.show{opacity:1;transform:translateY(0)}

/* 설정 요약 배너 */
.summary-banner{background:#FFF9E8;border:1px solid #f3e4b3;border-radius:10px;padding:10px 14px;font-size:12px;color:#8B7355;margin-top:12px;display:flex;align-items:center;gap:8px}
.summary-banner.danger{background:#fee;border-color:#fca5a5;color:#991b1b}

iframe.hidden-frame{display:none}
</style>
</head>
<body>

<div class="topbar">
  <h1>배치 검수기</h1>
  <span class="badge">v1.0</span>
  <div class="status" id="statusBar">
    <span class="dot"></span>
    <span id="statusTxt">analyzer 로딩 중...</span>
  </div>
</div>

<!-- 숨겨진 iframe: analyzer.html 로드해서 프롬프트 빌더 재사용 -->
<iframe class="hidden-frame" id="analyzerFrame" src="./analyzer.html"></iframe>

<div class="container">

  <!-- 상단 2열: 업로드 + 설정 -->
  <div class="top-grid">

    <!-- 패널 1: 사진 업로드 -->
    <div class="panel">
      <div class="panel-title"><span class="num">1</span>사진 업로드</div>
      <label class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept="image/*" multiple/>
        <div class="big">클릭 또는 드래그&드롭</div>
        <div class="small">여러 장 한 번에 업로드 가능 (권장 20장 이하)</div>
      </label>
      <div class="photo-list" id="photoList"></div>
      <div id="photoCount" style="font-size:11px;color:#8B7355;margin-top:8px;text-align:right"></div>
    </div>

    <!-- 패널 2: 설정 -->
    <div class="panel">
      <div class="panel-title"><span class="num">2</span>실행 설정</div>

      <div class="form-row">
        <label>반복 횟수</label>
        <div>
          <input type="number" id="repCount" value="3" min="1" max="5"/>
          <span class="hint">사진당 몇 번 돌릴지 (1~5)</span>
        </div>
      </div>

      <div class="form-row">
        <label>요청 간격</label>
        <div>
          <input type="number" id="delayMs" value="1500" min="500" step="500"/>
          <span class="hint">ms (Tier 2는 1500 권장, Tier 3은 800)</span>
        </div>
      </div>

      <div class="form-row">
        <label>실행 스텝</label>
        <div class="seg" id="stepSeg">
          <button data-val="analysis">Step 1만 (분석)</button>
          <button data-val="recipe">Step 2만 (레시피)</button>
          <button data-val="both" class="active">둘 다</button>
        </div>
      </div>

      <div class="summary-banner" id="summaryBanner">
        준비 중...
      </div>

      <div class="run-bar">
        <button class="btn btn-primary" id="runBtn" disabled>모두 실행</button>
        <button class="btn btn-danger" id="stopBtn" style="display:none">정지</button>
        <div class="progress-wrap">
          <div class="progress"><div class="progress-bar" id="progBar"></div></div>
          <div class="progress-txt" id="progTxt">대기 중</div>
        </div>
      </div>
    </div>

  </div>

  <!-- 결과 -->
  <div class="results">
    <div class="results-header">
      <h2>결과</h2>
      <div class="actions">
        <button class="btn btn-secondary" id="exportMd">Markdown 내보내기</button>
        <button class="btn btn-secondary" id="clearResults">결과 비우기</button>
      </div>
    </div>
    <div id="resultsArea">
      <div class="empty">사진을 업로드하고 "모두 실행"을 누르세요.</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════
   상태 관리
═══════════════════════════════════════════════ */
var STATE = {
  photos: [],        // {id, name, base64, mediaType, thumb}
  results: [],       // {photoId, runs: [{step1, step2, error, ms}]}
  running: false,
  stopFlag: false,
  analyzerReady: false,
  analyzerWin: null
};

var API_URL = '/api/recipe';
var MAX_SIZE = 1600;
var MAX_BYTES = 1000000;

/* ═══════════════════════════════════════════════
   analyzer.html iframe 준비 감지
═══════════════════════════════════════════════ */
function initAnalyzerFrame(){
  var frame = document.getElementById('analyzerFrame');
  frame.addEventListener('load', function(){
    try {
      STATE.analyzerWin = frame.contentWindow;
      // 프롬프트 빌더 존재 확인
      if(typeof STATE.analyzerWin.buildAnalysisPrompt === 'function' &&
         typeof STATE.analyzerWin.buildRecipePrompt === 'function'){
        STATE.analyzerReady = true;
        var sb = document.getElementById('statusBar');
        sb.classList.add('ready');
        document.getElementById('statusTxt').textContent = 'analyzer 연동 완료';
        document.getElementById('runBtn').disabled = STATE.photos.length === 0;
        updateSummary();
      } else {
        document.getElementById('statusTxt').textContent = '⚠ 프롬프트 빌더 찾기 실패';
      }
    } catch(e){
      document.getElementById('statusTxt').textContent = '⚠ analyzer 접근 실패: '+e.message;
    }
  });
}

/* ═══════════════════════════════════════════════
   파일 업로드 & 리사이즈
═══════════════════════════════════════════════ */
function resizeImage(file){
  return new Promise(function(resolve, reject){
    var reader = new FileReader();
    reader.onload = function(e){
      var img = new Image();
      img.onload = function(){
        var w = img.width, h = img.height;
        if(w > MAX_SIZE || h > MAX_SIZE){
          if(w > h){ h = Math.round(h * MAX_SIZE / w); w = MAX_SIZE; }
          else { w = Math.round(w * MAX_SIZE / h); h = MAX_SIZE; }
        }
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);

        var quality = 0.9;
        var dataUrl = canvas.toDataURL('image/jpeg', quality);
        while(dataUrl.length * 0.75 > MAX_BYTES && quality > 0.7){
          quality -= 0.05;
          dataUrl = canvas.toDataURL('image/jpeg', quality);
        }
        var b64 = dataUrl.split(',')[1];
        resolve({ base64: b64, mediaType: 'image/jpeg', dataUrl: dataUrl });
      };
      img.onerror = function(){ reject(new Error('이미지 로드 실패')); };
      img.src = e.target.result;
    };
    reader.onerror = function(){ reject(new Error('파일 읽기 실패')); };
    reader.readAsDataURL(file);
  });
}

async function handleFiles(files){
  if(!files || files.length === 0) return;

  var promises = [];
  for(var i=0; i<files.length; i++){
    (function(file){
      promises.push(
        resizeImage(file).then(function(r){
          STATE.photos.push({
            id: 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2,5),
            name: file.name,
            base64: r.base64,
            mediaType: r.mediaType,
            thumb: r.dataUrl
          });
        }).catch(function(err){
          console.error('파일 처리 실패:', file.name, err);
        })
      );
    })(files[i]);
  }

  await Promise.all(promises);
  renderPhotoList();
  updateSummary();
  if(STATE.analyzerReady && STATE.photos.length > 0){
    document.getElementById('runBtn').disabled = false;
  }
}

function renderPhotoList(){
  var list = document.getElementById('photoList');
  list.innerHTML = '';
  STATE.photos.forEach(function(p, idx){
    var el = document.createElement('div');
    el.className = 'photo-item';
    el.innerHTML =
      '<img src="'+p.thumb+'"/>' +
      '<span class="idx">'+(idx+1)+'</span>' +
      '<button class="del" data-id="'+p.id+'">×</button>';
    list.appendChild(el);
  });
  list.querySelectorAll('.del').forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      var id = btn.dataset.id;
      STATE.photos = STATE.photos.filter(function(p){ return p.id !== id; });
      renderPhotoList();
      updateSummary();
      if(STATE.photos.length === 0){
        document.getElementById('runBtn').disabled = true;
      }
    });
  });
  document.getElementById('photoCount').textContent = STATE.photos.length + '장 업로드됨';
}

/* ═══════════════════════════════════════════════
   드래그 & 드롭
═══════════════════════════════════════════════ */
function initDropZone(){
  var dz = document.getElementById('dropZone');
  var input = document.getElementById('fileInput');

  input.addEventListener('change', function(e){
    handleFiles(e.target.files);
    input.value = '';
  });

  dz.addEventListener('dragover', function(e){
    e.preventDefault();
    dz.classList.add('dragover');
  });
  dz.addEventListener('dragleave', function(){ dz.classList.remove('dragover'); });
  dz.addEventListener('drop', function(e){
    e.preventDefault();
    dz.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });
}

/* ═══════════════════════════════════════════════
   설정 — segmented control
═══════════════════════════════════════════════ */
function initSegmented(){
  var seg = document.getElementById('stepSeg');
  seg.querySelectorAll('button').forEach(function(btn){
    btn.addEventListener('click', function(){
      seg.querySelectorAll('button').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      updateSummary();
    });
  });
  document.getElementById('repCount').addEventListener('input', updateSummary);
  document.getElementById('delayMs').addEventListener('input', updateSummary);
}

function getSelectedStep(){
  return document.querySelector('#stepSeg button.active').dataset.val;
}

function updateSummary(){
  var n = STATE.photos.length;
  var rep = parseInt(document.getElementById('repCount').value) || 1;
  var delay = parseInt(document.getElementById('delayMs').value) || 1500;
  var step = getSelectedStep();
  var stepsPerRun = step === 'both' ? 2 : 1;

  var totalReqs = n * rep * stepsPerRun;
  var estSec = Math.ceil((totalReqs * delay) / 1000) + totalReqs * 3; // 3s avg per request
  var estMin = Math.floor(estSec / 60);
  var estSec2 = estSec % 60;

  // 비용 추정: 분석 ~$0.02, 레시피 ~$0.03
  var costPerReq = step === 'both' ? 0.05 : (step === 'recipe' ? 0.03 : 0.02);
  var estCost = (totalReqs * costPerReq).toFixed(2);

  var banner = document.getElementById('summaryBanner');
  var msg;

  if(n === 0){
    msg = '사진을 업로드하세요.';
    banner.className = 'summary-banner';
  } else {
    msg = '총 ' + totalReqs + '개 요청 · 예상 ' + (estMin > 0 ? estMin+'분 ' : '') + estSec2 + '초 · 예상 비용 약 $' + estCost;

    // 경고
    if(totalReqs > 100){
      msg += ' ⚠ 요청 많음';
      banner.className = 'summary-banner danger';
    } else {
      banner.className = 'summary-banner';
    }
  }
  banner.textContent = msg;
}

/* ═══════════════════════════════════════════════
   핵심: 배치 실행
═══════════════════════════════════════════════ */
async function runBatch(){
  if(!STATE.analyzerReady){
    showToast('analyzer.html 아직 로딩 중');
    return;
  }
  if(STATE.photos.length === 0){
    showToast('사진을 먼저 업로드하세요');
    return;
  }

  STATE.running = true;
  STATE.stopFlag = false;
  document.getElementById('runBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = 'inline-block';
  document.getElementById('statusBar').classList.remove('ready');
  document.getElementById('statusBar').classList.add('busy');
  document.getElementById('statusTxt').textContent = '실행 중';

  var rep = parseInt(document.getElementById('repCount').value) || 1;
  var delay = parseInt(document.getElementById('delayMs').value) || 1500;
  var step = getSelectedStep();

  // 프롬프트 빌더 호출
  var analysisPrompt = '', recipePrompt = '';
  try {
    if(step === 'analysis' || step === 'both'){
      analysisPrompt = STATE.analyzerWin.buildAnalysisPrompt();
    }
    if(step === 'recipe' || step === 'both'){
      recipePrompt = STATE.analyzerWin.buildRecipePrompt();
    }
  } catch(e){
    showToast('프롬프트 빌더 호출 실패: '+e.message);
    finishBatch();
    return;
  }

  // 결과 슬롯 초기화
  STATE.results = STATE.photos.map(function(p){
    return {
      photoId: p.id,
      photoName: p.name,
      photoThumb: p.thumb,
      runs: new Array(rep).fill(null).map(function(){ return { step1:null, step2:null, error:null, ms:0, status:'waiting' }; })
    };
  });
  renderResults();

  var totalReqs = STATE.photos.length * rep * (step === 'both' ? 2 : 1);
  var doneReqs = 0;

  // 루프: 사진 × 반복
  for(var pi=0; pi<STATE.photos.length && !STATE.stopFlag; pi++){
    var photo = STATE.photos[pi];
    var resultCard = STATE.results[pi];

    for(var ri=0; ri<rep && !STATE.stopFlag; ri++){
      var run = resultCard.runs[ri];
      run.status = 'pending';
      renderResults();

      var runStart = Date.now();

      try {
        // Step 1
        if(step === 'analysis' || step === 'both'){
          var t0 = Date.now();
          var a = await callAPI(photo, analysisPrompt, 'analysis', delay);
          run.step1 = a;
          run.ms = Date.now() - t0;
          doneReqs++;
          updateProgress(doneReqs, totalReqs);
          renderResults();
          if(STATE.stopFlag) break;
          await sleep(delay);
        }

        // Step 2
        if(step === 'recipe' || step === 'both'){
          var t1 = Date.now();
          var r = await callAPI(photo, recipePrompt, 'recipe', delay);
          run.step2 = r;
          run.ms += (Date.now() - t1);
          doneReqs++;
          updateProgress(doneReqs, totalReqs);
        }

        run.status = 'ok';
      } catch(err){
        run.error = err.message || '알 수 없는 에러';
        run.status = 'err';
        doneReqs += (step === 'both' ? 2 : 1);
        updateProgress(doneReqs, totalReqs);
      }

      renderResults();

      if(!STATE.stopFlag && ri < rep - 1){
        await sleep(delay);
      }
    }
  }

  finishBatch();
}

function finishBatch(){
  STATE.running = false;
  document.getElementById('runBtn').style.display = 'inline-block';
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('statusBar').classList.remove('busy');
  document.getElementById('statusBar').classList.add('ready');
  document.getElementById('statusTxt').textContent = STATE.stopFlag ? '중단됨' : '완료';
}

function sleep(ms){
  return new Promise(function(r){ setTimeout(r, ms); });
}

/* ═══════════════════════════════════════════════
   API 호출 (재시도 포함)
═══════════════════════════════════════════════ */
async function callAPI(photo, sysPrompt, step, baseDelay){
  var userText = step === 'analysis'
    ? '이 사진 속 모발의 색감을 관찰하여 analysis JSON 하나만 출력해. 사고 과정·설명·인사 금지.'
    : '이 사진 속 모발 색감을 직접 관찰하여 조색 레시피를 역추론해. recipe JSON 하나만 출력해. 사고 과정·설명·인사 금지.';

  var maxAttempts = 3;
  var lastErr = null;

  for(var att=0; att<maxAttempts; att++){
    try {
      var resp = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: step === 'recipe' ? 2048 : 1024,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: photo.mediaType, data: photo.base64 } },
              { type: 'text', text: userText }
            ]
          }],
          system: [{ type:'text', text: sysPrompt, cache_control:{ type:'ephemeral' } }]
        })
      });

      if(resp.status === 429){
        var wait = (att + 1) * baseDelay * 2;
        await sleep(wait);
        continue;
      }

      if(!resp.ok){
        lastErr = new Error('HTTP ' + resp.status);
        if(att < maxAttempts - 1){
          await sleep(baseDelay * (att + 1));
          continue;
        }
        throw lastErr;
      }

      var data = await resp.json();
      if(!data.content) throw new Error('응답 비어있음');
      var txt = data.content.map(function(b){ return b.text || ''; }).join('');
      txt = txt.replace(/```json|```/g, '').trim();
      var m = txt.match(/\{[\s\S]*\}/);
      if(!m) throw new Error('JSON 파싱 실패');
      return JSON.parse(m[0]);
    } catch(err){
      lastErr = err;
      if(att < maxAttempts - 1){
        await sleep(baseDelay * (att + 1));
        continue;
      }
    }
  }
  throw lastErr || new Error('모든 재시도 실패');
}

/* ═══════════════════════════════════════════════
   결과 렌더링
═══════════════════════════════════════════════ */
function renderResults(){
  var area = document.getElementById('resultsArea');
  if(STATE.results.length === 0){
    area.innerHTML = '<div class="empty">사진을 업로드하고 "모두 실행"을 누르세요.</div>';
    return;
  }

  var rep = STATE.results[0] ? STATE.results[0].runs.length : 1;
  var colClass = 'cols-' + Math.min(rep, 5);

  area.innerHTML = STATE.results.map(function(card, pi){
    var consistency = computeConsistency(card.runs);
    var cstClass = 'cst-pending';
    var cstTxt = '대기 중';
    if(consistency){
      cstClass = consistency.class;
      cstTxt = consistency.label;
    }

    var runs = card.runs.map(function(run, ri){
      return renderRun(run, ri);
    }).join('');

    return (
      '<div class="result-card">' +
        '<div class="card-head">' +
          '<img src="'+card.photoThumb+'"/>' +
          '<div class="meta">' +
            '<div class="name">#'+(pi+1)+' '+escapeHtml(card.photoName)+'</div>' +
            '<div class="sub">'+card.runs.length+'회 실행</div>' +
          '</div>' +
          '<span class="consistency '+cstClass+'">'+cstTxt+'</span>' +
        '</div>' +
        '<div class="runs-grid '+colClass+'">' + runs + '</div>' +
      '</div>'
    );
  }).join('');
}

function renderRun(run, idx){
  var statusClass = 'status-waiting';
  var statusTxt = '대기';
  if(run.status === 'pending'){ statusClass = 'status-pending'; statusTxt = '실행 중'; }
  else if(run.status === 'ok'){ statusClass = 'status-ok'; statusTxt = '성공 ('+Math.round(run.ms/100)/10+'s)'; }
  else if(run.status === 'err'){ statusClass = 'status-err'; statusTxt = '실패'; }

  var body = '';
  if(run.error){
    body = '<div class="err-msg">'+escapeHtml(run.error)+'</div>';
  } else {
    if(run.step1){
      body += field('분석', null);
      if(run.step1.color_name_ko) body += '<div class="field-value direction">'+escapeHtml(run.step1.color_name_ko)+'</div>';
      if(run.step1.tone) body += field('톤', run.step1.tone, 'small');
      if(run.step1.hex) body += field('hex', run.step1.hex, 'small');
      if(run.step1.elements) body += field('요소', (Array.isArray(run.step1.elements) ? run.step1.elements.join(', ') : run.step1.elements), 'small');
    }
    if(run.step2){
      if(run.step1) body += '<div style="height:8px"></div>';
      body += field('레시피', null);
      if(run.step2.recipe_direction) body += '<div class="field-value direction">'+escapeHtml(run.step2.recipe_direction)+'</div>';
      if(run.step2.summary) body += field('요약', run.step2.summary, 'small');
      if(run.step2.tips) body += field('tips', run.step2.tips, 'small');
    }
    if(!run.step1 && !run.step2 && run.status === 'waiting'){
      body = '<div style="color:#A8A29E;font-size:12px">대기 중...</div>';
    }
  }

  return (
    '<div class="run-cell">' +
      '<div class="run-header">' +
        '<span class="run-label">RUN '+(idx+1)+'</span>' +
        '<span class="run-status '+statusClass+'">'+statusTxt+'</span>' +
      '</div>' +
      body +
    '</div>'
  );
}

function field(label, value, cls){
  var v = '';
  if(value !== null && value !== undefined){
    v = '<div class="field-value '+(cls||'')+'">'+escapeHtml(String(value))+'</div>';
  }
  return '<div class="field"><div class="field-label">'+label+'</div>'+v+'</div>';
}

function escapeHtml(s){
  if(s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function computeConsistency(runs){
  var done = runs.filter(function(r){ return r.status === 'ok'; });
  if(done.length === 0) return null;
  if(done.length < 2) return { class:'cst-pending', label:'진행 중' };

  // recipe_direction 비교 (있으면 우선), 없으면 color_name_ko
  var vals = done.map(function(r){
    return (r.step2 && r.step2.recipe_direction) || (r.step1 && r.step1.color_name_ko) || '';
  }).filter(Boolean);

  if(vals.length === 0) return null;

  var same = 0;
  var first = vals[0];
  vals.forEach(function(v){ if(v === first) same++; });

  var ratio = same / vals.length;
  if(ratio === 1) return { class:'cst-high', label:'일관성 100% ('+vals.length+'/'+vals.length+')' };
  if(ratio >= 0.67) return { class:'cst-mid', label:'일관성 '+Math.round(ratio*100)+'% ('+same+'/'+vals.length+')' };
  return { class:'cst-low', label:'일관성 '+Math.round(ratio*100)+'% ('+same+'/'+vals.length+')' };
}

function updateProgress(done, total){
  var pct = total > 0 ? (done / total * 100) : 0;
  document.getElementById('progBar').style.width = pct + '%';
  document.getElementById('progTxt').textContent = done + '/' + total;
}

/* ═══════════════════════════════════════════════
   Markdown 내보내기
═══════════════════════════════════════════════ */
function exportMarkdown(){
  if(STATE.results.length === 0){
    showToast('결과 없음');
    return;
  }

  var md = '# 배치 검수 결과\n\n';
  md += '> 실행 시각: ' + new Date().toLocaleString('ko-KR') + '\n';
  md += '> 사진 수: ' + STATE.results.length + '장\n';
  md += '> 반복 횟수: ' + STATE.results[0].runs.length + '회\n\n';
  md += '---\n\n';

  STATE.results.forEach(function(card, pi){
    md += '## #' + (pi+1) + ' ' + card.photoName + '\n\n';

    var consistency = computeConsistency(card.runs);
    if(consistency){
      md += '**' + consistency.label + '**\n\n';
    }

    card.runs.forEach(function(run, ri){
      md += '### RUN ' + (ri+1);
      if(run.status === 'ok') md += ' ✅ (' + (Math.round(run.ms/100)/10) + 's)';
      else if(run.status === 'err') md += ' ❌';
      md += '\n\n';

      if(run.error){
        md += '> 에러: ' + run.error + '\n\n';
      } else {
        if(run.step1){
          md += '**분석**\n\n';
          if(run.step1.color_name_ko) md += '- 색감: **' + run.step1.color_name_ko + '**\n';
          if(run.step1.tone) md += '- 톤: ' + run.step1.tone + '\n';
          if(run.step1.hex) md += '- hex: `' + run.step1.hex + '`\n';
          if(run.step1.elements) md += '- 요소: ' + (Array.isArray(run.step1.elements) ? run.step1.elements.join(', ') : run.step1.elements) + '\n';
          md += '\n';
        }
        if(run.step2){
          md += '**레시피**\n\n';
          if(run.step2.recipe_direction) md += '- 방향: **' + run.step2.recipe_direction + '**\n';
          if(run.step2.summary) md += '- 요약: ' + run.step2.summary + '\n';
          if(run.step2.tips) md += '- tips: ' + run.step2.tips + '\n';
          md += '\n';
        }
      }
    });

    md += '---\n\n';
  });

  // 다운로드
  var blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'batch-result-' + new Date().toISOString().slice(0,10) + '.md';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  showToast('Markdown 다운로드 완료');
}

/* ═══════════════════════════════════════════════
   토스트
═══════════════════════════════════════════════ */
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2400);
}

/* ═══════════════════════════════════════════════
   이벤트 바인딩
═══════════════════════════════════════════════ */
document.getElementById('runBtn').addEventListener('click', runBatch);
document.getElementById('stopBtn').addEventListener('click', function(){
  STATE.stopFlag = true;
  showToast('정지 요청 — 현재 요청 끝나면 멈춤');
});
document.getElementById('exportMd').addEventListener('click', exportMarkdown);
document.getElementById('clearResults').addEventListener('click', function(){
  if(STATE.running){ showToast('실행 중에는 비울 수 없음'); return; }
  STATE.results = [];
  renderResults();
  updateProgress(0, 0);
  document.getElementById('progTxt').textContent = '대기 중';
});

/* 초기화 */
initAnalyzerFrame();
initDropZone();
initSegmented();
updateSummary();
</script>
