<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>레시피 검수 도구</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Noto Sans KR',sans-serif;background:#111;color:#e0e0e0;min-height:100vh}
.top-bar{padding:20px 24px;border-bottom:1px solid #222;position:sticky;top:0;z-index:100;background:rgba(17,17,17,0.95);backdrop-filter:blur(8px)}
.top-bar h1{font-size:18px;font-weight:800;color:#fff}
.top-bar .sub{font-size:11px;color:#666;margin-top:2px}
.main{max-width:1400px;margin:0 auto;padding:20px}
.upload-area{border:2px dashed #333;border-radius:16px;padding:48px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:24px}
.upload-area:hover{border-color:#9E7FBF;background:rgba(158,127,191,0.04)}
.upload-area .icon{font-size:40px;margin-bottom:12px}
.upload-area .txt{font-size:14px;color:#888}
.upload-area .txt b{color:#9E7FBF}
.result-card{background:#1a1a1a;border:1px solid #262626;border-radius:16px;margin-bottom:20px;overflow:hidden}
.result-header{display:flex;gap:16px;padding:20px;border-bottom:1px solid #222}
.result-img{width:160px;height:160px;border-radius:12px;object-fit:cover;flex-shrink:0}
.result-meta{flex:1;min-width:0}
.result-filename{font-size:11px;color:#666;margin-bottom:8px;font-family:'JetBrains Mono',monospace}
.result-status{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;margin-bottom:8px}
.result-status.analyzing{background:rgba(158,127,191,0.15);color:#9E7FBF}
.result-status.error{background:rgba(255,80,80,0.15);color:#FF5050}
.result-status.case1{background:rgba(255,165,0,0.15);color:#FFA500}
.result-status.case2{background:rgba(255,220,50,0.15);color:#FFD700}
.result-status.case3{background:rgba(80,200,120,0.15);color:#50C878}
.result-status.done{background:rgba(80,200,120,0.15);color:#50C878}
.analysis-summary{margin-top:8px}
.analysis-summary .color-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.analysis-summary .swatch{width:28px;height:28px;border-radius:8px;border:1px solid #333;flex-shrink:0}
.analysis-summary .name{font-size:15px;font-weight:700;color:#fff}
.analysis-summary .tone{font-size:11px;color:#888}
.analysis-summary .elements{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.analysis-summary .el-tag{font-size:10px;padding:2px 7px;border-radius:5px;background:rgba(158,127,191,0.1);color:#9E7FBF;font-weight:600}
.analysis-summary .direction{font-size:11px;color:#888;margin-top:6px}
.result-body{display:grid;grid-template-columns:1fr 1fr;gap:0}
.result-col{padding:16px 20px;min-width:0}
.result-col:first-child{border-right:1px solid #222}
.col-title{font-size:11px;font-weight:700;color:#9E7FBF;letter-spacing:0.5px;margin-bottom:10px;text-transform:uppercase}
.json-view{background:#0d0d0d;border-radius:10px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7;color:#aaa;white-space:pre-wrap;word-break:break-all;max-height:500px;overflow-y:auto;border:1px solid #1a1a1a}
.json-view .key{color:#9E7FBF}
.json-view .str{color:#50C878}
.json-view .bool{color:#FFA500}
.json-view .null{color:#666}
.preview-box{background:#FAFAF8;border-radius:12px;padding:16px;color:#1A1814}
.preview-box .p-summary{font-size:13px;font-weight:600;color:#1A1814;line-height:1.7;margin-bottom:4px}
.preview-box .p-note{font-size:10px;color:#999;margin-bottom:12px}
.preview-box .p-warning{background:#FFF8E7;border:1px solid #F0D58C;border-radius:8px;padding:10px;font-size:11px;color:#8B7355;line-height:1.6;margin-bottom:10px}
.preview-box .p-tips{background:#F5F3FF;border-radius:8px;padding:12px}
.preview-box .p-tips-title{font-size:12px;font-weight:700;color:#7B5EA7;margin-bottom:6px}
.preview-box .p-tips-text{font-size:12px;color:#555;line-height:1.8;white-space:pre-line}
.preview-box .p-virgin{background:rgba(158,127,191,0.06);border:1px solid rgba(158,127,191,0.15);border-radius:8px;padding:10px;margin-top:8px}
.preview-box .p-virgin-title{font-size:11px;font-weight:700;color:#9E7FBF;margin-bottom:4px}
.preview-box .p-virgin-text{font-size:11px;color:#666;line-height:1.7}
.spinner-sm{width:16px;height:16px;border:2px solid #333;border-top-color:#9E7FBF;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
input[type=file]{display:none}
</style>
</head>
<body>
<div class="top-bar">
  <div>
    <h1>🔍 레시피 검수 도구 v2</h1>
    <div class="sub">사진 여러 장 → 자동 리사이즈(800px) → STEP1 + STEP3 검수</div>
  </div>
</div>
<div class="main">
  <div class="upload-area" onclick="document.getElementById('fileInput').click()">
    <div class="icon">📸</div>
    <div class="txt">검수할 사진을 <b>여러 장 선택</b>해주세요<br>자동 리사이즈 후 API 호출 (용량 걱정 없음)</div>
  </div>
  <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)"/>
  <div id="results"></div>
</div>
<script>
var API_URL='/api/recipe';

function resizeImage(file,max,cb){
  var r=new FileReader();
  r.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var w=img.width,h=img.height;
      if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max}else{w=Math.round(w*max/h);h=max}}
      var c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      var du=c.toDataURL('image/jpeg',0.85);
      cb(du.split(',')[1],'image/jpeg',du);
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(file);
}

var S1=[
'너는 미용실 헤어 컬러리스트를 위한 모발 색감 분석 전문가야.',
'사진 속 모발의 색감을 분석하고, 동양인 모발에서 이 색감을 만들려면 어떤 조색 방향이 필요한지 판단해.',
'','■ 판단 순서: 1)elements 2)recipe_direction 3)tone(cool/warm/neutral)',
'','■ elements: "투명감"/"매트함"/"황금빛"/"붉은기"/"주황기"/"잿빛"/"청보라"/"보라기"/"핑크기"/"파스텔"/"비비드"/"깊이감"/"윤기"',
'','■ 한국 트렌드 베이지: 밀크티/애쉬/매트/라벤더 베이지는 warm처럼 보여도 한색 조합 필수.',
'투명감+매트함+잿빛 강한 베이지 → 한색 계열 / 황금빛+투명감+붉은기 없음 → 한색 계열 / 붉은기·핑크기 선명 → 난색',
'','■ 금지: 레벨 숫자, 시술 방법, 탈색 여부, "멜라닌", "중화"',
'','■ JSON만: {"color_name_ko":"","tone":"","hex":"","elements":[],"recipe_direction":"","description":""}'
].join('\n');

var S3=[
'너는 미용실 디자이너를 위한 모발 컬러 레시피 전문가야. 아래 지식과 규칙만 따라.',
'','=== ① 카테고리 분류 (elements 기반) ===',
'1.붉은기/핑크기→E 2.보라기/청보라→C/D 3.파스텔→F 4.투명감+붉은기없음→A/B 5.투명감없음+잿빛/매트→G 6.투명감없음+황금빛→H',
'tone이 warm이어도 투명감 있고 붉은기 없으면 A 또는 B.',
'','=== ② 탈색 판단 ===',
'탈색 필수:A,B,C,D,F / 버진모 가능:G,H,E(레드) / 애매:A↔G,B↔G',
'탈색 횟수(자연모5): 주황~노랑(14~16):1~2회 / 노랑(16):2회 / 아이보리(18):2~3회 / 미색(20):3회+',
'잔류 보색: 주황→블루 소량 / 노랑→바이올렛 소량(블루 아님!) / 아이보리~미색→불필요 / 난색→불필요',
'','=== ③ 카테고리별 레시피 ===','',
'[A.한색 베이지] 필요:16+,투명발색18+',
'아이보리~미색(18~20): 밝은 명도 뉴트럴브라운+애쉬 소량→밀크티 베이지 / 애쉬+매트 소량→매트 베이지 / 애쉬+뉴트럴브라운 소량→애쉬 베이지',
'노랑(16): 뉴트럴브라운+애쉬 소량→쿨 베이지 브라운 / 애쉬+뉴트럴브라운 소량→쿨 애쉬 브라운',
'버진모: 고명도 한색 염모제+블루 컨트롤컬러→투명 베이지브라운 / +블루+바이올렛 컨트롤컬러→청초한 쿨브라운 / +애쉬 컨트롤컬러→매트 쿨브라운','',
'[B.애쉬/그레이] 필요:16+,실버18+',
'아이보리~미색(18~20): 밝은 명도 애쉬 염모제 단독→애쉬그레이 / 애쉬+블루 소량→실버 느낌 보강',
'노랑(16): 애쉬+바이올렛 소량→애쉬그레이(노랑기 보색)',
'★노랑에서 블루→매트로 빠짐. 블루는 미색에서 실버용, 바이올렛은 노랑에서 보색용.',
'버진모: 고명도 한색 염모제+애쉬 컨트롤컬러→매트 쿨브라운 / +블루+바이올렛 컨트롤컬러→청초한 쿨브라운','',
'[C.라벤더] 아이보리~미색:바이올렛+애쉬 소량→라벤더애쉬 / 애쉬+바이올렛 소량→라벤더그레이. 노랑:바이올렛+애쉬→라벤더(애쉬수렴). ★"바이올렛에 애쉬"가 기본. 버진모:+바이올렛 컨트롤컬러→와인빛 퍼플브라운','',
'[D.블루] 아이보리~미색:블루 단독→스카이블루/블루+바이올렛→네이비. 노랑:블루+바이올렛→네이비. 버진모:+블루 컨트롤컬러→투명 베이지브라운','',
'[E.난색] 레드/레드브라운→버진모가능. 파스텔핑크→18+필수. 아이보리~미색:레드→비비드/핑크+클리어→파스텔핑크. 노랑:레드(바이올렛소량)/핑크→적핑크. 주황~노랑:레드→레드브라운. 버진모:+레드 컨트롤컬러→선명한 레드','',
'[F.블론드/백모] 18+필수. 미색핑크+클리어→백모/뉴트럴브라운소량→베이지블론드. 버진모:불가능.','',
'[G.쿨브라운-버진모] 케이스3. 버진모:+블루 컨트롤컬러→투명 베이지브라운/+애쉬 컨트롤컬러→매트 쿨브라운/카키+애쉬→매트 쿨브라운','',
'[H.웜브라운-버진모] 케이스3. 브라운 단독→웜브라운/+레드 컨트롤컬러→레드브라운',
'','=== ④ 출력 규칙 ===',
'■자연모: 케이스1(A~F):summary/tips=탈색레시피.virgin_recipe생성(title:"탈색 없이 연출하려면").',
'케이스2(A↔G/B↔G):summary=버진모레시피.tips=버진모실무조언.virgin_recipe={"title":"더 선명하게 연출하려면","text":"탈색 1회 후 더욱 맑고 선명하게 표현될 수 있어요.\\n(베이스별 탈색 후 레시피)"}.ambiguous_warning=true.',
'케이스3(G/H/E레드):summary=버진모레시피.virgin_recipe=null.',
'■탈색모: 현재 베이스 기준. virgin_recipe=null.',
'','JSON:{"summary":"","tips":"","virgin_recipe":null또는{"title":"","text":""},"ambiguous_warning":false}',
'[summary]존댓말. 케이스1:"탈색 N~M회 후 [염모제]에 [믹스] 소량 믹스하여 착색하세요". 케이스2/3:"고명도 [계열] 염모제에 [컨트롤컬러] 믹스하여 착색하세요".',
'[tips]블록①필요베이스 \\n\\n 블록②베이스별(<b>베이스명</b>—<span>조합</span>) \\n\\n 블록④주의문구한줄.',
'[virgin_recipe.text]버진모맵매칭."소량"쓰지마.컨트롤컬러로표기.',
'[금지]"원샷"/"멜라닌"/"중화"/산화제농도/숫자비율/"파우더"→"탈색약"/구체적염모제명→범주만/"모발이건조해~"'
].join('\n');

function handleFiles(files){
  var ct=document.getElementById('results');
  Array.from(files).forEach(function(f,i){
    var id='c'+Date.now()+'-'+i;
    var card=document.createElement('div');card.className='result-card';card.id=id;
    card.innerHTML='<div class="result-header"><div class="result-img" style="background:#222;display:flex;align-items:center;justify-content:center;font-size:11px;color:#666">리사이즈 중</div><div class="result-meta"><div class="result-filename">'+f.name+' ('+( f.size/1024/1024).toFixed(1)+'MB)</div><span class="result-status analyzing"><span class="spinner-sm"></span>처리 중</span><div class="analysis-summary" id="'+id+'-a"></div></div></div><div class="result-body"><div class="result-col"><div class="col-title">STEP 1 분석 JSON</div><div class="json-view" id="'+id+'-j1">...</div></div><div class="result-col"><div class="col-title">STEP 3 레시피 JSON (자연모)</div><div class="json-view" id="'+id+'-j3">대기</div></div></div><div style="padding:16px 20px;border-top:1px solid #222"><div class="col-title">앱 화면 미리보기</div><div class="preview-box" id="'+id+'-p">대기</div></div>';
    ct.prepend(card);
    resizeImage(f,800,function(b64,mt,du){
      card.querySelector('.result-img').outerHTML='<img class="result-img" src="'+du+'"/>';
      card.querySelector('.result-filename').textContent=f.name+' (리사이즈:'+Math.round(b64.length*3/4/1024)+'KB)';
      card.querySelector('.result-status').innerHTML='<span class="spinner-sm"></span>STEP 1...';
      doS1(id,b64,mt);
    });
  });
}

function doS1(id,b64,mt){
  fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,system:S1,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mt,data:b64}},{type:'text',text:'이 사진 속 모발의 색감을 역공학 분석해줘.'}]}]})})
  .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
  .then(function(d){
    if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
    var t=d.content.map(function(b){return b.text||''}).join('').replace(/```json|```/g,'').trim();
    var res=JSON.parse(t);
    document.getElementById(id+'-j1').innerHTML=fmtJ(res);
    var tm={cool:'한색(쿨)',warm:'난색(웜)',neutral:'뉴트럴'};
    document.getElementById(id+'-a').innerHTML='<div class="color-row"><div class="swatch" style="background:'+(res.hex||'#ccc')+'"></div><div><div class="name">'+(res.color_name_ko||'—')+'</div><div class="tone">'+(tm[res.tone]||'—')+' 계열</div></div></div><div class="elements">'+(res.elements||[]).map(function(e){return'<span class="el-tag">'+e+'</span>'}).join('')+'</div><div class="direction">조색: '+(res.recipe_direction||'')+'</div>';
    var st=document.querySelector('#'+id+' .result-status');st.className='result-status analyzing';st.innerHTML='<span class="spinner-sm"></span>STEP 3...';
    doS3(id,res);
  })
  .catch(function(e){
    document.getElementById(id+'-j1').textContent='ERROR: '+e.message;
    var st=document.querySelector('#'+id+' .result-status');st.className='result-status error';st.textContent='STEP 1 실패';
  });
}

function doS3(id,an){
  var um=['현재 모발: 자연모/염색모 (동양인, 약 5레벨)','AI 분석: '+an.color_name_ko,'톤: '+an.tone,'속성: '+(an.elements?an.elements.join(', '):'없음'),'조색: '+(an.recipe_direction||''),'설명: '+an.description,'','레시피 만들어줘.'].join('\n');
  fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:S3,messages:[{role:'user',content:um}]})})
  .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
  .then(function(d){
    if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
    var t=d.content.map(function(b){return b.text||''}).join('').replace(/```json|```/g,'').trim();
    var rec=JSON.parse(t);
    document.getElementById(id+'-j3').innerHTML=fmtJ(rec);
    var cn='?',cc='done';
    if(rec.ambiguous_warning){cn='2 (애매)';cc='case2'}
    else if(rec.virgin_recipe){cn='1 (탈색필수)';cc='case1'}
    else if(rec.summary&&rec.summary.indexOf('탈색')===-1){cn='3 (바로가능)';cc='case3'}
    else{cn='탈색모';cc='done'}
    var st=document.querySelector('#'+id+' .result-status');st.className='result-status '+cc;st.textContent='케이스 '+cn;
    renderP(id,rec);
  })
  .catch(function(e){
    document.getElementById(id+'-j3').textContent='ERROR: '+e.message;
    var st=document.querySelector('#'+id+' .result-status');st.className='result-status error';st.textContent='STEP 3 실패';
  });
}

function renderP(id,rec){
  var el=document.getElementById(id+'-p'),html='';
  html+='<div class="p-summary">'+(rec.summary||'').replace(/\n/g,'<br>')+'</div>';
  if(!rec.ambiguous_warning&&rec.summary&&rec.summary.indexOf('탈색')!==-1)html+='<div class="p-note">모질에 따라 탈색횟수는 차이가 날 수 있습니다</div>';
  var th=(rec.tips||'').replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
  if(rec.ambiguous_warning){
    html+='<div class="p-warning">⚠️ 이 사진은 조명을 가까이 비춰 촬영하여 실제보다 투명하고 밝게 보일 수 있어요. 버진모에서 연출한 색감인지, 탈색 후 연출한 색감인지 판단이 어려워요.</div>';
    html+='<div class="p-tips"><div class="p-tips-title">💡 실무조언</div><div class="p-tips-text">'+th+'</div>';
    if(rec.virgin_recipe){var v=rec.virgin_recipe;html+='<div class="p-virgin" style="margin-top:8px"><div class="p-virgin-title">'+(v.title||'더 선명하게 연출하려면')+'</div><div class="p-virgin-text">'+(v.text||'')+'</div></div>'}
    html+='</div>';
  }else{
    html+='<div class="p-tips"><div class="p-tips-title">💡 실무조언</div><div class="p-tips-text">'+th+'</div>';
    if(rec.virgin_recipe){var v2=rec.virgin_recipe;html+='<div class="p-virgin"><div class="p-virgin-title">'+(v2.title||'탈색 없이 연출하려면')+'</div><div class="p-virgin-text">'+(v2.text||'')+'</div></div>'}
    html+='</div>';
  }
  el.innerHTML=html;
}

function fmtJ(o){
  var s=JSON.stringify(o,null,2);
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"([^"]+)":/g,'<span class="key">"$1"</span>:')
    .replace(/: "((?:[^"\\]|\\.)*)"/g,': <span class="str">"$1"</span>')
    .replace(/: (true|false)/g,': <span class="bool">$1</span>')
    .replace(/: (null)/g,': <span class="null">$1</span>');
}
