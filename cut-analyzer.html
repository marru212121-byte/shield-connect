<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>AI 컷트 분석기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Noto Sans KR',sans-serif;background:#FAFAF7;color:#1C1917;min-height:100dvh;overflow-x:hidden}
input,select,textarea{font-size:16px!important;-webkit-appearance:none;font-family:inherit}
.app{width:100%;max-width:430px;margin:0 auto;min-height:100dvh;background:#FAFAF7}
@media(min-width:431px){.app{border-left:1px solid #e8e4df;border-right:1px solid #e8e4df}}
.page-header{display:flex;align-items:center;gap:12px;padding:14px 16px;position:sticky;top:0;z-index:100;background:rgba(250,250,247,0.92);backdrop-filter:blur(12px);border-bottom:1px solid #e8e4df}
.back-btn{width:34px;height:34px;border-radius:12px;border:1.5px solid #e8e4df;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;text-decoration:none}
.back-btn svg{color:#A8A29E}
.page-header h2{font-size:16px;font-weight:800;margin:0}
.page-header .sub{font-size:11px;color:#A8A29E;margin-top:2px}
.card{background:#fff;border-radius:16px;border:1.5px solid #e8e4df;padding:20px;margin:0 16px 12px}
.card-title{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px}
.badge-step{background:#3D6B4A18;color:#3D6B4A}
.badge-view{background:#4A6FA518;color:#4A6FA5}
.upload-zone{border:2px dashed #d5cfc7;border-radius:14px;padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#FAF8F4}
.upload-zone:active{border-color:#3D6B4A}
.upload-zone.has-image{border:none;padding:0;background:none}
.upload-zone .icon{margin-bottom:8px;color:#8BAF9A;display:flex;justify-content:center}
.upload-zone .txt{font-size:13px;color:#A8A29E;line-height:1.6}
.upload-zone .txt b{color:#3D6B4A;font-weight:600}
.upload-preview{width:100%;border-radius:14px;display:block;object-fit:cover;max-height:280px}
.analysis-box{background:linear-gradient(135deg,#F0F6F2,#E5F0E8);border-radius:14px;padding:16px;margin-top:12px;display:none}
.analysis-box.show{display:block;animation:fadeUp .4s ease}
.analysis-label{font-size:10px;font-weight:700;color:#3D6B4A;letter-spacing:.5px;margin-bottom:10px}
.analysis-style-name{font-size:18px;font-weight:800;margin-bottom:4px}
.analysis-style-sub{font-size:12px;color:#6B7B6F;margin-bottom:10px;line-height:1.5}
.analysis-desc{font-size:13px;color:#4A5D50;line-height:1.7}
.analysis-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.analysis-tag{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;background:#3D6B4A15;color:#3D6B4A}
.analysis-direction{margin-top:10px;padding:10px 12px;border-radius:8px;background:rgba(26,24,20,.04);font-size:12px;color:#555;line-height:1.6}
.analysis-direction b{font-weight:700;color:#1A1814}
.analyzing{text-align:center;padding:24px;display:none}
.analyzing.show{display:block}
.analyzing .spinner{width:28px;height:28px;border:3px solid #e8e4df;border-top-color:#3D6B4A;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
.analyzing .txt{font-size:13px;color:#A8A29E}
.viewer-card{display:none;animation:fadeUp .4s ease}
.viewer-card.show{display:block}
.viewer-wrap{background:#F5F3EF;border-radius:14px;overflow:hidden;position:relative;border:1.5px solid #e8e4df}
.viewer-wrap canvas{display:block;width:100%;height:380px;touch-action:none}
.section-btns{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px}
.sec-btn{font-size:11px;font-weight:600;padding:5px 10px;border-radius:8px;border:1.5px solid #e8e4df;background:#fff;cursor:pointer;transition:all .15s;font-family:inherit;display:flex;align-items:center;gap:4px}
.sec-btn:active{transform:scale(.96)}
.sec-btn.on{border-color:#3D6B4A;background:#3D6B4A10;color:#3D6B4A}
.sec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sec-detail{margin-top:10px;background:#F7FAF8;border:1px solid #E0EDE4;border-radius:10px;padding:12px;display:none;animation:fadeUp .3s ease}
.sec-detail.show{display:block}
.sec-detail-title{font-size:13px;font-weight:700}
.sec-detail-desc{font-size:12px;color:#6B7B6F;line-height:1.6;margin-top:4px}
.sec-detail-tech{margin-top:8px;padding:8px 10px;background:#fff;border-radius:8px;border:1px solid #e8e4df}
.sec-detail-tech-title{font-size:11px;font-weight:700;color:#3D6B4A;margin-bottom:4px}
.sec-detail-tech-text{font-size:12px;color:#555;line-height:1.6}
.step2-wrap{display:none;animation:fadeUp .4s ease}
.step2-wrap.show{display:block}
.base-option-title{font-size:11px;font-weight:600;color:#A8A29E;margin-bottom:4px;margin-top:8px}
.base-btn-row{display:flex;gap:8px;flex-wrap:wrap}
.base-btn{flex:1;min-width:calc(50% - 4px);padding:14px 12px;border-radius:12px;border:1.5px solid #e8e4df;background:#fff;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit}
.base-btn:active{transform:scale(.97)}
.base-btn.selected{border-color:#3D6B4A;background:#3D6B4A10;box-shadow:0 0 0 1px #3D6B4A}
.base-btn .label{font-size:13px;font-weight:600}
.base-btn .desc{font-size:10px;color:#A8A29E;margin-top:3px}
.recipe-btn{width:calc(100% - 32px);margin:8px 16px 16px;padding:16px;border-radius:14px;border:none;background:#1C1917;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;display:none}
.recipe-btn.show{display:block;animation:fadeUp .3s ease}
.recipe-btn:active{transform:scale(.98);opacity:.9}
.recipe-btn:disabled{opacity:.4;cursor:not-allowed}
.recipe-wrap{display:none;animation:fadeUp .4s ease}
.recipe-wrap.show{display:block}
.recipe-header{background:linear-gradient(135deg,#F0F6F2,#E0EDE4);border-radius:14px;padding:16px;margin-bottom:12px}
.recipe-from-to{font-size:14px;font-weight:600;line-height:1.7}
.recipe-body{background:#fff;border-radius:14px;border:1.5px solid #e8e4df;padding:16px}
.recipe-tips{background:#F5FAF7;border:1px solid #D5E8DA;border-radius:10px;padding:14px}
.recipe-tips-title{font-size:13px;font-weight:700;color:#3D6B4A;margin-bottom:6px}
.recipe-tips-text{font-size:13px;color:#4A5D50;line-height:1.9;white-space:pre-line}
.recipe-tips-text .sec-label{font-size:14px;font-weight:700;color:#1C1917;display:block;margin-top:6px}
.source-tag{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;margin-bottom:8px;background:#3D6B4A18;color:#3D6B4A}
.reset-btn{width:calc(100% - 32px);margin:8px 16px 24px;padding:14px;border-radius:14px;border:1.5px solid #e8e4df;background:#fff;color:#A8A29E;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:none}
.reset-btn.show{display:block}
.reset-btn:active{transform:scale(.98)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
  <div class="page-header">
    <a class="back-btn" href="./index.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></a>
    <div><h2>AI 컷트 분석기</h2><div class="sub">사진 분석 → 도해도 시각화 → 가이드 생성</div></div>
  </div>

  <div class="card" id="step1Card">
    <div class="card-title">원하는 헤어스타일 사진 <span class="badge badge-step">STEP 1</span></div>
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <div class="icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>
      <div class="txt">고객이 원하는 헤어 컷트 사진을<br><b>탭하여 업로드</b>해주세요</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleUpload(this)"/>
    <div class="analyzing" id="analyzing"><div class="spinner"></div><div class="txt">컷트 구조를 분석하고 있어요...</div></div>
    <div class="analysis-box" id="analysisBox"></div>
  </div>

  <div class="viewer-card" id="viewerCard">
    <div class="card">
      <div class="card-title">컷트 도해도 <span class="badge badge-view">DIAGRAM</span></div>
      <div class="viewer-wrap"><canvas id="headCanvas" width="400" height="380"></canvas></div>
      <div class="section-btns" id="sectionBtns"></div>
      <div class="sec-detail" id="secDetail"></div>
    </div>
  </div>

  <div class="step2-wrap" id="step2Wrap">
    <div class="card">
      <div class="card-title">고객 모발 정보 <span class="badge badge-step">STEP 2</span></div>
      <div class="base-option-title">모질</div>
      <div class="base-btn-row">
        <button class="base-btn" data-hair="straight" onclick="selectOpt(this,'hair')"><div class="label">직모</div><div class="desc">자연 직모</div></button>
        <button class="base-btn" data-hair="wavy" onclick="selectOpt(this,'hair')"><div class="label">반곱슬</div><div class="desc">웨이브 있음</div></button>
      </div>
      <div class="base-btn-row" style="margin-top:8px">
        <button class="base-btn" data-hair="curly" onclick="selectOpt(this,'hair')"><div class="label">곱슬</div><div class="desc">강한 컬</div></button>
        <button class="base-btn" data-hair="coarse" onclick="selectOpt(this,'hair')"><div class="label">경모</div><div class="desc">굵고 뻣뻣함</div></button>
      </div>
      <div class="base-option-title" style="margin-top:16px">모량</div>
      <div class="base-btn-row">
        <button class="base-btn" data-vol="thin" onclick="selectOpt(this,'vol')"><div class="label">소량</div></button>
        <button class="base-btn" data-vol="medium" onclick="selectOpt(this,'vol')"><div class="label">보통</div></button>
        <button class="base-btn" data-vol="thick" onclick="selectOpt(this,'vol')"><div class="label">다량</div></button>
      </div>
      <div class="base-option-title" style="margin-top:16px">현재 길이</div>
      <div class="base-btn-row">
        <button class="base-btn" data-len="short" onclick="selectOpt(this,'len')"><div class="label">숏</div><div class="desc">귀 위</div></button>
        <button class="base-btn" data-len="medium" onclick="selectOpt(this,'len')"><div class="label">미디엄</div><div class="desc">어깨선</div></button>
        <button class="base-btn" data-len="long" onclick="selectOpt(this,'len')"><div class="label">롱</div><div class="desc">어깨 아래</div></button>
      </div>
    </div>
  </div>

  <button class="recipe-btn" id="recipeBtn" onclick="generateGuide()" disabled>컷트 가이드 생성</button>
  <div class="recipe-wrap" id="recipeWrap"><div class="card"><div class="card-title">컷트 가이드 <span class="badge badge-step">STEP 3</span></div><div id="recipeSource"></div><div class="recipe-header" id="recipeHeader"></div><div class="recipe-body" id="recipeBody"></div></div></div>
  <button class="reset-btn" id="resetBtn" onclick="resetAll()">처음부터 다시하기</button>
  <div style="height:40px"></div>
</div>

<script>
var ST={img64:null,imgType:null,analysis:null,hair:null,vol:null,len:null};
var API_URL='/api/recipe';
var hlSections=[],selSection=null;

var SECTIONS={
  top:{name:'탑(Top)',color:'#E85D5D',desc:'정수리~이마 라인. 볼륨과 방향 결정.'},
  crown:{name:'크라운(Crown)',color:'#E8943D',desc:'정수리 뒤쪽 소용돌이. 모류의 시작점.'},
  fringe:{name:'프린지(Fringe)',color:'#5BA4D9',desc:'앞머리 영역. 얼굴 비율과 인상 좌우.'},
  side:{name:'사이드(Side)',color:'#C577D9',desc:'측두부. 얼굴 너비감 조절.'},
  nape:{name:'네이프(Nape)',color:'#4DB86A',desc:'후두부 하단. 목선 라인 마감.'},
  back:{name:'백(Back)',color:'#D4B84A',desc:'후두부 전체. 실루엣의 곡선.'},
  occipital:{name:'옥시피탈(Occipital)',color:'#D97B4A',desc:'후두골 돌출부. 볼륨 분배 기준점.'}
};

// 두상 위의 섹션 기준점 (측면 뷰 기준, 두상 중심에서의 각도)
var SEC_ANCHORS={
  fringe:{angle:250, label:'프린지'},
  top:{angle:290, label:'탑'},
  crown:{angle:320, label:'크라운'},
  back:{angle:350, label:'백'},
  occipital:{angle:20, label:'옥시피탈'},
  nape:{angle:50, label:'네이프'},
  side:{angle:230, label:'사이드'}
};

/* ═══ UPLOAD ═══ */
function handleUpload(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var full=e.target.result,b64=full.split(',')[1],mt=file.type||'image/jpeg';
    var zone=document.getElementById('uploadZone');
    zone.classList.add('has-image');
    zone.innerHTML='<img class="upload-preview" src="'+full+'" alt=""/>';
    zone.onclick=null;
    ST.img64=b64;ST.imgType=mt;
    analyzeImage(b64,mt);
  };
  reader.readAsDataURL(file);
}

function analyzeImage(b64,mt){
  var ld=document.getElementById('analyzing'),box=document.getElementById('analysisBox');
  box.classList.remove('show');ld.classList.add('show');
  var sysPrompt=[
    '너는 미용실 헤어 디자이너를 위한 컷트 구조 분석 전문가야.',
    '사진 속 헤어스타일의 컷트 구조를 역공학 분석해.',
    '',
    '■ 두상 섹션: top(탑),crown(크라운),fringe(프린지),side(사이드),nape(네이프),back(백),occipital(옥시피탈)',
    '',
    '■ 테크닉: 원렝스(0°)/그래주에이션(~45°)/유니폼레이어(90°)/인크리스레이어(90°초과)/디스커넥션/언더커팅/텍스처라이징/오버다이렉션/블런트컷',
    '',
    '■ 금지: 컬러/염색, 스타일링, 브랜드명',
    '',
    '■ 출력: JSON만. angle 필드는 반드시 숫자+"°" 형태로. 예: "0°","45°","90°","135°"',
    '{"style_name":"스타일명","style_category":"bob/layered/short/pixie/wolf/hush/shag/long_layer/one_length/other","description":"특징 2~3문장","key_techniques":["테크닉1","테크닉2"],"silhouette":"실루엣 1문장","sections":{"top":{"technique":"테크닉명","angle":"시술각(숫자°)","detail":"설명"},"crown":{...},"fringe":{...},"side":{...},"nape":{...},"back":{...},"occipital":{...}},"cut_order":["순서"],"weight_line":"무게선 위치"}'
  ].join('\n');

  fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,system:sysPrompt,
      messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mt,data:b64}},{type:'text',text:'이 헤어스타일의 컷트 구조를 역공학 분석해줘.'}]}]})
  })
  .then(function(r){return r.json()})
  .then(function(data){
    ld.classList.remove('show');
    try{
      var txt=data.content.map(function(b){return b.text||''}).join('');
      txt=txt.replace(/```json|```/g,'').trim();
      ST.analysis=JSON.parse(txt);
      showAnalysis(ST.analysis);
    }catch(e){box.innerHTML='<div class="analysis-label">분석 실패</div><div class="analysis-desc">사진을 다시 업로드해주세요.</div>';box.classList.add('show');}
  })
  .catch(function(){ld.classList.remove('show');box.innerHTML='<div class="analysis-label">연결 오류</div>';box.classList.add('show');});
}

function showAnalysis(r){
  var box=document.getElementById('analysisBox');
  var h='<div class="analysis-label">AI 컷트 분석 결과</div>';
  h+='<div class="analysis-style-name">'+r.style_name+'</div>';
  h+='<div class="analysis-style-sub">'+r.silhouette+'</div>';
  h+='<div class="analysis-desc">'+r.description+'</div>';
  if(r.key_techniques&&r.key_techniques.length){h+='<div class="analysis-tags">';r.key_techniques.forEach(function(t){h+='<span class="analysis-tag">'+t+'</span>'});h+='</div>';}
  if(r.weight_line)h+='<div class="analysis-direction"><b>무게선</b> · '+r.weight_line+'</div>';
  if(r.cut_order&&r.cut_order.length)h+='<div class="analysis-direction"><b>시술 순서</b> · '+r.cut_order.join(' → ')+'</div>';
  box.innerHTML=h;box.classList.add('show');
  hlSections=Object.keys(r.sections||{});
  setupSectionBtns();
  document.getElementById('viewerCard').classList.add('show');
  renderDiagram();
  setTimeout(function(){document.getElementById('step2Wrap').classList.add('show')},400);
}

function setupSectionBtns(){
  var wrap=document.getElementById('sectionBtns'),h='';
  hlSections.forEach(function(k){var s=SECTIONS[k];if(!s)return;
    h+='<button class="sec-btn" data-sec="'+k+'" onclick="toggleSection(\''+k+'\')"><span class="sec-dot" style="background:'+s.color+'"></span>'+s.name.split('(')[0]+'</button>';
  });
  wrap.innerHTML=h;
}

function toggleSection(k){
  var detail=document.getElementById('secDetail');
  if(selSection===k){selSection=null;detail.classList.remove('show');document.querySelectorAll('.sec-btn').forEach(function(b){b.classList.remove('on')});renderDiagram();return;}
  selSection=k;
  document.querySelectorAll('.sec-btn').forEach(function(b){b.classList.toggle('on',b.dataset.sec===k)});
  renderDiagram();
  var s=SECTIONS[k],d=ST.analysis.sections[k];
  if(!d||!s){detail.classList.remove('show');return}
  detail.innerHTML='<div class="sec-detail-title">'+s.name+'</div><div class="sec-detail-desc">'+s.desc+'</div><div class="sec-detail-tech"><div class="sec-detail-tech-title">'+d.technique+' · '+d.angle+'</div><div class="sec-detail-tech-text">'+d.detail+'</div></div>';
  detail.classList.add('show');
}

/* ══════════════════════════════════════
   도해도 스타일 렌더러 (Canvas 2D)
   — 두상 측면 + 모발 가닥 + 시술각
══════════════════════════════════════ */
function renderDiagram(){
  var c=document.getElementById('headCanvas');if(!c)return;
  var ctx=c.getContext('2d'),W=c.width,H=c.height;
  ctx.clearRect(0,0,W,H);

  // 배경 — 밝은 톤 (도해도 느낌)
  ctx.fillStyle='#F5F3EF';ctx.fillRect(0,0,W,H);

  var headCx=160, headCy=175, headRx=62, headRy=80;

  // 두상 측면 윤곽 (피부색)
  ctx.save();
  drawHeadProfile(ctx,headCx,headCy,headRx,headRy);
  ctx.restore();

  // 천체축 (수직 기준선)
  ctx.save();
  ctx.setLineDash([4,4]);ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(headCx,headCy-120);ctx.lineTo(headCx,headCy+130);ctx.stroke();
  // 수평선
  ctx.beginPath();ctx.moveTo(headCx-100,headCy);ctx.lineTo(headCx+100,headCy);ctx.stroke();
  ctx.setLineDash([]);
  // 각도 레이블
  ctx.font='600 9px "Noto Sans KR"';ctx.fillStyle='rgba(0,0,0,0.3)';ctx.textAlign='center';
  ctx.fillText('180°',headCx,headCy-125);
  ctx.fillText('0°',headCx,headCy+140);
  ctx.textAlign='left';ctx.fillText('90°',headCx+105,headCy+3);
  ctx.restore();

  // 섹션별 모발 가닥 그리기
  var secs=ST.analysis?ST.analysis.sections:{};
  var secKeys=Object.keys(SEC_ANCHORS);

  secKeys.forEach(function(k){
    if(!secs[k])return;
    var anchor=SEC_ANCHORS[k];
    var secData=secs[k];
    var isSelected=(selSection===k);
    var isAny=(!selSection);
    var show=isSelected||isAny;
    if(!show)return;

    // 두상 표면 위의 기준점 계산
    var aRad=anchor.angle*Math.PI/180;
    var px=headCx+Math.cos(aRad)*(headRx+2);
    var py=headCy+Math.sin(aRad)*(headRy+2);

    // 시술각 파싱
    var cutAngle=0;
    var m=secData.angle.match(/(\d+)/);
    if(m)cutAngle=parseInt(m[1]);

    // 모발 가닥 방향: 천체축 기준 0°=아래, 90°=수평, 180°=위
    // 두상 표면의 법선 방향에서 시술각만큼 들어올림
    var normalAngle=anchor.angle; // 두상 표면 법선
    var strandLen=isSelected?75:50;
    var numStrands=isSelected?5:3;
    var spreadDeg=isSelected?12:8;

    var secColor=SECTIONS[k]?SECTIONS[k].color:'#888';
    var alpha=isSelected?0.85:(isAny?0.5:0.15);

    // 모발 가닥 그리기
    for(var i=0;i<numStrands;i++){
      var offset=(i-(numStrands-1)/2)*spreadDeg;
      var strandAngle=normalAngle+offset;
      var sRad=strandAngle*Math.PI/180;

      // 시작점 (두상 표면)
      var sx=headCx+Math.cos(sRad)*(headRx-2);
      var sy=headCy+Math.sin(sRad)*(headRy-2);

      // 끝점 (시술각 방향으로 뻗음)
      var liftRad=(normalAngle)*Math.PI/180;
      var ex=sx+Math.cos(liftRad)*strandLen;
      var ey=sy+Math.sin(liftRad)*strandLen;

      ctx.save();
      ctx.globalAlpha=alpha;
      ctx.strokeStyle=secColor;
      ctx.lineWidth=isSelected?2.5:1.8;
      ctx.lineCap='round';

      // 약간의 곡선으로 자연스러운 모발 표현
      var cpx=sx+(ex-sx)*0.6+(Math.random()-0.5)*8;
      var cpy=sy+(ey-sy)*0.6+(Math.random()-0.5)*8;

      ctx.beginPath();
      ctx.moveTo(sx,sy);
      ctx.quadraticCurveTo(cpx,cpy,ex,ey);
      ctx.stroke();
      ctx.restore();
    }

    // 선택된 섹션 — 시술각 호(arc) + 각도 표시
    if(isSelected){
      drawAngleArc(ctx,px,py,normalAngle,cutAngle,secColor,secData.angle);
      // 커팅 라인 (가위 위치)
      drawCutLine(ctx,px,py,normalAngle,strandLen*0.8,secColor);
    }

    // 섹션 라벨
    var labelDist=isSelected?strandLen+18:strandLen+12;
    var lRad=normalAngle*Math.PI/180;
    var lx=headCx+Math.cos(lRad)*(headRx+labelDist);
    var ly=headCy+Math.sin(lRad)*(headRy+labelDist);

    ctx.save();
    ctx.font=(isSelected?'700':'500')+' '+(isSelected?'11':'9')+'px "Noto Sans KR"';
    ctx.fillStyle=isSelected?secColor:'rgba(0,0,0,0.4)';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(anchor.label,lx,ly);
    if(isSelected&&secData.technique){
      ctx.font='600 9px "Noto Sans KR"';
      ctx.fillStyle='rgba(0,0,0,0.5)';
      ctx.fillText(secData.technique,lx,ly+14);
    }
    ctx.restore();
  });

  // 범례 (우하단)
  if(ST.analysis){
    ctx.font='700 11px "Noto Sans KR"';ctx.fillStyle='#1C1917';ctx.textAlign='left';
    ctx.fillText(ST.analysis.style_name||'',W-150,H-40);
    ctx.font='500 9px "Noto Sans KR"';ctx.fillStyle='#999';
    ctx.fillText('섹션을 탭하여 상세 보기',W-150,H-24);
  }
}

/* 두상 프로필 (측면) */
function drawHeadProfile(ctx,cx,cy,rx,ry){
  // 피부색 두상
  ctx.fillStyle='#F0DCC8';
  ctx.strokeStyle='#C9A882';
  ctx.lineWidth=1.5;

  ctx.beginPath();
  // 이마~정수리
  ctx.moveTo(cx-30,cy+ry*0.6);
  ctx.quadraticCurveTo(cx-rx-10,cy-ry*0.3, cx-rx*0.5,cy-ry);
  // 정수리~크라운
  ctx.quadraticCurveTo(cx,cy-ry-10, cx+rx*0.5,cy-ry*0.8);
  // 크라운~옥시피탈
  ctx.quadraticCurveTo(cx+rx+5,cy-ry*0.3, cx+rx,cy+ry*0.1);
  // 옥시피탈~네이프
  ctx.quadraticCurveTo(cx+rx-5,cy+ry*0.6, cx+rx*0.4,cy+ry*0.85);
  // 네이프~목
  ctx.quadraticCurveTo(cx+rx*0.2,cy+ry, cx+10,cy+ry+25);
  // 목
  ctx.lineTo(cx-15,cy+ry+25);
  // 턱~코~이마
  ctx.quadraticCurveTo(cx-35,cy+ry*0.8, cx-40,cy+ry*0.5);
  ctx.quadraticCurveTo(cx-50,cy+ry*0.2, cx-30,cy+ry*0.6);
  ctx.closePath();
  ctx.fill();ctx.stroke();

  // 귀
  ctx.fillStyle='#EDD5BE';ctx.strokeStyle='#C9A882';
  ctx.beginPath();
  ctx.ellipse(cx-rx+8,cy+10,6,12,-0.15,0,Math.PI*2);
  ctx.fill();ctx.stroke();

  // 눈 (간단)
  ctx.fillStyle='#8B7355';
  ctx.beginPath();ctx.ellipse(cx-rx+2,cy-8,4,2.5,0,0,Math.PI*2);ctx.fill();

  // 코 라인
  ctx.strokeStyle='#C9A882';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx-rx-3,cy+2);ctx.quadraticCurveTo(cx-rx-8,cy+15,cx-rx+2,cy+18);ctx.stroke();

  // 입
  ctx.beginPath();ctx.moveTo(cx-rx+5,cy+30);ctx.quadraticCurveTo(cx-rx-2,cy+32,cx-rx+8,cy+32);ctx.stroke();

  // 섹션 분리선 (헤어라인 안쪽 점선)
  ctx.setLineDash([3,3]);ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=0.8;
  // 이어 투 이어 라인
  ctx.beginPath();
  ctx.moveTo(cx-rx+15,cy-ry*0.1);
  ctx.quadraticCurveTo(cx,cy-ry-5,cx+rx*0.5,cy-ry*0.6);
  ctx.stroke();
  ctx.setLineDash([]);
}

/* 시술각 호 */
function drawAngleArc(ctx,px,py,normalAngle,cutAngle,color,label){
  ctx.save();
  var baseRad=(normalAngle-90)*Math.PI/180; // 두상 표면 접선 = 0° 기준
  var arcRad=cutAngle*Math.PI/180;
  var arcR=35;

  // 0° 기준선 (두상 표면 접선 = 모발이 떨어지는 방향)
  var tangentRad=normalAngle*Math.PI/180;
  var zeroX=px+Math.cos(tangentRad+Math.PI/2)*arcR;
  var zeroY=py+Math.sin(tangentRad+Math.PI/2)*arcR;

  ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.setLineDash([2,2]);
  ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(zeroX,zeroY);ctx.stroke();
  ctx.setLineDash([]);

  // 시술각 호
  var startA=tangentRad+Math.PI/2;
  var endA=startA-arcRad;

  ctx.strokeStyle=color;ctx.lineWidth=2;
  ctx.beginPath();
  ctx.arc(px,py,arcR,Math.min(startA,endA),Math.max(startA,endA));
  ctx.stroke();

  // 각도 숫자
  var midA=(startA+endA)/2;
  var tx=px+Math.cos(midA)*(arcR+14);
  var ty=py+Math.sin(midA)*(arcR+14);
  ctx.font='800 12px "Noto Sans KR"';ctx.fillStyle=color;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(label,tx,ty);

  ctx.restore();
}

/* 커팅 라인 (가위 위치) */
function drawCutLine(ctx,px,py,normalAngle,dist,color){
  ctx.save();
  var nRad=normalAngle*Math.PI/180;
  var cx=px+Math.cos(nRad)*dist;
  var cy=py+Math.sin(nRad)*dist;
  var perpRad=nRad+Math.PI/2;
  var halfLen=18;

  ctx.strokeStyle=color;ctx.lineWidth=2.5;
  ctx.setLineDash([5,3]);
  ctx.beginPath();
  ctx.moveTo(cx+Math.cos(perpRad)*halfLen,cy+Math.sin(perpRad)*halfLen);
  ctx.lineTo(cx-Math.cos(perpRad)*halfLen,cy-Math.sin(perpRad)*halfLen);
  ctx.stroke();
  ctx.setLineDash([]);

  // 가위 아이콘 (✂)
  ctx.font='14px sans-serif';ctx.fillStyle=color;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('✂',cx+Math.cos(perpRad)*(halfLen+10),cy+Math.sin(perpRad)*(halfLen+10));
  ctx.restore();
}

/* ═══ STEP 2 ═══ */
function selectOpt(btn,type){
  btn.parentNode.querySelectorAll('.base-btn').forEach(function(b){b.classList.remove('selected')});
  btn.classList.add('selected');
  ST[type]=btn.getAttribute('data-'+type);
  checkReady();
}
function checkReady(){
  var ok=ST.analysis&&ST.hair&&ST.vol&&ST.len;
  var btn=document.getElementById('recipeBtn');
  if(ok){btn.classList.add('show');btn.disabled=false}else btn.disabled=true;
}

/* ═══ STEP 3 ═══ */
function generateGuide(){
  var btn=document.getElementById('recipeBtn');btn.disabled=true;btn.textContent='가이드 생성 중...';
  var hm={straight:'직모',wavy:'반곱슬',curly:'곱슬',coarse:'경모'};
  var vm={thin:'소량',medium:'보통',thick:'다량'};
  var lm={short:'숏(귀 위)',medium:'미디엄(어깨선)',long:'롱(어깨 아래)'};
  var cd='모질: '+hm[ST.hair]+' / 모량: '+vm[ST.vol]+' / 현재 길이: '+lm[ST.len];

  var sp=[
    '너는 15년차 헤어 디자이너. 컷트 전문가.',
    'AI 분석 결과와 고객 정보 기반 컷트 가이드를 만들어.',
    '',
    '■ 기본 형태: 원렝스(0°)/그래주에이션(~45°)/유니폼레이어(90°)/인크리스레이어(90°초과)',
    '■ 모질별: 직모=라인선명,텍스처링필요 / 반곱슬=건조시줄어듬고려 / 곱슬=드라이컷,틴닝최소 / 경모=채널커팅,표면텍스처최소',
    '■ 모량별: 소량=틴닝금지 / 다량=채널커팅,언더커팅활용',
    '',
    '출력 JSON: {"summary":"한줄요약(존댓말)","guide":"가이드전문"}',
    'guide: \\n\\n으로 블록 구분. 블록①시술순서 블록②섹션별테크닉(<b>섹션명</b>+형태+각도+슬라이스+설명) 블록③연결/디스커넥션 블록④질감처리 블록⑤실무조언',
    '★ 컬러/스타일링 금지. 구체적으로. 반복금지.'
  ].join('\n');

  var um=['목표: '+ST.analysis.style_name,'설명: '+ST.analysis.description,'실루엣: '+ST.analysis.silhouette,
    '테크닉: '+(ST.analysis.key_techniques||[]).join(', '),'섹션: '+JSON.stringify(ST.analysis.sections),
    '순서: '+(ST.analysis.cut_order||[]).join('→'),'','고객: '+cd,'','컷트 가이드를 만들어줘.'].join('\n');

  fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,system:sp,messages:[{role:'user',content:um}]})
  }).then(function(r){return r.json()}).then(function(data){
    try{var txt=data.content.map(function(b){return b.text||''}).join('');txt=txt.replace(/```json|```/g,'').trim();showGuide(JSON.parse(txt));}catch(e){showGuideError()}
  }).catch(function(){showGuideError()});
}

function showGuide(g){
  document.getElementById('recipeBtn').classList.remove('show');
  document.getElementById('recipeSource').innerHTML='<span class="source-tag">AI 구조 분석 기반</span>';
  document.getElementById('recipeHeader').innerHTML='<div class="recipe-from-to">'+(g.summary||'').replace(/\n/g,'<br>')+'</div>';
  var gh=(g.guide||'').replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
  gh=gh.replace(/<b>/g,'<span class="sec-label">').replace(/<\/b>/g,'</span>');
  document.getElementById('recipeBody').innerHTML='<div class="recipe-tips"><div class="recipe-tips-title">컷트 가이드</div><div class="recipe-tips-text">'+gh+'</div></div>';
  document.getElementById('recipeWrap').classList.add('show');
  document.getElementById('resetBtn').classList.add('show');
  setTimeout(function(){document.getElementById('recipeWrap').scrollIntoView({behavior:'smooth',block:'start'})},200);
}
function showGuideError(){var btn=document.getElementById('recipeBtn');btn.disabled=false;btn.textContent='컷트 가이드 생성';alert('가이드 생성에 실패했어요.');}
