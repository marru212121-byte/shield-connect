<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>AI 컷트 분석기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Noto Sans KR',sans-serif;background:#FAFAF7;color:#1C1917;min-height:100dvh;overflow-x:hidden}
input,select,textarea{font-size:16px!important;-webkit-appearance:none;font-family:inherit}
.app{width:100%;max-width:430px;margin:0 auto;min-height:100dvh;background:#FAFAF7}
@media(min-width:431px){.app{border-left:1px solid #e8e4df;border-right:1px solid #e8e4df}}

.page-header{display:flex;align-items:center;gap:12px;padding:14px 16px;position:sticky;top:0;z-index:100;background:rgba(250,250,247,0.92);backdrop-filter:blur(12px);border-bottom:1px solid #e8e4df}
.back-btn{width:34px;height:34px;border-radius:12px;border:1.5px solid #e8e4df;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;text-decoration:none}
.back-btn svg{color:#A8A29E}
.page-header h2{font-size:16px;font-weight:800;margin:0}
.page-header .sub{font-size:11px;color:#A8A29E;margin-top:2px}

.card{background:#fff;border-radius:16px;border:1.5px solid #e8e4df;padding:20px;margin:0 16px 12px}
.card-title{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px}
.badge-step{background:#3D6B4A18;color:#3D6B4A}

.upload-zone{border:2px dashed #d5cfc7;border-radius:14px;padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#FAF8F4}
.upload-zone:active{border-color:#3D6B4A}
.upload-zone.has-image{border:none;padding:0;background:none}
.upload-zone .icon{margin-bottom:8px;color:#8BAF9A;display:flex;justify-content:center}
.upload-zone .txt{font-size:13px;color:#A8A29E;line-height:1.6}
.upload-zone .txt b{color:#3D6B4A;font-weight:600}
.upload-preview{width:100%;border-radius:14px;display:block;object-fit:cover;max-height:280px}

.analyzing{text-align:center;padding:24px;display:none}
.analyzing.show{display:block}
.analyzing .spinner{width:28px;height:28px;border:3px solid #e8e4df;border-top-color:#3D6B4A;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
.analyzing .txt{font-size:13px;color:#A8A29E}

.analysis-box{display:none;margin-top:14px;animation:fadeUp .4s ease}
.analysis-box.show{display:block}

.a-hero{background:linear-gradient(135deg,#F0F6F2,#E5F0E8);border-radius:14px;padding:16px;margin-bottom:12px}
.a-label{font-size:10px;font-weight:700;color:#3D6B4A;letter-spacing:.5px;margin-bottom:6px}
.a-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.a-name{font-size:19px;font-weight:900;color:#1C1917}
.a-gender{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px}
.a-cat{font-size:11px;color:#888;margin-bottom:6px}
.a-sil{font-size:12px;color:#6B7B6F;margin-bottom:6px;line-height:1.6}
.a-desc{font-size:13px;color:#4A5D50;line-height:1.75}
.a-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.a-tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;background:#3D6B4A15;color:#3D6B4A}

.a-perm{margin-top:10px;padding:10px 12px;border-radius:10px;background:#F5F0FA;border:1px solid #E0D4ED}
.a-perm-label{font-size:10px;font-weight:700;color:#9B4CB5;margin-bottom:3px}
.a-perm-type{font-size:13px;font-weight:700;color:#7B3F9E;margin-bottom:2px}
.a-perm-desc{font-size:12px;color:#6B5B7B;line-height:1.6}

.a-chips{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.a-chip{flex:1;min-width:calc(50% - 3px);padding:8px 10px;border-radius:10px;background:rgba(26,24,20,.04);font-size:11px;line-height:1.5}
.a-chip b{font-weight:700;color:#1A1814;display:block;margin-bottom:2px;font-size:10px;letter-spacing:.3px}
.a-chip span{color:#555}

.a-order{margin-top:10px;padding:10px 12px;border-radius:8px;background:rgba(26,24,20,.04)}
.a-order-label{font-size:10px;font-weight:700;color:#1A1814;margin-bottom:6px}
.a-order-flow{display:flex;align-items:center;flex-wrap:wrap;gap:4px}
.a-order-step{font-size:11px;font-weight:700;padding:5px 10px;border-radius:8px;background:#3D6B4A10;color:#3D6B4A}
.a-order-arrow{font-size:11px;color:#ccc}

.a-divider{height:1px;background:#e8e4df;margin:14px 0}

.a-sec{margin-bottom:14px}
.a-sec:last-child{margin-bottom:0}
.a-sec-head{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.a-sec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.a-sec-name{font-size:13px;font-weight:800;color:#1C1917}
.a-sec-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;background:#f0f0ec;color:#666;margin-left:auto}
.a-sec-kw{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.a-kw{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;line-height:1.2}
.a-kw-tech{background:#3D6B4A14;color:#3D6B4A}
.a-kw-angle{background:#5BA4D918;color:#3A7CAA}
.a-kw-slice{background:#C577D918;color:#9B4CB5}
.a-kw-guide{background:#E8943D18;color:#C47A2A}
.a-sec-detail{font-size:12.5px;color:#4A5D50;line-height:1.75;padding:10px 12px;background:#F7FAF8;border-radius:10px;border:1px solid #E0EDE4}
.a-sec-detail b{font-weight:700;color:#3D6B4A}

.a-total{padding:12px;background:#F7FAF8;border-radius:10px;border:1px solid #E0EDE4}
.a-total-title{font-size:11px;font-weight:700;color:#3D6B4A;margin-bottom:4px}
.a-total-text{font-size:12.5px;color:#4A5D50;line-height:1.75}

.reset-btn{width:calc(100% - 32px);margin:8px 16px 24px;padding:14px;border-radius:14px;border:1.5px solid #e8e4df;background:#fff;color:#A8A29E;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:none}
.reset-btn.show{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
  <div class="page-header">
    <a class="back-btn" href="./index.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></a>
    <div><h2>AI 컷트 분석기</h2><div class="sub">사진 업로드 → 컷트 구조 분석</div></div>
  </div>

  <div class="card" id="mainCard">
    <div class="card-title">헤어스타일 사진 <span class="badge badge-step">분석</span></div>
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <div class="icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>
      <div class="txt">원하는 헤어 컷트 사진을<br><b>탭하여 업로드</b>해주세요</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleUpload(this)"/>
    <div class="analyzing" id="analyzing"><div class="spinner"></div><div class="txt">컷트 구조를 분석하고 있어요...</div></div>
    <div class="analysis-box" id="analysisBox"></div>
  </div>

  <button class="reset-btn" id="resetBtn" onclick="resetAll()">처음부터 다시하기</button>
  <div style="height:40px"></div>
</div>

<script>
var ST = {img64:null, imgType:null};
var API_URL = '/api/recipe';

var SEC_COLORS = {
  top:'#E85D5D', crown:'#E8943D', fringe:'#5BA4D9', side:'#C577D9',
  nape:'#4DB86A', back:'#D4B84A', occipital:'#D97B4A', bang:'#D95B8F',
  undercut:'#7B8CDE', sideburn:'#A0875A', parietal:'#6DBAB0'
};

function handleUpload(input){
  var file = input.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    var full=e.target.result, b64=full.split(',')[1], mt=file.type||'image/jpeg';
    var zone = document.getElementById('uploadZone');
    zone.classList.add('has-image');
    zone.innerHTML = '<img class="upload-preview" src="'+full+'" alt=""/>';
    zone.onclick = null;
    ST.img64 = b64; ST.imgType = mt;
    doAnalyze(b64, mt);
  };
  reader.readAsDataURL(file);
}

function doAnalyze(b64, mt){
  var ld = document.getElementById('analyzing');
  var box = document.getElementById('analysisBox');
  box.classList.remove('show'); box.innerHTML=''; ld.classList.add('show');

  var sp = [
    '너는 대한민국 살롱 현장 20년차 헤어 컷트 구조 분석 전문가이자 교육자.',
    '사진 속 헤어스타일의 컷트 구조를 역공학 분석해.',
    '주니어~시니어 디자이너가 이 스타일을 재현할 때 방향과 가이드를 잡을 수 있도록 상세하게.',
    '',
    '■ 성별/스타일 자동 판별: 사진을 보고 남성/여성을 판별하고, 그에 맞는 구조로 분석.',
    '■ 분석 가능 섹션: top, crown, fringe, side, nape, back, occipital, bang, undercut, sideburn, parietal',
    '  - 사진에 해당하는 섹션만 선별 (불필요한 섹션 생략)',
    '■ 시술각은 반드시 숫자°형태',
    '■ 금지: 컬러/염색, 스타일링 도구, 브랜드명',
    '',
    '★★★ 중요 ★★★',
    '1. 모든 용어는 한글로 표현. 단, 디스커넥션/클리퍼/S컬/C컬 같은 업계 고유 용어만 영어 허용.',
    '2. 실루엣 설명 시 쉽게 풀어서: 예를 들어 "U자 라인"이면 → "뒷머리 아랫선이 둥글게 U자로 떨어지는 형태" 처럼 어디가 어떤 모양인지 구체적으로 설명.',
    '3. 각 섹션의 분석은 디자이너가 컷트 방향성과 가이드를 잡을 수 있을 만큼 구체적으로.',
    '',
    '══ 남성 컷트 참고 ══',
    '- 투블럭컷: 사이드/네이프를 클리퍼로 짧게 밀고 탑~크라운은 길이를 살리는 구조. 연결부(디스커넥션 라인) 위치가 핵심.',
    '- 쉐도우펌/다운펌/가르마펌 접목 시: 컷트 구조 먼저 분석 → 펌이 형태에 미치는 영향 별도 기술.',
    '- 클리퍼 구간: mm 단위 (예: "사이드 6mm에서 상단 12mm로 자연스럽게 연결")',
    '- 페이드 유형: 로우/미드/하이/스킨/드롭 구분',
    '',
    '══ 여성 컷트 + 펌 접목 참고 ══',
    '- 펌이 들어간 사진: 웨이브/컬 아래의 컷트 구조를 역추정.',
    '- 히피펌/바디펌/물결펌/S컬펌/빌드펌 등: 펌 유형 명시 후, 펌 전 컷트 구조 추정.',
    '- 레이어드+펌: 어디서부터 층이 시작되어야 웨이브가 자연스럽게 떨어지는지.',
    '- 허쉬컷/울프컷: 강한 디스커넥션과 레이어 위치를 명확히.',
    '',
    '각 섹션 분석 항목:',
    '- technique: 테크닉명 (원렝스/그래주에이션/유니폼레이어/인크리스레이어/클리퍼/테이퍼링/페이드 등)',
    '- angle: 시술각(숫자°) 또는 클리퍼 mm',
    '- slice: 슬라이스 방향',
    '- guide_length: 가이드 길이 (cm 또는 기준점 대비)',
    '- detail: 종합 설명 4~6문장. 아래 내용을 자연스럽게 녹여서 한 덩어리로 서술:',
    '  · 층이 어디서 시작되는지 (시작점)',
    '  · 무게감이 어디에 몰리는지',
    '  · 볼륨 방향 (안쪽/바깥쪽/눌림 등)',
    '  · 인접 섹션과의 연결 방식',
    '  · 앞머리가 있으면: 유형, 섹션 잡는 범위, 양감, 사이드뱅 유무와 사이드 층 연결성',
    '',
    'JSON만 출력 (마크다운 금지):',
    '{',
    '  "gender": "남성 또는 여성",',
    '  "style_name": "스타일명 (한글)",',
    '  "style_category": "분류",',
    '  "silhouette": "실루엣을 쉽게 풀어서 설명. 어디가 어떤 형태인지 구체적으로. 1~2문장.",',
    '  "description": "스타일 전체 특징 3~4문장. 형태감, 무게감 분포, 움직임 방향 포함.",',
    '  "key_techniques": ["핵심 키워드"],',
    '  "perm_info": {',
    '    "has_perm": true/false,',
    '    "perm_type": "펌 유형 (없으면 null)",',
    '    "perm_influence": "펌이 컷트 형태에 미치는 영향 (없으면 null)"',
    '  },',
    '  "weight_line": "무게선 위치와 흐름 설명",',
    '  "length_range": "전체 길이 범위",',
    '  "cut_order": ["시술 순서"],',
    '  "sections": {',
    '    "섹션키": {',
    '      "name": "섹션 한글명",',
    '      "technique": "테크닉",',
    '      "angle": "시술각",',
    '      "slice": "슬라이스",',
    '      "guide_length": "가이드",',
    '      "detail": "종합 설명 4~6문장 (시작점, 무게감, 볼륨방향, 연결방식을 녹여서)"',
    '    }',
    '  },',
    '  "overall_note": "전체 섹션 연결 흐름 + 질감 특성 + 재현 핵심 포인트를 합쳐서 3~5문장으로."',
    '}'
  ].join('\n');

  fetch(API_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:3000,
      system:sp,
      messages:[{role:'user', content:[
        {type:'image', source:{type:'base64', media_type:mt, data:b64}},
        {type:'text', text:'이 헤어스타일의 컷트 구조를 분석해줘.'}
      ]}]
    })
  }).then(function(r){ return r.json() })
  .then(function(data){
    ld.classList.remove('show');
    try {
      var txt = data.content.map(function(b){ return b.text||'' }).join('');
      txt = txt.replace(/```json|```/g,'').trim();
      renderAnalysis(JSON.parse(txt));
    } catch(e) {
      box.innerHTML='<div class="a-hero"><div class="a-label">분석 실패</div><div class="a-desc">사진을 다시 업로드해주세요.</div></div>';
      box.classList.add('show');
    }
  }).catch(function(){
    ld.classList.remove('show');
    box.innerHTML='<div class="a-hero"><div class="a-label">연결 오류</div><div class="a-desc">네트워크를 확인 후 다시 시도해주세요.</div></div>';
    box.classList.add('show');
  });
}

function renderAnalysis(r){
  var box = document.getElementById('analysisBox');
  var h = '';

  // ── 히어로 ──
  h += '<div class="a-hero">';
  h += '<div class="a-label">AI 컷트 구조 분석</div>';
  h += '<div class="a-row">';
  h += '<span class="a-name">'+(r.style_name||'')+'</span>';
  if(r.gender){
    var isM = r.gender==='남성';
    h += '<span class="a-gender" style="background:'+(isM?'#5BA4D918':'#D95B8F18')+';color:'+(isM?'#3A7CAA':'#D95B8F')+'">'+r.gender+'</span>';
  }
  h += '</div>';
  if(r.style_category) h += '<div class="a-cat">'+r.style_category+'</div>';
  if(r.silhouette) h += '<div class="a-sil">'+r.silhouette+'</div>';
  h += '<div class="a-desc">'+(r.description||'')+'</div>';

  if(r.key_techniques && r.key_techniques.length){
    h += '<div class="a-tags">';
    r.key_techniques.forEach(function(t){ h += '<span class="a-tag">'+t+'</span>' });
    h += '</div>';
  }

  if(r.perm_info && r.perm_info.has_perm){
    h += '<div class="a-perm">';
    h += '<div class="a-perm-label">펌 접목</div>';
    if(r.perm_info.perm_type) h += '<div class="a-perm-type">'+r.perm_info.perm_type+'</div>';
    if(r.perm_info.perm_influence) h += '<div class="a-perm-desc">'+r.perm_info.perm_influence+'</div>';
    h += '</div>';
  }

  if(r.weight_line || r.length_range){
    h += '<div class="a-chips">';
    if(r.weight_line) h += '<div class="a-chip"><b>무게선</b><span>'+r.weight_line+'</span></div>';
    if(r.length_range) h += '<div class="a-chip"><b>길이 범위</b><span>'+r.length_range+'</span></div>';
    h += '</div>';
  }

  if(r.cut_order && r.cut_order.length){
    h += '<div class="a-order"><div class="a-order-label">추천 시술 순서</div><div class="a-order-flow">';
    r.cut_order.forEach(function(s,i){
      if(i>0) h += '<span class="a-order-arrow">→</span>';
      h += '<span class="a-order-step">'+s+'</span>';
    });
    h += '</div></div>';
  }
  h += '</div>';

  // ── 섹션별 분석 (한 카드 안 인라인) ──
  if(r.sections){
    var keys = Object.keys(r.sections);
    if(r.cut_order && r.cut_order.length){
      var ordered=[];
      r.cut_order.forEach(function(o){
        var lc=o.toLowerCase().replace(/\s/g,'');
        keys.forEach(function(k){
          if(k.toLowerCase()===lc && ordered.indexOf(k)===-1) ordered.push(k);
        });
      });
      keys.forEach(function(k){ if(ordered.indexOf(k)===-1) ordered.push(k) });
      keys = ordered;
    }

    keys.forEach(function(key){
      var d = r.sections[key]; if(!d) return;
      var color = SEC_COLORS[key] || '#888';
      var name = d.name || key;

      h += '<div class="a-divider"></div>';
      h += '<div class="a-sec">';
      h += '<div class="a-sec-head">';
      h += '<span class="a-sec-dot" style="background:'+color+'"></span>';
      h += '<span class="a-sec-name">'+name+'</span>';
      if(d.angle) h += '<span class="a-sec-badge">'+d.angle+'</span>';
      h += '</div>';

      h += '<div class="a-sec-kw">';
      if(d.technique) h += '<span class="a-kw a-kw-tech">'+d.technique+'</span>';
      if(d.angle) h += '<span class="a-kw a-kw-angle">'+d.angle+'</span>';
      if(d.slice) h += '<span class="a-kw a-kw-slice">'+d.slice+'</span>';
      if(d.guide_length) h += '<span class="a-kw a-kw-guide">'+d.guide_length+'</span>';
      h += '</div>';

      if(d.detail){
        h += '<div class="a-sec-detail">'+d.detail+'</div>';
      }
      h += '</div>';
    });
  }

  // ── 종합 ──
  if(r.overall_note){
    h += '<div class="a-divider"></div>';
    h += '<div class="a-total">';
    h += '<div class="a-total-title">종합 포인트</div>';
    h += '<div class="a-total-text">'+r.overall_note+'</div>';
    h += '</div>';
  }

  box.innerHTML = h;
  box.classList.add('show');
  document.getElementById('resetBtn').classList.add('show');
}

function resetAll(){
  ST = {img64:null, imgType:null};
  var zone = document.getElementById('uploadZone');
  zone.classList.remove('has-image');
  zone.innerHTML = '<div class="icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div><div class="txt">원하는 헤어 컷트 사진을<br><b>탭하여 업로드</b>해주세요</div>';
  zone.onclick = function(){ document.getElementById('fileInput').click() };
  var old = document.getElementById('fileInput'), nw = document.createElement('input');
  nw.type='file'; nw.id='fileInput'; nw.accept='image/*'; nw.style.display='none';
  nw.onchange = function(ev){ handleUpload(ev.target) };
  old.parentNode.replaceChild(nw, old);
  document.getElementById('analysisBox').classList.remove('show');
  document.getElementById('analysisBox').innerHTML = '';
  document.getElementById('analyzing').classList.remove('show');
  document.getElementById('resetBtn').classList.remove('show');
  window.scrollTo({top:0, behavior:'smooth'});
}
</script>
</body>
