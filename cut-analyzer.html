<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>AI 컷트 분석기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Noto Sans KR',sans-serif;background:#FAFAF7;color:#1C1917;min-height:100dvh;overflow-x:hidden}
input,select,textarea{font-size:16px!important;-webkit-appearance:none;font-family:inherit}
.app{width:100%;max-width:430px;margin:0 auto;min-height:100dvh;background:#FAFAF7}
@media(min-width:431px){.app{border-left:1px solid #e8e4df;border-right:1px solid #e8e4df}}

.page-header{display:flex;align-items:center;gap:12px;padding:14px 16px;position:sticky;top:0;z-index:100;background:rgba(250,250,247,0.92);backdrop-filter:blur(12px);border-bottom:1px solid #e8e4df}
.back-btn{width:34px;height:34px;border-radius:12px;border:1.5px solid #e8e4df;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;text-decoration:none}
.back-btn svg{color:#A8A29E}
.page-header h2{font-size:16px;font-weight:800;margin:0}
.page-header .sub{font-size:11px;color:#A8A29E;margin-top:2px}

.card{background:#fff;border-radius:16px;border:1.5px solid #e8e4df;padding:20px;margin:0 16px 12px}
.card-title{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;background:#3D6B4A18;color:#3D6B4A}

.upload-zone{border:2px dashed #d5cfc7;border-radius:14px;padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#FAF8F4}
.upload-zone:active{border-color:#3D6B4A}
.upload-zone.has-image{border:none;padding:0;background:none}
.upload-zone .icon{margin-bottom:8px;color:#8BAF9A;display:flex;justify-content:center}
.upload-zone .txt{font-size:13px;color:#A8A29E;line-height:1.6}
.upload-zone .txt b{color:#3D6B4A;font-weight:600}
.upload-preview{width:100%;border-radius:14px;display:block;object-fit:cover;max-height:280px}

.analyzing{text-align:center;padding:24px;display:none}
.analyzing.show{display:block}
.analyzing .spinner{width:28px;height:28px;border:3px solid #e8e4df;border-top-color:#3D6B4A;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
.analyzing .txt{font-size:13px;color:#A8A29E}

/* 분석 결과 */
.result{display:none;margin-top:14px;animation:fadeUp .4s ease}
.result.show{display:block}

.r-hero{background:linear-gradient(135deg,#F0F6F2,#E5F0E8);border-radius:14px;padding:16px}
.r-label{font-size:10px;font-weight:700;color:#3D6B4A;letter-spacing:.5px;margin-bottom:6px}
.r-title-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.r-name{font-size:19px;font-weight:900;color:#1C1917}
.r-gender{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px}
.r-sil{font-size:12px;color:#6B7B6F;line-height:1.6;margin-bottom:8px}
.r-desc{font-size:13px;color:#4A5D50;line-height:1.75;margin-bottom:10px}
.r-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.r-tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;background:#3D6B4A15;color:#3D6B4A}

/* 펌 */
.r-perm{padding:10px 12px;border-radius:10px;background:#F5F0FA;border:1px solid #E0D4ED;margin-bottom:10px}
.r-perm b{font-size:10px;font-weight:700;color:#9B4CB5;display:block;margin-bottom:2px}
.r-perm span{font-size:12px;color:#6B5B7B;line-height:1.5}

/* 키워드 리스트 — 핵심 */
.r-keywords{margin-top:12px}
.r-kw-item{display:flex;gap:8px;padding:9px 0;border-bottom:1px solid #f0ece6}
.r-kw-item:last-child{border-bottom:none}
.r-kw-label{font-size:12px;font-weight:800;color:#1C1917;min-width:62px;flex-shrink:0;padding-top:1px}
.r-kw-value{font-size:12.5px;color:#4A5D50;line-height:1.6}

.reset-btn{width:calc(100% - 32px);margin:8px 16px 24px;padding:14px;border-radius:14px;border:1.5px solid #e8e4df;background:#fff;color:#A8A29E;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:none}
.reset-btn.show{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
  <div class="page-header">
    <a class="back-btn" href="./index.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></a>
    <div><h2>AI 컷트 분석기</h2><div class="sub">사진 업로드 → 컷트 구조 분석</div></div>
  </div>

  <div class="card">
    <div class="card-title">헤어스타일 사진 <span class="badge">STEP 1</span></div>
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <div class="icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>
      <div class="txt">원하는 헤어 컷트 사진을<br><b>탭하여 업로드</b>해주세요</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleUpload(this)"/>
    <div class="analyzing" id="analyzing"><div class="spinner"></div><div class="txt">컷트 구조를 분석하고 있어요...</div></div>

    <!-- 분석 결과: 이 카드 안에 전부 -->
    <div class="result" id="result"></div>
  </div>

  <button class="reset-btn" id="resetBtn" onclick="resetAll()">처음부터 다시하기</button>
  <div style="height:40px"></div>
</div>

<script>
var API_URL = '/api/recipe';

function handleUpload(input){
  var file = input.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    var full=e.target.result, b64=full.split(',')[1], mt=file.type||'image/jpeg';
    var zone = document.getElementById('uploadZone');
    zone.classList.add('has-image');
    zone.innerHTML = '<img class="upload-preview" src="'+full+'" alt=""/>';
    zone.onclick = null;
    doAnalyze(b64, mt);
  };
  reader.readAsDataURL(file);
}

function doAnalyze(b64, mt){
  var ld = document.getElementById('analyzing');
  var result = document.getElementById('result');
  result.classList.remove('show'); result.innerHTML=''; ld.classList.add('show');

  var sp = [
    '너는 대한민국 살롱 현장 20년차 헤어 컷트 구조 분석 전문가이자 교육자.',
    '사진 속 헤어스타일의 컷트 구조를 역공학 분석해.',
    '',
    '■ 성별 자동 판별 (남성/여성)',
    '■ 시술각은 숫자°형태',
    '■ 금지: 컬러/염색, 스타일링 도구, 브랜드명',
    '■ 모든 용어는 한글로. 단, 디스커넥션/클리퍼/S컬/C컬 같은 업계 고유 용어만 영어 허용.',
    '■ 실루엣은 쉽게 풀어서: "U자 라인"이면 → "뒷머리 아랫선이 둥글게 U자로 떨어지는 형태" 처럼.',
    '',
    '══ 남성 컷트 참고 ══',
    '- 투블럭: 사이드/네이프 클리퍼로 밀고 탑은 길이 유지. 디스커넥션 라인 위치 핵심.',
    '- 다운펌/쉐도우펌/가르마펌 접목 시: 컷트 구조와 펌 영향 구분.',
    '- 클리퍼 구간 mm 단위, 페이드 유형(로우/미드/하이/스킨/드롭) 구분.',
    '',
    '══ 여성 컷트 + 펌 접목 참고 ══',
    '- 펌 사진: 웨이브 아래 컷트 구조 역추정.',
    '- 히피펌/바디펌/S컬펌 등 유형 명시.',
    '- 레이어드+펌: 층 시작점이 웨이브 자연스러움에 핵심.',
    '',
    '★★★ 출력 형식 ★★★',
    '분석 후 아래 JSON 형식으로만 출력. 마크다운 금지.',
    '각 키워드 항목의 값은 1줄 이내, 핵심만 간결하게.',
    '',
    '{',
    '  "gender": "남성 또는 여성",',
    '  "style_name": "스타일명 (한글)",',
    '  "silhouette": "실루엣을 쉽게 풀어서 1~2문장",',
    '  "description": "스타일 전체 특징 2~3문장",',
    '  "key_techniques": ["핵심 키워드 태그 3~5개"],',
    '  "perm_info": {',
    '    "has_perm": true/false,',
    '    "perm_type": "펌 유형 (없으면 null)",',
    '    "perm_note": "펌이 형태에 미치는 영향 한줄 (없으면 null)"',
    '  },',
    '  "keywords": [',
    '    {"label":"층 시작점", "value":"예: 크라운 아래 2cm에서 시작, 아래로 갈수록 길어지는 구조"},',
    '    {"label":"무게감", "value":"예: 턱선 아래 3cm 지점에 무게감 집중"},',
    '    {"label":"볼륨 방향", "value":"예: 안쪽으로 감기는 C컬 실루엣, 뿌리 볼륨 살림"},',
    '    {"label":"질감", "value":"예: 모끝 가볍게 텍스처링, 블런트한 커팅라인"},',
    '    {"label":"앞머리", "value":"예: 시스루뱅, 이마 양쪽 1cm 안쪽 소량 삼각섹션, 사이드뱅과 자연스럽게 연결"},',
    '    {"label":"무게선", "value":"예: 턱선에서 시작해 뒤로 갈수록 올라가는 라인"},',
    '    {"label":"길이 범위", "value":"예: 앞머리 3cm / 사이드 15cm / 백 25cm"}',
    '  ]',
    '}',
    '',
    '★ keywords 배열의 label은 위 예시처럼 고정하되, 해당 사항이 없으면 생략 가능.',
    '★ 남성 투블럭/페이드 시 아래 label 추가 가능:',
    '  {"label":"클리퍼 구간", "value":"예: 사이드 3mm → 상단 9mm 로우페이드"},',
    '  {"label":"디스커넥션", "value":"예: 측두점 높이에서 디스커넥션, 탑과 단차 형성"},',
    '★ value는 반드시 1줄 이내. 핵심 키워드 중심으로 간결하게.',
    '★ 장문 서술 금지. 디자이너가 한눈에 방향을 잡을 수 있게.'
  ].join('\n');

  fetch(API_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1500,
      system:sp,
      messages:[{role:'user', content:[
        {type:'image', source:{type:'base64', media_type:mt, data:b64}},
        {type:'text', text:'이 헤어스타일의 컷트 구조를 분석해줘.'}
      ]}]
    })
  }).then(function(r){ return r.json() })
  .then(function(data){
    ld.classList.remove('show');
    try {
      var txt = data.content.map(function(b){ return b.text||'' }).join('');
      txt = txt.replace(/```json|```/g,'').trim();
      render(JSON.parse(txt));
    } catch(e) {
      result.innerHTML='<div class="r-hero"><div class="r-label">분석 실패</div><div class="r-desc">사진을 다시 업로드해주세요.</div></div>';
      result.classList.add('show');
    }
  }).catch(function(){
    ld.classList.remove('show');
    result.innerHTML='<div class="r-hero"><div class="r-label">연결 오류</div><div class="r-desc">네트워크를 확인 후 다시 시도해주세요.</div></div>';
    result.classList.add('show');
  });
}

function render(r){
  var el = document.getElementById('result');
  var h = '';

  // 히어로
  h += '<div class="r-hero">';
  h += '<div class="r-label">AI 컷트 구조 분석</div>';
  h += '<div class="r-title-row">';
  h += '<span class="r-name">'+(r.style_name||'')+'</span>';
  if(r.gender){
    var m = r.gender==='남성';
    h += '<span class="r-gender" style="background:'+(m?'#5BA4D918':'#D95B8F18')+';color:'+(m?'#3A7CAA':'#D95B8F')+'">'+r.gender+'</span>';
  }
  h += '</div>';
  if(r.silhouette) h += '<div class="r-sil">'+r.silhouette+'</div>';
  h += '<div class="r-desc">'+(r.description||'')+'</div>';

  if(r.key_techniques && r.key_techniques.length){
    h += '<div class="r-tags">';
    r.key_techniques.forEach(function(t){ h += '<span class="r-tag">'+t+'</span>' });
    h += '</div>';
  }

  // 펌
  if(r.perm_info && r.perm_info.has_perm){
    h += '<div class="r-perm">';
    h += '<b>펌 접목 · '+(r.perm_info.perm_type||'')+'</b>';
    if(r.perm_info.perm_note) h += '<span>'+r.perm_info.perm_note+'</span>';
    h += '</div>';
  }

  // 키워드 리스트 — 핵심
  if(r.keywords && r.keywords.length){
    h += '<div class="r-keywords">';
    r.keywords.forEach(function(kw){
      h += '<div class="r-kw-item">';
      h += '<div class="r-kw-label">'+kw.label+'</div>';
      h += '<div class="r-kw-value">'+kw.value+'</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  h += '</div>';
  el.innerHTML = h;
  el.classList.add('show');
  document.getElementById('resetBtn').classList.add('show');
}

function resetAll(){
  var zone = document.getElementById('uploadZone');
  zone.classList.remove('has-image');
  zone.innerHTML = '<div class="icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div><div class="txt">원하는 헤어 컷트 사진을<br><b>탭하여 업로드</b>해주세요</div>';
  zone.onclick = function(){ document.getElementById('fileInput').click() };
  var old = document.getElementById('fileInput'), nw = document.createElement('input');
  nw.type='file'; nw.id='fileInput'; nw.accept='image/*'; nw.style.display='none';
  nw.onchange = function(ev){ handleUpload(ev.target) };
  old.parentNode.replaceChild(nw, old);
  document.getElementById('result').classList.remove('show');
  document.getElementById('result').innerHTML = '';
  document.getElementById('analyzing').classList.remove('show');
  document.getElementById('resetBtn').classList.remove('show');
  window.scrollTo({top:0, behavior:'smooth'});
}
</script>
</body>
</html>
