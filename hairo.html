<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0A0A">
<title>HAIRO · 헤어 비주얼라이저</title>
<style>
:root {
  --bg: #0A0A0A;
  --bg-elevated: #1c1c1c;
  --bg-input: #1F1F1F;
  --border: rgba(255,255,255,0.1);
  --border-strong: rgba(255,255,255,0.2);
  --text: #ffffff;
  --text-muted: rgba(255,255,255,0.55);
  --text-faint: rgba(255,255,255,0.35);
  --accent: #C7F050;
  --accent-soft: rgba(199,240,80,0.15);
  --accent-border: rgba(199,240,80,0.3);
  --warn: rgba(255,200,80,0.95);
  --warn-bg: rgba(255,200,80,0.08);
  --danger: #ff6b6b;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overscroll-behavior: none;
  -webkit-text-size-adjust: 100%;
}
body { padding-bottom: env(safe-area-inset-bottom); }
button { font-family: inherit; cursor: pointer; }
input, textarea { font-family: inherit; }

/* ===== Header ===== */
.header {
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 50;
  padding: calc(12px + env(safe-area-inset-top)) 14px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 0.5px solid var(--border);
}
.header-left { display: flex; align-items: center; gap: 12px; }
.btn-back {
  width: 32px; height: 32px;
  background: var(--bg-input);
  border: 0.5px solid var(--border);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
  font-size: 17px;
  line-height: 1;
}
.logo {
  font-family: "Times New Roman", "Noto Serif KR", serif;
  font-style: italic;
  font-size: 19px;
  font-weight: 500;
  letter-spacing: 0.2px;
}
.logo .o { color: var(--accent); }
.logo-sub {
  font-family: -apple-system, sans-serif;
  font-style: normal;
  font-size: 9.5px;
  color: var(--text-faint);
  letter-spacing: 1.5px;
  margin-left: 6px;
}
.header-right { display: flex; align-items: center; gap: 10px; }
.credit-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 11px;
  border: 0.5px solid var(--accent-border);
  background: rgba(199,240,80,0.05);
  border-radius: 999px;
  font-size: 11px;
  color: var(--text);
}
.credit-dot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; }
.btn-link {
  font-size: 11px;
  color: var(--text-faint);
  background: none;
  border: none;
  padding: 6px 0;
}

/* ===== Tabs ===== */
.tabs {
  display: flex;
  gap: 18px;
  padding: 12px 16px 6px;
  background: var(--bg);
  position: sticky;
  top: 64px;
  z-index: 40;
}
.tab {
  font-size: 13px;
  color: var(--text-faint);
  padding: 0 0 6px;
  border-bottom: 1.5px solid transparent;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}
.tab.active {
  color: var(--text);
  font-weight: 500;
  border-bottom-color: var(--accent);
}

/* ===== Gallery ===== */
.gallery {
  padding: 6px 6px 240px;
  min-height: calc(100vh - 130px);
}
.gallery-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
}
.gallery-item {
  aspect-ratio: 3/4;
  background: var(--bg-input);
  border-radius: 10px;
  position: relative;
  overflow: hidden;
}
.gallery-empty {
  text-align: center;
  padding: 80px 24px 40px;
  color: var(--text-faint);
}
.gallery-empty-icon {
  width: 56px; height: 56px;
  background: var(--bg-input);
  border: 0.5px dashed var(--border-strong);
  border-radius: 16px;
  margin: 0 auto 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  color: var(--accent);
  font-weight: 300;
}
.gallery-empty h3 {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 8px;
}
.gallery-empty p {
  font-size: 12px;
  line-height: 1.6;
}

/* ===== Docked prompt ===== */
.dock {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top, var(--bg) 60%, rgba(10,10,10,0));
  padding: 36px 10px calc(12px + env(safe-area-inset-bottom));
  z-index: 45;
}
.dock-card {
  background: var(--bg-elevated);
  border: 0.5px solid var(--border);
  border-radius: 18px;
  padding: 12px;
}
.dock-input-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 10px;
}
.btn-attach {
  flex-shrink: 0;
  width: 32px; height: 32px;
  background: rgba(255,255,255,0.06);
  border: 0.5px solid var(--border-strong);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
  font-size: 18px;
  line-height: 1;
  position: relative;
  cursor: pointer;
}
.btn-attach.has-file {
  background: var(--accent-soft);
  border-color: var(--accent-border);
  color: var(--accent);
}
.dock-textarea {
  flex: 1;
  background-color: var(--bg-elevated);
  -webkit-appearance: none;
  appearance: none;
  border: none;
  color: var(--text);
  font-size: 14px;
  line-height: 1.55;
  resize: none;
  min-height: 72px;
  max-height: 200px;
  padding: 8px 0;
  outline: none;
  overflow-y: auto;
}
.dock-textarea:focus {
  background-color: var(--bg-elevated);
  outline: none;
}
.dock-textarea::placeholder { color: var(--text-faint); }
.dock-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}
.dock-chips {
  display: flex;
  gap: 5px;
  flex: 1;
  overflow-x: auto;
  scrollbar-width: none;
}
.dock-chips::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 10px;
  background: rgba(255,255,255,0.05);
  border: 0.5px solid transparent;
  border-radius: 999px;
  font-size: 10.5px;
  color: var(--text-muted);
  white-space: nowrap;
}
.chip-g { color: var(--accent); font-weight: 600; }
.btn-generate {
  flex-shrink: 0;
  background: var(--accent);
  color: #0A0A0A;
  padding: 8px 16px;
  border: none;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.btn-generate:disabled { opacity: 0.5; }
.btn-generate .spark { font-size: 11px; }

/* ===== Modals ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
  padding-top: calc(16px + env(safe-area-inset-top));
  padding-bottom: calc(16px + env(safe-area-inset-bottom));
}
.modal-overlay.active {
  display: flex;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
.modal-card {
  background: #131313;
  border: 0.5px solid var(--accent-border);
  border-radius: 18px;
  width: 100%;
  max-width: 420px;
  max-height: 100%;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.modal-header {
  padding: 12px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}
.modal-title {
  font-size: 13px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 7px;
}
.modal-title-icon {
  width: 18px; height: 18px;
  background: var(--accent-soft);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--accent);
  font-size: 11px;
}
.modal-close {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 20px;
  padding: 0 4px;
  line-height: 1;
}
.modal-body {
  flex: 1;
  overflow-y: auto;
}

/* Loading */
.loading-content {
  padding: 56px 20px 48px;
  text-align: center;
}
.loading-spinner {
  width: 38px; height: 38px;
  border: 2.5px solid var(--accent-border);
  border-top-color: var(--accent);
  border-radius: 50%;
  margin: 0 auto 18px;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.loading-sub {
  font-size: 11px;
  color: var(--text-faint);
}

/* Result */
.result-image-wrap {
  background: #0A0A0A;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 280px;
  position: relative;
}
.result-image-wrap img {
  max-width: 100%;
  max-height: 60vh;
  width: auto;
  display: block;
  -webkit-touch-callout: default;
  user-select: auto;
  -webkit-user-select: auto;
}
.save-hint {
  margin: 12px 12px 0;
  padding: 10px 12px;
  background: var(--warn-bg);
  border: 0.5px solid rgba(255,200,80,0.25);
  border-radius: 9px;
  font-size: 11px;
  color: var(--warn);
  line-height: 1.55;
}
.save-hint b {
  font-weight: 500;
  display: block;
  margin-bottom: 3px;
}
.save-buttons {
  padding: 10px 12px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.btn-save-primary {
  background: var(--accent);
  color: #0A0A0A;
  padding: 12px;
  border: none;
  border-radius: 11px;
  font-size: 13px;
  font-weight: 600;
}
.btn-save-row {
  display: flex;
  gap: 6px;
}
.btn-save-secondary, .btn-save-tertiary {
  flex: 1;
  background: transparent;
  padding: 10px;
  border-radius: 11px;
  font-size: 12px;
}
.btn-save-secondary {
  border: 0.5px solid var(--border-strong);
  color: var(--text);
}
.btn-save-tertiary {
  border: 0.5px solid var(--border);
  color: var(--text-muted);
}

/* Error */
.error-content { padding: 24px 20px; }
.error-icon {
  width: 44px; height: 44px;
  background: rgba(255,107,107,0.12);
  border-radius: 50%;
  margin: 0 auto 14px;
  display: flex; align-items: center; justify-content: center;
  color: var(--danger);
  font-size: 22px;
}
.error-text {
  font-size: 13px;
  line-height: 1.6;
  color: var(--text);
  text-align: center;
  margin-bottom: 16px;
  white-space: pre-line;
}

/* Toast */
.toast {
  position: fixed;
  bottom: calc(170px + env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%);
  background: rgba(28,28,28,0.96);
  border: 0.5px solid var(--border-strong);
  color: var(--text);
  padding: 10px 18px;
  border-radius: 999px;
  font-size: 12px;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  white-space: nowrap;
}
.toast.show { opacity: 1; }

.hidden { display: none !important; }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <button class="btn-back" onclick="location.href='/'" aria-label="뒤로">‹</button>
    <div>
      <span class="logo">HAIR<span class="o">o</span><span class="logo-sub">VISUALIZER</span></span>
    </div>
  </div>
  <div class="header-right" id="headerRight"></div>
</header>

<nav class="tabs" role="tablist">
  <button class="tab active" data-tab="all" type="button">갤러리</button>
  <button class="tab" data-tab="favorites" type="button">즐겨찾기</button>
</nav>

<main class="gallery" id="galleryView">
  <div class="gallery-empty" id="galleryEmpty">
    <h3>아직 만든 시안이 없어요</h3>
    <p>아래 입력창에 원하는 헤어를 적고<br>Generate를 눌러 첫 시안을 만들어보세요</p>
  </div>
  <div class="gallery-grid hidden" id="galleryGrid"></div>
</main>

<div class="dock">
  <div class="dock-card">
    <div class="dock-input-row">
      <label class="btn-attach" id="attachBtn" for="refInput" title="참조 사진 첨부">
        +
        <input type="file" id="refInput" accept="image/*" hidden>
      </label>
      <textarea
        class="dock-textarea"
        id="promptInput"
        placeholder="프롬프트를 자유롭게 입력하세요"
        rows="3"></textarea>
    </div>
    <div class="dock-bottom">
      <div class="dock-chips">
        <span class="chip"><span class="chip-g">G</span>Nano Banana 2</span>
        <span class="chip">3:4</span>
        <span class="chip">좌측 ¾ · 눈높이</span>
      </div>
      <button class="btn-generate" id="generateBtn" type="button">
        <span class="spark">✦</span>Generate
      </button>
    </div>
  </div>
</div>

<!-- Loading -->
<div class="modal-overlay" id="loadingModal">
  <div class="modal-card">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <div class="loading-text">시안 생성 중</div>
      <div class="loading-sub">약 15~20초 정도 걸려요</div>
    </div>
  </div>
</div>

<!-- Result -->
<div class="modal-overlay" id="resultModal">
  <div class="modal-card">
    <div class="modal-header">
      <div class="modal-title">
        <span class="modal-title-icon">✓</span>
        시안 완성
      </div>
      <button class="modal-close" onclick="closeResultModal()" aria-label="닫기">×</button>
    </div>
    <div class="modal-body" style="padding:0;">
      <div class="result-image-wrap">
        <img id="resultImage" alt="생성된 시안">
      </div>
      <div class="save-hint">
        <b>저장 방법</b>
        이미지를 길게 눌러 사진앱에 저장하거나, 아래 [이미지 저장] 버튼을 눌러주세요. 인쇄·인화용은 원본 권장.
      </div>
      <div class="save-buttons">
        <button class="btn-save-primary" onclick="saveImage()" type="button">이미지 저장 · 사진앱으로</button>
        <div class="btn-save-row">
          <button class="btn-save-secondary" onclick="saveToGallery()" type="button">보관함에 저장</button>
          <button class="btn-save-tertiary" onclick="closeResultModal()" type="button">다시 생성</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Error -->
<div class="modal-overlay" id="errorModal">
  <div class="modal-card">
    <div class="modal-body">
      <div class="error-content">
        <div class="error-icon">!</div>
        <div class="error-text" id="errorText"></div>
        <button class="btn-save-primary" style="width:100%;" onclick="closeErrorModal()" type="button">확인</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== Session (analyzer 패턴) =====
window.SESSION = { ok: false, member: null };

async function loadSession() {
  try {
    const res = await fetch('/api/customer/me', { credentials: 'include' });
    if (res.ok) {
      const data = await res.json();
      window.SESSION.ok = true;
      window.SESSION.member = data.member || data;
      renderLoggedIn();
    } else {
      renderLoggedOut();
    }
  } catch (e) {
    renderLoggedOut();
  }
}

function renderLoggedIn() {
  const credits = window.SESSION.member?.credits_remaining ?? 0;
  document.getElementById('headerRight').innerHTML = `
    <button class="credit-pill" onclick="openCreditModal()" type="button">
      <span class="credit-dot"></span>
      <span>${credits} 크레딧</span>
    </button>
    <button class="btn-link" onclick="doLogout()" type="button">로그아웃</button>
  `;
}

function renderLoggedOut() {
  document.getElementById('headerRight').innerHTML = `
    <a class="btn-link" href="/" style="text-decoration:none;">로그인</a>
  `;
}

function updateCreditBadge(remaining) {
  if (window.SESSION.member) {
    window.SESSION.member.credits_remaining = remaining;
    renderLoggedIn();
  }
}

async function doLogout() {
  await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
  location.href = '/';
}

function openCreditModal() {
  location.href = '/#charge';
}

// ===== 참조 이미지 처리 =====
let referenceBase64 = null;

document.getElementById('refInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) {
    showToast('파일이 너무 커요 (10MB 이하)');
    e.target.value = '';
    return;
  }
  try {
    referenceBase64 = await compressAndConvertToBase64(file);
    document.getElementById('attachBtn').classList.add('has-file');
    showToast('참조 사진 첨부됨');
  } catch (err) {
    showToast('이미지 처리 실패');
  }
});

async function compressAndConvertToBase64(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxDim = 1280;
      let w = img.width, h = img.height;
      if (w > maxDim || h > maxDim) {
        const r = Math.min(maxDim / w, maxDim / h);
        w = Math.round(w * r);
        h = Math.round(h * r);
      }
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      URL.revokeObjectURL(img.src);
      resolve(dataUrl.split(',')[1]);
    };
    img.onerror = () => reject(new Error('이미지 로드 실패'));
    img.src = URL.createObjectURL(file);
  });
}

// ===== Generate =====
let generatedImageUrl = null;
let generatedImageBlob = null;

document.getElementById('generateBtn').addEventListener('click', generateImage);

async function generateImage() {
  if (!window.SESSION.ok) {
    showError('로그인이 필요해요. 메인 페이지에서 로그인해주세요.');
    return;
  }

  const userPrompt = document.getElementById('promptInput').value.trim();
  if (!userPrompt) {
    showToast('프롬프트를 입력해주세요');
    return;
  }

  const credits = window.SESSION.member?.credits_remaining ?? 0;
  if (credits < 1) {
    showError('크레딧이 부족해요. 충전 후 이용해주세요.');
    return;
  }

  // 디폴트 프롬프트 조립 (S2에서 옵션 시트로 변경 가능)
  const fullPrompt = userPrompt + ', vertical 3:4 aspect ratio, portrait orientation, left three-quarter view, eye level, chest-line crop, modern instagram aesthetic, natural daylight, smartphone snapshot';

  document.getElementById('loadingModal').classList.add('active');

  try {
    const res = await fetch('/api/generate-image', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prompt: fullPrompt,
        userPrompt: userPrompt,
        aspectRatio: '3:4',
        framing: { angle: 'left-three-quarter', height: 'eye-level', cut: 'chest' },
        mood: 'instagram',
        referenceBase64: referenceBase64
      })
    });

    document.getElementById('loadingModal').classList.remove('active');

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (res.status === 401) {
        showError('세션이 만료되었어요. 다시 로그인해주세요.');
      } else if (res.status === 402) {
        showError('크레딧이 부족해요.');
      } else if (res.status === 422) {
        showError('생성이 거부되었어요. 다른 표현으로 시도해주세요.\n(크레딧은 자동 환불됨)');
      } else {
        showError(err.error || err.message || '생성 실패. 잠시 후 다시 시도해주세요.');
      }
      return;
    }

    const data = await res.json();
    const imageBase64 = data.imageBase64 || data.image || data.data;
    if (!imageBase64) {
      showError('이미지 데이터를 받지 못했어요.');
      return;
    }

    generatedImageUrl = `data:image/png;base64,${imageBase64}`;
    document.getElementById('resultImage').src = generatedImageUrl;

    const binStr = atob(imageBase64);
    const bytes = new Uint8Array(binStr.length);
    for (let i = 0; i < binStr.length; i++) bytes[i] = binStr.charCodeAt(i);
    generatedImageBlob = new Blob([bytes], { type: 'image/png' });

    if (data.creditsRemaining !== undefined) {
      updateCreditBadge(data.creditsRemaining);
    } else if (window.SESSION.member) {
      updateCreditBadge(Math.max(0, credits - 1));
    }

    document.getElementById('resultModal').classList.add('active');
  } catch (e) {
    document.getElementById('loadingModal').classList.remove('active');
    showError('네트워크 오류. 인터넷 연결을 확인해주세요.');
  }
}

// ===== 저장 =====
async function saveImage() {
  if (!generatedImageBlob) {
    showToast('저장할 이미지가 없어요');
    return;
  }
  const fileName = `HAIRO_${new Date().toISOString().slice(0, 10)}_${Date.now()}.png`;
  const file = new File([generatedImageBlob], fileName, { type: 'image/png' });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: 'HAIRO 시안' });
      showToast('저장 완료');
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
    }
  }

  const a = document.createElement('a');
  a.href = generatedImageUrl;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast('다운로드 시작');
}

function saveToGallery() {
  showToast('보관함은 다음 업데이트에서 추가됩니다');
}

function closeResultModal() {
  document.getElementById('resultModal').classList.remove('active');
  generatedImageBlob = null;
  generatedImageUrl = null;
  document.getElementById('resultImage').src = '';
}

function closeErrorModal() {
  document.getElementById('errorModal').classList.remove('active');
}

function showError(msg) {
  document.getElementById('errorText').textContent = msg;
  document.getElementById('errorModal').classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastT);
  window._toastT = setTimeout(() => t.classList.remove('show'), 2200);
}

// ===== 텍스트 영역 자동 확장 =====
const ta = document.getElementById('promptInput');
ta.addEventListener('input', () => {
  ta.style.height = 'auto';
  ta.style.height = Math.max(72, Math.min(ta.scrollHeight, 200)) + 'px';
});

// ===== Tab switching (UI only for now) =====
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
  });
});

// ===== Init =====
loadSession();
</script>
