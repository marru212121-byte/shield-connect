<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>쉴드 커넥트 어드민</title>
<style>
  *, *::before, *::after { box-sizing:border-box; }
  html, body { margin:0; padding:0; }
  body {
    font-family:-apple-system,'Apple SD Gothic Neo','Pretendard',BlinkMacSystemFont,sans-serif;
    background:#FAFAF7;
    color:#1C1917;
    -webkit-font-smoothing:antialiased;
    padding-bottom:80px;
    min-height:100vh;
  }
  button { font-family:inherit; cursor:pointer; }

  /* ───── 비밀번호 잠금 오버레이 ───── */
  #lock-overlay {
    position:fixed; inset:0;
    background:#FAFAF7;
    display:flex; align-items:center; justify-content:center;
    z-index:9999; padding:24px;
  }
  #lock-overlay.hidden { display:none; }
  .lock-card {
    width:100%; max-width:360px;
    background:#fff; border:1px solid #E6E2D8;
    border-radius:14px; padding:28px 22px;
  }
  .lock-title { font-size:18px; font-weight:600; margin:0 0 6px; }
  .lock-sub { font-size:12px; color:#888780; margin:0 0 18px; }
  .lock-input {
    width:100%; padding:12px 14px;
    border:1px solid #E6E2D8; border-radius:9px;
    font-size:15px; outline:none;
  }
  .lock-input:focus { border-color:#185FA5; }
  .lock-btn {
    width:100%; margin-top:10px; padding:12px;
    background:#1C1917; color:#fff; border:0;
    border-radius:9px; font-size:14px; font-weight:500;
  }
  .lock-error { color:#A32D2D; font-size:12px; margin-top:8px; min-height:16px; }

  /* ───── 헤더 ───── */
  .topbar {
    padding:14px 16px 12px;
    border-bottom:0.5px solid #E6E2D8;
    background:#FAFAF7;
    display:flex; justify-content:space-between; align-items:center;
    position:sticky; top:0; z-index:50;
  }
  .topbar h1 {
    font-size:17px; font-weight:500; margin:2px 0 0;
  }
  .topbar .sub { font-size:11px; color:#888780; margin:0; }
  .topbar .refresh {
    width:28px; height:28px; border-radius:50%;
    background:#F4F2EC; border:0;
    display:flex; align-items:center; justify-content:center;
    color:#888780; font-size:14px;
  }

  /* ───── 페이지 컨테이너 ───── */
  .page { display:none; padding:14px 14px 0; }
  .page.active { display:block; }

  /* ───── 섹션 라벨 ───── */
  .section-label {
    font-size:13px; color:#5F5E5A;
    margin:0 0 8px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .section-label .right {
    font-size:11px; color:#185FA5; cursor:pointer;
  }
  .section-label .right.gray { color:#888780; cursor:default; }

  /* ───── 카드 ───── */
  .card {
    background:#F4F2EC;
    border-radius:10px;
    padding:4px 12px;
    margin-bottom:14px;
  }
  .card-white {
    background:#fff;
    border:1px solid #E6E2D8;
    border-radius:10px;
    padding:14px;
    margin-bottom:14px;
  }
  .row {
    display:flex; align-items:center; gap:10px;
    padding:10px 0;
    border-bottom:0.5px solid #E6E2D8;
  }
  .row:last-child { border-bottom:0; }
  .row.clickable { cursor:pointer; }
  .row.clickable:active { background:rgba(0,0,0,0.03); }

  /* ───── 배지 (가입경로 자/카) ───── */
  .avatar {
    width:30px; height:30px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:500;
    flex-shrink:0;
  }
  .avatar.cafe24 { background:#E6F1FB; color:#185FA5; }
  .avatar.kakao  { background:#FEF3C7; color:#854F0B; }
  .avatar.naver  { background:#DCFCE7; color:#15803D; }
  .avatar.unknown { background:#F4F2EC; color:#5F5E5A; }
  .avatar.lg { width:30px; height:30px; }
  .avatar.sm { width:24px; height:24px; font-size:11px; }

  .badge {
    font-size:10px; padding:1px 6px;
    border-radius:99px; margin-left:3px;
    display:inline-block;
  }
  .badge.cafe24 { color:#185FA5; background:#E6F1FB; }
  .badge.kakao  { color:#854F0B; background:#FEF3C7; }
  .badge.naver  { color:#15803D; background:#DCFCE7; }

  /* 보너스 +1 (노랑) / 충전 +30 (초록) */
  .pill {
    font-size:11px; padding:3px 9px;
    border-radius:99px; font-weight:500;
    flex-shrink:0;
  }
  .pill.bonus  { color:#854F0B; background:#FEF3C7; }
  .pill.charge { color:#3B6D11; background:#EAF3DE; }

  /* ───── 알림 단계 (3칸) ───── */
  .alerts {
    display:grid; grid-template-columns:1fr 1fr 1fr;
    gap:6px; margin-bottom:14px;
  }
  .alert-box {
    border-radius:8px; padding:10px;
    text-align:center;
  }
  .alert-box.red    { background:#FCEBEB; color:#A32D2D; }
  .alert-box.yellow { background:#FAEEDA; color:#854F0B; }
  .alert-box.green  { background:#EAF3DE; color:#3B6D11; }
  .alert-box .label { font-size:10px; margin:0; }
  .alert-box .count { font-size:22px; font-weight:500; margin:3px 0 0; }
  .alert-box .desc  { font-size:9px; margin:2px 0 0; }

  /* ───── 흐름 총합 박스 ───── */
  .flow-box {
    background:#EAF3DE;
    border-radius:10px;
    padding:14px;
    margin-bottom:14px;
  }
  .flow-box.error { background:#FCEBEB; }
  .flow-head {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:10px;
  }
  .flow-title { font-size:12px; font-weight:500; color:#27500A; }
  .flow-pill {
    font-size:11px; padding:2px 8px;
    border-radius:99px; background:#fff;
  }
  .flow-pill.ok    { color:#3B6D11; }
  .flow-pill.error { color:#A32D2D; }
  .flow-row {
    background:#fff;
    border-radius:8px;
    padding:10px 12px;
    margin-bottom:6px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .flow-row:last-child { margin-bottom:0; }
  .flow-row p { margin:0; }
  .flow-row .p1 { font-size:11px; }
  .flow-row .p2 { font-size:14px; font-weight:500; color:#1C1917; margin-top:2px; }
  .flow-row .p1.yellow { color:#854F0B; }
  .flow-row .p1.green  { color:#3B6D11; }
  .flow-row .p1.gray   { color:#888780; }
  .flow-check { font-size:18px; color:#3B6D11; }
  .flow-x     { font-size:18px; color:#A32D2D; }

  /* ───── 클릭 펼침 ───── */
  .caret {
    display:inline-block;
    color:#888780; font-size:11px;
    transition:transform 0.2s;
  }
  .caret.open { transform:rotate(90deg); }
  .detail { display:none; padding:10px 12px; background:#fff; border-radius:8px; margin-top:8px; border:0.5px solid #E6E2D8; }
  .detail.open { display:block; }
  .detail .kv { display:flex; justify-content:space-between; font-size:11px; color:#5F5E5A; padding:3px 0; }
  .detail code, code.mono { font-family:Menlo,'SF Mono',monospace; font-size:11px; }

  /* ───── 비용 분해 박스 ───── */
  .cost-box {
    background:#EAF3DE;
    border-radius:10px;
    padding:14px;
    margin-bottom:14px;
    cursor:pointer;
  }
  .cost-head {
    display:flex; justify-content:space-between; align-items:center;
  }
  .cost-title { font-size:13px; font-weight:500; color:#27500A; }
  .cost-total {
    display:flex; align-items:center; gap:8px;
    font-size:17px; font-weight:500; color:#27500A;
  }
  .cost-group {
    margin-bottom:10px; padding-bottom:10px;
    border-bottom:0.5px solid #E6E2D8;
  }
  .cost-group:last-child { border-bottom:0; padding-bottom:0; margin-bottom:0; }
  .cost-group-head {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:6px;
  }
  .cost-group-anthropic .cost-group-title { color:#5B3F8C; font-size:11px; font-weight:500; }
  .cost-group-anthropic .cost-group-sum   { color:#5B3F8C; font-size:12px; font-weight:500; }
  .cost-group-google .cost-group-title { color:#9A6A0F; font-size:11px; font-weight:500; }
  .cost-group-google .cost-group-sum   { color:#9A6A0F; font-size:12px; font-weight:500; }
  .cost-item {
    display:flex; justify-content:space-between;
    font-size:11px; color:#5F5E5A;
    padding:3px 0;
  }
  .cost-item.zero { color:#888780; }

  /* ───── 호출 기록 행 ───── */
  .call-row {
    padding:10px 0;
    border-bottom:0.5px solid #E6E2D8;
  }
  .call-row:last-child { border-bottom:0; }
  .call-head {
    display:flex; align-items:center; gap:10px;
    cursor:pointer;
  }
  .call-dot {
    width:8px; height:8px; border-radius:50%;
    flex-shrink:0;
  }
  .call-dot.green  { background:#3B6D11; }
  .call-dot.yellow { background:#D97706; }
  .call-dot.red    { background:#A32D2D; }
  .call-info { flex:1; min-width:0; }
  .call-info p { margin:0; }
  .call-info .p1 { font-size:12px; color:#1C1917; }
  .call-info .p2 { font-size:10px; color:#888780; margin-top:1px; }
  .call-cost { font-size:11px; color:#3B6D11; font-weight:500; flex-shrink:0; }
  .call-cost.gray { color:#888780; font-weight:400; }

  /* ───── 오류 카드 ───── */
  .err-card {
    background:#FAEEDA;
    border-radius:10px;
    padding:12px;
    margin-bottom:10px;
    cursor:pointer;
  }
  .err-card.red { background:#FCEBEB; }
  .err-card.green { background:#EAF3DE; }
  .err-head {
    display:flex; align-items:center; gap:6px;
    margin-bottom:8px;
    font-size:12px; font-weight:500;
  }
  .err-card.yellow .err-head { color:#854F0B; }
  .err-card.red .err-head    { color:#A32D2D; }
  .err-card.green .err-head  { color:#27500A; }
  .err-msg-box {
    background:#fff; border-radius:6px; padding:9px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .err-msg-box p { margin:0; }
  .err-msg-box .l { font-size:10px; color:#888780; margin-bottom:2px; }
  .err-msg-box .t { font-size:11px; color:#1C1917; }

  /* ───── 회원 상세 모달 ───── */
  .modal-overlay {
    position:fixed; inset:0;
    background:rgba(0,0,0,0.4);
    z-index:200;
    display:none;
    align-items:flex-end; justify-content:center;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:#FAFAF7;
    width:100%; max-width:480px;
    max-height:90vh;
    border-radius:14px 14px 0 0;
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  .modal-head {
    background:#fff;
    padding:14px 16px;
    border-bottom:0.5px solid #E6E2D8;
    display:flex; align-items:center; gap:12px;
    flex-shrink:0;
  }
  .modal-back {
    width:30px; height:30px; border-radius:50%;
    background:#F4F2EC; border:0;
    color:#5F5E5A; font-size:18px;
  }
  .modal-id-wrap { flex:1; }
  .modal-id-label { font-size:11px; color:#888780; margin:0; }
  .modal-id { font-size:16px; font-weight:500; margin:1px 0 0; word-break:break-all; }
  .modal-body {
    overflow-y:auto;
    flex:1;
    padding:14px 16px;
    -webkit-overflow-scrolling:touch;
  }
  .modal-credit-card {
    background:#fff; border:1px solid #E6E2D8;
    border-radius:10px; padding:14px;
    margin-bottom:14px;
  }
  .modal-credit-top {
    display:flex; justify-content:space-between; align-items:flex-start;
    margin-bottom:12px;
  }
  .modal-credit-now-num {
    font-size:24px; font-weight:500; margin:2px 0 0;
  }
  .modal-credit-now-unit { font-size:13px; color:#5F5E5A; }
  .modal-credit-btns { display:flex; gap:8px; }
  .modal-credit-btn {
    flex:1; padding:8px;
    border:0; border-radius:7px;
    font-size:12px; font-weight:500;
  }
  .modal-credit-btn.plus  { background:#EAF3DE; color:#3B6D11; }
  .modal-credit-btn.minus { background:#FCEBEB; color:#A32D2D; }

  .stats-grid {
    display:grid; grid-template-columns:1fr 1fr;
    gap:6px;
    margin-bottom:14px;
  }
  .stat-cell {
    background:#F4F2EC; border-radius:8px; padding:10px;
  }
  .stat-cell .lbl { font-size:11px; margin:0; }
  .stat-cell .val { font-size:16px; font-weight:500; color:#1C1917; margin:3px 0 0; }
  .stat-cell .val.sm { font-size:13px; }
  .stat-cell .sub { font-size:10px; color:#888780; margin:2px 0 0; }

  .ledger-card { background:#F4F2EC; border-radius:10px; padding:4px 12px; margin-bottom:14px; }
  .ledger-row {
    display:flex; align-items:center; gap:10px;
    padding:9px 0;
    border-bottom:0.5px solid #E6E2D8;
  }
  .ledger-row:last-child { border-bottom:0; }
  .ledger-icon {
    width:24px; height:24px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:500;
    flex-shrink:0;
  }
  .ledger-icon.plus  { background:#EAF3DE; color:#3B6D11; }
  .ledger-icon.minus { background:#FAEEDA; color:#854F0B; }
  .ledger-icon.star  { background:#FEF3C7; color:#854F0B; font-size:11px; }
  .ledger-icon.refund { background:#E6F1FB; color:#185FA5; }
  .ledger-info { flex:1; min-width:0; }
  .ledger-info p { margin:0; }
  .ledger-info .l1 { font-size:12px; color:#1C1917; }
  .ledger-info .l2 { font-size:10px; color:#888780; margin-top:1px; }
  .ledger-amount {
    font-size:12px; font-weight:500;
    flex-shrink:0;
  }
  .ledger-amount.plus  { color:#3B6D11; }
  .ledger-amount.minus { color:#854F0B; }

  .modal-link-btn {
    width:100%; padding:11px;
    background:#fff; border:1px solid #E6E2D8;
    border-radius:10px; color:#5F5E5A;
    font-size:12px;
  }

  /* ───── 어드민 조정 다이얼로그 ───── */
  .adjust-dialog {
    position:fixed; inset:0;
    background:rgba(0,0,0,0.5);
    z-index:300;
    display:none;
    align-items:center; justify-content:center;
    padding:24px;
  }
  .adjust-dialog.open { display:flex; }
  .adjust-card {
    background:#fff; border-radius:14px;
    padding:22px;
    width:100%; max-width:360px;
  }
  .adjust-card h3 { margin:0 0 8px; font-size:16px; }
  .adjust-card label { font-size:12px; color:#5F5E5A; display:block; margin-top:12px; margin-bottom:4px; }
  .adjust-card input, .adjust-card textarea {
    width:100%; padding:10px 12px;
    border:1px solid #E6E2D8; border-radius:8px;
    font-size:13px; outline:none;
    font-family:inherit;
  }
  .adjust-card textarea { min-height:60px; resize:vertical; }
  .adjust-btns {
    display:flex; gap:8px; margin-top:14px;
  }
  .adjust-btns button {
    flex:1; padding:10px; border:0; border-radius:8px;
    font-size:13px; font-weight:500;
  }
  .adjust-btns .cancel { background:#F4F2EC; color:#5F5E5A; }
  .adjust-btns .ok { background:#1C1917; color:#fff; }

  /* ───── 더보기 페이지 검색 ───── */
  .search-bar {
    display:flex; align-items:center; gap:8px;
    background:#F4F2EC; border-radius:8px;
    padding:9px 12px; margin-bottom:10px;
  }
  .search-bar input {
    flex:1; border:0; background:transparent;
    outline:none; font-size:13px; color:#1C1917;
    font-family:inherit;
  }
  .filter-chips { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:10px; }
  .chip {
    font-size:10px; padding:4px 9px;
    border-radius:99px; cursor:pointer;
    background:#F4F2EC; color:#5F5E5A;
    border:0;
  }
  .chip.active { background:#1C1917; color:#fff; }
  .chip.green-light  { color:#3B6D11; background:#EAF3DE; }

  /* ───── 시스템 카드 ───── */
  .sys-row {
    padding:12px 0;
    border-bottom:0.5px solid #E6E2D8;
    cursor:pointer;
  }
  .sys-row:last-child { border-bottom:0; }
  .sys-head { display:flex; align-items:center; gap:8px; }
  .sys-icon { font-size:14px; }
  .sys-info { flex:1; }
  .sys-info p { margin:0; }
  .sys-info .l1 { font-size:12px; color:#1C1917; }
  .sys-info .l2 { font-size:10px; color:#888780; margin-top:1px; }
  .gauge {
    background:#F4F2EC; border-radius:6px;
    height:8px; margin:6px 0;
    overflow:hidden;
  }
  .gauge-fill {
    background:#3B6D11; height:100%;
    border-radius:6px;
    transition:width 0.3s;
  }
  .gauge-fill.warning { background:#D97706; }
  .gauge-fill.danger  { background:#A32D2D; }

  /* ───── 하단 탭바 ───── */
  .tabbar {
    position:fixed; bottom:0; left:0; right:0;
    background:#fff;
    border-top:0.5px solid #E6E2D8;
    display:flex;
    padding:8px 0 calc(8px + env(safe-area-inset-bottom));
    z-index:100;
  }
  .tab {
    flex:1; text-align:center; color:#888780;
    background:none; border:0;
    padding:4px 0;
  }
  .tab .ico { font-size:18px; }
  .tab .lbl { font-size:10px; margin-top:2px; }
  .tab.active { color:#185FA5; }

  /* ───── 토스트 ───── */
  .toast {
    position:fixed;
    bottom:90px; left:50%;
    transform:translateX(-50%);
    background:#1C1917; color:#fff;
    padding:10px 18px;
    border-radius:99px;
    font-size:13px;
    z-index:500;
    opacity:0; pointer-events:none;
    transition:opacity 0.2s;
  }
  .toast.show { opacity:1; }

  /* ───── 로딩 ───── */
  .loading { padding:24px 0; text-align:center; color:#888780; font-size:12px; }
  .empty   { padding:14px 12px; text-align:center; color:#888780; font-size:12px; background:#F4F2EC; border-radius:10px; margin-bottom:14px; }
  .err-msg { padding:14px 12px; text-align:center; color:#A32D2D; font-size:12px; background:#FCEBEB; border-radius:10px; margin-bottom:14px; }

  /* 분석 페이지 */
  .ga-card {
    background:#fff; border:1px solid #E6E2D8;
    border-radius:10px; padding:18px;
    margin-bottom:14px; text-align:center;
  }
  .ga-card h3 { margin:0 0 6px; font-size:14px; }
  .ga-card p { margin:0 0 14px; font-size:12px; color:#5F5E5A; line-height:1.5; }
  .ga-link-btn {
    display:inline-block;
    padding:10px 18px;
    background:#1C1917; color:#fff;
    border-radius:8px; text-decoration:none;
    font-size:13px; font-weight:500;
  }
</style>
</head>
<body>

<!-- ═══════ 비밀번호 잠금 오버레이 ═══════ -->
<div id="lock-overlay">
  <div class="lock-card">
    <h2 class="lock-title">쉴드 커넥트 어드민</h2>
    <p class="lock-sub">관리자 비밀번호를 입력해주세요</p>
    <form id="login-form" autocomplete="off">
      <input type="password" id="pw-input" class="lock-input" placeholder="비밀번호" autocomplete="off" autofocus />
      <button type="submit" class="lock-btn">접속</button>
      <div id="login-error" class="lock-error"></div>
    </form>
  </div>
</div>

<!-- ═══════ 헤더 ═══════ -->
<div class="topbar">
  <div>
    <p class="sub">쉴드 커넥트 어드민</p>
    <h1 id="page-title">홈</h1>
  </div>
  <button class="refresh" onclick="reloadCurrent()" title="새로고침">↻</button>
</div>

<!-- ═══════ 홈 페이지 ═══════ -->
<div id="page-home" class="page active">
  <div id="home-body"><div class="loading">불러오는 중…</div></div>
</div>

<!-- ═══════ AI 사용 페이지 ═══════ -->
<div id="page-ai" class="page">
  <div id="ai-body"><div class="loading">불러오는 중…</div></div>

<script>
// ═══════════════════════════════════════════════════════════════
// 유틸
// ═══════════════════════════════════════════════════════════════
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({
  '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
})[c]);

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// 가입 경로 판별 (자/카/네/?)
function providerOf(memberId) {
  if (!memberId) return 'unknown';
  if (memberId.endsWith('@k')) return 'kakao';
  if (memberId.endsWith('@n')) return 'naver';
  return 'cafe24';
}
function providerLabel(provider) {
  if (provider === 'kakao') return '카';
  if (provider === 'naver') return '네';
  if (provider === 'cafe24') return '자';
  return '?';
}
function providerName(provider) {
  if (provider === 'kakao') return '카카오';
  if (provider === 'naver') return '네이버';
  if (provider === 'cafe24') return '자사몰';
  return '미상';
}

// 상대 시간 표시
function relativeTime(iso) {
  if (!iso) return '—';
  const t = new Date(iso).getTime();
  const now = Date.now();
  const diffSec = Math.floor((now - t) / 1000);
  if (diffSec < 60) return '방금';
  if (diffSec < 3600) return Math.floor(diffSec / 60) + '분 전';
  if (diffSec < 86400) return Math.floor(diffSec / 3600) + '시간 전';
  if (diffSec < 86400 * 2) {
    const d = new Date(iso);
    return '어제 ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }
  if (diffSec < 86400 * 7) {
    const d = new Date(iso);
    return (d.getMonth()+1) + '/' + d.getDate() + ' ' +
           String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }
  const d = new Date(iso);
  return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0') +
         ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function fmtWon(n) {
  return '₩' + (n ?? 0).toLocaleString('ko-KR');
}

// 아바타 + 풀ID 렌더
function avatarHtml(memberId, provider) {
  return '<div class="avatar ' + provider + '">' + providerLabel(provider) + '</div>';
}

// v3: 4관문 점 렌더
function renderGate(label, passed) {
  if (passed) {
    return '<span style="color:#3B6D11">✓ ' + label + '</span>';
  }
  return '<span style="color:#A32D2D">✗ ' + label + '</span>';
}

// v3: 4관문 비정상일 때 안내 메시지
function gateGuideMsg(g) {
  if (!g.webhook) return '카페24 웹훅이 안 왔어요. 카페24 개발자센터 → 웹훅 설정 확인.';
  if (!g.member) return '비회원(게스트) 결제예요. 카페24에서 주문 보고 회원 확인 → 어드민에서 수동 +30.';
  if (!g.mapping) return '상품 #15 매핑이 비활성화됐어요. product_credits 테이블 확인 필요.';
  if (!g.ledger) return 'DB 적립 행이 없어요. 매우 드문 경우. 슈파베이스 직접 확인.';
  return '문제가 감지됐어요. 회원 상세에서 확인해주세요.';
}

// 펼침 토글
// v6.3: btn.parentElement → btn 변경
//   이유: sys-row/err-card처럼 같은 부모 안에 형제가 여러 개일 때
//         parentElement.querySelector는 항상 첫 번째 .detail만 찾아 다른 항목 펼침 실패
//   동작: btn 자체 안에 .detail 있으면 우선 (sys-row, err-card, cost-box)
//         없으면 형제 (call-head → call-row의 detail)
function toggleDetail(btn) {
  const detail = btn.querySelector('.detail') || btn.nextElementSibling;
  const caret = btn.querySelector('.caret');
  if (detail) detail.classList.toggle('open');
  if (caret) caret.classList.toggle('open');
}

// ═══════════════════════════════════════════════════════════════
// 비밀번호 잠금
// ═══════════════════════════════════════════════════════════════
$('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pw = $('pw-input').value;
  const errEl = $('login-error');
  errEl.textContent = '';

  try {
    const res = await fetch('/api/admin/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw }),
      credentials:'same-origin',
    });
    if (res.ok) {
      $('lock-overlay').classList.add('hidden');
      bootstrap();
    } else if (res.status === 401) {
      errEl.textContent = '비밀번호가 틀렸어요.';
    } else if (res.status === 500) {
      errEl.textContent = '서버 설정 오류. Vercel 환경변수 확인 필요.';
    } else {
      errEl.textContent = '오류 (' + res.status + ')';
    }
  } catch (err) {
    errEl.textContent = '연결 실패. 다시 시도해주세요.';
  }
});

// 페이지 진입 시 이미 인증돼 있으면 자동 진입
(async function checkAuth() {
  try {
    const res = await fetch('/api/admin/overview', { credentials:'same-origin' });
    if (res.ok) {
      $('lock-overlay').classList.add('hidden');
      bootstrap();
    }
  } catch (_) {}
})();

// ═══════════════════════════════════════════════════════════════
// 탭 전환
// ═══════════════════════════════════════════════════════════════
let currentTab = 'home';

function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === name);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  $('page-' + name).classList.add('active');
  $('page-title').textContent =
    name === 'home' ? '홈' :
    name === 'ai' ? 'AI 사용' :
    name === 'analytics' ? '분석' :
    '더보기';
  if (name === 'home') loadHome();
  else if (name === 'ai') loadAi();
  else if (name === 'analytics') loadAnalytics();
  else if (name === 'more') loadMore();
}

function reloadCurrent() {
  if (currentTab === 'home') loadHome();
  else if (currentTab === 'ai') loadAi();
  else if (currentTab === 'analytics') loadAnalytics();
  else if (currentTab === 'more') loadMore();
}

// ═══════════════════════════════════════════════════════════════
// 분석 탭 — 기능 사용 분석
// ═══════════════════════════════════════════════════════════════
let analyticsRange = 'week';

async function loadAnalytics() {
  const box = $('analytics-body');
  box.innerHTML = '<div class="loading">불러오는 중…</div>';
  try {
    const res = await fetch('/api/admin/analytics?range=' + analyticsRange, { credentials:'same-origin' });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    box.innerHTML = renderAnalytics(data);
  } catch (err) {
    box.innerHTML = '<div class="err-msg">불러오기 실패: ' + esc(String(err.message || err)) + '</div>';
  }
}

function setAnalyticsRange(r) {
  analyticsRange = r;
  loadAnalytics();
}

// 사진 크게 보기 (간단 라이트박스)
function openPhotoViewer(url) {
  let ov = document.getElementById('photo-viewer');
  if (!ov) {
    ov = document.createElement('div');
    ov.id = 'photo-viewer';
    ov.style.cssText = 'position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.88); display:flex; align-items:center; justify-content:center; padding:20px;';
    ov.onclick = function(){ ov.style.display = 'none'; };
    ov.innerHTML = '<img id="photo-viewer-img" style="max-width:100%; max-height:100%; border-radius:8px;" />';
    document.body.appendChild(ov);
  }
  document.getElementById('photo-viewer-img').src = url;
  ov.style.display = 'flex';
}

function renderAnalytics(d) {
  const RANGE_LABEL = { today:'오늘', week:'이번 주', month:'이번 달' };
  const BAR_COLORS = ['#639922','#1D9E75','#378ADD','#854F0B','#888780','#888780','#888780','#888780','#888780'];
  let html = '';

  // 요약 카드 2개
  html += '<div class="stats-grid" style="margin-bottom:14px;">';
  html += '<div class="stat-cell"><p class="lbl">' + RANGE_LABEL[d.range] + ' 기능 사용</p><p class="val">' + (d.summary.total_hits||0) + ' <span style="font-size:13px;color:#888780">회</span></p></div>';
  html += '<div class="stat-cell"><p class="lbl">활동한 사람</p><p class="val">' + (d.summary.actors||0) + ' <span style="font-size:13px;color:#888780">명</span></p></div>';
  html += '</div>';

  // 기간 토글
  html += '<div style="display:flex; gap:6px; margin-bottom:16px;">';
  ['today','week','month'].forEach(function(r){
    const on = d.range === r;
    html += '<button onclick="setAnalyticsRange(\'' + r + '\')" style="flex:1; font-size:12px; padding:7px 0; border-radius:8px; border:1px solid ' + (on?'#185FA5':'#E5E3DC') + '; background:' + (on?'#E6F1FB':'#fff') + '; color:' + (on?'#185FA5':'#5F5E5A') + ';">' + RANGE_LABEL[r] + '</button>';
  });
  html += '</div>';

  // 인기 메뉴 순위
  html += '<p class="section-label"><span>인기 기능 순위</span></p>';
  if (!d.ranking || d.ranking.length === 0) {
    html += '<div class="empty">아직 기록이 없어요. 디자이너가 메뉴를 사용하면 쌓입니다.</div>';
  } else {
    html += '<div class="ledger-card" style="padding:14px;">';
    d.ranking.forEach(function(item, i){
      const pct = d.max_count ? Math.round(item.count / d.max_count * 100) : 0;
      const color = BAR_COLORS[i] || '#888780';
      html += '<div style="margin-bottom:' + (i === d.ranking.length-1 ? '0' : '11px') + ';">';
      html += '<div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px;">';
      html += '<span><span style="color:#B4B2A9; margin-right:6px;">' + (i+1) + '</span>' + esc(item.label) + '</span>';
      html += '<span style="color:#5F5E5A;">' + item.count + '</span></div>';
      html += '<div style="background:#F1EFE8; border-radius:99px; height:7px; overflow:hidden;"><div style="width:' + pct + '%; height:100%; background:' + color + '; border-radius:99px;"></div></div>';
      html += '</div>';
    });
    html += '</div>';
  }

  // 회원 vs 비회원
  const ms = d.member_split || {};
  html += '<p class="section-label">회원 vs 비회원</p>';
  html += '<div class="ledger-card" style="padding:14px;">';
  html += '<div style="display:flex; height:26px; border-radius:8px; overflow:hidden; margin-bottom:8px;">';
  html += '<div style="width:' + (ms.member_pct||0) + '%; background:#378ADD; display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px; min-width:fit-content; padding:0 4px;">회원 ' + (ms.member_pct||0) + '%</div>';
  html += '<div style="width:' + (ms.guest_pct||0) + '%; background:#B4B2A9; display:flex; align-items:center; justify-content:center; color:#2C2C2A; font-size:11px; min-width:fit-content; padding:0 4px;">비회원 ' + (ms.guest_pct||0) + '%</div>';
  html += '</div>';
  html += '<p style="font-size:11px; color:#888780; margin:0;">회원 ' + (ms.member||0) + '회 · 비회원 ' + (ms.guest||0) + '회</p>';
  html += '</div>';

  // 회원별 사용 (탭하면 상세)
  html += '<p class="section-label">회원별 사용 (탭하면 상세)</p>';
  if (!d.top_members || d.top_members.length === 0) {
    html += '<div class="empty">회원 활동 기록 없음</div>';
  } else {
    html += '<div class="ledger-card" style="padding:0;">';
    d.top_members.forEach(function(m, i){
      const last = i === d.top_members.length-1;
      html += '<div onclick="openMember(\'' + esc(m.member_id) + '\')" style="display:flex; justify-content:space-between; align-items:center; padding:12px 14px; cursor:pointer;' + (last?'':' border-bottom:1px solid #F1EFE8;') + '">';
      html += '<div><p style="font-size:13px; margin:0; font-family:Menlo,monospace;">' + esc(m.member_id) + '</p>';
      html += '<p style="font-size:11px; color:#888780; margin:2px 0 0;">주로: ' + esc(m.top_feature || '-') + '</p></div>';
      html += '<span style="font-size:13px; color:#5F5E5A;">' + m.count + '회 ›</span>';
      html += '</div>';
    });
    html += '</div>';
  }

  return html;
}

function bootstrap() {
  loadHome();
}

// ═══════════════════════════════════════════════════════════════
// 홈 페이지
// ═══════════════════════════════════════════════════════════════
async function loadHome() {
  const body = $('home-body');
  body.innerHTML = '<div class="loading">불러오는 중…</div>';
  try {
    const res = await fetch('/api/admin/overview', { credentials:'same-origin' });
    if (!res.ok) {
      if (res.status === 401) { showLock(); return; }
      throw new Error(res.status);
    }
    const data = await res.json();
    body.innerHTML = renderHome(data);
  } catch (err) {
    body.innerHTML = '<div class="err-msg">불러오기 실패: ' + esc(err.message) + '</div>';
  }
}

function showLock() {
  $('lock-overlay').classList.remove('hidden');
  $('pw-input').focus();
}

function renderHome(d) {
  let html = '';

  // 1. 오늘 가입 (보너스 +1)
  const totalSignups = d.today.signups || 0;
  html += '<p class="section-label"><span>오늘 가입 · <span style="color:#854F0B">보너스 +1 크레딧</span></span>';
  html += totalSignups > 3
    ? '<span class="right" onclick="switchTab(\'more\')">전체 ' + totalSignups + '명 ↗</span>'
    : '<span class="right gray">총 ' + totalSignups + '명</span>';
  html += '</p>';

  if (totalSignups === 0) {
    html += '<div class="empty">오늘 가입한 회원이 없어요.</div>';
  } else {
    html += '<div class="card">';
    for (const s of d.recent_signups) {
      html += '<div class="row clickable" onclick="openMember(\'' + esc(s.member_id) + '\')">';
      html += avatarHtml(s.member_id, s.provider);
      html += '<div style="flex:1; min-width:0">';
      html += '<p style="font-size:13px; color:#1C1917; margin:0; word-break:break-all">' + esc(s.member_id) + '</p>';
      html += '<p style="font-size:11px; color:#888780; margin:1px 0 0">' + relativeTime(s.created_at) + '</p>';
      html += '</div>';
      html += '<span class="pill bonus">보너스 +' + (s.amount || 1) + '</span>';
      html += '</div>';
    }
    html += '</div>';
  }

  // 2. 최근 결제 (충전 +30)
  const totalPay = d.today.payments || 0;
  html += '<p class="section-label"><span>최근 결제 · <span style="color:#3B6D11">충전 +30 크레딧</span></span>';
  html += totalPay > 3
    ? '<span class="right" onclick="switchTab(\'more\')">전체 ' + totalPay + '건 ↗</span>'
    : '<span class="right gray">총 ' + totalPay + '건</span>';
  html += '</p>';

  if (totalPay === 0) {
    html += '<div class="empty">오늘 결제가 없어요.</div>';
  } else {
    html += '<div class="card">';
    for (const p of d.recent_payments) {
      // v3: 4관문 표시 — gates 필드가 있으면 표시, 없으면 (구버전) 기본 ✓ 처리
      const gates = p.gates || { webhook:true, member:true, mapping:true, ledger:true };
      const gatesPassed = p.gates_passed != null ? p.gates_passed : 4;
      const isAllPass = gatesPassed === 4;

      // 결제 행 컨테이너 (4관문 줄 포함)
      html += '<div class="clickable" onclick="openMember(\'' + esc(p.member_id) + '\')" style="padding:10px 0; border-bottom:0.5px solid #E6E2D8; cursor:pointer;' + (!isAllPass ? ' background:#FCEBEB; border-radius:8px; padding:10px;' : '') + '">';

      // 상단: 회원ID, 시각, 주문번호, 금액, +30
      html += '<div style="display:flex; align-items:center; gap:10px;">';
      html += avatarHtml(p.member_id, p.provider);
      html += '<div style="flex:1; min-width:0">';
      html += '<p style="font-size:13px; color:#1C1917; margin:0; word-break:break-all">' + esc(p.member_id) + '</p>';
      html += '<p style="font-size:11px; color:#888780; margin:1px 0 0">' + relativeTime(p.created_at);
      if (p.order_id) html += ' · 주문 #' + esc(String(p.order_id).slice(-6));
      html += '</p>';
      html += '</div>';
      html += '<div style="text-align:right">';
      html += '<p style="font-size:13px; color:#1C1917; margin:0">' + fmtWon(p.revenue) + '</p>';
      html += '<p style="font-size:11px; color:' + (isAllPass ? '#3B6D11' : '#A32D2D') + '; margin:1px 0 0; font-weight:500">';
      html += isAllPass ? ('+' + (p.amount || 30)) : '문제';
      html += '</p>';
      html += '</div>';
      html += '</div>';

      // 4관문 줄
      html += '<div style="margin-top:8px; padding-top:8px; border-top:0.5px solid #E6E2D8; display:flex; align-items:center; gap:8px; font-size:11px; flex-wrap:wrap;">';
      html += '<span style="background:' + (isAllPass ? '#EAF3DE' : '#FCEBEB') + '; color:' + (isAllPass ? '#3B6D11' : '#A32D2D') + '; padding:2px 8px; border-radius:99px; font-weight:500;">' + gatesPassed + '/4</span>';
      html += renderGate('웹훅', gates.webhook);
      html += renderGate('회원', gates.member);
      html += renderGate('매핑', gates.mapping);
      html += renderGate('적립', gates.ledger);
      html += '</div>';

      // 비정상이면 안내문
      if (!isAllPass) {
        html += '<div style="margin-top:8px; padding:8px 10px; background:#fff; border-radius:6px;">';
        html += '<p style="font-size:11px; color:#A32D2D; margin:0; line-height:1.5">' + gateGuideMsg(gates) + '</p>';
        html += '</div>';
      }

      html += '</div>';
    }
    html += '</div>';
  }

  // 3. 오늘 AI 사용
  const ai = d.today.ai_calls;
  const alertSum = (ai.alert_counts.critical || 0) + (ai.alert_counts.warning || 0);
  html += '<p class="section-label"><span>오늘 AI 사용</span>';
  html += '<span class="right" onclick="switchTab(\'ai\')">상세 ↗</span></p>';
  html += '<div class="card" style="background:#F4F2EC; padding:12px;">';
  html += '<div style="display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:0.5px solid #E6E2D8">';
  html += '<span style="font-size:13px; color:#1C1917">컬러 + 컷 분석 (Gemini)</span>';
  html += '<span style="font-size:12px; color:#5F5E5A">성공 ' + (ai.sonnet.success || 0) + ' / ' + (ai.sonnet.total || 0) + '</span>';
  html += '</div>';
  html += '<div style="display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:0.5px solid #E6E2D8">';
  html += '<span style="font-size:13px; color:#1C1917">HAIRO 사진 (나노바나나)</span>';
  html += '<span style="font-size:12px; color:#5F5E5A">성공 ' + (ai.nanobanana.success || 0) + ' / ' + (ai.nanobanana.total || 0) + '</span>';
  html += '</div>';
  html += '<div style="display:flex; justify-content:space-between; align-items:center; padding:6px 0">';
  if (alertSum === 0) {
    html += '<span style="font-size:13px; color:#3B6D11">🟢 정상 · 🔴 0 · 🟡 0</span>';
    html += '<span style="font-size:11px; color:#3B6D11; font-weight:500">평화</span>';
  } else {
    const color = ai.alert_counts.critical > 0 ? '#A32D2D' : '#854F0B';
    html += '<span style="font-size:13px; color:' + color + '">🔴 ' + ai.alert_counts.critical + ' · 🟡 ' + ai.alert_counts.warning + '</span>';
    html += '<span style="font-size:11px; color:' + color + '; font-weight:500">확인 필요</span>';
  }
  html += '</div></div>';

  // 4. 오늘 흐름 · 총합 (맨 아래)
  const fs = d.flow_summary;
  const isErr = fs.mismatch_count > 0;
  html += '<div class="flow-box ' + (isErr ? 'error' : '') + '">';
  html += '<div class="flow-head">';
  html += '<span class="flow-title" style="' + (isErr ? 'color:#A32D2D' : '') + '">오늘 흐름 · 총합</span>';
  if (isErr) {
    html += '<span class="flow-pill error">불일치 ' + fs.mismatch_count + '건</span>';
  } else {
    html += '<span class="flow-pill ok">불일치 0건</span>';
  }
  html += '</div>';

  // 보너스
  html += '<div class="flow-row">';
  html += '<div>';
  html += '<p class="p1 yellow">보너스 +1 (신규 가입)</p>';
  html += '<p class="p2">' + fs.bonus.signups + '명 · ' + fs.bonus.credits_actual + '크레딧 지급</p>';
  html += '</div>';
  html += '<span class="' + (fs.bonus.ok ? 'flow-check' : 'flow-x') + '">' + (fs.bonus.ok ? '✓' : '✗') + '</span>';
  html += '</div>';

  // 충전
  html += '<div class="flow-row">';
  html += '<div>';
  html += '<p class="p1 green">충전 +30 (결제)</p>';
  html += '<p class="p2">' + fs.charge.payments + '건 · ' + fs.charge.credits_actual + '크레딧 · ' + fmtWon(fs.charge.revenue) + '</p>';
  html += '</div>';
  html += '<span class="' + (fs.charge.ok ? 'flow-check' : 'flow-x') + '">' + (fs.charge.ok ? '✓' : '✗') + '</span>';
  html += '</div>';

  // 웹훅
  html += '<div class="flow-row">';
  html += '<div>';
  html += '<p class="p1 gray">웹훅 수신 24h</p>';
  html += '<p class="p2">' + fs.webhook.last_24h + '건';
  if (fs.webhook.last_received) html += ' · 마지막 ' + relativeTime(fs.webhook.last_received);
  html += '</p>';
  html += '</div>';
  html += '<span class="' + (fs.webhook.ok ? 'flow-check' : 'flow-x') + '">' + (fs.webhook.ok ? '✓' : '✗') + '</span>';
  html += '</div>';

  html += '</div>';

  return html;
}

async function loadAi() {
  const body = $('ai-body');
  body.innerHTML = '<div class="loading">불러오는 중…</div>';
  try {
    const res = await fetch('/api/admin/ai-logs?limit=20', { credentials:'same-origin' });
    if (!res.ok) {
      if (res.status === 401) { showLock(); return; }
      throw new Error(res.status);
    }
    const data = await res.json();
    body.innerHTML = renderAi(data);
    loadActivity();
  } catch (err) {
    body.innerHTML = '<div class="err-msg">불러오기 실패: ' + esc(err.message) + '</div>';
  }
}

// ═══════════════════════════════════════════════════════════════
// 실시간 활동 흐름 (유료 + 무료 합침)
// ═══════════════════════════════════════════════════════════════
let activityFilter = 'all';

async function loadActivity() {
  const feed = $('activity-feed');
  if (!feed) return;
  feed.innerHTML = '<div class="loading">불러오는 중…</div>';
  try {
    const res = await fetch('/api/admin/activity?filter=' + activityFilter + '&limit=80', { credentials:'same-origin' });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    feed.innerHTML = renderActivityFeed(data);
  } catch (err) {
    feed.innerHTML = '<div class="err-msg">활동 불러오기 실패: ' + esc(String(err.message || err)) + '</div>';
  }
}

function setActivityFilter(f) {
  activityFilter = f;
  ['all','paid','free'].forEach(function(k){
    const b = $('actf-' + k);
    if (!b) return;
    const on = (k === f);
    b.style.border = '1px solid ' + (on ? '#185FA5' : '#E5E3DC');
    b.style.background = on ? '#E6F1FB' : '#fff';
    b.style.color = on ? '#185FA5' : '#5F5E5A';
  });
  loadActivity();
}

function renderActivityFeed(d) {
  const items = d.items || [];
  if (items.length === 0) {
    return '<div class="empty">아직 활동 기록이 없어요.</div>';
  }
  const PROVIDER_KO = { kakao:'카카오', naver:'네이버', cafe24:'자사몰', guest:'비회원' };
  let html = '<div class="card" style="padding:0;">';
  items.forEach(function(it, i){
    const last = i === items.length - 1;
    const isPaid = it.kind === 'paid';
    const ok = it.status === 'success';
    const dot = ok ? '#639922' : (it.alert_level === 'critical' ? '#E24B4A' : '#EF9F27');
    const when = relativeTime(it.created_at);
    const prov = PROVIDER_KO[it.provider] || '';
    const tag = isPaid
      ? '<span style="font-size:10px; color:#854F0B; background:#FAEEDA; padding:1px 6px; border-radius:5px; margin-left:6px;">유료</span>'
      : '<span style="font-size:10px; color:#5F5E5A; background:#F1EFE8; padding:1px 6px; border-radius:5px; margin-left:6px;">무료</span>';

    const isGuest = it.provider === 'guest' || String(it.member_id||'').startsWith('anon_');
    const clickAttr = isGuest ? '' : ' onclick="openMember(\'' + esc(it.member_id || '') + '\')"';
    const cursorStyle = isGuest ? '' : ' cursor:pointer;';
    html += '<div' + clickAttr + ' style="display:flex; align-items:flex-start; gap:10px; padding:11px 14px;' + cursorStyle + (last?'':' border-bottom:1px solid #F1EFE8;') + '">';
    html += '<div style="width:8px; height:8px; border-radius:50%; background:' + dot + '; margin-top:5px; flex-shrink:0;"></div>';
    html += '<div style="flex:1; min-width:0;">';
    html += '<p style="font-size:13px; margin:0; color:#1C1917;">' + esc(it.label) + tag + '</p>';
    html += '<p style="font-size:11px; color:#888780; margin:2px 0 0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">' + esc(it.member_id || '') + ' · ' + prov + ' · ' + when;
    if (isPaid && !ok) {
      html += ' · <span style="color:#A32D2D;">실패</span>';
    }
    html += '</p>';
    // 유료 실패면 회원에게 뜬 문구를 작게
    if (isPaid && !ok && it.user_message) {
      html += '<p style="font-size:11px; color:#A32D2D; margin:4px 0 0; background:#FCEBEB; padding:4px 8px; border-radius:6px;">' + esc(it.user_message) + '</p>';
    }
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';
  html += '<p style="font-size:10px; color:#B4B2A9; margin:8px 0 14px; text-align:center;">최근 ' + items.length + '건 · 위에서부터 최신순</p>';
  return html;
}

  html += '<button id="actf-paid" onclick="setActivityFilter(\'paid\')" style="flex:1; font-size:12px; padding:7px 0; border-radius:8px; border:1px solid #E5E3DC; background:#fff; color:#5F5E5A;">유료만</button>';

}

function renderCallRow(log) {
  const ko = log._ko || {};
  const provider = ko.provider || providerOf(log.member_id);
  const dot = log.status === 'success' ? 'green' :
              log.alert_level === 'critical' ? 'red' : 'yellow';
  const dur = log.duration_ms ? (log.duration_ms / 1000).toFixed(1) + '초' : '';
  const modelName = ko.model_ko || log.model || '';
  const stageName = ko.stage_ko || log.stage || '';

  let html = '<div class="call-row">';
  html += '<div class="call-head" onclick="toggleDetail(this)">';
  html += '<div class="call-dot ' + dot + '"></div>';
  html += '<div class="call-info">';
  html += '<p class="p1">' + esc(stageName) + ' <span style="color:#888780; font-size:10px">· ' + esc(log.member_id || '?') + '</span></p>';
  html += '<p class="p2">' + relativeTime(log.created_at);
  if (modelName) html += ' · ' + esc(modelName);
  if (dur) html += ' · ' + dur;
  html += ' · ' + (log.status === 'success' ? '성공' : esc(ko.reason_ko || '실패'));
  html += '</p>';
  html += '</div>';
  if (ko.cost_krw_estimate) {
    html += '<span class="call-cost">' + fmtWon(ko.cost_krw_estimate).replace('₩','~₩') + '</span>';
  } else {
    html += '<span class="call-cost gray">—</span>';
  }
  html += '<span class="caret">▶</span>';
  html += '</div>';

  // 펼침 상세
  html += '<div class="detail">';
  if (log.route) html += '<div class="kv"><span>route</span><code class="mono">' + esc(log.route) + '</code></div>';
  if (log.stage) html += '<div class="kv"><span>stage</span><code class="mono">' + esc(log.stage) + '</code></div>';
  if (log.prompt_length) html += '<div class="kv"><span>프롬프트 길이</span><span>' + log.prompt_length + '자</span></div>';
  html += '<div class="kv"><span>회원ID</span><span style="word-break:break-all">' + esc(log.member_id || '?') + '</span></div>';
  html += '<div class="kv"><span>가입 경로</span><span>' + providerName(provider) + '</span></div>';
  html += '<button onclick="event.stopPropagation(); openMember(\'' + esc(log.member_id) + '\')" class="modal-link-btn" style="margin-top:8px">회원 상세 보기 ↗</button>';
  html += '</div>';

  html += '</div>';
  return html;
}

function renderErrorCard(log) {
  const ko = log._ko || {};
  const level = log.alert_level || 'info';
  const colorClass = level === 'critical' ? 'red' : level === 'warning' ? 'yellow' : 'green';
  const icon = level === 'critical' ? '🔴' : level === 'warning' ? '🟡' : '🟢';
  const levelKr = level === 'critical' ? '긴급' : level === 'warning' ? '주의' : '정상';

  let html = '<div class="err-card ' + colorClass + '" onclick="toggleDetail(this)">';
  html += '<div class="err-head">';
  html += '<span>' + icon + '</span>';
  html += '<span style="flex:1">' + esc(ko.reason_ko || log.internal_reason || '오류') + ' · ' + esc(log.member_id || '?') + ' · ' + relativeTime(log.created_at) + '</span>';
  html += '</div>';
  html += '<div class="err-msg-box">';
  html += '<div style="flex:1; min-width:0">';
  html += '<p class="l">디자이너가 본 메시지</p>';
  html += '<p class="t">' + esc(log.user_message || '(메시지 없음)') + '</p>';
  html += '</div>';
  html += '<span class="caret">▶</span>';
  html += '</div>';

  html += '<div class="detail" style="margin-top:6px">';
  html += '<div style="margin-bottom:8px">';
  html += '<p style="font-size:10px; color:#888780; margin:0 0 2px">실제 분류 (internal_reason)</p>';
  html += '<code class="mono" style="color:#1C1917">' + esc(log.internal_reason || '—') + (log.error_code ? ' · HTTP ' + esc(log.error_code) : '') + '</code>';
  html += '</div>';
  if (ko.reason_detail) {
    html += '<div style="background:#FAFAF7; border-radius:6px; padding:8px; margin-bottom:8px">';
    html += '<p style="font-size:10px; color:#888780; margin:0 0 3px">진짜 원인</p>';
    html += '<p style="font-size:11px; color:#1C1917; margin:0; line-height:1.5">' + esc(ko.reason_detail) + '</p>';
    html += '</div>';
  }
  if (log.raw_error) {
    html += '<div style="background:#FAFAF7; border-radius:6px; padding:8px; margin-bottom:8px">';
    html += '<p style="font-size:10px; color:#888780; margin:0 0 3px">영어 원문</p>';
    html += '<code class="mono" style="color:#5F5E5A; font-size:10px; word-break:break-all">' + esc(String(log.raw_error).slice(0, 300)) + '</code>';
    html += '</div>';
  }
  html += '<div style="display:flex; gap:14px; font-size:10px; color:#888780; padding-top:8px; border-top:0.5px solid #E6E2D8">';
  html += '<span>알림 단계: ' + icon + ' ' + levelKr + '</span>';
  html += '</div>';
  html += '<button onclick="event.stopPropagation(); openMember(\'' + esc(log.member_id) + '\')" class="modal-link-btn" style="margin-top:8px">회원 상세 보기 ↗</button>';
  html += '</div>';

  html += '</div>';
  return html;
}

// ═══════════════════════════════════════════════════════════════
// 더보기 페이지 (회원 검색 + 결제 내역 + 시스템)
// ═══════════════════════════════════════════════════════════════
let moreSearchTerm = '';
let moreFilter = 'all';

async function loadMore() {
  const body = $('more-body');
  body.innerHTML = '<div class="loading">불러오는 중…</div>';
  try {
    const [mRes, pRes, sRes] = await Promise.all([
      fetch('/api/admin/members?filter=' + encodeURIComponent(moreFilter) + '&search=' + encodeURIComponent(moreSearchTerm), { credentials:'same-origin' }),
      fetch('/api/admin/payments', { credentials:'same-origin' }),
      fetch('/api/admin/system', { credentials:'same-origin' }),
    ]);
    if (!mRes.ok || !pRes.ok || !sRes.ok) {
      if (mRes.status === 401) { showLock(); return; }
      throw new Error('API 오류');
    }
    const members = await mRes.json();
    const payments = await pRes.json();
    const system = await sRes.json();
    body.innerHTML = renderMore(members, payments, system);

    body.innerHTML = '<div class="err-msg">불러오기 실패: ' + esc(err.message) + '</div>';

}

// ═══════════════════════════════════════════════════════════════
// 분석 결과 본문 렌더 — JSON이면 예쁘게(스와치 포함), 아니면 글자 그대로
function renderAnalysisBody(raw) {
  const plain = '<pre style="white-space:pre-wrap; word-break:break-word; font-family:inherit; font-size:12px; line-height:1.6; color:#3D3D3A; background:#F8F7F3; border-radius:8px; padding:12px; margin:0;">' + esc(raw) + '</pre>';
  let obj = null;
  try {
    const t = String(raw).trim();
    if (t.startsWith('{') || t.startsWith('[')) obj = JSON.parse(t);
  } catch (e) { obj = null; }
  if (!obj || typeof obj !== 'object') return plain;

  let h = '<div style="background:#F8F7F3; border-radius:8px; padding:12px;">';

  // 색 스와치 (hex 있을 때)
  const hex = obj.hex || obj.color_hex || obj.swatch;
  if (hex && /^#?[0-9a-fA-F]{6}$/.test(String(hex).replace('#',''))) {
    const hx = String(hex).startsWith('#') ? hex : ('#' + hex);
    h += '<div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">';
    h += '<div style="width:44px; height:44px; border-radius:8px; border:1px solid rgba(0,0,0,0.1); background:' + esc(hx) + '; flex-shrink:0;"></div>';
    h += '<div>';
    if (obj.color_name_ko || obj.color_name) h += '<p style="font-size:14px; margin:0; color:#1C1917; font-weight:500;">' + esc(obj.color_name_ko || obj.color_name) + '</p>';
    h += '<p style="font-size:12px; color:#888780; margin:2px 0 0;">' + esc(hx) + (obj.tone ? ' · ' + esc(obj.tone) : '') + '</p>';
    h += '</div></div>';
  } else if (obj.color_name_ko || obj.color_name) {
    h += '<p style="font-size:14px; margin:0 0 8px; color:#1C1917; font-weight:500;">' + esc(obj.color_name_ko || obj.color_name) + (obj.tone ? ' <span style="font-size:12px; color:#888780;">· ' + esc(obj.tone) + '</span>' : '') + '</p>';
  }

  // elements (배열) → 작은 칩
  if (Array.isArray(obj.elements) && obj.elements.length) {
    h += '<div style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px;">';
    obj.elements.forEach(function(e){
      h += '<span style="font-size:11px; color:#5F5E5A; background:#EDEBE3; padding:3px 9px; border-radius:12px;">' + esc(String(e)) + '</span>';
    });
    h += '</div>';
  }

  // 나머지 텍스트 필드들 (description, recipe, steps 등)
  const LABELS = { description:'설명', recipe:'레시피', recipe_text:'레시피', steps:'스텝', reasoning:'사고 흐름', thinking:'사고 흐름', summary:'요약', note:'메모', advice:'조언' };
  const SKIP = { hex:1, color_hex:1, swatch:1, color_name_ko:1, color_name:1, tone:1, elements:1 };
  Object.keys(obj).forEach(function(k){
    if (SKIP[k]) return;
    let v = obj[k];
    if (v == null || v === '') return;
    if (Array.isArray(v)) v = v.map(function(x){ return typeof x === 'object' ? JSON.stringify(x) : String(x); }).join('\n· ');
    else if (typeof v === 'object') v = JSON.stringify(v, null, 2);
    const label = LABELS[k] || k;
    h += '<div style="margin-bottom:8px;">';
    h += '<p style="font-size:11px; color:#185FA5; margin:0 0 2px; font-weight:500;">' + esc(label) + '</p>';
    h += '<p style="font-size:12px; color:#3D3D3A; margin:0; line-height:1.6; white-space:pre-wrap; word-break:break-word;">' + esc(String(v)) + '</p>';
    h += '</div>';
  });

  h += '</div>';
  return h;
}

// 분석 내용 펼치기/접기
function toggleAnalysis(id, head) {
  const el = document.getElementById(id);
  if (!el) return;
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : 'block';
  const caret = head.querySelector('span');
  if (caret) caret.textContent = open ? '펼치기 ▾' : '접기 ▴';
}

let modalMemberId = null;

async function openMember(memberId) {
  if (!memberId) return;
  modalMemberId = memberId;
  $('modal-member-id').textContent = memberId;
  const provider = providerOf(memberId);
  $('modal-provider-badge').innerHTML = '<span class="badge ' + provider + '">' + providerName(provider) + '</span>';
  $('member-modal').classList.add('open');
  $('modal-body').innerHTML = '<div class="loading">불러오는 중…</div>';

  try {
    const res = await fetch('/api/admin/member-detail?id=' + encodeURIComponent(memberId), { credentials:'same-origin' });
    if (!res.ok) {
      if (res.status === 404) {
        $('modal-body').innerHTML = '<div class="err-msg">회원 정보를 찾을 수 없어요.</div>';
        return;
      }
      throw new Error(res.status);
    }
    const data = await res.json();
    $('modal-body').innerHTML = renderMemberDetail(data);
  } catch (err) {
    $('modal-body').innerHTML = '<div class="err-msg">불러오기 실패: ' + esc(err.message) + '</div>';
  }
}

  $('member-modal').classList.remove('open');

    });
    html += '</div>';
    html += '<p style="font-size:10px; color:#B4B2A9; margin:6px 0 0;">최근 12장 · 탭하면 크게 보기</p>';
  }

  // 즐겨 쓰는 기능 (최근 30일)
  if (d.favorite_features && d.favorite_features.length > 0) {
    const favMax = d.favorite_features[0].count || 1;
    const FAV_COLORS = ['#639922','#1D9E75','#378ADD','#854F0B','#888780','#888780','#888780','#888780','#888780'];
    html += '<p class="section-label">⭐ 즐겨 쓰는 기능</p>';
    html += '<div class="ledger-card" style="padding:14px;">';
    d.favorite_features.forEach(function(f, i){
      const pct = Math.round(f.count / favMax * 100);
      const color = FAV_COLORS[i] || '#888780';
      const last = i === d.favorite_features.length-1;
      html += '<div style="margin-bottom:' + (last?'0':'10px') + ';">';
      html += '<div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px;"><span>' + esc(f.label) + '</span><span style="color:#888780;">' + f.count + '회</span></div>';
      html += '<div style="background:#F1EFE8; border-radius:99px; height:7px; overflow:hidden;"><div style="width:' + pct + '%; height:100%; background:' + color + '; border-radius:99px;"></div></div>';
      html += '</div>';
    });
    html += '</div>';
    html += '<p style="font-size:10px; color:#B4B2A9; margin:6px 0 0;">최근 30일 · 무료 기능 + AI 분석 합산</p>';
  }

  // 최근 분석 내용 (색감/레시피/컷 — 펼치면 전문)
  const analysisLogs = (d.ai_logs || []).filter(function(l){
    return l.result_text && String(l.result_text).trim() && (l.model === 'gemini' || l.model === 'sonnet');
  });
  if (analysisLogs.length > 0) {
    const STAGE_KO = { color:'컬러 분석 (색감)', recipe_only:'컬러 레시피', cut:'컷 분석', customer_message:'고객 안내' };
    html += '<p class="section-label">🔍 최근 분석 내용 (탭하면 펼침)</p>';
    html += '<div class="card" style="padding:0;">';
    analysisLogs.slice(0, 10).forEach(function(l, i){
      const last = i === Math.min(analysisLogs.length, 10) - 1;
      const title = STAGE_KO[l.stage] || (l.stage || '분석');
      const txtId = 'anatext-' + (l.id || i);
      html += '<div style="' + (last?'':'border-bottom:1px solid #F1EFE8;') + '">';
      html += '<div onclick="toggleAnalysis(\'' + txtId + '\', this)" style="display:flex; justify-content:space-between; align-items:center; padding:12px 14px; cursor:pointer;">';
      html += '<div><p style="font-size:13px; margin:0; color:#1C1917;">' + esc(title) + '</p>';
      html += '<p style="font-size:11px; color:#888780; margin:2px 0 0;">' + relativeTime(l.created_at) + '</p></div>';
      html += '<span style="font-size:12px; color:#185FA5;">펼치기 ▾</span>';
      html += '</div>';
      html += '<div id="' + txtId + '" style="display:none; padding:0 14px 14px;">';
      html += renderAnalysisBody(l.result_text);
      html += '</div>';
      html += '</div>';
    });
    html += '</div>';
    html += '<p style="font-size:10px; color:#B4B2A9; margin:6px 0 0;">최근 30일 보관 · 색감/레시피/컷 각각 따로 저장</p>';
  }

  // 거래 내역
  html += '<p class="section-label">거래 내역</p>';
  if (!d.ledger || d.ledger.length === 0) {
    html += '<div class="empty">거래 내역 없음</div>';
  } else {
    html += '<div class="ledger-card">';
    for (const l of d.ledger.slice(0, 20)) {
      let iconClass, iconChar, amountClass, amountText, title;
      if (l.type === 'charge') {
        iconClass = 'plus'; iconChar = '+'; amountClass = 'plus'; amountText = '+' + l.amount;
        title = '충전 · 주문 #' + (l.reference ? String(l.reference).slice(-6) : '?');
      } else if (l.type === 'use') {
        iconClass = 'minus'; iconChar = '−'; amountClass = 'minus'; amountText = l.amount;
        title = '사용 · ' + (l.note || '분석');
      } else if (l.type === 'refund') {
        iconClass = 'refund'; iconChar = '↩'; amountClass = 'plus'; amountText = '+' + l.amount;
        title = '환불';
      } else if (l.type === 'signup_bonus') {
        iconClass = 'star'; iconChar = '★'; amountClass = 'plus'; amountText = '+' + l.amount;
        title = '가입 보너스';
      } else if (l.type === 'admin_adjust') {
        iconClass = l.amount > 0 ? 'plus' : 'minus';
        iconChar = l.amount > 0 ? '+' : '−';
        amountClass = l.amount > 0 ? 'plus' : 'minus';
        amountText = (l.amount > 0 ? '+' : '') + l.amount;
        title = '관리자 조정' + (l.note ? ' · ' + l.note.replace('[관리자 조정] ', '') : '');
      } else {
        iconClass = 'minus'; iconChar = '·'; amountClass = ''; amountText = l.amount;
        title = l.type;
      }

      html += '<div class="ledger-row">';
      html += '<div class="ledger-icon ' + iconClass + '">' + iconChar + '</div>';
      html += '<div class="ledger-info">';
      html += '<p class="l1">' + esc(title) + '</p>';
      html += '<p class="l2">' + relativeTime(l.created_at);
      if (l.balance_after != null) html += ' · 잔액 ' + l.balance_after;
      html += '</p>';
      html += '</div>';
      html += '<span class="ledger-amount ' + amountClass + '">' + esc(String(amountText)) + '</span>';
      html += '</div>';
    }
    html += '</div>';
  }

  if (d.ledger && d.ledger.length > 20) {
    html += '<button class="modal-link-btn">전체 거래 내역 보기 (' + d.ledger.length + '건)</button>';
  }

  return html;
}

// ═══════════════════════════════════════════════════════════════
// 크레딧 조정
// ═══════════════════════════════════════════════════════════════
let adjustMode = 'plus';

function openAdjustDialog(mode) {
  adjustMode = mode;
  $('adjust-title').textContent = mode === 'plus' ? '+ 크레딧 추가' : '− 크레딧 차감';
  $('adjust-delta').value = '';
  $('adjust-delta').placeholder = mode === 'plus' ? '예: 10' : '예: 5';
  $('adjust-reason').value = '';
  $('adjust-dialog').classList.add('open');
}
function closeAdjustDialog() {
  $('adjust-dialog').classList.remove('open');
}
async function submitAdjust() {
  if (!modalMemberId) return;
  let val = parseInt($('adjust-delta').value, 10);
  const reason = $('adjust-reason').value.trim();
  if (!Number.isInteger(val) || val === 0) {
    toast('정수를 입력해주세요');
    return;
  }
  if (Math.abs(val) > 100) {
    toast('±100 이내로 입력해주세요');
    return;
  }
  if (!reason || reason.length < 2) {
    toast('사유를 2자 이상 입력해주세요');
    return;
  }
  const delta = adjustMode === 'plus' ? Math.abs(val) : -Math.abs(val);

  try {
    const res = await fetch('/api/admin/member-detail?id=' + encodeURIComponent(modalMemberId), {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      credentials:'same-origin',
      body: JSON.stringify({ delta, reason }),
    });
    if (!res.ok) {
      const data = await res.json().catch(()=>({}));
      toast(data.message || '실패 (' + res.status + ')');
      return;
    }
    closeAdjustDialog();
    toast('크레딧 ' + (delta > 0 ? '+' : '') + delta + ' 반영됨');
    openMember(modalMemberId); // 다시 로드
  } catch (err) {
    toast('연결 실패');
  }
}

// ═══════════════════════════════════════════════════════════════
// 로그아웃
// ═══════════════════════════════════════════════════════════════
async function logout() {
  try {
    await fetch('/api/admin/logout', { method:'POST', credentials:'same-origin' });
  } catch (_) {}
  location.reload();
}

// 모달 외부 클릭 시 닫기
$('member-modal').addEventListener('click', (e) => {
  if (e.target.id === 'member-modal') closeMemberModal();
});
$('adjust-dialog').addEventListener('click', (e) => {
  if (e.target.id === 'adjust-dialog') closeAdjustDialog();
});
</script>
