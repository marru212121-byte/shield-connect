<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>HANDS — 관리자 콘솔</title>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Kakao Map JS SDK + clusterer + services library -->
<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=30cf8d591d8bd417f791b91090e8b1cd&libraries=clusterer,services"></script>

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --teal:#0f766e; --teal-d:#0d5d57; --teal-l:#14b8a6;
    --orange:#ea580c; --orange-d:#c2410c;
    --red:#dc2626; --red-l:#fca5a5;
    --bg:#f8fafc; --card:#fff;
    --line:#e2e8f0; --line-d:#cbd5e1;
    --txt:#0f172a; --sub:#475569; --mute:#94a3b8;
  }
  html,body{height:100%;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro','Pretendard',sans-serif;
    -webkit-font-smoothing:antialiased; overflow:hidden}

  /* ===== 로그인 ===== */
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#0f766e 0%,#ea580c 100%);z-index:100}
  .login-box{background:#fff;padding:36px 32px;border-radius:20px;width:340px;
    box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .login-box h1{font-size:24px;margin-bottom:6px;color:var(--teal)}
  .login-box p{color:var(--sub);font-size:13px;margin-bottom:20px}
  .login-box input{width:100%;padding:12px 14px;border:1.5px solid var(--line);
    border-radius:10px;font-size:14px;margin-bottom:10px;outline:none}
  .login-box input:focus{border-color:var(--teal)}
  .login-box button{width:100%;padding:13px;background:var(--teal);color:#fff;
    border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
  .login-box button:hover{background:var(--teal-d)}
  .login-err{color:var(--red);font-size:12px;margin-top:6px;min-height:16px}

  /* ===== 메인 레이아웃 ===== */
  #app{display:none;height:100vh;flex-direction:column}
  #app.show{display:flex}

  header{background:#fff;border-bottom:1px solid var(--line);
    padding:10px 18px;display:flex;align-items:center;gap:14px;flex-shrink:0;height:54px}
  header .logo{font-size:17px;font-weight:800;color:var(--teal);letter-spacing:-.3px}
  header .badge{background:var(--orange);color:#fff;font-size:10px;padding:2px 8px;
    border-radius:10px;font-weight:600}
  header .stats{display:flex;gap:14px;margin-left:auto;font-size:13px;color:var(--sub)}
  header .stats b{color:var(--txt)}
  header .who{font-size:12px;color:var(--mute)}
  header button.logout{background:none;border:1px solid var(--line);color:var(--sub);
    padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px}

  nav.tabs{background:#fff;border-bottom:1px solid var(--line);
    display:flex;padding:0 14px;flex-shrink:0}
  nav.tabs button{background:none;border:none;padding:12px 18px;font-size:13.5px;
    color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;font-weight:500}
  nav.tabs button.on{color:var(--teal);border-bottom-color:var(--teal);font-weight:700}

  main{flex:1;overflow:hidden;position:relative}
  .panel{display:none;height:100%}
  .panel.on{display:flex}

  /* ===== 지도 패널 ===== */
  #panel-map{flex-direction:row}
  .map-side{width:340px;background:#fff;border-right:1px solid var(--line);
    display:flex;flex-direction:column;flex-shrink:0}
  .map-side-head{padding:14px 16px;border-bottom:1px solid var(--line)}
  .map-side-head input{width:100%;padding:9px 12px;border:1.5px solid var(--line);
    border-radius:8px;font-size:13px;outline:none}
  .map-side-head input:focus{border-color:var(--teal)}
  .map-filters{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
  .map-filters button{padding:5px 10px;background:#f1f5f9;border:1px solid var(--line);
    border-radius:14px;font-size:11.5px;color:var(--sub);cursor:pointer;font-weight:500}
  .map-filters button.on{background:var(--teal);color:#fff;border-color:var(--teal)}
  .map-filters button.sos.on{background:var(--red);border-color:var(--red)}

  .map-list{flex:1;overflow-y:auto;padding:0}
  .mlist-item{padding:11px 14px;border-bottom:1px solid #f1f5f9;cursor:pointer;display:flex;
    gap:10px;align-items:center;transition:background .15s}
  .mlist-item:hover{background:#f8fafc}
  .mlist-item.sel{background:#ecfeff;border-left:3px solid var(--teal)}
  .mlist-item.sos{background:#fef2f2}
  .mlist-item.sos.sel{background:#fee2e2;border-left-color:var(--red)}
  .mlist-flag{font-size:22px;width:30px;text-align:center;flex-shrink:0}
  .mlist-info{flex:1;min-width:0}
  .mlist-name{font-size:13.5px;font-weight:600;color:var(--txt);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mlist-meta{font-size:11px;color:var(--mute);margin-top:2px;
    display:flex;justify-content:space-between}
  .mlist-meta .age{color:var(--sub)}
  .mlist-sos{background:var(--red);color:#fff;font-size:9px;padding:2px 6px;
    border-radius:6px;font-weight:700;letter-spacing:.5px}

  .map-area{flex:1;position:relative}
  #map{width:100%;height:100%}

  .map-legend{position:absolute;bottom:14px;left:14px;background:#fff;
    padding:10px 14px;border-radius:10px;box-shadow:0 4px 12px rgba(0,0,0,.12);
    font-size:11.5px;display:flex;gap:14px;align-items:center}
  .map-legend .lg{display:flex;align-items:center;gap:5px;color:var(--sub)}
  .map-legend .dot{width:12px;height:12px;border-radius:50%}

  .map-controls{position:absolute;top:14px;right:14px;display:flex;flex-direction:column;gap:6px}
  .map-controls button{background:#fff;border:1px solid var(--line);width:38px;height:38px;
    border-radius:10px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.08);
    font-size:16px;display:flex;align-items:center;justify-content:center}
  .map-controls button:hover{background:#f8fafc}
  .map-controls button.on{background:var(--teal);color:#fff;border-color:var(--teal)}

  /* 인포 패널 (선택된 회원 상세 + 이동이력) */
  .detail-panel{position:absolute;top:14px;left:14px;width:300px;background:#fff;
    border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.18);overflow:hidden;display:none;z-index:5}
  .detail-panel.show{display:block}
  .dp-head{padding:14px 16px;background:linear-gradient(135deg,var(--teal),var(--teal-d));color:#fff;
    display:flex;align-items:center;gap:10px}
  .dp-head.sos{background:linear-gradient(135deg,var(--red),#991b1b)}
  .dp-flag{font-size:28px}
  .dp-name{font-size:15px;font-weight:700;line-height:1.2}
  .dp-sub{font-size:11px;opacity:.85;margin-top:2px}
  .dp-close{margin-left:auto;background:rgba(255,255,255,.2);border:none;color:#fff;
    width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:13px}
  .dp-photos{display:flex;gap:8px;padding:12px;border-bottom:1px solid var(--line)}
  .dp-photo{width:48px;height:48px;border-radius:8px;object-fit:cover;
    background:#f1f5f9;border:1px solid var(--line);cursor:pointer}
  .dp-photo:hover{transform:scale(1.05);transition:transform .15s}
  .dp-info{padding:12px 16px;font-size:12px}
  .dp-info-row{display:flex;justify-content:space-between;padding:5px 0}
  .dp-info-row span:first-child{color:var(--mute)}
  .dp-info-row span:last-child{color:var(--txt);font-weight:500}
  .dp-history{border-top:1px solid var(--line);max-height:240px;overflow-y:auto}
  .dp-history h4{padding:10px 16px;font-size:11px;color:var(--mute);
    text-transform:uppercase;letter-spacing:.8px;font-weight:700;background:#f8fafc}
  .dph-item{padding:8px 16px;font-size:11.5px;border-bottom:1px solid #f1f5f9;
    display:flex;justify-content:space-between;cursor:pointer}
  .dph-item:hover{background:#f8fafc}
  .dph-item .dph-time{color:var(--sub)}
  .dph-item .dph-src{color:var(--mute);font-size:10px}
  .dph-item.latest{background:#ecfeff}
  .dph-item.latest .dph-time{color:var(--teal);font-weight:700}

  /* ===== 회원 목록 패널 ===== */
  #panel-members{padding:0;overflow-y:auto;display:none;flex-direction:column}
  #panel-members.on{display:flex}
  .pm-toolbar{padding:14px 18px;background:#fff;border-bottom:1px solid var(--line);
    display:flex;gap:10px;align-items:center;position:sticky;top:0;z-index:1}
  .pm-toolbar input{flex:1;max-width:280px;padding:8px 12px;border:1.5px solid var(--line);
    border-radius:8px;font-size:13px;outline:none}
  .pm-table{width:100%;background:#fff;border-collapse:collapse}
  .pm-table th{background:#f8fafc;text-align:left;padding:10px 14px;font-size:11.5px;
    color:var(--sub);font-weight:600;border-bottom:1px solid var(--line);
    text-transform:uppercase;letter-spacing:.5px}
  .pm-table td{padding:11px 14px;border-bottom:1px solid #f1f5f9;font-size:13px}
  .pm-table tr:hover{background:#f8fafc;cursor:pointer}
  .pm-flag{font-size:18px;margin-right:6px}

  /* ===== 게시판 패널 ===== */
  #panel-board{padding:18px;overflow-y:auto;display:none;flex-direction:column;gap:12px}
  #panel-board.on{display:flex}
  .post-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .post-head{display:flex;justify-content:space-between;font-size:11px;color:var(--mute);margin-bottom:6px}
  .post-author{color:var(--teal);font-weight:600}
  .post-title{font-size:14px;font-weight:600;margin-bottom:4px}
  .post-body{font-size:13px;color:var(--sub);line-height:1.5}

  /* ===== SOS 패널 ===== */
  #panel-sos{padding:18px;overflow-y:auto;display:none;flex-direction:column;gap:10px}
  #panel-sos.on{display:flex}
  .sos-card{background:#fff;border:2px solid var(--red);border-radius:12px;padding:14px 16px;
    display:flex;justify-content:space-between;align-items:center}
  .sos-card.resolved{border-color:var(--line);opacity:.6}
  .sos-info b{font-size:14px;color:var(--red);display:block}
  .sos-info span{font-size:12px;color:var(--sub)}
  .sos-card button{background:var(--teal);color:#fff;border:none;padding:8px 14px;
    border-radius:8px;cursor:pointer;font-size:12px;font-weight:600}

  /* 사진 모달 */
  #photo-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;
    align-items:center;justify-content:center;z-index:200;cursor:pointer}
  #photo-modal.show{display:flex}
  #photo-modal img{max-width:90vw;max-height:90vh;border-radius:8px}

  /* 빈 상태 */
  .empty{padding:30px;text-align:center;color:var(--mute);font-size:13px}
  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);
    background:#0f172a;color:#fff;padding:10px 18px;border-radius:8px;
    font-size:13px;z-index:300;display:none;box-shadow:0 4px 16px rgba(0,0,0,.3)}
  .toast.show{display:block;animation:slideIn .25s}
  @keyframes slideIn{from{transform:translate(-50%,-20px);opacity:0}
    to{transform:translate(-50%,0);opacity:1}}

  /* ============================================ */
  /* ===== 모바일 반응형 (768px 이하) ===== */
  /* ============================================ */
  @media (max-width: 768px) {
    /* 헤더 - 한 줄에 다 압축 */
    header{padding:8px 10px;height:auto;min-height:46px;gap:6px;flex-wrap:nowrap}
    header .logo{font-size:14px;flex-shrink:0}
    header .badge{font-size:8px;padding:2px 5px;flex-shrink:0}
    header .stats{font-size:10.5px;gap:8px;margin-left:auto;flex-shrink:0}
    header .stats span{white-space:nowrap}
    header .stats span b{margin:0 1px}
    header .who{display:none !important} /* 모바일에선 이메일 숨김 */
    header button.logout{padding:5px 8px;font-size:10.5px;flex-shrink:0}

    /* 탭 */
    nav.tabs{padding:0 6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
    nav.tabs button{padding:10px 12px;font-size:12.5px;white-space:nowrap;flex-shrink:0}

    /* 지도 패널: 좌우 분할 유지하되 사이드바 접고/펼치기 */
    #panel-map{flex-direction:row;position:relative}
    .map-side{
      width:0;background:#fff;flex-shrink:0;overflow:hidden;
      transition:width .25s ease;border-right:1px solid var(--line)
    }
    .map-side.open{width:46%;max-width:280px}
    .map-area{flex:1;height:100%;position:relative;min-width:0}

    /* 햄버거 토글 (펼쳐있을 땐 ✕로 변환) */
    .map-mobile-toggle{
      display:flex !important;position:absolute;top:14px;left:14px;z-index:10;
      width:42px;height:42px;background:#fff;border:1px solid var(--line);
      border-radius:10px;align-items:center;justify-content:center;
      box-shadow:0 2px 8px rgba(0,0,0,.12);font-size:20px;cursor:pointer;
      transition:left .25s ease
    }
    .map-side.open ~ .map-area .map-mobile-toggle,
    #panel-map.side-open .map-mobile-toggle{
      /* 사이드바 펼쳤을 때 토글 위치 (안 가리게) */
    }

    /* 사이드바 안의 콘텐츠 압축 */
    .map-side.open .map-side-head{padding:10px 12px}
    .map-side.open .map-side-head input{font-size:12px;padding:7px 10px}
    .map-side.open .map-filters{gap:4px;margin-top:8px}
    .map-side.open .map-filters button{font-size:10.5px;padding:4px 8px}
    .map-side.open .mlist-item{padding:9px 11px;gap:8px}
    .map-side.open .mlist-flag{font-size:18px;width:24px}
    .map-side.open .mlist-name{font-size:12.5px}
    .map-side.open .mlist-meta{font-size:10px}
    .map-side.open .mlist-sos{font-size:8px;padding:1px 4px}

    .map-controls{top:14px;right:14px}
    .map-controls button{width:42px;height:42px;font-size:18px}
    .map-legend{
      bottom:8px;left:8px;right:8px;padding:6px 10px;
      font-size:10.5px;gap:10px;justify-content:center
    }

    /* 상세 패널 - 지도 영역 안 하단에 슬라이드 업 (사이드바와 안 겹침) */
    .detail-panel{
      top:auto;left:8px;right:8px;bottom:8px;width:auto;max-height:55vh;
      border-radius:14px;box-shadow:0 -8px 24px rgba(0,0,0,.2)
    }
    .dp-history{max-height:30vh}

    /* 회원 목록 - 테이블 숨기고 카드만 */
    .pm-toolbar{padding:10px 12px;flex-wrap:wrap;gap:8px}
    .pm-toolbar input{font-size:13px;max-width:none;flex:1}
    .pm-table{display:none !important}
    .pm-cards{display:flex !important;flex-direction:column;gap:8px;padding:10px}
    .pm-card{background:#fff;border:1px solid var(--line);border-radius:12px;
      padding:12px 14px;cursor:pointer;display:flex;gap:11px;align-items:center}
    .pm-card.sos{background:#fef2f2;border-color:#fecaca}
    .pm-card-flag{font-size:28px;flex-shrink:0}
    .pm-card-info{flex:1;min-width:0}
    .pm-card-name{font-size:14.5px;font-weight:700;color:var(--txt);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pm-card-meta{font-size:11.5px;color:var(--sub);margin-top:3px;
      display:flex;gap:8px;flex-wrap:wrap}
    .pm-card-time{font-size:11px;color:var(--mute);text-align:right;flex-shrink:0}
    .pm-card-time.online{color:var(--teal);font-weight:600}

    /* 게시판/SOS 패딩 */
    #panel-board,#panel-sos{padding:12px}
  }

  /* PC에서는 햄버거/카드 숨김, 테이블만 */
  .map-mobile-toggle{display:none}
  .pm-cards{display:none}
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login">
  <div class="login-box">
    <h1>HANDS 관리자</h1>
    <p>외국인 노동자 통합 관리 콘솔</p>
    <input id="lg-email" type="email" placeholder="이메일" autocomplete="username">
    <input id="lg-pw" type="password" placeholder="비밀번호" autocomplete="current-password">
    <button onclick="doLogin()">로그인</button>
    <div class="login-err" id="lg-err"></div>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app">
  <header>
    <span class="logo">HANDS</span>
    <span class="badge">ADMIN</span>
    <div class="stats">
      <span>👥 <b id="st-total">0</b></span>
      <span>🟢 <b id="st-online" style="color:var(--teal)">0</b></span>
      <span>🆘 <b id="st-sos" style="color:var(--red)">0</b></span>
    </div>
    <span class="who" id="who"></span>
    <button class="logout" onclick="doLogout()">로그아웃</button>
  </header>

  <nav class="tabs">
    <button class="on" data-tab="map">🗺️ 지도</button>
    <button data-tab="members">👥 회원목록</button>
    <button data-tab="board">📋 게시판</button>
    <button data-tab="sos">🆘 SOS</button>
  </nav>

  <main>
    <!-- 지도 패널 -->
    <div class="panel on" id="panel-map">
      <div class="map-side">
        <div class="map-side-head">
          <input id="ml-search" type="text" placeholder="이름·전화번호·국가 검색">
          <div class="map-filters">
            <button class="on" data-filter="all">전체</button>
            <button class="sos" data-filter="sos">SOS만</button>
            <button data-filter="online">온라인</button>
            <button data-filter="offline">오프라인</button>
          </div>
        </div>
        <div class="map-list" id="mlist"><div class="empty">로딩 중...</div></div>
      </div>
      <div class="map-area">
        <div id="map"></div>
        <button class="map-mobile-toggle" onclick="toggleSide()">☰</button>
        <div class="map-controls">
          <button id="btn-fit" title="모두 보기">📍</button>
          <button id="btn-cluster" class="on" title="클러스터링 ON/OFF">⊕</button>
          <button id="btn-trail" title="이동 경로 표시">〰️</button>
        </div>
        <div class="map-legend">
          <div class="lg"><div class="dot" style="background:#10b981"></div>온라인</div>
          <div class="lg"><div class="dot" style="background:#94a3b8"></div>오프라인</div>
          <div class="lg"><div class="dot" style="background:#dc2626"></div>SOS</div>
        </div>

        <!-- 클릭한 회원 상세 + 이동이력 패널 -->
        <div class="detail-panel" id="dpanel">
          <div class="dp-head" id="dp-head">
            <div class="dp-flag" id="dp-flag">🌐</div>
            <div>
              <div class="dp-name" id="dp-name">—</div>
              <div class="dp-sub" id="dp-sub">—</div>
            </div>
            <button class="dp-close" onclick="closeDetail()">✕</button>
          </div>
          <div class="dp-photos" id="dp-photos"></div>
          <div class="dp-info" id="dp-info"></div>
          <div class="dp-history">
            <h4>이동 이력 (최근 20건)</h4>
            <div id="dp-history-list"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 회원목록 패널 -->
    <div class="panel" id="panel-members">
      <div class="pm-toolbar">
        <input id="pm-search" type="text" placeholder="이름·전화번호 검색">
        <span style="color:var(--mute);font-size:12px">총 <b id="pm-count">0</b>명</span>
      </div>
      <table class="pm-table">
        <thead><tr>
          <th>이름</th><th>국가</th><th>나이</th><th>전화</th>
          <th>가입일</th><th>마지막 접속</th><th>위치</th>
        </tr></thead>
        <tbody id="pm-tbody"></tbody>
      </table>
      <div class="pm-cards" id="pm-cards"></div>
    </div>

    <!-- 게시판 패널 -->
    <div class="panel" id="panel-board"></div>

    <!-- SOS 패널 -->
    <div class="panel" id="panel-sos"></div>
  </main>
</div>

/* 국가 코드 → 국기 + 한글명 */
const CTY = {
  vn:['🇻🇳','베트남'], th:['🇹🇭','태국'], np:['🇳🇵','네팔'],
  ph:['🇵🇭','필리핀'], id:['🇮🇩','인도네시아'], kh:['🇰🇭','캄보디아'],

};

const cName = c => (CTY[c]||['🌐','기타'])[1];

/* 국가별 마커 색 */
const CTY_COLOR = {
  vn:'#dc2626', th:'#3b82f6', np:'#dc2626',
  ph:'#0ea5e9', id:'#dc2626', kh:'#1d4ed8',
  mm:'#f59e0b', lk:'#ea580c', bd:'#16a34a',
  pk:'#16a34a', in:'#f59e0b', cn:'#dc2626',

/* ====== 상태 ====== */
let me = null;          // 로그인된 admin
let members = [];        // 전체 회원 (locations 조인 포함)

let curFilter = 'all';

let markers = {};        // member_id -> Marker
let clusterer = null;
let useCluster = true;
let trailPoly = null;    // 이동경로 폴리라인
let realtimeSub = null;

/* ====== 유틸 ====== */
function fmtTime(ts){
  if(!ts) return '—';
  const d = new Date(ts), now = Date.now(), diff = (now - d.getTime())/1000;
  if(diff < 60) return '방금 전';
  if(diff < 3600) return Math.floor(diff/60)+'분 전';
  if(diff < 86400) return Math.floor(diff/3600)+'시간 전';
  if(diff < 86400*7) return Math.floor(diff/86400)+'일 전';
  return d.toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
}
function fmtFull(ts){
  if(!ts) return '—';
  return new Date(ts).toLocaleString('ko-KR',
    {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function isOnline(ts){
  if(!ts) return false;
  return (Date.now() - new Date(ts).getTime()) < 5*60*1000; // 5분 이내
}
function age(birth){
  if(!birth) return '?';
  const y = new Date().getFullYear() - new Date(birth).getFullYear();
  return y;
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

/* ====== 로그인 ====== */
async function doLogin(){
  const email = document.getElementById('lg-email').value.trim();
  const pw = document.getElementById('lg-pw').value;
  const errEl = document.getElementById('lg-err');
  errEl.textContent = '';

  if(!email || !pw){ errEl.textContent = '이메일·비밀번호 입력'; return; }

  try{
    const {data,error} = await sb.from('admin_users')
      .select('id,email,name,password,is_active')
      .eq('email', email).maybeSingle();

    if(error || !data){ errEl.textContent = '계정을 찾을 수 없음'; return; }
    if(!data.is_active){ errEl.textContent = '비활성 계정'; return; }
    if(data.password !== pw){ errEl.textContent = '비밀번호 불일치'; return; }

    me = {id:data.id, email:data.email, name:data.name};
    localStorage.setItem('hands_admin', JSON.stringify(me));

    await sb.from('admin_users').update({last_login_at: new Date().toISOString()}).eq('id', me.id);

    enterApp();
  } catch(e){ errEl.textContent = '오류: '+(e.message||e); }
}

function doLogout(){
  localStorage.removeItem('hands_admin');
  me = null;
  if(realtimeSub){ realtimeSub.unsubscribe(); realtimeSub = null; }
  document.getElementById('app').classList.remove('show');
  document.getElementById('login').style.display = 'flex';

  document.getElementById('lg-pw').value = '';
}

function enterApp(){

/* ====== 카카오맵 초기화 ====== */
function initMap(){
  const center = new kakao.maps.LatLng(36.5, 127.8); // 한반도 중앙
  kakaoMap = new kakao.maps.Map(document.getElementById('map'), {
    center: center, level: 13
  });
  clusterer = new kakao.maps.MarkerClusterer({
    map: kakaoMap, averageCenter: true, minLevel: 6,
    styles: [{
      width:'40px', height:'40px', background:'rgba(15,118,110,.9)',
      borderRadius:'20px', color:'#fff', textAlign:'center',
      fontWeight:'700', fontSize:'13px', lineHeight:'40px'
    }]
  });

  // 컨트롤
  document.getElementById('btn-fit').onclick = fitAll;
  document.getElementById('btn-cluster').onclick = toggleCluster;
  document.getElementById('btn-trail').onclick = toggleTrail;
}

function fitAll(){
  const bounds = new kakao.maps.LatLngBounds();
  let cnt = 0;
  Object.values(markers).forEach(m=>{
    bounds.extend(m.getPosition()); cnt++;
  });
  if(cnt>0) kakaoMap.setBounds(bounds);
  else toast('표시할 위치 없음');
}

function toggleCluster(){
  useCluster = !useCluster;
  document.getElementById('btn-cluster').classList.toggle('on', useCluster);
  rebuildMarkers();
}

let trailOn = false;
function toggleTrail(){
  trailOn = !trailOn;
  document.getElementById('btn-trail').classList.toggle('on', trailOn);
  if(!trailOn && trailPoly){ trailPoly.setMap(null); trailPoly = null; }
  if(trailOn && selectedId) drawTrail(selectedId);
}

/* ====== 마커 SVG (국가색 + SOS 빨간 깜빡임) ====== */
function makeMarkerImage(country, sos, online){
  const c = sos ? '#dc2626' : (CTY_COLOR[country] || '#64748b');
  const opacity = online ? 1 : 0.5;
  const stroke = sos ? '#fff' : 'rgba(255,255,255,0.9)';
  const sosRing = sos ? `<circle cx="14" cy="14" r="13" fill="none" stroke="#dc2626" stroke-width="2" opacity="0.4"><animate attributeName="r" from="9" to="14" dur="1s" repeatCount="indefinite"/><animate attributeName="opacity" from="0.7" to="0" dur="1s" repeatCount="indefinite"/></circle>` : '';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28">
    ${sosRing}
    <circle cx="14" cy="14" r="9" fill="${c}" stroke="${stroke}" stroke-width="2.5" opacity="${opacity}"/>
    ${sos ? '<text x="14" y="18" text-anchor="middle" fill="#fff" font-size="10" font-weight="800">!</text>' : ''}
  </svg>`;
  return new kakao.maps.MarkerImage(
    'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg),
    new kakao.maps.Size(28,28),
    {offset: new kakao.maps.Point(14,14)}
  );
}

/* ====== 회원 + 위치 데이터 로드 ====== */
async function loadMembers(){
  // 멤버 + 위치 조인 (수동)
  const [mRes, lRes] = await Promise.all([
    sb.from('members').select('*').order('created_at',{ascending:false}),
    sb.from('locations').select('*')
  ]);
  if(mRes.error){ console.error(mRes.error); toast('회원 로드 실패'); return; }

  const locMap = {};
  (lRes.data||[]).forEach(l => locMap[l.member_id] = l);

  members = (mRes.data||[]).map(m => ({
    ...m,
    loc: locMap[m.id] || null
  }));

  // 활성 SOS 조인
  const {data: sosData} = await sb.from('sos_alerts')
    .select('member_id').eq('status','pending');
  const sosSet = new Set((sosData||[]).map(s=>s.member_id));
  members.forEach(m => m.sos_active = sosSet.has(m.id));

  updateStats();
  renderList();
  rebuildMarkers();
  renderMembersTable();
}

function updateStats(){
  document.getElementById('st-total').textContent = members.length;
  document.getElementById('st-online').textContent = members.filter(m=>isOnline(m.loc?.updated_at)).length;
  document.getElementById('st-sos').textContent = members.filter(m=>m.sos_active).length;
}

/* ====== 좌측 회원 리스트 ====== */
function renderList(){
  const search = document.getElementById('ml-search').value.toLowerCase().trim();
  const list = document.getElementById('mlist');

  let filtered = members.filter(m=>{
    if(curFilter === 'sos' && !m.sos_active) return false;
    if(curFilter === 'online' && !isOnline(m.loc?.updated_at)) return false;
    if(curFilter === 'offline' && isOnline(m.loc?.updated_at)) return false;
    if(search){
      const blob = (m.name||'')+(m.phone||'')+cName(m.country)+(m.country||'');
      if(!blob.toLowerCase().includes(search)) return false;
    }
    return true;
  });

  if(filtered.length === 0){
    list.innerHTML = '<div class="empty">조건에 맞는 회원이 없습니다</div>';
    return;
  }

  // SOS 우선, 그다음 최근 접속순
  filtered.sort((a,b)=>{
    if(a.sos_active !== b.sos_active) return a.sos_active ? -1 : 1;
    const ta = a.loc?.updated_at ? new Date(a.loc.updated_at).getTime() : 0;
    const tb = b.loc?.updated_at ? new Date(b.loc.updated_at).getTime() : 0;
    return tb - ta;
  });

  list.innerHTML = filtered.map(m=>`
    <div class="mlist-item ${m.sos_active?'sos':''} ${m.id===selectedId?'sel':''}"
         onclick="selectMember('${m.id}')">
      <div class="mlist-flag">${flag(m.country)}</div>
      <div class="mlist-info">
        <div class="mlist-name">${escapeHtml(m.name||'(이름없음)')}</div>
        <div class="mlist-meta">
          <span>${cName(m.country)} · ${age(m.birth_date)}세</span>
          <span class="age">${fmtTime(m.loc?.updated_at)}</span>
        </div>
      </div>
      ${m.sos_active ? '<div class="mlist-sos">SOS</div>' : ''}
    </div>
  `).join('');
}

/* ====== 마커 다시 그리기 ====== */
function rebuildMarkers(){
  // 기존 제거
  if(clusterer){ clusterer.clear(); }
  Object.values(markers).forEach(m=>m.setMap(null));
  markers = {};

  const fresh = [];
  members.forEach(m=>{
    if(!m.loc) return;
    const filterPass =
      curFilter === 'all' ||
      (curFilter === 'sos' && m.sos_active) ||
      (curFilter === 'online' && isOnline(m.loc.updated_at)) ||
      (curFilter === 'offline' && !isOnline(m.loc.updated_at));
    if(!filterPass) return;

    const pos = new kakao.maps.LatLng(m.loc.lat, m.loc.lng);
    const marker = new kakao.maps.Marker({
      position: pos,
      image: makeMarkerImage(m.country, m.sos_active, isOnline(m.loc.updated_at)),
      title: m.name || ''
    });
    kakao.maps.event.addListener(marker, 'click', ()=> selectMember(m.id));
    markers[m.id] = marker;
    fresh.push(marker);
  });

  if(useCluster){
    clusterer.addMarkers(fresh);
  } else {
    fresh.forEach(m => m.setMap(kakaoMap));
  }
}

/* ====== 회원 클릭 → 상세 + 이동이력 ====== */
async function selectMember(id){
  selectedId = id;
  const m = members.find(x=>x.id===id);
  if(!m){ return; }

  renderList(); // 좌측 리스트 하이라이트
  // 모바일에서도 사이드바 그대로 유지 (비교하면서 보기)

  // 지도 이동
  if(m.loc){
    const pos = new kakao.maps.LatLng(m.loc.lat, m.loc.lng);
    kakaoMap.setLevel(4);
    kakaoMap.panTo(pos);
  }

  // 상세 패널 열기
  const dp = document.getElementById('dpanel');
  const dpHead = document.getElementById('dp-head');
  dp.classList.add('show');
  dpHead.classList.toggle('sos', !!m.sos_active);

  document.getElementById('dp-flag').textContent = flag(m.country);
  document.getElementById('dp-name').textContent = m.name || '(이름없음)';
  document.getElementById('dp-sub').textContent =
    `${cName(m.country)} · ${age(m.birth_date)}세 · ${m.gender||'?'}`;

  // 사진 (경로/URL 모두 자동 처리)
  const pp = document.getElementById('dp-photos');
  pp.innerHTML = '';
  const passUrl = photoUrl(m.passport_photo_url);
  const selfUrl = photoUrl(m.selfie_photo_url);
  if(passUrl) pp.innerHTML +=
    `<img class="dp-photo" src="${passUrl}" onclick="showPhoto('${passUrl}')" alt="여권" onerror="this.style.opacity=0.3">`;
  if(selfUrl) pp.innerHTML +=
    `<img class="dp-photo" src="${selfUrl}" onclick="showPhoto('${selfUrl}')" alt="셀카" onerror="this.style.opacity=0.3">`;
  if(!pp.innerHTML) pp.innerHTML = '<div style="color:var(--mute);font-size:11px;padding:8px">사진 없음</div>';

  // 정보
  const info = document.getElementById('dp-info');
  info.innerHTML = `
    <div class="dp-info-row"><span>📞 전화</span><span>${m.phone||'—'}</span></div>
    <div class="dp-info-row"><span>📅 가입일</span><span>${fmtFull(m.created_at)}</span></div>
    <div class="dp-info-row"><span>📍 현재 좌표</span><span>${m.loc ? m.loc.lat.toFixed(4)+', '+m.loc.lng.toFixed(4) : '—'}</span></div>
    <div class="dp-info-row"><span>🕐 최근 접속</span><span style="color:${isOnline(m.loc?.updated_at)?'var(--teal)':'var(--mute)'}">${fmtTime(m.loc?.updated_at)}</span></div>
    <div class="dp-info-row"><span>📏 신체</span><span>${m.height_cm||'?'}cm / ${m.weight_kg||'?'}kg</span></div>
  `;

  // 이동 이력
  await loadHistory(id);

  // trail 켜져있으면 그리기
  if(trailOn) drawTrail(id);
}

async function loadHistory(memberId){
  const list = document.getElementById('dp-history-list');
  list.innerHTML = '<div class="empty" style="padding:14px">로딩...</div>';

  const {data, error} = await sb.from('location_history')
    .select('*').eq('member_id', memberId)
    .order('recorded_at',{ascending:false}).limit(20);

  if(error || !data || data.length === 0){
    list.innerHTML = '<div class="empty" style="padding:14px">이력 없음</div>';
    return;
  }

  list.innerHTML = data.map((h,i)=>`
    <div class="dph-item ${i===0?'latest':''}" onclick="jumpTo(${h.lat},${h.lng})">
      <div>
        <div class="dph-time">${fmtFull(h.recorded_at)}</div>
        <div class="dph-src">${h.source||'app'} · ${h.lat.toFixed(4)},${h.lng.toFixed(4)}</div>
      </div>
      ${i===0?'<span style="color:var(--teal);font-size:10px;font-weight:700">최신</span>':''}
    </div>
  `).join('');
}

function jumpTo(lat,lng){
  kakaoMap.setLevel(3);
  kakaoMap.panTo(new kakao.maps.LatLng(lat,lng));
}

async function drawTrail(memberId){
  if(trailPoly){ trailPoly.setMap(null); trailPoly = null; }

  const {data} = await sb.from('location_history')
    .select('lat,lng,recorded_at').eq('member_id', memberId)
    .order('recorded_at',{ascending:true}).limit(50);

  if(!data || data.length < 2) return;

  const path = data.map(d => new kakao.maps.LatLng(d.lat, d.lng));
  trailPoly = new kakao.maps.Polyline({
    path: path, strokeWeight: 3, strokeColor: '#0f766e',
    strokeOpacity: 0.7, strokeStyle: 'solid'
  });
  trailPoly.setMap(kakaoMap);
}

function closeDetail(){
  document.getElementById('dpanel').classList.remove('show');
  selectedId = null;
  if(trailPoly){ trailPoly.setMap(null); trailPoly = null; }
  renderList();
}

function showPhoto(url){
  document.getElementById('photo-modal-img').src = url;
  document.getElementById('photo-modal').classList.add('show');
}

/* ====== 회원목록 테이블 + 모바일 카드 ====== */
function renderMembersTable(){
  const search = document.getElementById('pm-search').value.toLowerCase().trim();
  const tbody = document.getElementById('pm-tbody');
  const cards = document.getElementById('pm-cards');

  let filtered = members;
  if(search){
    filtered = members.filter(m=>{
      const blob = (m.name||'')+(m.phone||'')+cName(m.country);
      return blob.toLowerCase().includes(search);
    });
  }

  // SOS 우선 → 최근 접속순
  filtered.sort((a,b)=>{
    if(a.sos_active !== b.sos_active) return a.sos_active ? -1 : 1;
    const ta = a.loc?.updated_at ? new Date(a.loc.updated_at).getTime() : 0;
    const tb = b.loc?.updated_at ? new Date(b.loc.updated_at).getTime() : 0;
    return tb - ta;
  });

  document.getElementById('pm-count').textContent = filtered.length;
  if(filtered.length === 0){
    tbody.innerHTML = '<tr><td colspan="7" class="empty">회원 없음</td></tr>';
    if(cards) cards.innerHTML = '<div class="empty">회원 없음</div>';
    return;
  }

  // PC - 테이블
  tbody.innerHTML = filtered.map(m=>`
    <tr onclick="goToMap('${m.id}')">
      <td><span class="pm-flag">${flag(m.country)}</span>${escapeHtml(m.name||'(없음)')}</td>
      <td>${cName(m.country)}</td>
      <td>${age(m.birth_date)}</td>
      <td>${m.phone||'—'}</td>
      <td>${fmtFull(m.created_at)}</td>
      <td style="color:${isOnline(m.loc?.updated_at)?'var(--teal)':'var(--mute)'}">${fmtTime(m.loc?.updated_at)}</td>
      <td>${m.loc ? m.loc.lat.toFixed(3)+','+m.loc.lng.toFixed(3) : '—'}</td>
    </tr>
  `).join('');

  // 모바일 - 카드
  if(cards){
    cards.innerHTML = filtered.map(m=>{
      const online = isOnline(m.loc?.updated_at);
      return `
        <div class="pm-card ${m.sos_active?'sos':''}" onclick="goToMap('${m.id}')">
          <div class="pm-card-flag">${flag(m.country)}</div>
          <div class="pm-card-info">
            <div class="pm-card-name">${escapeHtml(m.name||'(이름없음)')} ${m.sos_active?'<span style="color:var(--red);font-weight:800">🆘</span>':''}</div>
            <div class="pm-card-meta">
              <span>${cName(m.country)}</span>
              <span>·</span>
              <span>${age(m.birth_date)}세</span>
              ${m.phone ? `<span>·</span><span>${m.phone}</span>` : ''}
            </div>
          </div>
          <div class="pm-card-time ${online?'online':''}">${fmtTime(m.loc?.updated_at)}</div>
        </div>
      `;
    }).join('');
  }
}

async function loadPosts(){
  const {data,error} = await sb.from('posts')
    .select('*, members(name,country)')
    .order('created_at',{ascending:false}).limit(30);

  const cont = document.getElementById('panel-board');
  if(error || !data || data.length === 0){
    cont.innerHTML = '<div class="empty">게시글 없음</div>';
    return;
  }
  cont.innerHTML = data.map(p=>`
    <div class="post-card">
      <div class="post-head">
        <span class="post-author">${flag(p.members?.country)} ${escapeHtml(p.members?.name||'익명')}</span>
        <span>${fmtFull(p.created_at)}</span>
      </div>
      <div class="post-title">${escapeHtml(p.title||'(제목없음)')}</div>
      <div class="post-body">${escapeHtml(p.body||'')}</div>
    </div>
  `).join('');
}

/* ====== SOS ====== */
async function loadSOS(){
  const {data} = await sb.from('sos_alerts')
    .select('*, members(name,country,phone)')
    .order('created_at',{ascending:false}).limit(50);

  const cont = document.getElementById('panel-sos');
  if(!data || data.length === 0){
    cont.innerHTML = '<div class="empty">SOS 알림 없음 ✅</div>';
    return;
  }
  cont.innerHTML = data.map(s=>`
    <div class="sos-card ${s.status==='resolved'?'resolved':''}">
      <div class="sos-info">
        <b>${flag(s.members?.country)} ${escapeHtml(s.members?.name||'?')} ${s.members?.phone||''}</b>
        <span>${fmtFull(s.created_at)} · 좌표: ${s.lat?.toFixed(4)||'?'},${s.lng?.toFixed(4)||'?'}</span>
        ${s.message ? `<span style="display:block;margin-top:4px">"${escapeHtml(s.message)}"</span>` : ''}
      </div>
      ${s.status==='pending' ? `
        <button onclick="resolveSOS('${s.id}','${s.member_id}')">해결됨</button>
      ` : '<span style="color:var(--mute);font-size:12px">처리 완료</span>'}
    </div>
  `).join('');
}

async function resolveSOS(id, memberId){
  await sb.from('sos_alerts').update({
    status:'resolved', resolved_at: new Date().toISOString(), resolved_by: me.id
  }).eq('id', id);
  toast('SOS 처리 완료');
  loadSOS();
  loadMembers();
}

/* ====== Realtime 구독 ====== */
function subscribeRealtime(){
  realtimeSub = sb.channel('admin-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'locations'},
      (payload)=>{
        const row = payload.new || payload.old;
        if(!row) return;
        const m = members.find(x=>x.id===row.member_id);
        if(m){
          m.loc = payload.new || null;
          updateStats(); renderList(); rebuildMarkers();
        } else {
          loadMembers(); // 새 회원이면 전체 다시
        }
      })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'sos_alerts'},
      (payload)=>{
        toast(`🆘 새 SOS 발생: ${payload.new.member_id?.slice(0,8)}`);
        loadMembers(); loadSOS();
        // 사운드 알림
        try{
          const a = new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQ==');
          a.play().catch(()=>{});
        } catch(e){}
      })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'posts'},
      ()=> loadPosts())
    .subscribe();
}

/* ====== 탭 ====== */
function switchTab(name){
  document.querySelectorAll('nav.tabs button').forEach(b=>{
    b.classList.toggle('on', b.dataset.tab === name);
  });
  document.querySelectorAll('.panel').forEach(p=>{
    p.classList.toggle('on', p.id === 'panel-'+name);
  });
}
document.querySelectorAll('nav.tabs button').forEach(b=>{
  b.onclick = ()=> switchTab(b.dataset.tab);
});

/* ====== 검색 / 필터 ====== */
document.getElementById('ml-search').addEventListener('input', renderList);
document.getElementById('pm-search').addEventListener('input', renderMembersTable);
document.querySelectorAll('.map-filters button').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('.map-filters button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    curFilter = b.dataset.filter;
    renderList();
    rebuildMarkers();
  };
});

/* ====== 유틸 ====== */
function escapeHtml(s){
  if(s==null) return '';
  return String(s).replace(/[&<>"']/g, c=>(
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

/* ====== 자동 로그인 (저장된 세션) ====== */
window.addEventListener('DOMContentLoaded', ()=>{
  const saved = localStorage.getItem('hands_admin');
  if(saved){
    try{
      me = JSON.parse(saved);
      enterApp();
    } catch(e){}
  }
});

/* Enter로 로그인 */
document.getElementById('lg-pw').addEventListener('keydown', e=>{
  if(e.key==='Enter') doLogin();
});
