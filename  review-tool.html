<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>레시피 검수 도구</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Noto Sans KR',sans-serif;background:#111;color:#e0e0e0;min-height:100vh}

.top-bar{padding:20px 24px;border-bottom:1px solid #222;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;background:rgba(17,17,17,0.95);backdrop-filter:blur(8px)}
.top-bar h1{font-size:18px;font-weight:800;color:#fff}
.top-bar .sub{font-size:11px;color:#666;margin-top:2px}
.api-row{display:flex;gap:8px;align-items:center}
.api-row input{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:8px 12px;color:#ccc;font-size:12px;width:320px;font-family:'JetBrains Mono',monospace}
.api-row input::placeholder{color:#555}

.main{max-width:1400px;margin:0 auto;padding:20px}

/* 업로드 영역 */
.upload-area{border:2px dashed #333;border-radius:16px;padding:48px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:24px}
.upload-area:hover{border-color:#9E7FBF;background:rgba(158,127,191,0.04)}
.upload-area .icon{font-size:40px;margin-bottom:12px}
.upload-area .txt{font-size:14px;color:#888}
.upload-area .txt b{color:#9E7FBF}

/* 결과 카드 */
.result-card{background:#1a1a1a;border:1px solid #262626;border-radius:16px;margin-bottom:20px;overflow:hidden}
.result-header{display:flex;gap:16px;padding:20px;border-bottom:1px solid #222}
.result-img{width:160px;height:160px;border-radius:12px;object-fit:cover;flex-shrink:0}
.result-meta{flex:1;min-width:0}
.result-filename{font-size:11px;color:#666;margin-bottom:8px;font-family:'JetBrains Mono',monospace}
.result-status{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;margin-bottom:8px}
.result-status.analyzing{background:rgba(158,127,191,0.15);color:#9E7FBF}
.result-status.done{background:rgba(80,200,120,0.15);color:#50C878}
.result-status.error{background:rgba(255,80,80,0.15);color:#FF5050}
.result-status.case1{background:rgba(255,165,0,0.15);color:#FFA500}
.result-status.case2{background:rgba(255,220,50,0.15);color:#FFD700}
.result-status.case3{background:rgba(80,200,120,0.15);color:#50C878}

.analysis-summary{margin-top:8px}
.analysis-summary .color-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.analysis-summary .swatch{width:28px;height:28px;border-radius:8px;border:1px solid #333;flex-shrink:0}
.analysis-summary .name{font-size:15px;font-weight:700;color:#fff}
.analysis-summary .tone{font-size:11px;color:#888}
.analysis-summary .elements{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.analysis-summary .el-tag{font-size:10px;padding:2px 7px;border-radius:5px;background:rgba(158,127,191,0.1);color:#9E7FBF;font-weight:600}
.analysis-summary .direction{font-size:11px;color:#888;margin-top:6px}

.result-body{display:grid;grid-template-columns:1fr 1fr;gap:0}
.result-col{padding:16px 20px;min-width:0}
.result-col:first-child{border-right:1px solid #222}
.col-title{font-size:11px;font-weight:700;color:#9E7FBF;letter-spacing:0.5px;margin-bottom:10px;text-transform:uppercase}

/* JSON 뷰 */
.json-view{background:#0d0d0d;border-radius:10px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7;color:#aaa;white-space:pre-wrap;word-break:break-all;max-height:500px;overflow-y:auto;border:1px solid #1a1a1a}
.json-view .key{color:#9E7FBF}
.json-view .str{color:#50C878}
.json-view .bool{color:#FFA500}
.json-view .null{color:#666}

/* 렌더링 미리보기 */
.preview-box{background:#FAFAF8;border-radius:12px;padding:16px;color:#1A1814}
.preview-box .p-summary{font-size:13px;font-weight:600;color:#1A1814;line-height:1.7;margin-bottom:4px}
.preview-box .p-note{font-size:10px;color:#999;margin-bottom:12px}
.preview-box .p-warning{background:#FFF8E7;border:1px solid #F0D58C;border-radius:8px;padding:10px;font-size:11px;color:#8B7355;line-height:1.6;margin-bottom:10px}
.preview-box .p-tips{background:#F5F3FF;border-radius:8px;padding:12px}
.preview-box .p-tips-title{font-size:12px;font-weight:700;color:#7B5EA7;margin-bottom:6px}
.preview-box .p-tips-text{font-size:12px;color:#555;line-height:1.8;white-space:pre-line}
.preview-box .p-virgin{background:rgba(158,127,191,0.06);border:1px solid rgba(158,127,191,0.15);border-radius:8px;padding:10px;margin-top:8px}
.preview-box .p-virgin-title{font-size:11px;font-weight:700;color:#9E7FBF;margin-bottom:4px}
.preview-box .p-virgin-text{font-size:11px;color:#666;line-height:1.7}

.case-badge{display:inline-block;padding:4px 12px;border-radius:8px;font-size:12px;font-weight:700;margin-top:8px}

/* 로딩 */
.spinner-sm{width:16px;height:16px;border:2px solid #333;border-top-color:#9E7FBF;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

input[type=file]{display:none}
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>🔍 레시피 검수 도구</h1>
    <div class="sub">사진 여러 장 → STEP1 분석 + STEP3 레시피 자동 검수</div>
  </div>
  <div class="api-row">
    <input type="text" id="apiUrl" placeholder="API URL (예: /api/recipe 또는 https://...)" value="/api/recipe"/>
  </div>
</div>

<div class="main">
  <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
    <div class="icon">📸</div>
    <div class="txt">검수할 사진을 <b>여러 장 선택</b>해주세요<br>한 번에 최대 20장</div>
  </div>
  <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)"/>

  <div id="results"></div>
</div>

function handleFiles(files) {
  API_URL = document.getElementById('apiUrl').value.trim();
  if (!API_URL) { alert('API URL을 입력해주세요'); return; }

  var container = document.getElementById('results');
  
  Array.from(files).forEach(function(file, idx) {
    var cardId = 'card-' + Date.now() + '-' + idx;
    
    var reader = new FileReader();
    reader.onload = function(e) {
      var base64Full = e.target.result;
      var base64Data = base64Full.split(',')[1];
      var mediaType = file.type || 'image/jpeg';

      // 카드 생성
      var card = document.createElement('div');
      card.className = 'result-card';
      card.id = cardId;
      card.innerHTML = '<div class="result-header">'
        + '<img class="result-img" src="' + base64Full + '"/>'
        + '<div class="result-meta">'
        + '<div class="result-filename">' + file.name + '</div>'
        + '<span class="result-status analyzing"><span class="spinner-sm"></span>STEP 1 분석 중...</span>'
        + '<div class="analysis-summary" id="' + cardId + '-analysis"></div>'
        + '</div></div>'
        + '<div class="result-body">'
        + '<div class="result-col"><div class="col-title">STEP 1 — 분석 JSON</div><div class="json-view" id="' + cardId + '-json1">분석 중...</div></div>'
        + '<div class="result-col"><div class="col-title">STEP 3 — 레시피 JSON (자연모 기준)</div><div class="json-view" id="' + cardId + '-json3">대기 중...</div></div>'
        + '</div>'
        + '<div style="padding:16px 20px;border-top:1px solid #222">'
        + '<div class="col-title">앱 화면 미리보기 (자연모)</div>'
        + '<div class="preview-box" id="' + cardId + '-preview">대기 중...</div>'
        + '</div>';
      container.prepend(card);

      // STEP 1 실행
      runStep1(cardId, base64Data, mediaType);
    };
    reader.readAsDataURL(file);
  });
}

function runStep1(cardId, base64, mediaType) {
  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 600,
      system: STEP1_SYSTEM,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
          { type: 'text', text: '이 사진 속 모발의 색감을 역공학 분석해줘.' }
        ]
      }]
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var txt = data.content.map(function(b) { return b.text || ''; }).join('');
    txt = txt.replace(/```json|```/g, '').trim();
    var result = JSON.parse(txt);

    // JSON 표시
    document.getElementById(cardId + '-json1').innerHTML = formatJson(result);

    // 분석 요약 표시
    var summaryEl = document.getElementById(cardId + '-analysis');
    var toneMap = { cool: '한색(쿨)', warm: '난색(웜)', neutral: '뉴트럴' };
    summaryEl.innerHTML = '<div class="color-row"><div class="swatch" style="background:' + (result.hex || '#ccc') + '"></div><div><div class="name">' + (result.color_name_ko || '—') + '</div><div class="tone">' + (toneMap[result.tone] || '—') + ' 계열</div></div></div>'
      + '<div class="elements">' + (result.elements || []).map(function(el) { return '<span class="el-tag">' + el + '</span>'; }).join('') + '</div>'
      + '<div class="direction">조색: ' + (result.recipe_direction || '') + '</div>';

    // 상태 업데이트
    var statusEl = document.querySelector('#' + cardId + ' .result-status');
    statusEl.className = 'result-status analyzing';
    statusEl.innerHTML = '<span class="spinner-sm"></span>STEP 3 레시피 생성 중...';

    // STEP 3 실행 (자연모 기준)
    runStep3(cardId, result);
  })
  .catch(function(err) {
    document.getElementById(cardId + '-json1').textContent = 'ERROR: ' + err.message;
    var statusEl = document.querySelector('#' + cardId + ' .result-status');
    statusEl.className = 'result-status error';
    statusEl.textContent = 'STEP 1 실패';
  });
}

function runStep3(cardId, analysis) {
  var baseDesc = '자연모/염색모 (동양인, 적색멜라닌 가득, 탈색 이력 없음, 약 5레벨)';

  var userMsg = [
    '현재 모발: ' + baseDesc,
    'AI 분석 색감: ' + analysis.color_name_ko,
    '톤: ' + analysis.tone,
    '색감 속성: ' + (analysis.elements ? analysis.elements.join(', ') : '없음'),
    '조색 방향: ' + (analysis.recipe_direction || ''),
    '색감 설명: ' + analysis.description,
    '',
    '레시피 만들어줘.'
  ].join('\n');

  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: STEP3_SYSTEM,
      messages: [{ role: 'user', content: userMsg }]
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var txt = data.content.map(function(b) { return b.text || ''; }).join('');
    txt = txt.replace(/```json|```/g, '').trim();
    var recipe = JSON.parse(txt);

    // JSON 표시
    document.getElementById(cardId + '-json3').innerHTML = formatJson(recipe);

    // 케이스 판정
    var caseNum = '?';
    var caseClass = 'done';
    if (recipe.ambiguous_warning) {
      caseNum = '2 (애매)';
      caseClass = 'case2';
    } else if (recipe.virgin_recipe) {
      caseNum = '1 (탈색필수)';
      caseClass = 'case1';
    } else if (!recipe.virgin_recipe) {
      // summary에 탈색이 없으면 케이스3
      if (recipe.summary && recipe.summary.indexOf('탈색') === -1) {
        caseNum = '3 (바로가능)';
        caseClass = 'case3';
      } else {
        caseNum = '탈색모';
        caseClass = 'done';
      }
    }

    var statusEl = document.querySelector('#' + cardId + ' .result-status');
    statusEl.className = 'result-status ' + caseClass;
    statusEl.textContent = '케이스 ' + caseNum;

    // 미리보기 렌더링
    renderPreview(cardId, recipe);
  })
  .catch(function(err) {
    document.getElementById(cardId + '-json3').textContent = 'ERROR: ' + err.message;
    var statusEl = document.querySelector('#' + cardId + ' .result-status');
    statusEl.className = 'result-status error';
    statusEl.textContent = 'STEP 3 실패';
  });
}

function renderPreview(cardId, recipe) {
  var el = document.getElementById(cardId + '-preview');
  var html = '';

  // summary
  html += '<div class="p-summary">' + (recipe.summary || '').replace(/\n/g, '<br>') + '</div>';
  html += '<div class="p-note">모질에 따라 탈색횟수는 차이가 날 수 있습니다</div>';

  var tipsHtml = (recipe.tips || '').replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
  tipsHtml = tipsHtml.replace(/<b>/g, '<b>').replace(/<\/b>/g, '</b>');

  // 케이스2: ⚠ → 버진모 → 더 선명 → 탈색
  if (recipe.ambiguous_warning && recipe.virgin_recipe) {
    html += '<div class="p-warning">⚠️ 이 사진은 조명을 가까이 비춰 촬영하여 실제보다 투명하고 밝게 보일 수 있어요. 버진모에서 연출한 색감인지, 탈색 후 연출한 색감인지 판단이 어려워요. 두 가지 경우 모두 안내해드릴게요.</div>';

    html += '<div class="p-tips">';
    var vr = recipe.virgin_recipe;
    html += '<div class="p-virgin"><div class="p-virgin-title">' + (vr.title || '버진모에서 연출하려면') + '</div><div class="p-virgin-text">' + (vr.text || '') + '</div></div>';
    if (vr.extra) {
      html += '<div class="p-virgin" style="margin-top:8px"><div class="p-virgin-title">더 선명하게 연출하려면</div><div class="p-virgin-text">' + vr.extra + '</div></div>';
    }
    html += '<div class="p-tips-title" style="margin-top:12px">💡 탈색 후 레시피</div><div class="p-tips-text">' + tipsHtml + '</div>';
    html += '</div>';

  } else {
    // 일반: 탈색 먼저 + 버진모 보조
    html += '<div class="p-tips"><div class="p-tips-title">💡 실무조언</div><div class="p-tips-text">' + tipsHtml + '</div>';
    if (recipe.virgin_recipe) {
      var vr2 = recipe.virgin_recipe;
      html += '<div class="p-virgin"><div class="p-virgin-title">' + (vr2.title || '탈색 없이 연출하려면') + '</div><div class="p-virgin-text">' + (vr2.text || '') + '</div></div>';
    }
    html += '</div>';
  }

  el.innerHTML = html;
}

function formatJson(obj) {
  var str = JSON.stringify(obj, null, 2);
  return str
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"([^"]+)":/g, '<span class="key">"$1"</span>:')
    .replace(/: "((?:[^"\\]|\\.)*)"/g, ': <span class="str">"$1"</span>')
    .replace(/: (true|false)/g, ': <span class="bool">$1</span>')
    .replace(/: (null)/g, ': <span class="null">$1</span>');
}
</script>
