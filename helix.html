<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>HELIX OS · 미용 이론 플랫폼</title>
<style>
:root{
  --lime:#C7F050; --lime2:#9fd62e; --ink:#070809; --ink2:#0c0f10;
  --line:rgba(199,240,80,.30); --line2:rgba(199,240,80,.14);
  --dim:#5d6b3a; --txt:#dfeecf; --warm:#ffb347; --cool:#5ad0ff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--ink);overflow:hidden;
  font-family:-apple-system,"SF Pro",system-ui,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  color:var(--txt);user-select:none}
#app{position:fixed;inset:0;overflow:hidden;perspective:1300px;
  background:
    radial-gradient(1200px 800px at 50% -10%, rgba(199,240,80,.06), transparent 60%),
    radial-gradient(900px 600px at 50% 120%, rgba(90,208,255,.05), transparent 60%),
    var(--ink);}
#app::before{content:"";position:absolute;inset:-20%;opacity:.5;pointer-events:none;
  background-image:linear-gradient(var(--line2) 1px,transparent 1px),linear-gradient(90deg,var(--line2) 1px,transparent 1px);
  background-size:46px 46px;
  -webkit-mask:radial-gradient(circle at 50% 42%, #000 0%, transparent 75%);
  mask:radial-gradient(circle at 50% 42%, #000 0%, transparent 75%);}
#stage{position:absolute;inset:0;transform-style:preserve-3d}

/* ===== 화면 + 자비스 플라이 모션 ===== */
.screen{position:absolute;inset:0;overflow:hidden;transform-origin:50% 50%;will-change:transform,opacity;
  transition:transform .64s cubic-bezier(.6,0,.22,1),opacity .55s ease,filter .55s;
  background:radial-gradient(125% 85% at 50% 6%,#0d1107 0%,#070809 58%)}
.s-enter-in{transform:scale(.20);opacity:0;filter:blur(4px)}
.s-leave-in{transform:scale(2.6);opacity:0;filter:blur(3px)}
.s-enter-out{transform:scale(2.6);opacity:0;filter:blur(3px)}
.s-leave-out{transform:scale(.20);opacity:0;filter:blur(4px)}
.screen.dive{transform:scale(1.34)!important;opacity:.16!important;filter:blur(3px)!important}
.grid{position:absolute;inset:-20%;background-image:linear-gradient(var(--line2) 1px,transparent 1px),linear-gradient(90deg,var(--line2) 1px,transparent 1px);background-size:46px 46px;opacity:.4;pointer-events:none}

/* ===== 공통 바 ===== */
.bar{position:relative;z-index:6;display:flex;align-items:center;gap:12px;
  padding:calc(env(safe-area-inset-top,8px) + 16px) 18px 10px}
.back{width:36px;height:36px;flex:0 0 36px;border:1px solid var(--line);border-radius:50%;
  display:grid;place-items:center;color:var(--lime);font-size:19px;background:rgba(199,240,80,.04);cursor:pointer}
.crumb{font-size:12px;letter-spacing:.04em;color:#aab3a2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crumb b{color:var(--lime);font-weight:700}
.body{position:absolute;inset:0;top:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  padding-top:calc(env(safe-area-inset-top,8px) + 60px);padding-bottom:46px}
.body::-webkit-scrollbar{display:none}

/* ===== HELIX OS 코어 루트 ===== */
.helix{position:absolute;top:env(safe-area-inset-top,0);right:0;bottom:env(safe-area-inset-bottom,0);left:0;overflow:hidden}
.hx-head{position:absolute;top:18px;left:0;right:0;text-align:center;z-index:4}
.hx-kicker{font-size:10px;letter-spacing:.52em;color:var(--lime2);margin-bottom:5px}
.hx-os{font-size:32px;font-weight:800;letter-spacing:.14em;color:#fff;
  text-shadow:0 0 26px rgba(199,240,80,.4)}
.hx-os span{color:var(--lime)}
.hx-sub{font-size:10.5px;letter-spacing:.26em;color:var(--dim);margin-top:5px}
.hx-exit{position:absolute;top:12px;left:14px;z-index:6;width:36px;height:36px;border:1px solid var(--line);border-radius:50%;
  display:grid;place-items:center;color:var(--lime);font-size:19px;background:rgba(199,240,80,.04);cursor:pointer;
  transition:border-color .2s,transform .14s,box-shadow .2s}
.hx-exit:active{transform:scale(.92);border-color:var(--lime);box-shadow:0 0 18px rgba(199,240,80,.35)}
.hx-lines{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}
.hx-line{stroke:rgba(199,240,80,.22);stroke-width:.35;stroke-dasharray:1.1 1.5;fill:none}
.hx-spark{fill:var(--lime)}
/* 코어 */
.hx-core{position:absolute;left:50%;top:53%;transform:translate(-50%,-50%);width:184px;height:184px;z-index:2;
  display:grid;place-items:center}
.hx-core svg{width:184px;height:184px;overflow:visible}
.hx-core .clabel{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.hx-core .clabel .t{font-size:11px;font-weight:800;letter-spacing:.16em;color:var(--lime);text-shadow:0 0 12px rgba(199,240,80,.6)}
.hx-core .clabel .s{font-size:8px;letter-spacing:.2em;color:var(--dim);margin-top:3px}
.spin-s{transform-origin:100px 100px;animation:spin 34s linear infinite}
.spin-r{transform-origin:100px 100px;animation:spinR 22s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spinR{to{transform:rotate(-360deg)}}
.cpulse{animation:cpulse 2.8s ease-in-out infinite}
@keyframes cpulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}
/* 궤도 노드 */
.hx-node{position:absolute;transform:translate(-50%,-50%);width:104px;text-align:center;cursor:pointer;z-index:3}
.hx-node .nring{width:72px;height:72px;margin:0 auto;border-radius:50%;border:1.5px solid var(--line);
  display:grid;place-items:center;position:relative;
  background:radial-gradient(circle,rgba(199,240,80,.10),rgba(7,8,9,.7) 72%);
  transition:border-color .25s,transform .14s,box-shadow .25s}
.hx-node .nring::after{content:"";position:absolute;inset:-6px;border-radius:50%;border:1px solid rgba(199,240,80,.16);
  animation:nodepulse 2.8s ease-in-out infinite}
@keyframes nodepulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.14);opacity:.1}}
.hx-node .nring svg{width:38px;height:38px}
.hx-node:active .nring{transform:scale(.94);border-color:var(--lime);box-shadow:0 0 22px rgba(199,240,80,.4)}
.hx-node .nn{font-size:13.5px;font-weight:800;color:#fff;margin-top:11px;letter-spacing:.01em}
.hx-node .ns{font-size:9.5px;color:var(--dim);margin-top:3px;letter-spacing:.02em}
.hx-node .nbadge{position:absolute;top:-2px;right:14px;font-size:8.5px;color:var(--ink);background:var(--lime);
  border-radius:20px;padding:1px 6px;font-weight:800;letter-spacing:.04em}
/* 언더톤 사진 카드 노드 (둥둥 떠서 좌우로 흔들림) */
.hx-node.isPho{width:96px}
.hx-node.isPho .nbadge{right:50%;transform:translateX(50%);top:-9px;z-index:5}
.npho{position:relative;width:88px;height:150px;margin:0 auto;border-radius:15px;overflow:hidden;
  border:1.5px solid rgba(199,240,80,.5);box-shadow:0 10px 30px rgba(0,0,0,.55),0 0 26px rgba(199,240,80,.22);
  animation:bob 4.4s ease-in-out infinite alternate}
.npho-img{position:absolute;inset:0;background-size:cover;background-position:center top;filter:saturate(1.06) brightness(1.06)}
.npho-coil{background:radial-gradient(120% 90% at 50% 42%,rgba(31,42,16,.65),rgba(8,11,7,.96))}
.npho-coil svg{position:absolute;inset:0;width:100%;height:100%;display:block}
.npho-fr{position:absolute;inset:0;border-radius:14px;pointer-events:none;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.12),inset 0 -36px 30px -16px rgba(7,9,6,.7)}
.npho-scan{position:absolute;left:0;right:0;height:34px;top:-34px;pointer-events:none;
  background:linear-gradient(rgba(199,240,80,0),rgba(199,240,80,.16),rgba(199,240,80,0));animation:sweepMove 3.4s ease-in-out infinite}
/* 레시피추론 카드: 업로드된 언더톤 8장을 자비스풍 크로스페이드 순환 */
.npho-cyc{position:absolute;inset:0;background-size:cover;background-position:center top;
  filter:saturate(1.06) brightness(1.06);opacity:0;animation:phoCyc 8s linear infinite}
@keyframes phoCyc{0%{opacity:0}3%{opacity:1}14%{opacity:1}17%{opacity:0}100%{opacity:0}}
/* 멜라닌 카드: 작은 명도 칸을 라임 하이라이트가 하나씩 짚어감 */
.npho-cells{position:absolute;right:5px;top:9px;bottom:9px;z-index:3;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none}
.ncell{width:12px;height:8px;border-radius:2px;border:1px solid rgba(199,240,80,.32);background:rgba(8,12,6,.32);animation:cellSel 9.6s linear infinite}
@keyframes cellSel{0%,100%{border-color:rgba(199,240,80,.32);background:rgba(8,12,6,.32);box-shadow:none}
  4%{border-color:var(--lime);background:rgba(199,240,80,.32);box-shadow:0 0 9px rgba(199,240,80,.6);transform:scale(1.25)}
  10%{border-color:var(--lime);background:rgba(199,240,80,.32);box-shadow:0 0 9px rgba(199,240,80,.6);transform:scale(1.25)}
  13%{border-color:rgba(199,240,80,.32);background:rgba(8,12,6,.32);box-shadow:none;transform:scale(1)}}
.hx-node.isPho:active .npho{transform:scale(.96);border-color:var(--lime);box-shadow:0 0 30px rgba(199,240,80,.5)}
@keyframes bob{0%{transform:translate(-5px,2px)}50%{transform:translate(0,-4px)}100%{transform:translate(5px,2px)}}
/* 줌(다이브): 누른 카드 지점으로 카메라가 돌진 — 대문이 그 점 중심으로 확대되며 바깥으로 쏟아져 나감 */
.screen.divein{transform:scale(2.6);opacity:0;filter:blur(4px);pointer-events:none;
  transition:transform .62s cubic-bezier(.6,0,.22,1),opacity .5s ease,filter .55s ease}
.screen.diving .bar,.screen.diving .cj-top,.screen.diving .cj-pig,.screen.diving .cj-spine,
.screen.diving .cj-hint,.screen.diving .cj-hud{opacity:0}
.screen .bar,.screen .cj-top,.screen .cj-pig,.screen .cj-spine,.screen .cj-hint,.screen .cj-hud{transition:opacity .45s ease .05s}
.hx-here{position:absolute;bottom:16px;left:0;right:0;text-align:center;
  font-size:10px;letter-spacing:.24em;color:#5c6356;z-index:4}

/* ===== HUB (목차: 그룹 + 모듈) ===== */
.hub-head{padding:4px 20px 12px}
.hub-name{font-size:23px;font-weight:800;color:#fff}.hub-name span{color:var(--lime)}
.hub-tag{font-size:12px;color:var(--dim);margin-top:6px;line-height:1.5}
.group{margin:0 14px 14px;border:1px solid var(--line2);border-radius:18px;padding:13px 12px 8px;
  background:rgba(255,255,255,.012)}
.group-label{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.14em;color:var(--lime2);
  text-transform:uppercase;margin:0 4px 11px}
.group-label .gi{font-size:10px;color:var(--ink);background:var(--lime);border-radius:6px;padding:2px 6px;font-weight:800}
.group-label .gt{font-size:10px;color:var(--dim);font-style:italic;letter-spacing:.02em;margin-left:auto;text-transform:none}
.mods{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding-bottom:6px}
.node{position:relative;border:1px solid var(--line);border-radius:14px;padding:11px 11px 12px;
  background:linear-gradient(155deg,rgba(199,240,80,.05),rgba(199,240,80,.004));cursor:pointer;
  display:flex;flex-direction:column;gap:8px;min-height:96px;overflow:hidden;transition:transform .12s,border-color .25s}
.node:active{transform:scale(.97);border-color:var(--lime2)}
.node .nviz{height:42px;display:flex;align-items:center}
.node .nname{font-size:13px;font-weight:700;color:#eaf6d6;line-height:1.2}
.node .ntag{font-size:9.5px;color:var(--dim);line-height:1.4}
.node .ncount{position:absolute;right:9px;top:9px;font-size:9px;color:var(--lime2);border:1px solid var(--line2);border-radius:20px;padding:1px 6px}
.node.wide{grid-column:1/3;flex-direction:row;align-items:center;min-height:72px}
.node.wide .nviz{flex:0 0 56px;height:48px}
.node.wide .ninfo{flex:1}

/* ===== MODULE (카드) ===== */
.mod-hero{position:relative;margin:2px 14px 6px;border:1px solid var(--line);border-radius:20px;padding:17px;
  background:linear-gradient(160deg,rgba(199,240,80,.08),rgba(199,240,80,.01));
  display:flex;gap:14px;align-items:center;overflow:hidden}
.mod-hero .mh-viz{flex:0 0 70px;height:70px}
.mod-hero .mh-name{font-size:18px;font-weight:800;color:#fff}
.mod-hero .mh-tag{font-size:11px;color:var(--dim);margin-top:5px;line-height:1.5}
.cards{padding:6px 14px 0}
.card{position:relative;border:1px solid var(--line2);border-radius:16px;margin-bottom:10px;padding:14px 15px;
  background:rgba(255,255,255,.014);cursor:pointer;display:flex;gap:13px;align-items:flex-start;
  transition:transform .12s,border-color .3s,background .3s}
.card:active{transform:scale(.99);border-color:var(--lime2)}
.card .cviz{flex:0 0 46px;height:46px;margin-top:2px}
.card .cinfo{flex:1;min-width:0}
.card .ct{font-size:14.5px;font-weight:700;color:var(--lime);margin-bottom:5px;line-height:1.3}
.card .cb{font-size:12.5px;color:var(--txt);line-height:1.66;opacity:.9}
.card .cb em{color:var(--warm);font-style:normal;font-weight:600}
.card .cb i{color:var(--cool);font-style:normal;font-weight:600}
.card .cb b{color:#fff;font-weight:700}
.card .more{font-size:10px;color:var(--lime2);opacity:.6;margin-top:8px;letter-spacing:.1em}

/* ===== 교재 흐름 (textbook flow) ===== */
.tbook{padding:2px 14px 24px}
.tb-lead-in{margin:0 2px 14px;padding:13px 15px;border-left:2px solid var(--lime2);
  background:linear-gradient(100deg,rgba(199,240,80,.06),transparent);border-radius:0 12px 12px 0}
.tb-lead-in .tl{font-size:11px;color:var(--lime);font-weight:800;letter-spacing:.14em;margin-bottom:6px}
.tb-lead-in .tx{font-size:12.5px;color:var(--txt);line-height:1.7}
.tb-lead-in .tx b{color:#fff;font-weight:700}.tb-lead-in .tx em{color:var(--warm);font-style:normal;font-weight:600}
.tb-sec{position:relative;padding:16px 0 18px;border-bottom:1px solid var(--line2)}
.tb-sec:last-child{border-bottom:0}
.tb-head{display:flex;gap:11px;align-items:flex-start;margin-bottom:11px}
.tb-num{flex:0 0 auto;font-size:11px;font-weight:800;color:#0b0c0d;background:var(--lime);
  border-radius:7px;padding:3px 7px;letter-spacing:.05em;margin-top:2px}
.tb-htxt{flex:1;min-width:0}
.tb-st{font-size:9.5px;color:var(--lime2);letter-spacing:.16em;font-weight:700;opacity:.8}
.tb-t{font-size:16px;font-weight:800;color:#fff;line-height:1.32;margin-top:3px}
.tb-viz{flex:0 0 44px;height:44px;opacity:.9}
.tb-lead{font-size:13px;color:var(--lime);font-weight:700;line-height:1.6;margin:0 2px 9px}
.tb-lead .k{color:#fff;background:rgba(199,240,80,.16);border-radius:4px;padding:0 4px;font-weight:700}
.tb-b{font-size:13px;color:var(--txt);line-height:1.85;margin:0 2px}
.tb-b b{color:#fff;font-weight:700}
.tb-b em{color:var(--warm);font-style:normal;font-weight:600}
.tb-b i{color:var(--cool);font-style:normal;font-weight:600}
.tb-b .k{color:var(--lime);font-weight:700}
.tb-b br{content:"";display:block;margin-top:7px}

/* ===== 상황판 (JARVIS BOARD) — 주제 안 = 칸 격자 ===== */
.board{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:8px 14px 34px}
.panel{position:relative;border:1px solid var(--line2);border-radius:16px;padding:15px 11px 13px;min-height:148px;
  background:linear-gradient(162deg,rgba(199,240,80,.055),rgba(199,240,80,.004));cursor:pointer;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;text-align:center;gap:9px;
  transition:transform .15s,border-color .3s,box-shadow .3s}
.panel:active{transform:scale(.965);border-color:var(--lime);box-shadow:0 0 22px rgba(199,240,80,.28)}
.panel::before{content:'';position:absolute;left:0;top:0;width:100%;height:1px;opacity:.55;
  background:linear-gradient(90deg,transparent,var(--lime),transparent);animation:topsweep 3.2s ease-in-out infinite}
.panel .pn-no{position:absolute;left:10px;top:9px;font-size:9px;font-weight:800;color:var(--lime2);letter-spacing:.06em}
.panel .pn-viz{width:58px;height:58px;margin-top:10px}
.panel .pn-viz svg{filter:drop-shadow(0 0 6px rgba(199,240,80,.22))}
.panel .pn-st{font-size:8px;letter-spacing:.16em;color:var(--lime2);opacity:.78;font-weight:700;margin-bottom:2px}
.panel .pn-t{font-size:13px;font-weight:800;color:#eaf6d6;line-height:1.32}
.panel .pn-hint{position:absolute;right:10px;bottom:9px;font-size:8px;color:var(--lime);opacity:.5;letter-spacing:.1em}

/* ===== 상세 = 누른 카드에서 빨려나와 펼침 (JARVIS) ===== */
#ov{position:absolute;inset:0;z-index:30;display:grid;place-items:center;pointer-events:none;perspective:1250px}
#ov.on{pointer-events:auto}
#ov .veil{position:absolute;inset:0;background:rgba(3,4,3,.64);opacity:0;transition:opacity .5s}
#ov.show .veil{opacity:1}
#ov .sheet{position:relative;width:88%;max-width:480px;max-height:82vh;overflow-y:auto;
  border:1px solid var(--lime);border-radius:22px;
  background:linear-gradient(160deg,rgba(20,26,10,.97),rgba(8,10,6,.985));
  box-shadow:0 0 0 1px rgba(199,240,80,.15),0 26px 60px -20px rgba(199,240,80,.34),0 0 70px -30px var(--lime);
  transform-origin:center;
  transform:translate(var(--dx,0),var(--dy,0)) scale(.16) rotateY(-18deg) rotateX(6deg);opacity:0;
  transition:transform .62s cubic-bezier(.16,1,.3,1),opacity .4s ease;will-change:transform,opacity}
#ov .sheet::-webkit-scrollbar{display:none}
#ov.show .sheet{transform:translate(0,0) scale(1) rotateY(0) rotateX(0);opacity:1}
#ov .sweep{position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(115deg,transparent 35%,rgba(199,240,80,.18) 50%,transparent 65%);
  transform:translateX(-120%);opacity:0}
#ov.show .sweep{animation:sweep .9s ease .25s 1 forwards}
@keyframes sweep{0%{transform:translateX(-120%);opacity:1}100%{transform:translateX(120%);opacity:0}}
#ov .si{padding:24px 22px 26px}
#ov .si>*{opacity:0;transform:translateY(13px);transition:opacity .42s ease,transform .52s cubic-bezier(.16,1,.3,1)}
#ov.show .si>*{opacity:1;transform:none}
#ov.show .si .scap{transition-delay:.20s}
#ov.show .si .svz{transition-delay:.26s}
#ov.show .si .sh{transition-delay:.32s}
#ov.show .si .sld{transition-delay:.40s}
#ov.show .si .sp{transition-delay:.48s}
#ov.show .si .cls{transition-delay:.60s}
#ov .scap{letter-spacing:.3em;font-size:10px;color:var(--lime2);margin-bottom:10px}
#ov .svz{height:118px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;perspective:620px}
#ov .viz3d{width:108px;height:108px;transform-style:preserve-3d;animation:spin3d 7.5s linear infinite}
#ov .viz3d svg{width:108px;height:108px;filter:drop-shadow(0 0 12px rgba(199,240,80,.4))}
@keyframes spin3d{0%{transform:rotateY(0)}100%{transform:rotateY(360deg)}}
#ov .viz3d.still{animation:floatv 4.5s ease-in-out infinite}
#ov .sh{font-size:20px;font-weight:800;color:#fff;margin-bottom:11px;line-height:1.32}
#ov .sld{font-size:14px;line-height:1.7;color:var(--lime);font-weight:700;margin-bottom:13px}
#ov .sld .k{color:#fff;background:rgba(199,240,80,.16);border-radius:4px;padding:0 4px}
#ov .sp{font-size:13.5px;line-height:1.86;color:var(--txt)}
#ov .sp br{content:"";display:block;margin-top:9px}
#ov .sp .k{color:var(--lime);font-weight:700}
#ov .sp b{color:#fff;font-weight:700}#ov .sp em{color:var(--warm);font-style:normal;font-weight:600}
#ov .sp i{color:var(--cool);font-style:normal;font-weight:600}
#ov .sp .lead{color:var(--lime);font-weight:700}
#ov .cls{margin-top:22px;text-align:center;font-size:12px;letter-spacing:.2em;color:var(--lime2);opacity:.75;cursor:pointer}

/* ===== 레시피 추론 (멜라닌 저니) ===== */
.ij-wrap{position:absolute;inset:0;top:calc(env(safe-area-inset-top,8px) + 60px);bottom:0}
.ij-screen{position:absolute;inset:0;opacity:0;pointer-events:none;transform:scale(.96);
  transition:opacity .5s ease,transform .5s cubic-bezier(.2,.8,.3,1);overflow-y:auto;
  padding:6px 16px 96px;-webkit-overflow-scrolling:touch}
.ij-screen::-webkit-scrollbar{display:none}
.ij-screen.active{opacity:1;pointer-events:auto;transform:none}
.ij-cap{font-size:10px;letter-spacing:.2em;color:var(--lime);margin-bottom:12px}
.ij-cap b{color:var(--dim);font-weight:400;margin-left:6px;letter-spacing:.04em}
.ij-tip{border:1px dashed var(--line);border-radius:12px;padding:11px 13px;background:rgba(199,240,80,.05);margin-bottom:14px}
.ij-tip .tt{display:block;font-size:8.5px;letter-spacing:.22em;color:var(--lime);font-weight:700;margin-bottom:6px}
.ij-tip .tt::before{content:'◇ '}
.ij-tip p{font-size:11.5px;line-height:1.66;color:#c2c8b6}.ij-tip p b{color:var(--lime)}
.holo{border:1px solid var(--line);border-radius:14px;padding:16px;position:relative;overflow:hidden;
  background:linear-gradient(180deg,rgba(199,240,80,.06),rgba(16,20,14,.72))}
.holo::before{content:'';position:absolute;left:0;top:0;width:100%;height:1px;
  background:linear-gradient(90deg,transparent,var(--lime),transparent);animation:topsweep 2.4s ease-in-out infinite}
@keyframes topsweep{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.theory h3{font-size:16px;margin-bottom:11px;color:#fff;line-height:1.3}
.theory .ln{display:block;font-size:13px;line-height:1.85;color:#d6dac9;margin-bottom:4px}
.theory .ln b{color:#fff}.theory .ln em{color:var(--warm);font-style:normal;font-weight:600}
.theory .ln.mix{color:var(--lime);text-shadow:0 0 8px rgba(199,240,80,.4)}
.spectrum{display:flex;height:16px;border-radius:8px;overflow:hidden;margin:12px 0 6px;border:1px solid var(--line)}
.spectrum i{flex:1}
/* 진단 프레임 */
.frame{position:relative;width:100%;height:54vh;max-height:440px;min-height:340px;overflow:hidden;border-radius:12px;
  border:1px solid var(--line);touch-action:none;background:#111;margin-bottom:6px}
.frame img.base{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#0b0d09;filter:saturate(1.05) contrast(1.03)}
.half{position:absolute;top:0;bottom:0;width:50%;z-index:4;cursor:pointer;background:rgba(3,5,8,0);transition:background .45s}
.half.l{left:0}.half.r{right:0}
.half.l:active{background:rgba(90,208,255,.28)}.half.r:active{background:rgba(255,179,71,.28)}
.half.dim{background:rgba(3,5,8,.74)}
.htag{position:absolute;top:11px;z-index:5;font-weight:700;font-size:12px;letter-spacing:.08em;
  display:flex;flex-direction:column;line-height:1.25;pointer-events:none;text-shadow:0 2px 8px #000;transition:opacity .4s}
.htag small{font-size:8px;font-weight:400;letter-spacing:.1em;opacity:.8;margin-top:2px}
.htag.l{left:12px;align-items:flex-start;color:var(--cool)}
.htag.r{right:12px;align-items:flex-end;color:var(--warm)}
.frame.picked .htag{opacity:.3}
.fork-prompt{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);z-index:6;text-align:center;
  font-size:12px;font-weight:600;letter-spacing:.06em;color:var(--lime);text-shadow:0 2px 12px #000;padding:0 18px;
  pointer-events:none;transition:opacity .4s}
.fork-prompt b{display:block;font-size:9px;font-weight:400;color:var(--dim);margin-top:6px;letter-spacing:.18em}
.frame.picked .fork-prompt{opacity:0}
.split{position:absolute;top:0;bottom:0;left:50%;width:1px;z-index:5;background:linear-gradient(var(--lime),transparent 60%);opacity:.5;pointer-events:none}
.brk{position:absolute;width:18px;height:18px;border:2px solid var(--lime);z-index:6;opacity:.85;pointer-events:none}
.brk.tl{top:8px;left:8px;border-right:0;border-bottom:0}.brk.tr{top:8px;right:8px;border-left:0;border-bottom:0}
.brk.bl{bottom:8px;left:8px;border-right:0;border-top:0}.brk.br{bottom:8px;right:8px;border-left:0;border-top:0}
.fsweep{position:absolute;left:0;right:0;height:70px;z-index:5;pointer-events:none;
  background:linear-gradient(rgba(199,240,80,0),rgba(199,240,80,.12),rgba(199,240,80,0));animation:sweepMove 3.4s ease-in-out infinite}
@keyframes sweepMove{0%{top:-70px}100%{top:100%}}
.reticle{position:absolute;left:0;right:0;height:0;z-index:7;pointer-events:none;transition:top .12s;display:none}
.frame.picked .reticle{display:block}
.reticle .rline{position:absolute;left:0;right:0;top:0;height:2px;background:var(--lime);box-shadow:0 0 14px var(--lime);transform:translateY(-50%)}
.reticle .rtag{position:absolute;right:5px;top:50%;transform:translateY(-50%);background:rgba(7,8,9,.85);border:1px solid var(--line);
  border-radius:6px;padding:3px 7px;font-size:11px;color:var(--lime);font-weight:700;white-space:nowrap}
.reticle .rtag small{color:var(--dim);font-weight:400;margin-left:5px}
.reticle.lock .rline{animation:lockP .4s}
@keyframes lockP{0%{box-shadow:0 0 4px var(--lime)}50%{box-shadow:0 0 26px var(--lime)}100%{box-shadow:0 0 14px var(--lime)}}
.lead-next{margin:18px 0 4px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;opacity:.75;transition:opacity .3s}
.lead-next.dim{opacity:0;pointer-events:none;height:0;margin:0;overflow:hidden}
.lead-next:active{opacity:1}
.lead-next .dash{width:1px;height:26px;background:repeating-linear-gradient(180deg,var(--lime) 0 4px,transparent 4px 9px);opacity:.5}
.lead-next .lt{font-size:9px;letter-spacing:.12em;color:rgba(199,240,80,.75)}
.lead-next .chev{font-size:13px;color:var(--lime);animation:chevB 1.8s ease-in-out infinite;text-shadow:0 0 8px var(--lime)}
@keyframes chevB{0%,100%{transform:translateY(0);opacity:.6}50%{transform:translateY(4px);opacity:1}}
/* 컬러져니 단일 현황판 (HELIX 보드) */
.cj-board{position:absolute;inset:0;top:calc(env(safe-area-inset-top,8px) + 60px);overflow:hidden;background:radial-gradient(125% 85% at 50% 4%,#0c1108 0%,#060806 62%);perspective:1300px}
.cj-bg{position:absolute;inset:0;z-index:1;touch-action:none;cursor:ns-resize;transform-style:preserve-3d}
.cj-bgimg{position:absolute;inset:0;background-size:cover;background-position:center top;opacity:0;transition:opacity .55s ease;filter:saturate(1.06) contrast(1.03) brightness(1.08)}
.cj-bgimg.on{opacity:1}
.cj-bg.focus{animation:subjFocus .68s cubic-bezier(.4,0,.2,1)}
@keyframes subjFocus{0%{transform:rotateY(0) scale(1);filter:none}38%{transform:rotateY(4.5deg) scale(1.06);filter:brightness(1.16) saturate(1.14)}100%{transform:rotateY(0) scale(1)}}
.cj-veil{position:absolute;inset:0;z-index:2;pointer-events:none;background:
  linear-gradient(180deg,rgba(7,9,6,0) 0%,rgba(7,9,6,.05) 40%,rgba(7,9,6,.5) 74%,rgba(7,9,6,.86) 100%),
  repeating-linear-gradient(0deg,rgba(199,240,80,.035) 0px,rgba(199,240,80,.035) 1px,transparent 1px,transparent 3px)}
.cj-scan{position:absolute;left:0;right:0;height:70px;z-index:3;pointer-events:none;
  background:linear-gradient(rgba(199,240,80,0),rgba(199,240,80,.13),rgba(199,240,80,0));animation:sweepMove 3.6s ease-in-out infinite}
/* 홀로그램 조준 프레임 (대상 모서리 괄호) */
.cj-frame{position:absolute;inset:14px 14px 0;z-index:4;pointer-events:none}
.cj-frame i{position:absolute;width:22px;height:22px;border:1.5px solid rgba(199,240,80,.55);box-shadow:0 0 9px rgba(199,240,80,.25)}
.cj-frame i:nth-child(1){top:0;left:0;border-right:0;border-bottom:0}
.cj-frame i:nth-child(2){top:0;right:0;border-left:0;border-bottom:0}
.cj-frame i:nth-child(3){bottom:0;left:0;border-right:0;border-top:0}
.cj-frame i:nth-child(4){bottom:0;right:0;border-left:0;border-top:0}
/* 떠 있는 홀로 태그 (좌상단) */
.cj-top{position:absolute;left:14px;top:14px;z-index:6;pointer-events:none;padding:5px 10px;border-radius:10px;
  background:rgba(10,15,8,.42);border:1px solid rgba(199,240,80,.3);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);box-shadow:0 0 16px rgba(199,240,80,.12)}
.cj-lv{font-size:13px;font-weight:800;letter-spacing:.08em;color:var(--lime);text-shadow:0 0 10px rgba(199,240,80,.5)}
.cj-short{font-size:8px;letter-spacing:.2em;color:#cdd2c0;margin-top:1px}
.cj-pig{position:absolute;left:14px;top:60px;z-index:6;pointer-events:none;padding:6px 8px 7px;border-radius:11px;
  background:rgba(10,15,8,.42);border:1px solid rgba(199,240,80,.26);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);text-align:center}
.cp-cap{font-size:7px;letter-spacing:.12em;color:#cdd2c0;margin-bottom:4px}
.cp-sw{width:34px;height:40px;border-radius:6px;border:1px solid rgba(199,240,80,.45);box-shadow:0 0 12px rgba(0,0,0,.5),0 0 10px rgba(199,240,80,.18);transition:background .5s}
.cp-nm{font-size:7.5px;color:var(--warm);font-weight:600;margin-top:4px;max-width:64px;line-height:1.3}
.cj-spine{position:absolute;right:12px;top:46%;transform:translateY(-50%);z-index:7;display:flex;flex-direction:column;gap:14px;touch-action:none}
.cj-seg{display:flex;align-items:center;justify-content:flex-end;gap:10px;cursor:pointer;opacity:.55;transition:opacity .25s,transform .25s}
.cj-seg .cs-lv{font-size:12px;font-weight:700;color:#cdd2c0;text-shadow:0 1px 4px #000;min-width:20px;text-align:right}
.cj-seg .cs-dot{width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(255,255,255,.4);box-shadow:0 1px 5px rgba(0,0,0,.55);transition:transform .25s,box-shadow .25s,border-color .25s}
.cj-seg.on{opacity:1}
.cj-seg.on .cs-lv{color:var(--lime);font-size:14.5px}
.cj-seg.on .cs-dot{transform:scale(1.5);border:2.5px solid var(--lime);box-shadow:0 0 0 3px rgba(199,240,80,.3),0 0 13px rgba(199,240,80,.55)}
.cj-hint{position:absolute;right:74px;top:46%;transform:translateY(-50%);z-index:6;writing-mode:vertical-rl;
  font-size:9.5px;font-weight:600;letter-spacing:.14em;color:rgba(199,240,80,.82);text-shadow:0 1px 5px #000,0 0 8px rgba(0,0,0,.6);pointer-events:none;animation:utPulse 2.4s ease-in-out infinite;white-space:nowrap}
.cj-hint.hide{opacity:0;transition:opacity .4s}
/* HUD = 떠 있는 홀로그램 패널 */
.cj-hud{position:absolute;left:10px;right:10px;bottom:calc(env(safe-area-inset-bottom,0) + 12px);z-index:8;
  padding:12px 14px 13px;border-radius:17px;transform-origin:50% 100%;transform:perspective(900px) rotateX(3.5deg);
  background:linear-gradient(180deg,rgba(16,23,12,.58),rgba(9,13,7,.84));
  border:1px solid rgba(199,240,80,.34);-webkit-backdrop-filter:blur(7px) saturate(1.1);backdrop-filter:blur(7px) saturate(1.1);
  box-shadow:0 12px 44px rgba(0,0,0,.5),0 0 26px rgba(199,240,80,.1),inset 0 0 24px rgba(199,240,80,.05)}
.cj-hud::before{content:'';position:absolute;left:14px;right:14px;top:0;height:1px;background:linear-gradient(90deg,transparent,rgba(199,240,80,.8),transparent);animation:topsweep 3s ease-in-out infinite}
.cj-hud::after{content:'';position:absolute;top:7px;left:7px;width:13px;height:13px;border-left:1.5px solid rgba(199,240,80,.5);border-top:1.5px solid rgba(199,240,80,.5);border-radius:3px 0 0 0}
.cj-hud.lay .ch-id{animation:holoRow .5s both}
.cj-hud.lay .ch-mel{animation:holoRow .5s .07s both}
.cj-hud.lay .ch-insight{animation:holoRow .5s .14s both}
.cj-hud.lay .ch-routes{animation:holoRow .5s .21s both}
@keyframes holoRow{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
/* ===== 컬러 베이스캠프 — 머리카락 단면 홀로 작업대 (마인드맵) ===== */
.cb-board{position:absolute;inset:0;top:calc(env(safe-area-inset-top,8px) + 60px);overflow:hidden;background:radial-gradient(125% 92% at 50% 2%,#0c1108 0%,#060806 64%);perspective:1300px}
.cb-veil{position:absolute;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(199,240,80,.03) 0,rgba(199,240,80,.03) 1px,transparent 1px,transparent 3px)}
.cb-scan{position:absolute;left:0;right:0;height:70px;z-index:3;pointer-events:none;background:linear-gradient(rgba(199,240,80,0),rgba(199,240,80,.1),rgba(199,240,80,0));animation:sweepMove 4.4s ease-in-out infinite}
.cb-frame{position:absolute;inset:14px 14px 0;z-index:4;pointer-events:none}
.cb-frame i{position:absolute;width:22px;height:22px;border:1.5px solid rgba(199,240,80,.5);box-shadow:0 0 9px rgba(199,240,80,.22)}
.cb-frame i:nth-child(1){top:0;left:0;border-right:0;border-bottom:0}
.cb-frame i:nth-child(2){top:0;right:0;border-left:0;border-bottom:0}
.cb-frame i:nth-child(3){bottom:0;left:0;border-right:0;border-top:0}
.cb-frame i:nth-child(4){bottom:0;right:0;border-left:0;border-top:0}
.cb-title{position:absolute;left:14px;top:14px;z-index:9;pointer-events:none;padding:6px 11px;border-radius:10px;background:rgba(10,15,8,.42);border:1px solid rgba(199,240,80,.3);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);box-shadow:0 0 16px rgba(199,240,80,.12);max-width:74%}
.cb-title .t{font-size:13px;font-weight:800;letter-spacing:.04em;color:var(--lime);text-shadow:0 0 10px rgba(199,240,80,.5)}
.cb-title .s{font-size:8px;letter-spacing:.14em;color:#cdd2c0;margin-top:2px}
.cb-stage{position:absolute;inset:0;z-index:6;transform-style:preserve-3d;transition:transform .66s cubic-bezier(.5,0,.2,1)}
.cb-strand{position:absolute;left:50%;top:46%;width:min(58vw,250px);height:min(58vw,250px);transform:translate(-50%,-50%);z-index:6;animation:cbFloat 7s ease-in-out infinite alternate}
.cb-strand svg{width:100%;height:100%;overflow:visible;filter:drop-shadow(0 0 22px rgba(199,240,80,.16))}
.cb-board.zoom .cb-strand{animation:cbSpin 16s linear infinite}
@keyframes cbFloat{0%{transform:translate(-50%,-50%) rotate(-2deg) scale(.992)}100%{transform:translate(-50%,-50%) rotate(2deg) scale(1.008)}}
@keyframes cbSpin{0%{transform:translate(-50%,-50%) rotateY(0)}100%{transform:translate(-50%,-50%) rotateY(360deg)}}
/* 마인드맵 점선 화살표 — div 빔(픽셀 좌표 회전 배치, SVG 비율버그 회피) */
.cb-lines{position:absolute;inset:0;z-index:5;pointer-events:none;transition:opacity .4s}
.cb-beam{position:absolute;height:1.5px;transform-origin:0 0;background-image:linear-gradient(90deg,rgba(199,240,80,.5) 58%,transparent 0);background-size:8px 100%;background-repeat:repeat-x;animation:cbFlow 1.1s linear infinite}
@keyframes cbFlow{to{background-position:8px 0}}
.cb-board.zoom .cb-lines{opacity:0}
/* 부위 핫스팟 (마인드맵 노드) */
.cb-hot{position:absolute;z-index:7;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;background:none;border:0;padding:0;transition:opacity .4s,transform .3s;animation:cbHotPulse 2.8s ease-in-out infinite}
.cb-hot .dotw{position:relative;width:52px;height:52px;border-radius:50%;border:1.5px solid rgba(199,240,80,.5);background:rgba(10,15,8,.55);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);display:grid;place-items:center;box-shadow:0 0 16px rgba(199,240,80,.16)}
.cb-hot .dotw>svg{width:34px;height:34px}
.cb-hot .nm{font-size:11.5px;font-weight:800;color:#eaf6d6;text-shadow:0 1px 6px #000;letter-spacing:.01em;white-space:nowrap}
.cb-hot .ct{position:absolute;top:-4px;right:-4px;font-size:8px;font-weight:800;color:#0a0c07;background:var(--lime);border-radius:99px;padding:1px 5px;box-shadow:0 0 8px rgba(199,240,80,.5)}
.cb-hot:active{transform:translate(-50%,-50%) scale(.92)}
@keyframes cbHotPulse{0%,100%{filter:none}50%{filter:drop-shadow(0 0 7px rgba(199,240,80,.42))}}
.cb-board.zoom .cb-hot{opacity:0;pointer-events:none}
.cb-hint{position:absolute;left:0;right:0;bottom:18px;text-align:center;z-index:8;font-size:9.5px;letter-spacing:.1em;color:rgba(199,240,80,.72);text-shadow:0 1px 4px #000;pointer-events:none;animation:utPulse 2.8s ease-in-out infinite}
.cb-board.zoom .cb-hint{opacity:0}
/* 모듈 카드 패널 (focus 시 떠오름) */
.cb-panels{position:absolute;left:10px;right:10px;bottom:calc(env(safe-area-inset-bottom,0) + 12px);z-index:10;padding:13px 13px 14px;border-radius:17px;transform-origin:50% 100%;
  background:linear-gradient(180deg,rgba(16,23,12,.62),rgba(9,13,7,.86));border:1px solid rgba(199,240,80,.34);-webkit-backdrop-filter:blur(7px) saturate(1.1);backdrop-filter:blur(7px) saturate(1.1);
  box-shadow:0 12px 44px rgba(0,0,0,.5),0 0 26px rgba(199,240,80,.1);opacity:0;transform:perspective(900px) rotateX(3.5deg) translateY(34px);pointer-events:none;transition:opacity .4s,transform .44s cubic-bezier(.2,.8,.3,1)}
.cb-panels.on{opacity:1;transform:perspective(900px) rotateX(3.5deg) translateY(0);pointer-events:auto}
.cb-panels::before{content:'';position:absolute;left:14px;right:14px;top:0;height:1px;background:linear-gradient(90deg,transparent,rgba(199,240,80,.8),transparent);animation:topsweep 3s ease-in-out infinite}
.cp-head{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.cp-back{width:28px;height:28px;border-radius:50%;border:1px solid var(--line);background:rgba(16,20,14,.8);color:var(--lime);font-size:13px;cursor:pointer;flex-shrink:0}
.cp-back:active{transform:scale(.9)}
.cp-mname{font-size:15px;font-weight:800;color:#fff}
.cp-mtag{font-size:9px;color:var(--dim);margin-top:2px}
.cp-list{display:flex;flex-direction:column;gap:7px;max-height:40vh;overflow-y:auto}
.cp-list::-webkit-scrollbar{display:none}
.cp-row{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:11px;border:1px solid var(--line);background:rgba(16,20,14,.5);cursor:pointer;transition:transform .15s,border-color .25s,box-shadow .25s}
.cb-panels.on .cp-row{animation:holoRow .5s both}
.cp-row:active{transform:scale(.985)}
.cp-row.on{border-color:var(--lime);box-shadow:0 0 12px rgba(199,240,80,.2)}
.cp-no{font-size:10px;font-weight:800;color:#0a0c07;background:var(--lime);border-radius:6px;min-width:21px;height:21px;display:grid;place-items:center;flex-shrink:0}
.cp-rt{flex:1}
.cp-rt .rs{font-size:7.5px;letter-spacing:.12em;color:var(--lime2);font-weight:700}
.cp-rt .rt{font-size:12.5px;font-weight:700;color:#eaf6d6;line-height:1.32;margin-top:1px}
.cp-rt .rb{font-size:10px;color:var(--dim);line-height:1.5;margin-top:3px}
.cp-go{color:var(--lime2);font-size:13px;flex-shrink:0;opacity:.6}
/* 세분류 별자리 — focus 시 코너에서 가지처럼 펼쳐지는 홀로 포인트 */
.cb-subs{position:absolute;inset:0;z-index:10;pointer-events:none;opacity:0;transition:opacity .45s}
.cb-board.zoom .cb-subs{opacity:1;pointer-events:auto}
.cb-sub-beam{position:absolute;height:1.5px;transform-origin:0 0;pointer-events:none;
  background-image:linear-gradient(90deg,rgba(199,240,80,.55) 55%,transparent 0);background-size:7px 100%;background-repeat:repeat-x;
  animation:cbFlow 1s linear infinite}
.cb-sub{position:absolute;transform:translate(-50%,-50%);pointer-events:auto;cursor:pointer;white-space:nowrap;
  display:flex;align-items:center;gap:8px;padding:7px 13px 7px 7px;border-radius:99px;
  border:1px solid rgba(199,240,80,.42);background:linear-gradient(180deg,rgba(18,26,12,.82),rgba(10,14,8,.94));
  -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);box-shadow:0 6px 22px rgba(0,0,0,.5),0 0 16px rgba(199,240,80,.14);
  opacity:0;transition:border-color .25s,box-shadow .25s}

        m:'머리카락 표면을 현미경으로 보면 <b>비늘(기왓장)이 겹겹이 덮인</b> 모습이에요. 이 비늘층이 <b>큐티클</b>, 약이 드나드는 <b>문</b>이에요. <b>산성에선 비늘이 납작하게 닫히고, 알칼리에선 비늘이 들려 열려요.</b> 솔방울이 마르면 벌어지고 젖으면 오므라드는 것처럼, 환경에 따라 열고 닫혀요. 이 여닫힘 하나가 펌·컬러 시술 내내 작동하는 가장 기본 원리예요 — 문이 닫혀 있으면 아무리 좋은 약도 안으로 못 들어가거든요.<br><br>그 문을 열고 들어가면 안쪽에 <b>피질(콜텍스)</b>이 나와요. 여기가 진짜 <b>무대</b>예요 — 컬도 색도 전부 이 피질 안에서 만들어져요. 그래서 시술은 늘 <i>"큐티클(문)을 열어 → 피질(무대)에서 일을 시키고 → 다시 닫는다"</i>는 흐름이에요.<br>→ 큐티클을 여닫는 이 원리는 뒤의 <b>펌제 pH</b>(문 여는 힘)·<b>중화</b>(문 닫고 마무리)에서 계속 다시 만나요. 여기서 확실히 잡아두면 나머지가 훨씬 쉬워져요.'},

        m:'마른 모발은 섬유들이 서로 바짝 붙어 속이 빽빽이 닫혀 있어요 — 약이 비집고 들어갈 틈이 없죠. 그런데 물을 머금으면 모발이 <b>팽윤(팽창)</b>하면서 섬유 사이가 옆으로 벌어져요. <i>마른 스펀지는 딱딱하지만 물을 먹으면 부풀어 구멍이 열리는 것</i>과 똑같아요. 그렇게 벌어진 틈이 바로 약이 스며드는 <b>침투 통로</b>가 돼요.<br><br>그래서 펌약·환원제는 <b>젖어서 팽윤된 상태</b>에서 발라야 안까지 잘 먹어요. 마른 머리에 바르면 겉돌기만 해요.<br>→ 이 "젖어야 열린다"는 원리는 바로 다음 <b>연화</b> 단계에서 그대로 쓰여요. 단 한 가지, <em>표면에 물이 흥건하면 그 물이 약을 묽게 희석</em>시켜 오히려 안 먹어요. 그래서 "속은 팽윤시키되 표면 물기는 적당히 뺀다"는 미묘한 균형이 필요한데, 이건 연화 편에서 따로 자세히 풀어요.'},

   {g:'약 읽기', gi:'Ⅱ', gt:'펌제 해석 — 숫자 하나로 속지 않기', mods:[

      intro:'<b>"pH 9.5면 무조건 센 약"은 오해예요.</b> 펌제의 강함은 한 숫자가 아니라 세 축의 <b>조합</b>으로 읽어요 — <b>pH</b>(문 여는 힘), <b>알칼리도</b>(그 환경 유지), <b>환원제 종류·농도</b>(실제 반응 강도). 이 셋을 따로, 또 같이 보는 법을 담았어요.',cards:[
       {t:'pH = 큐티클 여는 문',s:'pH · GATE',viz:'gate',

        +'<div style="font-size:10px;color:var(--dim);margin-top:8px">→ pH는 "문 여는 힘"일 뿐이에요. 오른쪽으로 갈수록 문이 활짝 열릴 뿐, <b style="color:#cdd2c0">반응 강도는 환원제가 정해요.</b></div></div>'},
       {t:'알칼리도 = 환경 유지력',s:'ALKALINITY',viz:'dials',
        b:'pH가 시작이라면, 알칼리도는 그 열린 환경을 버텨주는 힘이에요.',
        m:'앞에서 pH는 "큐티클 문을 여는 힘"이라고 했죠. 그런데 <b>문을 한 번 여는 것과, 그 문을 작업 내내 열어두는 것은 다른 일</b>이에요. 그 "계속 열어두는 힘"이 <b>알칼리도</b>예요. pH가 <b>시작(점화)</b>이라면 알칼리도는 <b>유지(연료통 크기)</b>고요.<br><br>왜 중요하냐면, pH만 높고 알칼리도가 약하면 문이 열렸다가도 <em>금방 닫혀</em> 반응이 도중에 멈춰요. 겉보기 숫자(pH)는 같아도 속 힘(알칼리도)이 다르면 결과가 딴판인 이유예요 — "pH 9.5인데 왜 약하지?"가 여기서 갈려요.<br><br>이 유지력을 만드는 성분은 성격이 달라요. <i>암모니아</i>는 pH를 <b>빨리 확 올리지만 휘발</b>해서 금방 빠져요(반응 빠르고 짧음). <i>MEA(모노에탄올아민)</i>는 잘 안 날아가 <b>유지력이 좋고 오래</b> 가요(은근하고 길게). <i>완충(버퍼) 시스템</i>은 중간에 pH가 급격히 무너지지 않게 <b>붙잡아 주는 안전장치</b>고요. 그래서 펌제를 읽을 땐 pH 숫자 하나가 아니라 "무엇으로 알칼리를 유지하는가"까지 같이 봐야 해요.'},
       {t:'환원제 종류 — 네 계열',s:'REDUCING AGENTS',viz:'agents',
        b:'이름 외우기보다 <span class="k">손에서 어떤 느낌이고 뭐가 좋은가</span>로 네 계열을 읽어요.',
        m:'환원제는 결국 <b>S-S 결합을 끊어 모발을 무르게 만드는 약</b>이에요. 종류는 많아도 실무에선 네 계열의 <b>성격</b>만 잡으면 충분해요.<br><br><b>① 치오계 (치오글리콜산) — 또렷하고 분명한 손맛.</b> 반응이 <em>빠르고 컬이 또렷</em>하게 떨어져요. "확 잡힌다"는 느낌이라 <b>건강모·저항모</b>처럼 약이 잘 안 먹는 머리에 믿음직해요. 장점은 예측 가능한 또렷한 컬, 대신 손상모엔 셀 수 있어 <b>강도 조절이 생명</b>이에요.<br><br><b>② 시스테아민계 — 부드럽게 어루만지는 느낌.</b> 반응이 <i>순해서</i> 손상모에도 비교적 편하게 가요. 순한 만큼 <b>설계(시간·열)에 결과가 크게 좌우</b>돼요 — 약이 알아서 해주는 게 아니라 내가 그려야 나와요. 예민한 머리를 안고 가는 안정감이 장점이에요.<br><br><b>③ 시스테인계 — 섬세하고 자극 적은 느낌.</b> <i>산성에 가까운 접근</i>이라 pH를 모발에 맞춰 써서 <b>자극이 경미</b>하고, 과하게 부풀어 <em>"터지는(끊기는)"</em> 현상이 적어 안정적이에요. 순한 만큼 <b>시간·열 설계</b>가 받쳐줘야 하고 모발 상태 예측이 필요해요.<br><br><b>④ GMT (글리세릴 모노티오글리콜레이트) — 산성·열펌의 단짝.</b> <i>산성 펌·열펌</i> 계열에서 자주 만나요. 열과 시간에 기대어 천천히 또렷하게 가는 타입이라, 이름보다 <b>"어떤 열·시간 설계와 함께 쓰느냐"</b>가 핵심이에요.'},
       {t:'농도 — 같은 약도 % 따라 딴판',s:'CONCENTRATION',viz:'dials',
        b:'종류만큼 중요한 게 농도예요 — 같은 약도 %에 따라 결과가 달라져요.',
        m:'같은 환원제라도 <b>농도(%)</b>가 다르면 결과가 완전히 달라져요 — 종류만큼, 어쩌면 더 중요한 게 농도예요. <i>같은 원두라도 연하게 내린 커피와 진하게 내린 커피가 다르듯</i>, 같은 시스테아민도 <b>5%면 부드러운 컬</b>, <em>8%면 또렷하지만 자칫 과반응(너무 풀림)</em>이 나요.<br><br>원리는 단순해요. 농도가 높을수록 같은 시간에 <b>S-S 다리를 더 많이·더 빨리 끊어요.</b> 그래서 <b>저농도</b>는 천천히 부드럽게 가는 접근이라 <i>손상·예민모</i>처럼 살살 다뤄야 하는 머리에 맞고, <b>고농도</b>는 또렷하게 확 끊는 접근이라 <i>건강·저항모</i>처럼 약이 잘 안 먹는 머리에 맞아요.<br><br>주의할 건, 농도는 혼자 결과를 정하지 않아요. <b>pH(문)·알칼리도(유지)·시간·열</b>이 다 같이 곱해져서 최종 강도가 나와요. 그래서 "8%니까 무조건 세다"가 아니라, 다른 조건이 약하면 8%도 순하게, 5%도 조건이 받쳐주면 충분히 또렷하게 나올 수 있어요. 늘 <b>한 세트로</b> 읽어야 해요.'},
     ]},
   ]},
   {g:'한 사이클', gi:'Ⅲ', gt:'끊기 → 모양 → 잇기', mods:[
     {id:'p_soft',name:'연화',tag:'끊기 / 환원',viz:'reduce',

       {t:'연화 = S-S를 끊어 무르게',s:'REDUCTION',viz:'reduce',
        b:'환원제가 S-S 다리를 끊으면 모발이 물러져 모양 받을 준비가 돼요.',
        m:'환원제가 피질 안으로 들어가 <b>S-S 다리를 끊으면</b>, 섬유를 단단히 붙잡고 있던 가로대가 풀려요. 그러면 모발이 <b>물러져서(말랑해져서)</b> 비로소 새 모양을 받아들일 수 있는 상태가 돼요. 이게 <b>연화</b>예요 — 앞 모발 편에서 말한 "끊었다 잇기" 중 <em>끊는</em> 쪽이에요. <i>차갑게 굳어 안 휘던 철사도 열을 주면 말랑해져 원하는 모양으로 구부려지는 것</i>과 같은 이치예요.<br><br>그런데 이 "얼마나 끊느냐"가 펌의 거의 전부예요. <b>펌 결과의 8할이 여기서 갈려요.</b> <em>덜 끊으면</em> 머리가 충분히 안 물러져 롯드에 감아도 컬이 안 잡히고, <em>너무 끊으면</em> 가로대가 과하게 풀려 모발 자체가 흐물흐물 무너져요(과연화). 그래서 연화는 "최대한 많이 끊기"가 아니라 <b>"딱 필요한 만큼만 정확히 끊기"</b>가 핵심이에요. 뒤 카드들은 전부 이 "딱 맞게"를 어떻게 맞추느냐는 이야기예요.'},
       {t:'잘 먹게 하는 조건 — 침투와 물기',s:'PENETRATION',viz:'swell',
        b:'저분자·습열·팽윤으로 들이되, 표면 물기는 빼야 안 희석돼요.',
        m:'약을 잘 먹이는 조건은 셋이에요. <b>① 저분자</b> — 분자가 크면 표면만 얹혀 안 먹고 큐티클 부담만 줘요. <b>② 습열</b> — 수분을 동반한 열에서 분자가 가장 활발히 움직여요(체온 <b>36.5도</b> 부근이 최적). 습식 미스트로 수분을 주고 가열해요. <b>③ 팽윤된 모발</b> — 앞 모발 편의 "젖으면 열린다"가 여기 그대로 쓰여요. 젖어 팽윤된 모발에 발라야 통로가 열려요.<br><br><b>단, 표면 물기는 빼고요(희석 함정).</b> 흠뻑 젖은 채 바르면 <em>모발에 묻은 물이 약을 희석</em>시켜 겉돌아요. <i>얼굴에 스킨 잔뜩인데 또 덧바르는 격이에요.</i> 속은 팽윤시키되 표면 물기는 <b>타월드라이로 적당히 빼는 것</b> — 이게 팽윤과 희석 사이의 균형이에요.'},
       {t:'제형 — 워터 vs 크림',s:'FORMULATION',viz:'reduce',
        b:'워터는 빨라 겉부터, 크림은 머물며 탄력 컬에 — 모질·목표에 맞춰요.',
        m:'같은 환원제라도 <b>어떤 제형(질감)에 담겨 있느냐</b>에 따라 움직임이 달라요. 크게 워터타입과 크림타입이에요.<br><br><b>워터(수분)타입</b>은 묽어서 흐르듯 빠르게 스며요. <i>맨살에 물을 부으면 순식간에 번지듯</i> 침투가 빨라 <em>겉면부터 먼저</em> 연화돼요. 장점은 빠른 속도지만, 너무 빨리 겉이 풀려 버려 <b>속(코르텍스)까지는 덜 풀릴 수</b> 있어요. 그래서 굵고 건강한 모발에선 더블 연화로 보완하기도 해요.<br><br><b>크림타입</b>은 점도가 높아 <i>로션처럼 바른 자리에 머물러요.</i> 흘러내리지 않고 그 자리를 붙잡고 천천히 작용해서, 한 올 한 올 충분히 먹여 <b>탄력 강한 컬</b>을 만들 때 좋아요. 다만 점도 때문에 넓고 곧게 펴는 <b>매직(스트레이트)엔 부적합</b>해요 — 고르게 깔리기보다 뭉치기 쉽거든요.<br><br>정답은 없고, <b>모질(굵기·손상도)과 목표 컬</b>에 맞춰 고르는 거예요. "빨리·겉부터"가 필요하면 워터, "오래 머물며·또렷하게"가 필요하면 크림이에요.'},
       {t:'더블 연화 — 두 번 올려 속까지',s:'DOUBLE',viz:'reduce',
        b:'겉만 빨리 먹고 속이 덜 풀리는 머리에, 두 번 나눠 깊이 채워요.',
        m:'<span class="lead">한 번에 속까지 안 풀리는 머리가 있어요.</span> <b>더블 연화 = 1차 연화 → 가볍게 정리 → 2차로 약을 한 번 더 올리는 것</b>이에요.<br><br><b>언제 쓰나</b> — 워터타입처럼 겉만 빨리 먹고 <em>속(코르텍스)은 덜 풀린</em> 굵고 건강한 모발, S-S 결합이 빽빽해 <b>한 번에 컬이 안 잡히는 저항모</b>, 히피펌 같은 <b>센 컬</b>에 써요.<br><br><b>왜 두 번이 더 깊이 먹나</b> — 1차 때 겉 큐티클·표층이 먼저 열리고 무뎌지면, 2차 약은 <i>이미 열린 통로로</i> 속까지 더 깊이 들어가요. 한 번에 농도·시간을 무리하게 올리는 것보다 <b>겉 과연화는 막으면서 속 연화는 채우는</b> 방식이에요.<br><br><b>주의</b> — ① 손상·다공성모엔 쓰지 마세요(이미 빨리 먹어서 <em>과연화·끊김</em> 위험). ② 2차 올리기 전 반드시 <b>연화 컬테스트</b>로 1차 반응을 읽고 <b>부족할 때만</b> 추가해요. ③ <b>필수가 아니에요</b> — 한 번에 충분히 풀리면 두 번 올릴 이유가 없어요.'},
       {t:'손상모는 균일하게 — 복리이자 주의',s:'DAMAGE',viz:'reduce',
        b:'다공성모는 약이 빨리·많이 들어가 과연화 — 손상이 손상을 불러요.',
        m:'손상모를 다룰 때 가장 먼저 알아야 할 건 <b>"이미 구멍이 뚫려 있다"</b>는 거예요. 건강한 모발은 큐티클 비늘이 촘촘히 닫혀 약이 천천히 들어가는데, 손상모는 그 비늘이 들뜨고 깨져 <b>다공성(구멍이 숭숭)</b>이 돼 있어요. <i>멀쩡한 벽과 구멍 난 벽에 같은 물을 부으면, 구멍 난 벽은 순식간에 빨아들이는 것</i>과 같아요.<br><br>그래서 손상모는 약·환원제가 <b>너무 빨리, 너무 많이</b> 들어가요. 같은 시간·같은 농도를 줘도 속까지 확 들어가 버려 <em>금방 과연화(너무 풀림)</em>가 돼요. 문제는 여기서 끝이 아니에요 — 과연화로 또 손상이 생기면 구멍이 더 늘고, 구멍이 늘면 다음엔 약이 더 빨리 들어가 또 과연화돼요. <b>손상이 손상을 부르는 <em>복리이자(눈덩이)</em> 구조</b>예요. 한번 무너지기 시작하면 가속이 붙어요.<br><br>그래서 손상모는 "약을 더 잘 먹이는" 게 아니라 <b>"덜·천천히 먹이는"</b> 쪽으로 가야 해요. 한 머리 안에서도 <b>극손상부엔 약 터치를 줄이고</b>(농도·시간·도포량 모두), 건강한 부위와 <b>반응 속도를 균일하게 맞춰야</b> 해요. 그래야 전체가 같은 타이밍에 풀려 이후 와인딩·중화가 편하고, 한쪽만 녹아내리는 사고를 막아요.'},
       {t:'시간보다 반응 — 연화 컬테스트',s:'CURL TEST',viz:'gauge',
        b:'오래 둔다고 잘 나오지 않아요. 답은 시간이 아니라 반응이에요.',
        m:'<span class="lead">"시간 다 됐으니 됐겠지"는 가장 흔한 실수예요.</span> 연화가 다 됐는지는 <b>시계가 아니라 모발의 반응</b>이 알려줘요. <i>오븐 타이머가 울려도 빵이 익었는지는 속을 찔러봐야 아는 것</i>과 같아요 — 모질·손상도·온도에 따라 같은 10분도 누구는 충분, 누구는 부족이거든요.<br><br>그런데 냄새 맡기·살짝 당겨보기·손가락으로 접어보기 정도로는 부족해요. 이런 건 "대충 물러졌나"만 알려줄 뿐, <b>실제로 컬이 잡힐 만큼 풀렸는지</b>는 못 알려줘요. 그래서 가장 확실한 방법은 <b>실제 디자인에 쓸 그 롯드로 한 가닥을 직접 감아 컬이 떨어지는 반응을 보는 것 — 연화 컬테스트</b>예요. 진짜 조건과 똑같이 시험해 보는 거죠.<br><br>만약 컬이 약하게 나오면, <em>감(感)으로 "조금 더 두자" 하지 말고 원인부터 읽으세요.</em> 롯드가 목표보다 커서 그런 건지, 연화 자체가 덜 된 건지에 따라 해법이 완전히 달라져요 — 전자는 롯드를 바꿔야 하고, 후자라야 시간·약을 더하는 거예요. 원인을 건너뛴 추가는 과연화로 가는 지름길이에요.'},
     ]},
     {id:'p_shape',name:'모양 잡기',tag:'열·와인딩',viz:'heat',
      intro:'무르게 만든 모발에 <b>원하는 모양을 입히는</b> 단계예요. 온도의 성격(저온·고온), 열을 고르게 전하는 법(섹션·밀봉), 컬 크기를 정하는 법(롯드·바퀴 수)을 담았어요. 핵심은 늘 <b>"고르게"</b>예요.',cards:[
       {t:'저온 vs 고온 — 와인잔의 법칙',s:'TEMPERATURE',viz:'heat',
        b:'저온은 안전·자연스러움, 고온은 힘·강한 컬 — 순서가 핵심이에요.',
        m:'열펌의 온도는 단순히 "뜨겁다/덜 뜨겁다"가 아니라 <b>성격이 달라요.</b> <b>저온은 안전하고 자연스러운 결과</b>(C컬·S컬 같은 부드러운 컬)를 주고, <em>고온은 힘이 세서 강한 컬</em>을 만들어요. 그래서 둘을 <b>조합</b>하면 — 저온으로 안전하게 바탕을 잡고 고온으로 힘을 더하는 식으로 — 자연스러움과 강도를 모두 가져갈 수 있어요.<br><br>여기서 <b>순서가 핵심</b>이에요. 손상·과연화로 이미 약해진 모발에 처음부터 고온을 확 주면 어떻게 될까요? <i>차갑게 식은 와인잔에 끓는 물을 부으면 유리가 급격한 온도차를 못 견디고 깨지듯</i>, 약한 모발도 갑작스러운 고온에 <b>터지고 끊어져요.</b> 그래서 약한 머리일수록 <b>저온으로 천천히 적응시킨 뒤</b> 필요한 만큼만 온도를 올려야 해요. "세게=빨리"가 아니라 "단계적으로"가 안전하고 결과도 좋아요.'},
       {t:'온도 단계와 쿨링(120→80)',s:'COOLING',viz:'heat',
        b:'고온→저온으로 내려오고, 중간에 식히기는 필수가 아닌 선택이에요.',
        m:'열펌은 보통 <b>높은 온도에서 시작해 낮은 온도로 내려오는</b> 단계(예: 120℃ → 80℃)로 진행해요. 처음에 힘 있게 모양을 잡고, 뒤로 갈수록 온도를 낮춰 안정적으로 마무리하는 흐름이에요.<br><br>"중간에 식혀야 한다"는 말에 헷갈리는 경우가 많은데, 사실 이건 <b>기계 차이</b>예요. 요즘 열펌 기기는 <i>온도센서와 쿨링팬</i>이 달려 있어 설정 온도로 알아서 내리고 잡아줘요 — 시술자가 일부러 손으로 식히며 기다릴 필요가 없는 거죠.<br><br>그래서 <b>중간에 식히기는 "꼭 해야 하는 필수 단계"가 아니라 "골라 쓰는 선택 테크닉"</b>이에요. 모발이 약하거나 더 안정적으로 가고 싶을 때 한 박자 쉬어 식힐 수도 있지만, 일반적으로는 <b>쉬지 않고 다음 온도 단계로 바로 넘어가도</b> 결과에 문제가 없어요. 불필요하게 시간을 끌 이유는 없다는 뜻이에요.'},
       {t:'고온엔 섹션을 얇게 — 고기 굽기',s:'SECTION',viz:'heat',
        b:'고온일수록 섹션을 얇게 — 두꺼우면 겉만 익고 속은 설익어요.',
        m:'온도가 높을수록 <b>섹션(머리를 나눠 뜨는 두께)을 얇게</b> 떠야 해요. 이유는 열이 전해지는 방식에 있어요 — 열은 모발 표면에서 속으로 천천히 스며드는데, 섹션이 두꺼우면 그 시간 안에 속까지 못 닿아요.<br><br><i>두꺼운 고기를 센 불에 올리면 겉은 새까맣게 타는데 속은 빨갛게 설익는 것</i>과 똑같아요. 두꺼운 섹션도 140℃ 같은 고온에서 <b>표면만 과하게 익고 속은 안 익어</b>, 한 다발 안에서도 컬이 들쭉날쭉해져요. 반대로 <b>얇게 뜨면 겉과 속이 거의 동시에 골고루 데워져</b> 균일한 컬이 나와요.<br><br>그래서 규칙은 간단해요 — <b>온도를 높일수록 섹션은 더 얇게.</b> 고온일수록 겉만 타기 쉬우니 속까지 닿을 수 있게 얇게 떠서 보완하는 거예요.'},
       {t:'랩 밀봉 — 열을 가둔다',s:'WRAPPING',viz:'heat',
        b:'열은 공기로 전해져 끝이 식어요 — 랩으로 밀봉해 가둬야 고르게 돼요.',
        m:'열펌에서 열은 기기에서 모발로 <b>공기를 거쳐</b> 전해지는 경우가 많아요. 그런데 공기는 열을 잘 붙잡지 못해서, <b>모발이 길수록 뿌리 쪽은 따뜻한데 끝(모선)으로 갈수록 식어 버려요.</b> 그러면 같은 시간을 줘도 뿌리는 컬이 잘 잡히고 끝은 덜 잡혀 <em>위아래가 다른 컬</em>이 나와요.<br><br>이걸 고무줄로 모발을 묶어 고정하는 것만으론 못 막아요 — 고정은 흔들림을 잡을 뿐 <b>열이 새는 건 못 막거든요.</b> 그래서 <b>랩(비닐)으로 감싸 밀봉</b>해요. <i>음식을 랩으로 덮으면 김(열)이 안 빠지고 안에서 골고루 도는 것</i>처럼, 랩이 따뜻한 공기(약 50℃)를 모발 주위에 가둬요. 그러면 <b>뿌리부터 끝까지 같은 온도로 데워져</b> 컬이 위아래 고르게 나와요. 길이가 긴 머리일수록 이 밀봉이 더 중요해요.'},
       {t:'롯드와 바퀴 수 — 작은 롯드 함정',s:'ROD',viz:'gauge',
        b:'"작은 롯드=빠글"은 틀려요. 바퀴 수·길이·탄력이 컬을 좌우해요.',
        m:'<em>"작은 롯드를 쓰면 무조건 빠글빠글해진다"는 건 흔한 오해예요.</em> 컬의 굵기를 정하는 건 롯드 번호 하나가 아니라 <b>바퀴 수 · 모발 길이 · 모발 탄력 · 열 설계</b>가 함께예요.<br><br>핵심은 <b>"몇 바퀴 감았는가"</b>예요. 같은 작은 롯드라도 <i>1.5바퀴만 감으면 부드러운 컬</i>, <i>2.5~3바퀴를 감으면 강한 컬</i>이 나와요 — 많이 감을수록 곡선이 촘촘해지니까요. 또 같은 롯드·같은 바퀴라도 모발이 길면 무게 때문에 컬이 늘어지고, 탄력이 없으면 모양을 못 버텨요.<br><br>그래서 판단 순서를 거꾸로 잡으세요. "몇 번 롯드 쓸까"부터 고르는 게 아니라, <b>① 목표 컬 크기를 정하고 → ② 모발 길이를 보고 → ③ 탄력(버틸 힘)을 가늠한 뒤 → ④ 거기 맞는 바퀴 수와 롯드를 고르는</b> 식이에요. 도구가 아니라 목표에서 출발하는 거예요.'},
       {t:'C컬은 약연화로 가볍게',s:'C-CURL',viz:'reduce',
        b:'C컬은 강한 연화·전체 와인딩이 필요 없어요 — 단순하게 가세요.',
        m:'C컬은 알파벳 C처럼 <b>안으로 살짝 말리는 가장 부드러운 컬</b>이에요. 그래서 강한 컬에 쓰는 도구를 그대로 가져오면 오히려 과해져요 — <b>강한 연화도, 머리 전체를 촘촘히 마는 와인딩도 필요 없어요.</b><br><br>원리는 "딱 필요한 만큼만"이에요. S-S 다리를 살짝만 풀면 되니까 <b>연화는 약하게만</b> 주고, 온도도 <b>약불(저온)부터</b> 시작해 수분을 날리며 <b>굵은 롯드로 가볍게</b> 한두 바퀴만 감아요. 세게·촘촘히 갈수록 C컬의 자연스러움이 사라지고 부담만 커져요.<br><br>그래서 C컬의 정답은 <b>테크닉을 단순하게 가져가는 것</b>이에요. "더 해주는 게 좋다"가 아니라 "덜 건드리는 게 좋다" — 약한 머리에도 부담이 적고 결과도 자연스러워요.'},
     ]},
     {id:'p_wash',name:'담수 세척',tag:'사이 단계',viz:'wash',
      intro:'연화와 중화 사이의 <b>숨은 단계</b>예요. 그냥 헹구는 게 아니라, 남은 연화제를 빼서 다음 반응이 깨끗하게 일어나게 만드는 일이라 결과를 지키는 데 생각보다 중요해요.',cards:[
       {t:'연화만큼 중요한 게 세척',s:'WHY',viz:'wash',
        b:'연화제가 남으면 열 작업 때 반응이 이어져 컬이 처지고 무너져요.',
        m:'연화를 잘 끝냈다고 일이 끝난 게 아니에요. 연화를 정확히 판단하는 게 <b>1차 실력</b>이라면, 그 결과를 망치지 않고 지켜내는 <b>세척이 2차 실력</b>이에요. 의외로 여기서 결과가 무너지는 경우가 많아요.<br><br>이유는 간단해요 — <b>연화제(환원제)는 헹궈내기 전까지 계속 일하고 있어요.</b> 모발에 약이 남은 채로 다음 단계(열 작업·와인딩)로 넘어가면, 그 사이에도 <em>S-S 다리를 계속 더 끊어</em> 버려요. 불을 끄지 않은 채 냄비를 계속 올려둔 셈이죠. 그 결과 <em>컬이 처지고, 모발이 더 물러지고, 손상까지</em> 와요.<br><br>그래서 <b>"약을 잘 빼는 것"까지가 연화의 일부</b>예요. 적절한 시점에 깨끗이 빼줘야 연화가 딱 원하는 지점에서 멈추고, 다음 단계가 깨끗한 상태에서 시작돼요. 세척을 "그냥 헹구는 잡일"로 보면 안 되는 이유예요.'},
       {t:'담수 세척 = 풀어서 빼기',s:'HOW',viz:'wash',
        b:'문질러 빼는 게 아니라 물에 담가 희석하며 부드럽게 빼내요.',
        m:'흐르는 물로 문질러 빼는 게 아니라 <b>물에 담가 희석하며 부드럽게 빼내는 것</b>이에요. 순서는 — ① 미온수 1차 헹굼 ② 볼에 담가 풀기 ③ 물속에서 <i>비비지 말고</i> 흔들기 ④ 탁해지면 물 교체 ⑤ 2차 헹굼 ⑥ 필요시 반복이에요. 뜨거운 물·강한 샴푸·무리한 빗질은 <em>금지</em>예요.'},
       {t:'왜 물로만 빠질까 — 설탕과 기름',s:'SOLUBILITY',viz:'wash',
        b:'환원제는 수용성 — 설탕이 물에 녹듯 물로만 헹궈도 잘 빠져요.',
        m:'"왜 펌약은 세제도 안 쓰고 물로만 헹궈도 빠지지?" 답은 <b>용해도</b>에 있어요. 용해도란 <i>어떤 물질이 무엇에 잘 녹느냐</i>예요.<br><br>주방을 떠올리면 쉬워요 — <i>설탕은 물에 잘 녹으니 물로 헹구면 사라지고, 기름은 물에 안 녹으니 꼭 세제(주방세제)를 써야</i> 지워지죠. 물질마다 "녹는 짝"이 다른 거예요.<br><br>연화에 쓰는 알칼리제·환원제는 <b>수용성(물에 잘 녹는 성질)</b>이에요. 즉 설탕 쪽이라 <b>물로만 충분히 헹궈도 잘 빠져나와요.</b> 그래서 굳이 세제를 쓴다고 결과가 크게 좋아지지 않고, 오히려 강한 샴푸로 박박 문지르면 약해진 모발에 자극만 더해요. <b>"잘 녹는 물질이니 물로 충분히 희석해 빼낸다"</b> — 담수 세척이 물 중심인 데는 이런 화학적 이유가 있어요.'},
     ]},
     {id:'p_neut',name:'중화',tag:'잇기 / 산화',viz:'oxid',
      intro:'끊어둔 <b>S-S 다리를 새 위치에서 다시 잇는</b> 단계예요. 연화가 "끊기"였다면 중화는 "잇기"고요 — 여기서 컬이 비로소 고정돼요. 다만 잘못하면 발열로 모발을 태우니, 그 원인과 산성 펌의 진짜 역할을 담았어요.',cards:[
       {t:'중화 = 새 위치에서 S-S 잇기',s:'OXIDATION',viz:'oxid',
        b:'끊어졌던 S-S를 산화제로 다시 이어 컬을 고정하는 단계예요.',
        m:'연화로 끊어둔 <b>S-S 다리를</b> 이제 <b>산화제(2제)</b>로 <b>다시 이어주는</b> 단계가 중화예요. 연화가 "끊기"였다면 중화는 "잇기"고요 — 펌의 마지막 결정적 순간이에요.<br><br>핵심은 <b>"어디서 다시 잇느냐"</b>예요. 연화로 풀린 모발을 롯드에 감아 새 모양을 만들어 둔 상태에서 중화를 하면, 다리가 <b>원래 자리가 아니라 "롯드에 감긴 새 위치"에서 다시 걸려요.</b> <i>젖었을 때 자유롭게 휘던 머리가 그 모양 그대로 마르며 굳는 것</i>처럼, 새 위치에서 다리가 잠기며 모발이 그 곡선을 <b>"이게 원래 내 모양"이라고 기억</b>하게 돼요.<br><br>그래서 여기서 컬이 비로소 <b>고정</b>돼요. 중화가 부족하면 다리가 덜 걸려 컬이 금방 풀리고, 잘 되면 오래 가는 탄탄한 컬이 돼요. 연화로 만든 모양을 "도장 찍어 확정하는" 단계라고 보면 돼요.'},
       {t:'기화반응(발열) 3원인',s:'HEAT',viz:'oxid',
        b:'과수가 급분해되며 나는 발열은 모발을 태워요 — 원인은 셋이에요.',
        m:'중화제로 흔히 쓰는 <b>과산화수소(과수)</b>는 평소엔 천천히 분해되며 산소를 내놓는데, 어떤 조건이 겹치면 <b>한꺼번에 급격히 분해</b>되며 열을 확 내요. 이 갑작스러운 발열을 <em>기화(발열)반응</em>이라 하고, 이 열이 약해진 모발을 그대로 <b>태워</b> 버려요. 그래서 원인을 알고 미리 막는 게 중요한데, 크게 셋이에요.<br><br><b>① 알칼리가 남아 있을 때</b> — 연화에 쓴 1제 알칼리가 깨끗이 안 빠지고 남으면, 그 알칼리가 과수 분해를 <em>가속하는 방아쇠</em>가 돼요. (앞 세척이 왜 중요한지 여기서 다시 드러나요 — 알칼리를 잘 빼두면 이 위험이 줄어요.)<br><br><b>② 잔열이 남았을 때</b> — 열펌 직후 롯드에 남은 열에 과수가 더해지면 <b>열+열</b>로 과반응이 나요. 그래서 중화 전·중에 <i>부채질이나 송풍으로 한 김 식혀</i> 온도를 낮춰주는 게 안전해요.<br><br><b>③ 중금속이 있을 때</b> — 철·구리 같은 금속(수돗물·기구·시술 잔재)은 과수 분해를 부추기는 <em>촉매</em>예요. 미량으로도 반응을 키워서, <b>휠(기구) 세척과 충분한 헹굼</b>으로 미리 제거해 두면 발열 사고를 줄일 수 있어요.'},
       {t:'산성 펌의 진실 — 버퍼',s:'BUFFER',viz:'dials',
        b:'산성 펌은 알칼리를 낮추는 게 아니라 환원력을 보충하는 버퍼예요.',
        m:'현장에서 자주 도는 오해가 하나 있어요 — <b>"산성 펌을 섞으면 전체 pH(알칼리)가 낮아진다"</b>는 말이에요. 결론부터 말하면 그렇지 않아요.<br><br>pH가 다른 두 약을 섞으면 산수처럼 중간값이 되는 게 아니라, <em>강도(완충력)가 센 쪽이 끌고 가요.</em> 그래서 알칼리 펌(pH 9)에 산성 펌을 조금 더해도 <b>전체는 여전히 9 가까이 유지</b>돼요 — 알칼리가 내려갈 거라 기대하면 빗나가요.<br><br>그럼 산성 펌은 왜 쓰느냐? 진짜 역할은 pH를 낮추는 게 아니라 <b>① 부족한 환원력을 보충</b>하고 <b>② pH가 흔들리지 않게 확실히 붙잡아 주는 버퍼(완충)</b>예요. 반응이 약하다 싶을 때 <b>덧방(추가로 더해 발라)</b>으로 환원력을 더하고 환경을 안정시키는 컨트롤 수단인 거예요. "알칼리를 깎는 약"이 아니라 "힘을 보태고 환경을 잡아주는 약"으로 이해해야 제대로 써요.'},
     ]},
   ]},
   {g:'실전', gi:'Ⅳ', gt:'진단과 설계 — 정답은 없다', mods:[
     {id:'p_field',name:'진단·디자인',tag:'모발 상태로 약을 고른다',viz:'gauge',
      intro:'지금까지의 원리를 <b>실제 머리 앞에서</b> 쓰는 단계예요. 모든 선택은 진단에서 시작하고요 — 손상모·탈색모를 어떻게 읽는지, 영양은 어떻게 채우는지, 그리고 왜 단일 정답이 없는지를 담았어요.',cards:[
       {t:'모발 진단이 먼저',s:'DIAGNOSIS',viz:'gauge',
        b:'건강·저항모는 또렷한 약, 손상·탈색모는 순한 약 — 진단이 출발점이에요.',
        m:'지금까지 배운 모든 원리는 결국 <b>"이 머리에 무슨 약을, 얼마나"</b>를 정하기 위한 거예요. 그리고 그 출발점은 언제나 <b>진단</b>이에요 — 약을 먼저 고르고 머리를 맞추는 게 아니라, 머리를 읽고 약을 맞추는 거예요.<br><br>크게 두 갈래로 보면 쉬워요. <b>건강모·저항모</b>는 큐티클이 촘촘하고 S-S가 빽빽해 약이 잘 안 먹어요. 그래서 <b>또렷하게 끊는 약</b>(치오계, 적정~높은 알칼리)으로 확실히 반응시켜야 해요. 반대로 <b>손상·탈색모</b>는 이미 구멍이 많아 약이 확 들어가니, <b>순하게 천천히 가는 약</b>(시스테인계, 낮은 알칼리)으로 과반응을 막아야 해요.<br><br>핵심은, <b>같은 약도 머리에 따라 정답이 정반대</b>라는 거예요. 그래서 상태를 못 읽으면 아무리 좋은 약·좋은 테크닉도 빗나가요. 진단이 틀리면 그 뒤는 전부 틀린다고 봐도 돼요.'},
       {t:'손상모 펌 — 안 나오는 게 아니라 무너진다',s:'DAMAGE',viz:'gauge',
        b:'침투는 빠른데 버틸 탄력이 없어 컬이 무너져요 — 답은 센 약이 아니에요.',
        m:'<span class="lead">"손상모는 약 잘 먹는데 왜 컬이 약하지?"</span> 침투·반응은 빠른데 <em>형태를 버틸 탄력·결합력이 부족</em>해서 <b>컬이 안 나오는 게 아니라 무너지는</b> 거예요. 젖을 땐 보이다 마르면 늘어져요. 해법은 더 센 약이 ❌ — <b>유지력</b>을 보고 가능한 디자인 범위를 잡고 컬테스트로 확인하세요.'},
       {t:'탈색모에 열펌? — S-S를 봐라',s:'BLEACHED',viz:'ss',
        b:'컬을 잡는 S-S를 탈색이 이미 끊어놔서, 토대가 부족해요.',
        m:'탈색모에 열펌이 될지 안 될지는 <b>S-S 결합</b> 하나만 보면 답이 나와요. 컬을 붙잡아 주는 게 바로 이 S-S 다리인데, <em>탈색은 색소만 빼는 게 아니라 이 다리까지 상당수 끊어놓는 시술</em>이거든요. 펌이 "끊었다 다시 잇는" 일인데, <b>이을 다리 자체가 이미 줄어 있는</b> 상태인 거예요.<br><br>그래서 같은 손상이라도 종류를 구분해야 해요. <b>염색만</b> 한 머리는 색은 들어갔어도 S-S가 대체로 살아 있어 컬이 잡혀요. 반면 <b>3회 이상 반복 탈색한 모발</b>은 결합 토대가 너무 부족해서, 연화·와인딩을 아무리 잘해도 <b>컬이 안 나오거나 금방 풀릴 가능성이 높아요</b> — 잇고 싶어도 이을 게 없는 셈이죠.<br><br>물론 절대 불가능하다는 건 아니에요. 다만 "되겠지" 하고 들어가면 모발만 더 망가뜨리기 쉬우니, <b>반드시 진단(탈색 횟수·남은 탄력·끊김 정도)을 먼저</b> 하고 가능 범위를 정직하게 잡아야 해요.'},
       {t:'영양제(PPT)는 누적이 답',s:'REFILL',viz:'ppt',
        b:'한 병의 90%는 물이에요 — 소량씩 덧발라 농도를 쌓아야 효과적이에요.',
        m:'시중 영양제(PPT)를 한 번 듬뿍 바르면 효과가 클 것 같지만, 성분표를 보면 의외예요 — <em>한 병의 약 90%가 물이고, 실제 영양 성분은 10% 안팎</em>인 경우가 많아요. 농도가 묽다는 뜻이에요.<br><br>그래서 한 번에 많이 바르는 건 비효율적이에요. <i>발라 봤자 물 90%는 곧 증발해 버리고 모발엔 10%만 남거든요.</i> 양을 늘려도 묽은 농도 자체는 그대로라 한계가 있어요.<br><br>더 효과적인 방법은 <b>소량씩 2~3회 나눠 덧바르는 누적 도포</b>예요. 한 번 바르고 흡수시킨 뒤 또 바르면, 남은 10%에 10%가 쌓여 <b>실질 농도가 20%, 30%로 올라가요.</b> <i>벽에 페인트를 한 번에 두껍게 칠하면 흘러내리지만, 얇게 여러 번 덧칠하면 진하고 고르게 입혀지는 것</i>과 같아요. 특히 극손상모일수록 이 "쌓아 올리는" 방식이 훨씬 효과적이에요.'},
       {t:'정답은 없다 — 가치관의 영역',s:'NO ANSWER',viz:'gauge',
        b:'모든 상황에 통하는 단일 정답은 없어요 — 공식이 아니라 해석이에요.',
        m:'마지막으로 가장 중요한 이야기 — 펌엔 <b>모든 상황에 통하는 단일 정답이 없어요.</b> 지금까지 배운 원리들은 "이럴 땐 이렇게"라는 <b>확률 높은 방향</b>이지, 어떤 머리에든 똑같이 꽂으면 되는 공식이 아니에요.<br><br>왜냐하면 머리카락은 사람마다, 심지어 같은 사람도 그날 컨디션·날씨·이전 시술 이력에 따라 달라지거든요. 그래서 <b>불확실하고 명확히 정해지지 않은 영역이 늘 남아요.</b> 똑같이 진단하고 똑같은 약을 써도 미묘하게 다른 결과가 나오는 게 자연스러운 일이에요.<br><br>결국 마지막 판단은 <i>시술자의 가치관(무엇을 더 중요하게 볼지)과 그날의 모발·상황</i>이 정해요. 누군가는 컬의 또렷함을, 누군가는 모발 보호를 우선하죠 — 어느 쪽도 틀린 게 아니에요. 그래서 펌은 <b>외워서 적용하는 공식이 아니라, 원리를 바탕으로 매번 새로 읽어내는 해석</b>이에요. 원리를 깊이 이해할수록 그 해석이 정확해지는 거고요.'},
     ]},
   ]},
  ]
 },

        m:'비늘이 닫혀 있으면 약이 못 들어가요. 그런데 큐티클엔 성질이 있어요 — <b>알칼리</b>(염모제 1제)를 만나면 부풀어 <b>열리고</b>, <b>산성</b>(산성 샴푸·트리트먼트)을 만나면 조여서 <b>닫혀요</b>.<br>그래서 염색은 "①알칼리로 문 열고 → ②약 넣고 → ③산성으로 문 닫아 색을 가둔다" 순서예요. 큐티클이 많이 상하면 문이 헐거워져 색이 금방 빠져요.'},
       {t:'콜텍스 — 컬러의 무대',s:'CORTEX · 85~90%',viz:'strand',
        b:'머리카락 <span class="k">속살(85~90%)</span>. 색소(멜라닌)가 사는 진짜 무대.',
        m:'여기에 <b>멜라닌 색소</b>가 들어 사람마다 머리색이 달라요. 콜텍스는 물을 좋아하는(친수성) 성질이라 약이 잘 스며들어요.<br><b>탈색</b> = 여기 멜라닌을 빼는 것, <b>염색</b> = 여기에 새 색소를 채우는 것. 굵기·힘·곱슬도 콜텍스가 정해서, 컬러와 펌의 거의 모든 일이 이 안에서 벌어져요.'},
       {t:'메듈라 · CMC',s:'MEDULLA · 통로',viz:'cmc',
        b:'한가운데 <span class="k">메듈라</span>(공기 심지) + 층 사이 <span class="k">CMC</span>(약이 다니는 길).',
        m:'<b>메듈라</b>는 머리카락 정중앙의 빈 공기층이라 보온 역할. 전체의 1%뿐이고 가는 모발엔 아예 없기도 해 컬러엔 큰 영향 없어요.<br>진짜 중요한 건 <b>CMC</b> — 세포 사이를 메운 얇은 막인데, 약제가 모발 속을 드나드는 <b>통로</b>이자 수분을 잡아주는 곳. CMC가 망가지면 푸석해지고 색도 잘 안 먹어요.'},
       {t:'멜라닌 두 종류',s:'PIGMENT',viz:'melanin',

        m:'<b>유멜라닌</b>은 어둡고 진한 색소(동양인에 많음), <b>페오멜라닌</b>은 붉고 노란 색소(서양인에 많음). 동양인 흑모는 유멜라닌이 많아 <b>검은색 속에 빨간 기운이 숨어</b> 있어요.<br>그래서 탈색하면 검정→빨강→주황→노랑 순으로 풀려요. 이게 <b>언더(밑색)</b>의 정체이고, 언더 공식에서 자세히 다뤄요.'},

        m:'나이가 들면 색소 공장(멜라노사이트)이 멈춰 멜라닌이 안 만들어져요 → 그게 흰머리. 게다가 백모는 큐티클이 <b>두껍고 단단하고 물을 튕겨내서</b> 약이 들어가기 어려워요.<br>그래서 멋내기 색만 쓰면 잘 안 물들고, 방치시간을 길게(보통 30분) 주거나 새치 전용 약을 따로 써야 해요. → 약 고르는 법은 약제 시스템에서.'},

       {t:'보색의 두 얼굴',s:'COMPLEMENT',viz:'comp',

       {t:'밑색 + 희망색 = 완성색',s:'RESULT',viz:'morph',

        m:'새치는 머리 전체에 고르게 나지 않아요. 옆·구레나룻엔 많고 정수리엔 적은 식으로 <b>부위별 백모량이 달라요</b>. 백모가 몰린 곳은 더 어둡게 잡아줘야 깨끗이 덮이는데, 한 약으로 한 번에 바르면 몰린 곳은 들뜨고 적은 곳은 너무 어두워져요. 그래서 <b>몰린 곳엔 한 단계 어두운(1레벨 낮은) 약</b>을 따로 쓰되, 바르는 순서를 둘로 나눠요.<br><br><b>① 선착법(먼저 바르기)</b> — 새치가 <b>몰린 곳에 1레벨 어두운 약을 먼저</b> 발라요. 흰머리는 색소가 없고 큐티클이 단단해 약이 더디게 드니, 어두운 약으로 미리 시간을 벌어주는 거예요. 그런 다음 <b>나머지 전체를 원래 명도 염모제로 전체 도포</b>해요 — 먼저 바른 곳 위에 겹쳐서요. → 몰린 곳은 어두운 약+원래 약이 겹쳐 진하게 잡히고, 나머지는 원래 명도로 떨어져요.<br><br><b>② 후착법(나중에 바르기)</b> — 반대 순서예요. <b>전체를 원래 명도 새치 염색약으로 먼저 다 바른 뒤</b>, 새치가 <b>몰린 곳만 1레벨 어두운 약을 나중에</b> 덧발라요. 전체 톤을 먼저 맞춰놓고, 부족한 몰린 부위만 어두운 약으로 눌러 균형을 맞추는 방식이에요.<br><br><b>③ 부위별 약 분리</b> — 백모량 차가 크면 아예 <b>레벨이 다른 약 두 개</b>를 부위별로 써요(많은 곳은 어둡게, 적은 곳은 한 톤 밝게).<br><br><b>④ 마무리 재도포</b> — 방치 끝에 체크해서 <b>아직 흰 게 비치는 부분만 약을 덧발라</b> 시간을 더 줘요. 전체를 다시 바르는 게 아니라 안 덮인 데만 보강하는 거예요.'},

function getGuide(color,curLv,tarLv){
  var cz=lvZone(curLv);
  var tz;

  /* 난색+블루 → wblue 키로 조회 */
  var effColor=color;
  if(S.cw==='warm'&&color==='blue') effColor='wblue';
  if(S.cw==='warm'&&color==='ash') effColor='wash';
  if(S.cw==='warm'&&color==='violet') effColor='wviolet';
  if(S.cw==='warm'&&color==='lavash') effColor='wlavash';
  if(S.cw==='warm'&&color==='red') effColor='wred';
  if(S.cw==='warm'&&color==='rv') effColor='wrv';
  if(S.cw==='warm'&&color==='pink') effColor='wpink';

  /* 같은 구간 내 이동 → 톤인톤 */
  var tzTarget=lvZone(tarLv);
  var isHigh=cz==='high16'||cz==='high20';

  /* ── 난색 고명도: warm16 vs warm18 분리 (wblue, wash, wviolet 공통) ── */
  if((effColor==='wblue'||effColor==='wash'||effColor==='wviolet'||effColor==='wlavash'||effColor==='wred'||effColor==='wrv'||effColor==='wpink')&&isHigh){
    /* 난색 16 출발 */
    if(curLv===16){
      /* 16→16 톤인톤 */
      if(tarLv===16){
        var kw16=effColor+'_warm16_warm16';
        if(GUIDE[kw16]) return GUIDE[kw16];
      }
      /* 16→18·20 스카이 방향 */
      if(tarLv===18||tarLv===20){
        var kSky=effColor+'_warm16_sky';
        if(GUIDE[kSky]) return GUIDE[kSky];
      }
    }
    /* 난색 18·20 출발 — 톤인톤(18↔20 간 이동 포함) */
    if((curLv===18||curLv===20)&&(tarLv===18||tarLv===20||tarLv===16)){
      if(curLv===20){
        var kh20=effColor+'_high20_high';
        if(GUIDE[kh20]) return GUIDE[kh20];
      }
      var kw18=effColor+'_warm18_high';
      if(GUIDE[kw18]) return GUIDE[kw18];
    }
  }

  /* 같은 존 톤인톤 — 단, 목표 14면 무조건 탈색 분기 (염색모에서 네이비 블루 불가) */
  if(cz===tzTarget&&tarLv!==14){
    /* 16→18·20(스카이 블루 방향)은 전용 키 우선 */
    if(cz==='high16'&&(tarLv===18||tarLv===20)){
      var kSky=effColor+'_high16_sky';
      if(GUIDE[kSky]) return GUIDE[kSky];
    }
    var key=effColor+'_'+cz+'_'+cz;
    if(GUIDE[key]) return GUIDE[key];
    if(isHigh){
      var kf=effColor+'_'+cz+'_high';
      if(GUIDE[kf]) return GUIDE[kf];
    }
  }

  /* 고명도 간 이동 (high20↔high16) → 톤인톤 취급 */
  /* 단, 16에서 18·20(스카이 블루 방향)은 전용 키 우선 */
  if(isHigh&&(tzTarget==='high16'||tzTarget==='high20')){
    if(cz==='high16'&&(tarLv===18||tarLv===20)){
      var kSky=effColor+'_high16_sky';
      if(GUIDE[kSky]) return GUIDE[kSky];
    }
    var kh1=effColor+'_'+cz+'_high';
    if(GUIDE[kh1]) return GUIDE[kh1];
    var kh2=effColor+'_'+tzTarget+'_high';
    if(GUIDE[kh2]) return GUIDE[kh2];
  }

  /* 특수 분기: 목표 레벨별 세분화 */
  if(tarLv<=5) tz='vlow';
  else if(tarLv<=6) tz=(cz==='low')?'low':'vlow';
  else if(tarLv<=8) tz=(cz==='low')?'mid8':'low';
  else if(tarLv<=12) tz='mid';
  else if(tarLv===14) tz='14';
  else if(tarLv===16) tz='16';
  else if(tarLv===18) tz='18';
  else tz='20';

  /* 정확한 키 */
  /* 14 출발→14 목표: 전용 실무조언 키 우선 */
  if(curLv===14&&tarLv===14){
    var k14=effColor+'_mid14_14';
    if(GUIDE[k14]) return GUIDE[k14];
  }
  var key=effColor+'_'+cz+'_'+tz;
  if(GUIDE[key]) return GUIDE[key];

  /* high16/high20 → high 폴백 */
  if(isHigh){
    var kh=effColor+'_high_'+tz;
    if(GUIDE[kh]) return GUIDE[kh];
    /* 14는 mid 구간이지만 고명도에서 내려가는 톤다운 — mid 폴백 */
    if(tarLv===14){
      var km=effColor+'_high_mid';
      if(GUIDE[km]) return GUIDE[km];
    }
  }

  /* 같은 구간 폴백 */
  var keyFall=effColor+'_'+cz+'_'+tzTarget;
  if(GUIDE[keyFall]) return GUIDE[keyFall];

  /* 난색인데 전용 키가 없으면 한색으로 폴백 */
  if(effColor==='wblue'){
    return getGuide_cool('blue',curLv,tarLv);
  }
  if(effColor==='wash'){
    return getGuide_cool('ash',curLv,tarLv);
  }
  if(effColor==='wviolet'){
    return getGuide_cool('violet',curLv,tarLv);
  }
  if(effColor==='wlavash'){
    return getGuide_cool('lavash',curLv,tarLv);
  }
  if(effColor==='wred'){
    return getGuide_cool('red',curLv,tarLv);
  }
  if(effColor==='wrv'){
    return getGuide_cool('rv',curLv,tarLv);
  }
  if(effColor==='wpink'){
    return getGuide_cool('pink',curLv,tarLv);
  }

  return null;
}
function getGuide_cool(color,curLv,tarLv){
  var cz=lvZone(curLv);
  var tzTarget=lvZone(tarLv);
  var isHigh=cz==='high16'||cz==='high20';
  var tz;
  if(tarLv<=5) tz='vlow';
  else if(tarLv<=6) tz=(cz==='low')?'low':'vlow';
  else if(tarLv<=8) tz=(cz==='low')?'mid8':'low';
  else if(tarLv<=12) tz='mid';
  else if(tarLv===14) tz='14';
  else if(tarLv===16) tz='16';
  else if(tarLv===18) tz='18';
  else tz='20';
  var key=color+'_'+cz+'_'+tz;
  if(GUIDE[key]) return GUIDE[key];
  if(isHigh){var kh=color+'_high_'+tz;if(GUIDE[kh]) return GUIDE[kh];}
  var keyFall=color+'_'+cz+'_'+tzTarget;
  if(GUIDE[keyFall]) return GUIDE[keyFall];
  return null;
}

function initColorBoard(){
  const root=cur, $=s=>root.querySelector(s);
  const board=$('[data-cbboard]'),stageEl=$('[data-cbstage]'),subsEl=$('[data-cbsubs]'),detail=$('[data-cbdetail]');
  const titleT=$('.cb-title .t'),titleS=$('.cb-title .s');
  // 점선 빔: 단면 중심(50%,46%)→각 부위로 div를 픽셀좌표로 회전배치 (SVG 비율버그 없이 모든 엔진서 정확)
  const linesEl=$('[data-cblines]');
  function buildBeams(){if(!linesEl)return;if(!document.body.contains(linesEl)){window.removeEventListener('resize',buildBeams);return}
    const W=board.offsetWidth,H=board.offsetHeight,cx=W*0.5,cy=H*0.46;
    linesEl.innerHTML=cbMods().map(m=>{const p=CB_POS[m.id]||[50,50];const dx=W*p[0]/100-cx,dy=H*p[1]/100-cy;
      const len=Math.sqrt(dx*dx+dy*dy),ang=Math.atan2(dy,dx)*180/Math.PI;
      return '<i class="cb-beam" style="left:'+cx.toFixed(1)+'px;top:'+cy.toFixed(1)+'px;width:'+len.toFixed(1)+'px;transform:rotate('+ang.toFixed(2)+'deg)"></i>';}).join('');}
  buildBeams();window.addEventListener('resize',buildBeams);
  const MAP={};cbMods().forEach(m=>MAP[m.id]=m);
  let lvl=0,curMod=null,curIdx=0;
  // 세분류 별자리: 모듈 코너에서 시작해 안쪽으로 가지처럼 노드를 픽셀좌표로 배치 (확대해도 코너 기준점은 고정)
  function buildSubs(m,p){
    const W=board.offsetWidth,H=board.offsetHeight;
    const mx=W*p[0]/100,my=H*p[1]/100;
    const N=m.cards.length,leftSide=p[0]<50,dir=p[1]<50?1:-1;
    const colX=leftSide?W*0.30:W*0.70;
    const gap=Math.min((H*0.44)/Math.max(N,1),58),first=Math.max(54,H*0.085);
    let beams=[],nodes=[],prev=[mx,my];
    for(let i=0;i<N;i++){
      const wob=(i%2?-1:1)*(leftSide?13:-13);
      const x=colX+wob;
      let y=my+dir*(first+i*gap);y=Math.max(H*0.07,Math.min(H*0.91,y));
      const dx=x-prev[0],dy=y-prev[1],len=Math.hypot(dx,dy),ang=Math.atan2(dy,dx)*180/Math.PI;
      beams.push('<i class="cb-sub-beam" style="left:'+prev[0].toFixed(1)+'px;top:'+prev[1].toFixed(1)+'px;width:'+len.toFixed(1)+'px;transform:rotate('+ang.toFixed(2)+'deg)"></i>');
      const c=m.cards[i];
      nodes.push('<button class="cb-sub'+(leftSide?' left':' right')+'" data-cbcard="'+i+'" style="left:'+x.toFixed(1)+'px;top:'+y.toFixed(1)+'px;animation-delay:'+(i*.06).toFixed(2)+'s"><span class="cs-no">'+String(i+1).padStart(2,'0')+'</span><span class="cs-t">'+c.t+'</span></button>');
      prev=[x,y];
    }
    const note=m.note?'<div class="cb-note"><span class="cb-note-ic">◇</span><span>'+m.note+'</span></div>':'';
    subsEl.innerHTML='<button class="cb-subback" data-cbsubback>‹ 부위 다시</button>'+note+beams.join('')+nodes.join('');
  }
  function focusMod(id){const m=MAP[id];if(!m)return;curMod=m;lvl=1;
    const p=CB_POS[id]||[50,50];
    stageEl.style.transformOrigin=p[0]+'% '+p[1]+'%';
    stageEl.style.transform='scale(1.75)';
    board.classList.add('zoom');
    titleT.textContent=m.name;titleS.textContent=m.tag;
    buildSubs(m,p);}
  function unfocus(){lvl=0;curMod=null;board.classList.remove('zoom');stageEl.style.transform='';
    detail.classList.remove('on');subsEl.innerHTML='';
    titleT.textContent='머리카락 단면';titleS.textContent='컬러가 일어나는 집 — 부위를 탭하세요';}
  function openCard(i){const N=curMod.cards.length;i=Math.max(0,Math.min(N-1,i));curIdx=i;const c=curMod.cards[i];lvl=2;
    $('[data-cbdttl]').innerHTML='<span class="cd-tag">'+(c.s?c.s+' · ':'')+curMod.name+'</span>'+c.t;
    const K=(CB_KEY[curMod.id]||[])[i];
    const sum=K?'<div class="cb-dsum"><div class="ds-h">◇ 핵심 요약</div>'+K.map(r=>'<div class="ds-row"><b>'+r[0]+'</b><span>'+r[1]+'</span></div>').join('')+'</div>':'';
    $('[data-cbdbody]').innerHTML='<div class="svz"><div class="viz3d'+((c.still||curMod.still)?' still':'')+'">'+V(c.viz||curMod.viz)+'</div></div>'+((c.b&&c.m)?'<div class="cb-dlead">'+c.b+'</div>':'')+'<div class="cb-dbody">'+(c.m||c.b)+'</div>'+sum;
    $('[data-cbdbody]').scrollTop=0;
    $('[data-cbpos]').textContent=(i+1)+' / '+N;
    $('[data-cbprev]').disabled=i<=0;$('[data-cbnext]').disabled=i>=N-1;
    subsEl.querySelectorAll('.cb-sub').forEach((b,k)=>b.classList.toggle('on',k===i));
    detail.classList.add('on');}
  function closeCard(){lvl=1;detail.classList.remove('on');
    subsEl.querySelectorAll('.cb-sub').forEach(b=>b.classList.remove('on'));}
  board.addEventListener('click',e=>{
    if(e.target.closest('[data-cbdx]')){closeCard();return}
    if(e.target.closest('[data-cbprev]')){openCard(curIdx-1);return}
    if(e.target.closest('[data-cbnext]')){openCard(curIdx+1);return}
    if(e.target.closest('[data-cbsubback]')){unfocus();return}
    const cd=e.target.closest('[data-cbcard]');if(cd){openCard(+cd.dataset.cbcard);return}
    const h=e.target.closest('[data-cbmod]');if(h){focusMod(h.dataset.cbmod);return}
  });
  const bk=$('[data-cbback]');if(bk)bk.onclick=()=>back();
  cbBack=()=>{if(lvl===2){closeCard();return true}if(lvl===1){unfocus();return true}return false};
}

function permMods(){return PLAT.perm.groups.reduce((a,g)=>a.concat(g.mods),[]);}
/* 7개 모듈 — 중심(50%,46%) 둘레 7각 배치 */
const PB_POS={p_hair:[50,11],p_chem:[80,25],p_soft:[86,53],p_shape:[66,80],p_wash:[34,80],p_neut:[14,53],p_field:[20,25]};
/* 중심 펌 허브 — 롯드에 감긴 컬(S-S 재배열) */
function permCoreSVG(par){
  const cx=100,top=42,bot=158,amp=33,turns=4.5,N=140;
  let pts=[];for(let i=0;i<=N;i++){const t=i/N,y=top+(bot-top)*t,ph=t*turns*2*Math.PI;pts.push({x:(cx+Math.sin(ph)*amp).toFixed(1),y:y.toFixed(1),front:Math.cos(ph)>=0});}
  const full='M'+pts.map(p=>p.x+' '+p.y).join(' L');
  let front='',pen=false;pts.forEach(p=>{if(p.front){front+=(pen?' L':' M')+p.x+' '+p.y;pen=true}else pen=false});
  const dots=pts.filter((p,i)=>i%17===0).map(p=>'<circle cx="'+p.x+'" cy="'+p.y+'" r="2.4" fill="#fff" opacity=".45"/>').join('');
  function lab(x,y,t,col,fs){return '<text x="'+x+'" y="'+y+'" text-anchor="middle" font-size="'+(fs||8.5)+'" font-weight="800" fill="'+col+'" stroke="rgba(0,0,0,.85)" stroke-width="2.6" paint-order="stroke" style="letter-spacing:.02em">'+t+'</text>';}
  return '<svg viewBox="0 0 200 200"'+(par?' preserveAspectRatio="'+par+'"':'')+'>'+
    '<circle cx="100" cy="100" r="94" fill="none" stroke="rgba(199,240,80,.16)" stroke-width=".5"/>'+
    '<circle cx="100" cy="100" r="84" fill="none" stroke="rgba(199,240,80,.22)" stroke-width="1" stroke-dasharray="2 8"><animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="28s" repeatCount="indefinite"/></circle>'+
    '<circle cx="100" cy="100" r="62" fill="rgba(199,240,80,.05)" stroke="rgba(199,240,80,.16)" stroke-width=".5"/>'+
    // 롯드 축 (머리가 감기는 봉)
    '<line x1="100" y1="34" x2="100" y2="166" stroke="rgba(199,240,80,.28)" stroke-width="7" stroke-linecap="round"/>'+
    '<line x1="100" y1="34" x2="100" y2="166" stroke="rgba(8,11,7,.5)" stroke-width="2" stroke-linecap="round"/>'+
    // 머리카락 코일 — 뒤(어둑) 전체 + 앞(밝음) 세그먼트로 3D 감김
    '<path d="'+full+'" fill="none" stroke="rgba(199,240,80,.26)" stroke-width="3" stroke-linecap="round"/>'+
    '<path d="'+front+'" fill="none" stroke="rgba(199,240,80,.95)" stroke-width="3.6" stroke-linecap="round" style="filter:drop-shadow(0 0 5px rgba(199,240,80,.65))"/>'+
    dots+
    '<line x1="100" y1="20" x2="100" y2="30" stroke="rgba(199,240,80,.55)" stroke-width=".7"/>'+
    lab(100,17,'컬 = S-S 재배열','#dff08c',8.5)+
    lab(100,184,'롯드에 감긴 모발','rgba(255,255,255,.9)',7.5)+
    '</svg>';
}

  function setLevel(i){i=Math.max(0,Math.min(STAGES.length-1,i));if(i===CJ.idx&&CJ._init)return;CJ._init=true;CJ.idx=i;
    const S=STAGES[i],l=S.lv,zk=ZONE_MAP[l],Z=ZONES[zk];
    $$('.cj-bgimg').forEach(b=>b.classList.toggle('on',+b.dataset.bg===i));
    $$('.cj-seg').forEach(s=>s.classList.toggle('on',+s.dataset.seg===i));
    $('[data-lvlabel]').textContent='LV '+l;$('[data-short]').textContent=S.short;
    $('[data-hsw]').style.background=S.hidden;$('[data-hnm]').textContent=S.hiddenName;
    $('[data-lvnum]').textContent=l;$('[data-lvnm]').textContent=S.name;$('[data-lvst]').textContent=S.stage;
    $('[data-eu]').textContent=S.eu;$('[data-ph]').textContent=S.pheo;
    $('[data-insight]').innerHTML=S.insight;
    $('[data-ztag]').textContent=Z.tag;$('[data-zttl]').textContent=Z.title;
    const routes=ROUTE_AVAIL[l]||['A'],RD=ROUTES_DATA[zk],rb=$('[data-routes]');rb.innerHTML='';
    routes.forEach((letter,k)=>{const c=document.createElement('div');c.className='chip';c.style.animationDelay=(k*.06)+'s';
      c.innerHTML='<span class="rt-let">'+letter+'</span>'+RD[letter].title;
      c.onclick=()=>openRoute(letter);rb.appendChild(c)});
    // 대상으로 '초점' — 탭 선택 시 사진이 살짝 돌며 확대, 정보 패널이 떠오름 (드래그 스캔 중엔 부드럽게 갱신만)
    if(typeof drag==='undefined'||!drag){
      const bgEl=$('[data-hero]'),hud=$('[data-hud]');
      bgEl.classList.remove('focus');hud.classList.remove('lay');void bgEl.offsetWidth;
      bgEl.classList.add('focus');hud.classList.add('lay');}
    closeDrawer();}
  // ── 경로 펼침 (보드 위 드로어) ──
  function openRoute(letter){CJ.route=letter;const l=lv(),zk=ZONE_MAP[l],Z=ZONES[zk],RD=ROUTES_DATA[zk],R=RD[letter],S=SBYLV[l];
    $('[data-drttl]').innerHTML='<span class="cd-tag">'+Z.tag+' · 경로 '+letter+' · Lv '+l+'</span>'+R.title;
    const body=$('[data-drbody]');body.innerHTML='';
    body.insertAdjacentHTML('beforeend','<p class="rt-sub">'+R.subtitle+'</p>');
    body.insertAdjacentHTML('beforeend','<div class="rt-mech">'+R.mechanism.map(m=>'<div class="mrow"><b>'+m.title+'</b><span>'+m.desc+'</span></div>').join('')+'</div>');
    if(R.clearDef)body.insertAdjacentHTML('beforeend','<div class="rt-clear">✦ '+R.clearDef+'</div>');
    if(R.recipes)body.insertAdjacentHTML('beforeend',recipesHTML(R.recipes));
    if(R.complement){const C=R.complement;
      body.insertAdjacentHTML('beforeend','<div class="rt-sec"><div class="sec-t">'+C.title+'</div><p class="sec-sub">'+C.subtitle+'</p></div>');
      const grid=document.createElement('div');grid.className='spread';const resHex=S.hidden,resName=S.hiddenName;
      C.colors.forEach((col,i)=>{const card=document.createElement('div');card.className='rcard';card.style.animationDelay=(i*.07)+'s';
        card.innerHTML='<div class="rc-head"><div class="rc-thumb" style="background:'+col.hex+'"></div><div class="rc-tt">'+col.name+' 보색<small>'+col.tag+' · → '+col.result+'</small></div></div>'+
          '<div class="rc-body"><span class="ln">'+col.desc+'</span></div>'+
          '<div class="rc-merge"><div class="rc-stage">'+
            '<div class="rc-orb rc-resid" style="background:'+resHex+'"><b>'+resName+'</b></div>'+
            '<span class="rc-op a">+</span>'+
            '<div class="rc-orb rc-comp" style="background:'+col.hex+'"><b>'+col.name+'</b></div>'+
            '<span class="rc-op b">▸</span>'+
            '<div class="rc-orb rc-out" style="background:'+hx(col.converge)+';color:'+hx(col.converge)+'"><b>'+col.result+'</b></div>'+
          '</div><div class="rc-cap">● 결과색 원을 눌러 — 잔류+보색 합체</div></div>';
        const out=card.querySelector('.rc-out');const play=()=>card.classList.toggle('play');
        out.onclick=e=>{e.stopPropagation();play()};card.onclick=play;grid.appendChild(card)});
      body.appendChild(grid);
      if(C.twoFaces){const tf=document.createElement('div');tf.className='rt-faces';
        tf.innerHTML='<div class="sec-t sm">보색의 두 얼굴</div>'+C.twoFaces.points.map((p,i)=>'<div class="face"><span class="fn">'+(i?'②':'①')+'</span>'+p+'</div>').join('')+
          (C.twoFaces.note?'<p class="face-note">◈ '+C.twoFaces.note+'</p>':'');body.appendChild(tf)}
      if(C.examples)body.insertAdjacentHTML('beforeend',recipesHTML(C.examples));
      if(C.limit)body.insertAdjacentHTML('beforeend','<div class="rt-limit">△ 한계 — '+C.limit+'</div>');
    }else if(R.limit)body.insertAdjacentHTML('beforeend','<div class="rt-limit">△ 한계 — '+R.limit+'</div>');
    body.insertAdjacentHTML('beforeend','<div class="rt-warm">☼ 난색 계열 — '+Z.warmTone+'</div>');
    body.scrollTop=0;$('[data-drawer]').classList.add('on');}
  function closeDrawer(){CJ.route=null;$('[data-drawer]').classList.remove('on');}
  // ── 이벤트 ──
  $$('.cj-seg').forEach(s=>s.addEventListener('click',()=>setLevel(+s.dataset.seg)));
  $('[data-drx]').addEventListener('click',closeDrawer);
  const hero=$('[data-hero]'),spine=$('[data-spine]'),hint=$('[data-hint]');let drag=false;
  function idxFromY(cy){const r=spine.getBoundingClientRect();const p=Math.min(1,Math.max(0,(cy-r.top)/r.height));return Math.round((1-p)*(STAGES.length-1));}
  function scrub(e){const y=e.touches?e.touches[0].clientY:e.clientY;setLevel(idxFromY(y));}
  function down(e){drag=true;if(hint)hint.classList.add('hide');scrub(e);}
  hero.addEventListener('mousedown',down);spine.addEventListener('mousedown',e=>{drag=true;if(hint)hint.classList.add('hide')});
  window.addEventListener('mousemove',e=>{if(drag)scrub(e)});
  window.addEventListener('mouseup',()=>drag=false);
  hero.addEventListener('touchstart',e=>{down(e);e.preventDefault()},{passive:false});
  spine.addEventListener('touchstart',e=>{drag=true;if(hint)hint.classList.add('hide');e.preventDefault()},{passive:false});
  window.addEventListener('touchmove',e=>{if(drag){scrub(e);e.preventDefault()}},{passive:false});
  window.addEventListener('touchend',()=>drag=false);
  CJ._init=false;setLevel(0);
}
