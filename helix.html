function initMel(){
  const $=s=>cur.querySelector(s),$$=s=>cur.querySelectorAll(s);
  const MLV=MEL.LV;
  const st={cw:null,color:null,curr:null,tar:null};
  MEL.S.cw=null;
  const scale=$('[data-scale]');
  scale.innerHTML=MLV.map(v=>'<div class="msz" data-lv="'+v+'"><span class="n">'+v+'</span></div>').join('');
  const chips=$('[data-chips]'),pop=$('[data-pop]'),stageEl=$('.mel-stage');
  chips.innerHTML=Object.keys(MEL.SW).map(k=>{var sw=MEL.SW[k];return '<button class="mchip" data-k="'+k+'"><span class="cdot" style="background:'+sw.dot+'"></span>'+sw.lb+'</button>';}).join('');
  function openPop(lv){var t=$('[data-pop-ttl]');if(t)t.textContent=(st.cw==='cool'?'한색 ':st.cw==='warm'?'난색 ':'')+'Lv.'+lv+' — 이 명도에서 원하는 색감';pop.classList.add('on');}
  function closePop(){pop.classList.remove('on');}
  function nl(t){return (t||'').split('\n').map(function(x){return x?'<span class="ln">'+x+'</span>':'<span class="ln sp"></span>';}).join('');}
  function dimPhoto(){$('.mp-ol.l').style.opacity=st.cw==='warm'?'1':'0';$('.mp-ol.r').style.opacity=st.cw==='cool'?'1':'0';}
  function renderCol(){var col=$('[data-col]');
    if(!st.color){col.innerHTML='<div class="mc-empty">색감을 고르면<br>레벨별 색이<br>여기 깔려요<span class="mc-cap">목표 명도 ▸ 탭</span></div>';return;}
    var sw=MEL.SW[st.color];
    col.innerHTML=MLV.map(v=>{var c=sw.lv[v],lb=MEL.getLabelName(st.color,v);
      return '<div class="mcz'+(st.tar===v?' tar':'')+'" data-lv="'+v+'" style="background:'+c+'"><span class="lb">'+lb+'</span></div>';}).join('');
    col.querySelectorAll('.mcz').forEach(z=>z.onclick=()=>setTar(+z.dataset.lv));}
  function marks(){
    $$('.msz').forEach(z=>z.classList.toggle('cur',+z.dataset.lv===st.curr));
    $$('.mcz').forEach(z=>z.classList.toggle('tar',+z.dataset.lv===st.tar));
    $('[data-cur-lbl]').textContent=st.curr?((st.cw==='warm'?'난색':st.cw==='cool'?'한색':'')+' Lv.'+st.curr):'—';
    $('[data-tar-lbl]').textContent=st.tar?('Lv.'+st.tar+(st.color?' '+MEL.getLabelName(st.color,st.tar):'')):'—';}
  function setCw(cw){st.cw=cw;MEL.S.cw=cw;$$('.mcw').forEach(b=>b.classList.toggle('on',b.dataset.cw===cw));dimPhoto();marks();renderGuide();}
  function setColor(k){st.color=k;$$('.mchip').forEach(b=>b.classList.toggle('on',b.dataset.k===k));renderCol();marks();renderGuide();closePop();}
  function setCur(lv){st.curr=lv;marks();renderGuide();openPop(lv);}
  function setTar(lv){st.tar=lv;marks();renderGuide();}
  function renderGuide(){var box=$('[data-guide]');
    if(!(st.cw&&st.color&&st.curr&&st.tar)){box.classList.remove('filled');box.innerHTML='<div class="mg-empty">먼저 — 모발이 <b>한색</b>에 가까운 언더톤인지, <b>난색</b>에 가까운 언더톤인지 골라보세요.<br>선택한 언더톤에 따라 염색 이론이 달라집니다. 각각 눌러 비교하며 공부해보세요.</div>';return;}
    MEL.S.cw=st.cw;
    var g=MEL.getGuide(st.color,st.curr,st.tar),tarLabel=MEL.getLabelName(st.color,st.tar);
    var head=(st.cw==='cool'?'한색':'난색')+' Lv.'+st.curr+' → '+tarLabel;
    box.classList.remove('filled');void box.offsetWidth;box.classList.add('filled');
    if(!g){box.innerHTML='<div class="mg-head">'+head+'</div><div class="mg-prep">시술 가이드 준비 중입니다.</div>';return;}
    var html='<div class="mg-head">'+head+'</div>';
    html+='<div class="mg-sec"><div class="mg-t">시술</div><div class="mg-b">'+nl(g.proc)+'</div></div>';
    if(g.det)html+='<div class="mg-sec det"><div class="mg-t">실무조언</div><div class="mg-b">'+nl(g.det)+'</div></div>';
    if(st.cw==='warm'){
      if(st.color==='red'||st.color==='rv'||st.color==='pink'){
        html+='<div class="mg-sec warm"><div class="mg-t">난색 퇴색모 참고사항</div><div class="mg-b">'+nl('난색 퇴색모는 붉은기 잔류가 강하지만, '+MEL.SW[st.color].lb+' 시술에서는 오히려 도움이 됩니다.\n잔류 붉은기가 같은 계열이라 발색이 수월하고 유지력도 좋아요.\n16레벨에서는 주황노랑기가 남아 레드 쪽으로 치우칠 수 있으니 바이올렛 소량 믹스를 고려하세요.')+'</div></div>';
      } else {
        html+='<div class="mg-sec warm"><div class="mg-t">난색 퇴색모 주의사항</div><div class="mg-b">'+nl('난색 퇴색모는 붉은기 잔류가 강해 원하는 색상으로 가기 쉽지않아요.\n탈색 후에도 레드기가 잘 안빠지거나, 보색 중화를해도 적빛브라운으로 수렴되는경우가있어요.\n난색기를 충분히 억제하며 한색 계열로 체인지하는 데 집중하세요.\n잔류 상태에 따라 그린 · 블루 · 애쉬 · 청보라 · 바이올렛 중 적절한 보색을 선택하는 것이 중요합니다.\n(애쉬카키, 블루애쉬, 보라애쉬 등 보색 기능이 강화된 염모제를 활용하시면 보다 안정적인 결과를 얻을 수 있습니다.)')+'</div></div>';
      }
    }
    box.innerHTML=html;}
  $$('.mcw').forEach(b=>b.onclick=()=>setCw(b.dataset.cw));
  $$('.mchip').forEach(b=>b.onclick=()=>setColor(b.dataset.k));
  $$('.msz').forEach(z=>z.onclick=()=>setCur(+z.dataset.lv));
  $('[data-popx]').onclick=closePop;
}

/* ---------- render + 전환 ---------- */
function build(st){if(st.v==='root')return viewRoot();if(st.v==='hub')return viewHub(st.k);if(st.v==='mod')return viewMod(st.k,st.mod);if(st.v==='infer')return viewInfer();if(st.v==='mel')return viewMel();if(st.v==='cboard')return viewColorBoard();if(st.v==='pboard')return viewPermBoard()}
function fly(next,org,dir){
  const inc=el(build(next));inc.style.transformOrigin=org;
  inc.classList.add(dir==='in'?'s-enter-in':'s-enter-out');stage.appendChild(inc);void inc.offsetWidth;
  const out=cur;if(out)out.style.transformOrigin=org;
  cur=inc;state=next;
  if(next.v==='infer')initInfer();
  if(next.v==='mel')initMel();
  if(next.v==='cboard')initColorBoard();
  if(next.v==='pboard')initPermBoard();
  requestAnimationFrame(()=>{inc.classList.remove('s-enter-in','s-enter-out');
    if(out){out.classList.add(dir==='in'?'s-leave-in':'s-leave-out');setTimeout(()=>out.remove(),680)}});
}
function go(next,org){stack.push({state,org});fly(next,org,'in')}
function back(){if((state.v==='cboard'||state.v==='pboard')&&cbBack&&cbBack())return;if(!stack.length)return;const p=stack.pop();if(p.diveBack){undive(p);return}fly(p.state,p.org||'50% 46%','out')}
/* 카드→보드 줌(다이브): 대문은 뒤에 남겨두고, 누른 사진 카드가 그대로 풀스크린으로 자라남 */
function diveInto(node,next){
  const card=node.querySelector('.npho');if(!card)return go(next,origin(node));
  const r=card.getBoundingClientRect(),root=cur;
  const ox=((r.left+r.width/2)/innerWidth*100)+'% '+((r.top+r.height/2)/innerHeight*100)+'%';
  root.style.transformOrigin=ox;void root.offsetWidth;root.classList.add('divein');
  const inc=el(build(next));inc.classList.add('diving');stage.appendChild(inc);
  cur=inc;state=next;
  if(next.v==='infer')initInfer();if(next.v==='mel')initMel();
  inc.style.transition='none';
  inc.style.transformOrigin='0 0';
  inc.style.transform='translate('+r.left+'px,'+r.top+'px) scale('+(r.width/innerWidth)+','+(r.height/innerHeight)+')';
  void inc.offsetWidth;
  requestAnimationFrame(()=>{
    inc.style.transition='transform .62s cubic-bezier(.6,0,.22,1)';
    inc.style.transform='none';});
  const done=ev=>{if(ev&&ev.propertyName!=='transform')return;inc.removeEventListener('transitionend',done);
    inc.classList.remove('diving');inc.style.transition='';inc.style.transform='';inc.style.transformOrigin='';};
  inc.addEventListener('transitionend',done);
  setTimeout(()=>done(),720);
  stack.push({state:{v:'root'},diveBack:{root,node}});
}
function undive(p){
  const inc=cur,root=p.diveBack.root,card=p.diveBack.node.querySelector('.npho');
  const r=card.getBoundingClientRect();
  inc.classList.add('diving');inc.style.transformOrigin='0 0';
  inc.style.transition='transform .55s cubic-bezier(.6,0,.22,1),opacity .5s ease';
  requestAnimationFrame(()=>{
    inc.style.transform='translate('+r.left+'px,'+r.top+'px) scale('+(r.width/innerWidth)+','+(r.height/innerHeight)+')';
    inc.style.opacity='0';root.classList.remove('divein');});
  setTimeout(()=>inc.remove(),580);
  cur=root;state=p.state;
}

/* ---------- events ---------- */
stage.addEventListener('click',e=>{
  if(e.target.closest('[data-exit]')){if(history.length>1)history.back();else location.href='/';return}
  if(e.target.closest('[data-back]')){back();return}
  const tw=e.target.closest('[data-town]');
  if(tw){const k=tw.dataset.town;if(k==='infer')diveInto(tw,{v:'infer'});else if(k==='mel')diveInto(tw,{v:'mel'});else if(k==='color')go({v:'cboard'},origin(tw));else if(k==='perm')go({v:'pboard'},origin(tw));else go({v:'hub',k},origin(tw));return}
  if(e.target.closest('.ij-wrap'))return; // 저니 내부는 자체 처리
  const nd=e.target.closest('[data-mod]');if(nd){go({v:'mod',k:state.k,mod:nd.dataset.mod},origin(nd));return}
  const cd=e.target.closest('[data-card]');if(cd){openDetail(state.k,state.mod,+cd.dataset.card,cd);return}
});
ov.addEventListener('click',e=>{if(e.target.closest('[data-close]')||e.target.classList.contains('veil'))closeDetail()});

/* ---------- boot ---------- */
cur=el(build(state));stage.appendChild(cur);
