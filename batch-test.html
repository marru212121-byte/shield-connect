<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>v19 배치 검수</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#F5F4F0;color:#1C1917;padding:20px}
h1{font-size:18px;font-weight:800;margin-bottom:4px}
.sub{font-size:12px;color:#A8A29E;margin-bottom:16px}
.upload-area{border:2px dashed #d5cfc7;border-radius:14px;padding:32px 20px;text-align:center;cursor:pointer;background:#FAF8F4;margin-bottom:16px;transition:all .2s}
.upload-area:hover{border-color:#C4A97A;background:#D4B89608}
.upload-area .txt{font-size:13px;color:#A8A29E;line-height:1.6}
.upload-area .txt b{color:#8B7355;font-weight:600}
.controls{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.controls button{font-family:inherit;font-size:13px;padding:8px 14px;border-radius:10px;border:none;background:#1C1917;color:#fff;font-weight:600;cursor:pointer}
.controls button:disabled{opacity:0.4;cursor:not-allowed}
.controls .count{font-size:12px;color:#A8A29E}

.results{display:flex;flex-direction:column;gap:16px}

.result-card{background:#fff;border-radius:16px;border:1.5px solid #e8e4df;overflow:hidden}
.result-top{display:flex;gap:0}
.result-img-wrap{width:200px;min-height:200px;flex-shrink:0;overflow:hidden;background:#eee;position:relative}
.result-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.result-num{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.6);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
.result-status{position:absolute;top:8px;right:8px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}
.result-status.analyzing{background:#FFF3CD;color:#856404}
.result-status.done{background:#D4EDDA;color:#155724}
.result-status.error{background:#F8D7DA;color:#721C24}

.result-analysis{flex:1;padding:14px;min-width:0}
.result-color-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.result-swatch{width:32px;height:32px;border-radius:8px;border:1.5px solid rgba(0,0,0,0.08);flex-shrink:0}
.result-color-name{font-size:15px;font-weight:700}
.result-tone{font-size:11px;color:#A8A29E}
.result-desc{font-size:12px;color:#6B5D4E;line-height:1.6;margin-bottom:8px}
.result-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.result-tags span{font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;background:#D4B89618;color:#8B7355}
.result-direction{font-size:11px;color:#555;line-height:1.5;padding:8px;border-radius:6px;background:rgba(26,24,20,0.04)}
.result-direction b{color:#1A1814}

/* 탭 UI */
.recipe-tabs{display:flex;border-top:1px solid #e8e4df;overflow-x:auto}
.recipe-tab{flex:1;min-width:0;padding:10px 8px;font-size:11px;font-weight:600;text-align:center;cursor:pointer;border:none;background:none;color:#A8A29E;border-bottom:2px solid transparent;font-family:inherit;white-space:nowrap}
.recipe-tab.active{color:#1C1917;border-bottom-color:#C4A97A;background:#FAF8F4}
.recipe-tab .tab-status{display:block;font-size:9px;font-weight:400;margin-top:2px}

.recipe-panels{border-top:1px solid #e8e4df}
.recipe-panel{display:none;padding:14px}
.recipe-panel.active{display:block}

.recipe-summary{font-size:13px;font-weight:600;color:#1C1917;line-height:1.6;margin-bottom:10px}
.recipe-tips-block{background:#FBF7F1;border:1px solid #EDE6DA;border-radius:10px;padding:12px;font-size:12px;color:#6B5D4E;line-height:1.8;white-space:pre-line}
.recipe-tips-block b{color:#1C1917;font-weight:700;font-size:13px}
.recipe-virgin{background:#FAF6F0;border:1px solid #EDE6DA;border-radius:8px;padding:10px;margin-top:8px;font-size:11px;color:#6B5D4E;line-height:1.7}
.recipe-virgin strong{color:#8B7355;font-size:12px;font-weight:700;display:block;margin-bottom:4px}

/* 룰 체크 결과 */
.rule-check-wrap{margin-top:10px;border-top:1px solid #e8e4df;padding-top:10px}
.rule-check-title{font-size:11px;font-weight:700;color:#1C1917;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.rule-check-pass{color:#155724;background:#D4EDDA;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}
.rule-check-fail{color:#721C24;background:#F8D7DA;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}
.rule-violation{font-size:11px;color:#721C24;line-height:1.6;padding:6px 8px;margin-bottom:4px;background:#FFF5F5;border-radius:6px;border-left:3px solid #E53E3E}
.rule-violation .rule-id{font-weight:700;color:#C53030}
.rule-all-pass{font-size:11px;color:#155724;padding:6px 8px;background:#F0FFF4;border-radius:6px}

/* 탭 위반 카운트 */
.tab-violations{display:inline-block;background:#E53E3E;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:4px}
.tab-pass-badge{display:inline-block;background:#38A169;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:4px}

/* 전체 요약 */
.batch-summary{background:#fff;border-radius:16px;border:1.5px solid #e8e4df;padding:16px;margin-bottom:16px;display:none}
.batch-summary.show{display:block}
.batch-summary h3{font-size:14px;font-weight:800;margin-bottom:10px}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.summary-cell{text-align:center;padding:10px 8px;border-radius:10px;background:#FAF8F4}
.summary-cell .label{font-size:10px;color:#A8A29E;margin-bottom:4px}
.summary-cell .value{font-size:18px;font-weight:800}
.summary-cell .value.pass{color:#38A169}
.summary-cell .value.fail{color:#E53E3E}
.summary-cell .value.mixed{color:#D69E2E}
.freq-violations{margin-top:12px}
.freq-violations h4{font-size:12px;font-weight:700;color:#1C1917;margin-bottom:6px}
.freq-item{font-size:11px;color:#6B5D4E;padding:4px 0;display:flex;justify-content:space-between;border-bottom:1px solid #f0ece6}
.freq-item .cnt{font-weight:700;color:#E53E3E}
</style>
</head>
<body>

<h1>v19 배치 검수 도구</h1>
<div class="sub">사진 여러 장 → STEP 1 분석 + 4분기(자연모·탈색모 3종) 레시피 동시 생성</div>

<div class="upload-area" onclick="document.getElementById('batchInput').click()">
  <div class="txt">검수할 사진을 <b>여러 장 선택</b>하세요<br>(한 번에 최대 5장 — 4분기×5장=20호출)</div>
</div>
<input type="file" id="batchInput" accept="image/*" multiple style="display:none" onchange="handleBatchUpload(this)"/>

<div class="controls">
  <button id="runBtn" onclick="runBatch()" disabled>검수 시작</button>
  <span class="count" id="countLabel"></span>
</div>

<div class="batch-summary" id="batchSummary">
  <h3>룰 체크 요약</h3>
  <div class="summary-grid" id="summaryGrid"></div>
  <div class="freq-violations" id="freqViolations"></div>
</div>

<div class="results" id="results"></div>

<script>
var API_URL = '/api/recipe';
var pendingFiles = [];

var BASE_CONFIGS = [
  {key:'natural', label:'자연모', baseDesc:'자연모/염색모 (동양인, 적색멜라닌 가득, 탈색 이력 없음, 약 5레벨)', type:'natural'},
  {key:'orange_yellow', label:'탈색 14~16', baseDesc:'탈색모 — 주황~노랑(14~16레벨). 주황기~노랑기가 잔류해있다.', type:'bleached'},
  {key:'yellow', label:'탈색 16', baseDesc:'탈색모 — 노랑(16레벨). 주황기는 빠지고 노랑기가 잔류해있다.', type:'bleached'},
  {key:'pale_yellow', label:'탈색 18~20', baseDesc:'탈색모 — 연노랑~아이보리(18~20레벨). 잔류 색소가 거의 없다. 염료가 그대로 발색된다.', type:'bleached'}
];

function handleBatchUpload(input){
  pendingFiles = Array.from(input.files).slice(0, 5);
  document.getElementById('countLabel').textContent = pendingFiles.length + '장 선택됨 (×4분기 = ' + (pendingFiles.length*4) + '호출)';
  document.getElementById('runBtn').disabled = false;

  var container = document.getElementById('results');
  container.innerHTML = '';
  pendingFiles.forEach(function(file, i){
    var card = document.createElement('div');
    card.className = 'result-card';
    card.id = 'card-' + i;
    var url = URL.createObjectURL(file);

    var tabsHtml = '<div class="recipe-tabs" id="tabs-'+i+'">';
    var panelsHtml = '<div class="recipe-panels" id="panels-'+i+'">';
    BASE_CONFIGS.forEach(function(cfg, j){
      tabsHtml += '<button class="recipe-tab'+(j===0?' active':'')+'" onclick="switchTab('+i+','+j+')" id="tab-'+i+'-'+j+'">'+cfg.label+'<span class="tab-status" id="tabst-'+i+'-'+j+'">대기</span></button>';
      panelsHtml += '<div class="recipe-panel'+(j===0?' active':'')+'" id="panel-'+i+'-'+j+'"><div style="color:#A8A29E;font-size:12px">대기 중...</div></div>';
    });
    tabsHtml += '</div>';
    panelsHtml += '</div>';

    card.innerHTML = '<div class="result-top">'
      + '<div class="result-img-wrap"><img src="'+url+'" alt=""/><span class="result-num">#'+(i+1)+'</span><span class="result-status" id="status-'+i+'">대기</span></div>'
      + '<div class="result-analysis" id="analysis-'+i+'"><div style="color:#A8A29E;font-size:12px;padding:20px">대기 중...</div></div>'
      + '</div>'
      + tabsHtml + panelsHtml;
    container.appendChild(card);
  });
}

function switchTab(cardIdx, tabIdx){
  BASE_CONFIGS.forEach(function(_,j){
    document.getElementById('tab-'+cardIdx+'-'+j).classList.toggle('active', j===tabIdx);
    document.getElementById('panel-'+cardIdx+'-'+j).classList.toggle('active', j===tabIdx);
  });
}

function fileToBase64(file){
  return new Promise(function(resolve, reject){
    var reader = new FileReader();
    reader.onload = function(e){
      var full = e.target.result;
      var data = full.split(',')[1];
      resolve({base64: data, mediaType: file.type || 'image/jpeg', full: full});
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ══════════════════════════════════
   룰 체크 엔진
   — JSON 출력만 보고 Part A~F 룰 위반을 자동 감지
══════════════════════════════════ */

// 모든 체크 결과를 모아두는 전역 저장소
var allCheckResults = []; // [{cardIdx, cfgKey, cfgLabel, violations:[]}]

function checkRules(recipe, cfg, analysis){
  var violations = [];
  var tips = (recipe.tips || '').toLowerCase();
  var summary = (recipe.summary || '').toLowerCase();
  var tipsRaw = recipe.tips || '';
  var summaryRaw = recipe.summary || '';
  var fullText = tipsRaw + ' ' + summaryRaw;
  var fullLower = fullText.toLowerCase();

  // 색감명 기반 판단 헬퍼
  var colorName = (analysis.color_name_ko || '').toLowerCase();
  var direction = (analysis.recipe_direction || '').toLowerCase();
  var elements = analysis.elements || [];
  var isBlonde = /블론드|백금|화이트/.test(colorName) || /블론드|백금|화이트/.test(direction);
  var isWarmTarget = /레드|핑크|로즈|와인|체리|오렌지|구리/.test(colorName) || /난색/.test(direction);

  // ═══ 1. 탈색모 구조 위반 ═══
  if(cfg.type === 'bleached'){
    // 1-1. 탈색모인데 virgin_recipe가 있다
    if(recipe.virgin_recipe !== null && recipe.virgin_recipe !== undefined){
      violations.push({id:'B-01', msg:'탈색모인데 virgin_recipe가 null이 아님'});
    }
    // 1-2. 탈색모인데 "탈색 N회" 횟수 안내
    if(/탈색\s*\d+\s*회/.test(tipsRaw) && !/추가\s*탈색/.test(tipsRaw)){
      // "추가 탈색"이 아닌 일반 탈색 횟수 안내
      violations.push({id:'B-02', msg:'탈색모인데 "탈색 N회" 횟수 안내가 포함됨'});
    }
    // 1-3. 탈색모인데 "역추론" 단어
    if(/역추론/.test(fullText)){
      violations.push({id:'B-03', msg:'탈색모인데 "역추론" 단어가 출력됨'});
    }
    // 1-4. 탈색모인데 "버진모" 단어
    if(/버진모/.test(fullText)){
      violations.push({id:'B-04', msg:'탈색모인데 "버진모" 단어가 출력됨'});
    }
  }

  // ═══ 2. 연노랑~아이보리(18~20) 베이스 위반 ═══
  if(cfg.key === 'pale_yellow'){
    // 2-1. 보색이 메인으로 들어감 (바이올렛/블루가 메인급 비중)
    // "바이올렛 염모제" 또는 "블루 염모제"가 첫 번째 조합으로 나오면 메인
    var firstMix = tipsRaw.split('\n')[0] || '';
    // 블론드가 아닌데 보색 메인 — 블론드는 극고명도 원리 별도 체크
    if(!isBlonde){
      // 단, 라벤더/바이올렛 계열 색감은 바이올렛이 메인이 맞으므로 제외
      var isVioletTarget = /라벤더|바이올렛|퍼플/.test(colorName);
      if(!isVioletTarget && /바이올렛\s*(염모제|컨트롤컬러).*메인|메인.*바이올렛|^.*바이올렛\s*염모제\s*\+/m.test(tipsRaw)){
        // 복잡한 패턴 대신 간단하게: 18~20에서 보색 "소량"이 아닌 메인 사용 체크
      }
    }

    // 2-2. 블록②(추가 탈색)가 출력됨
    if(/추가\s*탈색/.test(fullText) || /도달해야/.test(fullText)){
      violations.push({id:'P-01', msg:'18~20 베이스인데 추가 탈색 언급 (블록① 하나만 출력해야 함)'});
    }

    // 2-3. 블론드인데 애쉬가 메인
    if(isBlonde){
      // 애쉬 염모제가 첫 번째로 나오면 메인
      if(/애쉬\s*염모제/.test(tipsRaw) && !/뉴트럴브라운/.test(tipsRaw.split('애쉬')[0])){
        // summary에서도 확인 — 애쉬가 첫 계열이면 메인
        if(/애쉬\s*염모제/.test(summaryRaw.split('착색')[0] || '')){
          violations.push({id:'P-02', msg:'블론드/백금발 목표인데 애쉬가 메인 → 회색이 되지 블론드가 아님'});
        }
      }
    }

    // 2-4. 블론드인데 클리어 없음
    if(isBlonde && !/클리어/.test(fullText)){
      violations.push({id:'P-03', msg:'블론드/백금발 목표인데 클리어(희석) 없음 → 극고명도 원리 위반'});
    }
  }

  // ═══ 3. 노랑(16) 베이스 위반 ═══
  if(cfg.key === 'yellow'){
    // 3-1. 블루가 메인
    if(/블루\s*염모제/.test(tipsRaw) || /블루애쉬\s*염모제/.test(tipsRaw)){
      // 블루가 소량이 아니라 메인인지 체크
      if(!/블루\s*(컨트롤컬러|소량)/.test(tipsRaw) && /블루/.test(summaryRaw)){
        violations.push({id:'Y-01', msg:'16레벨(노랑)인데 블루가 메인 → 노랑+파랑=초록, 매트하게 빠짐. 바이올렛이 맞음'});
      }
    }
    // 3-2. 도달 베이스가 14~16으로 내려감 (아래로는 못 감)
    if(/14.*16.*레벨|주황.*노랑.*도달/.test(fullText) && /도달/.test(fullText)){
      violations.push({id:'Y-02', msg:'16레벨에서 14~16으로 도달 베이스 하향 — 불가'});
    }
  }

  // ═══ 4. 주황~노랑(14~16) 베이스 위반 ═══
  if(cfg.key === 'orange_yellow'){
    // 4-1. 도달 베이스 3단계 밖
    // (14~16에서 갈 수 있는 곳: 16 또는 18~20)
    // 현재로선 도달 베이스가 명시적으로 잘못된 레벨인지 텍스트로 체크하기 어려움 — skip

    // 4-2. 뉴트럴브라운이 메인 (한색 목표인데)
    if(!isWarmTarget && /뉴트럴브라운\s*염모제/.test(summaryRaw)){
      violations.push({id:'O-01', msg:'14~16 베이스 한색 목표인데 뉴트럴브라운이 메인 → 한색 염모제가 메인이어야 함'});
    }
  }

  // ═══ 5. 자연모 위반 ═══
  if(cfg.type === 'natural'){
    // 5-1. virgin_recipe null이면서 탈색 필수도 아닌 경우
    var hasBleachInSummary = /탈색/.test(summaryRaw);
    var hasVirgin = recipe.virgin_recipe && recipe.virgin_recipe.text;
    if(!hasBleachInSummary && !hasVirgin){
      // 탈색도 아니고 virgin_recipe도 없으면 구조 이상
      violations.push({id:'N-01', msg:'자연모인데 탈색 언급도 없고 virgin_recipe도 없음 — 구조 이상'});
    }
    // 5-2. 버진모 가능인데 산화제 없음
    if(!hasBleachInSummary && hasVirgin){
      // 버진모 가능 판단인데 산화제 언급 없음
      if(!/산화제|9%|12%/.test(fullText)){
        violations.push({id:'N-02', msg:'버진모 가능 판단인데 산화제(9%/12%) 언급 없음'});
      }
    }
    // 5-3. virgin_recipe에서 탈색 후 색감명 사용
    if(recipe.virgin_recipe && recipe.virgin_recipe.text){
      var vrText = recipe.virgin_recipe.text;
      if(/라벤더\s*방향|실버\s*방향|블론드\s*방향|파스텔\s*방향/.test(vrText)){
        violations.push({id:'N-03', msg:'virgin_recipe에서 "라벤더/실버/블론드 방향" 사용 — 버진모에서 불가능한 색감명'});
      }
    }
    // 5-4. 난색 목표인데 탈색 필수 판단
    if(isWarmTarget && hasBleachInSummary && !(/투명|파스텔|비비드/.test(colorName))){
      violations.push({id:'N-04', msg:'난색(레드/핑크/로즈) 목표인데 탈색 필수 판단 — 난색은 버진모에서 가능'});
    }
  }

  // ═══ 6. 공통 위반 (전 분기) ═══

  // 6-1. 조합 4가지 이상 (염모제+컨트롤컬러 카운트)
  var mixCount = (tipsRaw.match(/염모제|컨트롤컬러/g) || []).length;
  // 블록이 여러 개면 각 블록에서 카운트해야 하므로, 첫 블록만 체크
  var firstBlock = tipsRaw.split(/\n\n/)[0] || '';
  var firstBlockMix = (firstBlock.match(/(염모제|컨트롤컬러)/g) || []).length;
  if(firstBlockMix > 6){ // 3조합이면 최대 6개 (X 염모제 + Y 염모제 + Z 컨트롤컬러 = 반복 포함)
    violations.push({id:'C-01', msg:'첫 블록에서 조합이 과도하게 많음 (최대 3가지: 염모제+염모제+컨트롤컬러)'});
  }

  // 6-2. "뉴트럴브라운 컨트롤컬러"
  if(/뉴트럴브라운\s*컨트롤컬러/.test(fullText)){
    violations.push({id:'C-02', msg:'"뉴트럴브라운 컨트롤컬러" 사용 — 뉴트럴브라운은 염모제 계열'});
  }

  // 6-3. 금지 단어
  var banned = [
    {word:'원샷', id:'C-03'},
    {word:'멜라닌', id:'C-04'},
    {word:'중화', id:'C-05'},
    {word:'깨라', id:'C-06'},
    {word:'눌러', id:'C-07'},
    {word:'탁한', id:'C-08'},
    {word:'탁해진', id:'C-09'},
    {word:'파우더', id:'C-10'},
    {word:'트리트먼트로 보완', id:'C-11'},
    {word:'시술자의 판단에 따라', id:'C-12'},
    {word:'모발이 건조해', id:'C-13'}
  ];
  banned.forEach(function(b){
    if(fullLower.indexOf(b.word) !== -1){
      violations.push({id:b.id, msg:'금지 단어 "'+b.word+'" 검출'});
    }
  });

  // 6-4. "CC" 단독 사용 (컨트롤컬러 약어)
  if(/\bCC\b/.test(fullText)){
    violations.push({id:'C-14', msg:'"CC" 사용 → "컨트롤컬러"로 표기해야 함'});
  }

  // 6-5. ** 기호
  if(/\*\*/.test(fullText)){
    violations.push({id:'C-15', msg:'"**" 기호 검출 — 출력 금지'});
  }

  // 6-6. "탁한 ~" 수렴 방향 표현
  if(/탁한\s/.test(tipsRaw)){
    violations.push({id:'C-16', msg:'"탁한 ~" 수렴 방향 표현 → 구체적 색감 방향으로 써야 함'});
  }

  // 6-7. 숫자 비율 사용 (소량으로만 해야 함)
  if(/\d+\s*:\s*\d+/.test(fullText) || /\d+%\s*:\s*\d+%/.test(fullText)){
    violations.push({id:'C-17', msg:'숫자 비율 사용 → "소량"으로만 표기해야 함'});
  }

  // 6-8. 구체적 상품명/넘버링 (예: "웰라 콜레스톤 8/1" 같은 패턴)
  if(/\d+\/\d+/.test(fullText)){
    violations.push({id:'C-18', msg:'구체적 넘버링(예: 8/1) 검출 → 계열명으로만 표기'});
  }

  return violations;
}

function renderRuleCheck(violations, panelEl){
  var html = '<div class="rule-check-wrap">';
  html += '<div class="rule-check-title">룰 체크 ';
  if(violations.length === 0){
    html += '<span class="rule-check-pass">PASS</span>';
  } else {
    html += '<span class="rule-check-fail">' + violations.length + '건 위반</span>';
  }
  html += '</div>';

  if(violations.length === 0){
    html += '<div class="rule-all-pass">룰 위반 없음</div>';
  } else {
    violations.forEach(function(v){
      html += '<div class="rule-violation"><span class="rule-id">['+v.id+']</span> '+v.msg+'</div>';
    });
  }
  html += '</div>';
  panelEl.insertAdjacentHTML('beforeend', html);
}

function updateTabBadge(idx, j, violations){
  var tabEl = document.getElementById('tab-'+idx+'-'+j);
  // 기존 배지 제거
  var old = tabEl.querySelector('.tab-violations,.tab-pass-badge');
  if(old) old.remove();

  if(violations.length > 0){
    var badge = document.createElement('span');
    badge.className = 'tab-violations';
    badge.textContent = violations.length;
    tabEl.appendChild(badge);
  } else {
    var badge = document.createElement('span');
    badge.className = 'tab-pass-badge';
    badge.textContent = 'OK';
    tabEl.appendChild(badge);
  }
}

   배치 요약 렌더링
══════════════════════════════════ */
function renderBatchSummary(){
  var summaryEl = document.getElementById('batchSummary');
  var gridEl = document.getElementById('summaryGrid');
  var freqEl = document.getElementById('freqViolations');

  var total = allCheckResults.length;
  var passCount = 0;
  var failCount = 0;
  var totalViolations = 0;
  var violationFreq = {}; // id → {msg, count}

  allCheckResults.forEach(function(r){
    if(r.violations.length === 0) passCount++;
    else failCount++;
    totalViolations += r.violations.length;
    r.violations.forEach(function(v){
      if(!violationFreq[v.id]) violationFreq[v.id] = {msg: v.msg, count:0};
      violationFreq[v.id].count++;
    });
  });

  gridEl.innerHTML = ''
    + '<div class="summary-cell"><div class="label">총 레시피</div><div class="value">'+total+'</div></div>'
    + '<div class="summary-cell"><div class="label">PASS</div><div class="value pass">'+passCount+'</div></div>'
    + '<div class="summary-cell"><div class="label">위반</div><div class="value'+(failCount>0?' fail':'')+'">'+failCount+'</div></div>'
    + '<div class="summary-cell"><div class="label">위반 건수</div><div class="value'+(totalViolations>0?' fail':'')+'">'+totalViolations+'</div></div>';

  // 빈도순 정렬
  var freqArr = Object.keys(violationFreq).map(function(id){
    return {id:id, msg:violationFreq[id].msg, count:violationFreq[id].count};
  }).sort(function(a,b){ return b.count - a.count; });

  if(freqArr.length > 0){
    var fhtml = '<h4>반복 위반 (빈도순) — 같은 위반이 반복되면 룰 자체 점검 필요</h4>';
    freqArr.forEach(function(f){
      fhtml += '<div class="freq-item"><span>['+f.id+'] '+f.msg+'</span><span class="cnt">'+f.count+'회</span></div>';
    });
    freqEl.innerHTML = fhtml;
  } else {
    freqEl.innerHTML = '';
  }

  summaryEl.classList.add('show');
}

/* ══════════════════════════════════
   API 호출 + 재시도 로직 (2초→4초→6초, 최대 3회)
══════════════════════════════════ */
async function fetchWithRetry(body, maxRetries){
  maxRetries = maxRetries || 3;
  for(var attempt = 0; attempt < maxRetries; attempt++){
    try {
      var r = await fetch(API_URL, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body)
      });
      var data = await r.json();
      // API 에러 체크 (overloaded, rate limit 등)
      if(data.error){
        var errMsg = (data.error.message || data.error.type || 'API 오류');
        if(attempt < maxRetries - 1){
          var wait = (attempt + 1) * 2000; // 2초, 4초, 6초
          await new Promise(function(res){ setTimeout(res, wait); });
          continue;
        }
        throw new Error(errMsg);
      }
      // content 존재 체크
      if(!data.content){
        if(attempt < maxRetries - 1){
          var wait = (attempt + 1) * 2000;
          await new Promise(function(res){ setTimeout(res, wait); });
          continue;
        }
        throw new Error('응답에 content가 없음');
      }
      return data;
    } catch(e){
      if(attempt < maxRetries - 1 && (e.message.indexOf('overloaded') !== -1 || e.message.indexOf('fetch') !== -1 || e.message.indexOf('network') !== -1)){
        var wait = (attempt + 1) * 2000;
        await new Promise(function(res){ setTimeout(res, wait); });
        continue;
      }
      throw e;
    }
  }
}

  '','=== [6] 탈색 순서와 도달 레벨 ===','','동양인 자연모(5레벨, 적색 멜라닌 가득)에서 탈색 시:','적색 → 적갈색 → 주황 → 주황노랑 → 노랑 → 연노랑 → 아이보리 순서로 멜라닌이 빠진다.','','■ 탈색 횟수별 도달 레벨:','탈색 1회 → 적색 멜라닌이 깨지면서 주황~주황노랑(12~14레벨) 도달','탈색 2회 이상 → 주황기가 빠지고 노랑(16레벨) 도달','탈색 3회 이상 → 노랑기도 빠지면서 연노랑(18레벨)~아이보리(20레벨) 도달','','■ 일반 염색(탈색 없이)으로 도달 가능한 범위:','고명도(13·15) 염모제 + 산화제(9%/12%) → 리프팅으로 8~10레벨까지 도달 가능','하지만 멜라닌이 남아있어 색감 표현에 한계 → 브라운 수렴','난색(레드, 핑크)은 적색 멜라닌과 같은 계열이라 소진 없이 발색 가능',
  '','=== [7] 잔류 색소와 보색 ===','','주황 잔류 → 블루 소량 / 노랑 잔류 → 바이올렛 소량 (블루 쓰면 매트하게 빠진다!)','연노랑~아이보리 → 보색 불필요 / 난색 → 보색 불필요','★ 보색 컬러는 별도 단계가 아니다. 메인 염모제 조합에 소량 믹스하여 한 번에 시술한다.','','★ 보색 파워 매칭 원리:','보색의 파워는 잔류 색소의 파워에 맞춰야 한다. 잔류 색소가 약한데 보색을 강하게 쓰면 보색의 색이 먹어들어간다.','- 잔류 색소가 강할 때(주황, 16레벨) → 보색도 파워 있는 계열(바이올렛, 블루)이 적절','- 잔류 색소가 약할 때(연노랑, 18레벨 이상) → 보색도 약한 파워로(연핑크 소량, 바이올렛 극소량)','- 예: 연노랑에 바이올렛을 충분히 넣으면 → 보라빛이 남음. 연노랑에 연핑크 소량 → 미세하게 중화되어 백금발 방향.',
  '','=== [8] 왜 탈색이 필요한가 ===','','버진모에 한색 염모제를 올리면:','- 고명도 염모제가 적색 멜라닌을 어느 정도 깨면서 리프팅','- 깨진 자리에 노랑기가 드러남','- 염모제의 염료가 이 노랑기를 중화하는 데 소진됨','- 결국 색감 표현에 쓸 염료가 부족 → 적빛 없는 브라운으로 수렴','','난색(레드, 핑크)은 적색 멜라닌과 같은 계열이라 소진 없이 발색.','','결론:','- 선명함 + 투명함이 동시에 필요 → 탈색 필수','- 난색(레드 등) → 버진모에서도 비교적 선명하게 가능','','★ 사진의 명도가 낮아 보여도, 한색 계열에서 브라운기 없이 무채색(잿빛·회색·블루)이 투명하게 발색되어 있으면 → 탈색 후 입힌 색감이다. 동양인 버진모의 적색 멜라닌으로는 이런 무채색 투명 발색이 나올 수 없다. 단, 투명감 없이 스모키하기만 한 어두운 한색은 탈색 1회 후에도 표현 가능하다.','★ hex가 어두워도 색감명과 elements에 잿빛·투명감·무채색이 있으면 탈색 필수로 판단하라. 체감 명도가 낮다고 탈색 횟수를 줄이지 마라. 탈색 횟수는 "이 색감을 만들려면 어떤 베이스가 필요한가"로 판단하라.',
  '','★ 탈색 횟수 판단 원리 — 잔류 색소가 활용되는가, 방해되는가:','','■ 1회 vs 2회 — 주황기·브라운이 방해되는가:','탈색 1회(주황~주황노랑 베이스)로 충분한 색감: 잔류 주황기·브라운이 색감의 일부로 활용되는 한색. 매트 애쉬, 올리브 애쉬, 애쉬 브라운, 카키 브라운 등. 한색 염모제가 주황기를 억제하면서 잔류 브라운과 어우러져 자연스럽게 수렴한다.','탈색 2회(노랑 베이스) 필요한 색감: 잔류 주황기·브라운이 색감을 오염시키는 한색. 애쉬 그레이, 라벤더 애쉬 등. 브라운기 없이 무채색이 투명하게 발색되어야 하므로 주황기를 완전히 제거해야 한다.','★ 같은 계열명이라도 투명감·파스텔이 동반되면 잔류 색소가 방해된다. 투명한 올리브, 파스텔 그린, 연한 카키 등은 브라운기가 제거되어야 하므로 2회 이상 필요하다. 판단 기준은 계열명이 아니라 "브라운기가 남아도 되는가"이다.',
  '','■ 2회 vs 3회 — 노랑기가 방해되는가:','탈색 2회(노랑 베이스)로 충분한 색감: 노랑기가 보색(바이올렛)으로 잡히면서 색감에 녹아드는 경우. 애쉬 그레이, 라벤더 애쉬, 네이비 등. 바이올렛이 노랑기를 상쇄하면서 색감이 성립한다.','탈색 3회 이상(연노랑~아이보리 베이스) 필요한 색감: 노랑기조차 색감을 오염시키는 경우. 파스텔 계열, 극도로 연한 색감, 실버, 밀크티 베이지, 아이보리 블론드 등. 노랑기가 조금만 남아도 색이 다른 방향으로 빠지거나 탁해진다. 깨끗한 베이스 위에 염모제 색이 그대로 발색되어야 한다.',
  '','══════════════════════════════','Part C. 염모제와 시술 도구','══════════════════════════════',
  '','=== [9] 알칼리산화염모제 vs 컨트롤컬러 ===','','■ 알칼리산화염모제 (일반 염모제):','- 리프팅 + 착색을 동시에 한다','- 모발 내부(코르텍스)까지 침투','- 명도가 높을수록 리프팅력이 강하다','- 단, 염료가 잔류 색소를 중화하는 데 소진되어 버진모에서는 색 표현에 한계','','■ 컨트롤컬러 (직접염료):','- 리프팅 능력 없음. 색만 입힌다','- 모발 표면(큐티클) 쪽에 작용. 염료가 매우 많다','- 버진모에서: 고명도 염모제가 리프팅하고, 컨트롤컬러가 색을 입히는 역할','- 탈색모에서: 잔류 없는 베이스 위에 선명하게 발색','','■ 탈색모에서의 명도 선택:','- 고명도(13·15) → 염료 적어서 색이 거의 안 나올 수 있다','- 중명도(9·11) → 염료 많아서 너무 진하게 나올 수 있다','- 파스텔 발색 → 중명도 염모제 + 클리어로 염료 농도 희석','','■ 탈색모에서의 조합 자유도:','- 탈색모(특히 18레벨 이상)에서는 멜라닌이 거의 없으므로 염모제+염모제, 염모제+컨트롤컬러 모두 가능.','- 컨트롤컬러만이 유일한 선택지가 아니다.','','■ 극고명도 베이스(18레벨 이상)에서의 원리:','연노랑~아이보리 베이스에서는 잔류 색소가 거의 없어 염료가 그대로 발색된다.','따라서 색을 "넣는" 것이 아니라 "미세하게 조절하는" 접근이 필요하다.','- 고명도(13·15) 염모제는 자체적으로 염료가 적게 들어있다. 극고명도 베이스에서는 이 특성이 오히려 적절하다.','- 중명도(9·11) 염모제는 염료가 많아 극고명도 베이스에서 색이 과하게 들어간다.','- 백금발·화이트 블론드: 고명도(13·15) 뉴트럴브라운 염모제 + 연핑크 컨트롤컬러 극소량 + 클리어로 추가 희석. 고명도 염모제는 이미 염료가 적지만, 극고명도 베이스에서는 그마저도 과할 수 있으므로 클리어로 농도를 더 낮춘다. 10분 간격으로 발색을 체크하며 시술한다. 애쉬를 메인으로 쓰면 회색 방향으로 빠진다.','- 잿빛 블론드: 고명도 애쉬 염모제로 잿빛 뉘앙스만 얹는 수준.','- 파스텔 계열: 중명도 염모제 + 클리어로 염료 농도를 희석하여 연하게.','','■ 베이지 계열의 원리:','베이지는 브라운보다 밝고 가벼운 색감이다. 뉴트럴브라운과 한색 계열이 함께 쓰여야 베이지가 성립한다.','어느 쪽이 메인이냐에 따라 뉘앙스가 달라진다: 뉴트럴브라운이 메인이면 밀크티 방향, 한색이 메인이면 애쉬/라벤더 방향.','둘 중 하나만 쓰면 베이지가 아니라 브라운 또는 그레이로 빠진다.',
  '','=== [10] 염모제 계열 체계 ===','','염모제는 [명도]-[계열] 구조.','','■ 계열:','뉴트럴브라운(NB): 자연스러운 갈색. 농도 조절·톤다운용','애쉬(A): 잿빛, 무채색 / 블루애쉬(BA): 파란빛, 한색 중 파워 강함','그린(G): 초록빛, 붉은기 억제 / 바이올렛(V): 보라빛','레드(R): 빨간빛, 발색 수월 / 레드바이올렛(RV): 자주빛 / 핑크(P): 분홍빛','옐로우(Y): 노랑빛 / 오렌지(O): 주황빛','카키(K): 올리브빛 / 애쉬카키(AK): 애쉬+카키 결합. 잿빛과 올리브빛을 동시에 가진다.','클리어: 색소 없음, 농도 희석용','','■ 명도: 5~7 저명도 / 9~11 중명도 / 13~15 고명도(리프팅력 있음)','','■ 컨트롤컬러 종류 (염모제와 별개):','한색: 블루, 애쉬, 그린, 바이올렛','난색: 레드, 핑크, 바이올렛','★ 뉴트럴브라운은 염모제 계열이다. 컨트롤컬러가 아니다.','','■ 바이올렛의 특수성 — 중성색:','바이올렛은 빨강+파랑의 2차색으로, 한색과 난색 모두에 걸쳐 있는 중성색이다.','- 적보라(RV 방향): 난색에 가까움. 버진모에서도 색감이 어느 정도 보인다.','- 청보라(블루바이올렛 방향): 한색에 가까움. 버진모에서는 브라운으로 수렴.','버진모에서 보라빛 → RV(적보라) 방향이 현실적. 청보라는 탈색 후에만 가능.','','■ RV(레드바이올렛)의 성격:','RV는 중성색(보라)+붉은기를 동시에 가진 계열이다.','순수 레드만으로는 선명한 빨강이 될 뿐, 로즈나 와인 방향이 나오지 않는다.','RV가 보라빛 베이스를 깔고, 여기에 컨트롤컬러로 최종 뉘앙스를 결정한다.','','■ 레시피 표기: "[계열] 염모제" 또는 "[계열] 컨트롤컬러"로 구분하여 표기.',
  '','══════════════════════════════','Part D. 버진모 테크닉','══════════════════════════════',
  '','=== [11] 버진모 테크닉 — 원리와 한계 ===','','■ 원리:','1. 고명도(13·15) 염모제 + 산화제(9%/12%) → 적색 멜라닌을 깬다 (리프팅)','2. 멜라닌이 깨지면서 노랑기가 드러남','3. 컨트롤컬러가 그 위에 색을 입힌다 (컨트롤컬러는 리프팅 못함)','4. 하지만 컨트롤컬러 염료도 노랑기 중화에 일부 소진됨','5. 결국 색감 표현에 쓰이는 염료가 부족 → 브라운으로 수렴','','■ 절대 한계:','버진모에서 도달 가능한 결과는 두 방향뿐:','1. 한색 방향 → 적빛 없는 쿨브라운, 매트브라운 등','2. 난색 방향 → 레드브라운, 로즈브라운, 와인빛 브라운 등 (잔류 브라운 활용)','','★ 버진모 레시피에서 목표 색감의 이름을 따라가면 안 된다.','★ "라벤더 방향", "실버 방향" 같은 표현을 버진모에서 쓰지 마라.','','■ 한색 조합 결과 (고명도 한색 염모제 +):','★ 한색은 멜라닌 중화에 염료가 소진되어 브라운으로 수렴하지만, 컨트롤컬러에 따라 브라운의 뉘앙스가 달라진다.','','고명도 애쉬 염모제 기준:','+ 블루 컨트롤컬러 → 적빛 없는 애쉬브라운','+ 블루+바이올렛 컨트롤컬러 → 청초한 투명 쿨브라운','+ 애쉬 컨트롤컬러 → 애쉬브라운','','고명도 애쉬카키 염모제 기준 (시중의 애쉬카키 계열 염모제):','+ 애쉬 컨트롤컬러 → 애쉬 뉘앙스의 매트브라운','+ 그린 컨트롤컬러 → 매트브라운','','카키 염모제 + 애쉬 컨트롤컬러 → 매트애쉬브라운','+ 바이올렛 컨트롤컬러 → 쿨브라운 (와인빛 아님)','','★ 와인빛·퍼플브라운 → 난색 방향(RV)으로 가야 한다.','','■ 난색 조합 — 원리:','★ 난색은 적색 멜라닌과 충돌하지 않으므로 컨트롤컬러 뉘앙스가 그대로 살아남는다.','★ 고명도 염모제는 리프팅 + 큰 색감 방향을 잡는 역할이고, 최종 뉘앙스는 컨트롤컬러가 결정한다.','★ 버진모의 잔류 브라운(멜라닌)은 방해물이 아니라 색감의 일부로 활용된다. "브라운"을 염모제로 따로 만들 필요 없이, 모발 자체의 깊이감이 자연스럽게 살아남는다.','','■ RV와 바이올렛의 역할:','RV(레드바이올렛)는 중성색(보라)+붉은기를 동시에 가진 계열이다. 바이올렛도 중성색이다.','- 순수 레드만 쓰면 → 선명한 빨강. 로즈·와인 방향이 아니다.','- 바이올렛만 쓰면 → 와인/블랙커런트 방향. 따뜻한 로즈가 아니다.','- RV + 바이올렛 = 중성색 베이스 위에 적빛이 은은하게 얹히는 구조. 여기에 레드 소량으로 따뜻한 적빛을 보강하면 로즈 방향이 된다.','- 잔류 브라운이 "로즈브라운"의 브라운 역할을 한다.','','■ 난색 색감별 핵심 방향:','- 선명한 레드: 레드가 메인. 적색 멜라닌과 같은 계열이라 소진 없이 발색.','- 와인/블랙커런트: 바이올렛이 메인. 깊이감 있는 보라빛.','- 로즈: 바이올렛이 핵심이고 레드는 보조. RV의 중성색+붉은기 성격을 활용하고, 잔류 브라운이 깊이감 담당.','- 체리 와인: 레드+바이올렛 조합. 선명함과 깊이감 동시.',
  '','══════════════════════════════','Part E. 조합 참고 맵','══════════════════════════════',
  '','=== [12] 조합→결과 참고 맵 ===','','아래는 참고용이다. 반드시 여기서 골라야 하는 게 아니라, 원리로 추론하되 참고.','','■ 연노랑~아이보리 베이스 (18~20):','뉴트럴브라운+애쉬 소량→밀크티 베이지 / 뉴트럴브라운+바이올렛 소량→라벤더 베이지','애쉬 염모제+그린 컨트롤컬러 소량→매트 베이지 / 애쉬+뉴트럴브라운 소량→애쉬 베이지','애쉬 단독→애쉬그레이 / 애쉬+블루 소량→실버 애쉬','바이올렛+애쉬 소량→라벤더애쉬 / 블루 단독→스카이블루','블루+바이올렛 소량→네이비 / 레드 단독→비비드 레드','핑크+클리어→파스텔 핑크','연핑크(또는 핑크 극소량+클리어)로 연노랑 미세 중화→백금발·화이트 블론드','','■ 노랑 베이스 (16):','노랑 잔류 → 바이올렛으로 보색 필요.','애쉬+바이올렛 소량→애쉬그레이 / 바이올렛+애쉬 소량→라벤더(애쉬 수렴)','블루+바이올렛 소량→네이비','','■ 주황~주황노랑 베이스 (12~14):','한색으로 투명한 색감 불가. 레드→레드브라운 / 핑크→로즈브라운 / 블루→스모키 애쉬브라운 수렴','','=== [13] 주의사항 ===','','- 라벤더 계열: "바이올렛에 애쉬 소량"이 기본. "애쉬에 바이올렛"은 애쉬그레이 방향.','- 주황~노랑 베이스에서는 한색 염모제가 메인. 뉴트럴브라운 메인 금지.','- 밀크티/애쉬 베이지는 warm처럼 보여도 한색 조합 필수.','- 블론드/백모는 18+ 필수. 버진모 불가능.','- 톤다운 시에도 언더톤과 목표 명도 고려하여 적절한 명도의 염모제 선택.'

  '','■ 연노랑~아이보리(18~20레벨) 베이스:','잔류 색소 거의 없음. 보색 불필요. 염료가 그대로 발색.','[9]번 극고명도 베이스 원리 적용: 고명도(13·15) 염모제 = 염료 적어 적절. 중명도(9·11) = 과하게 들어감.','추가 탈색 없음. 블록① 하나만 출력.','','블록① <b>{연노랑~아이보리(18~20레벨)}</b>','[계열] 염모제 + [계열] 염모제 + [계열] 컨트롤컬러로 착색하세요.','조합이 만드는 결과 색감 설명 1~2문장. 극고명도 원리 기반.'

var COMMON_RULES = [

  '★ 같은 내용을 블록 간에 반복하지 마라.',

  '★ 결과 색감명에 STEP 1 분석의 elements(매트함, 황금빛 등)를 가져다 쓰지 마라. 조합 계열에서 도출된 색감명을 써라.',
  '★ 잔류 색소는 노랑기, 주황기, 적색 등 모발 색소 용어로 표현.',

  '★ 탈색 후 레시피에서 "[계열] 염모제" 표기 필수. 컨트롤컬러와 혼동 금지.',
  '★ 수렴 방향은 구체적 색감 방향(예: "애쉬에 가까운 방향")으로. "탁한 ~" 금지.',
  '★ 레시피는 색감명과 recipe_direction을 중심으로 구성하라. elements는 참고만 하되, elements의 개별 속성을 염모제 조합에 추가 반영하려 하지 마라.',
  '★ 레시피 조합은 최대 3가지(염모제+염모제+컨트롤컬러)를 넘지 마라. 2가지로 충분하면 2가지만 제시하라.',
  '★ 극고명도 색감(블론드, 백금발, 화이트 등 18레벨 이상 베이스가 필요한 색감)에서는 색감명에 애쉬·바이올렛 등이 포함되어 있어도 [9]번 극고명도 베이스 원리를 우선 적용하라. 블론드의 핵심은 염료 최소화이다.',

function buildStep3Prompt(cfg){
  var topInstruction;
  if(cfg.type === 'natural'){
    topInstruction = '너는 15년차 동양인 모발 전문 컬러리스트야.\nAI가 분석한 목표 색감을 보고, 동양인 모발에서 이 색감을 구현하려면 어떻게 해야 하는지 역추론해.\n아래 컬러리스트 지식을 바탕으로 사고하되, 레시피는 네가 추론해서 만들어.';
  } else {
    topInstruction = '너는 15년차 동양인 모발 전문 컬러리스트야.\n현재 모발은 이미 탈색된 상태다. ' + cfg.baseDesc + '\n이 베이스에서 목표 색감을 구현하려면 어떤 조합이 필요한지 판단해.\n현재 베이스로 부족하면 추가 탈색이 필요한 도달 베이스를 제시해.\n도달 베이스는 다음 3단계 안에서만: 주황~노랑(14~16레벨) / 노랑(16레벨) / 연노랑~아이보리(18~20레벨).\n아래 컬러리스트 지식을 바탕으로 사고하되, 레시피는 네가 추론해서 만들어.';
  }
  var partF = (cfg.type === 'natural') ? PART_F_NATURAL : PART_F_BLEACHED;
  return topInstruction + '\n\n' + KNOWLEDGE + '\n\n' + partF + '\n' + COMMON_RULES;
}

function buildUserMsg(cfg, analysis){
  var end = (cfg.type === 'natural')
    ? '이 색감을 현재 모발에서 구현하려면 어떻게 해야 하는지 레시피를 만들어줘.'
    : '이 베이스에서 이 색감을 구현하려면 어떤 조합이 필요한지 레시피를 만들어줘.';
  return [
    '현재 모발: ' + cfg.baseDesc,
    'AI 분석 색감: ' + analysis.color_name_ko,
    '톤: ' + analysis.tone,
    'hex: ' + (analysis.hex || ''),
    '색감 속성: ' + (analysis.elements ? analysis.elements.join(', ') : '없음'),
    '조색 방향: ' + (analysis.recipe_direction || ''),
    '색감 설명: ' + analysis.description,
    '', end
  ].join('\n');
}

async function runBatch(){
  document.getElementById('runBtn').disabled = true;
  allCheckResults = []; // 초기화
  document.getElementById('batchSummary').classList.remove('show');
  for(var i=0; i<pendingFiles.length; i++){
    await processOne(pendingFiles[i], i);
  }
  renderBatchSummary();
  document.getElementById('runBtn').disabled = false;
}

async function processOne(file, idx){
  var statusEl = document.getElementById('status-'+idx);
  var analysisEl = document.getElementById('analysis-'+idx);

  statusEl.textContent = '분석 중';
  statusEl.className = 'result-status analyzing';
  analysisEl.innerHTML = '<div style="color:#A8A29E;font-size:12px;padding:20px">색감 분석 중...</div>';

  var info = await fileToBase64(file);

  // STEP 1
  var analysis = null;
  try {
    var d1 = await fetchWithRetry({
      model:'claude-sonnet-4-20250514', max_tokens:600,
      system: STEP1_PROMPT,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:info.mediaType,data:info.base64}},
        {type:'text',text:'이 사진 속 모발의 색감을 역공학 분석해줘.'}
      ]}]
    });
    var t1 = d1.content.map(function(b){return b.text||'';}).join('');
    t1 = t1.replace(/```json|```/g,'').trim();
    analysis = JSON.parse(t1);
  } catch(e){
    statusEl.textContent = '분석 실패';
    statusEl.className = 'result-status error';
    analysisEl.innerHTML = '<div style="color:#c00;font-size:12px;padding:20px">STEP 1 실패: '+e.message+'</div>';
    return;
  }

  // 분석 결과 표시
  var toneMap = {cool:'한색(쿨)',warm:'난색(웜)',neutral:'뉴트럴'};
  var tagsHtml = '';
  if(analysis.elements){
    analysis.elements.forEach(function(el){ tagsHtml += '<span>'+el+'</span>'; });
  }
  analysisEl.innerHTML = '<div class="result-color-row">'
    + '<div class="result-swatch" style="background:'+(analysis.hex||'#ccc')+'"></div>'
    + '<div><div class="result-color-name">'+(analysis.color_name_ko||'—')+'</div>'
    + '<div class="result-tone">'+(toneMap[analysis.tone]||'—')+' 계열</div></div></div>'
    + '<div class="result-desc">'+(analysis.description||'')+'</div>'
    + '<div class="result-tags">'+tagsHtml+'</div>'
    + '<div class="result-direction"><b>조색 방향</b> · '+(analysis.recipe_direction||'')+'</div>';

  // STEP 3: 4분기 순차 호출
  statusEl.textContent = '레시피 생성 중';

  for(var j=0; j<BASE_CONFIGS.length; j++){
    var cfg = BASE_CONFIGS[j];
    var tabStatusEl = document.getElementById('tabst-'+idx+'-'+j);
    var panelEl = document.getElementById('panel-'+idx+'-'+j);

    tabStatusEl.textContent = '생성 중...';
    panelEl.innerHTML = '<div style="color:#A8A29E;font-size:12px">레시피 생성 중...</div>';

    try {
      var prompt = buildStep3Prompt(cfg);
      var umsg = buildUserMsg(cfg, analysis);

      var d2 = await fetchWithRetry({
        model:'claude-sonnet-4-20250514', max_tokens:1000,
        system: prompt,
        messages:[{role:'user',content:umsg}]
      });
      var t2 = d2.content.map(function(b){return b.text||'';}).join('');
      t2 = t2.replace(/```json|```/g,'').trim();
      var recipe = JSON.parse(t2);

      var summaryHtml = (recipe.summary||'').replace(/\n/g,'<br>');
      var tipsHtml = (recipe.tips||'').replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');

      var content = '<div class="recipe-summary">' + summaryHtml + '</div>';
      content += '<div class="recipe-tips-block">' + tipsHtml + '</div>';

      if(cfg.type==='natural' && recipe.virgin_recipe){
        content += '<div class="recipe-virgin"><strong>' + (recipe.virgin_recipe.title||'탈색 없이 최대한 연출하려면') + '</strong>' + (recipe.virgin_recipe.text||'') + '</div>';
      }

      panelEl.innerHTML = content;
      tabStatusEl.textContent = '완료';

      // ── 룰 체크 실행 ──
      var violations = checkRules(recipe, cfg, analysis);
      renderRuleCheck(violations, panelEl);
      updateTabBadge(idx, j, violations);
      allCheckResults.push({cardIdx:idx, cfgKey:cfg.key, cfgLabel:cfg.label, violations:violations});

    } catch(e){
      panelEl.innerHTML = '<div style="color:#c00;font-size:12px">레시피 실패: '+e.message+'</div>';
      tabStatusEl.textContent = '실패';
    }
  }

  statusEl.textContent = '완료';
  statusEl.className = 'result-status done';
}
</script>
