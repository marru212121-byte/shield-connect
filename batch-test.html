<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>v17 배치 검수</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#F5F4F0;color:#1C1917;padding:20px}
h1{font-size:18px;font-weight:800;margin-bottom:4px}
.sub{font-size:12px;color:#A8A29E;margin-bottom:16px}
.upload-area{border:2px dashed #d5cfc7;border-radius:14px;padding:32px 20px;text-align:center;cursor:pointer;background:#FAF8F4;margin-bottom:16px;transition:all .2s}
.upload-area:hover{border-color:#C4A97A;background:#D4B89608}
.upload-area .txt{font-size:13px;color:#A8A29E;line-height:1.6}
.upload-area .txt b{color:#8B7355;font-weight:600}
.controls{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.controls select,.controls button{font-family:inherit;font-size:13px;padding:8px 14px;border-radius:10px;border:1.5px solid #e8e4df;background:#fff;cursor:pointer}
.controls button{background:#1C1917;color:#fff;font-weight:600;border:none}
.controls button:disabled{opacity:0.4;cursor:not-allowed}
.controls .count{font-size:12px;color:#A8A29E}

.results{display:flex;flex-direction:column;gap:16px}

.result-card{background:#fff;border-radius:16px;border:1.5px solid #e8e4df;overflow:hidden}
.result-top{display:flex;gap:0}
.result-img-wrap{width:200px;min-height:200px;flex-shrink:0;overflow:hidden;background:#eee;position:relative}
.result-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.result-num{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.6);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
.result-status{position:absolute;top:8px;right:8px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}
.result-status.analyzing{background:#FFF3CD;color:#856404}
.result-status.done{background:#D4EDDA;color:#155724}
.result-status.error{background:#F8D7DA;color:#721C24}

.result-analysis{flex:1;padding:14px;min-width:0}
.result-color-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.result-swatch{width:32px;height:32px;border-radius:8px;border:1.5px solid rgba(0,0,0,0.08);flex-shrink:0}
.result-color-name{font-size:15px;font-weight:700}
.result-tone{font-size:11px;color:#A8A29E}
.result-desc{font-size:12px;color:#6B5D4E;line-height:1.6;margin-bottom:8px}
.result-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.result-tags span{font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;background:#D4B89618;color:#8B7355}
.result-direction{font-size:11px;color:#555;line-height:1.5;padding:8px;border-radius:6px;background:rgba(26,24,20,0.04)}
.result-direction b{color:#1A1814}

.result-recipe{padding:14px;border-top:1px solid #e8e4df}
.recipe-summary{font-size:13px;font-weight:600;color:#1C1917;line-height:1.6;margin-bottom:10px}
.recipe-tips-block{background:#FBF7F1;border:1px solid #EDE6DA;border-radius:10px;padding:12px;font-size:12px;color:#6B5D4E;line-height:1.8;white-space:pre-line}
.recipe-tips-block b{color:#1C1917;font-weight:700;font-size:13px}
.recipe-virgin{background:#FAF6F0;border:1px solid #EDE6DA;border-radius:8px;padding:10px;margin-top:8px;font-size:11px;color:#6B5D4E;line-height:1.7}
.recipe-virgin strong{color:#8B7355;font-size:12px;font-weight:700;display:block;margin-bottom:4px}
</style>
</head>
<body>

<h1>v17 배치 검수 도구</h1>
<div class="sub">사진 여러 장 → 각각 STEP 1 분석 + STEP 3 레시피(자연모 기준) 자동 생성</div>

<div class="upload-area" onclick="document.getElementById('batchInput').click()">
  <div class="txt">검수할 사진을 <b>여러 장 선택</b>하세요<br>(한 번에 최대 10장)</div>
</div>
<input type="file" id="batchInput" accept="image/*" multiple style="display:none" onchange="handleBatchUpload(this)"/>

<div class="controls">
  <select id="baseSelect">
    <option value="natural">자연모 / 염색모</option>
    <option value="orange_yellow">탈색모 — 주황~노랑 잔류</option>
    <option value="yellow_mat">탈색모 — 노랑 잔류</option>
    <option value="pale_yellow">탈색모 — 연노랑~아이보리</option>
  </select>
  <button id="runBtn" onclick="runBatch()" disabled>검수 시작</button>
  <span class="count" id="countLabel"></span>
</div>

<div class="results" id="results"></div>

<script>
var API_URL = '/api/recipe';
var pendingFiles = [];

function handleBatchUpload(input){
  pendingFiles = Array.from(input.files).slice(0, 10);
  document.getElementById('countLabel').textContent = pendingFiles.length + '장 선택됨';
  document.getElementById('runBtn').disabled = false;

  // 미리보기 카드 생성
  var container = document.getElementById('results');
  container.innerHTML = '';
  pendingFiles.forEach(function(file, i){
    var card = document.createElement('div');
    card.className = 'result-card';
    card.id = 'card-' + i;
    var url = URL.createObjectURL(file);
    card.innerHTML = '<div class="result-top">'
      + '<div class="result-img-wrap"><img src="'+url+'" alt=""/><span class="result-num">#'+(i+1)+'</span><span class="result-status" id="status-'+i+'">대기</span></div>'
      + '<div class="result-analysis" id="analysis-'+i+'"><div style="color:#A8A29E;font-size:12px;padding:20px">대기 중...</div></div>'
      + '</div>'
      + '<div class="result-recipe" id="recipe-'+i+'" style="display:none"></div>';
    container.appendChild(card);
  });
}

function getBaseDesc(){
  var v = document.getElementById('baseSelect').value;
  var map = {
    'natural': '자연모/염색모 (동양인, 적색멜라닌 가득, 탈색 이력 없음, 약 5레벨)',
    'orange_yellow': '탈색모 — 주황~노랑 잔류 (붉은기·주황기가 남아있는 상태, 약 14~16레벨)',
    'yellow_mat': '탈색모 — 노랑 잔류 (주황기는 빠지고 노랑기, 약 16레벨)',
    'pale_yellow': '탈색모 — 연노랑~아이보리 (거의 다 빠진 상태, 약 18~20레벨)'
  };
  return map[v] || map['natural'];
}

function getBaseType(){
  return document.getElementById('baseSelect').value === 'natural' ? 'natural' : 'bleached';
}

async function runBatch(){
  document.getElementById('runBtn').disabled = true;
  for(var i=0; i<pendingFiles.length; i++){
    await processOne(pendingFiles[i], i);
  }
  document.getElementById('runBtn').disabled = false;
}

function fileToBase64(file){
  return new Promise(function(resolve, reject){
    var reader = new FileReader();
    reader.onload = function(e){
      var full = e.target.result;
      var data = full.split(',')[1];
      resolve({base64: data, mediaType: file.type || 'image/jpeg', full: full});
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function processOne(file, idx){
  var statusEl = document.getElementById('status-'+idx);
  var analysisEl = document.getElementById('analysis-'+idx);
  var recipeEl = document.getElementById('recipe-'+idx);

  statusEl.textContent = '분석 중';
  statusEl.className = 'result-status analyzing';
  analysisEl.innerHTML = '<div style="color:#A8A29E;font-size:12px;padding:20px">색감 분석 중...</div>';

  var info = await fileToBase64(file);

  // STEP 1: 분석
  var step1Prompt = [
    '너는 미용실 헤어 컬러리스트를 위한 모발 색감 분석 전문가야.',
    '사진 속 모발의 색감을 분석하고, 동양인 모발에서 이 색감을 만들려면 어떤 조색 방향이 필요한지 판단해.',
    '',
    '■ 판단 순서 (반드시 이 순서):',
    '1단계: elements 분석 — 사진에서 보이는 속성만 골라',
    '2단계: recipe_direction 결정 — elements + 아래 트렌드 지식 기반으로',
    '3단계: tone — 겉으로 보이는 느낌으로만 (cool/warm/neutral)',
    '',
    '■ 색감 속성(elements) — 보이는 것만 배열에:',
    '"투명감" 빛이 통과하는 맑은 느낌 / "매트함" 광택 없이 뽀얀 질감 / "황금빛" 금빛이 은은하게 / "붉은기" 적색·구리빛·앰버빛 / "주황기" 주황빛 / "잿빛" 회색·재 같은 무채색 / "청보라" 파란기+보라기 / "보라기" 보라·퍼플 / "핑크기" 분홍빛 / "파스텔" 연하고 부드러운 / "비비드" 선명하고 채도 높은 / "깊이감" 밝고 어두운 부분의 입체감 / "윤기" 건강한 광택감',
    '',
    '■ 한국 트렌드 베이지 — 가장 중요한 판단 기준:',
    '밀크티 베이지, 애쉬 베이지, 매트 베이지, 라벤더 베이지는 사진상 warm처럼 보이지만, 동양인 모발에서는 한색 계열(애쉬, 바이올렛 중심) 조합이 필수.',
    '- 투명감+매트함+잿빛이 강한 베이지 → recipe_direction은 반드시 "한색 계열"',
    '- 황금빛+투명감+붉은기 없음 → 시각적 warm이어도 recipe_direction은 "한색 계열"',
    '- 붉은기·핑크기가 선명한 사진만 → 난색 계열',
    '',
    '■ 탈색 필수 판단 (중요):',
    '어둡게 보여도 잿빛·투명감·매트함이 있으면 → 탈색이 필요한 색감이다. "다크"라고 해서 자연모에서 바로 가능한 게 아님.',
    '자연모에서 탈색 없이 가능한 색감은: 웜브라운, 쿨브라운, 레드/레드브라운, 블랙커런트 정도. 그 외 잿빛·투명감·파스텔이 보이면 전부 탈색 필수.',
    '',
    '■ 조색 방향(recipe_direction) 역추론:',
    '투명감+붉은기 없음 → 한색 계열 / 붉은기 선명 → 난색 계열(레드, RV) / 핑크기 → 핑크 계열 / 보라기 → 바이올렛 계열 / 잿빛+투명감 → 애쉬 계열 / 파스텔+연한 → 파스텔 계열',
    '',
    '■ 금지:',
    '레벨 숫자, 시술 방법, 탈색 여부, 영어 전문용어, 헤어스타일/컷 언급',
    '구체적 염모제 조합(예: "애쉬+바이올렛 믹스") — 계열과 방향만',
    '"멜라닌", "중화" 단어',
    '',
    '■ 출력: JSON만',
    '{"color_name_ko":"한국어 색감명","tone":"cool/warm/neutral","hex":"#RRGGBB","elements":["속성"],"recipe_direction":"조색 방향 한 줄","description":"색감 묘사 2~3문장"}',
    '★ color_name_ko는 최대 3단어. 명도 수식어(다크, 밝은)는 색감명에 넣지 말고 description에서 표현하라. 예: "올리브 애쉬 브라운", "실버 애쉬 그레이", "애쉬 베이지", "밀크 베이지", "라벤더 애쉬".'
  ].join('\n');

  var analysis = null;
  try {
    var r1 = await fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:600,
        system: step1Prompt,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:info.mediaType,data:info.base64}},
          {type:'text',text:'이 사진 속 모발의 색감을 역공학 분석해줘.'}
        ]}]
      })
    });
    var d1 = await r1.json();
    var t1 = d1.content.map(function(b){return b.text||'';}).join('');
    t1 = t1.replace(/```json|```/g,'').trim();
    analysis = JSON.parse(t1);
  } catch(e){
    statusEl.textContent = '분석 실패';
    statusEl.className = 'result-status error';
    analysisEl.innerHTML = '<div style="color:#c00;font-size:12px;padding:20px">STEP 1 분석 실패: '+e.message+'</div>';
    return;
  }

  // 분석 결과 렌더링
  var toneMap = {cool:'한색(쿨)',warm:'난색(웜)',neutral:'뉴트럴'};
  var tagsHtml = '';
  if(analysis.elements && analysis.elements.length>0){
    analysis.elements.forEach(function(el){
      tagsHtml += '<span>'+el+'</span>';
    });
  }
  analysisEl.innerHTML = '<div class="result-color-row">'
    + '<div class="result-swatch" style="background:'+(analysis.hex||'#ccc')+'"></div>'
    + '<div><div class="result-color-name">'+(analysis.color_name_ko||'—')+'</div>'
    + '<div class="result-tone">'+(toneMap[analysis.tone]||'—')+' 계열</div></div></div>'
    + '<div class="result-desc">'+(analysis.description||'')+'</div>'
    + '<div class="result-tags">'+tagsHtml+'</div>'
    + '<div class="result-direction"><b>조색 방향</b> · '+(analysis.recipe_direction||'')+'</div>';

  // STEP 3: 레시피
  statusEl.textContent = '레시피 생성 중';

  var baseDesc = getBaseDesc();
  var step3Prompt = [
    '너는 15년차 동양인 모발 전문 컬러리스트야.',
    'AI가 분석한 목표 색감을 보고, 동양인 모발에서 이 색감을 구현하려면 어떻게 해야 하는지 역추론해.',
    '아래 컬러리스트 지식을 바탕으로 사고하되, 레시피는 네가 추론해서 만들어.',
    '',
    '══════════════════════════════',
    'Part A. 색 이론 기초',
    '══════════════════════════════',
    '',
    '=== [1] 헤어 컬러의 기본 공식 ===',
    '',
    '헤어컬러 = 언더(사전상태 모발) + 틴트(염모제 염료)',
    '★ 같은 염모제 조합이라도 언더(베이스)에 따라 결과가 완전히 다르다.',
    '- 탈색 후 베이스(멜라닌 제거됨) → 염모제 색이 거의 그대로 발색',
    '- 버진모(멜라닌 가득) → 염모제가 멜라닌과 충돌하여 브라운으로 수렴',
    '',
    '=== [2] 색의 3속성 ===',
    '',
    '색상(Hue): 빨강, 파랑, 노랑 등 색의 이름',
    '명도(Value): 밝고 어두움. 레벨 1(검정)~20(아이보리)',
    '채도(Chroma): 선명~탁함. 비비드 ↔ 덜(dull)',
    '',
    '=== [3] 1차색, 2차색, 보색 ===',
    '',
    '1차색: 빨강, 파랑, 노랑',
    '2차색: 빨강+노랑=주황 / 빨강+파랑=보라 / 파랑+노랑=초록',
    '보색 = 색상환 반대편. 보색끼리 만나면 그 색의 파워가 상쇄된다.',
    '주황↔파랑(블루) / 노랑↔보라(바이올렛) / 빨강↔초록(그린)',
    '',
    '=== [4] 색의 파워 ===',
    '',
    '노랑(약) → 주황 → 빨강/초록 → 파랑 → 보라 → 검정(강)',
    '- 노랑 잔류 → 바이올렛이 맞다 (보색 + 적절한 파워)',
    '- 노랑에 블루 → 파워 과잉 → 노랑+파랑=초록, 매트하게 빠진다',
    '- 주황 잔류 → 블루가 맞다 (보색 관계)',
    '- 난색(레드, 핑크)은 적색 멜라닌과 같은 계열 → 충돌 없이 발색',
    '',
    '══════════════════════════════',
    'Part B. 동양인 모발과 탈색',
    '══════════════════════════════',
    '',
    '=== [5] 동양인 모발 — 레벨별 언더톤 (절대값) ===',
    '',
    '5: 적색(검붉은색)',
    '8~10: 적갈색~주황',
    '12~14: 주황~주황노랑',
    '16: 노랑',
    '18: 연노랑',
    '20: 아이보리',
    '',
    '=== [6] 탈색 순서와 도달 레벨 ===',
    '',
    '동양인 자연모(5레벨, 적색 멜라닌 가득)에서 탈색 시:',
    '적색 → 적갈색 → 주황 → 주황노랑 → 노랑 → 연노랑 → 아이보리 순서로 멜라닌이 빠진다.',
    '',
    '■ 탈색 횟수별 도달 레벨:',
    '탈색 1회 → 적색 멜라닌이 깨지면서 주황~주황노랑(12~14레벨) 도달',
    '탈색 2회 이상 → 주황기가 빠지고 노랑(16레벨) 도달',
    '탈색 3회 이상 → 노랑기도 빠지면서 연노랑(18레벨)~아이보리(20레벨) 도달',
    '',
    '■ 일반 염색(탈색 없이)으로 도달 가능한 범위:',
    '고명도(13·15) 염모제 + 산화제(9%/12%) → 리프팅으로 8~10레벨까지 도달 가능',
    '하지만 멜라닌이 남아있어 색감 표현에 한계 → 브라운 수렴',
    '난색(레드, 핑크)은 적색 멜라닌과 같은 계열이라 소진 없이 발색 가능',
    '',

        system: step3Prompt,
        messages:[{role:'user',content:userMsg}]

    });

    var recipe = JSON.parse(t2);

    statusEl.textContent = '레시피 실패';
