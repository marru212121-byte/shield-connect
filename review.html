<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>애널라이저 검수툴 (데모)</title>
<style>
  :root{
    --bg:#171411; --panel:#211D17; --panel2:#2A251D; --panel3:#332D23; --line:#3C352A;
    --ink:#F3ECDF; --ink2:#B9AC95; --ink3:#827760;
    --brown:#CBA871; --brownd:#8B7355; --accent:#C7F050; --warn:#E8B45A; --bad:#E07A5F; --ok:#9BD17A;
    --r:14px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo",sans-serif;line-height:1.55}
  .wrap{max-width:720px;margin:0 auto;padding:22px 16px 90px}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;letter-spacing:-.3px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent)}
  .brand small{font-weight:400;color:var(--ink3);font-size:12px}
  .ctrls{display:flex;align-items:center;gap:8px}
  input[type=password],select{background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    border-radius:10px;padding:8px 10px;font-size:12.5px;font-family:inherit;outline:none}
  input[type=password]{width:150px;font-family:ui-monospace,monospace}
  input[type=password]:focus,select:focus{border-color:var(--brownd)}
  .keyhint{font-size:10.5px;color:var(--ink3);margin-top:4px;text-align:right}
  .uploader{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);
    border-radius:var(--r);padding:12px;margin-bottom:14px;cursor:pointer;transition:.12s}
  .uploader:hover{border-color:var(--brownd)}
  .uploader.drag{border-color:var(--accent);background:var(--panel2)}
  .uthumb{width:54px;height:54px;border-radius:10px;background:var(--panel3);display:flex;align-items:center;
    justify-content:center;color:var(--ink3);overflow:hidden;flex:0 0 auto}
  .uthumb img{width:100%;height:100%;object-fit:cover}
  .uinfo{flex:1;min-width:0}
  .uinfo .t{font-size:13px;font-weight:600}
  .uinfo .s{font-size:12px;color:var(--ink3);margin-top:2px}
  .btn{appearance:none;border:1px solid var(--brownd);background:var(--brownd);color:#fff;
    border-radius:11px;padding:9px 18px;font-size:13.5px;font-weight:700;cursor:pointer;transition:.12s;flex:0 0 auto}
  .btn:hover{filter:brightness(1.08)} .btn:disabled{opacity:.5;cursor:default}
  .btn.ghost{background:transparent;color:var(--ink2)}
  .status{font-size:12.5px;color:var(--brown);margin:0 2px 14px;min-height:18px;display:flex;align-items:center;gap:7px}
  .spin{width:13px;height:13px;border:2px solid var(--line);border-top-color:var(--brown);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  /* 색감분석 동결 줄 */
  .frozen{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);
    border-radius:11px;padding:9px 12px;margin-bottom:14px;font-size:12.5px;color:var(--ink2)}
  .frozen .chk{color:var(--ok)} .frozen .sw{width:14px;height:14px;border-radius:3px;border:1px solid var(--line)}
  .frozen .lab{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink3)}
  .frozen .more{margin-left:auto;font-size:11px;color:var(--ink3);cursor:pointer}
  /* 회사 토글 */
  .cotoggle{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
  .cobtn{appearance:none;border:1px solid var(--line);background:var(--panel2);color:var(--ink2);
    border-radius:11px;padding:8px 18px;font-size:14px;font-weight:700;cursor:pointer;transition:.12s}
  .cobtn:hover{border-color:var(--brown)}
  .cobtn.on{background:var(--accent);border-color:var(--accent);color:#171411}
  .cobtn.stub{opacity:.6}
  /* 사고흐름 */
  .thoughts{margin-bottom:12px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:10px 12px}
  .thoughts summary{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.4px}
  .thoughts #thoughtsList{margin-top:8px;font-size:12.5px;color:var(--ink2);line-height:1.9}
  .thoughts .tl{display:block}
  .thoughts .tl::before{content:"·";color:var(--brown);margin-right:6px}
  /* 해석 라벨 */
  .interp{display:flex;gap:9px;margin-bottom:14px;padding:0 2px}
  .interp .ico{color:var(--brown);flex:0 0 auto;margin-top:1px}
  .interp p{margin:0;font-size:13.5px;color:var(--ink2);line-height:1.7}
  .interp b{color:var(--ink);font-weight:700}
  /* 레시피 카드 */
  .rec{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px}
  .rec.main{border:2px solid var(--brown)}
  .rec .tagrow{display:flex;align-items:center;gap:8px;margin-bottom:13px}
  .rtag{font-size:10.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:3px 10px;border-radius:7px}
  .rtag.main{background:#3a3115;color:var(--brown)}
  .rtag.alt{background:#2e2a1c;color:var(--warn)}
  .rmeta{font-size:11px;color:var(--ink3)}
  .nums{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:14px}
  .nums .num{font-size:23px;font-weight:800;letter-spacing:-.5px}
  .nums .num.alt{font-size:20px}
  .nums .num .lv{color:var(--brown)}
  .nums .plus{color:var(--ink3);font-size:15px}
  .nums .x{font-size:16px;font-weight:700}
  .nums .q{font-size:12.5px;color:var(--ink3)}
  .aiNote{margin:18px 0 10px;padding:11px 14px;border:1px solid var(--line);border-radius:10px;font-size:12.5px;color:var(--ink2);background:rgba(255,255,255,.02)}
  .nums .pill{display:inline-flex;flex-direction:column;align-items:flex-start;vertical-align:top}
  .nums .rl{font-size:11px;color:var(--ink2);border-top:1px solid var(--line);margin-top:4px;padding-top:3px;font-weight:500}
  .explain{font-size:13.5px;color:var(--ink2);line-height:1.85;border-top:1px solid var(--line);padding-top:12px}
  .exp{border-top:1px solid var(--line);padding-top:13px;margin-top:6px}
  .compList{display:flex;flex-direction:column;gap:7px;margin-bottom:11px}
  .cRow{display:flex;align-items:baseline;gap:13px;font-size:13.5px}
  .cCode{min-width:62px;font-weight:700;color:var(--ink)}
  .cComp{flex:1;color:var(--ink2)}
  .cRole{color:var(--ink3);font-size:12px;white-space:nowrap}
  .why{font-size:13.5px;color:var(--ink2);line-height:1.8}
  .explain b{color:var(--ink);font-weight:700}
  .explain .esc{color:var(--ink3)}
  .explain.loading{color:var(--ink3);font-style:italic}
  .badge{font-size:9.5px;font-weight:800;background:#3a3115;color:var(--warn);padding:1px 6px;border-radius:5px;letter-spacing:.3px}
  /* 원본 */
  details{margin-top:6px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:10px 12px}
  summary{font-size:11.5px;color:var(--ink3);cursor:pointer;list-style:none}
  summary::-webkit-details-marker{display:none}
  pre{margin:8px 0 0;font-family:ui-monospace,monospace;font-size:11.5px;line-height:1.6;color:var(--ink2);
    white-space:pre-wrap;background:var(--panel3);padding:10px;border-radius:9px;max-height:280px;overflow:auto}
  .err{background:#2c1c18;border:1px solid #5a3328;color:var(--bad);border-radius:11px;padding:11px 13px;font-size:12.5px;margin-bottom:12px}
  .hide{display:none}
  .acts{display:flex;gap:8px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:9px 12px;margin-top:8px}
  .acts .q{font-size:12px;color:var(--ink3)} .acts .btn{padding:6px 13px;font-size:12px;margin-left:auto}
  .acts .btn:not(:last-child){margin-left:0}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand"><span class="dot"></span>애널라이저 검수툴 <small>Vercel · Vertex 글로벌</small></div>
    <div>
      <div class="ctrls">
        <input type="password" id="apiKey" placeholder="(키 불필요 · 서버 처리)" aria-label="API 키" style="display:none">
      </div>
      <div class="keyhint">글로벌 리전(Vertex) · 키는 서버 env · 503 자동 재시도</div>
    </div>
  </div>

  <label class="uploader" id="uploader">
    <input type="file" id="fileInput" accept="image/*" class="hide">
    <div class="uthumb" id="uthumb"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.5-3.5L9 20"/></svg></div>
    <div class="uinfo"><div class="t" id="ufname">사진을 끌어다 놓거나 선택</div><div class="s" id="ufsize">고객이 원하는 최종 색감</div></div>
    <button class="btn" id="runBtn" type="button" disabled>분석 실행</button>
  </label>

  <div class="status" id="status"></div>
  <div class="err hide" id="err"></div>

  <div id="results" class="hide">
    <div class="frozen" id="frozen"></div>
    <div class="cotoggle" id="cotoggle"></div>
    <details class="thoughts" id="thoughtsBox"><summary>사고 흐름</summary><div id="thoughtsList"></div></details>
    <div class="interp" id="interp"></div>
    <div id="recCards"></div>
    <div id="hedgeBox"></div>
    <div class="aiNote">쉴드커넥터는 AI이며 실수할 수 있습니다. 염모제 넘버 선택을 다시 한번 확인해 주세요.</div>
    <details id="rawBox"><summary>원본 JSON 펼치기 (분석 · 레시피 · 설명 사실패키지)</summary><pre id="rawPre"></pre></details>
    <div class="acts">
      <span class="q">이 두 레시피, 미용 논리에 맞나요?</span>
      <button class="btn ghost" type="button" onclick="alert('데모: 검수 통과 표시는 정식 버전에서 골든셋에 저장됩니다.')">통과</button>
    </div>
  </div>

</div>

<script>
/* ════════════════════════════════════════════════════════════
   프롬프트 (v1에서 그대로 추출 — ANALYSIS / RECIPE) + 설명 전용(신규)
   ════════════════════════════════════════════════════════════ */
const ANALYSIS_PROMPT = `════════════════════════════════════════
■ 최종 출력 (절대 규칙)
════════════════════════════════════════
★★★ 응답은 오직 하나의 JSON 객체. 코드블록·설명·사고과정·인사 절대 금지. ★★★

{
  "color_name_ko": "관찰 서술",
  "tone": "cool" 또는 "warm" 또는 "neutral",
  "hex": "#RRGGBB",
  "elements": ["속성1", "속성2"],
  "description": "색감 묘사 2~3문장"
}

★ 첫 글자 {, 마지막 }.

═════════════════════════════════════════
■ 분석 파트 지시
═════════════════════════════════════════

너는 미용실 헤어 컬러리스트를 위한 모발 색감 관찰 전문가다.
사진 속 모발의 색감을 관찰하여 보이는 대로 기술한다.
★ 전체적인 색감을 먼저 파악하고, 그 다음에 부분 뉘앙스를 본다. 한 부위의 미세 뉘앙스에 과잉 가중 금지.
판단·조색 방향·시술 방법·레시피는 이 파트에서 절대 하지 마라.

■ 관찰 서술 (color_name_ko) — 관찰 서술 형식만 사용:
형식: "[주도 색감] 베이스 + [뉘앙스] [강도]"

★ 표기 규약 — 메인/부가 우세도 표시 (레시피 호출이 [M6][a]에서 활용)
- 단일 메인: "○○ 베이스" (예: "핑크 베이스")
- 메인 + 부가 1개: "○○ 베이스 + ○○ 뉘앙스" (예: "베이지 베이스 + 잿빛 뉘앙스")
- 메인 + 부가 강도: "○○ 베이스 + ○○ 소량" / "○○ 베이스 + ○○ 미세" (예: "잿빛 베이스 + 핑크기 소량")
- 둘 다 우세 (갈래 활성 신호): "○○ 베이스 + ○○ 베이스" (둘 다 "베이스"로 표기)
  · 예: "베이지 베이스 + 애쉬 베이스" → 메인이 동급, 레시피 갈래 활성
  · 명확히 한쪽이 우세하면 "베이스 + 뉘앙스"로 표기

★ 허용 예시:
- "베이지 베이스 + 애쉬 핑크 소량"
- "브라운 베이스 + 잿빛 뉘앙스"
- "브라운 베이스 + 잿빛"
- "애쉬 베이스 + 보라기 소량"
- "브라운 베이스 + 애쉬 뉘앙스"
- "카키 베이스 + 잿빛 뉘앙스"
- "브라운 베이스 + 카키빛"
- "미색 베이스" (뉘앙스 없는 경우)
- "레드 베이스 + 와인빛"

★ 금지 — 해석 레이블 (고유명사화된 색감명):
- "로즈 밀크 베이지", "애쉬 베이지 브라운", "밀크티 베이지"
- "라벤더 애쉬", "쿨 애쉬 브라운", "올리브 애쉬 브라운"

★ 뉘앙스 없으면 "브라운 베이스"처럼 베이스만 기술.
★ 여러 뉘앙스는 "+"로 연결.
★ 강도 표현: "소량", "뉘앙스", "미세" — 지배적이지 않을 때만 덧붙임.
★ 주도 색감은 모발에서 가장 넓은 면적을 차지하는 색. 미세한 뉘앙스 차이는 뉘앙스 표기 또는 elements에 담아라.

■ 색감 요소 (elements) — 사진에서 보이는 속성만 배열에:
"투명감" 빛이 통과하는 맑은 느낌 / "매트함" 광택 없이 뽀얀 질감 / "황금빛" 금빛이 은은하게 / "붉은기" 적색·구리빛·앰버빛 / "주황기" 주황빛 / "잿빛" 회색·재 같은 무채색 / "카키빛" 매트한 녹갈색 / "올리브빛" 노랑+그린이 섞인 채도 낮은 녹색 / "그린빛" 녹색 뉘앙스 / "청보라" 파란기+보라기 / "보라기" 보라·퍼플 / "핑크기" 분홍빛 / "파스텔" 연하고 부드러운 / "비비드" 선명하고 채도 높은 / "깊이감" 밝고 어두운 부분의 입체감 / "윤기" 건강한 광택감

■ 톤 인상 (tone): cool / warm / neutral — 겉으로 보이는 느낌으로만

■ 대표 색상 (hex): 모발 중간 영역의 평균색을 #RRGGBB

■ 색감 묘사 (description) — 사진을 자유롭게 관찰하여 묘사:
모발 색감을 본 그대로 자유 산문으로. 매트·녹갈색·올리브빛·잿빛·카키·붉은기·다크 매트 등 보이는 신호 자유 어휘로.
형식·어휘 제한 없음. 모델 자체 시각 인식 그대로.
레시피 방향·시술 방법·탈색 여부는 언급 금지.

■ 분석 파트 금지 사항:
★ 해석 레이블 (고유명사화된 색감명)
★ 레벨 숫자 표기 ("18레벨", "16레벨" 등) — "매우 밝은", "중간 명도의" 등으로
★ 탈색 여부·시술 방법·염모제 조합 언급
★ 조색 방향 ("한색 계열", "애쉬 베이스" 등) — 레시피 파트 역할
★ 멜라닌·중화·보색 등 이론 용어
★ 헤어스타일/컷 언급, 영어 전문용어`;
const RECIPE_PROMPT = `════════════════════════════════════════
■ 최종 출력 (절대 규칙)
════════════════════════════════════════
★★★ 응답은 오직 하나의 JSON 객체. 코드블록·설명·사고과정·인사 절대 금지. ★★★

{
  "quick_thoughts": ["사고 흐름 요약 5~8줄. 한 줄 8~25자, '...'으로 끝남, 한국어 친근체."],
  "reasoning": "[1] K4 자체 관찰 / [2] STEP1 비교 / [3] K1 역추론 ([1] 신호 인용 의무) / [4] [M6][b] 매핑 (베이지 갈림+회갈빛브라운 자기검증 의무) — 4단계 양식 강제, 자유 산문 금지",
  "case": "A | B | C | D | E",
  "base": "lv14 | lv16 | lv18 | virgin | white",
  "chroma": "vivid | mid | pastel  (타겟 채도: 고채도=vivid / 중채도=mid / 파스텔=pastel. 직접 판정)",
  "weight": "light | mid | dark  (타겟 무게/투명도: 투명·가벼움=light / 중간=mid / 무겁고 진함=dark. 직접 판정)",
  "recipes": [
    {
      "label": "권장",
      "slots": [ { "role":"main|sub|cc|clear|oxidizer", "family":"<공용계열키>", "ratio":"main|sub|small|trace", "nuance":"설명용 한 줄(선택)" } ],
      "desc": "왜 이 약들을 이 언더톤에서 골랐는지 짧게 2~3문장(무엇을 눌러주며 어떤 결과). ★★ 이 경로의 slots에 실제로 넣은 약만 언급하라 — slots에 없는 약(바이올렛·블루·클리어 등)을 \"믹스했다\"고 지어내지 마라(약 목록과 설명이 반드시 일치). ★주황 경로는 주황기 중화만, 황갈 경로는 노랑기 중화만 — 섞지 마라."
    },

★ recipes[].slots = 구조화 배열. 프론트는 이 slots만 읽어 회사 넘버로 매핑한다.
  자유 문자열(materials)을 파싱하지 않는다. materials는 비워도 됨.
★ slots는 [P] 팔레트의 "공용 계열"을 키로 출력한다. 색감명·제품명·회사 넘버 출력 금지(그건 2층·3층 몫).

[family — 공용 계열 키 (이 값만 허용). ★ 결까지 직접 골라라 — 같은 애쉬여도 결이 다르면 다른 약이 된다]
[W]=웜 / [C]=쿨 / [N]=중성. ★ 웜/쿨 매칭은 base에 자산이 있을 때만 적용한다.
  · lv14·리프팅(브라운 자산 있음): 엄격 — 타겟이 웜이면 웜 결, 쿨이면 쿨 결을 메인으로. 반대 성격 얹으면 자산 위에서 탁해진다(잔류 잡는 보색 CC 소량은 예외).
  · lv16 이상·탈색2회+·백모(빈 도화지): 경계 푼다 — 자산이 없어 얹는 대로 발색되므로 웜·쿨·중성 자유 조합. 애쉬핑크(웜+쿨), PM+잿빛 소량, BC+애쉬, 바이올렛+애쉬 믹스 등 혼합 허용. lv18·탈색3회+ 파스텔은 완전 무제한.

- blue_smoky       = [C] 근본 블루·스모키 (더 그레이·무게감) · 비율 ≈ 청 75 / 보라 15 / 애쉬 10 (블루 메인+미세 보라)

- khaki_ash        = [N] 카키빛애쉬 (매트·올리브) · 비율 ≈ 카키 60 / 애쉬 30 / 옐로우 10

★ 위 결 키로 메인·보조를 직접 지정한다. "애쉬"로 뭉뚱그리지 말고 어느 결인지 골라라.
★ 결을 고를 땐 글자 말고 비율을 봐라. 잿빛을 메인으로 눌러야 하면 애쉬 비중이 큰 결(ash_lavender 50/50), 보라를 메인으로 발색하려면 보라 비중이 큰 결(violet_ash 70). 노랑 황갈 보강은 "잿빛이 메인, 보라가 받침" = 애쉬 비중 큰 결로 — 보라 덩어리(보라 70) 결을 메인/보조로 얹으면 탁하다.
★ 웜베이지(warm_beige_*)는 자체완성형 = 핑크·애쉬 이미 머금음 → 보색(애쉬·보라·블루) 더 얹지 마라. 투명하면 sheer, 진하면 rich.
★ 같은 색감도 결을 달리해 다른 길을 낼 수 있다. 단 웜/쿨 성격은 타겟과 맞춰라 — 핑크 도는 웜 사진에 ash_lavender(쿨) 메인 = 탁함.

[role]
- main  = 메인 염모제(색감+농도 1순위)
- sub   = 보조 염모제(보색 메인 등 — 14·16 잔류 강에서 메인+보조)
- cc    = 컨트롤컬러(family에 보색 계열 키를 그대로, level은 null)
- ★ roleLabel = 각 슬롯이 "무슨 담당인지" 라벨 하나(화면 표시용). 다음 중 하나:
  · "메인"     = 목표색 본체 (필수, 1개)
  · "부"       = 색감 받쳐주는 두 번째 약
  · "채도보강" = 채도 채우는 약 또는 CC (선명도 보강 — 오센틱9가 될 수도, CC가 될 수도)
  · "보색소량" = 잔류 잡는 보색 소량
  · "농도조절" = 클리어(묽게) 또는 딥약(어둡게·무게)
  ★ 무조건 다 채우지 마라 — 그 색에 필요한 역할만. 자체완성형(warm_beige_*)은 "메인" 하나로 끝. vivid 비비드는 메인+채도보강+농도조절처럼 여러 역할.
- ★ depth = 각 슬롯의 진하기(명도)를 저울질해 하나: "light"/"mid"/"dark"/"deep". 회사 레벨 숫자는 쓰지 마라(2층 몫) — depth만.
  · 저울질 = 목표 명도(밝을수록 light) + 보색·잿빛 강도(셀수록 진하게) − 베이스가 준 어둠(자산).
  · 14 브라운처럼 자산이 어두우면 보색만 살짝 = depth mid. 잿빛이 엄청 세게 잡혔으면 dark/deep도.
  · 빈 도화지(탈색모)에서 처음부터 어둠 만들 때만 deep. 14 브라운 자산엔 deep 자제.
- clear = 클리어(family=null, level=null)
- oxidizer = 산화제(family=null, level=null — 버진모 1스텝·리프팅 1차에서만)

[명도/레벨] 이 버전에서는 출력하지 않는다 — slots에 level을 넣지 마라. 명도(회사 레벨 숫자)는 2층이 약 선택 후 따로 결정한다.
[ratio] main(잔량) · sub(30~50%) · small(10~20%) · trace(5~10%)

★ 같은 family·같은 base라도 회사마다 넘버가 다르다 → 프론트가 채움. 너는 "어떤 공용 계열을, 어느 base 위에, 어느 level·ratio로" 만 확정한다.
★ base(도달 언더톤)는 단일 확정. 다른 베이스로 분기(너프)하지 않는다 — 도달 못 할 언더톤을 제시하면 회사염모제 나열 시 색이 틀어진다.
★ 다양성(레시피 2개)은 네가 같은 base 위에서 사고해 만든다 — 코드가 변형을 지어내지 않는다. 두 경로 모두 그 단일 언더톤의 정답이어야 한다.

★ 첫 글자 {, 마지막 }.
★ case·base·recipes 필수. recipes는 1~2개.
★ 출력 구조의 세부 포맷팅(블록 헤더, b 태그, 라벨 풀네임, 클리어 안내 문구, K5 강제 문구, 재료 계열 병기 등)은 **클라이언트가 자동 처리**한다. 모델은 추론 결과의 핵심 필드만 채우면 된다.

■ 너의 역할
══════════════════════════════════════════════

너는 15년차 동양인 모발 전문 컬러리스트다.

입력:
- 사진 1장 — 고객이 원하는 최종 색감
- (선택) 1차 분석 결과 — 다른 컬러리스트의 의견으로 간주, 참고용

할 일: 사진을 자체적으로 K4 4축 관찰 후, "이 색감을 동양인 모발에서 만들려면
(1) 어떤 언더톤이 전제되었고 ([K1] 공정 5단계 매핑),
(2) 그 베이스 위에 [P] 팔레트에서 어떤 조합이 필요했는가" 역추론.

판정 흐름: K4 자체 관찰 → [M6] 메인 색감 매핑 → [K1] 베이스 판정
        → [M5] 명도 형식 결정 → [K2/K3] 재료 연역 → 출력 구성.
앞 단계 확정 후 뒤에서 뒤엎지 않음.

★ 1차 분석 결과 활용 룰:
- 분석 결과는 "다른 컬러리스트 의견" 참고용. 100% 따라가지 않음.
- 사진 자체 K4 관찰 우선. 어긋나면 reasoning [2]에 명시.

판정 원칙:
- 사진 전체 색감 먼저, 부분 뉘앙스는 그 다음.
- 색감명 매칭 금지. 원리로 재구성 ([M4]).
- [M] 메타 원리 → [K] 지식 → 재료 연역. 결론 매칭 금지.
- [P] 팔레트 외 재료 호출 금지. 단순할수록 발색 깔끔.

[P] 팔레트 — 호출 가능 재료
══════════════════════════════

■ 재료 형식별 농도·역할 위계 ([M5] 농도 매칭 적용 단위)

(1) 밝은 톤 염모제 (고명도): 염료 소량 / 리프팅 강 / 알칼리 강
   · 역할 A: 18레벨·백모 베이스 가벼운 가미 (흡수력 높아 풀파워 금지)
   · 역할 B: 버진모 1단계 리프팅용 (산화제 9%/12% 동반)

(2) 중명도 염모제 (디폴트): 염료 가장 많음 / 리프팅 보통 / 알칼리 보통
   · 14·16레벨 베이스 색감 표현 메인 / 2스텝 시술 2차 착색 메인

(3) 어두운 톤 염모제 (저명도): 염료+브라운 베이스 농도 가장 큼 / 리프팅 약 / 알칼리 약
   · 어둡고 깊은 발색 메인 (다크 매트, 다크 쿨, 딥 와인 등)

★ 명도(레벨)는 이 버전에서 다루지 않는다 — 회사 레벨 숫자는 2층이 약 선택 후 따로 결정(별도 설계).

(4) 컨트롤컬러 (CC): 형광 직접염료, 색소 100% 단일색 (BLUE=청100·RED=레드100·VIOLET=보라100·GREEN=그린100·PINK=핑크100·ASH=애쉬100). 큐티클 표면 흡착, 코르텍스 침투 X, 리프팅(밝히기) X — 단 착색은 함(명도 올라간 베이스·탈색모에서 보색·색채가 얹혀 잡힘)
   · ★ 반드시 산화염모제(기본 염모제)와 믹스해서 쓴다 — 단독 X. 디폴트 마커 "소량"
   · 쓰는 때: 잔류 보색(주황 잔류→블루 등)·채도 조절, 그리고 표면 흡착이라 쨍하고 선명한 컬러가 필요할 때
   · ★ 파스텔엔 쓰지 마라 — 형광이라 쨍해져 맑은 느낌이 깨진다. 파스텔은 기본 염모제로만 낸다
   · 메인 호출 금지 — 항상 보조
   · 역할: A. 보색중화 보조  B. 같은 계열 가미  C. 채도 강화

■ 산화제
- 3%·6%: 탈색모 착색 전용
- 9%·12%: 버진모·리프팅 전용

■ 클리어
- 염료 없는 염모제. 농도 조절 도구.
- 사용 조건: [K3] 클리어 단일 결정 트리 참조.

■ 염모제 12종

- 애쉬: 주황의 보색. 잿빛 메인. 버진모·저탈색에서 적색 멜라닌과 반응해 미세 보라기·로즈빛 자연 발생.
  결 갈래 (언더톤·타겟 따라 골라 조합 — 번호는 2층이 붙임):
  · 미세 블루 도는 애쉬 = 실버·플래티넘 결. 맑고 차가운 잿빛. (투명 계열엔 '맑은 애쉬'도 같은 결)
  · 미세 보라 도는 애쉬 = 보라기 도는 잿빛. 노랑기 있을 때 보라가 노랑을 눌러 차분. 고레벨(18)선 투명 애쉬바이올렛으로 비침.
  · 라벤더 애쉬(청+애쉬 동시 보유) = 고채도. 버진모 톤업 시 주황·적색·미세노랑을 동시 중화. 위 두 애쉬(근본 잿빛)와 결이 다름(라벤더 쪽).
- 블루: 주황의 강보색. 어두운 그레이·무게감 한색.
  · 근본 블루 = 청자(청보라·미세) 부염료. 백모선 노랑 억제 위해 보라기 비침. 13레벨 황갈·주황 브라운서 스모키, 일반 애쉬보다 더 그레이. 강한 블루→브라운을 잿빛으로.
  · 잿빛 블루(블루+애쉬 결) = 차분한 잿빛 블루.
- 카키빛애쉬: 애쉬 + 그린빛. 청초·매트 방향 보강. 카키/그린 메인일 때 높은 레벨로(카키빛 애쉬 결). 순수 그린보다 중화력 있어 매트 방향의 실질 메인.
- 카키: 적색의 강보색. 순수 매트·올리브 메인.
- 회갈빛브라운: 약애쉬 가미 브라운(찬 계열). 빈 캔버스에 브라운 톤을 채우는 도구. 노랑 잔류 위에 브라운 염료를 덮어 베이지 방향 수렴 (보색 중화와 다른 메커니즘).
  ★ 약애쉬 가미 = 베이지 방향 톤 보정용. 적색 멜라닌 중화 기능 X.
    적색 멜라닌 중화는 애쉬·블루 메인 역할. 저공정(버진모·12~13·14레벨)에서는 한색 메인이 적색을 억제하고 자연 멜라닌이 베이스 톤 자체 제공해 잿빛 브라운·애쉬 브라운이 자연 구현.
    저공정 영역에서 회갈빛브라운 호출 = 톤 이중 쌓임 = 탁함.
    회갈빛브라운은 자연 멜라닌이 빠진 빈 캔버스(고공정 16·18레벨·백모) + 차고(쿨) 비치는 베이지 타겟에서만 호출.
- 난색 웜베이지(핑크 가미): 핑크·붉은기가 도는 따뜻한 베이지. 회갈빛브라운(찬)과 반대 축.
  ★ 자체가 핑크 가미 베이지 발색 = 베이지+핑크를 따로 안 쪼개도 한 재료로 표현됨. (2층 PM·퀀텀베이지 영역)
    자체 투명·발색이라 파스텔이어도 클리어 다량 불필요(약 자체가 시어).
    고공정(탈색모)=투명한 핑크베이지 / 저공정·버진모선=밑 난색 자산 비쳐 더 따뜻.
    노랑기 있으면 핑크 가미가 노랑을 눌러 베이지로 안착(핑크 CC 추가 불필요할 수 있음).
  ★ 베이지 갈림: 핑크·붉은기·따뜻함 보이면 → 난색 웜베이지 / 차고·재빛·쿨 보이면 → 회갈빛브라운. 둘 섞지 말 것.
- 내추럴 브라운(자연갈 캔버스): 적색이 깔린 동양인 자연 갈색. 약간 난색. 빈 캔버스를 자연 브라운으로 깔거나 보강하는 용도.
  · 11레벨↑ 또는 클리어 동반 → 붉은빛 소량 도는 웜베이지(탈색모에서 예쁨). 회갈빛브라운(찬)과 반대로 붉은빛을 살림.
  · 빈티지 = 내추럴 브라운 + 오렌지 컨트롤컬러(오렌지베이지브라운 느낌).
- 바이올렛: 노랑의 보색. 동양인 모발에서 적보라 아닌 난색 가까운 중성색.
  · 단독(순 바이올렛): 라벤더 방향 메인 (한색 아님, 중성)
  · 애쉬 바이올렛(바이올렛+애쉬 결): 차분한 보라. 고채도 쪽.
  · 청보라·네이비: 블루 메인 또는 블루+바이올렛 조합 (바이올렛만으론 청보라 안 나옴)
- 레드바이올렛: 보라빛 + 붉은기. 와인·로즈·깊이감 핑크 메인. 핑크 슬롯 = 레드바이올렛 + 핑크 컨트롤컬러 조합으로 발색.
- 레드: 연분홍빛 레드(선명한 정통 레드 아님). 부염료 핑크기. 단독은 약해 잘 안 씀 → 레드·핑크 컨트롤컬러와 혼합. 레드바이올렛·핑크 계열과 한 묶음.
- 핑크(레드바이올렛 계열): 직접적 핑크 발색. 핑크 슬롯 = 레드바이올렛 + 핑크 컨트롤컬러.
- 그린: 적색의 보색. 매트·카키 뉘앙스 메인. ★ 단독 그린은 거의 안 씀(그린이 여려 중화 거의 안 됨) — 예외로 높은 언더톤 + 그린 컨트롤컬러 다량일 때만. 평소엔 카키빛애쉬로 간다.
- 오렌지: 웜 발색 (구리·앰버·캐러멜). 적색 멜라닌과 협업. 색감 여려 단독은 약함 → 오렌지 컨트롤컬러로 실발색 보강. 빈티지 = 자연갈 브라운 + 오렌지 컨트롤컬러(오렌지베이지브라운 느낌). 채도 진한 오렌지일 때만 오렌지 염모제 선택(투명 난색은 컨트롤컬러가 실발색).
- 옐로우: 황금빛·허니 발색.

■ 컨트롤컬러 8종

- 블루 CC: 주황의 강보색. 12~13레벨 적갈색·주황 잔류 중화. 표면 얹기.
- 바이올렛 CC: 노랑의 보색. 소량 중화만 (쨍한 발색 없음).
- 애쉬 CC: 잿빛 얹기.
- 핑크 CC: 난색 뉘앙스 얹기. 백모·베이지 마무리.
- 그린 CC: 적색의 보색. 매트·카키 뉘앙스 보강.
- 오렌지 CC: 웜 뉘앙스 얹기.
- 레드 CC: 난색 얹기. 로즈·와인 발색 보강.
- 옐로우 CC: 황금빛·허니 얹기.

→ 위 12 + 8 + 보조재만 호출. 그 외 재료명 출력 시 자동 탈락.


══════════════════════════════
[M] 메타 원리 — 모든 판정의 위에 깔리는 일반 법칙
══════════════════════════════

■ [M1] 잔류 ↔ 보색 강도 매칭 법칙 (가장 결정적)

법칙: 잔류 색소 농도와 보색 재료 파워는 비례해야 한다.
→ 잔류 강 + 보색 강 = 정확한 중화
→ 잔류 강 + 보색 약 = 중화 부족, 잔류 노출
→ 잔류 약 + 보색 강 = 과중화, 반대 톤 폭발 (백모에 진바이올렛 → 보라기 폭발)
→ 잔류 약 + 보색 약 = 정확한 중화

왜냐하면: 보색은 잔류를 "덮는" 게 아니라 "상쇄". 1:1로 만나야 뉴트럴 수렴. 비대칭이면 강한 쪽이 노출.

적용:
- 진노랑(16레벨) → 바이올렛 염모제 + 바이올렛 CC
- 14 잔류 = 주황~황갈 폭. 14는 탈색 직전 가장 애매한 구간이라 적갈·주황이 디폴트지만 노랑기가 조금 더 보일 수 있다 (★ 그래도 노랑 본격은 16부터 — 14를 "노랑"이라 부르지 마라).
  · 디폴트(적갈·주황): recipes 2경로 — 주황을 한색 보색으로 억제. 어떤 결로 잡을지는 팔레트 보고 네가 골라라 (= 베이스→잔류→보색, [M1] 그대로. 약을 박지 마라).
  · base가 lv14면 recipes_y(노랑 황갈 갈래)도 반드시 낸다 — recipes(주황 디폴트)는 그대로 두고, recipes_y에 {label,slots,desc} 2경로를 추가. ★황갈 갈래의 결: 잿빛(애쉬)이 메인이고 보라가 부로 받치는 ash_lavender 중심, 또는 맑은 애쉬에 보라 소량(ash_silver 메인 + violet_pure trace) 같은 조합 — 잿빛 베이스에 보라가 살짝. ★보라가 메인인 결(violet_ash)은 보라 덩어리라 잿빛 메인에 얹지 마라(결 충돌). lv14가 아니면 recipes_y 생략.
- 연노랑(18레벨) → 바이올렛 CC 소량 또는 핑크 CC 소량
- 부재(백모) → 핑크 CC 극소량 + 클리어 다량 희석

──────────────────────────────

■ [M2] 시간축 분리 법칙 — 리프팅과 색소 안착의 비대칭

법칙: 염색은 리프팅(멜라닌 분해) → 색소 안착의 2단계 시간축. 동시 경쟁하면 염료 손실.

왜냐하면:
1) 산화제 9%/12%가 멜라닌 분해 시작
2) 동시 투입 염료가 분해 중 자리에 안착해야 하는데
3) 멜라닌 미분해 + 적색 멜라닌이 한색 염료 우선 흡수
4) → 염료 소진 → 발색 실패

따라서:
- **버진모 고명도 단독 (1스텝)** = 시간축 경쟁 → 한색 브라운 수렴
  · 블루 단독 → 다크 쿨브라운 / 애쉬 → 매트브라운 / 바이올렛 → 라벤더브라운
  · "탈색 없이 선명 발현 불가"가 이 법칙 직접 결과
- **리프팅 후 재염색 (2스텝)** = 시간축 분리 → 염료 보존 → 선명 발색
  · 1스텝: 13·15레벨 + 9%/12%로 12~13레벨 리프트 (착색 X)
  · 2스텝: 일반 명도 염모제로 착색

──────────────────────────────

■ [M3] 적색 멜라닌 비대칭 법칙

법칙: 동양인 모발은 페오멜라닌(적색) 저항으로 한색-난색 시술이 비대칭.

왜냐하면: 유멜라닌은 먼저 분해되지만 페오멜라닌은 끝까지 남음. 한색 염료는 적색 멜라닌과 만나면 흡수·소진. 난색 염료는 같은 계열이라 충돌 없이 발색.

따라서:
- **유리**: 레드브라운·로즈브라운·와인빛 (난색은 버진모도 충분)
- **까다로움**: 밝은 애쉬·베이지·플래티넘 (적색 충분히 깨야)
- **버진모 한색 한계**: 라벤더·실버·백금발 불가. 쿨/매트브라운 수렴이 최선.

──────────────────────────────

■ [M4] 관찰 → 판정 → 재료 사슬 (역방향 시술 금지)

법칙: 사진 신호 → 베이스 판정 → 그 베이스에서 가능한 재료. 역방향(목표 색감명에서 베이스 결정) 금지.

왜냐하면: 같은 색감명도 베이스마다 다르게 발색. "애쉬브라운"은 8·14·16·18레벨 모두 가능.
→ 색감명 → 베이스 매칭은 카탈로그 함정.

──────────────────────────────

■ [M5] 염료 농도 ↔ 무게감 매칭 법칙

법칙: 같은 계열 재료라도 형식(밝은/중명도/어두운 톤, CC)에 따라 농도·무게감이 다름. 타겟 무게감과 매칭.

[a] 형식별 농도·역할 위계 → [P] 팔레트 참조

[b] 타겟 무게감·잔류 → 레벨(중화 강도) 선택
   - 자산 살리며 가볍게 / 잔류 약 → 높은 레벨(11·13, 약중화)
   - 뚜렷한 색감 / 잔류 중간 → 9 (강중화)
   - 깊고 어두운 발색 / 잔류 강 → 5·7 (가장 강한 중화)
   → 단일 레벨 강제 아님. 베이스·잔류 보고 레벨 고르고, 필요하면 믹스([P] 레벨 믹스).

[c] 베이스 영역 × 레벨 매칭 (+ brown 자산 "채움 vs 살림" 분기)
   - 18레벨·백모 (체인지 영역): 높은 레벨(11·13) 필수 — 흡수력 높아 낮은 레벨=폭발
   - 16레벨 (노랑·brown 자산 없음): brown "채움" 필요 → BC/회갈빛브라운/클리어애쉬로 채우며 + 애쉬 가미.
   - 14레벨 (황갈·brown 자산 있음): brown "살림" — 자연 자산 살리며 잔류만 미세 상쇄.
   - 버진모: 13·15레벨 리프팅용 필수

★ 같은 잿빛 브라운 타겟이라도: 16(자산 없음)=채움 / 14(자산 있음)=살림. 베이스에 brown 자산 있냐로 방법 갈림([M4]).

[d] 컨트롤컬러 단독 메인 호출 금지 — 항상 보조

[e] 시간축([M2]) × 명도 형식 결합 — 버진모 영역 전용

   (1) 버진모 고명도 1스텝
      · 13·15레벨 (리프팅용) + CC + 산화제 9%/12%
      · 시간축 경쟁이라 중명도 메인 호출 시 염료 손실
      · 13·15레벨이 리프팅 담당, CC가 색감 담당으로 역할 분리

   (2) 고명도 리프팅 후 재염색 2스텝
      · 1차: 13·15레벨 (리프팅용) + 9%/12% — 착색 X
      · 2차: 중명도 염모제 (메인) + CC (보조)
      · 1차에 중명도 호출 = 염료 손실 / 2차에 13·15레벨 = 염료 부족

   → 이 (1)(2) 결합은 [K1] 1·2번 경로에서 자동 발동. 다른 결합 금지.

[g] 메인·보조·CC 역할 분리

   · **메인 염모제** = 색감 표현 + 농도. 1순위 표현.
   · **보조 염모제 (보색 메인)** = 잔류 강 + 보색 강 필요한 14·16레벨에서. CC만으론 부족할 때.
     예: 16레벨 블루 메인 + 바이올렛 메인 보조 = 노랑 잔류 강하게 중화하면서 한색 발색.
   · **컨트롤컬러** = 표면 가미 (3가지 역할 — 디자이너 선택)
     A. 보색중화 보조 / B. 같은 계열 가미 / C. 채도 강화
   · **어두운 톤 메인** = 색감 + 농도 + 잔류 흡수 동시
     [P] (3) 어두운 톤은 염료+브라운 농도 가장 큼. 브라운 베이스가 잔류 노랑·주황 자체 흡수 → 보색 보조 약해도 깊이감+중화 동시 확보. 단 비비드 타겟엔 부적합.

[작동 케이스 — 무게감·채도별]

| 타겟 | 메인 | 보색 처리 | CC 역할 |
|---|---|---|---|
| 어두운 한색 (스모키·다크 매트) | 어두운 톤 메인 | 자동 동반 (브라운 베이스) | (필요시) 같은 계열 가미 |
| 일반 한색 (16레벨 채도 중간) | 중명도 한색 메인 | 보색 CC 소량 | (선택) 미세 가미 |
| 비비드 한색 (채도 살아있음) | 중명도 한색 메인 | 중명도 보색 메인 보조 | 채도 강화 |

| 극파스텔/백모 (잔류 부재) | 밝은 톤 메인 + 클리어 | CC 극소량 | 농도 낮춤 |

■ [M6] 색감 우세도 → 메인 재료 매핑 법칙

법칙: 사진의 메인 색감(1차 분석 표기 + K4 관찰 종합)이 메인 재료 결정. 부가 뉘앙스는 보조 또는 보색 처리.

★ 메인 재료 결정용. 베이스 레벨 결정에 사용 금지([M4] 위반). 베이스 레벨은 K4 4축 관찰로만.

[a] 우세도 판정

(분석 결과 있을 때) color_name_ko 표기 규약:
"메인 색감 + 부가 뉘앙스" 순서. + 앞이 메인, + 뒤가 부가.
- "베이지 베이스 + 잿빛 뉘앙스" → 베이지 메인, 잿빛 부가
- "잿빛 베이스 + 핑크기 소량" → 잿빛 메인, 핑크기 부가

(분석 없거나 어긋날 때) 사진 K4 관찰로 직접 판정. 어긋나면 reasoning에 명시.

부가 뉘앙스 키워드("뉘앙스/소량/미세/은은한") = 보조 재료로만 처리. 메인 격상 금지.

══════════════════════════════
[K1] 베이스 축 — 공정 5단계
══════════════════════════════

■ ★★ 추론 골격 (최상위) — 희망색 = 언더톤 × 틴트
- 화면의 결과색은 "베이스에 깔린 잔류(언더톤)" 와 "그 위에 얹는 염료(틴트)" 의 곱이다. 둘 중 하나만 보면 틀린다.
  · 언더톤 = 못 고름. 탈색 단계가 정함(아래 멜라닌 순서). 명도 숫자(염료 농도)는 이 언더톤 깊이가 정한다(깊을수록 낮은 숫자=강중화).
  · 틴트 = 고름. 목표 발색을 내는 메인 재료 + 보색 방향. 디자이너 의도.
- 추론 사슬(이 순서 고정):
    ① 메인 색감 판정(희망색=원하는 발색) → ② 도달 언더톤(이 색 내려면 몇 레벨까지 빼나) → ③ 그 언더톤 조건(깔린 잔류=빨강/주황/노랑/없음)
    → ④ 색감·명도 선택(틴트=메인재료+보색방향 / 명도숫자=③ 언더톤 깊이) → ⑤(2층 코드)회사 넘버 변환 → ⑥ 레시피 3가지 나열.
- ★ 중화만 하면 깨끗한 베이스로 끝난다. 희망색(틴트)이 반드시 그 위에 얹혀야 한다. "언더톤 처리(②③명도·보색)" 와 "목표 발색(①④틴트)" 둘 다 출력에 들어가야 함.

■ 탈색 순서 = 멜라닌 분해 순서
검정(버진) → 적갈색(12~13) → 주황(14) → 노랑(16) → 연노랑·아이보리(18) → 백모(부재)

■ 공정 5단계 (라벨 고정)

1·2번은 모두 "탈색 0회"지만 [M2] 시간축으로 갈라짐.

1. **버진모 고명도 테크닉 (탈색 없이 시술)**
   - 13·15레벨 + CC + 9%/12% 1스텝
   - 시간축 경쟁 → 한색 브라운 수렴, 가벼운 가미

2. **고명도 리프팅 후 재염색 (12~13레벨 · 적갈색~주황기 잔류)**
   - 1차: 13·15레벨 + 9%/12% / 2차: 중명도 염모제 + CC. 2스텝
   - 시간축 분리 → 선명 발색

3. **14레벨 (황갈 브라운 · 멜라닌 따라 갈림 — 탈색 1회 아님. 탈색하면 15↑, 리프팅 후 밴드)**
   - 단정 금지: 중립~황색 멜라닌 브라운(주황 적음) / 주황기 도는 브라운. 노랑 거의 없음 → 노랑·바이올렛은 16부터.
   - 한색 강도 매칭: 애쉬·블루는 같은 주황-보색 축, 강도 차이. 미세 잿빛(브라운 자산 위)→애쉬(애쉬브라운), 진한 잿빛·스모키→블루, 그 사이→애쉬+블루 소량. "잿빛 보이면 무조건 블루" 금지.
   - 과중화 원리: 잔류 약한데 보색 세게=탁해짐. 주황 적으면 애쉬, 더 돌면 블루 10%미만. 강도는 디자이너 선택으로 설명에 나열.
4. **탈색 2회 이상 (16레벨 · 노랑기 잔류)**
5. **탈색 3회 이상 (18레벨 · 연노랑~아이보리 · 잔류 거의 없음)**

■ 레벨별 3영역 ([M1] 강도 매칭의 영역 분기)

- **중화 영역 — 14~16레벨 (잔류 강)**
  · [M1] 잔류 강 → 보색 강 → 보색 메인 + 보색 CC
  · 16레벨 비비드·파스텔: 파워 그대로 (클리어 희석 금지 — K3 결정 트리)

- **색 조합 영역 — 18레벨 연노랑~아이보리 (잔류 약)**
  · [M1] 잔류 약 → 보색 약 → CC 가미 또는 생략
  · 바이올렛·블루는 "중화"가 아니라 "색 조합"으로 호출

- **체인지 영역 — 18레벨 미색·백모 (부재)**
  · [M1] 부재 → 보색 극소량 + 클리어 다량 희석
  · "색 얹기"가 아니라 "뉘앙스 체인지"
  · 판정 신호: 염료 무게감 없는 미색·크리미·밀키 지배

■ 명도 표기 규칙 (레벨 직접)
- 재료에 레벨을 직접 붙여 표기: "11레벨 ○○ 염모제" / "9레벨 ○○ 염모제" 등
- 18레벨·백모 = 높은 레벨(11·13, 염료 적음)
- 버진모 1단계 리프팅 = "13·15레벨 ○○ 염모제 (리프팅용)" + 9%/12%
- CC에 레벨 접두사 없음 (CC는 레벨 개념 없는 표면 직접염료)


══════════════════════════════
[K2] 동양인 모발 원리 — 적색 멜라닌
══════════════════════════════

■ 한색 vs 난색 비대칭

한색 염료(애쉬·블루·바이올렛) ↔ 적색 멜라닌: 보색 → 흡수·소진 → 충분히 깨야 표현
난색 염료(레드·핑크·레드바이올렛) ↔ 적색 멜라닌: 같은 계열 → 협업 → 버진모도 표현

■ 버진모 한색 시술

[작동] 애쉬 염모제 + 블루 CC → 쿨/매트브라운 수렴 (라벤더·실버·백금발 아님)
[비작동] 회갈빛브라운 + 한색 단독 (보색 기능 없음 → 적색 억제 불가 → 탁한 브라운)
[비작동] 라벤더·실버·백금발 (적색 멜라닌이 흡수 → 탈색 필수 가이드)

■ 버진모 난색 시술

[작동] 레드바이올렛·레드·핑크 + 회갈빛브라운. 적색 멜라닌과 협업 → 깊은 발색.

■ 저공정 2경로 (브라운·주황 잔류 활용)

(a) **12~13레벨 리프트 후 2차 착색** (= K1 2번)
   - 시간축 분리 = 선명 발색
   - 1차: 13·15레벨로 적갈색~주황 베이스 / 2차: 중명도 + 보색 비율 조절
   - 결과: 선명, 무게감

(b) **버진모 고명도 1단계** (= K1 1번)
   - 시간축 경쟁 = 가볍게
   - 13·15레벨 + CC + 9%/12% 1회
   - 결과: 가볍게 가미, 반사빛 빠름

■ 저공정 보색 옵션 (버진모·12~13레벨 한정)

원리: 적색 자산 강한 저공정에서는 카키류·그린 CC 호출해도 올리브 변질 위험 낮음.

[기본 — 잿빛 강·무게감] 애쉬 염모제 + 블루 CC 소량
[옵션 — 잿빛 약·청초·투명빛] 짝 중 하나 선택 (동시 호출 금지):
  A. 카키빛애쉬 메인 + 애쉬 CC 소량
  B. 애쉬 메인 + 그린 CC 소량

★ 14레벨 = 옵션 A·B 비활성. 적색 자산 빠진 + 그린 = 올리브 변질 위험. [기본] 단일.

■ 애쉬 + 적색 멜라닌 자연 반응

원리: 애쉬가 주황 잔류 중화 중 적색 일부와 만나 부산물로 보라빛 살짝 발현. 모질 차이 결과물 — **추가 계열 신호 아님**.

해석 분기 ([M6][a] 부가 뉘앙스 처리와 연결):
- **미세·부분·뉘앙스 ([M6] 부가)**: 애쉬로 해결. 난색(레드바이올렛·바이올렛·핑크) 추가 금지. 추가 시 자연+인공 = 보라기 폭발.
- **전체 색감 지배 ([M6] 메인)**: 그때만 바이올렛·레드바이올렛 추가.

★ 블루로 보라기·로즈빛 유도 금지. 블루는 주황의 보색이지 보라 경로 아님.

■ 딥 난색 테크닉 (3성분 필수)

원리: 깊이·보라빛·채도가 동시에 지배적인 난색 타겟은 단일·2성분으로 평범한 와인·로즈로 수렴.

[작동 — 리프팅 후 재염색 권장]
- 깊은 보라빛 와인: 레드바이올렛 + 레드 CC + 바이올렛 CC (바이올렛 CC가 보라·깊이 담당)
- 깊은 체리 와인·딥레드: 레드 + 레드 CC + 블루 CC 소량 (블루 CC가 적갈색 잔류 억제)

[비작동] 탈색 1회 이상 = 적색 자산 소실 → 평범한 레드 수렴.


══════════════════════════════
[K3] 보색 + 클리어 — 강도 매칭의 적용
══════════════════════════════

■ 보색 공식 (절대 규칙)
- 노랑 잔류 → **바이올렛**
- 주황 잔류 → **블루**
- 빨강 잔류 → **그린**

■ ★ 보색의 2채널 위계 (누가 중화하나 — 보색 공식보다 먼저 판단)
원리: 보색 중화는 두 채널로 일어난다. 어느 채널인지 먼저 가른 뒤 공식을 적용한다.
  ① 1차 = 메인 재료 자체 부염료 (틴트 안에 보색이 내장된 "완성형" 재료):
     · 난색 웜베이지(PM·Qua.B) = 핑크+소량 애쉬(한색) 내장 → 노랑을 자체로 먹는다.
     · 베이지코튼(BC) = 미세 보라 내장 → 노랑을 자체로 먹는다.
     → 이 재료가 메인이면 보색 CC를 반사적으로 추가하지 않는다. 핑크 등 "같은 계열" CC 가미는 용인(틴트 강화), 보색(바이올렛) 중첩은 과중화·탁([M1]).
  ② 2차 = 컨트롤컬러 — ①의 자체 부염료가 노랑에 소진되고도 "다른 잔여색이 여전히 선명하게" 남을 때만 보조로 호출.
  ★ NB·CB(난색브라운)는 그 자체가 따뜻한 브라운 발색 → 노랑/주황을 "중화 대상"이 아니라 목표색의 일부로 살린다. 보색(바이올렛·블루) 넣지 마라 — 채우기(난색)와 중화(보색)는 반대 동작이라 충돌하면 적갈빛으로 탁해진다(난색이 더해져 상쇄 안 됨). 예: 빈티지 오렌지 = NB + 오렌지 CC 소량이지 바이올렛 아님.
  ★ 색파워 원리: 주황·적색·노랑을 "중화"하려면 반대색(블루·그린·바이올렛)을 넣는다 — 브라운은 중화제가 아니다(난색이라 더해져 적갈로 탁). 브라운은 그 색으로 "채우는" 용도지 중화 용도가 아니다.
  → 갈림: 노랑/주황이 (a) 없앨 잔류냐 → 보색 CC. (b) 목표색의 일부(따뜻하게 갈 때)냐 → 보색 X, 그 색으로 채움. PM/BC는 보색 내장이라 어차피 바이올렛 X, NB/CB는 따뜻하게 채우는 거라 바이올렛 X. "16레벨 노랑이니 무조건 바이올렛"은 금지.


■ 보색 적용 영역 (K1 3영역 + [M1] 매칭)

| 영역 | 잔류 | 보색 | 형식 |
|---|---|---|---|
| 중화 영역 (14~16) | 강 | 강 | 보색 메인 염모제 + 보색 CC |
| 색 조합 영역 (18) | 약 | 약 | CC 가미 |
| 체인지 영역 (18 미색·백모) | 부재 | 극소 | CC 극소량 + 클리어 다량 |

■ 보색 강도 매칭
- 잔류 강 → 보색 메인 염모제 + CC
- 잔류 약 → CC만 소량
- 2종 잔류 (주황+노랑) → 주 잔류 보색 메인 + 부 잔류 보색 소량 병용

→ 엉뚱한 보색 (노랑에 블루, 주황에 바이올렛) = 변질.

■ 잔류 불확실성 헤지 룰 — 한색·난색 비대칭

[한색 메인 — CC 헤지 권장]
원리: 한색은 적색·잔류와 충돌 → 흡수·소진 → 농도 부족 위험.
- 14레벨 + 어두운 한색 (스모키·다크 매트) → 같은 계열 CC 소량 보강 권장
  · 어두운 톤의 블루 + 애쉬 + 블루 CC 소량
  · 어두운 톤의 카키 + 그린 CC 소량
- 16레벨 + 어두운 한색 → CC 보강 선택사항
- 18레벨 한색 → CC 추가 = [M1] 위반 (잔류 약 + 강보색 = 폭발). 비활성.

[난색 메인 — CC 헤지 비권장 ⚠️]
원리: 난색은 적색과 협업 → 메인만 충분 → 같은 계열 CC 추가 = 시뻘게짐.
- 14·16레벨 + 어두운 난색 → 같은 계열 CC 헤지 금지
- 단 [K2] 딥 난색 3성분의 보색 CC(블루·그린)는 별개 — 깊이감·채도 강화

[중성 메인]
- 회갈빛브라운 메인 → 보색 CC 처리만. 같은 계열 CC 금지.
- 바이올렛 메인 → 바이올렛 이중 성격 룰 우선.

→ 헤지는 "한색 메인 + 14·16레벨 + 어두운/딥/스모키" 동시 매칭 시만. 다른 케이스 비활성.

■ 바이올렛의 이중 성격

원리: 바이올렛은 색상환적으로 중성색이지만, 동양인 모발 맥락에서는 [M3]에 의해 난색으로 기울어진 중성색.

**작동 조건 — "노랑 없으면 중화 없음":**

작동 (노랑 잔류 있음):
- 16·18레벨: 중화 작동 → 뉴트럴 수렴

비작동 (주황·적색 잔류 = 난색 발색 위험):
- 14레벨: 호출 X. 주 보색 = 블루.
- 12~13레벨 2차 착색: 적색 만나 난색 발색
- 버진모: 적색 만나 난색 발색

**예외 — 1스텝 리프팅 중 혼합 중화:**
산화제 9%/12%가 노랑기까지 리프팅하는 중간에 함께 투입된 바이올렛이 노랑 생성 순간 중화. 시간축 맞물림.
→ 버진모 1스텝·12~13 리프팅 1차: 바이올렛 허용.
→ 12~13 2차 착색: 바이올렛 금지.

■ 변질 경로

| 잔류 | 단독 재료 | 결과 |
|---|---|---|
| 노랑 | 블루 | 카키·그린 (순수 잿빛 타겟이면 변질, 청초 타겟이면 활용) |
| 노랑 | 애쉬 | 매트·올리브 (어두운 염모제일수록 매트 강) |
| 노랑 | 레드 | 채도 낮은 주황·코퍼 |
| 주황 | 애쉬 | 탁한 쿨브라운 (보색 보강 필요) |
| 적색 | 애쉬 | 보라기·로즈 (자연 부산물 — 미세면 허용, 지배면 계열 추가) |

★ 부가 앵커 — 동양인 모발 적색 멜라닌 활용:
1~14레벨 모발은 적색~주황 멜라닌이 부분적으로 존재한다.
이 잔류·자산이 한색·매트 보색(블루·애쉬·그린)의 흡수·완충재 역할을 하므로,
적절한 영역에서 한색·매트 도구를 메인 또는 보색으로 활용 가능하다.
- 메인 활용: 애쉬·블루·카키·카키빛애쉬 염모제 (베이스 잔류 + 자산이 베이스 톤 자체 제공)
- 보색 활용: 블루·그린 컨트롤컬러 (잔류 종류와 메인 채널 매칭)

★ 주황 잔류 보색 선택은 메인 색감의 채널을 따른다:
잿빛·쿨 메인 → 블루(주황의 강보색) / 카키·매트·올리브 메인 → 그린(적색의 강보색이 주황도 함께 흡수)
★ 단 부가 뉘앙스에 다른 채널이 동급으로 살아있으면 부가 채널 보색을 소량 추가 가능
(예: 잿빛 메인 + 카키 부가 + 윤기·투명감 → 블루 + 그린 소량 협업).

■ 보색·브라운 사용 차원 분리

원리: 같은 노랑 잔류에서도 결과 색감 방향이 다르다.
- 바이올렛(보색): 노랑 중화 + 한색 강화 → 보라·라벤더·잿빛 방향
- 회갈빛브라운(브라운): 노랑 위에 브라운 덮음 → 베이지 무채화

같은 노랑 영역(16·18·백모)이라도:
- 한색 타겟(잿빛·애쉬·라벤더 우세) → 바이올렛 + 한색 메인
- 베이지 타겟(베이지·밀크·크리미 우세) → 회갈빛브라운 메인

베이지 타겟에 "애쉬 + 바이올렛" 우회 = 잿빛 방향, 베이지 안 나옴.
잿빛 타겟에 "회갈빛브라운 + 한색" 우회 = 베이지 섞인 톤, 깨끗한 잿빛 안 나옴.

★ 두 도구 동시 호출 = 색상 두 번 죽임 = 잿빛 깊이 사라짐.

■ 자연 멜라닌은 베이스 톤 (저공정 한색 시술)

원리: 저공정(버진모·12~13·14)에서는 자연 멜라닌이 살아있어 베이스 톤 자체 제공.

이 영역에서 한색 메인이 적색 멜라닌을 억제하면, 자연 멜라닌이 베이스로 남아 "잿빛 브라운"·"애쉬 브라운" 자연 구현.

이 영역에서 회갈빛브라운 호출 = 톤 이중 쌓임 = 탁함. 적갈색·주황 잔류가 강해 회갈빛브라운의 노랑 덮기 효과 못 잡음 → 잔류 노출.

→ 회갈빛브라운은 "자연 멜라닌이 빠진 빈 캔버스 + 베이지 타겟"에서만 호출.
   고공정(16·18·백모) + 베이지 타겟이 진짜 호출 영역.

★ 저공정의 "차분한 브라운 + 균일한 잿빛" = 자연 멜라닌 + 한색 메인 결과.
   사진의 균일성·차분함으로 회갈빛브라운 호출 추론 = 무효.

■ 클리어 희석 — 단일 결정 트리

원리: 클리어 = 염료 없는 염모제. "클리어 희석" = 염료 총량 줄임. CC는 리프팅 못 함.

★ 결정 순서:

질문 1: 베이스 영역?
- 백모·미색 (체인지 영역) → 클리어 무조건 포함 (다량)
- 18레벨 (K1 5번 · 색 조합 영역) → 클리어 무조건 포함 (다량, 모든 색감 동일)
- 14·16레벨 (중화 영역) → 클리어 금지 (보색에 파워 소진)
- 12~13레벨 / 버진모 → 클리어 금지 (잔류 활용)

원리: K1 5번 = 파스텔·극저채도 영역. 18레벨 흡수력 폭발 → 풀파워 = 무게감 폭발.

이 트리만 따른다.

| 무게감 있음 + 브라운 수렴 | 버진모 또는 저탈색 (K1 1·2번) |
| 무게감 없음 + 채도 있는 발색 | 16레벨 (중화 영역 비비드·파스텔) |
| 무게감 없음 + 채도 없는 맑은 가벼움 | 18레벨 (색 조합 영역) |

■ 관찰 2축 — 투명감 원인 판별

[자연 브라운 윤기·빛반사] = 18레벨 신호 X. 무게감 있으면 윤기 투명감.
[염료 부재] = 18레벨 신호. 무게감 없음과 동반.
→ 헷갈리면 1축 우선.

■ 관찰 3축 — 보색중화 흔적

- **탁함·수렴된 브라운·무거움** = 중화 많이 들어간 저탈색
- **투명감·선명함·맑음 살아있음**:
  · 잔류 적은 고탈색(16·18): 보색 거의 안 들어감 → 청초·투명
  · 저공정 청초(버진모·12~13 카키 리프팅 + 애쉬, 또는 애쉬 + 그린 CC): 적색 자산 활용
  · 분기: 무게감·윤기 함께 = 저공정 청초 / 무게감 없음 = 고탈색

→ "투명 네이비"는 14레벨 불가 (탁한 스모키로 귀결).

■ 관찰 4축 — 메인 색감 + 부가 뉘앙스 분리 ([M6] 입력)

1) 가장 면적·명도·채도 지배 색감 = 메인
2) 부분적·미세 뉘앙스 = 부가
3) 1차 분석 표기와 자체 관찰 비교
4) 어긋나면 사진 자체 우선 + reasoning에 명시

자주 잘못되는 지점: 미세한 보라기/핑크기/잿빛을 메인으로 격상 → [K2] 자연 반응 게이트로 차단.

  function mapRecipe(abstract, brandKey){

  function mapLLMRecipes(abstract, brandKey){
    var out = [], seen = {}, usedCodes = {};
    var paths = (abstract && abstract.paths && abstract.paths.length) ? abstract.paths
              : [{label:"권장", desc:"", recipe:(abstract&&abstract.recipe)||[]}];
    paths.slice(0,2).forEach(function(p, i){
      var absP = { base:abstract.base, chroma:abstract.chroma, weight:abstract.weight, recipe:p.recipe||[] };
      var mapped = mapRecipe(absP, brandKey);
      if(!mapped.some(function(m){return !m.missing;})) return;   // 전부 비면 버림
      // ★ 대안(2번째 이후) 경로가 앞 경로에서 쓴 염모제(메인·보조)를 재사용하면 버림 — 진짜 다른 길만

        if(reuse) return;
      }
      var sig = recipeSig(mapped);
      if(seen[sig]) return;
      seen[sig] = true;
      mapped.forEach(function(m){ if((m.role==="main"||m.role==="sub") && m.code) usedCodes[m.code]=true; });
      out.push({ label:p.label || (i===0?"권장":"대안"), meta:p.desc||"", base:abstract.base, chroma:abstract.chroma, mapped:mapped });
    });

  function detectDye(s){
    if(/회갈빛\s*브라운/.test(s)) return "beige_brown";
    if(/난색\s*웜?\s*베이지|웜\s*베이지|핑크\s*가미|핑크\s*베이지/.test(s)) return "warm_beige";
    if(/플럼/.test(s)) return "warm_beige";
    if(/카키빛\s*애쉬/.test(s)) return "khaki_ash";
    if(/레드바이올렛/.test(s)) return "red_violet";
    if(/카키/.test(s)) return "khaki_ash";
    if(/애쉬/.test(s)) return "ash";
    if(/블루/.test(s)) return "blue";
    if(/바이올렛|보라/.test(s)) return "violet";
    if(/핑크/.test(s)) return "pink";
    if(/와인|레드/.test(s)) return "red";
    if(/그린/.test(s)) return "green";
    if(/오렌지|구리|앰버|코퍼|캐러멜/.test(s)) return "orange";
    if(/옐로우|허니|골드|황금/.test(s)) return "yellow";
    if(/브라운|자연갈|베이지/.test(s)) return "brown_canvas";
    return null;
  }

    if(/비비드|선명|채도\s*높/.test(j)) return "vivid";
    if(/파스텔|뽀얀|연한|밀키|크리미|미색/.test(j)) return "pastel";
    return "mid";
  }

  var FAMILY_KEYS = {ash:1,ash_violet:1,blue:1,violet:1,beige_brown:1,warm_beige:1,brown_canvas:1,
                     khaki_ash:1,red_violet:1,red:1,pink:1,green:1,orange:1,yellow:1,
                     // 결(텍스처) 키 — LLM이 직접 결을 골라 다양한 레시피를 낼 수 있게
                     ash_silver:1,ash_violet_tint:1,ash_lavender:1,blue_ash:1,blue_smoky:1,blue_black:1,
                     violet_pure:1,violet_ash:1,brown_matte:1,warm_beige_sheer:1,warm_beige_rich:1};

  /* ── 1순위: 구조화 slots → recipe (정규식 0, 환각 0) ── */
  function slotsToRecipe(slots){
    if(!Array.isArray(slots)) return null;
    var recipe=[], mainSeen=false;
    slots.forEach(function(s){
      if(!s || typeof s!=="object") return;
      var role = s.role;
      if(role==="oxidizer") return;                       // 산화제는 프론트가 별도 처리, 매핑 제외
      if(role==="clear"){ recipe.push({role:"clear", dye:null, ratio:s.ratio||"sub", roleLabel:s.roleLabel||null}); return; }
      var fam = s.family;
      if(!fam || !FAMILY_KEYS[fam]) return;               // 미지 계열 = 버림(억지 매핑 안 함)
      if(role!=="main" && role!=="sub" && role!=="cc"){    // role 누락 시 등장순으로 추정
        role = mainSeen ? "sub" : "main";
      }
      var lvl = (typeof s.level==="number") ? s.level : null;
      var item = { role:role, dye:fam, nuance:s.nuance||null,
                   roleLabel: s.roleLabel||null,
                   depth: s.depth||null,
                   llmLevel:null,
                   ratio: s.ratio || (role==="cc"?"small":(mainSeen?"sub":"main")),
                   is_main_color: (role==="main") };
      if(role==="main"||role==="sub") mainSeen=true;
      recipe.push(item);
    });
    return recipe;
  }

  /* ── 폴백: 옛 자유문자열 materials → recipe (구버전 출력 호환) ── */
  function materialsToRecipe(mats){
    var recipe=[], mainSeen=false;
    (mats||[]).forEach(function(m){
      if(typeof m!=="string") return;
      if(/산화제/.test(m)) return;
      if(/리프팅용|13·15레벨/.test(m) && !detectDye(m)) return;
      var role = /클리어/.test(m) ? "clear" : (/컨트롤컬러|컨트롤러|\bCC\b/.test(m) ? "cc" : (mainSeen?"sub":"main"));
      if(role==="clear"){ recipe.push({role:"clear",dye:null,ratio:"sub"}); return; }
      var dye = detectDye(m); if(!dye) return;
      var w = detectWeight(m);
      var lvMatch = m.match(/(\d{1,2})\s*레벨/);
      var llmLevel = lvMatch ? parseInt(lvMatch[1],10) : null;
      var item = { role:role, dye:dye, nuance:null, llmLevel:llmLevel,
        ratio: role==="cc"?"small":(mainSeen?"sub":"main"), is_main_color:(role==="main"&&!mainSeen) };
      if(w) item.weight=w;
      if(role!=="cc" && !mainSeen) mainSeen=true;
      recipe.push(item);
    });
    return recipe;
  }

  // slots 우선, 없으면 materials 폴백
  function blockToRecipe(block){
    if(!block) return [];
    var r = slotsToRecipe(block.slots);
    if(r && r.length) return r;
    return materialsToRecipe(block.materials);
  }

  function mapHedge(abstract, brandKey){
    var h = abstract && abstract.hedge; if(!h) return null;
    var lineMap = LINE_OF[brandKey], dict = BRANDS[brandKey];
    var lineKey = (abstract.chroma==="vivid")?lineMap.vivid:lineMap.other;
    var items = (h.add||[]).map(function(a){
      var fam = a && a.family;
      var obj = (fam && FAMILY_KEYS[fam]) ? resolveFine(brandKey, fam, lineKey, lineMap) : null;
      if(!obj && fam){
        var dp = dict.dye[fam];
        if(dp){ var k = dp[lineKey] ? lineKey : Object.keys(dp).filter(function(x){return x!=="CC";})[0];
                var arr = dp[k]; if(arr && arr.length) obj = arr[0]; }
      }
      return { code: obj?obj.code:null, name: obj?obj.name:null, family:fam, note:(a&&a.note)||"" };
    }).filter(function(x){ return x.code; });
    if(!items.length) return null;
    return { when:(h.when||""), how:(h.how||""), items:items };
  }

  function v1ToAbstract(raw, analysis){
    if(!raw) return null;
    var base = raw.base || "lv16";
    if(base==="lv12_lift") base = "lv14";   // ★ 12~13 리프팅 후는 14레벨 브라운 밴드로 합침
    var VALID_CH = {vivid:1,mid:1,pastel:1};
    var chroma = (raw.chroma && VALID_CH[raw.chroma]) ? raw.chroma : detectChroma(analysis);
    var chromaFromLLM = !!(raw.chroma && VALID_CH[raw.chroma]);

    var VALID_W = {light:1,mid:1,dark:1};
    var weight = (raw.weight && VALID_W[raw.weight]) ? raw.weight : (function(){
      if(chroma==="pastel") return "light";
      if(chroma==="vivid") return "dark";
      return "mid";
    })();
    var weightFromLLM = !!(raw.weight && VALID_W[raw.weight]);

    // ★ LLM이 사고해서 뱉은 레시피 경로들 (recipes 배열). 옛 출력(main 단독) 호환.
    var blocks = [];
    if(Array.isArray(raw.recipes) && raw.recipes.length) blocks = raw.recipes;
    else if(raw.main) blocks = [Object.assign({label:"권장"}, raw.main)];
    var paths = blocks.slice(0,2).map(function(b, i){
      var recipe = blockToRecipe(b);
      // 파스텔 클리어 자동 동반 (자체 시어약 메인이면 제외)
      var hasSelfSheer = recipe.some(function(it){ return it.dye==="warm_beige_sheer" || it.dye==="warm_beige_rich" || it.dye==="warm_beige"; });
      if(chroma==="pastel" && !hasSelfSheer && !recipe.some(function(it){return it.role==="clear";})){
        recipe.push({role:"clear", dye:null, ratio:"sub"});
      }
      return { label: b.label || (i===0?"권장":"대안"), desc: b.desc||"", recipe: recipe };
    }).filter(function(p){ return p.recipe && p.recipe.length; });

    // ★ 노랑 황갈 갈래 (recipes_y) — 주황 paths와 같은 방식
    var blocksY = Array.isArray(raw.recipes_y) ? raw.recipes_y : [];
    var pathsY = blocksY.slice(0,2).map(function(b, i){
      var recipe = blockToRecipe(b);
      if(chroma==="pastel" && !recipe.some(function(it){return it.role==="clear";})) recipe.push({role:"clear", dye:null, ratio:"sub"});
      return { label: b.label || (i===0?"권장":"대안"), desc: b.desc||"", recipe: recipe };
    }).filter(function(p){ return p.recipe && p.recipe.length; });

    return { case:raw.case, base:base, chroma:chroma, weight:weight,
             paths:paths, pathsY:pathsY, recipe:(paths[0]&&paths[0].recipe)||[],
             _inferred:true, chromaFromLLM:chromaFromLLM, weightFromLLM:weightFromLLM };
  }

   userContent: [{type:"image",source:{media_type,data}}, {type:"text",text}] (기존 형식 유지)

const GEMINI_MODEL = "gemini-3.5-flash";
// 글로벌 Vertex는 서버(/api/review-vertex)에서 OAuth로 붙는다. 브라우저는 그 서버만 호출(키 노출 0, 503 재시도는 서버가 처리).
async function callLLM(_apiKeyIgnored, _modelIgnored, maxTokens, systemText, userContent){
  let res;
  try{
    res = await fetch("/api/review-vertex", {
      method:"POST",
      headers:{ "content-type":"application/json" },
      body: JSON.stringify({ systemText:systemText, userContent:userContent, maxTokens:maxTokens })
    });
  }catch(e){ throw new Error("서버 연결 실패 — Vercel에 배포된 상태에서 접속했는지 확인 ("+(e.message||e)+")"); }
  let data; try{ data = await res.json(); }catch(e){ throw new Error("서버 응답 파싱 실패 (HTTP "+res.status+")"); }
  if(!res.ok) throw new Error(data && data.error ? data.error : ("API "+res.status));
  const txt = data.text || "";
  const finish = data.finishReason;
  if(!txt){
    if(finish==="MAX_TOKENS") throw new Error("응답 잘림(MAX_TOKENS) — maxOutputTokens 부족");
    throw new Error("빈 응답 (차단/출력 없음"+(finish?" · "+finish:"")+")");
  }
  if(finish==="MAX_TOKENS") throw new Error("응답이 토큰 한도에서 잘림(MAX_TOKENS) — maxOutputTokens 올려야 함");
  return txt;
}
// 잘림·래핑에 견디는 JSON 추출: 첫 { 부터 균형 맞는 } 까지 스캔(문자열·이스케이프 인지)
function extractBalancedJSON(s){
  const i = s.indexOf("{"); if(i<0) return null;
  let depth=0, inStr=false, esc=false;
  for(let k=i;k<s.length;k++){
    const c=s[k];
    if(inStr){ if(esc){esc=false;} else if(c==="\\"){esc=true;} else if(c==='"'){inStr=false;} continue; }
    if(c==='"'){ inStr=true; continue; }
    if(c==="{") depth++;
    else if(c==="}"){ depth--; if(depth===0) return s.slice(i,k+1); }
  }
  return null; // 닫는 } 못 찾음 = 잘림
}
function parseJSON(txt){
  txt = (txt||"").replace(/\`\`\`json|\`\`\`/g,"").trim();
  const block = extractBalancedJSON(txt);
  if(!block) throw new Error("JSON 파싱 실패 — 응답이 잘렸거나 닫는 괄호 없음(토큰 초과 의심)");
  return JSON.parse(block);
}

/* ── fact package 빌드: N변형 → [확정 사실] 텍스트 ── */
function buildFactPackage(companyName, abstract, variants){
  const BASE = {virgin:"버진모",lv12_lift:"12~13레벨",lv14:"14레벨",lv16:"16레벨",lv18:"18레벨",white:"백모"};
  const CH = {vivid:"비비드",mid:"중채도",pastel:"파스텔"};
  let s = "[확정 사실]\n";
  s += "- 회사: "+companyName+"\n";
  s += "- 도달 베이스(단일 확정): "+(BASE[abstract.base]||abstract.base)+" / 채도: "+(CH[abstract.chroma]||abstract.chroma)+"\n";
  s += "- ★ 언더톤은 이 베이스 하나로 확정. 이 베이스에 도달 못하면 이 색은 안 나온다. 다른 베이스(14·18 등) 분기·장황한 가정 설명 금지. reach_condition 한 문장으로만 도달 전제 명시.\n";
  s += "- 레시피 "+(variants||[]).length+"종 (전부 같은 도달 베이스 위, 같은 희망색에 이르는 다른 길):\n";
  (variants||[]).forEach((v,i)=>{
    const parts=[], traits=[];
    v.mapped.forEach(m=>{
      if(m.missing || m.suppressed) return;
      if(m.role==="clear"){ parts.push("클리어 "+(m.band||"비율조절")); return; }
      if(m.role==="cc"){ parts.push(m.code+" CC"+(m.ratio?" "+m.ratio:"")); return; }
      parts.push((m.level!=null?m.level:"")+m.code+"("+m.name+")");
      if(m.tex) traits.push((m.level!=null?m.level:"")+m.code+" = "+(m.ju?m.ju+" · ":"")+m.tex);
    });
    s += " ["+i+"] "+v.label+" — "+parts.join(" + ")+"\n";
    traits.forEach(t=> s += "      · 재료 성격: "+t+"\n");
  });
  s += "- 재료 성격은 설명용 배경이다(새 약제·단계로 추가 금지, 서술만).\n";
  return s;
}

    const rTxt = await callLLM(ST.apiKey,"",12000,RECIPE_PROMPT,
      [img,{type:"text",text:"이 사진 속 모발 색감을 직접 관찰하여 조색 레시피를 역추론해. JSON 하나만 출력해 (코드블록·설명·인사 금지). 필드: quick_thoughts, reasoning, case(A~E), base(lv14|lv16|lv18|virgin|white — lv12_lift 폐지, 리프팅 후는 lv14), chroma(vivid/mid/pastel 직접 판정), weight(light/mid/dark 직접 판정), display_name(감성 색감명 1개), reach(이 색 도달 전제 1문장 — 최소 어느 언더톤이어야 하는지), recipes, recipes_y, practical_tips. ★ recipes = 네가 사고한 레시피 경로 2개(권장+대안). 각 경로 = {label, slots:[{role,roleLabel,depth,family,ratio,nuance}], desc}. ★★ 사고 흐름에서 두 갈래(예: 주황기로 보면 A결, 노랑기로 보면 B결)를 떠올렸으면 quick_thoughts 메모에만 적지 말고 반드시 recipes 배열에 2개로 구조화해 넣어라 — 1개만 넣는 것은 금지. 한 갈래밖에 정말 없으면 같은 베이스에서 약·결·비율을 달리한 두 번째 길을 반드시 만든다(억지 재탕 말고 실제 대안). ★ family는 결까지 직접 골라라(ash_silver/ash_violet_tint/ash_lavender/blue_ash/blue_smoky/warm_beige_sheer/warm_beige_rich/beige_brown/brown_canvas/khaki_ash 등) — '애쉬'로 뭉뚱그리지 마라. ★ 웜/쿨 매칭은 레벨로 달라진다 — lv14·리프팅(브라운 자산): 엄격(웜이면 웜 결, 쿨이면 쿨 결 메인, 반대 성격 얹으면 탁). lv16 이상·탈색2회+·백모(빈 도화지): 경계 푼다(자산 없어 자유 조합 — 애쉬핑크 같은 웜+쿨 혼합, PM+잿빛, BC+애쉬, 바이올렛+애쉬 다 허용). lv18·탈색3회+ 파스텔은 무제한. ★ 14·리프팅 = 브라운 자산이 곧 베이스. brown_canvas(NB)·beige_brown 같은 브라운 보충을 14에서 얹지 마라(톤 이중 쌓임=탁). 빈 캔버스(16·18·백모)에서만 브라운 보충. ★ recipes(주황)는 반드시 2경로(권장·대안) — 1개 출력 금지, 3개 이상 금지. 같은 베이스 위 다른 길(약·비율·결을 달리). 같은 약 재탕 금지. ★ 절제: 자체완성형(warm_beige_*)은 단독, 보색 더 얹으면 탁. 한 약이 두 색감 머금으면 쪼개지 마라. 딥 난색만 3성분. ★ 14 본질은 주황(노랑은 16부터). cc 슬롯은 보색 계열 키(blue/violet/green/pink). 회사 넘버 금지. ★ recipes_y = base가 lv14면 노랑 황갈 갈래 반드시 2경로(권장·대안, 1개 금지 — recipes와 같은 {label,slots,desc}). 황갈 결 = 잿빛 메인+보라 부(ash_lavender 중심) 또는 맑은 애쉬+보라 소량(ash_silver+violet_pure trace) 조합. 보라 메인 결(violet_ash)은 잿빛 메인에 얹지 마라(결 충돌). lv14 아니면 recipes_y 생략. ★ vivid 유채색(핑크·레드·바이올렛 등)은 본체약(메인)→depth(명도)→채도보강(CC/약)→농도조절(클리어 묽게/딥약 누름) 순서로 쌓아라(핑크=RV+핑크CC+클리어, 블랙커런트=RD+레드CC+블루블랙). ★ 클리어(농도조절)는 거의 18레벨에서만 — 14·16은 클리어 대신 흐린 메인+진한 부 소량. ★ NB·CB(난색브라운) 메인은 따뜻하게 채우는 거라 노랑/주황 보색 CC(바이올렛·블루) 넣지 마라(빈티지 오렌지=NB+오렌지CC). 보색 중화는 반대색으로 — 브라운은 중화제 아님(적갈 탁). ★★ 14레벨 언더톤(base=lv14) = 브라운 베이스 깔린 색감 → 약한 결 단독으론 발색이 택도 없다. recipes(주황)·recipes_y(황갈) 둘 다 반드시 2경로. 경로1 = 고채도·강한 결(ash_lavender 같은 라벤더·청·애쉬 동시 보유 결)을 메인으로 — 진해서 14에 충분, 단독 OK(잔류 세면 보색 CC 붙여도 됨). 경로2 = 약한 잿빛·애쉬 결(blue_ash·ash_silver처럼 애쉬 비중 큰 여린 결)이 메인이면 단독으론 약하니 보색 CC로 채도 보강 필수. ★ 금지: (a) 약한 잿빛·애쉬 결 단독(CC 없이)=발색 약함. (b) CC 단독=직접염료라 산화염모제 반드시 믹스. ★ CC 색은 잔류 보색으로(주황→블루/노랑→바이올렛/빨강→그린). ★ 회사 라인·넘버는 네가 모른다 — 오센틱/기본 같은 라인 말 말고 결 성격(진하기·애쉬 비중)으로만 판단하라(라인 매핑은 2층이 한다). ★ 16·18은 이 14 규칙 없이 2경로 자유."+hint}]);
    ST.raw = parseJSON(rTxt);

    await rerunMapping();   // 2층 매핑 + 설명(호출3)
  }catch(e){
    showErr("실패: "+e.message+(/Failed to fetch|CORS/i.test(e.message)?" — 제미나이 직접 호출이 막혔을 수 있어요. AIza 키가 맞는지·네트워크를 확인하세요.":""));
    setStatus("");
  }finally{ $("runBtn").disabled=false; }
}

/* 회사 토글/최초 — 매핑은 즉시, 설명만 재호출 */
async function rerunMapping(){
  const company = ST.company;
  const companyName = BRANDS[company].name;
  ST.abstract = v1ToAbstract(ST.raw, ST.analysis);
  ST.variants = mapLLMRecipes(ST.abstract, company);   // ★ LLM이 뱉은 경로(최대 2개)를 회사 넘버로 번역만. 코드가 변형 안 지어냄.
  ST.variantsY = (ST.abstract.base==="lv14")
      ? mapLLMRecipes(Object.assign({}, ST.abstract, {paths: ST.abstract.pathsY}), company)   // ★ 황갈 갈래는 14레벨 전용
      : [];
  renderStatic();                 // 넘버는 즉시 렌더
  renderYellow();
  $("results").classList.remove("hide");

  // 설명은 레시피 호출(2번째)의 desc로 이미 받음 — 별도 호출 없음(2호출 구조)
  setStatus("");
}

/* ── 렌더 ── */
const BASE_LABEL={virgin:"버진모",lv12_lift:"12~13레벨",lv14:"14레벨",lv16:"16레벨",lv18:"18레벨",white:"백모"};
const CHROMA_LABEL={vivid:"비비드",mid:"중채도",pastel:"파스텔"};
function numHtml(m, small){
  if(m.missing) return '<span class="q" style="color:var(--bad)">('+(m.dyeLabel||"?")+" 사전 비어있음)</span>";
  var rl = m.roleLabel ? '<span class="rl">'+m.roleLabel+'</span>' : '';
  var body;
  if(m.role==="clear") body='<span class="num'+(small?' alt':'')+'">CLEAR</span><span class="q">'+(m.band||"비율조절")+'</span>';
  else if(m.role==="cc") body='<span class="num'+(small?' alt':'')+'">'+m.code+'</span><span class="q">CC'+(m.ratio?" "+m.ratio:"")+'</span>'+(m.confirmed?'':' <span class="badge">검수</span>');
  else body='<span class="num'+(small?' alt':'')+'">'+(m.level!=null?'<span class="lv">'+m.level+'</span>':'')+m.code+'</span>'+(m.confirmed?'':' <span class="badge">검수</span>');
  return '<span class="pill">'+body+rl+'</span>';
}
function ccColorName(code){ return ({VIOLET:"보라",BLUE:"블루",GREEN:"그린",ASH:"애쉬",PINK:"핑크","BLUE BLACK":"블루블랙"})[code] || code; }
function cleanComp(t){ return String(t||"").replace(/\([^)]*\)/g,"").replace(/[+,/]/g,"·").replace(/\s/g,"").replace(/·+/g,"·").replace(/^·|·$/g,""); }
function compOf(m){
  if(m.missing) return "";
  if(m.role==="clear") return "클리어 · 농도조절";
  if(m.role==="cc") return ccColorName(m.code)+" 컨트롤컬러";
  var parts=[]; var j=cleanComp(m.ju); if(j) parts.push(j);
  var b=cleanComp(m.bu); if(b && b!=="—") parts.push(b);
  return parts.join("·").replace(/·+/g,"·");
}
function renderCompWhy(v){
  var rows = (v.mapped||[]).filter(function(m){return !m.missing && !m.suppressed;}).map(function(m){
    var code = m.role==="clear" ? "CLEAR" : m.code;   // ★ 명도(레벨) 제외 — 위 큰 넘버에 이미 있음
    return '<div class="cRow"><span class="cCode">'+code+'</span><span class="cComp">'+compOf(m)+'</span><span class="cRole">'+(m.roleLabel||"")+'</span></div>';
  }).join("");
  var why = v.meta ? '<div class="why">'+fmtEscape(v.meta)+'</div>' : "";
  return '<div class="exp"><div class="compList">'+rows+'</div>'+why+'</div>';
}
function joinNums(mapped, small){
  const vis = mapped.filter(m=>!m.missing && !m.suppressed);
  return vis.map((m,i)=> (i>0?'<span class="plus">+</span>':'')+numHtml(m,small)).join("");
}
function renderCoToggle(){
  $("cotoggle").innerHTML = Object.keys(BRANDS).map(function(k){
    var b=BRANDS[k];
    return '<button class="cobtn '+(k===ST.company?'on':'')+' '+(b.stub?'stub':'')+'" data-co="'+k+'">'+b.name+(b.stub?' (뼈대)':'')+'</button>';
  }).join("");
}
function renderThoughts(){
  const t = (ST.raw && ST.raw.quick_thoughts) || [];
  $("thoughtsList").innerHTML = t.map(function(line){
    return '<span class="tl">'+String(line||"").replace(/\.+$/,"")+'</span>';
  }).join("");
  $("thoughtsBox").open = true;
}
function renderStatic(){
  const a=ST.analysis;
  renderCoToggle();
  renderThoughts();
  $("frozen").innerHTML='<span class="chk">✓</span><span class="lab">색감분석</span>'
    +'<span class="sw" style="background:'+(a.hex||"#888")+'"></span>'
    +'<span>'+(a.color_name_ko||"")+' · '+(a.tone||"")+'</span>'
    +'<span class="more" onclick="this.closest(\'.frozen\').nextElementSibling.scrollIntoView()">동결</span>';
  // 레시피 카드들 (권장 + 변형들)
  $("interp").innerHTML='<span class="ico"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 3v2m0 14v2M3 12h2m14 0h2M5.6 5.6l1.4 1.4m10 10 1.4 1.4m0-12.8-1.4 1.4m-10 10-1.4 1.4"/></svg></span>'
    +'<p><b>'+((ST.raw&&ST.raw.display_name)||a.color_name_ko||"")+'</b>'+((ST.raw&&ST.raw.reach)?' — '+ST.raw.reach:'')+'</p>';
  $("recCards").innerHTML = (ST.variants||[]).map(function(v,i){
    var isMain = i===0;
    var tagLabel = isMain ? "메인 레시피" : v.label;
    return '<div class="rec '+(isMain?'main':'alt')+'" id="var'+i+'">'
      +'<div class="tagrow"><span class="rtag '+(isMain?'main':'alt')+'">'+tagLabel+'</span>'
      +'<span class="rmeta">'+(BASE_LABEL[v.base]||"")+' · '+(CHROMA_LABEL[v.chroma]||"")+'</span></div>'
      +'<div class="nums">'+joinNums(v.mapped, !isMain)+'</div>'
      +renderCompWhy(v)
      +'</div>';
  }).join("");
  // 원본
  $("rawPre").textContent =
    "// 분석\n"+JSON.stringify(ST.analysis,null,2)
    +"\n\n// 레시피(추상)\n"+JSON.stringify({case:ST.raw.case,base:ST.raw.base,recipes:ST.raw.recipes||ST.raw.main,quick_thoughts:ST.raw.quick_thoughts},null,2)
    +"\n\n// 사실패키지(설명 입력)\n"+buildFactPackage(BRANDS[ST.company].name, ST.abstract, ST.variants);
}
function renderYellow(){
  var box = $("hedgeBox"); if(!box) return;
  var vs = ST.variantsY || [];
  if(!vs.length){ box.innerHTML=""; return; }
  var cards = vs.map(function(v,i){
    return '<div class="rec '+(i===0?'main':'alt')+'" id="yvar'+i+'">'
      +'<div class="tagrow"><span class="rtag '+(i===0?'main':'alt')+'">'+(i===0?'황갈 권장':'황갈 대안')+'</span>'
      +'<span class="rmeta">'+(BASE_LABEL[v.base]||"")+' · '+(CHROMA_LABEL[v.chroma]||"")+'</span></div>'
      +'<div class="nums">'+joinNums(v.mapped, i!==0)+'</div>'
      +renderCompWhy(v)
      +'</div>';
  }).join("");
  box.innerHTML = '<div style="border-top:1px solid var(--line);margin-top:16px;padding-top:14px">'
    +'<div style="font-size:13px;color:var(--ink2);line-height:1.7;margin-bottom:10px">14레벨은 주황~노랑 사이의 애매한 브라운 구간입니다. <b style="color:var(--ink)">노랑기가 좀 더 보인다면</b> 아래 황갈 갈래로 진행하세요.</div>'
    +cards
    +'</div>';
}
function renderExplain(){
  const ex=ST.explain||{};
  $("interp").innerHTML='<span class="ico"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 3v2m0 14v2M3 12h2m14 0h2M5.6 5.6l1.4 1.4m10 10 1.4 1.4m0-12.8-1.4 1.4m-10 10-1.4 1.4"/></svg></span>'
    +'<p><b>'+(ex.display_name||"")+'</b> — '+(ex.reach_condition||"")+'</p>';
  const vex = ex.variants || [];
  (ST.variants||[]).forEach(function(v,i){
    const el = document.querySelector('#var'+i+' .explain');
    if(!el) return;
    el.classList.remove("loading");
    const txt = (vex[i] && vex[i].explain) || (i===0 ? (ex.main_explain||"") : "");
    el.innerHTML = fmtEscape(txt);
  });
  $("rawPre").textContent += "\n\n// 설명(출력)\n"+JSON.stringify(ex,null,2);
}
function fmtEscape(t){
  return String(t).replace(/→/g,'<br><span class="esc">→</span>');
}
</script>
