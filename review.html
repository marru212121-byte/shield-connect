<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>애널라이저 검수툴 (데모)</title>
<style>
  :root{
    --bg:#171411; --panel:#211D17; --panel2:#2A251D; --panel3:#332D23; --line:#3C352A;
    --ink:#F3ECDF; --ink2:#B9AC95; --ink3:#827760;
    --brown:#CBA871; --brownd:#8B7355; --accent:#C7F050; --warn:#E8B45A; --bad:#E07A5F; --ok:#9BD17A;
    --r:14px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo",sans-serif;line-height:1.55}
  .wrap{max-width:720px;margin:0 auto;padding:22px 16px 90px}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;letter-spacing:-.3px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent)}
  .brand small{font-weight:400;color:var(--ink3);font-size:12px}
  .ctrls{display:flex;align-items:center;gap:8px}
  input[type=password],select{background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    border-radius:10px;padding:8px 10px;font-size:12.5px;font-family:inherit;outline:none}
  input[type=password]{width:150px;font-family:ui-monospace,monospace}
  input[type=password]:focus,select:focus{border-color:var(--brownd)}
  .keyhint{font-size:10.5px;color:var(--ink3);margin-top:4px;text-align:right}
  .uploader{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);
    border-radius:var(--r);padding:12px;margin-bottom:14px;cursor:pointer;transition:.12s}
  .uploader:hover{border-color:var(--brownd)}
  .uploader.drag{border-color:var(--accent);background:var(--panel2)}
  .uthumb{width:54px;height:54px;border-radius:10px;background:var(--panel3);display:flex;align-items:center;
    justify-content:center;color:var(--ink3);overflow:hidden;flex:0 0 auto}
  .uthumb img{width:100%;height:100%;object-fit:cover}
  .uinfo{flex:1;min-width:0}
  .uinfo .t{font-size:13px;font-weight:600}
  .uinfo .s{font-size:12px;color:var(--ink3);margin-top:2px}
  .btn{appearance:none;border:1px solid var(--brownd);background:var(--brownd);color:#fff;
    border-radius:11px;padding:9px 18px;font-size:13.5px;font-weight:700;cursor:pointer;transition:.12s;flex:0 0 auto}
  .btn:hover{filter:brightness(1.08)} .btn:disabled{opacity:.5;cursor:default}
  .btn.ghost{background:transparent;color:var(--ink2)}
  .status{font-size:12.5px;color:var(--brown);margin:0 2px 14px;min-height:18px;display:flex;align-items:center;gap:7px}
  .spin{width:13px;height:13px;border:2px solid var(--line);border-top-color:var(--brown);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  /* 색감분석 동결 줄 */
  .frozen{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);
    border-radius:11px;padding:9px 12px;margin-bottom:14px;font-size:12.5px;color:var(--ink2)}
  .frozen .chk{color:var(--ok)} .frozen .sw{width:14px;height:14px;border-radius:3px;border:1px solid var(--line)}
  .frozen .lab{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink3)}
  .frozen .more{margin-left:auto;font-size:11px;color:var(--ink3);cursor:pointer}
  /* 회사 토글 */
  .cotoggle{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
  .cobtn{appearance:none;border:1px solid var(--line);background:var(--panel2);color:var(--ink2);
    border-radius:11px;padding:8px 18px;font-size:14px;font-weight:700;cursor:pointer;transition:.12s}
  .cobtn:hover{border-color:var(--brown)}
  .cobtn.on{background:var(--accent);border-color:var(--accent);color:#171411}
  .cobtn.stub{opacity:.6}
  /* 사고흐름 */
  .thoughts{margin-bottom:12px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:10px 12px}
  .thoughts summary{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.4px}
  .thoughts #thoughtsList{margin-top:8px;font-size:12.5px;color:var(--ink2);line-height:1.9}
  .thoughts .tl{display:block}
  .thoughts .tl::before{content:"·";color:var(--brown);margin-right:6px}
  /* 해석 라벨 */
  .interp{display:flex;gap:9px;margin-bottom:14px;padding:0 2px}
  .interp .ico{color:var(--brown);flex:0 0 auto;margin-top:1px}
  .interp p{margin:0;font-size:13.5px;color:var(--ink2);line-height:1.7}
  .interp b{color:var(--ink);font-weight:700}
  /* 레시피 카드 */
  .rec{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px}
  .rec.main{border:2px solid var(--brown)}
  .rec .tagrow{display:flex;align-items:center;gap:8px;margin-bottom:13px}
  .rtag{font-size:10.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:3px 10px;border-radius:7px}
  .rtag.main{background:#3a3115;color:var(--brown)}
  .rtag.alt{background:#2e2a1c;color:var(--warn)}
  .rmeta{font-size:11px;color:var(--ink3)}
  .nums{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:14px}
  .nums .num{font-size:23px;font-weight:800;letter-spacing:-.5px}
  .nums .num.alt{font-size:20px}
  .nums .num .lv{color:var(--brown)}
  .nums .plus{color:var(--ink3);font-size:15px}
  .nums .x{font-size:16px;font-weight:700}
  .nums .q{font-size:12.5px;color:var(--ink3)}
  .explain{font-size:13.5px;color:var(--ink2);line-height:1.7;border-top:1px solid var(--line);padding-top:12px}
  .explain b{color:var(--ink);font-weight:700}
  .explain .gist{color:var(--ink);font-size:14px;margin-bottom:9px;line-height:1.55}
  .explain .pt{margin:4px 0;padding-left:3px;color:var(--ink2)}
  .explain .ln{margin:4px 0}
  .explain .esc{color:var(--ink3);margin-top:5px;font-size:13px}
  .explain.loading{color:var(--ink3);font-style:italic}
  .badge{font-size:9.5px;font-weight:800;background:#3a3115;color:var(--warn);padding:1px 6px;border-radius:5px;letter-spacing:.3px}
  /* 원본 */
  details{margin-top:6px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:10px 12px}
  summary{font-size:11.5px;color:var(--ink3);cursor:pointer;list-style:none}
  summary::-webkit-details-marker{display:none}
  pre{margin:8px 0 0;font-family:ui-monospace,monospace;font-size:11.5px;line-height:1.6;color:var(--ink2);
    white-space:pre-wrap;background:var(--panel3);padding:10px;border-radius:9px;max-height:280px;overflow:auto}
  .err{background:#2c1c18;border:1px solid #5a3328;color:var(--bad);border-radius:11px;padding:11px 13px;font-size:12.5px;margin-bottom:12px}
  .hide{display:none}
  .acts{display:flex;gap:8px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:9px 12px;margin-top:8px}
  .acts .q{font-size:12px;color:var(--ink3)} .acts .btn{padding:6px 13px;font-size:12px;margin-left:auto}
  .acts .btn:not(:last-child){margin-left:0}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand"><span class="dot"></span>애널라이저 검수툴 <small>Vercel · Vertex 글로벌</small></div>
    <div>
      <div class="ctrls">
        <input type="password" id="apiKey" placeholder="(키 불필요 · 서버 처리)" aria-label="API 키" style="display:none">
      </div>
      <div class="keyhint">글로벌 리전(Vertex) · 키는 서버 env · 503 자동 재시도</div>
    </div>
  </div>

  <label class="uploader" id="uploader">
    <input type="file" id="fileInput" accept="image/*" class="hide">
    <div class="uthumb" id="uthumb"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.5-3.5L9 20"/></svg></div>
    <div class="uinfo"><div class="t" id="ufname">사진을 끌어다 놓거나 선택</div><div class="s" id="ufsize">고객이 원하는 최종 색감</div></div>
    <button class="btn" id="runBtn" type="button" disabled>분석 실행</button>
  </label>

  <div class="status" id="status"></div>
  <div class="err hide" id="err"></div>

  <div id="results" class="hide">
    <div class="frozen" id="frozen"></div>
    <div class="cotoggle" id="cotoggle"></div>
    <details class="thoughts" id="thoughtsBox"><summary>사고 흐름</summary><div id="thoughtsList"></div></details>
    <div class="interp" id="interp"></div>
    <div id="recCards"></div>
    <details id="rawBox"><summary>원본 JSON 펼치기 (분석 · 레시피 · 설명 사실패키지)</summary><pre id="rawPre"></pre></details>
    <div class="acts">
      <span class="q">이 두 레시피, 미용 논리에 맞나요?</span>
      <button class="btn ghost" type="button" onclick="alert('데모: 검수 통과 표시는 정식 버전에서 골든셋에 저장됩니다.')">통과</button>
    </div>
  </div>

</div>

<script>
/* ════════════════════════════════════════════════════════════
   프롬프트 (v1에서 그대로 추출 — ANALYSIS / RECIPE) + 설명 전용(신규)
   ════════════════════════════════════════════════════════════ */
const ANALYSIS_PROMPT = `════════════════════════════════════════
■ 최종 출력 (절대 규칙)
════════════════════════════════════════
★★★ 응답은 오직 하나의 JSON 객체. 코드블록·설명·사고과정·인사 절대 금지. ★★★

{
  "color_name_ko": "관찰 서술",
  "tone": "cool" 또는 "warm" 또는 "neutral",
  "hex": "#RRGGBB",
  "elements": ["속성1", "속성2"],
  "description": "색감 묘사 2~3문장"
}

★ 첫 글자 {, 마지막 }.

═════════════════════════════════════════
■ 분석 파트 지시
═════════════════════════════════════════

너는 미용실 헤어 컬러리스트를 위한 모발 색감 관찰 전문가다.
사진 속 모발의 색감을 관찰하여 보이는 대로 기술한다.
★ 전체적인 색감을 먼저 파악하고, 그 다음에 부분 뉘앙스를 본다. 한 부위의 미세 뉘앙스에 과잉 가중 금지.
판단·조색 방향·시술 방법·레시피는 이 파트에서 절대 하지 마라.

■ 관찰 서술 (color_name_ko) — 관찰 서술 형식만 사용:
형식: "[주도 색감] 베이스 + [뉘앙스] [강도]"

★ 표기 규약 — 메인/부가 우세도 표시 (레시피 호출이 [M6][a]에서 활용)
- 단일 메인: "○○ 베이스" (예: "핑크 베이스")
- 메인 + 부가 1개: "○○ 베이스 + ○○ 뉘앙스" (예: "베이지 베이스 + 잿빛 뉘앙스")
- 메인 + 부가 강도: "○○ 베이스 + ○○ 소량" / "○○ 베이스 + ○○ 미세" (예: "잿빛 베이스 + 핑크기 소량")
- 둘 다 우세 (갈래 활성 신호): "○○ 베이스 + ○○ 베이스" (둘 다 "베이스"로 표기)
  · 예: "베이지 베이스 + 애쉬 베이스" → 메인이 동급, 레시피 갈래 활성
  · 명확히 한쪽이 우세하면 "베이스 + 뉘앙스"로 표기

★ 허용 예시:
- "베이지 베이스 + 애쉬 핑크 소량"
- "브라운 베이스 + 잿빛 뉘앙스"
- "브라운 베이스 + 잿빛"
- "애쉬 베이스 + 보라기 소량"
- "브라운 베이스 + 애쉬 뉘앙스"
- "카키 베이스 + 잿빛 뉘앙스"
- "브라운 베이스 + 카키빛"
- "미색 베이스" (뉘앙스 없는 경우)
- "레드 베이스 + 와인빛"

★ 금지 — 해석 레이블 (고유명사화된 색감명):
- "로즈 밀크 베이지", "애쉬 베이지 브라운", "밀크티 베이지"
- "라벤더 애쉬", "쿨 애쉬 브라운", "올리브 애쉬 브라운"

★ 뉘앙스 없으면 "브라운 베이스"처럼 베이스만 기술.
★ 여러 뉘앙스는 "+"로 연결.
★ 강도 표현: "소량", "뉘앙스", "미세" — 지배적이지 않을 때만 덧붙임.
★ 주도 색감은 모발에서 가장 넓은 면적을 차지하는 색. 미세한 뉘앙스 차이는 뉘앙스 표기 또는 elements에 담아라.

■ 색감 요소 (elements) — 사진에서 보이는 속성만 배열에:
"투명감" 빛이 통과하는 맑은 느낌 / "매트함" 광택 없이 뽀얀 질감 / "황금빛" 금빛이 은은하게 / "붉은기" 적색·구리빛·앰버빛 / "주황기" 주황빛 / "잿빛" 회색·재 같은 무채색 / "카키빛" 매트한 녹갈색 / "올리브빛" 노랑+그린이 섞인 채도 낮은 녹색 / "그린빛" 녹색 뉘앙스 / "청보라" 파란기+보라기 / "보라기" 보라·퍼플 / "핑크기" 분홍빛 / "파스텔" 연하고 부드러운 / "비비드" 선명하고 채도 높은 / "깊이감" 밝고 어두운 부분의 입체감 / "윤기" 건강한 광택감

■ 톤 인상 (tone): cool / warm / neutral — 겉으로 보이는 느낌으로만

■ 대표 색상 (hex): 모발 중간 영역의 평균색을 #RRGGBB

■ 색감 묘사 (description) — 사진을 자유롭게 관찰하여 묘사:
모발 색감을 본 그대로 자유 산문으로. 매트·녹갈색·올리브빛·잿빛·카키·붉은기·다크 매트 등 보이는 신호 자유 어휘로.
형식·어휘 제한 없음. 모델 자체 시각 인식 그대로.
레시피 방향·시술 방법·탈색 여부는 언급 금지.

■ 분석 파트 금지 사항:
★ 해석 레이블 (고유명사화된 색감명)
★ 레벨 숫자 표기 ("18레벨", "16레벨" 등) — "매우 밝은", "중간 명도의" 등으로
★ 탈색 여부·시술 방법·염모제 조합 언급
★ 조색 방향 ("한색 계열", "애쉬 베이스" 등) — 레시피 파트 역할
★ 멜라닌·중화·보색 등 이론 용어
★ 헤어스타일/컷 언급, 영어 전문용어`;
const RECIPE_PROMPT = `════════════════════════════════════════
■ 최종 출력 (절대 규칙)
════════════════════════════════════════
★★★ 응답은 오직 하나의 JSON 객체. 코드블록·설명·사고과정·인사 절대 금지. ★★★

{
  "quick_thoughts": ["사고 흐름 요약 5~8줄. 한 줄 8~25자, '...'으로 끝남, 한국어 친근체."],
  "reasoning": "[1] K4 자체 관찰 / [2] STEP1 비교 / [3] K1 역추론 ([1] 신호 인용 의무) / [4] [M6][b] 매핑 (베이지 갈림+회갈빛브라운 자기검증 의무) — 4단계 양식 강제, 자유 산문 금지",
  "case": "A | B | C | D | E",
  "base": "lv14 | lv16 | lv18 | virgin | white",
  "chroma": "vivid | mid | pastel  (타겟 채도: 고채도=vivid / 중채도=mid / 파스텔=pastel. 직접 판정)",
  "weight": "light | mid | dark  (타겟 무게/투명도: 투명·가벼움=light / 중간=mid / 무겁고 진함=dark. 직접 판정)",
  "main": {
    "materials": ["재료1", "재료2", "..."],
    "desc": "결과 색감 1~2문장 서술"
  },
  "alt_branch": null,
  "alt_path": { "base": "...", "materials": [...], "desc": "이 베이스에서 같은 타겟이 어떻게 수렴되는지 1~2문장" },
  "virgin_alt": null,
  "practical_tips": ["실무조언 문장 1", "실무조언 문장 2"]
}

★ 첫 글자 {, 마지막 }.
★ case·base·main 필수. alt_branch / alt_path / virgin_alt는 케이스에 따라 null 가능.
★ 출력 구조의 세부 포맷팅(블록 헤더, b 태그, 라벨 풀네임, 클리어 안내 문구, K5 강제 문구, 재료 계열 병기 등)은 **클라이언트가 자동 처리**한다. 모델은 추론 결과의 핵심 필드만 채우면 된다.

══════════════════════════════════════════════
■ 너의 역할
══════════════════════════════════════════════

너는 15년차 동양인 모발 전문 컬러리스트다.

입력:
- 사진 1장 — 고객이 원하는 최종 색감
- (선택) 1차 분석 결과 — 다른 컬러리스트의 의견으로 간주, 참고용

할 일: 사진을 자체적으로 K4 4축 관찰 후, "이 색감을 동양인 모발에서 만들려면
(1) 어떤 언더톤이 전제되었고 ([K1] 공정 5단계 매핑),

■ [M1] 잔류 ↔ 보색 강도 매칭 법칙 (가장 결정적)

법칙: 잔류 색소 농도와 보색 재료 파워는 비례해야 한다.
→ 잔류 강 + 보색 강 = 정확한 중화
→ 잔류 강 + 보색 약 = 중화 부족, 잔류 노출
→ 잔류 약 + 보색 강 = 과중화, 반대 톤 폭발 (백모에 진바이올렛 → 보라기 폭발)
→ 잔류 약 + 보색 약 = 정확한 중화

왜냐하면: 보색은 잔류를 "덮는" 게 아니라 "상쇄". 1:1로 만나야 뉴트럴 수렴. 비대칭이면 강한 쪽이 노출.

적용:
- 진노랑(16레벨) → 바이올렛 염모제 + 바이올렛 CC
- 주황 잔류 → 블루. 단 14 황갈은 강도 매칭: 주황 약하면 애쉬(브라운 자산 살림), 강하면 블루. 바이올렛 호출 X.
- 연노랑(18레벨) → 바이올렛 CC 소량 또는 핑크 CC 소량
- 부재(백모) → 핑크 CC 극소량 + 클리어 다량 희석

──────────────────────────────

■ [M2] 시간축 분리 법칙 — 리프팅과 색소 안착의 비대칭

법칙: 염색은 리프팅(멜라닌 분해) → 색소 안착의 2단계 시간축. 동시 경쟁하면 염료 손실.

왜냐하면:
1) 산화제 9%/12%가 멜라닌 분해 시작
2) 동시 투입 염료가 분해 중 자리에 안착해야 하는데
3) 멜라닌 미분해 + 적색 멜라닌이 한색 염료 우선 흡수
4) → 염료 소진 → 발색 실패

따라서:
- **버진모 고명도 단독 (1스텝)** = 시간축 경쟁 → 한색 브라운 수렴
  · 블루 단독 → 다크 쿨브라운 / 애쉬 → 매트브라운 / 바이올렛 → 라벤더브라운
  · "탈색 없이 선명 발현 불가"가 이 법칙 직접 결과
- **리프팅 후 재염색 (2스텝)** = 시간축 분리 → 염료 보존 → 선명 발색
  · 1스텝(리프팅): 13·15레벨 + 9%/12%로 14레벨까지 리프트 (착색 X)
  · 2스텝(착색): 일반 명도 염모제로 착색
  ★ 버진모 한 번에(1스텝 단독) 가는 경로는 14레벨 타겟일 때만 나열. 그 이상(16·18)은 탈색 단계 필요.

──────────────────────────────

■ [M3] 적색 멜라닌 비대칭 법칙

법칙: 동양인 모발은 페오멜라닌(적색) 저항으로 한색-난색 시술이 비대칭.

왜냐하면: 유멜라닌은 먼저 분해되지만 페오멜라닌은 끝까지 남음. 한색 염료는 적색 멜라닌과 만나면 흡수·소진. 난색 염료는 같은 계열이라 충돌 없이 발색.

따라서:
- **유리**: 레드브라운·로즈브라운·와인빛 (난색은 버진모도 충분)
- **까다로움**: 밝은 애쉬·베이지·플래티넘 (적색 충분히 깨야)
- **버진모 한색 한계**: 라벤더·실버·백금발 불가. 쿨/매트브라운 수렴이 최선.

──────────────────────────────

■ [M4] 관찰 → 판정 → 재료 사슬 (역방향 시술 금지)

법칙: 사진 신호 → 베이스 판정 → 그 베이스에서 가능한 재료. 역방향(목표 색감명에서 베이스 결정) 금지.

왜냐하면: 같은 색감명도 베이스마다 다르게 발색. "애쉬브라운"은 8·14·16·18레벨 모두 가능.
→ 색감명 → 베이스 매칭은 카탈로그 함정.

──────────────────────────────

■ [M5] 염료 농도 ↔ 무게감 매칭 법칙

법칙: 같은 계열 재료라도 형식(밝은/중명도/어두운 톤, CC)에 따라 농도·무게감이 다름. 타겟 무게감과 매칭.

[a] 형식별 농도·역할 위계 → [P] 팔레트 참조

[b] 타겟 무게감·잔류 → 레벨(중화 강도) 선택
   - 자산 살리며 가볍게 / 잔류 약 → 높은 레벨(11·13, 약중화)
   - 뚜렷한 색감 / 잔류 중간 → 9 (강중화)
   - 깊고 어두운 발색 / 잔류 강 → 5·7 (가장 강한 중화)
   → 단일 레벨 강제 아님. 베이스·잔류 보고 레벨 고르고, 필요하면 믹스([P] 레벨 믹스).

[c] 베이스 영역 × 레벨 매칭 (+ brown 자산 "채움 vs 살림" 분기)
   - 18레벨·백모 (체인지 영역): 높은 레벨(11·13) 필수 — 흡수력 높아 낮은 레벨=폭발
   - 16레벨 (노랑·brown 자산 없음): brown "채움" 필요 → BC/회갈빛브라운/클리어애쉬로 채우며 + 애쉬 가미. 잔류 강도 따라 9~11.
   - 14레벨 (황갈·brown 자산 있음): brown "살림" → 11(약중화)로 자산 미세 상쇄. 잿빛 더 원하면 애쉬 CC 또는 9 소량 살짝.
     ★ 14를 "중명도(9) 강제"하지 않음. 주황 약한 황갈은 11(약중화)이 [M1] 정합. 주황 강하면 9.
   - 버진모: 13·15레벨 리프팅용 필수

★ 같은 잿빛 브라운 타겟이라도: 16(자산 없음)=채움 / 14(자산 있음)=살림. 베이스에 brown 자산 있냐로 방법 갈림([M4]).

[d] 컨트롤컬러 단독 메인 호출 금지 — 항상 보조

[e] 시간축([M2]) × 명도 형식 결합 — 버진모 영역 전용

   (1) 버진모 고명도 1스텝
      · 13·15레벨 (리프팅용) + CC + 산화제 9%/12%
      · 시간축 경쟁이라 중명도 메인 호출 시 염료 손실
      · 13·15레벨이 리프팅 담당, CC가 색감 담당으로 역할 분리

   (2) 고명도 리프팅 후 재염색 2스텝
      · 1차: 13·15레벨 (리프팅용) + 9%/12% — 착색 X
      · 2차: 중명도 염모제 (메인) + CC (보조)
      · 1차에 중명도 호출 = 염료 손실 / 2차에 13·15레벨 = 염료 부족

   → 이 (1)(2) 결합은 [K1] 1·2번 경로에서 자동 발동. 다른 결합 금지.

[g] 메인·보조·CC 역할 분리

   · **메인 염모제** = 색감 표현 + 농도. 1순위 표현.
   · **보조 염모제 (보색 메인)** = 잔류 강 + 보색 강 필요한 14·16레벨에서. CC만으론 부족할 때.
     예: 16레벨 블루 메인 + 바이올렛 메인 보조 = 노랑 잔류 강하게 중화하면서 한색 발색.
   · **컨트롤컬러** = 표면 가미 (3가지 역할 — 디자이너 선택)
     A. 보색중화 보조 / B. 같은 계열 가미 / C. 채도 강화
   · **어두운 톤 메인** = 색감 + 농도 + 잔류 흡수 동시
     [P] (3) 어두운 톤은 염료+브라운 농도 가장 큼. 브라운 베이스가 잔류 노랑·주황 자체 흡수 → 보색 보조 약해도 깊이감+중화 동시 확보. 단 비비드 타겟엔 부적합.

[K1] 베이스 축 — 공정 5단계

■ ★★ 추론 골격 (최상위) — 희망색 = 언더톤 × 틴트
- 화면의 결과색은 "베이스에 깔린 잔류(언더톤)" 와 "그 위에 얹는 염료(틴트)" 의 곱이다. 둘 중 하나만 보면 틀린다.
  · 언더톤 = 못 고름. 탈색 단계가 정함(아래 멜라닌 순서). 명도 숫자(염료 농도)는 이 언더톤 깊이가 정한다(깊을수록 낮은 숫자=강중화).
  · 틴트 = 고름. 목표 발색을 내는 메인 재료 + 보색 방향. 디자이너 의도.
- 추론 사슬(이 순서 고정):
    ① 메인 색감 판정(희망색=원하는 발색) → ② 도달 언더톤(이 색 내려면 몇 레벨까지 빼나) → ③ 그 언더톤 조건(깔린 잔류=빨강/주황/노랑/없음)
    → ④ 색감·명도 선택(틴트=메인재료+보색방향 / 명도숫자=③ 언더톤 깊이) → ⑤(2층 코드)회사 넘버 변환 → ⑥ 레시피 3가지 나열.
- ★ 중화만 하면 깨끗한 베이스로 끝난다. 희망색(틴트)이 반드시 그 위에 얹혀야 한다. "언더톤 처리(②③명도·보색)" 와 "목표 발색(①④틴트)" 둘 다 출력에 들어가야 함.
- ★ 같은 틴트라도 언더톤이 바뀌면 결과색이 달라진다 → 그 변주를 alt_path(다른 베이스에서의 수렴)로 함께 제시.

■ 탈색 순서 = 멜라닌 분해 순서
검정(버진) → 주황(14, 고명도 논컬러로 리프팅한 바닥) → 노랑(16) → 연노랑·아이보리(18) → 백모(부재)

■ 공정 5단계 (라벨 고정)

1·2번은 모두 "탈색 0회"지만 [M2] 시간축으로 갈라짐.

1. **버진모 고명도 테크닉 (탈색 없이 시술)**
   - 13·15레벨 + CC + 9%/12% 1스텝
   - 시간축 경쟁 → 한색 브라운 수렴, 가벼운 가미

2. **고명도 리프팅 후 재염색 (고명도 논컬러로 14레벨 도달 · 주황~황갈주황 잔류)**
   - 1차: 13·15레벨 + 9%/12% / 2차: 중명도 염모제 + CC. 2스텝
   - 시간축 분리 → 선명 발색

3. **14레벨 (황갈 브라운 · 멜라닌 따라 갈림 — 탈색 1회 아님. 탈색하면 15↑, 리프팅 후 밴드)**
   - 단정 금지: 중립~황색 멜라닌 브라운(주황 적음) / 주황기 도는 브라운. 노랑 거의 없음 → 노랑·바이올렛은 16부터.
   - 한색 강도 매칭: 애쉬·블루는 같은 주황-보색 축, 강도 차이. 미세 잿빛(브라운 자산 위)→애쉬(애쉬브라운), 진한 잿빛·스모키→블루, 그 사이→애쉬+블루 소량. "잿빛 보이면 무조건 블루" 금지.
   - 과중화 원리: 잔류 약한데 보색 세게=탁해짐. 주황 적으면 애쉬, 더 돌면 블루 10%미만. 강도는 디자이너 선택으로 설명에 나열.
   - 주황 많이 도는 14는 16으로 올려 주황 빼는 너프가 더 깨끗할 수 있음 → alt_path.
4. **탈색 2회 이상 (16레벨 · 노랑기 잔류)**
5. **탈색 3회 이상 (18레벨 · 연노랑~아이보리 · 잔류 거의 없음)**

  · [M1] 잔류 강 → 보색 강 → 보색 메인 + 보색 CC
  · 16레벨 비비드·파스텔: 파워 그대로 (클리어 희석 금지 — K3 결정 트리)

  · [M1] 잔류 약 → 보색 약 → CC 가미 또는 생략
  · 바이올렛·블루는 "중화"가 아니라 "색 조합"으로 호출

  · [M1] 부재 → 보색 극소량 + 클리어 다량 희석

  · 판정 신호: 염료 무게감 없는 미색·크리미·밀키 지배

- 재료에 레벨을 직접 붙여 표기: "11레벨 ○○ 염모제" / "9레벨 ○○ 염모제" 등
- 18레벨·백모 = 높은 레벨(11·13, 염료 적음)

■ 한색 vs 난색 비대칭

한색 염료(애쉬·블루·바이올렛) ↔ 적색 멜라닌: 보색 → 흡수·소진 → 충분히 깨야 표현
난색 염료(레드·핑크·레드바이올렛) ↔ 적색 멜라닌: 같은 계열 → 협업 → 버진모도 표현

■ 버진모 한색 시술

[작동] 애쉬 염모제 + 블루 CC → 쿨/매트브라운 수렴 (라벤더·실버·백금발 아님)
[비작동] 회갈빛브라운 + 한색 단독 (보색 기능 없음 → 적색 억제 불가 → 탁한 브라운)
[비작동] 라벤더·실버·백금발 (적색 멜라닌이 흡수 → 탈색 필수 가이드)

■ 버진모 난색 시술

[작동] 레드바이올렛·레드·핑크 + 회갈빛브라운. 적색 멜라닌과 협업 → 깊은 발색.

■ 저공정 브라운 자산살림 (탈색 아님 · 한색 타겟 — 요즘 많은 "자산 살린 애쉬브라운")

전제: 명도(12·13·14) 판정 안 함. 고명도 논컬러(리프팅 전용) 염모제로 최소 14레벨까지 리프팅 깔고 그 위에 입힘. (못 보는 언더톤은 통일로 회피, 보이는 타겟 색감만 추론)

★ 출력 규칙 (14레벨 + 잿빛/애쉬 타겟일 때만): 14레벨 = 탈색 전 염색약으로 가장 밝게 밝힐 수 있는 언더톤. 브라운에서 노랑 나오기 직전 — 브라운은 잔존하되 주황기~황갈 브라운 직전이다. 언더톤을 사진으로 못 보니(공용 색감으로 구현), 두 갈래 약제를 나열한다:
   · 디폴트 = 주황기 있는 브라운 → 블루/청 부염료 애쉬·블루·마레그린 (주황=블루 보색 / 적색기=마레그린 / 붉은기 강할수록 블루 세게)
   · 황갈 브라운에 가깝다면 → 위 약 대신 "보라 내장 애쉬"(노랑 직전을 보라기로 눌러 잿빛) 사용, 또는 바이올렛 소량 믹스 권유
   main = 디폴트(주황), alt_branch = 황갈 대안. 회사 약 이름 X — 2층이 부염료(보라/블루) 보고 매핑.
   ★ 난색(웜·핑크·레드 등) 타겟이면 이 두 갈래 안 나눔 — 그 색감대로. (주황/황갈 갈래는 한색=잿빛/애쉬일 때만)

잿빛 강도 = 누름(레벨)으로 (별도 갈래 아님 — 두 갈래 안의 옵션):
  · 잿빛 강함 → 낮은 레벨로 눌러 깊게 (브라운에 가까운 애쉬·오묘한 잿빛) · 진하면 오센틱
  · 브라운 남김 → 높은 레벨 + CC로 가볍게 (자산 살림)
  · 더 어둡고 스모키 → 블루 세게(블루문)
  ★ 단일 레벨로 단조롭게 X → 명도 다른 약을 섞어 다채롭게: "11레벨 색감운반체 + 9레벨 색감" / "11레벨 + 컨트롤컬러" 식으로 운반체·색감·CC를 조합.
★ 클리어 희석 금지 — 밑에 브라운 자산 있으므로 보색량+레벨로만 조절.

(대안) 버진모 고명도 1단계: 13·15레벨 + CC + 9%/12% 1회. 시간축 경쟁 = 가볍게 가미.

■ 애쉬 + 적색 멜라닌 자연 반응

원리: 애쉬가 주황 잔류 중화 중 적색 일부와 만나 부산물로 보라빛 살짝 발현. 모질 차이 결과물 — **추가 계열 신호 아님**.

해석 분기 ([M6][a] 부가 뉘앙스 처리와 연결):
- **미세·부분·뉘앙스 ([M6] 부가)**: 애쉬로 해결. 난색(레드바이올렛·바이올렛·핑크) 추가 금지. 추가 시 자연+인공 = 보라기 폭발.
- **전체 색감 지배 ([M6] 메인)**: 그때만 바이올렛·레드바이올렛 추가.

★ 블루로 보라기·로즈빛 유도 금지. 블루는 주황의 보색이지 보라 경로 아님.

■ 딥 난색 테크닉 (3성분 필수)

원리: 깊이·보라빛·채도가 동시에 지배적인 난색 타겟은 단일·2성분으로 평범한 와인·로즈로 수렴.

[작동 — 리프팅 후 재염색 권장]
- 깊은 보라빛 와인: 레드바이올렛 + 레드 CC + 바이올렛 CC (바이올렛 CC가 보라·깊이 담당)
- 깊은 체리 와인·딥레드: 레드 + 레드 CC + 블루 CC 소량 (블루 CC가 적갈색 잔류 억제)

[비작동] 탈색 1회 이상 = 적색 자산 소실 → 평범한 레드 수렴.

[K3] 보색 + 클리어 — 강도 매칭의 적용
══════════════════════════════

■ 보색 공식 (절대 규칙)
- 노랑 잔류 → **바이올렛**
- 주황 잔류 → **블루**
- 빨강 잔류 → **그린**

■ ★ 보색의 2채널 위계 (누가 중화하나 — 보색 공식보다 먼저 판단)
원리: 보색 중화는 두 채널로 일어난다. 어느 채널인지 먼저 가른 뒤 공식을 적용한다.
  ① 1차 = 메인 재료 자체 부염료 (틴트 안에 보색이 내장된 "완성형" 재료):
     · 난색 웜베이지(PM·Qua.B) = 핑크+소량 애쉬(한색) 내장 → 노랑을 자체로 먹는다.
     · 베이지코튼(BC) = 미세 보라 내장 → 노랑을 자체로 먹는다.
     → 이 재료가 메인이면 보색 CC를 반사적으로 추가하지 않는다. 핑크 등 "같은 계열" CC 가미는 용인(틴트 강화), 보색(바이올렛) 중첩은 과중화·탁([M1]).
  ② 2차 = 컨트롤컬러 — ①의 자체 부염료가 노랑에 소진되고도 "다른 잔여색이 여전히 선명하게" 남을 때만 보조로 호출.
  ★ 캔버스/순틴트(NB 적색·CB 코코넛매트)는 보색 내장이 아니라 그 자체가 브라운 발색 → 노랑을 자체로 못 먹음 → 보색 CC(바이올렛) 호출이 정합.
  → 갈림: 메인이 보색 내장 완성형(PM/BC/Qua.B)이냐, 보색 없는 순틴트(NB/CB)냐로 CC 추가 여부가 갈린다. "16레벨 노랑이니 무조건 바이올렛"은 ①을 무시한 앵커 → 금지.


■ 보색 적용 영역 (K1 3영역 + [M1] 매칭)

| 영역 | 잔류 | 보색 | 형식 |
|---|---|---|---|
| 중화 영역 (14~16) | 강 | 강 | 보색 메인 염모제 + 보색 CC |
| 색 조합 영역 (18) | 약 | 약 | CC 가미 |
| 체인지 영역 (18 미색·백모) | 부재 | 극소 | CC 극소량 + 클리어 다량 |

■ 보색 강도 매칭
- 잔류 강 → 보색 메인 염모제 + CC
- 잔류 약 → CC만 소량
- 2종 잔류 (주황+노랑) → 주 잔류 보색 메인 + 부 잔류 보색 소량 병용

→ 엉뚱한 보색 (노랑에 블루, 주황에 바이올렛) = 변질.

■ 잔류 불확실성 헤지 룰 — 한색·난색 비대칭

[한색 메인 — CC 헤지 권장]
원리: 한색은 적색·잔류와 충돌 → 흡수·소진 → 농도 부족 위험.
- 14레벨 + 어두운 한색 (스모키·다크 매트) → 같은 계열 CC 소량 보강 권장
  · 어두운 톤의 블루 + 애쉬 + 블루 CC 소량
  · 어두운 톤의 카키 + 그린 CC 소량
- 16레벨 + 어두운 한색 → CC 보강 선택사항
- 18레벨 한색 → CC 추가 = [M1] 위반 (잔류 약 + 강보색 = 폭발). 비활성.

[난색 메인 — CC 헤지 비권장 ⚠️]
원리: 난색은 적색과 협업 → 메인만 충분 → 같은 계열 CC 추가 = 시뻘게짐.
- 14·16레벨 + 어두운 난색 → 같은 계열 CC 헤지 금지
- 단 [K2] 딥 난색 3성분의 보색 CC(블루·그린)는 별개 — 깊이감·채도 강화

[중성 메인]
- 회갈빛브라운 메인 → 보색 CC 처리만. 같은 계열 CC 금지.
- 바이올렛 메인 → 바이올렛 이중 성격 룰 우선.

→ 헤지는 "한색 메인 + 14·16레벨 + 어두운/딥/스모키" 동시 매칭 시만. 다른 케이스 비활성.

■ 바이올렛의 이중 성격

원리: 바이올렛은 색상환적으로 중성색이지만, 동양인 모발 맥락에서는 [M3]에 의해 난색으로 기울어진 중성색.

**작동 조건 — "노랑 없으면 중화 없음":**

작동 (노랑 잔류 있음):
- 16·18레벨: 순 바이올렛 중화 작동 → 뉴트럴 수렴
- 14레벨 황갈주황(노랑끼): 순 바이올렛 CC 직접 얹기보다, 보라 내장 애쉬약(섀도우애쉬·슈퍼노바그레이)으로 노랑 잡음. (애쉬+보라기가 노랑 중화하며 잿빛 부여)

비작동 (주황·적색 잔류 = 난색 발색 위험):
- 14레벨 주황쪽(붉은기 우세): 순 바이올렛 호출 X. 주 보색 = 블루·애쉬·마레그린.
- 버진모: 적색 만나 난색 발색

**예외 — 1스텝 리프팅 중 혼합 중화:**
산화제 9%/12%가 노랑기까지 리프팅하는 중간에 함께 투입된 바이올렛이 노랑 생성 순간 중화. 시간축 맞물림.
→ 버진모 1스텝 리프팅 중: 바이올렛 허용 (리프팅과 동시).

■ 변질 경로

| 잔류 | 단독 재료 | 결과 |
|---|---|---|
| 노랑 | 블루 | 카키·그린 (순수 잿빛 타겟이면 변질, 청초 타겟이면 활용) |
| 노랑 | 애쉬 | 매트·올리브 (어두운 염모제일수록 매트 강) |
| 노랑 | 레드 | 채도 낮은 주황·코퍼 |
| 주황 | 애쉬 | 탁한 쿨브라운 (보색 보강 필요) |
| 적색 | 애쉬 | 보라기·로즈 (자연 부산물 — 미세면 허용, 지배면 계열 추가) |

★ 부가 앵커 — 동양인 모발 적색 멜라닌 활용:
1~14레벨 모발은 적색~주황 멜라닌이 부분적으로 존재한다.
이 잔류·자산이 한색·매트 보색(블루·애쉬·그린)의 흡수·완충재 역할을 하므로,
적절한 영역에서 한색·매트 도구를 메인 또는 보색으로 활용 가능하다.
- 메인 활용: 애쉬·블루·카키·카키빛애쉬 염모제 (베이스 잔류 + 자산이 베이스 톤 자체 제공)
- 보색 활용: 블루·그린 컨트롤컬러 (잔류 종류와 메인 채널 매칭)

★ 주황 잔류 보색 선택은 메인 색감의 채널을 따른다:
잿빛·쿨 메인 → 블루(주황의 강보색) / 카키·매트·올리브 메인 → 그린(적색의 강보색이 주황도 함께 흡수)
★ 단 부가 뉘앙스에 다른 채널이 동급으로 살아있으면 부가 채널 보색을 소량 추가 가능
(예: 잿빛 메인 + 카키 부가 + 윤기·투명감 → 블루 + 그린 소량 협업).

■ 보색·브라운 사용 차원 분리

원리: 같은 노랑 잔류에서도 결과 색감 방향이 다르다.
- 바이올렛(보색): 노랑 중화 + 한색 강화 → 보라·라벤더·잿빛 방향
- 회갈빛브라운(브라운): 노랑 위에 브라운 덮음 → 베이지 무채화

같은 노랑 영역(16·18·백모)이라도:
- 한색 타겟(잿빛·애쉬·라벤더 우세) → 바이올렛 + 한색 메인
- 베이지 타겟(베이지·밀크·크리미 우세) → 회갈빛브라운 메인

베이지 타겟에 "애쉬 + 바이올렛" 우회 = 잿빛 방향, 베이지 안 나옴.
잿빛 타겟에 "회갈빛브라운 + 한색" 우회 = 베이지 섞인 톤, 깨끗한 잿빛 안 나옴.

★ 두 도구 동시 호출 = 색상 두 번 죽임 = 잿빛 깊이 사라짐.

■ 자연 멜라닌은 베이스 톤 (저공정 한색 시술)

원리: 저공정(버진모·14레벨 리프팅)에서는 자연 멜라닌이 살아있어 베이스 톤 자체 제공.

이 영역에서 한색 메인이 적색 멜라닌을 억제하면, 자연 멜라닌이 베이스로 남아 "잿빛 브라운"·"애쉬 브라운" 자연 구현.

이 영역에서 회갈빛브라운 호출 = 톤 이중 쌓임 = 탁함. 적갈색·주황 잔류가 강해 회갈빛브라운의 노랑 덮기 효과 못 잡음 → 잔류 노출.

→ 회갈빛브라운은 "자연 멜라닌이 빠진 빈 캔버스 + 베이지 타겟"에서만 호출.
   고공정(16·18·백모) + 베이지 타겟이 진짜 호출 영역.

★ 저공정의 "차분한 브라운 + 균일한 잿빛" = 자연 멜라닌 + 한색 메인 결과.
   사진의 균일성·차분함으로 회갈빛브라운 호출 추론 = 무효.

■ 클리어 희석 — 단일 결정 트리

원리: 클리어 = 염료 없는 염모제. "클리어 희석" = 염료 총량 줄임. CC는 리프팅 못 함.

★ 결정 순서:

  /* ── 매퍼 ── */
  function mapRecipe(abstract, brandKey){
    var dict = BRANDS[brandKey], lineMap = LINE_OF[brandKey], out = [];
    abstract.recipe.forEach(function(item){
      var dyePool = dict.dye[item.dye];
      // ★ 사사키 한정: 순그린(GR)은 '평소 비활성 → 마레그린'. green 바구니 대표가 예외전용이면 메인은 카키빛애쉬(Mar.G)로.
      if(brandKey==="sasaki" && item.dye==="green" && item.role!=="cc" && dict.dye.khaki_ash){
        var gp0 = dyePool && (dyePool.LOOK || dyePool[Object.keys(dyePool).filter(function(k){return k!=="CC";})[0]]);
        if(gp0 && gp0[0] && gp0[0].exceptionOnly){ dyePool = dict.dye.khaki_ash; }
      }
      if(item.role==="clear"){
        var band = pickClearBand(abstract.chroma, abstract.base);
        out.push({role:"clear",code:dict.clear.code,name:dict.clear.name,band:band?CLEAR_BAND[band]:"비율 조절용",meta:dict.clear.note});
        return;
      }
      if(item.role==="cc"){
        if(!dyePool||!dyePool.CC||!dyePool.CC.length){ out.push({role:"cc",missing:true,dyeLabel:item.dye}); return; }
        var cc=dyePool.CC[0];
        // ★ [K3] 보색 2채널 위계 집행: 메인 염모제의 부염료(bu)가 이 CC의 보색을 이미 머금었으면 중복 → 제거.
        //   성질 기반(약 이름 아님): 노랑↔보라/핑크 / 주황↔블루·청 / 빨강↔그린·카키. NB·CB(bu 없음)는 통과.
        var COMP = { violet:["보라","핑크"], blue:["블루","청"], green:["그린","카키"] };
        var compKey = COMP[item.dye];
        if(compKey){
          var selfNeutral = out.some(function(o){
            return o.role!=="cc" && o.role!=="clear" && !o.missing && o.bu &&
                   compKey.some(function(k){ return o.bu.indexOf(k)>=0; });
          });
          if(selfNeutral){
            out.push({role:"cc",suppressed:true,code:cc.code,name:cc.name,dyeLabel:item.dye,reason:"메인 자체 부염료가 같은 보색 보유 → 보색 중복 제거([K3] 2채널)"});
            return;
          }
        }
        out.push({role:"cc",code:cc.code,name:cc.name,ratio:RATIO_BAND[item.ratio]||"",gate:cc.gate||null,confirmed:cc.confirmed!==false});
        return;
      }
      var lineKey = (abstract.chroma==="vivid")?lineMap.vivid:lineMap.other;
      var cands = null;
      if(dyePool){ cands = dyePool[lineKey] || dyePool[Object.keys(dyePool).filter(function(k){return k!=="CC";})[0]]; }
      if(!cands||!cands.length){ out.push({role:item.role,missing:true,dyeLabel:item.dye,line:lineKey}); return; }
      var w = item.weight || abstract.weight || "mid";
      var tableLevel = (LEVEL_TABLE[abstract.base]||LEVEL_TABLE.lv16)[w];
      // ★LLM이 재료에 레벨을 지정했으면 그걸 우선(라인에 맞게 클램프), 없으면 LEVEL_TABLE
      var baseLevel = item.llmLevel ? item.llmLevel : tableLevel;
      var level = clampLevel(baseLevel, lineKey);
      var levelFromLLM = !!item.llmLevel;
      // ★사사키 파스텔: 탈색베이스에서 13 거의 안 씀 → 11로 낮추고 클리어 동반 (LLM 미지정 시만)
      if(!levelFromLLM && brandKey==="sasaki" && abstract.chroma==="pastel" && level>11){ level = 11; }
      var usable = cands.map(function(p){
        var lv = p.fixedLevel || level, blocked=null;
        if(lineKey==="LOOK" && dict.satColorsLOOK.indexOf(p.code)>=0 && lv<9 && !p.lowLevelOK && !p.fixedLevel)
          blocked = "R1 · LOOK 채도색 9레벨 미만 비활성";
        return Object.assign({},p,{lv:lv,blocked:blocked});
      });
      // ★ 부염료 매칭: LLM이 "보라 부염료 애쉬"라 하면 bu에 보라 든 약을 앞으로 (회사 무관 — 밀본도 bu 보고 자동 매칭)
      if(item.nuance==="보라" || item.nuance==="블루"){
        var nkey = (item.nuance==="보라") ? /보라|라벤더|노랑\s*중화|미세노랑/ : /블루|청/;
        usable.sort(function(a,b){
          var sa = nkey.test((a.bu||"")+(a.tex||"")) ? 1 : 0;
          var sb = nkey.test((b.bu||"")+(b.tex||"")) ? 1 : 0;
          return sb - sa;
        });
      }
      var primary = usable.filter(function(p){return !p.blocked;})[0] || usable[0];
      var alts = usable.filter(function(p){return p!==primary;});
      var promote = null;
      if(primary.promote) promote = item.is_main_color ? {open:true,path:primary.promote.path} : {open:false,when:primary.promote.when};
      out.push({ role:item.role, level:primary.lv, code:primary.code, name:primary.name,
        ju:primary.ju, bu:primary.bu, tex:primary.tex, ratio:RATIO_BAND[item.ratio]||"", line:lineKey,
        confirmed:primary.confirmed!==false, nuance:item.nuance||null, blocked:primary.blocked,
        alts:alts.map(function(a){return {label:(a.fixedLevel||a.lv)+a.code,name:a.name,tex:a.tex,confirmed:a.confirmed!==false};}),
        promote:promote });
    });
    return out;
  }

  /* ── 인접 바구니 맵 (조합 변형용 — 편집 가능) ── */
  var ADJACENT = {
    warm_beige:"brown_canvas", beige_brown:"warm_beige", brown_canvas:"warm_beige",
    ash:"khaki_ash", khaki_ash:"ash", blue:"ash",
    violet:"red_violet", red_violet:"pink", pink:"red_violet"
  };
  function recipeSig(mapped){
    return mapped.filter(function(m){return !m.missing;})
      .map(function(m){return (m.level||"")+(m.code||"")+(m.role||"");}).join("+");
  }
  function cloneAbs(o){ return JSON.parse(JSON.stringify(o)); }
  /* ── 같은 도달 베이스에서 희망색의 다른 길 N개(결정론·환각0) ── */
  function mapVariants(raw, analysis, brandKey){
    var out = [], seen = {};
    if(!raw) return out;
    var base = raw.base || "lv16";
    var VALID_CH = {vivid:1,mid:1,pastel:1};
    var chroma = (raw.chroma && VALID_CH[raw.chroma]) ? raw.chroma : detectChroma(analysis);
    var weight = (raw.weight && {light:1,mid:1,dark:1}[raw.weight]) ? raw.weight : (chroma==="pastel"?"light":(chroma==="vivid"?"dark":"mid"));
    function mkAbs(mats, b, ch){ var c=ch||chroma; return { case:raw.case, base:b||base, chroma:c, weight:weight, recipe:materialsToRecipe(mats, c, raw.case) }; }
    function add(label, meta, abs){
      var mapped = mapRecipe(abs, brandKey);
      if(!mapped.some(function(m){return !m.missing;})) return; // 전부 비면 버림(억지로 안 지어냄)
      var sig = recipeSig(mapped);
      if(!sig || seen[sig]) return;                              // 중복 버림
      seen[sig] = true;
      out.push({ label:label, meta:meta, base:abs.base, chroma:abs.chroma, mapped:mapped });
    }
    // ★ LLM이 낸 경로 그대로 매핑 — 갈래 판단(주황/황갈, 난색 여부)은 1층 LLM이, 2층은 약 번역만.
    //   잿빛+14면 LLM이 main(주황 디폴트)+alt_branch(황갈 대안) 줌 → 둘 다 매핑. 난색이면 main만 줌.
    if(raw.main && raw.main.materials)            add("권장",        (raw.main && raw.main.desc) || "권장 경로", mkAbs(raw.main.materials));
    if(raw.alt_branch && raw.alt_branch.materials) add("황갈이면",     (raw.alt_branch.desc) || "황갈 브라운에 가까우면", mkAbs(raw.alt_branch.materials));
    // 저공정(case A)은 다른 베이스/버진모 카드 제외(14 안에서만) — 탈색모는 LLM 경로 그대로
    if(raw.case !== "A"){
      if(raw.alt_path && raw.alt_path.materials)     add("베이스 변형", (raw.alt_path.desc) || "다른 베이스에서의 수렴", mkAbs(raw.alt_path.materials, raw.alt_path.base));
      if(raw.virgin_alt && raw.virgin_alt.materials) add("버진모 경로", (raw.virgin_alt.desc) || "버진모 1스텝", mkAbs(raw.virgin_alt.materials));
    }
    return out;
  }

  /* ── v1 _raw → 추상결과 어댑터 (문자열 파싱) ── */
  function detectDye(s){
    if(/회갈빛\s*브라운/.test(s)) return "beige_brown";
    if(/난색\s*웜?\s*베이지|웜\s*베이지|핑크\s*가미|핑크\s*베이지/.test(s)) return "warm_beige";
    if(/플럼/.test(s)) return "warm_beige";
    if(/카키빛\s*애쉬/.test(s)) return "khaki_ash";
    if(/레드바이올렛/.test(s)) return "red_violet";
    if(/카키/.test(s)) return "khaki_ash";
    if(/애쉬/.test(s)) return "ash";
    if(/블루/.test(s)) return "blue";
    if(/바이올렛|보라/.test(s)) return "violet";
    if(/핑크/.test(s)) return "pink";
    if(/와인|레드/.test(s)) return "red";
    if(/그린/.test(s)) return "green";
    if(/오렌지|구리|앰버|코퍼|캐러멜/.test(s)) return "orange";
    if(/옐로우|허니|골드|황금/.test(s)) return "yellow";
    if(/브라운|자연갈|베이지/.test(s)) return "brown_canvas";
    return null;
  }
  function detectWeight(s){ if(/밝은\s*톤/.test(s)) return "light"; if(/어두운\s*톤/.test(s)) return "dark"; return null; }
  function detectNuance(s){ // LLM이 말한 부염료 성격 (회사약명 X, 성격만) — 2층이 이걸로 약 매칭
    if(/보라|라벤더|바이올렛/.test(s)) return "보라";
    if(/블루|청/.test(s)) return "블루";
    return null;
  }
  function detectChroma(analysis){
    var els=(analysis&&analysis.elements)||[];
    var j=els.join(" ")+" "+((analysis&&analysis.description)||"")+" "+((analysis&&analysis.color_name_ko)||"");
    if(/비비드|선명|채도\s*높/.test(j)) return "vivid";
    if(/파스텔|뽀얀|연한|밀키|크리미|미색/.test(j)) return "pastel";
    return "mid";
  }
  function materialsToRecipe(mats, chroma, caseV){
    mats = mats || [];
    var recipe=[], mainSeen=false;
    mats.forEach(function(m){
      if(typeof m!=="string") return;
      if(/산화제/.test(m)) return;                                  // 산화제 제외
      if(/리프팅용|13·15레벨/.test(m) && !detectDye(m)) return;      // 리프팅 마커 제외
      var dyeDetected = detectDye(m);
      // ★"클리어 애쉬"(약)는 희석 클리어 아님 — 염료가 감지되면 clear로 안 뺀다
      var role = (/클리어/.test(m) && !dyeDetected) ? "clear" : (/컨트롤컬러|컨트롤러|\bCC\b/.test(m) ? "cc" : (mainSeen?"sub":"main"));
      if(role==="clear"){ recipe.push({role:"clear",dye:null,ratio:"sub"}); return; }
      if(!dyeDetected) return;
      var w = detectWeight(m);
      var lvMatch = m.match(/(\d{1,2})\s*레벨/);
      var llmLevel = lvMatch ? parseInt(lvMatch[1],10) : null;
      var item = { role:role, dye:dyeDetected, nuance:detectNuance(m), llmLevel:llmLevel,
        ratio: role==="cc"?"small":(mainSeen?"sub":"main"), is_main_color:false };
      if(w) item.weight=w;
      if(role!=="cc" && !mainSeen) mainSeen=true;
      recipe.push(item);
    });
    // 파스텔 자동 클리어 동반 — 단 저공정 자산살림(case A)은 제외(브라운 자산 위라 클리어 금지)
    var hasSelfSheer = recipe.some(function(it){ return it.dye==="warm_beige"; });
    if(caseV!=="A" && chroma==="pastel" && !hasSelfSheer && !recipe.some(function(it){return it.role==="clear";})){
      recipe.push({role:"clear", dye:null, ratio:"sub"});
    }
    return recipe;
  }
  function v1ToAbstract(raw, analysis){
    if(!raw) return null;
    var base = raw.base || "lv16";
    var VALID_CH = {vivid:1,mid:1,pastel:1};
    var chroma = (raw.chroma && VALID_CH[raw.chroma]) ? raw.chroma : detectChroma(analysis);
    var chromaFromLLM = !!(raw.chroma && VALID_CH[raw.chroma]);
    var recipe = materialsToRecipe((raw.main && raw.main.materials) || [], chroma, raw.case);
    var VALID_W = {light:1,mid:1,dark:1};
    var weight = (raw.weight && VALID_W[raw.weight]) ? raw.weight : (chroma==="pastel"?"light":(chroma==="vivid"?"dark":"mid"));
    var weightFromLLM = !!(raw.weight && VALID_W[raw.weight]);
    return { case:raw.case, base:base, chroma:chroma, weight:weight, recipe:recipe, _inferred:true, chromaFromLLM:chromaFromLLM, weightFromLLM:weightFromLLM };
  }

/* ════════════════════════════════════════════════════════════
   호출 — 제미나이 3.5 플래시 직접 (사용자 키 AIza...)
   userContent: [{type:"image",source:{media_type,data}}, {type:"text",text}] (기존 형식 유지)
   → 내부에서 제미나이 parts 형식으로 변환
   ════════════════════════════════════════════════════════════ */
const GEMINI_MODEL = "gemini-3.5-flash";
// 글로벌 Vertex는 서버(/api/review-vertex)에서 OAuth로 붙는다. 브라우저는 그 서버만 호출(키 노출 0, 503 재시도는 서버가 처리).
async function callLLM(_apiKeyIgnored, _modelIgnored, maxTokens, systemText, userContent){
  let res;
  try{
    res = await fetch("/api/review-vertex", {
      method:"POST",
      headers:{ "content-type":"application/json" },
      body: JSON.stringify({ systemText:systemText, userContent:userContent, maxTokens:maxTokens })
    });
  }catch(e){ throw new Error("서버 연결 실패 — Vercel에 배포된 상태에서 접속했는지 확인 ("+(e.message||e)+")"); }
  let data; try{ data = await res.json(); }catch(e){ throw new Error("서버 응답 파싱 실패 (HTTP "+res.status+")"); }
  if(!res.ok) throw new Error(data && data.error ? data.error : ("API "+res.status));
  const txt = data.text || "";
  const finish = data.finishReason;
  if(!txt){
    if(finish==="MAX_TOKENS") throw new Error("응답 잘림(MAX_TOKENS) — maxOutputTokens 부족");
    throw new Error("빈 응답 (차단/출력 없음"+(finish?" · "+finish:"")+")");
  }
  if(finish==="MAX_TOKENS") throw new Error("응답이 토큰 한도에서 잘림(MAX_TOKENS) — maxOutputTokens 올려야 함");
  return txt;
}
// 잘림·래핑에 견디는 JSON 추출: 첫 { 부터 균형 맞는 } 까지 스캔(문자열·이스케이프 인지)
function extractBalancedJSON(s){
  const i = s.indexOf("{"); if(i<0) return null;
  let depth=0, inStr=false, esc=false;
  for(let k=i;k<s.length;k++){
    const c=s[k];
    if(inStr){ if(esc){esc=false;} else if(c==="\\"){esc=true;} else if(c==='"'){inStr=false;} continue; }
    if(c==='"'){ inStr=true; continue; }
    if(c==="{") depth++;
    else if(c==="}"){ depth--; if(depth===0) return s.slice(i,k+1); }
  }
  return null; // 닫는 } 못 찾음 = 잘림
}
function parseJSON(txt){
  txt = (txt||"").replace(/\`\`\`json|\`\`\`/g,"").trim();
  const block = extractBalancedJSON(txt);
  if(!block) throw new Error("JSON 파싱 실패 — 응답이 잘렸거나 닫는 괄호 없음(토큰 초과 의심)");
  return JSON.parse(block);
}

/* ── fact package 빌드: N변형 → [확정 사실] 텍스트 ── */
function buildFactPackage(companyName, abstract, variants){
  const BASE = {virgin:"버진모",lv14:"14레벨",lv16:"16레벨",lv18:"18레벨",white:"백모"};
  const CH = {vivid:"비비드",mid:"중채도",pastel:"파스텔"};
  let s = "[확정 사실]\n";
  s += "- 회사: "+companyName+"\n";
  s += "- 도달 베이스(단일 확정): "+(BASE[abstract.base]||abstract.base)+" / 채도: "+(CH[abstract.chroma]||abstract.chroma)+"\n";
  s += "- ★ 언더톤은 이 베이스 하나로 확정. 이 베이스에 도달 못하면 이 색은 안 나온다. 다른 베이스(14·18 등) 분기·장황한 가정 설명 금지. reach_condition 한 문장으로만 도달 전제 명시.\n";
  s += "- 레시피 "+(variants||[]).length+"종 (전부 같은 도달 베이스 위, 같은 희망색에 이르는 다른 길):\n";
  (variants||[]).forEach((v,i)=>{
    const parts=[], traits=[];
    v.mapped.forEach(m=>{
      if(m.missing || m.suppressed) return;
      if(m.role==="clear"){ parts.push("클리어 "+(m.band||"비율조절")); return; }
      if(m.role==="cc"){ parts.push(m.code+" CC"+(m.ratio?" "+m.ratio:"")); return; }
      parts.push(m.level+m.code+"("+m.name+")");
      if(m.tex) traits.push(m.level+m.code+" = "+(m.ju?m.ju+" · ":"")+m.tex);
    });
    s += " ["+i+"] "+v.label+" — "+parts.join(" + ")+"\n";
    traits.forEach(t=> s += "      · 재료 성격: "+t+"\n");
  });
  s += "- 재료 성격은 설명용 배경이다(새 약제·단계로 추가 금지, 서술만).\n";
  return s;
}

/* ════════════════════════════════════════════════════════════
   상태 + 오케스트레이션
   ════════════════════════════════════════════════════════════ */
const ST = { apiKey:"", b64:null, media:null, fname:"", company:"sasaki", analysis:null, raw:null, abstract:null,
             variants:null, explain:null };
const $ = id => document.getElementById(id);
function setStatus(t, busy){ $("status").innerHTML = t ? ((busy?'<span class="spin"></span>':'')+t) : ""; }
function showErr(t){ const e=$("err"); if(t){ e.textContent=t; e.classList.remove("hide"); } else e.classList.add("hide"); }

/* 업로드 */
const uploader=$("uploader"), fileInput=$("fileInput");
uploader.addEventListener("click", e=>{ if(e.target.id!=="runBtn") fileInput.click(); });
fileInput.addEventListener("change", e=>{ if(e.target.files[0]) loadFile(e.target.files[0]); });
uploader.addEventListener("dragover", e=>{ e.preventDefault(); uploader.classList.add("drag"); });
uploader.addEventListener("dragleave", ()=> uploader.classList.remove("drag"));
uploader.addEventListener("drop", e=>{ e.preventDefault(); uploader.classList.remove("drag"); if(e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
function loadFile(file){
  const r=new FileReader();
  r.onload=()=>{
    const res=r.result; ST.b64=res.split(",")[1]; ST.media=file.type||"image/jpeg"; ST.fname=file.name;
    $("ufname").textContent=file.name; $("ufsize").textContent=Math.round(file.size/1024)+"KB";
    $("uthumb").innerHTML='<img src="'+res+'" alt="">';
    $("runBtn").disabled=false;
  };
  r.readAsDataURL(file);
}
$("apiKey").addEventListener("input", e=> ST.apiKey=e.target.value.trim());
$("cotoggle").addEventListener("click", e=>{
  const b=e.target.closest("[data-co]"); if(!b) return;
  if(b.dataset.co===ST.company) return;
  ST.company=b.dataset.co;
  if(ST.abstract) rerunMapping();   // 넘버 즉시 교체 + 설명만 재호출
});
$("runBtn").addEventListener("click", runPipeline);

async function runPipeline(){
  showErr(""); 
  if(!ST.b64){ showErr("사진을 선택하세요."); return; }
  $("runBtn").disabled=true; $("results").classList.add("hide");
  const img = { type:"image", source:{ type:"base64", media_type:ST.media, data:ST.b64 } };
  try{
    setStatus("색감 분석 중…", true);
    const aTxt = await callLLM(ST.apiKey,"",2048,ANALYSIS_PROMPT,
      [img,{type:"text",text:"이 사진 속 모발의 색감을 관찰하여 analysis JSON 하나만 출력해. 사고 과정·설명·인사 금지."}]);
    ST.analysis = parseJSON(aTxt);

    setStatus("레시피 역추론 중…", true);
    const hint = "\n\n[참고 — 1차 분석]\n- color_name_ko: "+(ST.analysis.color_name_ko||"")+"\n- tone: "+(ST.analysis.tone||"")+"\n- elements: "+((ST.analysis.elements||[]).join(", "))+"\n- description: "+(ST.analysis.description||"");
    const rTxt = await callLLM(ST.apiKey,"",12000,RECIPE_PROMPT,
      [img,{type:"text",text:"이 사진 속 모발 색감을 직접 관찰하여 조색 레시피를 역추론해. JSON 하나만 출력해 (코드블록·설명·인사 금지). 필드: quick_thoughts, reasoning, case(A~E), base, chroma(vivid/mid/pastel 직접 판정), weight(light/mid/dark 직접 판정), main{materials,desc}, alt_branch, alt_path, virgin_alt, practical_tips."+hint}]);
    ST.raw = parseJSON(rTxt);

    await rerunMapping();   // 2층 매핑 + 설명(호출3)
  }catch(e){
    showErr("실패: "+e.message+(/Failed to fetch|CORS/i.test(e.message)?" — 제미나이 직접 호출이 막혔을 수 있어요. AIza 키가 맞는지·네트워크를 확인하세요.":""));
    setStatus("");
  }finally{ $("runBtn").disabled=false; }
}

/* 회사 토글/최초 — 매핑은 즉시, 설명만 재호출 */
async function rerunMapping(){
  const company = ST.company;
  const companyName = BRANDS[company].name;
  ST.abstract = v1ToAbstract(ST.raw, ST.analysis);
  ST.variants = mapVariants(ST.raw, ST.analysis, company);   // LLM이 낸 갈래 그대로(결정론)
  renderStatic();                 // 넘버는 즉시 렌더
  $("results").classList.remove("hide");

  // 설명(호출3) — 카드별 로딩 표시
  setStatus("컬러리스트 설명 생성 중…", true);
  ST.variants.forEach(function(_,i){ const el=document.querySelector('#var'+i+' .explain'); if(el){ el.classList.add("loading"); el.textContent="설명 생성 중…"; } });
  try{
    const fact = buildFactPackage(companyName, ST.abstract, ST.variants);
    const eTxt = await callLLM(ST.apiKey,"",4000,EXPLAIN_PROMPT,[{type:"text",text:fact}]);
    ST.explain = parseJSON(eTxt);
  }catch(e){ ST.explain={display_name:"(설명 생성 실패)",reach_condition:"",variants:[{explain:e.message}]}; }
  renderExplain();
  setStatus("");
}

/* ── 렌더 ── */
const BASE_LABEL={virgin:"버진모",lv14:"14레벨",lv16:"16레벨",lv18:"18레벨",white:"백모"};
const CHROMA_LABEL={vivid:"비비드",mid:"중채도",pastel:"파스텔"};
function numHtml(m, small){
  if(m.missing) return '<span class="q" style="color:var(--bad)">('+(m.dyeLabel||"?")+" 사전 비어있음)</span>";
  if(m.role==="clear") return '<span class="num'+(small?' alt':'')+'">CLEAR</span><span class="q">'+(m.band||"비율조절")+'</span>';
  if(m.role==="cc") return '<span class="num'+(small?' alt':'')+'">'+m.code+'</span><span class="q">CC'+(m.ratio?" "+m.ratio:"")+'</span>'+(m.confirmed?'':' <span class="badge">검수</span>');
  return '<span class="num'+(small?' alt':'')+'"><span class="lv">'+m.level+'</span>'+m.code+'</span>'+(m.confirmed?'':' <span class="badge">검수</span>');
}
function joinNums(mapped, small){
  const vis = mapped.filter(m=>!m.missing && !m.suppressed);
  return vis.map((m,i)=> (i>0?'<span class="plus">+</span>':'')+numHtml(m,small)).join("");
}
function renderCoToggle(){
  $("cotoggle").innerHTML = Object.keys(BRANDS).map(function(k){
    var b=BRANDS[k];
    return '<button class="cobtn '+(k===ST.company?'on':'')+' '+(b.stub?'stub':'')+'" data-co="'+k+'">'+b.name+(b.stub?' (뼈대)':'')+'</button>';
  }).join("");
}
function renderThoughts(){
  const t = (ST.raw && ST.raw.quick_thoughts) || [];
  $("thoughtsList").innerHTML = t.map(function(line){
    return '<span class="tl">'+String(line||"").replace(/\.+$/,"")+'</span>';
  }).join("");
  $("thoughtsBox").open = true;
}
function renderStatic(){
  const a=ST.analysis;
  renderCoToggle();
  renderThoughts();
  $("frozen").innerHTML='<span class="chk">✓</span><span class="lab">색감분석</span>'
    +'<span class="sw" style="background:'+(a.hex||"#888")+'"></span>'
    +'<span>'+(a.color_name_ko||"")+' · '+(a.tone||"")+'</span>'
    +'<span class="more" onclick="this.closest(\'.frozen\').nextElementSibling.scrollIntoView()">동결</span>';
  // 레시피 카드들 (권장 + 변형들)
  $("recCards").innerHTML = (ST.variants||[]).map(function(v,i){
    var isMain = i===0;
    var tagLabel = isMain ? "메인 레시피" : v.label;
    return '<div class="rec '+(isMain?'main':'alt')+'" id="var'+i+'">'
      +'<div class="tagrow"><span class="rtag '+(isMain?'main':'alt')+'">'+tagLabel+'</span>'
      +'<span class="rmeta">'+(v.meta||"")+' · '+(BASE_LABEL[v.base]||"")+' · '+(CHROMA_LABEL[v.chroma]||"")+'</span></div>'
      +'<div class="nums">'+joinNums(v.mapped, !isMain)+'</div>'
      +'<div class="explain loading">설명 생성 중…</div>'
      +'</div>';
  }).join("");
  // 원본
  $("rawPre").textContent =
    "// 분석\n"+JSON.stringify(ST.analysis,null,2)
    +"\n\n// 레시피(추상)\n"+JSON.stringify({case:ST.raw.case,base:ST.raw.base,main:ST.raw.main,alt_path:ST.raw.alt_path,quick_thoughts:ST.raw.quick_thoughts},null,2)
    +"\n\n// 사실패키지(설명 입력)\n"+buildFactPackage(BRANDS[ST.company].name, ST.abstract, ST.variants);
}
function renderExplain(){
  const ex=ST.explain||{};
  $("interp").innerHTML='<span class="ico"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 3v2m0 14v2M3 12h2m14 0h2M5.6 5.6l1.4 1.4m10 10 1.4 1.4m0-12.8-1.4 1.4m-10 10-1.4 1.4"/></svg></span>'
    +'<p><b>'+(ex.display_name||"")+'</b> — '+(ex.reach_condition||"")+'</p>';
  const vex = ex.variants || [];
  (ST.variants||[]).forEach(function(v,i){
    const el = document.querySelector('#var'+i+' .explain');
    if(!el) return;
    el.classList.remove("loading");
    const txt = (vex[i] && vex[i].explain) || (i===0 ? (ex.main_explain||"") : "");
    el.innerHTML = fmtEscape(txt);
  });
  $("rawPre").textContent += "\n\n// 설명(출력)\n"+JSON.stringify(ex,null,2);
}
function fmtEscape(t){
  var s = String(t||'').replace(/\s*→\s*/g, '\n→ ').trim();   // → 는 항상 새 줄
  var parts = s.split('\n').map(function(x){return x.trim();}).filter(Boolean);
  return parts.map(function(ln, i){
    var c0 = ln.charAt(0);
    if(c0==='→') return '<div class="esc">'+ln+'</div>';
    if(c0==='·' || c0==='•' || c0==='-') return '<div class="pt">'+ln.replace(/^[-•]/,'·')+'</div>';
    if(i===0) return '<div class="gist"><b>'+ln+'</b></div>';
    return '<div class="ln">'+ln+'</div>';
  }).join('');
}
