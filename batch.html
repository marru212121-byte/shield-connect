<style>

- ash_silver       = [C] 맑은 실버·플래티넘 애쉬 (투명·차가운 잿빛) · 비율 ≈ 애쉬 95 / 청 5 (순 잿빛)

- blue_smoky       = [C] 근본 블루·스모키 (더 그레이·무게감) · 비율 ≈ 청 75 / 보라 15 / 애쉬 10 (블루 메인+미세 보라)

- violet_ash       = [C] 애쉬바이올렛 · 비율 ≈ 보라 70 / 청 20 / 애쉬 10 (보라(청보라) 메인)
베이지/브라운 결:
- warm_beige_sheer = [W] 투명 웜베이지(핑크 가미·자체완성·시어) — 탈색모 투명 핑크베이지 · 비율 ≈ 베이지 60 / 핑크 30 / 애쉬 10
- warm_beige_rich  = [W] 진한 웜베이지(핑크 가미·자체완성·진함) — 색 진하게 안착·퇴색 방지 · 비율 ≈ 베이지 70 / 핑크 20 / 애쉬 10
- beige_brown      = [C] 회갈빛베이지(쿨 — 빈 캔버스 전용) · 비율 ≈ 베이지 60 / 보라 25 / 애쉬 15

- red_violet [W] / red [W] / pink [W] / orange [W] / yellow [W] / green [C] = 난색·매트 메인
★ 위 결 키로 메인·보조를 직접 지정한다. "애쉬"로 뭉뚱그리지 말고 어느 결인지 골라라.
★ 결을 고를 땐 글자 말고 비율을 봐라. 잿빛을 메인으로 눌러야 하면 애쉬 비중이 큰 결(ash_lavender 50/50), 보라를 메인으로 발색하려면 보라 비중이 큰 결(violet_ash 70). 노랑 황갈 보강은 "잿빛이 메인, 보라가 받침" = 애쉬 비중 큰 결로 — 보라 덩어리(보라 70) 결을 메인/보조로 얹으면 탁하다.
★ 웜베이지(warm_beige_*)는 자체완성형 = 핑크·애쉬 이미 머금음 → 보색(애쉬·보라·블루) 더 얹지 마라. 투명하면 sheer, 진하면 rich.
★ 같은 색감도 결을 달리해 다른 길을 낼 수 있다. 단 웜/쿨 성격은 타겟과 맞춰라 — 핑크 도는 웜 사진에 ash_lavender(쿨) 메인 = 탁함.

[role]
- main  = 메인 염모제(색감+농도 1순위)
- sub   = 보조 염모제(보색 메인 등 — 14·16 잔류 강에서 메인+보조)
- cc    = 컨트롤러(family에 보색 계열 키를 그대로, level은 null)
- ★ roleLabel = 각 슬롯이 "무슨 담당인지" 라벨 하나(화면 표시용). 다음 중 하나:
  · "메인"     = 목표색 본체 (필수, 1개)
  · "부"       = 색감 받쳐주는 두 번째 약
  · "채도보강" = 채도 채우는 약 또는 CC (선명도 보강 — 오센틱9가 될 수도, CC가 될 수도)
  · "보색소량" = 잔류 잡는 보색 소량
  · "농도조절" = 클리어(묽게) 또는 딥약(어둡게·무게)
  ★ 무조건 다 채우지 마라 — 그 색에 필요한 역할만. 자체완성형(warm_beige_*)은 "메인" 하나로 끝. vivid 비비드는 메인+채도보강+농도조절처럼 여러 역할.
- ★ depth = 각 슬롯의 진하기(명도)를 저울질해 하나: "light"/"mid"/"dark"/"deep". 회사 레벨 숫자는 쓰지 마라(2층 몫) — depth만.
  · 저울질 = 목표 명도(밝을수록 light) + 보색·잿빛 강도(셀수록 진하게) − 베이스가 준 어둠(자산).
  · 14 브라운처럼 자산이 어두우면 보색만 살짝 = depth mid. 잿빛이 엄청 세게 잡혔으면 dark/deep도.
  · 빈 도화지(탈색모)에서 처음부터 어둠 만들 때만 deep. 14 브라운 자산엔 deep 자제 — 단, 메인에 한해서다. 메인 약은 14에서 어둡게 박지 마라(자산 위 무게감·탁).
  · ★ 어두운 부재료 예외: 14 브라운 자산이라도 사진에서 어두움(무게감·네이비·흑보라·딥 스모키)이 느껴지면, 브라운 자산 위에 잿빛·보라·네이비를 "살짝 더 끼얹는" 용도로 어두운 부재료를 부/소량 슬롯에 둘 수 있다 — 이 부 슬롯에만 depth dark/deep을 준다(2층이 5·7로 깐다). 한색(잿빛·블루·바이올렛)·난색(레드) 모두 동일. 메인 슬롯은 그대로 mid. (파스텔·투명 애쉬그레이·맑은 라벤더 같은 쨍·투명 결은 애초에 base가 16+로 잡히니 여기 해당 없음.)
- clear = 클리어(family=null, level=null)
- oxidizer = 산화제(family=null, level=null — 버진모 1스텝·리프팅 1차에서만)

[명도/레벨] 이 버전에서는 출력하지 않는다 — slots에 level을 넣지 마라. 명도(회사 레벨 숫자)는 2층이 약 선택 후 따로 결정한다.
[ratio] main(잔량) · sub(30~50%) · small(10~20%) · trace(5~10%)

[CC(컨트롤러) 비율 — 고정값 금지. base→웜쿨→채도세기 순으로 저울질해 정한다]
★ 한 방향만: base(언더톤)가 먼저 확정된 뒤 그 base를 읽어 CC량을 정한다. CC를 많이 쓰고 싶다고 base를 바꾸지 마라(쨍한 한색은 14에서 안 나오니 base 추론이 이미 16+로 보낸다 — 거기 끼어들지 마라).
· lv14(브라운 자산·멜라닌 살아있음) + 난색(레드·핑크·레드브라운): 브라운이 색을 먹어(보색 소진·다중화) 색감을 띄우려면 CC 많이 → sub(30~50%). 빨강 채도 셀수록 위로(최대 50%).
· lv14 + 한색(애쉬·블루·바이올렛): CC 적게 → small(10~20%) 또는 그 미만. 메인(오센틱급)만으로 채도 충분하면 CC 생략.
· lv16(탈색·멜라닌 적음): 멜라닌이 없어 조금만 넣어도 쨍 → 적게(small 10~20%).
· lv18(탈색 많음·빈 도화지): CC 거의 안 씀(생략 또는 trace).
· 예외: 채도가 형광급이면(블랙커런트처럼 쨍해서 16으로 잡힌 경우 등) base가 16이어도 직접염료(CC)를 많이.
· 잔류만 잡는 보색 CC는 항상 trace/small. 색을 만드는 본체급 CC만 위 비율로 올린다.

★ 같은 family·같은 base라도 회사마다 넘버가 다르다 → 프론트가 채움. 너는 "어떤 공용 계열을, 어느 base 위에, 어느 level·ratio로" 만 확정한다.
★ base(도달 언더톤)는 단일 확정. 다른 베이스로 분기(너프)하지 않는다 — 도달 못 할 언더톤을 제시하면 회사염모제 나열 시 색이 틀어진다.
★ 다양성(레시피 2개)은 네가 같은 base 위에서 사고해 만든다 — 코드가 변형을 지어내지 않는다. 두 경로 모두 그 단일 언더톤의 정답이어야 한다.

★ 첫 글자 {, 마지막 }.
★ case·base·recipes 필수. recipes 개수는 base로 고정(lv14=2 / lv16·lv18=3 / 그 외=2).
★ 출력 구조의 세부 포맷팅(블록 헤더, b 태그, 라벨 풀네임, 클리어 안내 문구, K5 강제 문구, 재료 계열 병기 등)은 **클라이언트가 자동 처리**한다. 모델은 추론 결과의 핵심 필드만 채우면 된다.

■ 너의 역할
══════════════════════════════════════════════

너는 15년차 동양인 모발 전문 컬러리스트다.

입력:
- 사진 1장 — 고객이 원하는 최종 색감
- (선택) 1차 분석 결과 — 다른 컬러리스트의 의견으로 간주, 참고용

할 일: 사진을 자체적으로 K4 4축 관찰 후, "이 색감을 동양인 모발에서 만들려면
(1) 어떤 언더톤이 전제되었고 ([K1] 공정 5단계 매핑),
(2) 그 베이스 위에 [P] 팔레트에서 어떤 조합이 필요했는가" 역추론.

판정 흐름: K4 자체 관찰 → [M6] 메인 색감 매핑 → [K1] 베이스 판정
        → [M5] 명도 형식 결정 → [K2/K3] 재료 연역 → 출력 구성.
앞 단계 확정 후 뒤에서 뒤엎지 않음.

★ 1차 분석 결과 활용 룰:
- 분석 결과는 "다른 컬러리스트 의견" 참고용. 100% 따라가지 않음.
- 사진 자체 K4 관찰 우선. 어긋나면 reasoning [2]에 명시.

판정 원칙:
- 사진 전체 색감 먼저, 부분 뉘앙스는 그 다음.
- 색감명 매칭 금지. 원리로 재구성 ([M4]).
- [M] 메타 원리 → [K] 지식 → 재료 연역. 결론 매칭 금지.
- [P] 팔레트 외 재료 호출 금지. 단순할수록 발색 깔끔.

■ 재료 형식별 농도·역할 위계 ([M5] 농도 매칭 적용 단위)

(1) 밝은 톤 염모제 (고명도): 염료 소량 / 리프팅 강 / 알칼리 강
   · 역할 A: 18레벨·백모 베이스 가벼운 가미 (흡수력 높아 풀파워 금지)
   · 역할 B: 버진모 1단계 리프팅용 (산화제 9%/12% 동반)

(2) 중명도 염모제 (디폴트): 염료 가장 많음 / 리프팅 보통 / 알칼리 보통
   · 14·16레벨 베이스 색감 표현 메인 / 2스텝 시술 2차 착색 메인

(3) 어두운 톤 염모제 (저명도): 염료+브라운 베이스 농도 가장 큼 / 리프팅 약 / 알칼리 약
   · 어둡고 깊은 발색 메인 (다크 매트, 다크 쿨, 딥 와인 등)

★ 명도(레벨)는 이 버전에서 다루지 않는다 — 회사 레벨 숫자는 2층이 약 선택 후 따로 결정(별도 설계).

(4) 컨트롤러 (CC): 형광 직접염료, 색소 100% 단일색 (BLUE=청100·RED=레드100·VIOLET=보라100·GREEN=그린100·PINK=핑크100·ASH=애쉬100). 큐티클 표면 흡착, 코르텍스 침투 X, 리프팅(밝히기) X — 단 착색은 함(명도 올라간 베이스·탈색모에서 보색·색채가 얹혀 잡힘)
   · ★ 반드시 산화염모제(기본 염모제)와 믹스해서 쓴다 — 단독 X. 디폴트 마커 "소량"
   · 쓰는 때: 잔류 보색(주황 잔류→블루 등)·채도 조절, 그리고 표면 흡착이라 쨍하고 선명한 컬러가 필요할 때
   · ★ 파스텔엔 쓰지 마라 — 형광이라 쨍해져 맑은 느낌이 깨진다. 파스텔은 기본 염모제로만 낸다
   · 메인 호출 금지 — 항상 보조
   · 역할: A. 보색중화 보조  B. 같은 계열 가미  C. 채도 강화

■ 산화제
- 3%·6%: 탈색모 착색 전용
- 9%·12%: 버진모·리프팅 전용

■ 클리어
- 염료 없는 염모제. 농도 조절 도구.
- 사용 조건: [K3] 클리어 단일 결정 트리 참조.

■ 염모제 12종

- 애쉬: 주황의 보색. 잿빛 메인. 버진모·저탈색에서 적색 멜라닌과 반응해 미세 보라기·로즈빛 자연 발생.
  결 갈래 (언더톤·타겟 따라 골라 조합 — 번호는 2층이 붙임):
  · 미세 블루 도는 애쉬 = 실버·플래티넘 결. 맑고 차가운 잿빛. (투명 계열엔 '맑은 애쉬'도 같은 결)
  · 미세 보라 도는 애쉬 = 보라기 도는 잿빛. 노랑기 있을 때 보라가 노랑을 눌러 차분. 고레벨(18)선 투명 애쉬바이올렛으로 비침.
  · 라벤더 애쉬(청+애쉬 동시 보유) = 고채도. 버진모 톤업 시 주황·적색·미세노랑을 동시 중화. 위 두 애쉬(근본 잿빛)와 결이 다름(라벤더 쪽).
- 블루: 주황의 강보색. 어두운 그레이·무게감 한색.
  · 근본 블루 = 청자(청보라·미세) 부염료. 백모선 노랑 억제 위해 보라기 비침. 13레벨 황갈·주황 브라운서 스모키, 일반 애쉬보다 더 그레이. 강한 블루→브라운을 잿빛으로.
  · 잿빛 블루(블루+애쉬 결) = 차분한 잿빛 블루.
- 카키빛애쉬: 애쉬 + 그린빛. 청초·매트 방향 보강. 카키/그린 메인일 때 높은 레벨로(카키빛 애쉬 결). 순수 그린보다 중화력 있어 매트 방향의 실질 메인.
- 카키: 적색의 강보색. 순수 매트·올리브 메인.
- 회갈빛브라운: 약애쉬 가미 브라운(찬 계열). 빈 캔버스에 브라운 톤을 채우는 도구. 노랑 잔류 위에 브라운 염료를 덮어 베이지 방향 수렴 (보색 중화와 다른 메커니즘).
  ★ 약애쉬 가미 = 베이지 방향 톤 보정용. 적색 멜라닌 중화 기능 X.
    적색 멜라닌 중화는 애쉬·블루 메인 역할. 저공정(버진모·12~13·14레벨)에서는 한색 메인이 적색을 억제하고 자연 멜라닌이 베이스 톤 자체 제공해 잿빛 브라운·애쉬 브라운이 자연 구현.
    저공정 영역에서 회갈빛브라운 호출 = 톤 이중 쌓임 = 탁함.
    회갈빛브라운은 자연 멜라닌이 빠진 빈 캔버스(고공정 16·18레벨·백모) + 차고(쿨) 비치는 베이지 타겟에서만 호출.
- 난색 웜베이지(핑크 가미): 핑크·붉은기가 도는 따뜻한 베이지. 회갈빛브라운(찬)과 반대 축.
  ★ 자체가 핑크 가미 베이지 발색 = 베이지+핑크를 따로 안 쪼개도 한 재료로 표현됨. (2층 PM·퀀텀베이지 영역)
    자체 투명·발색이라 파스텔이어도 클리어 다량 불필요(약 자체가 시어).
    고공정(탈색모)=투명한 핑크베이지 / 저공정·버진모선=밑 난색 자산 비쳐 더 따뜻.
    노랑기 있으면 핑크 가미가 노랑을 눌러 베이지로 안착(핑크 CC 추가 불필요할 수 있음).
  ★ 베이지 갈림: 핑크·붉은기·따뜻함 보이면 → 난색 웜베이지 / 차고·재빛·쿨 보이면 → 회갈빛브라운. 둘 섞지 말 것.
- 내추럴 브라운(자연갈 캔버스): 적색이 깔린 동양인 자연 갈색. 약간 난색. 빈 캔버스를 자연 브라운으로 깔거나 보강하는 용도.
  · 11레벨↑ 또는 클리어 동반 → 붉은빛 소량 도는 웜베이지(탈색모에서 예쁨). 회갈빛브라운(찬)과 반대로 붉은빛을 살림.
  · 빈티지 = 내추럴 브라운 + 오렌지 컨트롤러(오렌지베이지브라운 느낌).
- 바이올렛: 노랑의 보색. 동양인 모발에서 적보라 아닌 난색 가까운 중성색.
  · 단독(순 바이올렛): 라벤더 방향 메인 (한색 아님, 중성)
  · 애쉬 바이올렛(바이올렛+애쉬 결): 차분한 보라. 고채도 쪽.
  · 청보라·네이비: 블루 메인 또는 블루+바이올렛 조합 (바이올렛만으론 청보라 안 나옴)
- 레드바이올렛: 보라빛 + 붉은기. 와인·로즈·깊이감 핑크 메인. 핑크 슬롯 = 레드바이올렛 + 핑크 컨트롤러 조합으로 발색.
- 레드: 연분홍빛 레드(선명한 정통 레드 아님). 부염료 핑크기. 단독은 약해 잘 안 씀 → 레드·핑크 컨트롤러와 혼합. 레드바이올렛·핑크 계열과 한 묶음.
- 핑크(레드바이올렛 계열): 직접적 핑크 발색. 핑크 슬롯 = 레드바이올렛 + 핑크 컨트롤러.
  ★ 딥레드·와인·체리(어두운 14레벨·채도 찐한 빨강)의 채도 보강은 레드로 한다. 핑크·바이올렛 직접염료는 언더톤이 밝아야(16↑·리프팅된 밝은 베이스) 발색됨 — 어두운 빨강 위에 핑크만 얹으면 안 뜬다. 레드를 본체/보강으로, 핑크는 밝은 베이스 갈래에서만 부로. 순 산화염모제로만 짠 딥레드는 레드 CC 10~20 소량이라도 얹어 채도 고정·퇴색 방지.
- 그린: 적색의 보색. 매트·카키 뉘앙스 메인. ★ 단독 그린은 거의 안 씀(그린이 여려 중화 거의 안 됨) — 예외로 높은 언더톤 + 그린 컨트롤러 다량일 때만. 평소엔 카키빛애쉬로 간다.
- 오렌지: 웜 발색 (구리·앰버·캐러멜). 적색 멜라닌과 협업. 색감 여려 단독은 약함 → 오렌지 컨트롤러로 실발색 보강. 빈티지 = 자연갈 브라운 + 오렌지 컨트롤러(오렌지베이지브라운 느낌). 채도 진한 오렌지일 때만 오렌지 염모제 선택(투명 난색은 컨트롤러가 실발색).
- 옐로우: 황금빛·허니 발색.

■ 컨트롤러 8종

- 블루 CC: 주황의 강보색. 12~13레벨 적갈색·주황 잔류 중화. 표면 얹기.
- 바이올렛 CC: 노랑의 보색. 소량 중화만 (쨍한 발색 없음).
- 애쉬 CC: 잿빛 얹기.
- 핑크 CC: 난색 뉘앙스 얹기. 백모·베이지 마무리.
- 그린 CC: 적색의 보색. 매트·카키 뉘앙스 보강.
- 오렌지 CC: 웜 뉘앙스 얹기.
- 레드 CC: 난색 얹기. 로즈·와인 발색 보강.
- 옐로우 CC: 황금빛·허니 얹기.

→ 위 12 + 8 + 보조재만 호출. 그 외 재료명 출력 시 자동 탈락.


══════════════════════════════
[M] 메타 원리 — 모든 판정의 위에 깔리는 일반 법칙
══════════════════════════════

■ [M1] 잔류 ↔ 보색 강도 매칭 법칙 (가장 결정적)

법칙: 잔류 색소 농도와 보색 재료 파워는 비례해야 한다.
→ 잔류 강 + 보색 강 = 정확한 중화
→ 잔류 강 + 보색 약 = 중화 부족, 잔류 노출
→ 잔류 약 + 보색 강 = 과중화, 반대 톤 폭발 (백모에 진바이올렛 → 보라기 폭발)
→ 잔류 약 + 보색 약 = 정확한 중화

왜냐하면: 보색은 잔류를 "덮는" 게 아니라 "상쇄". 1:1로 만나야 뉴트럴 수렴. 비대칭이면 강한 쪽이 노출.

적용:
- 진노랑(16레벨) → 바이올렛 염모제 + 바이올렛 CC
- 14 잔류 = 주황~황갈 폭. 14는 탈색 직전 가장 애매한 구간이라 적갈·주황이 디폴트지만 노랑기가 조금 더 보일 수 있다 (★ 그래도 노랑 본격은 16부터 — 14를 "노랑"이라 부르지 마라).
  · 디폴트(적갈·주황): recipes 2경로 — 주황을 한색 보색으로 억제. 어떤 결로 잡을지는 팔레트 보고 네가 골라라 (= 베이스→잔류→보색, [M1] 그대로. 약을 박지 마라).
  · base가 lv14면 recipes_y(노랑 황갈 갈래)도 반드시 낸다 — recipes(주황 디폴트)는 그대로 두고, recipes_y에 {label,slots,desc} 2경로를 추가. ★황갈 갈래의 결은 타겟 웜/쿨로 갈린다. (한색 타겟) 잿빛(애쉬)이 메인이고 보라가 부로 받치는 ash_lavender 중심, 또는 맑은 애쉬에 보라 소량(ash_silver 메인 + violet_pure trace) 같은 조합 — 잿빛 베이스에 보라가 살짝. ★보라가 메인인 결(violet_ash)은 보라 덩어리라 잿빛 메인에 얹지 마라(결 충돌). (난색 타겟: 와인·레드·로즈) 잿빛·라벤더(Sup.G 같은 잿빛 청보라)를 메인으로 끌어오지 마라 — 난색에 한색 메인을 얹으면 탁해진다. 메인 약은 난색 결에서 사진 보고 네가 추론해 골라라(레드/레드바이올렛/핑크 등 — 특정 약을 박지 마라), 레드 CC(sub 30%+)로 노랑기만 억제하라(붉은기·보라빛은 레드가 브라운과 어우러져 낸다 — 14브라운 자산선 바이올렛으로 보라빛 못 낸다). 두 경로는 약·결·비율을 실제로 다르게. lv14가 아니면 recipes_y 생략.
- 연노랑(18레벨) → 바이올렛 CC 소량 또는 핑크 CC 소량
- 부재(백모) → 핑크 CC 극소량 + 클리어 다량 희석

──────────────────────────────

■ [M2] 시간축 분리 법칙 — 리프팅과 색소 안착의 비대칭

법칙: 염색은 리프팅(멜라닌 분해) → 색소 안착의 2단계 시간축. 동시 경쟁하면 염료 손실.

왜냐하면:
1) 산화제 9%/12%가 멜라닌 분해 시작
2) 동시 투입 염료가 분해 중 자리에 안착해야 하는데
3) 멜라닌 미분해 + 적색 멜라닌이 한색 염료 우선 흡수
4) → 염료 소진 → 발색 실패

따라서:
- **버진모 고명도 단독 (1스텝)** = 시간축 경쟁 → 한색 브라운 수렴
  · 블루 단독 → 다크 쿨브라운 / 애쉬 → 매트브라운 / 바이올렛 → 라벤더브라운
  · "탈색 없이 선명 발현 불가"가 이 법칙 직접 결과
- **리프팅 후 재염색 (2스텝)** = 시간축 분리 → 염료 보존 → 선명 발색
  · 1스텝: 13·15레벨 + 9%/12%로 12~13레벨 리프트 (착색 X)
  · 2스텝: 일반 명도 염모제로 착색

──────────────────────────────

■ [M3] 적색 멜라닌 비대칭 법칙

법칙: 동양인 모발은 페오멜라닌(적색) 저항으로 한색-난색 시술이 비대칭.

왜냐하면: 유멜라닌은 먼저 분해되지만 페오멜라닌은 끝까지 남음. 한색 염료는 적색 멜라닌과 만나면 흡수·소진. 난색 염료는 같은 계열이라 충돌 없이 발색.

따라서:
- **유리**: 레드브라운·로즈브라운·와인빛 (난색은 버진모도 충분)
- **까다로움**: 밝은 애쉬·베이지·플래티넘 (적색 충분히 깨야)
- **버진모 한색 한계**: 라벤더·실버·백금발 불가. 쿨/매트브라운 수렴이 최선.

──────────────────────────────

■ [M4] 관찰 → 판정 → 재료 사슬 (역방향 시술 금지)

법칙: 사진 신호 → 베이스 판정 → 그 베이스에서 가능한 재료. 역방향(목표 색감명에서 베이스 결정) 금지.

왜냐하면: 같은 색감명도 베이스마다 다르게 발색. "애쉬브라운"은 8·14·16·18레벨 모두 가능.
→ 색감명 → 베이스 매칭은 카탈로그 함정.

──────────────────────────────

■ [M5] 염료 농도 ↔ 무게감 매칭 법칙

법칙: 같은 계열 재료라도 형식(밝은/중명도/어두운 톤, CC)에 따라 농도·무게감이 다름. 타겟 무게감과 매칭.

[a] 형식별 농도·역할 위계 → [P] 팔레트 참조

[b] 타겟 무게감·잔류 → 레벨(중화 강도) 선택
   - 자산 살리며 가볍게 / 잔류 약 → 높은 레벨(11·13, 약중화)
   - 뚜렷한 색감 / 잔류 중간 → 9 (강중화)
   - 깊고 어두운 발색 / 잔류 강 → 5·7 (가장 강한 중화)
   → 단일 레벨 강제 아님. 베이스·잔류 보고 레벨 고르고, 필요하면 믹스([P] 레벨 믹스).

[c] 베이스 영역 × 레벨 매칭 (+ brown 자산 "채움 vs 살림" 분기)
   - 18레벨·백모 (체인지 영역): 높은 레벨(11·13) 필수 — 흡수력 높아 낮은 레벨=폭발
   - 16레벨 (노랑·brown 자산 없음): brown "채움" 필요 → BC/회갈빛브라운/클리어애쉬로 채우며 + 애쉬 가미.
   - 14레벨 (황갈·brown 자산 있음): brown "살림" — 자연 자산 살리며 잔류만 미세 상쇄.
   - 버진모: 13·15레벨 리프팅용 필수

★ 같은 잿빛 브라운 타겟이라도: 16(자산 없음)=채움 / 14(자산 있음)=살림. 베이스에 brown 자산 있냐로 방법 갈림([M4]).

[d] 컨트롤러 단독 메인 호출 금지 — 항상 보조

[e] 시간축([M2]) × 명도 형식 결합 — 버진모 영역 전용

   (1) 버진모 고명도 1스텝
      · 13·15레벨 (리프팅용) + CC + 산화제 9%/12%
      · 시간축 경쟁이라 중명도 메인 호출 시 염료 손실
      · 13·15레벨이 리프팅 담당, CC가 색감 담당으로 역할 분리

   (2) 고명도 리프팅 후 재염색 2스텝
      · 1차: 13·15레벨 (리프팅용) + 9%/12% — 착색 X
      · 2차: 중명도 염모제 (메인) + CC (보조)
      · 1차에 중명도 호출 = 염료 손실 / 2차에 13·15레벨 = 염료 부족

   → 이 (1)(2) 결합은 [K1] 1·2번 경로에서 자동 발동. 다른 결합 금지.

[g] 메인·보조·CC 역할 분리

   · **메인 염모제** = 색감 표현 + 농도. 1순위 표현.
   · **보조 염모제 (보색 메인)** = 잔류 강 + 보색 강 필요한 14·16레벨에서. CC만으론 부족할 때.
     예: 16레벨 블루 메인 + 바이올렛 메인 보조 = 노랑 잔류 강하게 중화하면서 한색 발색.
   · **컨트롤러** = 표면 가미 (3가지 역할 — 디자이너 선택)
     A. 보색중화 보조 / B. 같은 계열 가미 / C. 채도 강화
   · **어두운 톤 메인** = 색감 + 농도 + 잔류 흡수 동시
     [P] (3) 어두운 톤은 염료+브라운 농도 가장 큼. 브라운 베이스가 잔류 노랑·주황 자체 흡수 → 보색 보조 약해도 깊이감+중화 동시 확보. 단 비비드 타겟엔 부적합.

[K1] 베이스 축 — 공정 5단계
══════════════════════════════

■ ★★ 추론 골격 (최상위) — 희망색 = 언더톤 × 틴트
- 화면의 결과색은 "베이스에 깔린 잔류(언더톤)" 와 "그 위에 얹는 염료(틴트)" 의 곱이다. 둘 중 하나만 보면 틀린다.
  · 언더톤 = 못 고름. 탈색 단계가 정함(아래 멜라닌 순서). 명도 숫자(염료 농도)는 이 언더톤 깊이가 정한다(깊을수록 낮은 숫자=강중화).
  · 틴트 = 고름. 목표 발색을 내는 메인 재료 + 보색 방향. 디자이너 의도.
- 추론 사슬(이 순서 고정):
    ① 메인 색감 판정(희망색=원하는 발색) → ② 도달 언더톤(이 색 내려면 몇 레벨까지 빼나) → ③ 그 언더톤 조건(깔린 잔류=빨강/주황/노랑/없음)
    → ④ 색감·명도 선택(틴트=메인재료+보색방향 / 명도숫자=③ 언더톤 깊이) → ⑤(2층 코드)회사 넘버 변환 → ⑥ 레시피 3가지 나열.
- ★ 중화만 하면 깨끗한 베이스로 끝난다. 희망색(틴트)이 반드시 그 위에 얹혀야 한다. "언더톤 처리(②③명도·보색)" 와 "목표 발색(①④틴트)" 둘 다 출력에 들어가야 함.

■ 탈색 순서 = 멜라닌 분해 순서
검정(버진) → 적갈색(12~13) → 주황(14) → 노랑(16) → 연노랑·아이보리(18) → 백모(부재)

■ 공정 5단계 (라벨 고정)

1·2번은 모두 "탈색 0회"지만 [M2] 시간축으로 갈라짐.

1. **버진모 고명도 테크닉 (탈색 없이 시술)**
   - 13·15레벨 + CC + 9%/12% 1스텝
   - 시간축 경쟁 → 한색 브라운 수렴, 가벼운 가미

2. **고명도 리프팅 후 재염색 (12~13레벨 · 적갈색~주황기 잔류)**
   - 1차: 13·15레벨 + 9%/12% / 2차: 중명도 염모제 + CC. 2스텝
   - 시간축 분리 → 선명 발색

3. **14레벨 (황갈 브라운 · 멜라닌 따라 갈림 — 탈색 1회 아님. 탈색하면 15↑, 리프팅 후 밴드)**
   - 단정 금지: 중립~황색 멜라닌 브라운(주황 적음) / 주황기 도는 브라운. 노랑 거의 없음 → 노랑·바이올렛은 16부터.
   - 한색 강도 매칭: 애쉬·블루는 같은 주황-보색 축, 강도 차이. 미세 잿빛(브라운 자산 위)→애쉬(애쉬브라운), 진한 잿빛·스모키→블루, 그 사이→애쉬+블루 소량. "잿빛 보이면 무조건 블루" 금지.
   - 과중화 원리: 잔류 약한데 보색 세게=탁해짐. 주황 적으면 애쉬, 더 돌면 블루 10%미만. 강도는 디자이너 선택으로 설명에 나열.
4. **탈색 2회 이상 (16레벨 · 노랑기 잔류)**
5. **탈색 3회 이상 (18레벨 · 연노랑~아이보리 · 잔류 거의 없음)**

■ 레벨별 3영역 ([M1] 강도 매칭의 영역 분기)

- **중화 영역 — 14~16레벨 (잔류 강)**
  · [M1] 잔류 강 → 보색 강 → 보색 메인 + 보색 CC
  · 16레벨 비비드·파스텔: 파워 그대로 (클리어 희석 금지 — K3 결정 트리)

- **색 조합 영역 — 18레벨 연노랑~아이보리 (잔류 약)**
  · [M1] 잔류 약 → 보색 약 → CC 가미 또는 생략
  · 바이올렛·블루는 "중화"가 아니라 "색 조합"으로 호출

- **체인지 영역 — 18레벨 미색·백모 (부재)**
  · [M1] 부재 → 보색 극소량 + 클리어 다량 희석
  · "색 얹기"가 아니라 "뉘앙스 체인지"
  · 판정 신호: 염료 무게감 없는 미색·크리미·밀키 지배

■ 명도 표기 규칙 (레벨 직접)
- 재료에 레벨을 직접 붙여 표기: "11레벨 ○○ 염모제" / "9레벨 ○○ 염모제" 등
- 18레벨·백모 = 높은 레벨(11·13, 염료 적음)
- 버진모 1단계 리프팅 = "13·15레벨 ○○ 염모제 (리프팅용)" + 9%/12%
- CC에 레벨 접두사 없음 (CC는 레벨 개념 없는 표면 직접염료)

[K2] 동양인 모발 원리 — 적색 멜라닌
══════════════════════════════

■ 한색 vs 난색 비대칭

한색 염료(애쉬·블루·바이올렛) ↔ 적색 멜라닌: 보색 → 흡수·소진 → 충분히 깨야 표현
난색 염료(레드·핑크·레드바이올렛) ↔ 적색 멜라닌: 같은 계열 → 협업 → 버진모도 표현

■ 버진모 한색 시술

[작동] 애쉬 염모제 + 블루 CC → 쿨/매트브라운 수렴 (라벤더·실버·백금발 아님)
[비작동] 회갈빛브라운 + 한색 단독 (보색 기능 없음 → 적색 억제 불가 → 탁한 브라운)
[비작동] 라벤더·실버·백금발 (적색 멜라닌이 흡수 → 탈색 필수 가이드)

■ 버진모 난색 시술

[작동] 레드바이올렛·레드·핑크 + 회갈빛브라운. 적색 멜라닌과 협업 → 깊은 발색.

■ 저공정 2경로 (브라운·주황 잔류 활용)

(a) **12~13레벨 리프트 후 2차 착색** (= K1 2번)
   - 시간축 분리 = 선명 발색
   - 1차: 13·15레벨로 적갈색~주황 베이스 / 2차: 중명도 + 보색 비율 조절
   - 결과: 선명, 무게감

(b) **버진모 고명도 1단계** (= K1 1번)
   - 시간축 경쟁 = 가볍게
   - 13·15레벨 + CC + 9%/12% 1회
   - 결과: 가볍게 가미, 반사빛 빠름

■ 저공정 보색 옵션 (버진모·12~13레벨 한정)

원리: 적색 자산 강한 저공정에서는 카키류·그린 CC 호출해도 올리브 변질 위험 낮음.

[기본 — 잿빛 강·무게감] 애쉬 염모제 + 블루 CC 소량
[옵션 — 잿빛 약·청초·투명빛] 짝 중 하나 선택 (동시 호출 금지):
  A. 카키빛애쉬 메인 + 애쉬 CC 소량
  B. 애쉬 메인 + 그린 CC 소량

★ 14레벨 = 옵션 A·B 비활성. 적색 자산 빠진 + 그린 = 올리브 변질 위험. [기본] 단일.

■ 애쉬 + 적색 멜라닌 자연 반응

원리: 애쉬가 주황 잔류 중화 중 적색 일부와 만나 부산물로 보라빛 살짝 발현. 모질 차이 결과물 — **추가 계열 신호 아님**.

해석 분기 ([M6][a] 부가 뉘앙스 처리와 연결):
- **미세·부분·뉘앙스 ([M6] 부가)**: 애쉬로 해결. 난색(레드바이올렛·바이올렛·핑크) 추가 금지. 추가 시 자연+인공 = 보라기 폭발.
- **전체 색감 지배 ([M6] 메인)**: 그때만 바이올렛·레드바이올렛 추가.

★ 블루로 보라기·로즈빛 유도 금지. 블루는 주황의 보색이지 보라 경로 아님.

■ 딥 난색 테크닉 (3성분 필수)

원리: 깊이·보라빛·채도가 동시에 지배적인 난색 타겟은 단일·2성분으로 평범한 와인·로즈로 수렴.

[작동 — 리프팅 후 재염색 권장]
- 깊은 보라빛 와인: lv14 브라운 자산(리프팅 1회 포함)에선 레드 계열(레드·레드바이올렛 — 결 보고 추론) 메인 + 레드 CC(sub 30%+)로 낸다 — 레드가 브라운과 어우러져 보라빛 와인이 자연 발색하고 레드 CC가 노랑기만 억제(붉은기·보라빛 살림). 바이올렛 CC로 보라·깊이를 직접 내는 건 16+ 빈 도화지(탈색 충분)에서만 — 14브라운 자산선 바이올렛 발색이 약해 탁해진다.
- 깊은 체리 와인·딥레드: 레드 + 레드 CC + 블루 CC 소량 (블루 CC가 적갈색 잔류 억제)

[비작동] 탈색 1회 이상 = 적색 자산 소실 → 평범한 레드 수렴.

[K3] 보색 + 클리어 — 강도 매칭의 적용

■ 보색 공식 (절대 규칙)
- 노랑 잔류 → **바이올렛**
- 주황 잔류 → **블루**
- 빨강 잔류 → **그린**

■ ★ 보색의 2채널 위계 (누가 중화하나 — 보색 공식보다 먼저 판단)
원리: 보색 중화는 두 채널로 일어난다. 어느 채널인지 먼저 가른 뒤 공식을 적용한다.
  ① 1차 = 메인 재료 자체 부염료 (틴트 안에 보색이 내장된 "완성형" 재료):
     · 난색 웜베이지(PM·Qua.B) = 핑크+소량 애쉬(한색) 내장 → 노랑을 자체로 먹는다.
     · 베이지코튼(BC) = 미세 보라 내장 → 노랑을 자체로 먹는다.
     → 이 재료가 메인이면 보색 CC를 반사적으로 추가하지 않는다. 핑크 등 "같은 계열" CC 가미는 용인(틴트 강화), 보색(바이올렛) 중첩은 과중화·탁([M1]).
  ② 2차 = 컨트롤러 — ①의 자체 부염료가 노랑에 소진되고도 "다른 잔여색이 여전히 선명하게" 남을 때만 보조로 호출.
  ★ NB·CB(난색브라운)는 그 자체가 따뜻한 브라운 발색 → 노랑/주황을 "중화 대상"이 아니라 목표색의 일부로 살린다. 보색(바이올렛·블루) 넣지 마라 — 채우기(난색)와 중화(보색)는 반대 동작이라 충돌하면 적갈빛으로 탁해진다(난색이 더해져 상쇄 안 됨). 예: 빈티지 오렌지 = NB + 오렌지 CC 소량이지 바이올렛 아님.
  ★ 색파워 원리: 주황·적색·노랑을 "중화"하려면 반대색(블루·그린·바이올렛)을 넣는다 — 브라운은 중화제가 아니다(난색이라 더해져 적갈로 탁). 브라운은 그 색으로 "채우는" 용도지 중화 용도가 아니다.
  → 갈림: 노랑/주황이 (a) 없앨 잔류냐 → 보색 CC. (b) 목표색의 일부(따뜻하게 갈 때)냐 → 보색 X, 그 색으로 채움. PM/BC는 보색 내장이라 어차피 바이올렛 X, NB/CB는 따뜻하게 채우는 거라 바이올렛 X. "16레벨 노랑이니 무조건 바이올렛"은 금지.


■ 보색 적용 영역 (K1 3영역 + [M1] 매칭)

| 영역 | 잔류 | 보색 | 형식 |
|---|---|---|---|
| 중화 영역 (14~16) | 강 | 강 | 보색 메인 염모제 + 보색 CC |
| 색 조합 영역 (18) | 약 | 약 | CC 가미 |
| 체인지 영역 (18 미색·백모) | 부재 | 극소 | CC 극소량 + 클리어 다량 |

■ 보색 강도 매칭
- 잔류 강 → 보색 메인 염모제 + CC
- 잔류 약 → CC만 소량
- 2종 잔류 (주황+노랑) → 주 잔류 보색 메인 + 부 잔류 보색 소량 병용

→ 엉뚱한 보색 (노랑에 블루, 주황에 바이올렛) = 변질.

■ 잔류 불확실성 헤지 룰 — 한색·난색 비대칭

[한색 메인 — CC 헤지 권장]
원리: 한색은 적색·잔류와 충돌 → 흡수·소진 → 농도 부족 위험.
- 14레벨 + 어두운 한색 (스모키·다크 매트) → 같은 계열 CC 소량 보강 권장
  · 어두운 톤의 블루 + 애쉬 + 블루 CC 소량
  · 어두운 톤의 카키 + 그린 CC 소량
- 16레벨 + 어두운 한색 → CC 보강 선택사항
- 18레벨 한색 → CC 추가 = [M1] 위반 (잔류 약 + 강보색 = 폭발). 비활성.

[난색 메인 — CC 헤지 비권장 ⚠️]
원리: 난색은 적색과 협업 → 메인만 충분 → 같은 계열 CC 추가 = 시뻘게짐.
- 14·16레벨 + 어두운 난색 → 같은 계열 CC 헤지 금지
- 단 [K2] 딥 난색 3성분의 보색 CC(블루·그린)는 별개 — 깊이감·채도 강화

[중성 메인]
- 회갈빛브라운 메인 → 보색 CC 처리만. 같은 계열 CC 금지.
- 바이올렛 메인 → 바이올렛 이중 성격 룰 우선.

→ 헤지는 "한색 메인 + 14·16레벨 + 어두운/딥/스모키" 동시 매칭 시만. 다른 케이스 비활성.

■ 바이올렛의 이중 성격

원리: 바이올렛은 색상환적으로 중성색이지만, 동양인 모발 맥락에서는 [M3]에 의해 난색으로 기울어진 중성색.

**작동 조건 — "노랑 없으면 중화 없음":**

작동 (노랑 잔류 있음):
- 16·18레벨: 중화 작동 → 뉴트럴 수렴

비작동 (주황·적색 잔류 = 난색 발색 위험):
- 14레벨: 호출 X. 주 보색 = 블루.
- 12~13레벨 2차 착색: 적색 만나 난색 발색
- 버진모: 적색 만나 난색 발색

**예외 — 1스텝 리프팅 중 혼합 중화:**
산화제 9%/12%가 노랑기까지 리프팅하는 중간에 함께 투입된 바이올렛이 노랑 생성 순간 중화. 시간축 맞물림.
→ 버진모 1스텝·12~13 리프팅 1차: 바이올렛 허용.
→ 12~13 2차 착색: 바이올렛 금지.

■ 변질 경로

| 잔류 | 단독 재료 | 결과 |
|---|---|---|
| 노랑 | 블루 | 카키·그린 (순수 잿빛 타겟이면 변질, 청초 타겟이면 활용) |
| 노랑 | 애쉬 | 매트·올리브 (어두운 염모제일수록 매트 강) |
| 노랑 | 레드 | 채도 낮은 주황·코퍼 |
| 주황 | 애쉬 | 탁한 쿨브라운 (보색 보강 필요) |
| 적색 | 애쉬 | 보라기·로즈 (자연 부산물 — 미세면 허용, 지배면 계열 추가) |

★ 부가 앵커 — 동양인 모발 적색 멜라닌 활용:
1~14레벨 모발은 적색~주황 멜라닌이 부분적으로 존재한다.
이 잔류·자산이 한색·매트 보색(블루·애쉬·그린)의 흡수·완충재 역할을 하므로,
적절한 영역에서 한색·매트 도구를 메인 또는 보색으로 활용 가능하다.
- 메인 활용: 애쉬·블루·카키·카키빛애쉬 염모제 (베이스 잔류 + 자산이 베이스 톤 자체 제공)
- 보색 활용: 블루·그린 컨트롤러 (잔류 종류와 메인 채널 매칭)

★ 주황 잔류 보색 선택은 메인 색감의 채널을 따른다:
잿빛·쿨 메인 → 블루(주황의 강보색) / 카키·매트·올리브 메인 → 그린(적색의 강보색이 주황도 함께 흡수)
★ 단 부가 뉘앙스에 다른 채널이 동급으로 살아있으면 부가 채널 보색을 소량 추가 가능
(예: 잿빛 메인 + 카키 부가 + 윤기·투명감 → 블루 + 그린 소량 협업).

■ 보색·브라운 사용 차원 분리

원리: 같은 노랑 잔류에서도 결과 색감 방향이 다르다.
- 바이올렛(보색): 노랑 중화 + 한색 강화 → 보라·라벤더·잿빛 방향
- 회갈빛브라운(브라운): 노랑 위에 브라운 덮음 → 베이지 무채화

같은 노랑 영역(16·18·백모)이라도:
- 한색 타겟(잿빛·애쉬·라벤더 우세) → 바이올렛 + 한색 메인
- 베이지 타겟(베이지·밀크·크리미 우세) → 회갈빛브라운 메인

베이지 타겟에 "애쉬 + 바이올렛" 우회 = 잿빛 방향, 베이지 안 나옴.
잿빛 타겟에 "회갈빛브라운 + 한색" 우회 = 베이지 섞인 톤, 깨끗한 잿빛 안 나옴.

★ 두 도구 동시 호출 = 색상 두 번 죽임 = 잿빛 깊이 사라짐.

■ 자연 멜라닌은 베이스 톤 (저공정 한색 시술)

원리: 저공정(버진모·12~13·14)에서는 자연 멜라닌이 살아있어 베이스 톤 자체 제공.

이 영역에서 한색 메인이 적색 멜라닌을 억제하면, 자연 멜라닌이 베이스로 남아 "잿빛 브라운"·"애쉬 브라운" 자연 구현.

이 영역에서 회갈빛브라운 호출 = 톤 이중 쌓임 = 탁함. 적갈색·주황 잔류가 강해 회갈빛브라운의 노랑 덮기 효과 못 잡음 → 잔류 노출.

→ 회갈빛브라운은 "자연 멜라닌이 빠진 빈 캔버스 + 베이지 타겟"에서만 호출.
   고공정(16·18·백모) + 베이지 타겟이 진짜 호출 영역.

★ 저공정의 "차분한 브라운 + 균일한 잿빛" = 자연 멜라닌 + 한색 메인 결과.
   사진의 균일성·차분함으로 회갈빛브라운 호출 추론 = 무효.

■ 클리어 희석 — 단일 결정 트리

원리: 클리어 = 염료 없는 염모제. "클리어 희석" = 염료 총량 줄임. CC는 리프팅 못 함.

★ 결정 순서:

질문 1: 베이스 영역?
- 백모·미색 (체인지 영역) → 클리어 무조건 포함 (다량)
- 18레벨 (K1 5번 · 색 조합 영역) → 클리어 무조건 포함 (다량, 모든 색감 동일)
- 14·16레벨 (중화 영역) → 클리어 금지 (보색에 파워 소진)
- 12~13레벨 / 버진모 → 클리어 금지 (잔류 활용)

원리: K1 5번 = 파스텔·극저채도 영역. 18레벨 흡수력 폭발 → 풀파워 = 무게감 폭발.

이 트리만 따른다.

| 무게감 없음 + 채도 있는 발색 | 16레벨 (중화 영역 비비드·파스텔) |
| 무게감 없음 + 채도 없는 맑은 가벼움 | 18레벨 (색 조합 영역) |

[자연 브라운 윤기·빛반사] = 18레벨 신호 X. 무게감 있으면 윤기 투명감.
[염료 부재] = 18레벨 신호. 무게감 없음과 동반.
→ 헷갈리면 1축 우선.

■ 관찰 3축 — 보색중화 흔적

- **탁함·수렴된 브라운·무거움** = 중화 많이 들어간 저탈색
- **투명감·선명함·맑음 살아있음**:
  · 잔류 적은 고탈색(16·18): 보색 거의 안 들어감 → 청초·투명
  · 저공정 청초(버진모·12~13 카키 리프팅 + 애쉬, 또는 애쉬 + 그린 CC): 적색 자산 활용
  · 분기: 무게감·윤기 함께 = 저공정 청초 / 무게감 없음 = 고탈색

→ "투명 네이비"는 14레벨 불가 (탁한 스모키로 귀결).

1) 가장 면적·명도·채도 지배 색감 = 메인
2) 부분적·미세 뉘앙스 = 부가
3) 1차 분석 표기와 자체 관찰 비교
4) 어긋나면 사진 자체 우선 + reasoning에 명시

async function callLLM(_apiKeyIgnored, _modelIgnored, maxTokens, systemText, userContent){
  let res;
  try{
    res = await fetch("/api/review-vertex", {
      method:"POST",
      headers:{ "content-type":"application/json" },
      body: JSON.stringify({ systemText:systemText, userContent:userContent, maxTokens:maxTokens })
    });
  }catch(e){ throw new Error("서버 연결 실패 — Vercel에 배포된 상태에서 접속했는지 확인 ("+(e.message||e)+")"); }
  let data; try{ data = await res.json(); }catch(e){ throw new Error("서버 응답 파싱 실패 (HTTP "+res.status+")"); }
  if(!res.ok) throw new Error(data && data.error ? data.error : ("API "+res.status));
  const txt = data.text || "";
  const finish = data.finishReason;
  if(!txt){
    if(finish==="MAX_TOKENS") throw new Error("응답 잘림(MAX_TOKENS) — maxOutputTokens 부족");
    throw new Error("빈 응답 (차단/출력 없음"+(finish?" · "+finish:"")+")");
  }
  if(finish==="MAX_TOKENS") throw new Error("응답이 토큰 한도에서 잘림(MAX_TOKENS) — maxOutputTokens 올려야 함");
  return txt;
}
function extractBalancedJSON(s){
  const i = s.indexOf("{"); if(i<0) return null;
  let depth=0, inStr=false, esc=false;
  for(let k=i;k<s.length;k++){
    const c=s[k];
    if(inStr){ if(esc){esc=false;} else if(c==="\\"){esc=true;} else if(c==='"'){inStr=false;} continue; }
    if(c==='"'){ inStr=true; continue; }
    if(c==="{") depth++;
    else if(c==="}"){ depth--; if(depth===0) return s.slice(i,k+1); }
  }
  return null; // 닫는 } 못 찾음 = 잘림
}
function parseJSON(txt){
  txt = (txt||"").replace(/\`\`\`json|\`\`\`/g,"").trim();
  const block = extractBalancedJSON(txt);
  if(!block) throw new Error("JSON 파싱 실패 — 응답이 잘렸거나 닫는 괄호 없음(토큰 초과 의심)");

      var cands = null;
      var fineObj = resolveFine(brandKey, item.dye, lineKey, lineMap);   // ★ 결 키면 특정 약으로
      if(fineObj){ cands = [fineObj]; }
      else if(dyePool){ cands = dyePool[lineKey] || dyePool[Object.keys(dyePool).filter(function(k){return k!=="CC";})[0]]; }
      if(!cands||!cands.length){ out.push({role:item.role,missing:true,dyeLabel:item.dye,line:lineKey}); return; }
      // 명도(레벨) 미정 — 2층이 약 선택 후 따로 결정(별도 설계). 레벨 표/클램프/파스텔캡 비활성.
      var usable = cands.map(function(p){
        var lv = null, blocked=null;
        if(lineKey==="LOOK" && dict.satColorsLOOK.indexOf(p.code)>=0 && lv!=null && lv<9 && !p.lowLevelOK && !p.fixedLevel)
          blocked = "R1 · LOOK 채도색 9레벨 미만 비활성";
        return Object.assign({},p,{lv:lv,blocked:blocked});
      });
      var primary = usable.filter(function(p){return !p.blocked;})[0] || usable[0];
      // ★ 고정 딥약(블루블랙)은 블랙커런트류 딥난색에서만 — 같은 경로에 레드 본체가 있을 때만 발동. 한색 깊이는 일반 약을 저레벨(오센틱 5·7)로 깐다(아래 levelFor).
      var isAccentSlot = (item.ratio==="sub"||item.ratio==="small"||item.ratio==="trace");
      var hasRedMain = out.some(function(o){ return o.role!=="cc" && o.role!=="clear" && !o.missing &&
        [o.ju,o.bu,o.code].some(function(x){ return x && /레드|빨강|와인|체리|마룬|RED|WINE/i.test(x); }); });
      if(isAccentSlot && (item.depth==="deep"||item.depth==="dark") && hasRedMain){
        var deepCand = usable.filter(function(p){return !p.blocked && p.fixedLevel!=null;})[0];
        if(deepCand) primary = deepCand;
      }
      var alts = usable.filter(function(p){return p!==primary;});
      var promote = null;
      if(primary.promote) promote = item.is_main_color ? {open:true,path:primary.promote.path} : {open:false,when:primary.promote.when};
      out.push({ role:item.role, level:(primary.fixedLevel!=null ? primary.fixedLevel : levelFor((CODE_LINE[brandKey]&&CODE_LINE[brandKey][primary.code])||lineKey, item.depth, abstract.base, item.ratio)), code:primary.code, name:primary.name, roleLabel:item.roleLabel||null,
        ju:primary.ju, bu:primary.bu, tex:primary.tex, ratio:RATIO_BAND[item.ratio]||"", line:lineKey,
        confirmed:primary.confirmed!==false, nuance:item.nuance||null, blocked:primary.blocked,
        alts:alts.map(function(a){return {label:a.code,name:a.name,tex:a.tex,confirmed:a.confirmed!==false};}),
        promote:promote });
    });
    return out;
  }

  /* ── 인접 바구니 맵 (조합 변형용 — 편집 가능) ── */
  var ADJACENT = {
    warm_beige:"brown_canvas", beige_brown:"warm_beige", brown_canvas:"warm_beige",
    ash:"khaki_ash", khaki_ash:"ash", blue:"ash",
    ash_violet:"ash",
    violet:"red_violet", red_violet:"pink", pink:"red_violet"
  };
  function recipeSig(mapped){
    return mapped.filter(function(m){return !m.missing;})
      .map(function(m){return (m.level||"")+(m.code||"")+(m.role||"")+(m.ratio||m.band||"");}).join("+");
  }
  function cloneAbs(o){ return JSON.parse(JSON.stringify(o)); }
  /* ── LLM이 사고해서 뱉은 레시피 경로(최대 2개)를 그대로 회사 넘버로 번역만 한다 (코드가 변형 안 지어냄) ── */
  function mapLLMRecipes(abstract, brandKey){
    var out = [], seen = {}, usedCodes = {};
    var paths = (abstract && abstract.paths && abstract.paths.length) ? abstract.paths
              : [{label:"권장", desc:"", recipe:(abstract&&abstract.recipe)||[]}];
    paths.slice(0,(abstract&&(abstract.base==="lv16"||abstract.base==="lv18"))?3:2).forEach(function(p, i){
      var absP = { base:abstract.base, chroma:abstract.chroma, weight:abstract.weight, recipe:p.recipe||[] };
      var mapped = mapRecipe(absP, brandKey);
      if(!mapped.some(function(m){return !m.missing;})) return;   // 전부 비면 버림
      // ★ 청소: 완전히 동일한 레시피(약+명도+역할+비율 전부 같음)만 제거. 컨트롤러·부염모제·
      //   명도(메인반사/부반사)·비율이 다르면 정당한 다른 길 → 살린다(나열 보존, 골라쓸 폭 확보).
      var sig = recipeSig(mapped);
      if(seen[sig]) return;
      seen[sig] = true;
      mapped.forEach(function(m){ if((m.role==="main"||m.role==="sub") && m.code) usedCodes[m.code]=true; });
      out.push({ label:p.label || (i===0?"권장":"대안"), meta:p.desc||"", reason:p.reason||null, base:abstract.base, chroma:abstract.chroma, mapped:mapped });
    });
    return out;
  }

  function detectDye(s){
    if(/회갈빛\s*브라운/.test(s)) return "beige_brown";
    if(/난색\s*웜?\s*베이지|웜\s*베이지|핑크\s*가미|핑크\s*베이지/.test(s)) return "warm_beige";
    if(/플럼/.test(s)) return "warm_beige";
    if(/카키빛\s*애쉬/.test(s)) return "khaki_ash";
    if(/레드바이올렛/.test(s)) return "red_violet";
    if(/카키/.test(s)) return "khaki_ash";
    if(/애쉬/.test(s)) return "ash";
    if(/블루/.test(s)) return "blue";
    if(/바이올렛|보라/.test(s)) return "violet";
    if(/핑크/.test(s)) return "pink";
    if(/와인|레드/.test(s)) return "red";
    if(/그린/.test(s)) return "green";
    if(/오렌지|구리|앰버|코퍼|캐러멜/.test(s)) return "orange";
    if(/옐로우|허니|골드|황금/.test(s)) return "yellow";
    if(/브라운|자연갈|베이지/.test(s)) return "brown_canvas";
    return null;
  }
  function detectWeight(s){ if(/밝은\s*톤/.test(s)) return "light"; if(/어두운\s*톤/.test(s)) return "dark"; return null; }
  function detectChroma(analysis){
    var els=(analysis&&analysis.elements)||[];
    var j=els.join(" ")+" "+((analysis&&analysis.description)||"")+" "+((analysis&&analysis.color_name_ko)||"");
    if(/비비드|선명|채도\s*높/.test(j)) return "vivid";
    if(/파스텔|뽀얀|연한|밀키|크리미|미색/.test(j)) return "pastel";
    return "mid";
  }
  // ── 공용 계열 키 화이트리스트 (slots.family 검증) ──
  var FAMILY_KEYS = {ash:1,ash_violet:1,blue:1,violet:1,beige_brown:1,warm_beige:1,brown_canvas:1,
                     khaki_ash:1,red_violet:1,red:1,pink:1,green:1,orange:1,yellow:1,white:1,
                     // 결(텍스처) 키 — LLM이 직접 결을 골라 다양한 레시피를 낼 수 있게
                     ash_silver:1,ash_violet_tint:1,ash_lavender:1,blue_ash:1,blue_smoky:1,blue_black:1,
                     violet_pure:1,violet_ash:1,brown_matte:1,warm_beige_sheer:1,warm_beige_rich:1};

  /* ── 1순위: 구조화 slots → recipe (정규식 0, 환각 0) ── */
  function slotsToRecipe(slots){
    if(!Array.isArray(slots)) return null;
    var recipe=[], mainSeen=false;
    slots.forEach(function(s){
      if(!s || typeof s!=="object") return;
      var role = s.role;
      if(role==="oxidizer") return;                       // 산화제는 프론트가 별도 처리, 매핑 제외
      if(role==="clear"){ recipe.push({role:"clear", dye:null, ratio:s.ratio||"sub", roleLabel:s.roleLabel||null}); return; }
      var fam = s.family;
      if(!fam || !FAMILY_KEYS[fam]) return;               // 미지 계열 = 버림(억지 매핑 안 함)
      if(role!=="main" && role!=="sub" && role!=="cc"){    // role 누락 시 등장순으로 추정
        role = mainSeen ? "sub" : "main";
      }
      var lvl = (typeof s.level==="number") ? s.level : null;
      var item = { role:role, dye:fam, nuance:s.nuance||null,
                   roleLabel: s.roleLabel||null,
                   depth: s.depth||null,
                   llmLevel:null,
                   ratio: s.ratio || (role==="cc"?"small":(mainSeen?"sub":"main")),
                   is_main_color: (role==="main") };
      if(role==="main"||role==="sub") mainSeen=true;
      recipe.push(item);
    });
    return recipe;
  }

  /* ── 폴백: 옛 자유문자열 materials → recipe (구버전 출력 호환) ── */
  function materialsToRecipe(mats){
    var recipe=[], mainSeen=false;
    (mats||[]).forEach(function(m){
      if(typeof m!=="string") return;
      if(/산화제/.test(m)) return;
      if(/리프팅용|13·15레벨/.test(m) && !detectDye(m)) return;
      var role = /클리어/.test(m) ? "clear" : (/컨트롤러|컨트롤러|\bCC\b/.test(m) ? "cc" : (mainSeen?"sub":"main"));
      if(role==="clear"){ recipe.push({role:"clear",dye:null,ratio:"sub"}); return; }
      var dye = detectDye(m); if(!dye) return;
      var w = detectWeight(m);
      var lvMatch = m.match(/(\d{1,2})\s*레벨/);
      var llmLevel = lvMatch ? parseInt(lvMatch[1],10) : null;
      var item = { role:role, dye:dye, nuance:null, llmLevel:llmLevel,
        ratio: role==="cc"?"small":(mainSeen?"sub":"main"), is_main_color:(role==="main"&&!mainSeen) };
      if(w) item.weight=w;
      if(role!=="cc" && !mainSeen) mainSeen=true;
      recipe.push(item);
    });
    return recipe;
  }

  // slots 우선, 없으면 materials 폴백
  function blockToRecipe(block){
    if(!block) return [];
    var r = slotsToRecipe(block.slots);
    if(r && r.length) return r;
    return materialsToRecipe(block.materials);
  }

  function mapHedge(abstract, brandKey){
    var h = abstract && abstract.hedge; if(!h) return null;
    var lineMap = LINE_OF[brandKey], dict = BRANDS[brandKey];
    var lineKey = (abstract.chroma==="vivid")?lineMap.vivid:lineMap.other;
    var items = (h.add||[]).map(function(a){
      var fam = a && a.family;
      var obj = (fam && FAMILY_KEYS[fam]) ? resolveFine(brandKey, fam, lineKey, lineMap) : null;
      if(!obj && fam){
        var dp = dict.dye[fam];
        if(dp){ var k = dp[lineKey] ? lineKey : Object.keys(dp).filter(function(x){return x!=="CC";})[0];
                var arr = dp[k]; if(arr && arr.length) obj = arr[0]; }
      }
      return { code: obj?obj.code:null, name: obj?obj.name:null, family:fam, note:(a&&a.note)||"" };
    }).filter(function(x){ return x.code; });
    if(!items.length) return null;
    return { when:(h.when||""), how:(h.how||""), items:items };
  }

  function v1ToAbstract(raw, analysis){
    if(!raw) return null;
    var base = raw.base || "lv16";
    if(base==="lv12_lift") base = "lv14";   // ★ 12~13 리프팅 후는 14레벨 브라운 밴드로 합침
    var VALID_CH = {vivid:1,mid:1,pastel:1};
    var chroma = (raw.chroma && VALID_CH[raw.chroma]) ? raw.chroma : detectChroma(analysis);
    var chromaFromLLM = !!(raw.chroma && VALID_CH[raw.chroma]);

    var VALID_W = {light:1,mid:1,dark:1};
    var weight = (raw.weight && VALID_W[raw.weight]) ? raw.weight : (function(){
      if(chroma==="pastel") return "light";
      if(chroma==="vivid") return "dark";
      return "mid";
    })();
    var weightFromLLM = !!(raw.weight && VALID_W[raw.weight]);

    // ★ LLM이 사고해서 뱉은 레시피 경로들 (recipes 배열). 옛 출력(main 단독) 호환.
    var blocks = [];
    if(Array.isArray(raw.recipes) && raw.recipes.length) blocks = raw.recipes;
    else if(raw.main) blocks = [Object.assign({label:"권장"}, raw.main)];
    var paths = blocks.slice(0,(base==="lv16"||base==="lv18")?3:2).map(function(b, i){
      var recipe = blockToRecipe(b);
      // 파스텔 클리어 자동 동반 (자체 시어약 메인이면 제외)
      var hasSelfSheer = recipe.some(function(it){ return it.dye==="warm_beige_sheer" || it.dye==="warm_beige_rich" || it.dye==="warm_beige"; });
      if(chroma==="pastel" && !hasSelfSheer && !recipe.some(function(it){return it.role==="clear";})){
        recipe.push({role:"clear", dye:null, ratio:"sub"});
      }
      return { label: b.label || (i===0?"권장":"대안"), desc: b.desc||"", reason: b.reason||null, recipe: recipe };
    }).filter(function(p){ return p.recipe && p.recipe.length; });

    // ★ 노랑 황갈 갈래 (recipes_y) — 주황 paths와 같은 방식
    var blocksY = Array.isArray(raw.recipes_y) ? raw.recipes_y : [];
    var pathsY = blocksY.slice(0,2).map(function(b, i){
      var recipe = blockToRecipe(b);
      if(chroma==="pastel" && !recipe.some(function(it){return it.role==="clear";})) recipe.push({role:"clear", dye:null, ratio:"sub"});
      return { label: b.label || (i===0?"권장":"대안"), desc: b.desc||"", reason: b.reason||null, recipe: recipe };
    }).filter(function(p){ return p.recipe && p.recipe.length; });

    return { case:raw.case, base:base, chroma:chroma, weight:weight,
             paths:paths, pathsY:pathsY, recipe:(paths[0]&&paths[0].recipe)||[],
             _inferred:true, chromaFromLLM:chromaFromLLM, weightFromLLM:weightFromLLM };
  }

/* ════════ 배치 오케스트레이션 (UI only — 1층·2층 무관) ════════ */
const BASE_LABEL={virgin:"버진모",lv14:"14레벨",lv16:"16레벨",lv18:"18레벨",white:"백모"};
const CH_LABEL={vivid:"비비드",mid:"중채도",pastel:"파스텔"};
const WT_LABEL={light:"라이트",mid:"미드",dark:"다크",deep:"딥"};
const $=id=>document.getElementById(id);
let FILES=[], RESULTS=[], COMPANY="sasaki";

$("files").addEventListener("change",e=>{
  FILES=[...e.target.files].slice(0,10);
  $("flist").textContent=FILES.length?FILES.length+"장 선택됨"+(e.target.files.length>10?" (10장까지)":""):"";
  $("runBtn").disabled=!FILES.length;
});
document.querySelector(".toggle").addEventListener("click",e=>{
  const b=e.target.closest("[data-co]"); if(!b||b.dataset.co===COMPANY) return;
  COMPANY=b.dataset.co;
  document.querySelectorAll(".tg").forEach(t=>t.classList.toggle("on",t.dataset.co===COMPANY));
  $("cards").innerHTML=""; RESULTS.forEach((r,i)=>renderCard(r,i)); // 재호출 없이 2층만 재매핑
});
$("runBtn").addEventListener("click",runBatch);

function readB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);});}
function setProg(done,total,label){ $("progwrap").style.display=total?"block":"none"; $("progbar").style.width=total?Math.round(done/total*100)+"%":"0"; $("prog").textContent=total?(done+"/"+total+"  "+(label||"")):""; }

async function runBatch(){
  $("runBtn").disabled=true; RESULTS=[]; $("cards").innerHTML="";
  for(let i=0;i<FILES.length;i++){
    const f=FILES[i]; setProg(i,FILES.length,"분석 중 — "+f.name);
    let rec={fname:f.name,thumb:null,analysis:null,raw:null,error:null};
    try{
      const dataURL=await readB64(f); rec.thumb=dataURL;
      const img={type:"image",source:{type:"base64",media_type:(f.type||"image/jpeg"),data:dataURL.split(",")[1]}};
      const aTxt=await callLLM("","",2048,ANALYSIS_PROMPT,[img,{type:"text",text:"이 사진 속 모발의 색감을 관찰하여 analysis JSON 하나만 출력해. 사고 과정·설명·인사 금지."}]);
      rec.analysis=parseJSON(aTxt);
      const hint="\n\n[참고 — 1차 분석]\n- color_name_ko: "+(rec.analysis.color_name_ko||"")+"\n- tone: "+(rec.analysis.tone||"")+"\n- elements: "+((rec.analysis.elements||[]).join(", "))+"\n- description: "+(rec.analysis.description||"");
      const rTxt=await callLLM("","",12000,RECIPE_PROMPT,[img,{type:"text",text:RECIPE_INSTR+hint}]);
      rec.raw=parseJSON(rTxt);
    }catch(e){ rec.error=e.message||String(e); }
    RESULTS.push(rec); renderCard(rec,i);
  }
  setProg(FILES.length,FILES.length,"완료 ✓");
  $("runBtn").disabled=false;
}

/* ── 렌더 (2층 variants 사용) ── */
function compText(m){
  if(m.role==="clear") return "클리어 · 농도조절";
  if(m.code==="BLUE BLACK") return "블랙 · 딥 네이비";
  if(m.role==="cc"){const N={VIOLET:"보라",BLUE:"블루",GREEN:"그린",ASH:"애쉬",PINK:"핑크",RED:"레드","BLUE BLACK":"블루블랙"};return (N[m.code]||m.code)+" 컨트롤러";}
  return [m.ju,m.bu].filter(x=>x&&x!=="—").join(" · ").replace(/\([^)]*\)/g,"");
}
function pill(m){
  if(m.suppressed) return '<span class="pill sup"><b>'+esc(m.code)+' 컨트롤러</b><small>억제</small></span>';
  if(m.role==="clear") return '<span class="pill"><b>CLEAR</b><small>'+esc(m.band||"")+'</small></span>';
  if(m.role==="cc") return '<span class="pill cc"><b>'+esc(m.code)+'</b><small>컨트롤러 '+esc(m.ratio||"")+'</small></span>';
  if(m.code==="BLUE BLACK") return '<span class="pill"><b>블루블랙</b><small>10~20% 소량</small></span>';
  return '<span class="pill"><b>'+(m.level!=null?'<u>'+m.level+'</u>':'')+esc(m.code)+'</b><small>'+esc(m.roleLabel||"")+'</small></span>';
}
// ★ 리프팅제 (회사별 14레벨 도달 약) — 14레벨일 때만 도달언더톤 줄에 붙음
var LIFT_AGENT = { sasaki:"사사키 15-00", milbon:"밀본 13cl", biscos:"비스코스 15LT", miel:"미엘 Based Bleach", amos:"아모스 라이트너", demi:"데미 LT/SH(14Lv)", hoyu:"호유 LT/SH(14Lv)" };
// ★ 판단근거 블록: 줄의 등장·순서는 약칸(mapped)이 강제, 텍스트는 눈(reason)이 채움. 빈 슬롯엔 약칸 색감으로 폴백(엇박 차단).
function reasonBlock(v){
  var rz = v.reason && typeof v.reason==="object" ? v.reason : null;
  var ms = (v.mapped||[]).filter(function(m){return !m.missing && !m.suppressed;});
  var lines = [];
  function add(label,text){ if(text) lines.push('<div class="rz"><b>'+esc(label)+'</b><span>'+esc(text)+'</span></div>'); }
  // 1) 색감·언더톤 (약칸 무관, 항상)
  add("컬러", rz&&rz.color);
  var ut = (rz&&rz.undertone)||"";
  if(v.base==="lv14"){ var la=LIFT_AGENT[COMPANY]||"리프팅제"; ut=(ut?ut+" ":"14레벨 언더톤. ")+la+"으로 14레벨 언저리까지 리프팅 후 재염색."; }
  add("도달 언더톤", ut);
  add("언더톤 판단근거", rz&&rz.undertone_basis);
  // 2) 약칸 슬롯별 (실제 뜬 약만, 뜬 순서대로)
  ms.forEach(function(m){
    if(m.role==="main"){ add("염모제 선택", (rz&&rz.main)||compText(m)); add("명도 선택", rz&&rz.level); return; }
    if(m.role==="clear"){ add("농도 조절", (rz&&rz.clear)||"클리어로 농도를 묽혀 색을 투명하게 앉힘."); return; }
    if(m.role==="cc"){ add("부염모제 채도", (rz&&rz.cc)||(compText(m)+"로 채도만 보강.")); return; }
    if(m.code==="BLUE BLACK"){ add("부염모제 깊이", (rz&&rz.depth)||"블루블랙 소량으로 깊이를 더함."); return; }
    add("부염모제", (rz&&rz.sub)||(compText(m)+"를 부로 더함.")); // 일반 부(산화염모제)
  });
  if(!lines.length) return v.meta?'<div class="desc">'+esc(v.meta).replace(/\n/g,'<br>')+'</div>':'';
  return '<div class="reason">'+lines.join('')+'</div>';
}
function rxCard(v,tag,yellow){
  const ms=(v.mapped||[]).filter(m=>!m.missing);
  const nums=ms.map(pill).join('<span class="plus">+</span>');
  const rows=ms.filter(m=>!m.suppressed).map(m=>'<tr><td>'+esc(m.role==="clear"?"CLEAR":m.code)+'</td><td>'+esc(compText(m))+'</td><td style="color:var(--dim)">'+esc(m.roleLabel||"")+'</td></tr>').join('');
  return '<div class="rx"><div class="rtag'+(yellow?' y':'')+'">'+esc(tag)+' <span class="m">'+(BASE_LABEL[v.base]||v.base)+' · '+(CH_LABEL[v.chroma]||v.chroma)+'</span></div><div class="nums">'+nums+'</div><table>'+rows+'</table>'+reasonBlock(v)+'</div>';
}
function renderCard(rec,i){
  const c=document.createElement("div"); c.className="card";
  let h='<div class="chead"><span class="idx">#'+(i+1)+'</span>'+(rec.thumb?'<img class="thumb" src="'+rec.thumb+'">':'')+'<span class="fname">'+esc(rec.fname)+'</span></div>';
  if(rec.error){ h+='<div class="err">✗ 실패: '+esc(rec.error)+'</div>'; c.innerHTML=h; $("cards").appendChild(c); return; }
  const a=rec.analysis||{};
  h+='<div class="frozen"><div class="sw" style="background:'+esc(a.hex||"#444")+'"></div><div><div class="fz-name">'+esc(a.color_name_ko||"")+'</div><div class="fz-meta">'+esc(a.tone||"")+(a.hex?' · '+esc(a.hex):'')+'</div></div></div>';
  let abs,V,VY;
  try{ abs=v1ToAbstract(rec.raw,rec.analysis); V=mapLLMRecipes(abs,COMPANY); VY=(abs.base==="lv14")?mapLLMRecipes(Object.assign({},abs,{paths:abs.pathsY}),COMPANY):[]; }
  catch(e){ h+='<div class="err">✗ 2층 매핑 실패: '+esc(e.message||e)+'</div>'; c.innerHTML=h; $("cards").appendChild(c); return; }
  if(rec.raw.display_name) h+='<div class="dname">'+esc(rec.raw.display_name)+(rec.raw.reach?' — <span style="color:var(--dim)">'+esc(rec.raw.reach)+'</span>':'')+'</div>';
  if(rec.raw.quick_thoughts && rec.raw.quick_thoughts.length) h+='<div class="flow"><div class="flow-h">사고 흐름 (공용 색감)</div><div class="flow-b">'+rec.raw.quick_thoughts.map(function(t){return esc(t);}).join('<br>')+'</div></div>';
  let inner=V.map((v,k)=>rxCard(v,k===0?"메인 레시피":k===1?"대안":"대안 2",false)).join('');
  if(VY.length) inner+=VY.map((v,k)=>rxCard(v,k===0?"황갈 권장":"황갈 대안",true)).join('');
  h+='<div class="cards-inner">'+inner+'</div>';
  var vn=(rec.raw&&rec.raw.virgin_note)?String(rec.raw.virgin_note).trim():"";
  if(vn&&vn.toLowerCase()!=="none"){ h+='<div style="border-top:1px dashed var(--line);margin-top:11px;padding-top:9px;font-size:12px;color:#9a8d77;line-height:1.6"><b style="color:var(--gold);font-weight:700">버진모 참고</b> · '+esc(vn)+'</div>'; }
  h+='<div class="disc">※ 쉴드커넥트는 AI이며 실수할 수 있습니다. 도달 언더톤·각 회사 염모제 특징·명도 선택 근거를 다시 확인하여 레시피를 최종 결정하세요.</div>';
  if(COMPANY==="biscos"||COMPANY==="miel"||COMPANY==="amos"||COMPANY==="demi") h+='<div class="disc">※ 비스코스·미엘·아모스·데미는 2층 주입 직후(정답지 검수 전) 단계라 일부 칸 매핑이 조정될 수 있음.</div>';
  if(COMPANY==="hoyu") h+='<div class="disc">※ 호유는 공식 색번호 레시피가 앱게이트로 미확보 상태라 색상환 원리로만 추론 주입됨(미검증). 칸 매핑이 크게 조정될 수 있음.</div>';
  c.innerHTML=h; $("cards").appendChild(c);
}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
</script></body></html>
